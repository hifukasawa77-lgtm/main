<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コード診断エージェント | hide portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: rgba(255,255,255,0.05);
    --cyan: #00d4ff;
    --purple: #9b59b6;
    --green: #2ecc71;
    --yellow: #f39c12;
    --red: #e74c3c;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: rgba(0,212,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }
  a.back {
    display: inline-block;
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 32px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p {
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    backdrop-filter: blur(10px);
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--cyan);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  textarea, input[type="password"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Fira Code', monospace;
    font-size: 0.82rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="password"]:focus {
    border-color: var(--cyan);
  }
  textarea { height: 260px; }
  input[type="password"] { height: 40px; margin-bottom: 16px; }
  .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .col-code { flex: 1; min-width: 260px; }
  .col-ctrl { width: 260px; min-width: 220px; }
  button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .spinner {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--cyan);
    font-size: 0.9rem;
  }
  .spinner.active { display: block; }
  .spinner::before {
    content: '';
    display: block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; }
  .result.active { display: block; }
  .score-row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .score-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--cyan);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .score-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    color: var(--cyan);
    line-height: 1;
  }
  .score-label { font-size: 0.65rem; color: var(--text-dim); }
  .summary { flex: 1; font-size: 0.9rem; color: var(--text); line-height: 1.6; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    width: auto;
    transition: all 0.2s;
  }
  .tab.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .item {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .item.fail { border-left: 3px solid var(--red); }
  .item.warn { border-left: 3px solid var(--yellow); }
  .item.pass { border-left: 3px solid var(--green); }
  .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .badge.fail { background: rgba(231,76,60,0.2); color: var(--red); }
  .badge.warn { background: rgba(243,156,18,0.2); color: var(--yellow); }
  .badge.pass { background: rgba(46,204,113,0.2); color: var(--green); }
  .item-body { flex: 1; }
  .item-title { font-size: 0.9rem; color: var(--text); margin-bottom: 4px; }
  .item-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }
  .item-hint { font-size: 0.78rem; color: var(--cyan); opacity: 0.8; }
  .error-msg {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-size: 0.85rem;
    display: none;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← portfolio へ戻る</a>
  <header>
    <h1>コード診断エージェント</h1>
    <p>HTML/JavaScriptゲームのコードを貼り付けると、AIがバグ・パフォーマンス・セキュリティを診断します</p>
  </header>

  <div class="card">
    <div class="row">
      <div class="col-code">
        <label>ゲームコード（HTML / JavaScript）</label>
        <textarea id="code" placeholder="診断したいゲームのコードを貼り付けてください..."></textarea>
      </div>
      <div class="col-ctrl">
        <label>Anthropic API キー</label>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
        <button id="submitBtn" onclick="diagnose()">診断する</button>
        <p style="font-size:0.72rem;color:var(--text-dim);margin-top:10px;line-height:1.5;">
          キーはリクエスト時のみ使用。<br>保存・記録されません。
        </p>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="spinner" id="spinner">AIが診断中...</div>

  <div class="result card" id="result">
    <div class="score-row">
      <div class="score-circle">
        <span class="score-num" id="scoreNum">--</span>
        <span class="score-label">/ 100</span>
      </div>
      <p class="summary" id="summary"></p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('bugs',this)">バグ</button>
      <button class="tab" onclick="switchTab('performance',this)">パフォーマンス</button>
      <button class="tab" onclick="switchTab('security',this)">セキュリティ</button>
      <button class="tab" onclick="switchTab('quality',this)">コード品質</button>
    </div>
    <div class="tab-panel active" id="tab-bugs"></div>
    <div class="tab-panel" id="tab-performance"></div>
    <div class="tab-panel" id="tab-security"></div>
    <div class="tab-panel" id="tab-quality"></div>
  </div>
</div>

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function renderItems(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items || items.length === 0) {
    el.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;padding:12px 0;">項目なし</p>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="item ${item.severity}">
      <span class="badge ${item.severity}">${item.severity}</span>
      <div class="item-body">
        <div class="item-title">${escHtml(item.title)}</div>
        <div class="item-desc">${escHtml(item.description)}</div>
        ${item.suggestion ? `<div class="item-hint">→ ${escHtml(item.suggestion)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function diagnose() {
  const code = document.getElementById('code').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const result = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');

  if (!code) { alert('コードを入力してください'); return; }
  if (!apiKey) { alert('APIキーを入力してください'); return; }

  btn.disabled = true;
  spinner.classList.add('active');
  result.classList.remove('active');
  errorMsg.classList.remove('active');

  try {
    const res = await fetch('http://localhost:3001/api/agent/debug', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey
      },
      body: JSON.stringify({ code })
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const text = data.content?.[0]?.text || '';
    const parsed = JSON.parse(text);

    document.getElementById('scoreNum').textContent = parsed.score ?? '--';
    document.getElementById('summary').textContent = parsed.summary || '';

    renderItems('tab-bugs', parsed.bugs);
    renderItems('tab-performance', parsed.performance);
    renderItems('tab-security', parsed.security);
    renderItems('tab-quality', parsed.quality);

    result.classList.add('active');
  } catch (err) {
    errorMsg.textContent = 'エラー: ' + err.message;
    errorMsg.classList.add('active');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}
</script>
</body>
</html>
