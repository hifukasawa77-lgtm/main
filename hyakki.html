// ── Game state vars ────────────────────────────────────────────────────────
let gameState, menuCursor, gameMode;

let currentStage;
let frameCount;
let particles;

// ── Input tracking ─────────────────────────────────────────────────────────
const keys = {};
const commandHistory = [];
window.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter'].includes(e.key)) e.preventDefault();
  ensureAudio();
  if (e.key === 'Enter' && gameState === 'battle' && !keys.Enter) {
    paused = !paused;
    playSfx('pause');
  }
  recordCommandKey(e.key);
  keys[e.key] = true;
  handleMenuInput(e.key);
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function recordCommandKey(key) {
  if (gameState !== 'battle') return;
  let token = null;
  if (key === 'ArrowDown') token = 'D';
  if (key === 'ArrowUp') token = 'U';
  if (key === 'ArrowLeft') token = p1 && p1.facing === -1 ? 'F' : 'B';
  if (key === 'ArrowRight') token = p1 && p1.facing === -1 ? 'B' : 'F';
  if (key === 'z' || key === 'Z') token = 'Z';
  if (key === 'x' || key === 'X') token = 'X';
  if (!token) return;
  commandHistory.push({ token, frame: frameCount || 0 });
  while (commandHistory.length > 18) commandHistory.shift();
}

function detectCommand(sequence, maxAge) {
  if (!frameCount) return false;
  let si = sequence.length - 1;
  for (let i = commandHistory.length - 1; i >= 0 && si >= 0; i--) {
    if (frameCount - commandHistory[i].frame > maxAge) break;
    if (commandHistory[i].token === sequence[si]) si--;
  }
  return si < 0;
}

// ── Touch input ────────────────────────────────────────────────────────────
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const VBTNS = [
  { x:90,  y:408, r:28, key:'up',      label:'↑' },
  { x:48,  y:448, r:28, key:'left',    label:'←' },
  { x:132, y:448, r:28, key:'right',   label:'→' },
  { x:90,  y:480, r:24, key:'down',    label:'↓' },
  { x:648, y:408, r:28, key:'light',   label:'軽' },
  { x:718, y:408, r:28, key:'heavy',   label:'重' },
  { x:648, y:460, r:28, key:'special', label:'必' },
  { x:718, y:460, r:28, key:'super',   label:'超' },
];
const touchKeys = { left:false, right:false, up:false, down:false,
                    light:false, heavy:false, special:false, super:false };
let _gpPrev3=[];
function pollGamepad(){
  const gps=navigator.getGamepads?navigator.getGamepads():[];
  const gp=Array.from(gps).find(g=>g);
  if(!gp)return;
  const b=gp.buttons,ax=gp.axes,DZ=0.3;
  touchKeys.left    = !!(b[14]?.pressed||ax[0]<-DZ);
  touchKeys.right   = !!(b[15]?.pressed||ax[0]> DZ);
  touchKeys.up      = !!(b[12]?.pressed||ax[1]<-DZ);
  touchKeys.down    = !!(b[13]?.pressed||ax[1]> DZ);
  touchKeys.light   = !!(b[0]?.pressed);
  touchKeys.heavy   = !!(b[1]?.pressed);
  touchKeys.special = !!(b[2]?.pressed);
  touchKeys.super   = !!(b[3]?.pressed);
  _gpPrev3=b.map(btn=>btn?.pressed);
}

// ── Procedural audio ────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let bgmGain = null;
let bgmTimer = null;
let bgmStep = 0;

function ensureAudio() {
  if (!window.AudioContext && !window.webkitAudioContext) return;
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    bgmGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    bgmGain.gain.value = 0.18;
    bgmGain.connect(masterGain);
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function midiToHz(m) {
  return 440 * Math.pow(2, (m - 69) / 12);
}

function playTone(freq, duration, type = 'square', gain = 0.12, dest = masterGain, detune = 0) {
  if (!audioCtx || !dest) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(gain, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  osc.connect(g);
  g.connect(dest);
  osc.start(now);
  osc.stop(now + duration + 0.03);
}

function playNoise(duration, gain = 0.08) {
  if (!audioCtx || !masterGain) return;
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  g.gain.value = gain;
  src.connect(g);
  g.connect(masterGain);
  src.buffer = buffer;
  src.start();
}

function playSfx(type) {
  ensureAudio();
  if (!audioCtx) return;
  if (type === 'jump') playTone(520, 0.09, 'triangle', 0.08);
  else if (type === 'kick') { playTone(170, 0.06, 'square', 0.08); playNoise(0.04, 0.04); }
  else if (type === 'weapon') { playTone(760, 0.08, 'sawtooth', 0.07); playTone(1140, 0.06, 'triangle', 0.04); }
  else if (type === 'special') { playTone(220, 0.18, 'sawtooth', 0.08); playTone(440, 0.2, 'triangle', 0.05); }
  else if (type === 'hit') { playTone(96, 0.08, 'square', 0.11); playNoise(0.08, 0.08); }
  else if (type === 'block') { playTone(260, 0.08, 'triangle', 0.08); playNoise(0.05, 0.04); }
  else if (type === 'pause') playTone(paused ? 260 : 420, 0.1, 'triangle', 0.08);
}

function startStageBgm(stage) {
  ensureAudio();
  if (!audioCtx || (bgmStage === stage && bgmPhase === 'battle')) return;
  if (bgmTimer) clearInterval(bgmTimer);
  bgmStage = stage;
  bgmPhase = 'battle';
  bgmStep = 0;
  const patterns = [
    { tempo: 150, bass: [38, 38, 43, 41, 38, 45, 43, 36], lead: [62, 65, 67, 70, 67, 65, 62, 58], wave: 'square' },
    { tempo: 132, bass: [33, 40, 38, 36, 33, 43, 40, 38], lead: [57, 60, 64, 67, 69, 67, 64, 60], wave: 'triangle' }
  ];
  const p = patterns[stage % patterns.length];
  const interval = 60000 / p.tempo / 2;
  bgmTimer = setInterval(() => {
    if (!audioCtx || gameState !== 'battle' || paused) return;
    const i = bgmStep % 8;
    playTone(midiToHz(p.bass[i]), 0.16, 'sawtooth', 0.045, bgmGain, -8);
    if (bgmStep % 2 === 0) playTone(midiToHz(p.lead[i]), 0.12, p.wave, 0.035, bgmGain);
    if (bgmStep % 4 === 2) playNoise(0.025, 0.012);
    bgmStep++;
  }, interval);
}

function stopBgm() {
  if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
  bgmPhase = null;
  bgmStage = null;
  bgmStep = 0;
}

function startTitleBgm() {
  ensureAudio();
  if (!audioCtx || bgmPhase === 'title') return;
  if (bgmTimer) clearInterval(bgmTimer);
  bgmPhase = 'title';
  bgmStep = 0;
  // A minor penta: A3=57, C4=60, D4=62, E4=64, G4=67, A4=69
  const mel = [57, 60, 62, 64, 67, 69, 67, 64];
  const interval = 60000 / 88 / 2;
  bgmTimer = setInterval(() => {
    if (!audioCtx || gameState !== 'title') return;
    const i = bgmStep % 8;
    playTone(midiToHz(mel[i]), 0.3, 'triangle', 0.028, bgmGain);
    if (bgmStep % 4 === 0) playTone(midiToHz(mel[i] - 12), 0.28, 'sine', 0.022, bgmGain);
    if (bgmStep % 4 === 0) playTone(80, 0.12, 'sine', 0.018, masterGain);
    bgmStep++;
  }, interval);
}

function startCharSelectBgm() {
  ensureAudio();
  if (!audioCtx || bgmPhase === 'charselect') return;
  if (bgmTimer) clearInterval(bgmTimer);
  bgmPhase = 'charselect';
  bgmStep = 0;
  // E minor / A minor penta energetic: E4=64, G4=67, A4=69, C5=72, D5=74
  const mel  = [64, 67, 69, 72, 74, 72, 69, 67];
  const bass = [52, 55, 52, 55, 52, 55, 52, 55];
  const interval = 60000 / 104 / 2;
  bgmTimer = setInterval(() => {
    if (!audioCtx || gameState !== 'charselect') return;
    const i = bgmStep % 8;
    playTone(midiToHz(mel[i]),  0.14, 'square',   0.025, bgmGain);
    if (bgmStep % 2 === 0) playTone(midiToHz(bass[i]), 0.18, 'sawtooth', 0.020, bgmGain);
    if (bgmStep % 4 === 0) playNoise(0.02, 0.010);
    bgmStep++;
  }, interval);
}

function touchToCanvas(touch) {
  const r = canvas.getBoundingClientRect();
  return { x:(touch.clientX - r.left)*(W/r.width), y:(touch.clientY - r.top)*(H/r.height) };
}

function updateTouchKeys(e) {
  Object.keys(touchKeys).forEach(k => touchKeys[k] = false);
  for (const t of e.touches) {
    const p = touchToCanvas(t);
    for (const b of VBTNS) {
      if ((p.x-b.x)**2+(p.y-b.y)**2 <= b.r**2) touchKeys[b.key] = true;
    }
  }
}

function handleTouchMenu(touch) {
  const p = touchToCanvas(touch);
  if (gameState === 'title') {
    if (p.y >= 261 && p.y <= 295) { menuCursor = 0; startCharSelect(); }
    else if (p.y > 295 && p.y <= 330) { menuCursor = 1; startCharSelect(); }
    else menuCursor = menuCursor === 0 ? 1 : 0;
  } else if (gameState === 'charselect') {
    const cs = charSelectState;
    if (p.x < 400) {
      if (!cs.confirmed[0]) {
        if (p.y > 360) {
          cs.confirmed[0] = true;
          if (gameMode === 'vscpu') { cs.cursors[1] = cs.cursors[0] === 0 ? 1 : 0; cs.confirmed[1] = true; startBattle(); }
        } else {
          cs.cursors[0] = (cs.cursors[0] + 1) % FIGHTER_DEFS.length;
        }
      }
    } else if (gameMode === 'vsplayer') {
      if (!cs.confirmed[1]) {
        if (p.y > 360) { cs.confirmed[1] = true; if (cs.confirmed[0]) startBattle(); }
        else cs.cursors[1] = (cs.cursors[1] + 1) % FIGHTER_DEFS.length;
      }
    }
  } else if (gameState === 'gameover' || gameState === 'roundend') {
    handleMenuInput('Enter');
  }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  if (gameState === 'battle') updateTouchKeys(e);
  else if (e.touches.length > 0) handleTouchMenu(e.touches[0]);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameState === 'battle') updateTouchKeys(e);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameState === 'battle') updateTouchKeys(e);
}, { passive: false });

// Debounced menu keys
const menuKeyHeld = {};
function handleMenuInput(key) {
  if (gameState === 'title') {
    if (key === 'ArrowUp' || key === 'w') menuCursor = Math.max(0, menuCursor - 1);
    if (key === 'ArrowDown' || key === 's') menuCursor = Math.min(1, menuCursor + 1);
    if (key === 'Enter') startCharSelect();
  } else if (gameState === 'charselect') {
    handleCharSelectKey(key);
  } else if (gameState === 'gameover') {
    if (key === 'Enter') initGame();
  }
}

// ── Fighter factory ────────────────────────────────────────────────────────
function createFighter(def, playerNum, isAI) {
  const startX = playerNum === 1 ? 200 : 600;
  return {
    id: def.id,
    def,
    playerNum,
    isAI,
    x: startX, y: GROUND_Y,
    vx: 0, vy: 0,
    facing: playerNum === 1 ? 1 : -1,
    onGround: true,
    hp: def.hp, maxHp: def.hp,
    meter: 0, maxMeter: 100,
    isBlocking: false,
    state: S.IDLE, stateTimer: 0,
    attackData: null, hitActive: false, hasHitOpponent: false,
    attackType: null,
    hitbox: null,
    hurtbox: { w:42, h:88, ox:-21, oy:-88 },
    hitFlash: 0,
    inputBuf: [],
    aiMode: 'approach', aiDecideTimer: 0, aiDecideInterval: 22,
  };
}

// ── Input readers ──────────────────────────────────────────────────────────
function getP1Input() {
  const qcf = detectCommand(['D', 'F'], 18);
  const qcb = detectCommand(['D', 'B'], 18);
  return {
    left:    !!(keys['ArrowLeft'] || touchKeys.left),
    right:   !!(keys['ArrowRight'] || touchKeys.right),
    up:      !!(keys['ArrowUp'] || touchKeys.up),
    down:    !!(keys['ArrowDown'] || touchKeys.down),
    light:   !!(keys['z'] || keys['Z'] || touchKeys.light),
    heavy:   !!(keys['x'] || keys['X'] || touchKeys.heavy),
    special: !!((keys['x'] || keys['X']) && (qcf || touchKeys.special)),
    super:   !!((keys['x'] || keys['X']) && qcb),
  };
}

function getP2Input() {
  return {
    left:    keys['a'] || keys['A'],
    right:   keys['d'] || keys['D'],
    up:      keys['w'] || keys['W'],
    down:    keys['s'] || keys['S'],
    light:   keys['f'] || keys['F'],
    heavy:   keys['g'] || keys['G'],
    special: keys['h'] || keys['H'],
    super:   keys['t'] || keys['T'],
  };
}

// ── AI ─────────────────────────────────────────────────────────────────────
function getAIInput(ai, opp) {
  ai.aiDecideTimer--;
  if (ai.aiDecideTimer <= 0) {
    ai.aiDecideTimer = ai.aiDecideInterval + Math.floor(Math.random() * 12);
    const dist = Math.abs(ai.x - opp.x);
    const hpRatio = ai.hp / ai.maxHp;
    // Decide mode
    if (ai.meter >= ai.maxMeter && hpRatio < 0.5) {
      ai.aiMode = 'super';
    } else if (dist < 90 && Math.random() < 0.55) {
      ai.aiMode = 'attack';
    } else if (dist < 160 && Math.random() < 0.3) {
      ai.aiMode = 'jump_attack';
    } else if (hpRatio < 0.3 && Math.random() < 0.35) {
      ai.aiMode = 'defend';
    } else if (dist > 200) {
      ai.aiMode = 'approach';
    } else {
      ai.aiMode = Math.random() < 0.6 ? 'attack' : 'approach';
    }
  }

  const dist = Math.abs(ai.x - opp.x);
  const dir = opp.x > ai.x ? 1 : -1; // direction toward opponent
  const inp = { left:false, right:false, up:false, down:false, light:false, heavy:false, special:false, super:false };

  // Map dir to left/right
  const moveToward = () => { if (dir === 1) inp.right = true; else inp.left = true; };
  const moveAway   = () => { if (dir === 1) inp.left  = true; else inp.right = true; };

  if (ai.state === S.HURT || ai.state === S.BLOCKSTUN || ai.state === S.KO) return inp;
  // Don't interrupt active attacks
  if (ai.state === S.ATTACK_L || ai.state === S.ATTACK_H || ai.state === S.SPECIAL || ai.state === S.SUPER || ai.state === S.JUMP_ATTACK) return inp;

  switch (ai.aiMode) {
    case 'approach':
      moveToward();
      break;
    case 'attack':
      if (dist > 120) { moveToward(); break; }
      if (dist < 65) { moveAway(); }
      if (ai.meter >= ai.maxMeter) { inp.super = true; }
      else if (dist < 110 && Math.random() < 0.18) { inp.special = true; }
      else if (dist < 95 && Math.random() < 0.45) { inp.heavy = true; }
      else if (dist < 80 && Math.random() < 0.65) { inp.light = true; }
      else { moveToward(); }
      break;
    case 'defend':
      moveAway();
      if (dist < 100 && Math.random() < 0.3) inp.light = true;
      break;
    case 'jump_attack':
      moveToward();
      if (!ai.onGround) { inp.light = true; }
      else { inp.up = true; }
      break;
    case 'super':
      if (ai.meter >= ai.maxMeter) inp.super = true;
      else ai.aiMode = 'attack';
      break;
  }
  return inp;
}

// ── Input buffer & QCF ────────────────────────────────────────────────────
function pushInputBuf(f, token) {
  const buf = f.inputBuf;
  if (buf.length === 0 || buf[buf.length-1] !== token) {
    buf.push(token);
    if (buf.length > 12) buf.shift();
  }
}

function getDirectionToken(f, inp) {
  const movingRight = inp.right;
  const movingLeft  = inp.left;
  const isUp   = inp.up;
  const isDown = inp.down;
  if (isUp)   return 'U';
  if (isDown) return 'D';
  if (movingRight && movingLeft) return 'N';
  if (movingRight) return f.facing === 1 ? 'F' : 'B';
  if (movingLeft)  return f.facing === 1 ? 'B' : 'F';
  return 'N';
}

function detectQCF(f, buttonToken) {
  const buf = f.inputBuf;
  // Scan backward for button
  let bi = buf.length - 1;
  while (bi >= 0 && buf[bi] !== buttonToken) bi--;
  if (bi < 0) return false;
  // Within 7 entries before button, look for F then D (D must appear before F in the buffer)
  let foundF = false, foundD = false;
  for (let i = bi - 1; i >= Math.max(0, bi - 7); i--) {
    if (buf[i] === 'F') foundF = true;
    if (buf[i] === 'D' && foundF) { foundD = true; break; }
  }
  return foundF && foundD;
}

// ── Attack phase ───────────────────────────────────────────────────────────
function getAttackPhase(f) {
  if (!f.attackData) return 'none';
  const total = f.attackData.startup + f.attackData.active + f.attackData.recovery;
  const elapsed = total - f.stateTimer;
  if (elapsed < f.attackData.startup) return 'startup';
  if (elapsed < f.attackData.startup + f.attackData.active) return 'active';
  return 'recovery';
}

// ── Hitbox calculation ─────────────────────────────────────────────────────
function calcHitbox(f) {
  if (!f.attackData) return null;
  const hb = f.attackData.hitbox;
  const facedOx = f.facing === 1 ? hb.ox : -(hb.ox + hb.w);
  return { x: f.x + facedOx, y: f.y + hb.oy, w: hb.w, h: hb.h };
}

function calcHurtbox(f) {
  const hb = f.hurtbox;
  return { x: f.x + hb.ox, y: f.y + hb.oy, w: hb.w, h: hb.h };
}

function aabbOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── State transitions ──────────────────────────────────────────────────────
function startAttack(f, type) {
  const key = type === 'light' ? 'light' : type === 'heavy' ? 'heavy' : type === 'special' ? 'special' : type === 'super' ? 'super' : 'jumpAtk';
  const atkKey = f.def.attacks; // 'tsukikage' or 'guren'
  f.attackData = ATTACKS[atkKey][key];
  f.attackType = type;
  const total = f.attackData.startup + f.attackData.active + f.attackData.recovery;
  f.stateTimer = total;
  f.hitActive = false;
  f.hasHitOpponent = false;
  f.hitbox = null;
  if (type === 'light')   f.state = S.ATTACK_L;
  else if (type === 'heavy')   f.state = S.ATTACK_H;
  else if (type === 'special') f.state = S.SPECIAL;
  else if (type === 'super')   f.state = S.SUPER;
  else if (type === 'jumpAtk') f.state = S.JUMP_ATTACK;
  playSfx(type === 'light' || type === 'jumpAtk' ? 'kick' : (type === 'heavy' ? 'weapon' : 'special'));
  f.vx = 0;
}

// ── Fighter update ─────────────────────────────────────────────────────────
function updateFighter(f, opp, inp) {
  // Update input buffer for QCF detection (human only)
  if (!f.isAI) {
    const dirToken = getDirectionToken(f, inp);
    pushInputBuf(f, dirToken);
    if (inp.special) pushInputBuf(f, 'SP');
  }

  // Auto-face (except KO and SUPER)
  if (f.state !== S.KO && f.state !== S.SUPER) {
    f.facing = opp.x > f.x ? 1 : -1;
  }

  // Decrement stateTimer
  if (f.stateTimer > 0) f.stateTimer--;

  // hitFlash
  if (f.hitFlash > 0) f.hitFlash--;

  // ── State machine ──
  switch (f.state) {
    case S.IDLE: {
      f.vx = 0;
      f.isBlocking = false;
      // Priority: super > special > heavy > light > jump > crouch > walk
      if (inp.super && f.meter >= f.maxMeter) {
        f.meter = 0;
        startAttack(f, 'super');
      } else if (!f.isAI && (detectQCF(f, 'SP') || inp.special)) {
        startAttack(f, 'special');
      } else if (f.isAI && inp.special) {
        startAttack(f, 'special');
      } else if (inp.heavy) {
        startAttack(f, 'heavy');
      } else if (inp.light) {
        startAttack(f, 'light');
      } else if (inp.up) {
        f.vy = JUMP_VY;
        f.onGround = false;
        f.state = S.JUMP;
        playSfx('jump');
      } else if (inp.down) {
        f.state = S.CROUCH;
      } else if ((f.facing === 1 && inp.right) || (f.facing === -1 && inp.left)) {
        f.state = S.WALK_F;
      } else if ((f.facing === 1 && inp.left) || (f.facing === -1 && inp.right)) {
        f.state = S.WALK_B;
      }
      break;
    }
    case S.WALK_F: {
      f.vx = f.facing * f.def.speed;
      f.isBlocking = false;
      if (inp.super && f.meter >= f.maxMeter) {
        f.meter = 0; f.vx = 0; startAttack(f, 'super');
      } else if (!f.isAI && (detectQCF(f, 'SP') || inp.special)) {
        f.vx = 0; startAttack(f, 'special');
      } else if (f.isAI && inp.special) {
        f.vx = 0; startAttack(f, 'special');
      } else if (inp.heavy) {
        f.vx = 0; startAttack(f, 'heavy');
      } else if (inp.light) {
        f.vx = 0; startAttack(f, 'light');
      } else if (inp.up) {
        f.vy = JUMP_VY; f.onGround = false; f.vx = 0; f.state = S.JUMP; playSfx('jump');
      } else if (!inp.right && !inp.left && !inp.up && !inp.down) {
        f.state = S.IDLE;
      } else if ((f.facing === 1 && inp.left) || (f.facing === -1 && inp.right)) {
        f.state = S.WALK_B;
      } else if (inp.down) {
        f.state = S.CROUCH;
      }
      break;
    }
    case S.WALK_B: {
      f.vx = -f.facing * f.def.speed * 0.7;
      // Block when holding back
      f.isBlocking = f.onGround;
      if (inp.super && f.meter >= f.maxMeter) {
        f.meter = 0; f.vx = 0; f.isBlocking = false; startAttack(f, 'super');
      } else if (!f.isAI && (detectQCF(f, 'SP') || inp.special)) {
        f.vx = 0; f.isBlocking = false; startAttack(f, 'special');
      } else if (f.isAI && inp.special) {
        f.vx = 0; f.isBlocking = false; startAttack(f, 'special');
      } else if (inp.heavy) {
        f.vx = 0; f.isBlocking = false; startAttack(f, 'heavy');
      } else if (inp.light) {
        f.vx = 0; f.isBlocking = false; startAttack(f, 'light');
      } else if (inp.up) {
        f.vy = JUMP_VY; f.onGround = false; f.vx = 0; f.isBlocking = false; f.state = S.JUMP; playSfx('jump');
      } else if (!inp.left && !inp.right) {
        f.state = S.IDLE;
      } else if ((f.facing === 1 && inp.right) || (f.facing === -1 && inp.left)) {
        f.state = S.WALK_F;
      }
      break;
    }
    case S.CROUCH: {
      f.vx = 0;
      f.isBlocking = false;
      if (inp.heavy) { startAttack(f, 'heavy'); }
      else if (inp.light) { startAttack(f, 'light'); }
      else if (!inp.down) { f.state = S.IDLE; }
      break;
    }
    case S.JUMP: {
      // Air control
      if (inp.right) f.vx = Math.min(f.vx + 0.5, f.def.speed);
      else if (inp.left) f.vx = Math.max(f.vx - 0.5, -f.def.speed);
      if (inp.light || inp.heavy) {
        startAttack(f, 'jumpAtk');
      }
      // Land handled in physics
      break;
    }
    case S.JUMP_ATTACK: {
      const jaPhase = getAttackPhase(f);
      if (jaPhase === 'active' && !f.hitActive) {
        f.hitActive = true; f.hitbox = calcHitbox(f);
      } else if (jaPhase !== 'active' && f.hitActive) {
        f.hitActive = false; f.hitbox = null;
      }
      if (f.stateTimer <= 0 && !f.onGround) {
        f.state = S.JUMP; f.attackData = null; f.attackType = null; f.hitbox = null; f.hitActive = false;
      }
      break;
    }
    case S.ATTACK_L:
    case S.ATTACK_H:
    case S.SPECIAL:
    case S.SUPER: {
      f.vx = 0;
      const phase = getAttackPhase(f);
      if (phase === 'active' && !f.hitActive) {
        f.hitActive = true;
        f.hitbox = calcHitbox(f);
      } else if (phase === 'recovery' && f.hitActive) {
        f.hitActive = false;
        f.hitbox = null;
      }
      if (f.stateTimer <= 0) {
        f.state = S.IDLE;
        f.attackData = null;
        f.attackType = null;
        f.hitbox = null;
        f.hitActive = false;
      }
      break;
    }
    case S.HURT: {
      if (f.stateTimer <= 0) { f.state = S.IDLE; }
      break;
    }
    case S.BLOCKSTUN: {
      f.vx *= 0.7;
      if (f.stateTimer <= 0) { f.state = S.IDLE; f.isBlocking = false; }
      break;
    }
    case S.KO: {
      f.vx *= 0.85;
      break;
    }
  }

  // ── Physics ──
  if (!f.onGround) {
    f.vy = Math.min(f.vy + GRAVITY, TERMINAL_VEL);
    f.y += f.vy;
    f.x += f.vx;
    if (f.y >= GROUND_Y) {
      f.y = GROUND_Y;
      f.vy = 0;
      f.onGround = true;
      // Land transitions
      if (f.state === S.JUMP) f.state = S.IDLE;
      if (f.state === S.JUMP_ATTACK) { f.state = S.IDLE; f.attackData = null; f.attackType = null; f.hitbox = null; f.hitActive = false; }
    }
  } else {
    f.x += f.vx;
    // Friction
    if (f.state !== S.WALK_F && f.state !== S.WALK_B && f.state !== S.BLOCKSTUN) {
      f.vx *= 0.5;
    }
  }

  // Jump attack: update hitbox position while active
  if ((f.state === S.JUMP_ATTACK) && f.hitActive && f.attackData) {
    f.hitbox = calcHitbox(f);
  }

  // Clamp to stage
  f.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, f.x));
}

// ── Hit resolution ─────────────────────────────────────────────────────────
function resolveHits(attacker, defender) {
  if (!attacker.hitbox || !attacker.hitActive || attacker.hasHitOpponent) return;
  if (defender.state === S.KO) return;
  const defHurtbox = calcHurtbox(defender);
  if (!aabbOverlap(attacker.hitbox, defHurtbox)) return;

  const atk = attacker.attackData;
  attacker.hasHitOpponent = true;

  // Bug fix: ヒットボックス中心を正しく計算（x + x は x の誤り）
  const hitX = attacker.hitbox.x + attacker.hitbox.w / 2;
  const hitY = attacker.hitbox.y + attacker.hitbox.h / 2;

  if (defender.isBlocking && defender.onGround) {
    playSfx('block');
    // Chip damage
    const chip = Math.max(1, Math.floor(atk.damage * 0.08));
    defender.hp = Math.max(0, defender.hp - chip);
    // Knockback
    defender.vx = -attacker.facing * atk.blockKnock * 2;
    // Blockstun
    defender.state = S.BLOCKSTUN;
    defender.stateTimer = atk.blockstun;
    // Effect
    spawnHitEffect(hitX, hitY, 'block');
    attacker.meter = Math.min(attacker.maxMeter, attacker.meter + Math.floor(atk.damage * 0.3));
  } else {
    playSfx('hit');
    // Full hit
    defender.hp -= atk.damage;
    defender.hitFlash = 8;
    if (defender.hp <= 0) {
      defender.hp = 0;
      defender.state = S.KO;
      defender.vy = -8;
      defender.vx = attacker.facing * atk.hitKnock * 1.2;
      defender.onGround = false;
    } else {
      defender.vx = attacker.facing * atk.hitKnock * 1.5;
      defender.state = S.HURT;
      defender.stateTimer = atk.hitstun;
    }
    // Attacker meter
    attacker.meter = Math.min(attacker.maxMeter, attacker.meter + Math.floor(atk.damage * 0.5));
    // Defender meter
    defender.meter = Math.min(defender.maxMeter, defender.meter + Math.floor(atk.damage * 0.25));

    const atkType = attacker.state === S.SUPER ? 'super' : (attacker.state === S.SPECIAL ? 'special' : 'hit');
    spawnHitEffect(hitX, hitY, atkType);
    if (attacker.state === S.SUPER) triggerScreenShake(6, 18);
  }
}

// ── Push apart ─────────────────────────────────────────────────────────────
function pushApart(a, b) {
  const dist = Math.abs(b.x - a.x);
  if (dist < 44) {
    const push = (44 - dist) / 2 + 1;
    if (a.x <= b.x) {
      a.x -= push;
      b.x += push;
    } else {
      a.x += push;
      b.x -= push;
    }
    a.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, a.x));
    b.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, b.x));
  }
}

// ── Particles ──────────────────────────────────────────────────────────────
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.88;
    p.vy *= 0.88;
    p.vy += 0.25;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function spawnParticle(obj) {
  if (particles.length >= 150) return;
  particles.push(obj);
}

function spawnInkBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    const color = Math.random() < 0.6 ? '#1a0000' : '#3a0000';
    spawnParticle({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 18 + Math.floor(Math.random() * 14),
      maxLife: 32,
      color,
      w: 4 + Math.random() * 6,
      h: 3 + Math.random() * 5,
      isRect: true
    });
  }
}

function spawnSparks(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 3;
    spawnParticle({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      life: 10 + Math.floor(Math.random() * 10),
      maxLife: 20,
      color,
      size: 2 + Math.random() * 3,
      isRect: false
    });
  }
}

function spawnHitEffect(x, y, type) {
  if (type === 'hit') {
    spawnInkBurst(x, y, 10);
    spawnSparks(x, y, 8, '#ff4444');
  } else if (type === 'block') {
    spawnSparks(x, y, 6, '#4488ff');
  } else if (type === 'special') {
    spawnInkBurst(x, y, 14);
    spawnSparks(x, y, 10, '#ff8800');
  } else if (type === 'super') {
    spawnInkBurst(x, y, 22);
    spawnSparks(x, y, 18, '#ffcc00');
    spawnSparks(x, y, 10, '#ff4400');
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    if (p.isRect) {
      ctx.fillRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ── Screen shake ───────────────────────────────────────────────────────────
function triggerScreenShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
}

// ── Stage drawing ──────────────────────────────────────────────────────────
function drawStage0(fc) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#0d1018');
  skyGrad.addColorStop(1, '#1a1a2a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Dim red moon top-right
  const moonX = 670, moonY = 60, moonR = 38;
  const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR);
  moonGrad.addColorStop(0, 'rgba(180,40,20,0.7)');
  moonGrad.addColorStop(0.6, 'rgba(120,20,10,0.3)');
  moonGrad.addColorStop(1, 'rgba(80,10,5,0)');
  ctx.fillStyle = moonGrad;
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fill();

  // Building silhouettes
  const buildings = [
    {x:0, y:180, w:110, h:200},
    {x:90, y:200, w:90, h:180},
    {x:560, y:175, w:120, h:205},
    {x:660, y:195, w:140, h:185},
  ];
  ctx.fillStyle = '#12151c';
  for (const b of buildings) {
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Japanese sloped roof
    ctx.beginPath();
    ctx.moveTo(b.x - 8, b.y);
    ctx.lineTo(b.x + b.w/2, b.y - 28);
    ctx.lineTo(b.x + b.w + 8, b.y);
    ctx.closePath();
    ctx.fillStyle = '#0d1018';
    ctx.fill();
    ctx.fillStyle = '#12151c';
  }

  // Torii gate right side
  ctx.fillStyle = '#1a0808';
  // Pillars
  ctx.fillRect(700, 240, 12, 140);
  ctx.fillRect(748, 240, 12, 140);
  // Cross bars
  ctx.fillRect(694, 248, 74, 10);
  ctx.fillRect(697, 264, 68, 7);

  // Ground
  const groundGrad = ctx.createLinearGradient(0, GROUND_Y - 10, 0, H);
  groundGrad.addColorStop(0, '#2a1f14');
  groundGrad.addColorStop(1, '#1a1208');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Plank lines
  ctx.strokeStyle = '#1a1008';
  ctx.lineWidth = 1;
  for (let px = 0; px < W; px += 48) {
    ctx.beginPath();
    ctx.moveTo(px, GROUND_Y);
    ctx.lineTo(px, H);
    ctx.stroke();
  }
  // Ground top edge
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(0, GROUND_Y, W, 3);

  // Animated rain (~45 lines)
  ctx.strokeStyle = 'rgba(100,130,170,0.25)';
  ctx.lineWidth = 1;
  const rainOff = (fc * 5) % 70;
  for (let ri = 0; ri < 45; ri++) {
    const rx = (ri * 19 + rainOff) % W;
    const ry = (ri * 13 + rainOff) % H;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx + 8, ry + 14);
    ctx.stroke();
  }
}

function drawStage1(fc) {
  // Dark green night sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#030704');
  skyGrad.addColorStop(1, '#0a1508');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(200,220,200,0.6)';
  const starPositions = [
    {x:80,y:40},{x:160,y:25},{x:240,y:55},{x:310,y:18},{x:420,y:38},
    {x:500,y:22},{x:580,y:48},{x:640,y:30},{x:720,y:15},{x:760,y:50},
    {x:130,y:70},{x:350,y:65},{x:470,y:78},{x:610,y:60}
  ];
  for (const s of starPositions) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bamboo stalks
  const bamboos = [
    {x:20, w:10}, {x:55, w:13}, {x:120, w:9}, {x:180, w:12},
    {x:600, w:11}, {x:650, w:14}, {x:700, w:9}, {x:760, w:12}, {x:790, w:10}
  ];
  for (const b of bamboos) {
    const grad = ctx.createLinearGradient(b.x, 0, b.x + b.w, 0);
    grad.addColorStop(0, '#1a2e0a');
    grad.addColorStop(0.5, '#243d0d');
    grad.addColorStop(1, '#1a2e0a');
    ctx.fillStyle = grad;
    ctx.fillRect(b.x, 50, b.w, GROUND_Y - 50);
    // Node marks
    ctx.strokeStyle = '#0f1c06';
    ctx.lineWidth = 2;
    for (let ny = 100; ny < GROUND_Y; ny += 40 + Math.floor(b.w * 1.5)) {
      ctx.beginPath();
      ctx.moveTo(b.x, ny);
      ctx.lineTo(b.x + b.w, ny);
      ctx.stroke();
    }
    // Leaves (ellipses)
    ctx.fillStyle = '#1e3a0a';
    for (let li = 0; li < 3; li++) {
      const lx = b.x + b.w/2;
      const ly = 80 + li * 60;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(-0.6 + li * 0.4);
      ctx.beginPath();
      ctx.ellipse(0, 0, 24, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Ground
  ctx.fillStyle = '#060d05';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Ground top edge
  ctx.fillStyle = '#0d1a09';
  ctx.fillRect(0, GROUND_Y, W, 4);

  // Will-o'-wisps (3)
  const wisps = [
    {cx:230, cy:GROUND_Y - 80, rx:80, ry:30, phase:0,   color:'rgba(0,200,80,'},
    {cx:400, cy:GROUND_Y - 120, rx:60, ry:50, phase:2.1, color:'rgba(80,160,0,'},
    {cx:560, cy:GROUND_Y - 90,  rx:90, ry:35, phase:4.2, color:'rgba(0,220,100,'},
  ];
  for (const w of wisps) {
    const wx = w.cx + Math.sin(fc * 0.03 + w.phase) * w.rx;
    const wy = w.cy + Math.cos(fc * 0.025 + w.phase) * w.ry;
    const pulse = 0.5 + 0.5 * Math.sin(fc * 0.08 + w.phase);
    const wispGrad = ctx.createRadialGradient(wx, wy, 0, wx, wy, 20 + pulse * 8);
    wispGrad.addColorStop(0, w.color + '0.7)');
    wispGrad.addColorStop(0.4, w.color + '0.25)');
    wispGrad.addColorStop(1, w.color + '0)');
    ctx.fillStyle = wispGrad;
    ctx.beginPath();
    ctx.arc(wx, wy, 20 + pulse * 8, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Fighter drawing ────────────────────────────────────────────────────────
function drawFighter(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(f.facing, 1);

  if (f.id === 1) drawGuren(f);
  else _drawCharImage(f, f.id);

  // Hit flash overlay (rect covers the character image area)
  if (f.hitFlash > 0) {
    ctx.globalAlpha = 0.55 * (f.hitFlash / 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-49, -120, 98, 120);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function getActionPose(f) {
  if (f.state === S.WALK_F || f.state === S.WALK_B) return 'walk';
  if (f.state === S.JUMP) return 'jump';
  if (f.state === S.JUMP_ATTACK) return 'kick';
  if (f.state === S.ATTACK_L) return 'punch';
  if (f.state === S.ATTACK_H) return 'weapon';
  if (f.state === S.SPECIAL || f.state === S.SUPER) return 'special';
  return 'idle';
}

function _drawCharImage(f, imgIdx) {
  const pose = getActionPose(f);
  const poseImg = actionImages[imgIdx]?.[pose];
  const img = (poseImg && poseImg.complete && poseImg.naturalWidth) ? poseImg : charImages[imgIdx];
  const usesActionArt = img === poseImg;
  const isAttackPose = ['punch', 'kick', 'weapon', 'special', 'throw'].includes(pose);
  const dispH = usesActionArt ? 132 : 120;
  const dispW = usesActionArt ? (isAttackPose ? 142 : 118) : 98;
  const imgSrcSkipTop = 0;

  const bob = (f.state === S.WALK_F || f.state === S.WALK_B)
    ? Math.sin(frameCount * 0.3) * 3
    : Math.sin(frameCount * 0.05) * 1.5;

  // Ground shadow
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 0, 30, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  if (!img.complete || !img.naturalWidth) {
    ctx.fillStyle = '#553';
    ctx.fillRect(-14, -88, 28, 88);
    return;
  }

  const isCrouch  = f.state === S.CROUCH;
  const isAttack  = f.state === S.ATTACK_L || f.state === S.ATTACK_H ||
                    f.state === S.SPECIAL   || f.state === S.SUPER;
  const isHurt    = f.state === S.HURT || f.state === S.KO;

  const xOff = isAttack ? 14 : (isHurt ? -8 : 0);
  const yOff = (isCrouch ? 22 : 0) + bob;
  const dH   = isCrouch ? dispH * 0.82 : dispH;

  // sx/sy/sw/sh lets us skip the top logo text in the source image
  const srcH = img.naturalHeight - imgSrcSkipTop;
  ctx.drawImage(img,
    0, imgSrcSkipTop, img.naturalWidth, srcH,    // source rect
    xOff - dispW / 2, -dH + yOff, dispW, dH      // dest rect
  );
}

function drawTsukikage(f) {
  _drawCharImage(f, 0);
}

function drawGuren(f) {
  // Demon aura during special/super (drawn under the image)
  if (f.state === S.SPECIAL || f.state === S.SUPER) {
    const pulse = 0.3 + 0.3 * Math.sin(frameCount * 0.18);
    const auraGrad = ctx.createRadialGradient(0, -55, 0, 0, -55, 58);
    auraGrad.addColorStop(0, `rgba(180,0,0,${pulse})`);
    auraGrad.addColorStop(0.6, `rgba(100,0,0,${pulse * 0.4})`);
    auraGrad.addColorStop(1, 'rgba(60,0,0,0)');
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.arc(0, -55, 58, 0, Math.PI * 2);
    ctx.fill();
  }
  _drawCharImage(f, 1);
}

// ── HUD ────────────────────────────────────────────────────────────────────
const BAR_Y = 14, BAR_W = 310, BAR_H = 18;
const METER_Y = BAR_Y + BAR_H + 5, METER_H = 8;

function drawHUD() {
  // Fighter names
  ctx.font = '11px monospace';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText(p1.def.name + ' ' + p1.def.nameEn, 30, BAR_Y - 2);
  ctx.textAlign = 'right';
  ctx.fillText(p2.def.nameEn + ' ' + p2.def.name, W - 30, BAR_Y - 2);

  // P1 HP bar
  const p1HpRatio = Math.max(0, p1.hp / p1.maxHp);
  const p2HpRatio = Math.max(0, p2.hp / p2.maxHp);

  // Background
  ctx.fillStyle = '#222';
  ctx.fillRect(30, BAR_Y, BAR_W, BAR_H);
  ctx.fillRect(W - 30 - BAR_W, BAR_Y, BAR_W, BAR_H);

  // P1 bar gradient
  const p1Grad = ctx.createLinearGradient(30, 0, 30 + BAR_W, 0);
  if (p1HpRatio < 0.3) {
    p1Grad.addColorStop(0, '#ff6600');
    p1Grad.addColorStop(1, '#cc3300');
  } else {
    p1Grad.addColorStop(0, '#cc2200');
    p1Grad.addColorStop(1, '#880000');
  }
  ctx.fillStyle = p1Grad;
  ctx.fillRect(30, BAR_Y, BAR_W * p1HpRatio, BAR_H);

  // P2 bar gradient (right to left)
  const p2x = W - 30 - BAR_W;
  const p2Grad = ctx.createLinearGradient(p2x, 0, p2x + BAR_W, 0);
  if (p2HpRatio < 0.3) {
    p2Grad.addColorStop(0, '#cc3300');
    p2Grad.addColorStop(1, '#ff6600');
  } else {
    p2Grad.addColorStop(0, '#880000');
    p2Grad.addColorStop(1, '#cc2200');
  }
  ctx.fillStyle = p2Grad;
  // Draw from right side
  const p2BarW = BAR_W * p2HpRatio;
  ctx.fillRect(p2x + BAR_W - p2BarW, BAR_Y, p2BarW, BAR_H);

  // HP bar borders
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(30, BAR_Y, BAR_W, BAR_H);
  ctx.strokeRect(p2x, BAR_Y, BAR_W, BAR_H);

  // P1 Meter bar
  const p1MeterRatio = p1.meter / p1.maxMeter;
  const p2MeterRatio = p2.meter / p2.maxMeter;
  const meterPulse = Math.abs(Math.sin(frameCount * 0.1));

  ctx.fillStyle = '#111';
  ctx.fillRect(30, METER_Y, BAR_W, METER_H);
  ctx.fillRect(p2x, METER_Y, BAR_W, METER_H);

  const p1MeterGrad = ctx.createLinearGradient(30, 0, 30 + BAR_W, 0);
  const meterAlpha = p1.meter >= p1.maxMeter ? 0.7 + meterPulse * 0.3 : 1;
  p1MeterGrad.addColorStop(0, `rgba(80,0,140,${meterAlpha})`);
  p1MeterGrad.addColorStop(1, `rgba(140,0,180,${meterAlpha})`);
  ctx.fillStyle = p1MeterGrad;
  ctx.fillRect(30, METER_Y, BAR_W * p1MeterRatio, METER_H);

  const p2MeterGrad = ctx.createLinearGradient(p2x, 0, p2x + BAR_W, 0);
  const m2Alpha = p2.meter >= p2.maxMeter ? 0.7 + meterPulse * 0.3 : 1;
  p2MeterGrad.addColorStop(0, `rgba(140,0,180,${m2Alpha})`);
  p2MeterGrad.addColorStop(1, `rgba(80,0,140,${m2Alpha})`);
  ctx.fillStyle = p2MeterGrad;
  const p2MeterW = BAR_W * p2MeterRatio;
  ctx.fillRect(p2x + BAR_W - p2MeterW, METER_Y, p2MeterW, METER_H);

  ctx.strokeStyle = '#333';
  ctx.strokeRect(30, METER_Y, BAR_W, METER_H);
  ctx.strokeRect(p2x, METER_Y, BAR_W, METER_H);

  // 超必 label
  ctx.font = '9px monospace';
  if (p1.meter >= p1.maxMeter) {
    ctx.fillStyle = `rgba(220,160,255,${0.7 + meterPulse * 0.3})`;
    ctx.textAlign = 'left';
    ctx.fillText('超必', 30, METER_Y + METER_H + 10);
  }
  if (p2.meter >= p2.maxMeter) {
    ctx.fillStyle = `rgba(220,160,255,${0.7 + meterPulse * 0.3})`;
    ctx.textAlign = 'right';
    ctx.fillText('超必', W - 30, METER_Y + METER_H + 10);
  }

  // Round dots
  const dotCx = W / 2;
  for (let i = 0; i < 2; i++) {
    const filled1 = i < roundState.p1Wins;
    const filled2 = i < roundState.p2Wins;
    // P1 dots (left of center)
    ctx.beginPath();
    ctx.arc(dotCx - 30 - i * 16, BAR_Y + BAR_H / 2, 5, 0, Math.PI * 2);
    ctx.fillStyle = filled1 ? '#cc2200' : '#333';
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.stroke();
    // P2 dots (right of center)
    ctx.beginPath();
    ctx.arc(dotCx + 30 + i * 16, BAR_Y + BAR_H / 2, 5, 0, Math.PI * 2);
    ctx.fillStyle = filled2 ? '#cc2200' : '#333';
    ctx.fill();
    ctx.stroke();
  }

  // Timer
  const timeSec = Math.ceil(roundState.timer / 60);
  const timerFlash = timeSec <= 10 && frameCount % 30 < 15;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = timerFlash ? '#ff3300' : '#e8d890';
  ctx.fillText(Math.max(0, timeSec).toString().padStart(2, '0'), W / 2, BAR_Y + BAR_H - 2);
}

// ── Char select ────────────────────────────────────────────────────────────
function handleCharSelectKey(key) {
  const cs = charSelectState;
  // P1 controls
  if (!cs.confirmed[0]) {
    if (key === 'ArrowLeft') cs.cursors[0] = (cs.cursors[0] + FIGHTER_DEFS.length - 1) % FIGHTER_DEFS.length;
    if (key === 'ArrowRight') cs.cursors[0] = (cs.cursors[0] + 1) % FIGHTER_DEFS.length;
    if (key === 'x' || key === 'X' || key === 'z' || key === 'Z' || key === 'Enter') {
      cs.confirmed[0] = true;
      if (gameMode === 'vscpu') {
        // AI picks a different fighter.
        cs.cursors[1] = (cs.cursors[0] + 1 + Math.floor(Math.random() * (FIGHTER_DEFS.length - 1))) % FIGHTER_DEFS.length;
        cs.confirmed[1] = true;
        startBattle();
      }
    }
  }
  // P2 controls (vs player only)
  if (gameMode === 'vsplayer' && !cs.confirmed[1]) {
    if (key === 'a' || key === 'A') cs.cursors[1] = (cs.cursors[1] + FIGHTER_DEFS.length - 1) % FIGHTER_DEFS.length;
    if (key === 'd' || key === 'D') cs.cursors[1] = (cs.cursors[1] + 1) % FIGHTER_DEFS.length;
    if (key === 'f' || key === 'F') {
      cs.confirmed[1] = true;
      if (cs.confirmed[0]) startBattle();
    }
  }
}

      id: def.id, def, playerNum: pi+1,
      x: 0, y: 0,
      vx: 0, vy: 0,
      facing: pi === 0 ? 1 : -1,
      onGround: true,
      hp: def.hp, maxHp: def.hp,
      meter: 0, maxMeter: 100,
      isBlocking: false,

    ctx.fillStyle = '#888';
    ctx.fillText(def.nameEn, cx, sy + slotH + 40);

    // READY text

      ctx.font = 'bold 20px monospace';
      ctx.fillStyle = '#cc2200';

  // Controls hint
  ctx.font = '11px monospace';

// ── Round management ───────────────────────────────────────────────────────
function endRound(winnerId) {
  gameState = 'roundend';
  roundState.timerActive = false;
  roundState.roundEndTimer = 160;
  roundState.winnerId = winnerId;
  if (winnerId === 1) roundState.p1Wins++;
  else if (winnerId === 2) roundState.p2Wins++;
  // both null = draw
}

function initRound() {
  paused = false;
  roundState.round++;
  roundState.timer = 99 * 60;
  roundState.timerActive = false;
  roundState.winnerId = null;

  // Reinit fighters
  const def1 = FIGHTER_DEFS[charSelectState.cursors[0]];
  const def2 = FIGHTER_DEFS[charSelectState.cursors[1]];
  p1 = createFighter(def1, 1, false);
  p2 = createFighter(def2, 2, gameMode === 'vscpu');

  currentStage = (currentStage + 1) % 2;
  roundState.stageIntroTimer = 150;
  particles = [];
  gameState = 'stageintro';
}

function updateRound() {
  if (!roundState.timerActive) return;
  roundState.timer--;

  // Check KO
  if (p1.state === S.KO && p2.state === S.KO) {
    endRound(null); // draw
    return;
  }
  if (p1.state === S.KO) { endRound(2); return; }
  if (p2.state === S.KO) { endRound(1); return; }

  // Timeout
  if (roundState.timer <= 0) {
    if (p1.hp > p2.hp) endRound(1);
    else if (p2.hp > p1.hp) endRound(2);
    else endRound(null); // draw
  }
}

// ── Game flow ──────────────────────────────────────────────────────────────
function startCharSelect() {
  gameMode = menuCursor === 0 ? 'vscpu' : 'vsplayer';
  gameState = 'charselect';
  charSelectState = { cursors:[0,1], confirmed:[false,false] };
}

function startBattle() {
  paused = false;
  const def1 = FIGHTER_DEFS[charSelectState.cursors[0]];
  const def2 = FIGHTER_DEFS[charSelectState.cursors[1]];
  p1 = createFighter(def1, 1, false);
  p2 = createFighter(def2, 2, gameMode === 'vscpu');
  currentStage = Math.floor(Math.random() * 2);
  roundState = { round:1, p1Wins:0, p2Wins:0, timer:99*60, timerActive:false, roundEndTimer:0, winnerId:null, stageIntroTimer:150 };
  particles = [];
  gameState = 'stageintro';
}

function initGame() {
  gameState = 'title';
  paused = false;
  menuCursor = 0;
  gameMode = 'vscpu';
  p1 = null;
  p2 = null;
  particles = [];
  frameCount = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  currentStage = 0;
  charSelectState = { cursors:[0,1], confirmed:[false,false] };
  roundState = { round:1, p1Wins:0, p2Wins:0, timer:99*60, timerActive:false, roundEndTimer:0, winnerId:null, stageIntroTimer:150 };
}

// ── Main loop ──────────────────────────────────────────────────────────────
function update() {
  frameCount++;
  if (shakeTimer > 0) shakeTimer--;
  updateParticles();

  if (gameState === 'title' && bgmPhase !== 'title') startTitleBgm();
  else if (gameState === 'charselect' && bgmPhase !== 'charselect') startCharSelectBgm();
  else if (gameState !== 'battle' && gameState !== 'title' && gameState !== 'charselect' && bgmPhase !== null) stopBgm();

  if (gameState === 'battle' && p1 && p2) {
    startStageBgm(currentStage);
    if (paused) return;
    updateRound();
    const inp1 = getP1Input();
    const inp2 = gameMode === 'vsplayer' ? getP2Input() : getAIInput(p2, p1);
    updateFighter(p1, p2, inp1);
    updateFighter(p2, p1, inp2);
    resolveHits(p1, p2);
    resolveHits(p2, p1);
    pushApart(p1, p2);
  } else if (gameState === 'stageintro') {
    if (p1 && p2) {
      roundState.stageIntroTimer--;
      if (roundState.stageIntroTimer <= 0) {
        gameState = 'battle';
        roundState.timerActive = true;
      }
    }
  } else if (gameState === 'roundend') {
    roundState.roundEndTimer--;
    if (roundState.roundEndTimer <= 0) {
      if (roundState.p1Wins >= 2 || roundState.p2Wins >= 2) {
        gameState = 'gameover';
      } else {
        initRound();
      }
    }
  }
}

function drawVirtualControls() {
  if (!isTouchDevice) return;
  ctx.save();
  VBTNS.forEach(b => {
    const active = touchKeys[b.key];
    ctx.globalAlpha = active ? 0.75 : 0.38;
    ctx.fillStyle = active ? 'rgba(220,180,80,0.9)' : 'rgba(80,80,100,0.7)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = active ? '#e8d890' : '#666'; ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = active ? 1 : 0.6;
    ctx.fillStyle = active ? '#000' : '#ccc';
    ctx.font = `bold ${b.r < 26 ? 13 : 15}px serif`; ctx.textAlign = 'center';
    ctx.fillText(b.label, b.x, b.y + 5);
  });
  ctx.restore();
}

function render() {
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeIntensity * 2,
      (Math.random() - 0.5) * shakeIntensity * 2
    );
  }

  // Stage background
  if (gameState !== 'title' && gameState !== 'charselect') {
    if (currentStage === 0) drawStage0(frameCount);
    else drawStage1(frameCount);
  }

  // Fighters
  if (p1 && p2 && gameState !== 'title' && gameState !== 'charselect') {
    drawFighter(p1);
    drawFighter(p2);
  }

  drawParticles();

  if (gameState === 'battle') drawVirtualControls();

  // HUD
  if ((gameState === 'battle' || gameState === 'roundend') && p1 && p2) drawHUD();

  if (gameState === 'battle' && paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 42px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e8d890';
    ctx.fillText('PAUSE', W / 2, H / 2);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Enterで再開', W / 2, H / 2 + 34);
  }

  // Overlay screens
  if (gameState === 'title')      drawTitle();
  if (gameState === 'charselect') drawCharSelect();
  if (gameState === 'stageintro' && p1 && p2) drawStageIntro();
  if (gameState === 'roundend'   && p1 && p2) drawRoundEnd();
  if (gameState === 'gameover'   && p1 && p2) drawGameOver();

  // Super flash
  if (p1 && p2 && (p1.state === S.SUPER || p2.state === S.SUPER)) {
    ctx.fillStyle = 'rgba(160,0,0,0.16)';
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

function loop() {
  pollGamepad();
  update();
  render();
  requestAnimationFrame(loop);
}

// ── Start ──────────────────────────────────────────────────────────────────
initGame();
requestAnimationFrame(loop);
</script>
