<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | hide の部屋</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(15,20,40,0.75);
      --border: rgba(0,229,255,0.18);
      --cyan: #00e5ff;
      --magenta: #ff00cc;
      --purple: #b060ff;
      --green: #39ff14;
      --text: #e0f7ff;
      --muted: #7ba3b5;
      --radius: 16px;
      --shadow: 0 4px 32px rgba(0,229,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Consolas", "Courier New", "Yu Gothic UI", monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Canvas BG ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* ── Header ── */
    .db-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .db-header h1 {
      font-size: 1.1rem;
      color: var(--cyan);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .db-header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      transition: color 0.2s, border-color 0.2s;
    }
    .db-header a:hover { color: var(--cyan); border-color: var(--cyan); }
    .db-header-right { display: flex; gap: 8px; align-items: center; }
    .lang-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      letter-spacing: 0.05em;
    }
    .lang-btn:hover, .lang-btn[data-active="en"] { color: var(--cyan); border-color: var(--cyan); }

    /* ── Grid ── */
    .db-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      gap: 18px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .db-grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .db-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 260px;
    }
    .card-title {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 1rem; }

    /* ── Visit Counter ── */
    .visit-num {
      font-size: 3.2rem;
      font-weight: bold;
      color: var(--cyan);
      text-shadow: 0 0 24px rgba(0,229,255,0.5);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .visit-label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .visit-today {
      font-size: 0.85rem;
      color: var(--purple);
      margin-top: 4px;
    }

    /* ── Weather ── */
    .weather-now {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .weather-emoji { font-size: 2.8rem; line-height: 1; }
    .weather-temp { font-size: 2.2rem; color: var(--cyan); font-weight: bold; }
    .weather-desc { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .weather-forecast {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .fc-day {
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.12);
      border-radius: 8px;
      padding: 4px 8px;
      text-align: center;
      font-size: 0.72rem;
      min-width: 44px;
    }
    .fc-day .fc-label { color: var(--muted); }
    .fc-day .fc-icon { font-size: 1.1rem; margin: 2px 0; }
    .fc-day .fc-temp { color: var(--cyan); font-size: 0.8rem; }
    .weather-section-title { font-size: 0.75rem; color: var(--muted); margin: 8px 0 4px; }
    .weather-details { margin-top: 8px; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 6px; }
    .weather-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; font-size: 0.82rem; }
    .wr-label { color: var(--muted); white-space: nowrap; }
    .wr-value { color: var(--text); text-align: right; margin-left: 8px; }
    .weather-extra { display: flex; gap: 12px; margin-top: 8px; align-items: center; }
    .weather-metrics { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .wm-item { display: flex; justify-content: space-between; font-size: 0.82rem; }
    .wm-item .wm-label { color: var(--muted); }
    .weather-hourly { margin-top: 10px; }
    .weather-hourly .wh-title { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .weather-updated { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 6px; }

    /* ── Stock ── */
    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,229,255,0.07);
    }
    .stock-item:last-child { border-bottom: none; }
    .stock-name { font-size: 0.82rem; color: var(--muted); }
    .stock-val { font-size: 1rem; font-weight: bold; }
    .stock-change { font-size: 0.78rem; margin-left: 8px; }
    .up { color: var(--green); }
    .down { color: var(--magenta); }
    .stock-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ── Custom Stock Search ── */
    .stock-add-section { margin-top: 12px; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 12px; }
    .stock-search-row { display: flex; gap: 6px; position: relative; }
    .stock-search-row input {
      flex: 1;
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.78rem;
      font-family: inherit;
      outline: none;
    }
    .stock-search-row input:focus { border-color: var(--cyan); }
    .stock-suggest-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: rgba(10,12,25,0.98);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 300;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .stock-suggest-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0,229,255,0.05);
      transition: background 0.1s;
    }
    .stock-suggest-item:last-child { border-bottom: none; }
    .stock-suggest-item:hover { background: rgba(0,229,255,0.1); }
    .stock-suggest-ticker { color: var(--cyan); font-weight: bold; white-space: nowrap; min-width: 58px; }
    .stock-suggest-name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .stock-suggest-exch { color: var(--muted); font-size: 0.68rem; white-space: nowrap; }
    .stock-suggest-msg { padding: 10px 12px; color: var(--muted); font-size: 0.78rem; text-align: center; }
    .custom-stock-list { margin-top: 6px; }
    .custom-stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,229,255,0.06);
      gap: 6px;
    }
    .custom-stock-item:last-child { border-bottom: none; }
    .custom-stock-info { display: flex; flex-direction: column; min-width: 0; flex: 1; }
    .custom-stock-name { color: var(--text); font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .custom-stock-ticker { color: var(--muted); font-size: 0.68rem; }
    .btn-del-sm {
      background: rgba(255,0,204,0.1);
      color: var(--magenta);
      border: 1px solid rgba(255,0,204,0.25);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-del-sm:hover { background: rgba(255,0,204,0.22); }

    /* ── Game Score ── */
    .score-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 180px; }
    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(0,229,255,0.04);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .score-rank { color: var(--cyan); width: 24px; font-weight: bold; }
    .score-name { flex: 1; color: var(--text); }
    .score-pts { color: var(--purple); font-weight: bold; }
    .score-date { font-size: 0.68rem; color: var(--muted); }
    .no-data { color: var(--muted); font-size: 0.82rem; text-align: center; margin: auto; }

    /* ── TODO ── */
    .todo-input-row {
      display: flex;
      gap: 6px;
    }
    .todo-input-row input {
      flex: 1;
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
    }
    .todo-input-row input:focus { border-color: var(--cyan); }
    .btn-add {
      background: var(--cyan);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }
    .todo-filter {
      display: flex;
      gap: 6px;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--cyan); color: var(--cyan); }
    .todo-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 160px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(0,229,255,0.03);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .todo-item input[type="checkbox"] { accent-color: var(--cyan); width: 15px; height: 15px; cursor: pointer; }
    .todo-item .todo-text { flex: 1; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
    .todo-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .todo-del:hover { color: var(--magenta); }

    /* ── Blog/Memo ── */
    .blog-form { display: flex; flex-direction: column; gap: 6px; }
    .blog-form input, .blog-form textarea {
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    .blog-form input:focus, .blog-form textarea:focus { border-color: var(--cyan); }
    .blog-form textarea { min-height: 58px; }
    .blog-posts { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 160px; }
    .blog-post {
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.08);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .blog-post-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .blog-post-title { font-size: 0.85rem; color: var(--cyan); font-weight: bold; }
    .blog-post-body { font-size: 0.78rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .blog-post-date { font-size: 0.68rem; color: var(--muted); }
    .post-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
      transition: color 0.2s;
    }
    .post-del:hover { color: var(--magenta); }

    /* ── Loading / Error ── */
    .loading { color: var(--muted); font-size: 0.82rem; animation: pulse 1.2s ease-in-out infinite; margin: auto; text-align: center; }
    .error-msg { color: var(--magenta); font-size: 0.78rem; text-align: center; margin: auto; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 4px; }

    /* ── Population ── */
    #card-population { grid-column: span 2; }
    @media (max-width: 900px) { #card-population { grid-column: span 1; } }
    .pop-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .pop-charts { grid-template-columns: 1fr; } }
    .pop-total { font-size: 1.6rem; font-weight: bold; color: var(--cyan); }
    .pop-total-label { font-size: 0.72rem; color: var(--muted); }
    .pop-sub-title { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.06em; }
    .pop-legend { display: flex; gap: 12px; font-size: 0.68rem; margin-bottom: 3px; }
    .pop-legend-male { color: #4d9eff; }
    .pop-legend-female { color: #ff6b9d; }
    .pop-source { font-size: 0.64rem; color: var(--muted); text-align: right; margin-top: 6px; }

    /* ── Footer ── */
    .db-footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="db-header">
  <h1>// DASHBOARD</h1>
  <div class="db-header-right">
    <button class="lang-btn" id="lang-toggle-btn" aria-label="言語切替">EN</button>
    <a href="index.html" data-i18n="header-home">← ホームへ</a>
  </div>
</header>

<main class="db-grid">

  <!-- ① 訪問数 -->
  <div class="card" id="card-visit">
    <div class="card-title"><span class="icon">👁</span><span data-i18n="card-visit-title"> サイト訪問数</span></div>
    <div id="visit-body" class="loading">読み込み中…</div>
  </div>

  <!-- ② 天気・カレンダー -->
  <div class="card" id="card-weather">
    <div class="card-title" id="weather-card-title"><span class="icon">🌤</span><span id="weather-city-label"> 天気</span></div>
    <div id="weather-body" class="loading">読み込み中…</div>
  </div>

  <!-- ③ 株価指数 -->
  <div class="card" id="card-stock">
    <div class="card-title"><span class="icon">📈</span><span data-i18n="card-stock-title"> 株価指数</span></div>
    <div id="stock-body" class="loading">読み込み中…</div>
    <div class="stock-add-section">
      <div class="stock-search-row">
        <input type="text" id="stock-search-input" placeholder="会社名 or ティッカー（例：トヨタ / AAPL / 6501）" maxlength="60" autocomplete="off">
        <button class="btn-add" id="stock-add-btn" onclick="addStockFromInput()">追加</button>
        <div id="stock-suggest-list" class="stock-suggest-list" style="display:none;"></div>
      </div>
      <div id="custom-stock-list" class="custom-stock-list"></div>
    </div>
  </div>

  <!-- ④ ゲームスコア -->
  <div class="card" id="card-score">
    <div class="card-title"><span class="icon">🏆</span><span data-i18n="card-score-title"> ゲームスコア履歴</span></div>
    <div id="score-body"></div>
  </div>

  <!-- ⑤ TODO -->
  <div class="card" id="card-todo">
    <div class="card-title"><span class="icon">✅</span><span data-i18n="card-todo-title"> TODO / タスク</span></div>
    <div class="todo-input-row">
      <input type="text" id="todo-input" placeholder="タスクを追加…" maxlength="80">
      <button class="btn-add" id="todo-add-btn" onclick="addTodo()">追加</button>
    </div>
    <div class="todo-filter" id="todo-filter">
      <button class="filter-btn active" onclick="setFilter('all',this)" data-i18n="todo-filter-all">すべて</button>
      <button class="filter-btn" onclick="setFilter('active',this)" data-i18n="todo-filter-active">未完了</button>
      <button class="filter-btn" onclick="setFilter('done',this)" data-i18n="todo-filter-done">完了</button>
    </div>
    <div class="todo-list" id="todo-list"></div>
  </div>

  <!-- ⑥ ブログ/メモ -->
  <div class="card" id="card-blog">
    <div class="card-title"><span class="icon">📝</span><span data-i18n="card-blog-title"> ブログ / メモ</span></div>
    <div class="blog-form">
      <input type="text" id="blog-title" placeholder="タイトル" maxlength="60">
      <textarea id="blog-body" placeholder="本文を入力…" maxlength="500" rows="3"></textarea>
      <button class="btn-add" id="blog-post-btn" onclick="addPost()">投稿</button>
    </div>
    <div class="blog-posts" id="blog-posts"></div>
  </div>

  <!-- ⑦ 人口統計 -->
  <div class="card" id="card-population">
    <div class="card-title"><span class="icon">👥</span><span id="pop-city-label" data-i18n="card-pop-title"> 人口統計</span></div>
    <div id="pop-body" class="loading">読み込み中…</div>
  </div>

</main>

<footer class="db-footer" data-i18n="footer">hide の部屋 — Dashboard &copy; 2026</footer>

<script>
/* ────────────────────────────────────────────
   Canvas particle background
──────────────────────────────────────────── */
(function(){
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  const pts = [];
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<70;i++){
    pts.push({x:Math.random()*innerWidth, y:Math.random()*innerHeight,
              vx:(Math.random()-.5)*0.3, vy:(Math.random()-.5)*0.3,
              r:Math.random()*1.5+0.4, a:Math.random()});
  }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>cv.width) p.vx*=-1;
      if(p.y<0||p.y>cv.height) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${p.a*0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ────────────────────────────────────────────
   i18n
──────────────────────────────────────────── */
const TRANS = {
  ja: {
    'header-home': '← ホームへ',
    'card-visit-title': ' サイト訪問数',
    'card-stock-title': ' 株価指数',
    'card-score-title': ' ゲームスコア履歴',
    'card-todo-title': ' TODO / タスク',
    'card-blog-title': ' ブログ / メモ',
    'todo-filter-all': 'すべて',
    'todo-filter-active': '未完了',
    'todo-filter-done': '完了',
    'footer': 'hide の部屋 — Dashboard &copy; 2026',
    'loading': '読み込み中…',
    'fetching': '取得中…',
    'visit-total': '累計アクセス数',
    'visit-today': '本日 {n} 回',
    'visit-today-local': '本日 {n} 回 (ローカル)',
    'visit-err': '取得失敗',
    'weather-city': '{city}の天気',
    'weather-humidity': '湿度',
    'weather-wind': '風速',
    'weather-fail': '天気取得失敗',
    'today': '今日',

function fetchWithTimeout(url, opts={}, ms=7000){
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal: ctrl.signal}).finally(()=>clearTimeout(id));
}

function fmtNum(n){
  if(isNaN(n)||n==null) return '—';
  const locale = currentLang === 'ja' ? 'ja-JP' : 'en-US';
  return Number(n).toLocaleString(locale, {maximumFractionDigits:2});
}

// セキュリティ方針: enableHighAccuracy:false で市区町村レベルの精度のみ取得、
// 座標は小数点2桁（約1km精度）に丸めてキャッシュ。Google等の第三者サービスへは送信しない。
const WEATHER_LOC_KEY = 'weather-loc-v1';
const WEATHER_LOC_TTL = 30 * 60 * 1000; // 30分
// e-Stat API (無料登録: https://api.e-stat.go.jp/api/key/)
const ESTAT_APP_ID = 'dfe7d54039c81455773725b9abbddb664dea032a';

async function getWeatherLocation() {
  try {
    const c = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
    if (c && Date.now() - c.ts < WEATHER_LOC_TTL) return c;
  } catch {}
  const pos = await new Promise((resolve, reject) =>
    navigator.geolocation
      ? navigator.geolocation.getCurrentPosition(resolve, reject, {
          timeout: 12000, maximumAge: 300000, enableHighAccuracy: false
        })
      : reject(new Error('unsupported'))
  );
  const { latitude: lat, longitude: lon } = pos.coords;
  const gsi = await fetchWithTimeout(
    `https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lon}`,
    {}, 6000
  ).then(r => r.json());
  const lv01Nm = String(gsi?.results?.lv01Nm || '').trim();
  const mCity = lv01Nm.match(/^([^\s　]*?[市区町村])/);
  const city = mCity ? mCity[1] : (lv01Nm || '現在地');
  const muniCd = String(gsi?.results?.muniCd || '').trim();
  const result = { lat: Math.round(lat * 100) / 100, lon: Math.round(lon * 100) / 100, city, muniCd, ts: Date.now() };
  try { localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(result)); } catch {}
  return result;
}

function renderWeather(){

  }

  const ja = currentLang === 'ja';

  // 7-day weekly forecast
  const fcDays = daily.time.map((dateStr, i) => {
    const dt = new Date(dateStr);
    const dayIdx = dt.getDay();
    let label;
    if(i === 0) label = t('today');
    else if(i === 1) label = t('tomorrow');
    else label = ja ? DAYS[dayIdx]+'曜' : DAYS_EN[dayIdx];
    return `<div class="fc-day">
      <div class="fc-label">${label}</div>
      <div class="fc-icon">${wmoEmoji(daily.weather_code[i])}</div>
      <div class="fc-temp">${Math.round(daily.temperature_2m_max[i])}°/<span style="color:var(--muted)">${Math.round(daily.temperature_2m_min[i])}°</span></div>
    </div>`;
  }).join('');

  // Tomorrow's weather (daily[1])
  const tmrCode = daily.weather_code[1];
  const tmrMax = Math.round(daily.temperature_2m_max[1]);
  const tmrMin = Math.round(daily.temperature_2m_min[1]);

  // Pollen estimation from weather conditions
  const { pollenLevel, pollenSource } = _estimatePollen(cur);

  // Wind
  const windSpeed = Math.round(cur.wind_speed_10m || 0);
  const windDir = cur.wind_direction_10m || 0;
  const windDirs16    = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','北北西','北西','北北西'];
  const windDirs16En  = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const wdIdx = Math.round(windDir / 22.5) % 16;
  const windDirLabel = ja ? windDirs16[wdIdx] : windDirs16En[wdIdx];

  // UV and pressure
  const uvIndex = Math.round(cur.uv_index || 0);
  const uvLevel = uvIndex <= 2 ? (ja ? '低い' : 'Low') :
                  uvIndex <= 5 ? (ja ? '中程度' : 'Moderate') :
                  uvIndex <= 7 ? (ja ? '高い' : 'High') :
                  uvIndex <= 10 ? (ja ? '非常に高い' : 'Very High') : (ja ? '極端' : 'Extreme');
  const pressure = Math.round(cur.surface_pressure || 0);

  // Hourly temperature chart
  const hourlyHtml = _buildHourlyChart(data, ja);

  // Update time
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  el.innerHTML = `
    <div class="weather-now">
      <div class="weather-emoji">${wmoEmoji(cur.weather_code)}</div>
      <div>
        <div class="weather-temp">${Math.round(cur.temperature_2m)}°C</div>
        <div class="weather-desc">${wmoDesc(cur.weather_code)} / ${t('weather-humidity')} ${cur.relative_humidity_2m}% / ${ja ? '風速' : 'Wind'} ${windSpeed}m/s</div>
      </div>
    </div>
    <div class="weather-details">
      <div class="weather-row">
        <span class="wr-label">${ja ? '明日の天気' : "Tomorrow"}</span>
        <span class="wr-value">${wmoEmoji(tmrCode)} ${tmrMax}° / ${tmrMin}° （${wmoDesc(tmrCode)}）</span>
      </div>
      <div class="weather-row">
        <span class="wr-label">${ja ? '花粉予報' : 'Pollen'}</span>
        <span class="wr-value">${pollenLevel}</span>
      </div>
      <div class="weather-row">
        <span class="wr-label">${ja ? '判定ソース' : 'Source'}</span>

    <div class="weather-extra">
      ${_buildWindCompass(windDir, windDirLabel, windSpeed, ja)}
      <div class="weather-metrics">
        <div class="wm-item">
          <span class="wm-label">${ja ? '紫外線' : 'UV Index'}</span>
          <span>${uvIndex}（${uvLevel}）</span>
        </div>
        <div class="wm-item">
          <span class="wm-label">${ja ? '気圧' : 'Pressure'}</span>
          <span>${pressure} hPa</span>
        </div>
      </div>
    </div>
    ${hourlyHtml}
    <div class="weather-section-title">${ja ? '週間天気予報' : '7-Day Forecast'}</div>
    <div class="weather-forecast">${fcDays}</div>
    <div class="weather-updated">${ja ? '更新' : 'Updated'}: ${timeStr}</div>`;
}

function _estimatePollen(cur) {
  const month = new Date().getMonth() + 1;
  const ja = currentLang === 'ja';
  const isRaining = (cur.weather_code || 0) >= 51;
  const temp = cur.temperature_2m || 15;
  let lv, src;
  if (ja) {
    if (month >= 2 && month <= 4) {
      lv = isRaining ? '少ない（雨のため）' : temp > 15 ? '多い（スギ・ヒノキ）' : 'やや多い';
    } else if (month >= 5 && month <= 6) {
      lv = isRaining ? 'ほぼなし（雨のため）' : 'やや少い（感覚推定）';
    } else if (month >= 7 && month <= 9) {
      lv = isRaining ? '少ない' : 'やや少い（草本類）';
    } else {
      lv = 'ほぼなし';
    }
    src = '気象条件から推定';
  } else {
    if (month >= 2 && month <= 4) {
      lv = isRaining ? 'Low (rain)' : temp > 15 ? 'High (cedar/cypress)' : 'Moderate';
    } else if (month >= 5 && month <= 9) {
      lv = isRaining ? 'Very Low' : 'Low (est.)';
    } else {
      lv = 'Very Low';
    }
    src = 'Estimated from weather conditions';
  }
  return { pollenLevel: lv, pollenSource: src };
}

function _buildWindCompass(degrees, label, speed, ja) {
  const cx = 28, cy = 28, r = 22;
  const rad = (degrees - 90) * Math.PI / 180;
  const nx = cx + (r - 5) * Math.cos(rad);
  const ny = cy + (r - 5) * Math.sin(rad);
  const tx = cx - (r - 5) * Math.cos(rad);
  const ty = cy - (r - 5) * Math.sin(rad);
  return `<div style="display:flex;flex-direction:column;align-items:center;min-width:60px">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
      <text x="${cx}" y="8" text-anchor="middle" fill="#888" font-size="7">N</text>
      <text x="${cx}" y="52" text-anchor="middle" fill="#888" font-size="7">S</text>
      <text x="5" y="${cy+3}" text-anchor="middle" fill="#888" font-size="7">W</text>
      <text x="51" y="${cy+3}" text-anchor="middle" fill="#888" font-size="7">E</text>
      <line x1="${tx}" y1="${ty}" x2="${nx}" y2="${ny}" stroke="rgba(0,229,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="${nx},${ny} ${cx + 5*Math.cos(rad-2.4)},${cy + 5*Math.sin(rad-2.4)} ${cx + 5*Math.cos(rad+2.4)},${cy + 5*Math.sin(rad+2.4)}" fill="#00e5ff"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#00e5ff"/>
    </svg>
    <div style="font-size:0.7rem;color:var(--muted);text-align:center;line-height:1.3">${label}${ja ? 'から' : ''}<br>${speed}m/s</div>
  </div>`;
}

function _buildHourlyChart(data, ja) {
  if (!data.hourly || !data.hourly.temperature_2m) return '';
  const todayDate = data.daily.time[0];
  const entries = data.hourly.time.reduce((acc, t, i) => {
    if (t.startsWith(todayDate)) {
      acc.push({ hour: parseInt(t.split('T')[1]), temp: data.hourly.temperature_2m[i] });
    }
    return acc;
  }, []);
  if (entries.length < 3) return '';
  const w = 240, h = 60, padX = 10, padY = 10;
  const temps = entries.map(d => d.temp);
  const minT = Math.min(...temps), maxT = Math.max(...temps);
  const rangeT = maxT - minT || 1;
  const pts = entries.map((d, i) => ({
    x: padX + (i / (entries.length - 1)) * (w - padX * 2),
    y: h - padY - ((d.temp - minT) / rangeT) * (h - padY * 2),
    temp: d.temp, hour: d.hour
  }));
  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const labels = pts.filter(p => p.hour % 3 === 0)
    .map(p => `<text x="${p.x.toFixed(1)}" y="${h + 2}" text-anchor="middle" fill="#777" font-size="7">${p.hour}</text>`)
    .join('');
  const maxPt = pts.reduce((a, b) => a.temp > b.temp ? a : b);
  const minPt = pts.reduce((a, b) => a.temp < b.temp ? a : b);
  const hiLabel = `<text x="${maxPt.x.toFixed(1)}" y="${(maxPt.y - 3).toFixed(1)}" text-anchor="middle" fill="#00e5ff" font-size="8">${Math.round(maxPt.temp)}</text>`;
  const loLabel = `<text x="${minPt.x.toFixed(1)}" y="${(minPt.y - 3).toFixed(1)}" text-anchor="middle" fill="#888" font-size="8">${Math.round(minPt.temp)}</text>`;
  return `<div class="weather-hourly">
    <div class="wh-title">${ja ? '今日の時間別気温' : "Today's Hourly Temperature"}</div>
    <svg width="100%" viewBox="0 0 ${w} ${h + 10}" style="overflow:visible">
      <path d="${pathD}" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linejoin="round"/>
      ${hiLabel}${loLabel}${labels}
    </svg>
  </div>`;
}

async function fetchStock(symbol){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
  const enc = encodeURIComponent(url);

  const tryFetch = async (proxyUrl, isJson) => {
    const res = await fetchWithTimeout(proxyUrl, {}, 8000);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = isJson ? String((await res.json())?.contents || '') : await res.text();
    const data = JSON.parse(text);
    const meta = data.chart.result[0].meta;
    return { price: meta.regularMarketPrice, prev: meta.previousClose || meta.chartPreviousClose, currency: meta.currency };
  };

  return Promise.any([
    tryFetch(`https://thingproxy.freeboard.io/fetch/${url}`, false),
    tryFetch(`https://api.allorigins.win/get?url=${enc}`, true),
    tryFetch(`https://api.allorigins.win/raw?url=${enc}`, false),
  ]);
}

  stockCache.forEach((r, i) => {
    const idx = STOCK_INDICES[i];
    const label = currentLang === 'ja' ? idx.labelJa : idx.labelEn;
    if(r.status === 'fulfilled'){
      const {price, prev} = r.value;
      const chg = price - prev;
      const pct = (chg/prev)*100;
      const cls = chg>=0?'up':'down';
      const sign = chg>=0?'+':'';
      html += `<div class="stock-item">
        <span class="stock-name">${idx.flag} ${label}</span>
        <span>
          <span class="stock-val ${cls}">${fmtNum(price)}</span>
          <span class="stock-change ${cls}">${sign}${fmtNum(chg)} (${sign}${pct.toFixed(2)}%)</span>
        </span>
      </div>`;
    } else {
      html += `<div class="stock-item">
        <span class="stock-name">${idx.flag} ${label}</span>
        <span class="down" style="font-size:0.75rem">${t('stock-fail')}</span>
      </div>`;
    }
  });
  html += `<div class="stock-time">${t('stock-updated')} ${new Date().toLocaleTimeString(locale)}</div>`;
  el.innerHTML = html;
}

function searchLocal(q) {
  const lower = q.toLowerCase();
  return TSE_LOCAL
    .filter(([code, name]) => name.includes(q) || code.startsWith(q) || name.toLowerCase().includes(lower))
    .slice(0, 10)
    .map(([code, name]) => ({ symbol: code + '.T', longname: name, shortname: name, exchange: 'TYO' }));
}

async function searchYahooFinance(q) {
  // Yahoo Finance Japan autoc（日本語会社名に最適化）
  const jpUrl = `https://autoc.finance.yahoo.co.jp/autoc?query=${encodeURIComponent(q)}&region=1&lang=ja-JP`;
  const jpEnc = encodeURIComponent(jpUrl);
  // Yahoo Finance US search（英語・米株対応）
  const usUrl = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&lang=ja-JP&region=JP&quotesCount=10&newsCount=0`;
  const usEnc = encodeURIComponent(usUrl);

  const parseJP = text => {
    const data = JSON.parse(text);
    return (data.ResultSet?.Result || [])
      .filter(r => r.type === 'S')
      .map(r => ({ symbol: /^\d+$/.test(r.symbol) ? r.symbol + '.T' : r.symbol, longname: r.name, shortname: r.name, exchange: r.exch || 'TYO' }));
  };
  const parseUS = text => {
    const data = JSON.parse(text);
    return (data.finance?.result?.[0]?.quotes || []).filter(r => r.quoteType === 'EQUITY');
  };

  const tryFetch = async (proxyUrl, isJson, parser) => {
    const res = await fetchWithTimeout(proxyUrl, {}, 7000);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = isJson ? String((await res.json())?.contents || '') : await res.text();
    const results = parser(text);
    if (!results.length) throw new Error('empty');
    return results;
  };

  try {
    return await Promise.any([
      tryFetch(`https://thingproxy.freeboard.io/fetch/${jpUrl}`, false, parseJP),
      tryFetch(`https://api.allorigins.win/get?url=${jpEnc}`, true, parseJP),
      tryFetch(`https://api.allorigins.win/raw?url=${jpEnc}`, false, parseJP),
      tryFetch(`https://thingproxy.freeboard.io/fetch/${usUrl}`, false, parseUS),
      tryFetch(`https://api.allorigins.win/get?url=${usEnc}`, true, parseUS),
    ]);
  } catch {
    return [];
  }
}

function showStockAddError(msg) {
  const el = document.getElementById('custom-stock-list');
  if (!el) return;

  err.className = 'stock-suggest-msg';
  err.style.cssText = 'color:var(--magenta);padding:6px 0;';

function renderSuggestions(items) {
  const list = document.getElementById('stock-suggest-list');
  if (!list) return;
  if (!items.length) {
    list.innerHTML = `<div class="stock-suggest-msg">該当なし（ティッカー例：6762.T）</div>`;
    list.style.display = 'block';
    return;
  }
  list.innerHTML = items.map(item => {
    const name = item.longname || item.shortname || item.symbol;
    return `<div class="stock-suggest-item"
      data-symbol="${escHtml(item.symbol)}"
      data-name="${escHtml(name)}">
      <span class="stock-suggest-ticker">${escHtml(item.symbol)}</span>
      <span class="stock-suggest-name">${escHtml(name)}</span>
      <span class="stock-suggest-exch">${escHtml(item.exchange || '')}</span>
    </div>`;
  }).join('');
  list.style.display = 'block';
}

function selectSuggest(symbol, name) {
  suggestSelected = symbol;
  const input = document.getElementById('stock-search-input');
  if (input) input.value = name || symbol;
  const list = document.getElementById('stock-suggest-list');
  if (list) list.style.display = 'none';
}

async function addStockFromInput() {
  const input = document.getElementById('stock-search-input');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;

  let symbol = suggestSelected;
  let name = val;

  const btn = document.getElementById('stock-add-btn');
  if (btn) { btn.disabled = true; btn.textContent = '検索中…'; }

  try {
    if (!symbol) {
      if (/^\d{4}$/.test(val)) {
        symbol = val + '.T';
        name = val;
      } else if (/^\d{4}\.T$/i.test(val)) {
        symbol = val.toUpperCase();
        name = val.replace(/\.T$/i, '');
      } else {
        // ローカルリスト優先 → API フォールバック
        const local = searchLocal(val);
        const results = local.length ? local : await searchYahooFinance(val);
        if (results.length > 0) {
          symbol = results[0].symbol;
          name = results[0].longname || results[0].shortname || symbol;
        } else {
          showStockAddError('銘柄が見つかりませんでした（会社名またはティッカーを確認）');
          return;
        }
      }
    }
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '追加'; }
  }

  if (customTickers.some(t => t.symbol === symbol)) {
    input.value = '';
    suggestSelected = '';
    document.getElementById('stock-suggest-list').style.display = 'none';
    return;
  }

  customTickers.push({ symbol, name });
  saveCustomTickers();
  input.value = '';
  suggestSelected = '';
  document.getElementById('stock-suggest-list').style.display = 'none';
  await renderCustomStocks();
}

function removeCustomStock(symbol) {
  customTickers = customTickers.filter(t => t.symbol !== symbol);
  saveCustomTickers();
  renderCustomStocks();
}

async function renderCustomStocks() {
  const el = document.getElementById('custom-stock-list');
  if (!el) return;
  if (!customTickers.length) { el.innerHTML = ''; return; }

  el.innerHTML = `<div class="stock-suggest-msg">${t('stock-fetching')}</div>`;
  const results = await Promise.allSettled(customTickers.map(ct => fetchStock(ct.symbol)));

  el.innerHTML = results.map((r, i) => {
    const ct = customTickers[i];
    const delBtn = `<button class="btn-del-sm" onclick="removeCustomStock('${escHtml(ct.symbol)}')">削除</button>`;
    if (r.status === 'fulfilled') {
      const { price, prev } = r.value;
      const chg = price - prev;
      const pct = (chg / prev) * 100;
      const cls = chg >= 0 ? 'up' : 'down';
      const sign = chg >= 0 ? '+' : '';
      return `<div class="custom-stock-item">
        <div class="custom-stock-info">
          <span class="custom-stock-name">${escHtml(ct.name)}</span>
          <span class="custom-stock-ticker">${escHtml(ct.symbol)}</span>
        </div>
        <span class="stock-val ${cls}" style="font-size:0.88rem;">${fmtNum(price)}</span>
        <span class="stock-change ${cls}">${sign}${fmtNum(chg)} (${sign}${pct.toFixed(2)}%)</span>
        ${delBtn}
      </div>`;
    } else {
      return `<div class="custom-stock-item">
        <div class="custom-stock-info">
          <span class="custom-stock-name">${escHtml(ct.name)}</span>
          <span class="custom-stock-ticker">${escHtml(ct.symbol)}</span>
        </div>
        <span class="down" style="font-size:0.75rem;">${t('stock-fail')}</span>
        ${delBtn}
      </div>`;
    }
  }).join('');
}

function initCustomStocks() {
  renderCustomStocks();

  const input = document.getElementById('stock-search-input');
  if (!input) return;

  input.addEventListener('input', () => {
    suggestSelected = '';
    const q = input.value.trim();
    const list = document.getElementById('stock-suggest-list');
    if (!q) { if (list) list.style.display = 'none'; return; }
    clearTimeout(suggestTimer);

    // まずローカルリストで即時表示
    const local = searchLocal(q);
    if (local.length) renderSuggestions(local);
    else if (list) { list.innerHTML = `<div class="stock-suggest-msg">検索中…</div>`; list.style.display = 'block'; }

    // 並行してAPI検索（ローカルにない場合やより多い候補）
    suggestTimer = setTimeout(async () => {
      const api = await searchYahooFinance(q);
      if (api.length) renderSuggestions(api);
      else if (!local.length) renderSuggestions([]);
    }, 350);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') addStockFromInput();
    if (e.key === 'Escape') {
      const list = document.getElementById('stock-suggest-list');
      if (list) list.style.display = 'none';
    }
  });

  // サジェスト選択（data属性経由でXSS回避）
  const suggestList = document.getElementById('stock-suggest-list');
  if (suggestList) {
    suggestList.addEventListener('click', e => {
      const item = e.target.closest('[data-symbol]');
      if (!item) return;
      selectSuggest(item.dataset.symbol, item.dataset.name);
    });
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#card-stock')) {
      const list = document.getElementById('stock-suggest-list');
      if (list) list.style.display = 'none';
    }
  });
}

function initScore(){
  const el = document.getElementById('score-body');
  try {
    const raw = localStorage.getItem('fruit-bowl-v2');
    const data = raw ? JSON.parse(raw) : null;
    const scores = data?.highScores || [];
    if(scores.length===0){
      el.innerHTML = `<div class="no-data">${t('score-no-data')}<br><small>${t('score-play-hint')}</small></div>`;
      return;
    }
    const top = scores.slice().sort((a,b)=>(b.score||b)-( a.score||a)).slice(0,8);
    const locale = currentLang === 'ja' ? 'ja-JP' : 'en-US';
    el.innerHTML = `<div class="score-list">${top.map((s,i)=>{
      const pts = s.score ?? s;
      const name = s.name || `${t('score-play-prefix')} ${i+1}`;
      const date = s.date ? new Date(s.date).toLocaleDateString(locale) : '';
      return `<div class="score-item">
        <span class="score-rank">#${i+1}</span>
        <span class="score-name">${name}</span>
        <span class="score-pts">${fmtNum(pts)}</span>
        <span class="score-date">${date}</span>
      </div>`;
    }).join('')}</div>`;
  } catch(e){
    el.innerHTML = `<div class="no-data">${t('score-load-err')}</div>`;
  }
}

function renderTodos(){
  const list = document.getElementById('todo-list');
  const visible = todos.filter(t=>{
    if(todoFilter==='active') return !t.done;
    if(todoFilter==='done')   return t.done;
    return true;
  });
  if(visible.length===0){
    list.innerHTML = `<div class="no-data" style="padding:8px 0">${t('todo-empty')}</div>`;
    return;
  }
  list.innerHTML = visible.map(t=>`
    <div class="todo-item${t.done?' done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo(${t.id})">×</button>
    </div>`).join('');
}

function addTodo(){
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if(!text) return;
  todos.push({id: Date.now(), text, done: false});
  saveTodos(); renderTodos();
  inp.value='';
}

function toggleTodo(id){
  const t = todos.find(t=>t.id===id);
  if(t){ t.done=!t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id){
  todos = todos.filter(t=>t.id!==id);
  saveTodos(); renderTodos();
}

function setFilter(f, btn){
  todoFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

document.getElementById('todo-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') addTodo();
});

let posts = JSON.parse(localStorage.getItem('dashboard-blog-posts')||'[]');

function savePosts(){ localStorage.setItem('dashboard-blog-posts', JSON.stringify(posts)); }

function renderPosts(){
  const el = document.getElementById('blog-posts');
  if(posts.length===0){
    el.innerHTML = `<div class="no-data">${t('post-none')}</div>`;
    return;
  }
  const locale = currentLang === 'ja' ? 'ja-JP' : 'en-US';
  el.innerHTML = posts.slice().reverse().map(p=>`
    <div class="blog-post">
      <div class="blog-post-header">
        <span class="blog-post-title">${escHtml(p.title||t('post-untitled'))}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="blog-post-date">${new Date(p.date).toLocaleDateString(locale)}</span>
          <button class="post-del" onclick="deletePost(${p.id})">×</button>
        </div>
      </div>
      <div class="blog-post-body">${escHtml(p.body)}</div>
    </div>`).join('');
}

function addPost(){
  const title = document.getElementById('blog-title').value.trim();
  const body  = document.getElementById('blog-body').value.trim();
  if(!body) return;
  posts.push({id: Date.now(), title, body, date: new Date().toISOString()});
  savePosts(); renderPosts();
  document.getElementById('blog-title').value='';
  document.getElementById('blog-body').value='';
}

function deletePost(id){
  posts = posts.filter(p=>p.id!==id);
  savePosts(); renderPosts();
}

/* ────────────────────────────────────────────
   XSS Prevention
──────────────────────────────────────────── */
function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function drawPopTrend(canvas, trend) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 200;
  const H = 92;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const maxPop = Math.max(...trend.map(d => d.pop));
  const padL = 4, padR = 4, padT = 16, padB = 20;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const step = chartW / trend.length;
  const barW = Math.max(4, Math.floor(step * 0.72));

  trend.forEach((d, i) => {
    const x = padL + i * step + (step - barW) / 2;
    const h = Math.max(2, (d.pop / maxPop) * chartH);
    const y = padT + chartH - h;
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, 'rgba(0,229,255,0.9)');
    grad.addColorStop(1, 'rgba(0,229,255,0.25)');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, barW, h);
    ctx.fillStyle = 'rgba(160,170,200,0.65)';
    ctx.font = `${Math.min(9, Math.max(7, Math.floor(step * 0.55)))}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(String(d.year).slice(2), x + barW / 2, H - 4);
  });

  const last = trend[trend.length - 1];
  const lx = padL + (trend.length - 1) * step + step / 2;
  const lh = Math.max(2, (last.pop / maxPop) * chartH);
  const ly = padT + chartH - lh - 4;
  ctx.fillStyle = 'rgba(0,229,255,0.95)';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${(last.pop / 1000).toFixed(1)}千人`, lx, Math.max(10, ly));
}

function drawPopPyramid(canvas, pyramid) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 200;
  const H = 210;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const { ages, male, female } = pyramid;
  const n = ages.length;
  const maxVal = Math.max(...male, ...female);
  const labelW = 28, padOuter = 4, padT = 2, padB = 2;
  const midX = W / 2;
  const barHalfW = midX - labelW / 2 - padOuter;
  const rowH = (H - padT - padB) / n;

  ages.forEach((age, i) => {
    const y = padT + i * rowH;
    const barH = Math.max(1, rowH - 1.5);
    const by = y + (rowH - barH) / 2;

    const mw = (male[i] / maxVal) * barHalfW;
    ctx.fillStyle = 'rgba(77,158,255,0.72)';
    ctx.fillRect(midX - labelW / 2 - mw, by, mw, barH);

    const fw = (female[i] / maxVal) * barHalfW;
    ctx.fillStyle = 'rgba(255,107,157,0.72)';
    ctx.fillRect(midX + labelW / 2, by, fw, barH);

    ctx.fillStyle = 'rgba(160,170,200,0.85)';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(age, midX, by + barH / 2 + 3);
  });

  ctx.strokeStyle = 'rgba(0,229,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(midX - labelW / 2, padT);
  ctx.lineTo(midX - labelW / 2, H - padB);
  ctx.moveTo(midX + labelW / 2, padT);
  ctx.lineTo(midX + labelW / 2, H - padB);
  ctx.stroke();
}

/* e-Stat API から市区町村の人口データを取得し POP_DATA に追加する */
async function fetchEstatPopData(muniCd, cityName) {
  if (!ESTAT_APP_ID || !muniCd) return null;
  const cd = String(muniCd).padStart(5, '0');
  const base = 'https://api.e-stat.go.jp/rest/3.0/app/json';
  try {
    // 令和2年国勢調査 statsDataId を動的に検索
    const listRes = await fetchWithTimeout(
      `${base}/getStatsList?appId=${ESTAT_APP_ID}&searchKind=1&statsCode=00200521&surveyYears=2020&limit=30`,
      {}, 8000
    );
    if (!listRes.ok) throw new Error('getStatsList ' + listRes.status);
    const listJson = await listRes.json();
    const infos = listJson?.GET_STATS_LIST?.DATALIST_INF?.TABLE_INF;
    const arr = Array.isArray(infos) ? infos : infos ? [infos] : [];
    // 市区町村レベルの人口等基本集計を優先
    const tbl = arr.find(t =>
      String(t.STATISTICS_NAME || '').includes('人口等基本集計') &&
      String(t.COLLECT_AREA || '').includes('市区町村')
    ) || arr.find(t => String(t.STATISTICS_NAME || '').includes('人口等基本集計')) || arr[0];
    if (!tbl) throw new Error('no stats table found');
    const statsDataId = tbl['@id'];

    // 市区町村のデータ取得（総人口・性別・年齢別）
    const dataRes = await fetchWithTimeout(
      `${base}/getStatsData?appId=${ESTAT_APP_ID}&statsDataId=${statsDataId}&cdArea=${cd}&limit=500`,
      {}, 12000
    );
    if (!dataRes.ok) throw new Error('getStatsData ' + dataRes.status);
    const dataJson = await dataRes.json();

    const sd = dataJson?.GET_STATS_DATA?.STATISTICAL_DATA;
    const values = [].concat(sd?.DATA_INF?.VALUE || []);
    if (values.length === 0) throw new Error('no values');

    // カテゴリ定義を解析して総人口コードを特定
    const classObjs = [].concat(sd?.CLASS_INF?.CLASS_OBJ || []);
    let totalCode = null;
    for (const obj of classObjs) {
      const classes = [].concat(obj?.CLASS || []);
      const total = classes.find(c => /^(総数|合計|total)$/i.test(String(c['@name'] || '')));
      if (total) { totalCode = { key: `@${obj['@id']}`, val: total['@code'] }; break; }
    }

    // 総人口（2020年） — @area で市区町村コード一致を必ず確認
    const popVal = values.find(v =>
      v['@area'] === cd &&
      (!totalCode || v[totalCode.key] === totalCode.val)
    );
    const pop2020 = popVal ? parseInt(String(popVal['$']).replace(/,/g, ''), 10) : 0;
    if (!pop2020 || isNaN(pop2020)) throw new Error('pop parse failed: area=' + cd);

    const trend = [{ year: 2020, pop: pop2020 }];

    // 性別×年齢別データでピラミッド構築を試みる
    let pyramid = null;
    try {
      const AGE_LABELS = ['0-4','5-9','10-14','15-19','20-24','25-29','30-34','35-39',
                          '40-44','45-49','50-54','55-59','60-64','65-69','70-74','75-79','80-84','85+'];
      const maleVals = [], femaleVals = [];
      // 性別コードを推定（名称から判定）
      for (const obj of classObjs) {
        const classes = [].concat(obj?.CLASS || []);
        const maleC = classes.find(c => /^男$/.test(String(c['@name'] || '')));
        const femaleC = classes.find(c => /^女$/.test(String(c['@name'] || '')));
        if (maleC && femaleC) {
          const sexKey = `@${obj['@id']}`;
          const ageObj = classObjs.find(o => o['@id'] !== obj['@id'] &&
            [].concat(o?.CLASS || []).some(c => /歳/.test(String(c['@name'] || ''))));
          if (!ageObj) break;
          const ageKey = `@${ageObj['@id']}`;
          const ageClasses = [].concat(ageObj?.CLASS || [])
            .filter(c => /\d/.test(String(c['@name'] || '')))
            .slice(0, 18);
          for (const ac of ageClasses) {
            const mv = values.find(v => v['@area'] === cd && v[sexKey] === maleC['@code'] && v[ageKey] === ac['@code']);
            const fv = values.find(v => v['@area'] === cd && v[sexKey] === femaleC['@code'] && v[ageKey] === ac['@code']);
            maleVals.push(mv ? parseInt(String(mv['$']).replace(/,/g, ''), 10) || 0 : 0);
            femaleVals.push(fv ? parseInt(String(fv['$']).replace(/,/g, ''), 10) || 0 : 0);
          }
          if (maleVals.length === 18) {
            pyramid = { ages: AGE_LABELS, male: maleVals, female: femaleVals };
          }
          break;
        }
      }
    } catch (_) {}

    POP_DATA[cityName] = { trend, pyramid };
    return POP_DATA[cityName];
  } catch (e) {
    console.warn('[e-Stat]', e.message || e);
    return null;
  }
}

function renderPopulation(el, cityLabel, city, data, fetched) {
  const last = data.trend[data.trend.length - 1];
  const note = fetched
    ? `<span style="color:var(--muted);font-size:0.65rem;"> ※e-Stat取得</span>`
    : '';
  if (cityLabel) cityLabel.textContent = ` ${city} ${t('card-pop-title').trim()}`;
  const hasPyramid = data.pyramid != null;
  el.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
      <span class="pop-total">${(last.pop / 1000).toFixed(1)}千人</span>
      <span class="pop-total-label">${city} ${t('pop-total-label')}${note}</span>
    </div>
    <div class="pop-charts">
      <div>
        <div class="pop-sub-title">${t('pop-trend-title')}</div>
        <canvas id="pop-trend-canvas" style="width:100%;display:block;"></canvas>
      </div>
      <div>
        ${hasPyramid ? `<div class="pop-legend">
          <span class="pop-legend-male">■ ${t('pop-male')}</span>
          <span class="pop-legend-female">■ ${t('pop-female')}</span>
        </div>
        <div class="pop-sub-title">${t('pop-pyramid-title')} (${city} 2020)</div>
        <canvas id="pop-pyramid-canvas" style="width:100%;display:block;"></canvas>` : ''}
      </div>
    </div>
    <div class="pop-source">${t('pop-source')}</div>`;
  requestAnimationFrame(() => {
    const tc = document.getElementById('pop-trend-canvas');
    const pc = document.getElementById('pop-pyramid-canvas');
    if (tc) drawPopTrend(tc, data.trend);
    if (pc && hasPyramid) drawPopPyramid(pc, data.pyramid);
  });
}

async function initPopulation() {
  const el = document.getElementById('pop-body');
  if (!el) return;
  el.innerHTML = `<div class="loading">${t('loading')}</div>`;

  let city = '三郷市', muniCd = '';
  try {
    const loc = await getWeatherLocation();
    city = loc.city;
    muniCd = loc.muniCd || '';
  } catch {}

  const cityLabel = document.getElementById('pop-city-label');

  if (city in POP_DATA) {
    // 既知データを即表示
    renderPopulation(el, cityLabel, city, POP_DATA[city], false);
    return;
  }

  // 未知の市区町村: e-Stat API で取得を試みる
  if (cityLabel) cityLabel.textContent = ` ${city} ${t('card-pop-title').trim()}`;
  el.innerHTML = `<div class="loading">${city} のデータを取得中…</div>`;

  const fetched = await fetchEstatPopData(muniCd, city);
  if (fetched) {
    renderPopulation(el, cityLabel, city, fetched, true);
    return;
  }

  // 取得失敗: 三郷市デモ表示
  const demoNote = `<span style="color:var(--muted);font-size:0.65rem;"> ${t('pop-demo-note')}</span>`;
  const demoData = POP_DATA['三郷市'];
  if (cityLabel) cityLabel.textContent = ` 三郷市 ${t('card-pop-title').trim()}`;
  const last = demoData.trend[demoData.trend.length - 1];
  el.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
      <span class="pop-total">${(last.pop / 1000).toFixed(1)}千人</span>
      <span class="pop-total-label">三郷市 ${t('pop-total-label')}${demoNote}</span>
    </div>
    <div class="pop-charts">
      <div>
        <div class="pop-sub-title">${t('pop-trend-title')}</div>
        <canvas id="pop-trend-canvas" style="width:100%;display:block;"></canvas>
      </div>
      <div>
        <div class="pop-legend">
          <span class="pop-legend-male">■ ${t('pop-male')}</span>
          <span class="pop-legend-female">■ ${t('pop-female')}</span>
        </div>
        <div class="pop-sub-title">${t('pop-pyramid-title')} (三郷市 2020)</div>
        <canvas id="pop-pyramid-canvas" style="width:100%;display:block;"></canvas>
      </div>
    </div>
    <div class="pop-source">${t('pop-source')}</div>`;
  requestAnimationFrame(() => {
    const tc = document.getElementById('pop-trend-canvas');
    const pc = document.getElementById('pop-pyramid-canvas');
    if (tc) drawPopTrend(tc, demoData.trend);
    if (pc) drawPopPyramid(pc, demoData.pyramid);
  });
}

(async function boot(){
  // Apply saved language (static elements + placeholders)
  if(currentLang !== 'ja') {
    const dict = TRANS[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if(dict[key] !== undefined) el.innerHTML = dict[key];
    });
    const todoInput = document.getElementById('todo-input');
    if(todoInput) todoInput.placeholder = 'Add a task…';
    const blogTitle = document.getElementById('blog-title');
    if(blogTitle) blogTitle.placeholder = 'Title';
    const blogBody = document.getElementById('blog-body');
    if(blogBody) blogBody.placeholder = 'Write something…';
    const todoAddBtn = document.getElementById('todo-add-btn');
    if(todoAddBtn) todoAddBtn.textContent = 'Add';
    const blogPostBtn = document.getElementById('blog-post-btn');
    if(blogPostBtn) blogPostBtn.textContent = 'Post';
    document.documentElement.lang = 'en';
  }
  const langBtn = document.getElementById('lang-toggle-btn');
  if(langBtn){
    langBtn.textContent = currentLang === 'ja' ? 'EN' : 'JP';
    langBtn.dataset.active = currentLang;
    langBtn.addEventListener('click', () => applyLang(currentLang === 'ja' ? 'en' : 'ja'));
  }

  // Sync widgets (localStorage, no await needed)
  initScore();
  renderTodos();
  renderPosts();
  initCustomStocks();

  // Async widgets — run in parallel, errors isolated
  await Promise.allSettled([
    initVisit(),
    initWeather(),
    initStock(),
    initPopulation(),
  ]);
})();
