<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | hide の部屋</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(15,20,40,0.75);
      --border: rgba(0,229,255,0.18);
      --cyan: #00e5ff;
      --magenta: #ff00cc;
      --purple: #b060ff;
      --green: #39ff14;
      --text: #e0f7ff;
      --muted: #7ba3b5;
      --radius: 16px;
      --shadow: 0 4px 32px rgba(0,229,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Consolas", "Courier New", "Yu Gothic UI", monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Canvas BG ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* ── Header ── */
    .db-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .db-header h1 {
      font-size: 1.1rem;
      color: var(--cyan);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .db-header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      transition: color 0.2s, border-color 0.2s;
    }
    .db-header a:hover { color: var(--cyan); border-color: var(--cyan); }

    /* ── Grid ── */
    .db-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto auto;
      gap: 18px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .db-grid { grid-template-columns: 1fr; }
    }
    @media (min-width: 901px) and (max-width: 1100px) {
      .db-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 260px;
    }
    .card-title {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 1rem; }

    /* ── Visit Counter ── */
    .visit-num {
      font-size: 3.2rem;
      font-weight: bold;
      color: var(--cyan);
      text-shadow: 0 0 24px rgba(0,229,255,0.5);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .visit-label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .visit-today {
      font-size: 0.85rem;
      color: var(--purple);
      margin-top: 4px;
    }

    /* ── Weather ── */
    .weather-now {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .weather-emoji { font-size: 2.8rem; line-height: 1; }
    .weather-temp { font-size: 2.2rem; color: var(--cyan); font-weight: bold; }
    .weather-desc { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .weather-forecast {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .fc-day {
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.12);
      border-radius: 8px;
      padding: 4px 8px;
      text-align: center;
      font-size: 0.72rem;
      min-width: 44px;
    }
    .fc-day .fc-label { color: var(--muted); }
    .fc-day .fc-icon { font-size: 1.1rem; margin: 2px 0; }
    .fc-day .fc-temp { color: var(--cyan); font-size: 0.8rem; }

    /* ── Stock ── */
    .stock-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,229,255,0.07);
    }
    .stock-item:last-child { border-bottom: none; }
    .stock-name { font-size: 0.82rem; color: var(--muted); }
    .stock-val { font-size: 1rem; font-weight: bold; }
    .stock-change { font-size: 0.78rem; margin-left: 8px; }
    .up { color: var(--green); }
    .down { color: var(--magenta); }
    .stock-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ── Game Score ── */
    .score-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 180px; }
    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(0,229,255,0.04);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .score-rank { color: var(--cyan); width: 24px; font-weight: bold; }
    .score-name { flex: 1; color: var(--text); }
    .score-pts { color: var(--purple); font-weight: bold; }
    .score-date { font-size: 0.68rem; color: var(--muted); }
    .no-data { color: var(--muted); font-size: 0.82rem; text-align: center; margin: auto; }

    /* ── TODO ── */
    .todo-input-row {
      display: flex;
      gap: 6px;
    }
    .todo-input-row input {
      flex: 1;
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
    }
    .todo-input-row input:focus { border-color: var(--cyan); }
    .btn-add {
      background: var(--cyan);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }
    .todo-filter {
      display: flex;
      gap: 6px;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.72rem;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .filter-btn.active { border-color: var(--cyan); color: var(--cyan); }
    .todo-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; max-height: 160px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: rgba(0,229,255,0.03);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .todo-item input[type="checkbox"] { accent-color: var(--cyan); width: 15px; height: 15px; cursor: pointer; }
    .todo-item .todo-text { flex: 1; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
    .todo-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .todo-del:hover { color: var(--magenta); }

    /* ── Blog/Memo ── */
    .blog-form { display: flex; flex-direction: column; gap: 6px; }
    .blog-form input, .blog-form textarea {
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    .blog-form input:focus, .blog-form textarea:focus { border-color: var(--cyan); }
    .blog-form textarea { min-height: 58px; }
    .blog-posts { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 160px; }
    .blog-post {
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.08);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .blog-post-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .blog-post-title { font-size: 0.85rem; color: var(--cyan); font-weight: bold; }
    .blog-post-body { font-size: 0.78rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .blog-post-date { font-size: 0.68rem; color: var(--muted); }
    .post-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0 4px;
      transition: color 0.2s;
    }
    .post-del:hover { color: var(--magenta); }

    /* ── Loading / Error ── */
    .loading { color: var(--muted); font-size: 0.82rem; animation: pulse 1.2s ease-in-out infinite; margin: auto; text-align: center; }
    .error-msg { color: var(--magenta); font-size: 0.78rem; text-align: center; margin: auto; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 4px; }

    /* ── Footer ── */
    .db-footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header class="db-header">
  <h1>// DASHBOARD</h1>
  <a href="index.html">← ホームへ</a>
</header>

<main class="db-grid">

  <!-- ① 訪問数 -->
  <div class="card" id="card-visit">

  <!-- ③ 株価指数 -->

    <div id="stock-body" class="loading">読み込み中…</div>
  </div>

  <div class="card" id="card-score">

      <textarea id="blog-body" placeholder="本文を入力…" maxlength="500" rows="3"></textarea>
      <button class="btn-add" onclick="addPost()">投稿</button>

  </div>

</main>

<footer class="db-footer">hide の部屋 — Dashboard &copy; 2026</footer>

<script>
/* ────────────────────────────────────────────
   Canvas particle background
──────────────────────────────────────────── */
(function(){
  const cv = document.getElementById('bg-canvas');
  const ctx = cv.getContext('2d');
  const pts = [];
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<70;i++){
    pts.push({x:Math.random()*innerWidth, y:Math.random()*innerHeight,
              vx:(Math.random()-.5)*0.3, vy:(Math.random()-.5)*0.3,
              r:Math.random()*1.5+0.4, a:Math.random()});
  }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>cv.width) p.vx*=-1;
      if(p.y<0||p.y>cv.height) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${p.a*0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ────────────────────────────────────────────
   Utility
──────────────────────────────────────────── */
function fetchWithTimeout(url, opts={}, ms=7000){
  const ctrl = new AbortController();
  const id = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, {...opts, signal: ctrl.signal}).finally(()=>clearTimeout(id));
}

function fmtNum(n){
  if(isNaN(n)||n==null) return '—';
  return Number(n).toLocaleString('ja-JP', {maximumFractionDigits:2});
}

/* ────────────────────────────────────────────
   ① 訪問数 (localStorage + countapi)
──────────────────────────────────────────── */
async function initVisit(){
  const el = document.getElementById('visit-body');
  try {
    // バックエンドAPIでカウント（サーバー側ログファイルに永続化）
    const res = await fetchWithTimeout('http://localhost:3001/api/access/hit', { method: 'POST' }, 5000);
    if(res.ok){
      const d = await res.json();
      el.innerHTML = `
        <div class="visit-num">${fmtNum(d.total)}</div>
        <div class="visit-label">累計アクセス数</div>
        <div class="visit-today">本日 ${fmtNum(d.today)} 回</div>`;
      return;
    }
  } catch(e){/* バックエンド未起動時はフォールバック */}

  // フォールバック: localStorageで集計
  try {
    let today = new Date().toISOString().slice(0,10);
    let stored = JSON.parse(localStorage.getItem('visit-data')||'{}');
    if(stored.date !== today){ stored = {date:today, todayCount:0, total: stored.total||0}; }
    stored.todayCount++;
    stored.total++;
    localStorage.setItem('visit-data', JSON.stringify(stored));
    el.innerHTML = `
      <div class="visit-num">${fmtNum(stored.total)}</div>
      <div class="visit-label">累計アクセス数</div>
      <div class="visit-today">本日 ${fmtNum(stored.todayCount)} 回 (ローカル)</div>`;
  } catch(e){
    el.innerHTML = `<div class="error-msg">取得失敗</div>`;
  }
}

/* ────────────────────────────────────────────
   ② 天気 (Open-Meteo, 現在地 or 三郷市フォールバック)
──────────────────────────────────────────── */

// セキュリティ方針: enableHighAccuracy:false で市区町村レベルの精度のみ取得、
// 座標は小数点2桁（約1km精度）に丸めてキャッシュ。Google等の第三者サービスへは送信しない。
const WEATHER_LOC_KEY = 'weather-loc-v1';
const WEATHER_LOC_TTL = 30 * 60 * 1000; // 30分

async function getWeatherLocation() {
  try {
    const c = JSON.parse(localStorage.getItem(WEATHER_LOC_KEY) || 'null');
    if (c && Date.now() - c.ts < WEATHER_LOC_TTL) return c;
  } catch {}
  const pos = await new Promise((resolve, reject) =>
    navigator.geolocation
      ? navigator.geolocation.getCurrentPosition(resolve, reject, {
          timeout: 12000, maximumAge: 300000, enableHighAccuracy: false
        })
      : reject(new Error('unsupported'))
  );
  const { latitude: lat, longitude: lon } = pos.coords;
  const gsi = await fetchWithTimeout(
    `https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lon}`,
    {}, 6000
  ).then(r => r.json());
  const lv01Nm = String(gsi?.results?.lv01Nm || '').trim();
  const mCity = lv01Nm.match(/^([^\s　]*?[市区町村])/);
  const city = mCity ? mCity[1] : (lv01Nm || '現在地');
  const result = { lat: Math.round(lat * 100) / 100, lon: Math.round(lon * 100) / 100, city, ts: Date.now() };
  try { localStorage.setItem(WEATHER_LOC_KEY, JSON.stringify(result)); } catch {}
  return result;
}

const WMO = {
  0:'☀️',1:'🌤',2:'⛅',3:'☁️',
  45:'🌫',48:'🌫',
  51:'🌦',53:'🌦',55:'🌧',
  61:'🌧',63:'🌧',65:'🌧',
  71:'🌨',73:'🌨',75:'❄️',
  80:'🌦',81:'🌦',82:'⛈',
  95:'⛈',96:'⛈',99:'⛈'
};
const WMO_JP = {
  0:'快晴',1:'ほぼ晴れ',2:'一部曇り',3:'曇り',
  45:'霧',48:'霧',
  51:'小雨',53:'雨',55:'強雨',
  61:'弱雨',63:'雨',65:'強雨',
  71:'小雪',73:'雪',75:'大雪',
  80:'にわか雨',81:'雨',82:'雷雨',
  95:'雷雨',96:'雷雨',99:'激しい雷雨'
};
function wmoEmoji(c){ return WMO[c]||'🌡'; }
function wmoJp(c){ return WMO_JP[c]||'不明'; }
const DAYS = ['日','月','火','水','木','金','土'];

async function initWeather(){
  const el = document.getElementById('weather-body');
  let lat = 35.83, lon = 139.87, city = '三郷市';
  try {
    const loc = await getWeatherLocation();
    lat = loc.lat; lon = loc.lon; city = loc.city;
  } catch {}
  const titleEl = document.getElementById('weather-card-title');
  if (titleEl) titleEl.innerHTML = `<span class="icon">🌤</span> ${city}の天気`;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      '&current=temperature_2m,weather_code,relative_humidity_2m' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min' +
      '&timezone=Asia%2FTokyo&forecast_days=7';
    const res = await fetchWithTimeout(url, {}, 8000);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    const cur = d.current;
    const daily = d.daily;

    const fcDays = daily.time.map((t,i)=>{
      const dt = new Date(t);
      const label = i===0?'今日': i===1?'明日': DAYS[dt.getDay()]+'曜';
      return `<div class="fc-day">
        <div class="fc-label">${label}</div>
        <div class="fc-icon">${wmoEmoji(daily.weather_code[i])}</div>
        <div class="fc-temp">${Math.round(daily.temperature_2m_max[i])}°/<span style="color:var(--muted)">${Math.round(daily.temperature_2m_min[i])}°</span></div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="weather-now">
        <div class="weather-emoji">${wmoEmoji(cur.weather_code)}</div>
        <div>
          <div class="weather-temp">${Math.round(cur.temperature_2m)}°C</div>
          <div class="weather-desc">${wmoJp(cur.weather_code)} / 湿度 ${cur.relative_humidity_2m}%</div>
        </div>
      </div>
      <div class="weather-forecast">${fcDays}</div>`;
  } catch(e){
    el.innerHTML = `<div class="error-msg">天気取得失敗<br><small>${e.message}</small></div>`;
  }
}

/* ────────────────────────────────────────────
   ③ 株価 (Yahoo Finance v8 via allorigins proxy)
──────────────────────────────────────────── */
async function fetchStock(symbol){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=2d`;
  const enc = encodeURIComponent(url);

  const tryFetch = async (proxyUrl, isJson) => {
    const res = await fetchWithTimeout(proxyUrl, {}, 8000);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = isJson ? String((await res.json())?.contents || '') : await res.text();
    const data = JSON.parse(text);
    const meta = data.chart.result[0].meta;
    return { price: meta.regularMarketPrice, prev: meta.previousClose || meta.chartPreviousClose, currency: meta.currency };
  };

  return Promise.any([
    tryFetch(`https://thingproxy.freeboard.io/fetch/${url}`, false),
    tryFetch(`https://api.allorigins.win/get?url=${enc}`, true),
    tryFetch(`https://api.allorigins.win/raw?url=${enc}`, false),
  ]);
}

async function initStock(){
  const el = document.getElementById('stock-body');
  const indices = [
    { symbol:'^N225',  label:'日経 225',  flag:'🇯🇵' },
    { symbol:'^DJI',   label:'NYダウ',    flag:'🇺🇸' },
    { symbol:'^GSPC',  label:'S&P 500',   flag:'🇺🇸' },
    { symbol:'^IXIC',  label:'NASDAQ',    flag:'🇺🇸' },
  ];
  el.innerHTML = '<div class="loading">取得中…</div>';

  const results = await Promise.allSettled(indices.map(idx=>fetchStock(idx.symbol)));
  let html = '';
  results.forEach((r,i)=>{
    const idx = indices[i];
    if(r.status==='fulfilled'){
      const {price, prev} = r.value;
      const chg = price - prev;
      const pct = (chg/prev)*100;
      const cls = chg>=0?'up':'down';
      const sign = chg>=0?'+':'';
      html += `<div class="stock-item">
        <span class="stock-name">${idx.flag} ${idx.label}</span>
        <span>
          <span class="stock-val ${cls}">${fmtNum(price)}</span>
          <span class="stock-change ${cls}">${sign}${fmtNum(chg)} (${sign}${pct.toFixed(2)}%)</span>
        </span>
      </div>`;
    } else {
      html += `<div class="stock-item">
        <span class="stock-name">${idx.flag} ${idx.label}</span>
        <span class="down" style="font-size:0.75rem">取得失敗</span>
      </div>`;
    }
  });
  html += `<div class="stock-time">更新: ${new Date().toLocaleTimeString('ja-JP')}</div>`;
  el.innerHTML = html;
}

/* ────────────────────────────────────────────
   ④ ゲームスコア (localStorage fruit-bowl-v2)
──────────────────────────────────────────── */
function initScore(){
  const el = document.getElementById('score-body');
  try {
    const raw = localStorage.getItem('fruit-bowl-v2');
    const data = raw ? JSON.parse(raw) : null;
    const scores = data?.highScores || [];
    if(scores.length===0){
      el.innerHTML = '<div class="no-data">スコアデータなし<br><small>うかぶ？しずむ？を遊んでね</small></div>';
      return;
    }
    const top = scores.slice().sort((a,b)=>(b.score||b)-( a.score||a)).slice(0,8);
    el.innerHTML = `<div class="score-list">${top.map((s,i)=>{
      const pts = s.score ?? s;
      const name = s.name || `プレイ ${i+1}`;
      const date = s.date ? new Date(s.date).toLocaleDateString('ja-JP') : '';
      return `<div class="score-item">
        <span class="score-rank">#${i+1}</span>
        <span class="score-name">${name}</span>
        <span class="score-pts">${fmtNum(pts)}</span>
        <span class="score-date">${date}</span>
      </div>`;
    }).join('')}</div>`;
  } catch(e){
    el.innerHTML = '<div class="no-data">読み込みエラー</div>';
  }
}

/* ────────────────────────────────────────────
   ⑤ TODO (localStorage dashboard-todos)
──────────────────────────────────────────── */
let todos = JSON.parse(localStorage.getItem('dashboard-todos')||'[]');
let todoFilter = 'all';

function saveTodos(){ localStorage.setItem('dashboard-todos', JSON.stringify(todos)); }

function renderTodos(){
  const list = document.getElementById('todo-list');
  const visible = todos.filter(t=>{
    if(todoFilter==='active') return !t.done;
    if(todoFilter==='done')   return t.done;
    return true;
  });
  if(visible.length===0){
    list.innerHTML = '<div class="no-data" style="padding:8px 0">タスクなし</div>';
    return;
  }
  list.innerHTML = visible.map(t=>`
    <div class="todo-item${t.done?' done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo(${t.id})">×</button>
    </div>`).join('');
}

function addTodo(){
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if(!text) return;
  todos.push({id: Date.now(), text, done: false});
  saveTodos(); renderTodos();
  inp.value='';
}

function toggleTodo(id){
  const t = todos.find(t=>t.id===id);
  if(t){ t.done=!t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id){
  todos = todos.filter(t=>t.id!==id);
  saveTodos(); renderTodos();
}

function setFilter(f, btn){
  todoFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

document.getElementById('todo-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') addTodo();
});

/* ────────────────────────────────────────────
   ⑥ ブログ/メモ (localStorage dashboard-blog-posts)
──────────────────────────────────────────── */
let posts = JSON.parse(localStorage.getItem('dashboard-blog-posts')||'[]');

function savePosts(){ localStorage.setItem('dashboard-blog-posts', JSON.stringify(posts)); }

function renderPosts(){
  const el = document.getElementById('blog-posts');
  if(posts.length===0){
    el.innerHTML = '<div class="no-data">投稿なし</div>';
    return;
  }
  el.innerHTML = posts.slice().reverse().map(p=>`
    <div class="blog-post">
      <div class="blog-post-header">
        <span class="blog-post-title">${escHtml(p.title||'無題')}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="blog-post-date">${new Date(p.date).toLocaleDateString('ja-JP')}</span>
          <button class="post-del" onclick="deletePost(${p.id})">×</button>
        </div>
      </div>
      <div class="blog-post-body">${escHtml(p.body)}</div>
    </div>`).join('');
}

function addPost(){
  const title = document.getElementById('blog-title').value.trim();
  const body  = document.getElementById('blog-body').value.trim();
  if(!body) return;
  posts.push({id: Date.now(), title, body, date: new Date().toISOString()});
  savePosts(); renderPosts();
  document.getElementById('blog-title').value='';
  document.getElementById('blog-body').value='';
}

function deletePost(id){
  posts = posts.filter(p=>p.id!==id);
  savePosts(); renderPosts();
}

/* ────────────────────────────────────────────
   XSS Prevention
──────────────────────────────────────────── */
function escHtml(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ────────────────────────────────────────────
   Boot: parallel init
──────────────────────────────────────────── */
(async function boot(){
  // Sync widgets (localStorage, no await needed)
  initScore();
  renderTodos();
  renderPosts();

  // Async widgets — run in parallel, errors isolated
  await Promise.allSettled([
    initVisit(),
    initWeather(),
    initStock(),
  ]);
})();
</script>
