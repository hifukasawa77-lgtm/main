<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Dashboard | hide Portfolio</title>
<meta name="description" content="hide のポートフォリオ活動ダッシュボード。アクセス統計・GitHub Activity・最新記事。">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --primary: #00f0ff;
    --secondary: #ff00aa;
    --accent: #7700ff;
    --bg: #050510;
    --card-bg: rgba(255,255,255,0.04);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: #e0e0ff; font-family: 'Segoe UI', system-ui, sans-serif; }

  /* NAV */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px;
    background: rgba(5,5,16,0.7); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,240,255,0.08);
  }
  .nav-logo {
    font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    color: #778; text-decoration: none; font-size: 0.85rem;
    letter-spacing: 1px; text-transform: uppercase;
    transition: color .3s;
  }
  .nav-links a:hover { color: var(--primary); }

  /* LAYOUT */
  .page { padding: 100px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .page-header { text-align: center; margin-bottom: 56px; }
  .page-eyebrow { font-size: 0.78rem; letter-spacing: 4px; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; }
  .page-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; }

  /* GRID */
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .dash-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 28px 24px;
    backdrop-filter: blur(10px);
    transition: transform .3s, border-color .3s;
  }
  .dash-card:hover { transform: translateY(-4px); border-color: rgba(0,240,255,0.2); }
  .dash-card-label { font-size: 0.75rem; letter-spacing: 2px; color: #556; text-transform: uppercase; margin-bottom: 10px; }
  .dash-card-num {
    font-size: 2.8rem; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .dash-card-sub { font-size: 0.78rem; color: #445; margin-top: 6px; }

  /* SECTION */
  .section { margin-bottom: 48px; }
  .section-title {
    font-size: 1rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--primary); margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(0,240,255,0.1); }

  /* CHART */
  .chart-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px; padding: 28px;
    backdrop-filter: blur(10px);
  }
  .chart-wrap { height: 220px; position: relative; }

  /* GITHUB */
  .activity-list { list-style: none; }
  .activity-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .activity-item:last-child { border-bottom: none; }
  .a-icon {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    background: rgba(0,240,255,0.08); border: 1px solid rgba(0,240,255,0.12);
    display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
  }
  .a-body { flex: 1; min-width: 0; }
  .a-repo { font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 3px; }
  .a-msg { font-size: 0.8rem; color: #88aacc; }
  .a-time { font-size: 0.7rem; color: #445; margin-top: 3px; }

  /* POSTS */
  .posts-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .post-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 20px;
    transition: transform .3s, border-color .3s;
    text-decoration: none; color: inherit;
  }
  .post-card:hover { transform: translateY(-4px); border-color: rgba(0,240,255,0.2); }
  .post-emoji { font-size: 1.8rem; margin-bottom: 12px; }
  .post-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .post-date { font-size: 0.75rem; color: #556; }

  /* FOOTER */
  footer { text-align: center; padding: 40px 24px; color: #334; font-size: 0.82rem; border-top: 1px solid rgba(255,255,255,0.04); }
  footer a { color: var(--primary); text-decoration: none; }

  @media (max-width: 600px) {
    nav { padding: 14px 20px; }
    .nav-links { display: none; }
    .page { padding: 80px 16px 40px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">hide</a>
  <ul class="nav-links">
    <li><a href="index.html">ポートフォリオ</a></li>
    <li><a href="index.html#blog">Blog</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <p class="page-eyebrow">Activity Dashboard</p>
    <h1 class="page-title">活動ダッシュボード</h1>
  </div>

  <!-- STATS GRID -->
  <div class="dash-grid" id="stats-grid">
    <div class="dash-card">
      <div class="dash-card-label">総アクセス数</div>
      <div class="dash-card-num" id="d-total">—</div>
      <div class="dash-card-sub">全期間</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label">本日</div>
      <div class="dash-card-num" id="d-today">—</div>
      <div class="dash-card-sub">今日のアクセス</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label">今週</div>
      <div class="dash-card-num" id="d-week">—</div>
      <div class="dash-card-sub">過去7日間</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-label">公開記事数</div>
      <div class="dash-card-num" id="d-posts">—</div>
      <div class="dash-card-sub">ブログ記事</div>
    </div>
  </div>

  <!-- VISITOR CHART -->
  <div class="section">
    <h2 class="section-title">訪問者推移（過去14日）</h2>
    <div class="chart-card">
      <div class="chart-wrap">
        <canvas id="visitor-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- GITHUB ACTIVITY -->
  <div class="section">
    <h2 class="section-title">GitHub Activity</h2>
    <div class="dash-card">
      <ul class="activity-list" id="gh-list">
        <li style="color:#445;padding:20px;text-align:center;">読み込み中...</li>
      </ul>
    </div>
  </div>

  <!-- RECENT POSTS -->
  <div class="section">
    <h2 class="section-title">最新記事</h2>
    <div class="posts-list" id="posts-list">
      <div style="color:#445;padding:20px;grid-column:1/-1;">読み込み中...</div>
    </div>
  </div>
</div>

<footer>
  <p><a href="index.html">← ポートフォリオに戻る</a> &nbsp;|&nbsp; &copy; 2025 hide</p>
</footer>

<script src="js/visitor-stats.js"></script>
<script>
// ─── GITHUB ACTIVITY ──────────────────────────────────────────────────────────
(async function() {
  const list = document.getElementById('gh-list');
  const GITHUB_USER = 'hifukasawa77-lgtm';
  const TYPE_MAP = {
    PushEvent: { icon: '⬆️' }, CreateEvent: { icon: '🌿' },
    WatchEvent: { icon: '⭐' }, ForkEvent: { icon: '🍴' },
    IssuesEvent: { icon: '🐛' }, PullRequestEvent: { icon: '🔀' },
  };
  function timeAgo(d) {
    const s = (Date.now() - new Date(d)) / 1000;
    if (s < 60) return `${~~s}秒前`;
    if (s < 3600) return `${~~(s/60)}分前`;
    if (s < 86400) return `${~~(s/3600)}時間前`;
    return `${~~(s/86400)}日前`;
  }
  try {
    const res = await fetch(`https://api.github.com/users/${GITHUB_USER}/events/public?per_page=10`);
    const events = await res.json();
    const shown = events.filter(e => e.type in TYPE_MAP).slice(0, 8);
    if (!shown.length) throw new Error('no events');
    list.innerHTML = shown.map(ev => {
      const icon = (TYPE_MAP[ev.type] || {}).icon || '💻';
      let msg = '';
      if (ev.type === 'PushEvent' && ev.payload.commits?.length)
        msg = ev.payload.commits.slice(-1)[0].message.split('\n')[0];
      else msg = ev.type.replace('Event','') + ' on ' + ev.repo.name;
      return `<li class="activity-item">
        <div class="a-icon">${icon}</div>
        <div class="a-body">
          <div class="a-repo">${ev.repo.name}</div>
          <div class="a-msg">${msg}</div>
          <div class="a-time">${timeAgo(ev.created_at)}</div>
        </div>
      </li>`;
    }).join('');
  } catch {
    list.innerHTML = `<li style="color:#445;padding:20px;text-align:center;">GitHub活動を読み込めませんでした</li>`;
  }
})();

// ─── RECENT POSTS ─────────────────────────────────────────────────────────────
(async function() {
  const container = document.getElementById('posts-list');
  try {
    const { data } = await supabase
      .from('posts').select('id,title,emoji,created_at')
      .eq('published', true).order('created_at', { ascending: false }).limit(6);
    if (!data || !data.length) throw new Error('no posts');
    container.innerHTML = data.map(p => `
      <div class="post-card">
        <div class="post-emoji">${p.emoji || '📝'}</div>
        <div class="post-title">${p.title}</div>
        <div class="post-date">${new Date(p.created_at).toLocaleDateString('ja-JP')}</div>
      </div>`).join('');
  } catch {
    container.innerHTML = '<div style="color:#445;padding:20px;">記事を読み込めませんでした</div>';
  }
})();
</script>
</body>
</html>
