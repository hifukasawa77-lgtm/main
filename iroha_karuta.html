<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いろはかるた — hide portfolio</title>
  <meta name="description" content="江戸いろは48枚。読み札を聞いて正しい絵札をクリックする伝統的なかるた取りゲーム。">
  <style>
    :root {
      --bg: #070711;
      --panel: rgba(14, 18, 38, 0.78);
      --panel-strong: rgba(18, 24, 48, 0.92);
      --line: rgba(119, 224, 255, 0.2);
      --text: #f5f7fb;
      --muted: #aeb7cc;
      --cyan: #22d3ee;
      --magenta: #f472b6;
      --purple: #a78bfa;
      --gold: #f8d36f;
      --danger: #fb7185;
      --good: #34d399;
      --radius: 8px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.52);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(34, 211, 238, 0.15), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(167, 139, 250, 0.13), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(248, 211, 111, 0.08), transparent 34%),
        linear-gradient(160deg, #050510 0%, #0e0a1c 46%, #07101e 100%);
      overflow-x: hidden;
    }

    /* パーティクル背景 */
    #bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ヘッダー */
    header {
      position: relative;
      z-index: 10;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 16px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      color: var(--gold);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.08em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(248, 211, 111, 0.36);
      background: linear-gradient(135deg, rgba(248, 211, 111, 0.18), rgba(167, 139, 250, 0.15));
      font-size: 1.1rem;
    }

    .back-link {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(15, 23, 42, 0.55);
      border-radius: 999px;
      padding: 8px 16px;
      text-decoration: none;
      font-size: 0.86rem;
      transition: border-color 0.16s ease, background 0.16s ease;
    }
    .back-link:hover {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
    }

    /* 画面制御 */
    .screen { display: none; position: relative; z-index: 5; }
    .screen.active { display: block; }

    /* ===================== スタート画面 ===================== */
    #screen-start {
      max-width: 520px;
      margin: 48px auto 32px;
      padding: 0 16px;
      text-align: center;
    }

    .start-title {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Times New Roman", serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      color: var(--gold);
      letter-spacing: 0.18em;
      line-height: 1.2;
      text-shadow: 0 0 32px rgba(248, 211, 111, 0.25);
      margin-bottom: 8px;
    }
    .start-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 40px;
      letter-spacing: 0.06em;
    }

    .glass-panel {
      background: var(--panel);
      border: 1px solid rgba(248, 211, 111, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 32px 28px;
    }

    .difficulty-label {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .difficulty-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .diff-btn {
      flex: 1;
      max-width: 140px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
      transition: all 0.18s ease;
    }
    .diff-btn:hover {
      border-color: rgba(248, 211, 111, 0.4);
      color: var(--gold);
      background: rgba(248, 211, 111, 0.07);
    }
    .diff-btn.selected {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(248, 211, 111, 0.12);
      box-shadow: 0 0 16px rgba(248, 211, 111, 0.15);
    }
    .diff-btn .diff-name { font-weight: 700; display: block; margin-bottom: 2px; }
    .diff-btn .diff-desc { font-size: 0.75rem; opacity: 0.75; }

    .start-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(248, 211, 111, 0.88), rgba(220, 160, 40, 0.9));
      color: #1a1000;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(248, 211, 111, 0.3);
    }

    /* ===================== ゲーム画面 ===================== */
    #screen-game {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto 32px;
    }

    /* ステータスバー */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      margin-bottom: 16px;
    }
    .status-bar .back-link { font-size: 0.82rem; padding: 6px 12px; }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.88rem;
    }
    .stat-label { color: var(--muted); font-size: 0.78rem; }
    .stat-val {
      font-weight: 700;
      font-size: 1.05rem;
      min-width: 1.8em;
      text-align: center;
    }
    .stat-val.correct { color: var(--good); }
    .stat-val.wrong   { color: var(--danger); }
    .stat-val.remain  { color: var(--cyan); }
    .stat-val.timer   { color: var(--gold); }
    .stat-sep { color: var(--line); }
    .status-bar .spacer { flex: 1; }

    /* 読み札エリア */
    .yomi-area {
      background: var(--panel-strong);
      border: 1px solid rgba(248, 211, 111, 0.2);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .yomi-kana {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(2.8rem, 8vw, 4rem);
      color: var(--gold);
      line-height: 1;
      flex-shrink: 0;
    }
    .yomi-text-wrap { flex: 1; min-width: 180px; }
    .yomi-phrase {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      font-size: clamp(0.95rem, 2.5vw, 1.25rem);
      color: var(--text);
      line-height: 1.55;
      letter-spacing: 0.05em;
    }
    .yomi-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.1em;
    }
    .speak-btn {
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--cyan);
      transition: background 0.16s ease, transform 0.16s ease;
      flex-shrink: 0;
    }
    .speak-btn:hover {
      background: rgba(34, 211, 238, 0.2);
      transform: scale(1.08);
    }

    /* フィードバック */
    .feedback-msg {
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      min-height: 1.6em;
      margin-bottom: 10px;
      transition: color 0.2s ease;
    }
    .feedback-msg.ok   { color: var(--good); }
    .feedback-msg.ng   { color: var(--danger); }

    /* 絵札グリッド */
    .efuda-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
    }

    .efuda-wrap {
      cursor: pointer;
      border-radius: 6px;
      transition: transform 0.18s ease, opacity 0.3s ease;
      position: relative;
    }
    .efuda-wrap:hover:not(.answered):not(.wrong-flash) {
      transform: translateY(-4px) scale(1.06);
      z-index: 2;
    }
    .efuda-wrap canvas {
      display: block;
      border-radius: 6px;
      border: 1.5px solid rgba(248, 211, 111, 0.2);
    }
    .efuda-wrap.answered {
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }
    .efuda-wrap.wrong-flash canvas {
      border-color: var(--danger);
      box-shadow: 0 0 12px rgba(251, 113, 133, 0.6);
    }
    .efuda-wrap.correct-flash canvas {
      border-color: var(--good);
      box-shadow: 0 0 14px rgba(52, 211, 153, 0.7);
    }

    /* ===================== リザルト画面 ===================== */
    #screen-result {
      max-width: 480px;
      margin: 48px auto 32px;
      padding: 0 16px;
      text-align: center;
    }

    .result-title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .result-subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 28px;
    }
    .result-panel {
      background: var(--panel);
      border: 1px solid rgba(248, 211, 111, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .result-score-big {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 4px;
    }
    .result-score-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .result-stat-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .result-stat-val { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .result-stat-val.good  { color: var(--good); }
    .result-stat-val.bad   { color: var(--danger); }
    .result-stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
    .result-best {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--gold);
      font-size: 0.9rem;
    }
    .result-best-val { font-weight: 700; }

    .retry-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(248, 211, 111, 0.88), rgba(220, 160, 40, 0.9));
      color: #1a1000;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      margin-bottom: 12px;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(248, 211, 111, 0.3);
    }
    .home-link {
      display: block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.16s ease;
    }
    .home-link:hover { color: var(--text); }

    /* タイマーバー（むずかしい専用） */
    .timer-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.25s linear, background 0.25s ease;
    }
    .timer-bar.danger { background: var(--danger); }

    @media (max-width: 520px) {
      .yomi-area { gap: 12px; padding: 14px 16px; }
      .status-bar { gap: 8px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <header>
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">い</span>
      <span>いろはかるた</span>
    </a>
    <a class="back-link" href="index.html">← ポートフォリオへ / Portfolio</a>
  </header>

  <!-- スタート画面 -->
  <div id="screen-start" class="screen active" role="main">
    <h1 class="start-title">いろはかるた</h1>
    <p class="start-subtitle">Iroha Karuta — 江戸いろは48枚</p>
    <div class="glass-panel">
      <p class="difficulty-label">難易度を選ぶ / Select Difficulty</p>
      <div class="difficulty-group" role="group" aria-label="難易度選択">
        <button class="diff-btn selected" data-diff="easy" type="button">
          <span class="diff-name">かんたん</span>
          <span class="diff-desc">Easy — ゆっくり</span>
        </button>
        <button class="diff-btn" data-diff="normal" type="button">
          <span class="diff-name">ふつう</span>
          <span class="diff-desc">Normal</span>
        </button>
        <button class="diff-btn" data-diff="hard" type="button">
          <span class="diff-name">むずかしい</span>
          <span class="diff-desc">Hard — 制限時間60秒</span>
        </button>
      </div>
      <button class="start-btn" id="btn-start" type="button">はじめる / Start</button>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="screen-game" class="screen" role="main" aria-label="ゲーム画面">
    <div class="status-bar">
      <a class="back-link" id="btn-back-to-start" href="#" role="button">← 戻る</a>
      <span class="stat-sep">|</span>
      <span class="stat-item">
        <span class="stat-label">正解</span>
        <span class="stat-val correct" id="stat-correct">0</span>
      </span>
      <span class="stat-item">
        <span class="stat-label">誤答</span>
        <span class="stat-val wrong" id="stat-wrong">0</span>
      </span>
      <span class="stat-item">
        <span class="stat-label">残り</span>
        <span class="stat-val remain" id="stat-remain">48</span>
      </span>
      <span class="spacer"></span>
      <span class="stat-item" id="timer-container" style="display:none;">
        <span class="stat-label">時間</span>
        <span class="stat-val timer" id="stat-timer">60</span>
        <span class="stat-label">秒</span>
      </span>
    </div>

    <div class="timer-bar-wrap" id="timer-bar-wrap" style="display:none;" aria-hidden="true">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="yomi-area" role="region" aria-label="読み札">
      <div class="yomi-kana" id="yomi-kana" aria-label="読み頭文字">い</div>
      <div class="yomi-text-wrap">
        <div class="yomi-label">読み札 / Reading Card</div>
        <div class="yomi-phrase" id="yomi-phrase">犬も歩けば棒に当たる</div>
      </div>
      <button class="speak-btn" id="btn-speak" type="button" aria-label="読み上げ">🔊</button>
    </div>

    <div class="feedback-msg" id="feedback-msg" aria-live="polite" aria-atomic="true"></div>

    <div class="efuda-grid" id="efuda-grid" role="list" aria-label="絵札一覧"></div>
  </div>

  <!-- リザルト画面 -->
  <div id="screen-result" class="screen" role="main" aria-label="リザルト">
    <div class="result-title">ゲーム終了 / Result</div>
    <div class="result-subtitle">おつかれさまでした！</div>
    <div class="result-panel">
      <div class="result-score-big" id="result-score">0</div>
      <div class="result-score-label">正解 / Correct Answers</div>
      <div class="result-stats">
        <div class="result-stat-item">
          <div class="result-stat-val good" id="result-correct">0</div>
          <div class="result-stat-lbl">正解 / Correct</div>
        </div>
        <div class="result-stat-item">
          <div class="result-stat-val bad" id="result-wrong">0</div>
          <div class="result-stat-lbl">誤答 / Wrong</div>
        </div>
        <div class="result-stat-item">
          <div class="result-stat-val" id="result-rate">0%</div>
          <div class="result-stat-lbl">正答率 / Accuracy</div>
        </div>
        <div class="result-stat-item">
          <div class="result-stat-val" id="result-time">--</div>
          <div class="result-stat-lbl">経過時間 / Time</div>
        </div>
      </div>
      <div class="result-best">
        <span>ベストスコア / Best:</span>
        <span class="result-best-val" id="result-best">--</span>
      </div>
    </div>
    <button class="retry-btn" id="btn-retry" type="button">もう一度 / Play Again</button>
    <a class="home-link" href="index.html">← ポートフォリオへ戻る</a>
  </div>

    const DIFFICULTY_CONFIG = {
      easy:   { autoNext: 2500, timeLimit: 0,  speechRate: 0.8 },
      normal: { autoNext: 1500, timeLimit: 0,  speechRate: 1.0 },
      hard:   { autoNext: 800,  timeLimit: 60, speechRate: 1.2 },
    };

    const CARD_W = 68;
    const CARD_H = 102;

    // =====================================================================
    // パーティクル背景
    // =====================================================================
    (function initParticles() {
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas.getContext("2d");
      let W, H;
      const particles = [];
      const PARTICLE_COUNT = 30;
      const COLORS = ["rgba(34,211,238,", "rgba(167,139,250,", "rgba(248,211,111,"];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x: Math.random() * (W || 800),
          y: Math.random() * (H || 600),
          r: 1.5 + Math.random() * 2.5,
          vx: (Math.random() - 0.5) * 0.3,
          vy: -0.1 - Math.random() * 0.25,
          alpha: 0.08 + Math.random() * 0.17,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
        };
      }

      resize();
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = createParticle();
        p.y = Math.random() * (H || 600); // 初期配置はランダム
        particles.push(p);
      }

      function animate() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color + p.alpha + ")";
          ctx.fill();
          p.x += p.vx;
          p.y += p.vy;
          if (p.y < -10 || p.x < -10 || p.x > W + 10) {
            Object.assign(p, createParticle());
            p.y = H + 5;
            p.x = Math.random() * W;
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
      window.addEventListener("resize", resize);
    })();

    // =====================================================================
    // Web Speech API
    // =====================================================================
    const SpeechEngine = {
      speak(text, rate) {
        if (!window.speechSynthesis) return;
        speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = "ja-JP";
        utt.rate = rate;
        speechSynthesis.speak(utt);
      },
      cancel() {
        if (window.speechSynthesis) speechSynthesis.cancel();
      },
    };

    // =====================================================================
    // ゲーム状態
    // =====================================================================
    let state = {
      difficulty: "easy",
      deck: [],           // 残りカードid配列
      currentCard: null,  // 現在の読み札データ
      correctCount: 0,
      wrongCount: 0,
      startTime: 0,
      timerInterval: null,
      autoNextTimeout: null,
      waitingNext: false, // 正誤確認後の待機フラグ
    };

    // =====================================================================
    // ユーティリティ
    // =====================================================================
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(function(el) {
        el.classList.remove("active");
      });
      const target = document.getElementById(id);
      if (target) target.classList.add("active");
    }

    // =====================================================================
    // 絵札Canvas描画
    // =====================================================================
    function drawEfuda(canvas, data) {
      const ctx = canvas.getContext("2d");
      const w = CARD_W;
      const h = CARD_H;
      const hue = data.color_hue;

      // 和紙風背景
      const bgGrad = ctx.createLinearGradient(0, 0, w, h);
      bgGrad.addColorStop(0, "hsl(" + hue + ", 28%, 14%)");
      bgGrad.addColorStop(1, "hsl(" + ((hue + 30) % 360) + ", 22%, 10%)");
      ctx.fillStyle = bgGrad;
      ctx.beginPath();
      ctx.roundRect(0, 0, w, h, 5);
      ctx.fill();

      // 上部60% 絵の領域
      const drawAreaH = Math.floor(h * 0.60);
      const cx = w / 2;
      const cy = drawAreaH / 2;

      ctx.save();
      ctx.beginPath();
      ctx.roundRect(0, 0, w, drawAreaH, [5, 5, 0, 0]);
      ctx.clip();

      // efuda_typeごとの抽象図形描画
      const figColor = "hsl(" + hue + ", 65%, 70%)";
      const figColor2 = "hsl(" + ((hue + 50) % 360) + ", 55%, 60%)";
      ctx.fillStyle = figColor;
      ctx.strokeStyle = figColor;
      ctx.lineWidth = 1.5;

      switch (data.efuda_type) {
        case "animal": {
          // 胴体（楕円）
          ctx.beginPath();
          ctx.ellipse(cx, cy + 6, 16, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          // 頭（円）
          ctx.beginPath();
          ctx.arc(cx + 10, cy - 6, 8, 0, Math.PI * 2);
          ctx.fill();
          // 足（線）
          ctx.strokeStyle = figColor;
          ctx.lineWidth = 2;
          const legX = [cx - 10, cx - 4, cx + 4, cx + 10];
          for (const lx of legX) {
            ctx.beginPath();
            ctx.moveTo(lx, cy + 16);
            ctx.lineTo(lx, cy + 26);
            ctx.stroke();
          }
          break;
        }
        case "human": {
          // 頭
          ctx.beginPath();
          ctx.arc(cx, cy - 10, 8, 0, Math.PI * 2);
          ctx.fill();
          // 胴体
          ctx.fillRect(cx - 6, cy - 2, 12, 16);
          // 腕
          ctx.beginPath();
          ctx.moveTo(cx - 6, cy + 2);
          ctx.lineTo(cx - 16, cy + 10);
          ctx.moveTo(cx + 6, cy + 2);
          ctx.lineTo(cx + 16, cy + 10);
          ctx.stroke();
          break;
        }
        case "flower": {
          // 花弁6枚
          for (let i = 0; i < 6; i++) {
            const angle = (Math.PI * 2 / 6) * i;
            const px = cx + Math.cos(angle) * 10;
            const py = cy + Math.sin(angle) * 10;
            ctx.beginPath();
            ctx.ellipse(px, py, 6, 9, angle, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? figColor : figColor2;
            ctx.fill();
          }
          // 中心
          ctx.beginPath();
          ctx.arc(cx, cy, 6, 0, Math.PI * 2);
          ctx.fillStyle = "hsl(" + hue + ", 80%, 80%)";
          ctx.fill();
          break;
        }
        case "moon": {
          // 三日月（大円 - 小円の差）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.arc(cx, cy, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "hsl(" + hue + ", 28%, 14%)";
          ctx.beginPath();
          ctx.arc(cx + 8, cy - 4, 13, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case "scroll": {
          // 巻物
          ctx.fillStyle = figColor;
          ctx.fillRect(cx - 16, cy - 6, 32, 12);
          ctx.beginPath();
          ctx.ellipse(cx - 16, cy, 5, 9, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + 16, cy, 5, 9, 0, 0, Math.PI * 2);
          ctx.fill();
          // 線
          ctx.strokeStyle = "hsl(" + hue + ", 28%, 14%)";
          ctx.lineWidth = 1;
          for (let i = -8; i <= 8; i += 4) {
            ctx.beginPath();
            ctx.moveTo(cx - 10, cy + i);
            ctx.lineTo(cx + 10, cy + i);
            ctx.stroke();
          }
          break;
        }
        case "item": {
          // ひし形
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 16);
          ctx.lineTo(cx + 14, cy);
          ctx.lineTo(cx, cy + 16);
          ctx.lineTo(cx - 14, cy);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case "tree": {
          // 葉（三角）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 18);
          ctx.lineTo(cx + 14, cy + 2);
          ctx.lineTo(cx - 14, cy + 2);
          ctx.closePath();
          ctx.fill();
          // 幹
          ctx.fillStyle = figColor2;
          ctx.fillRect(cx - 4, cy + 2, 8, 14);
          break;
        }
        case "building": {
          // 屋根（三角）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 16);
          ctx.lineTo(cx + 16, cy - 2);
          ctx.lineTo(cx - 16, cy - 2);
          ctx.closePath();
          ctx.fill();
          // 壁（長方形）
          ctx.fillStyle = figColor2;
          ctx.fillRect(cx - 12, cy - 2, 24, 18);
          break;
        }
        case "fish": {
          // 胴体（楕円）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.ellipse(cx - 2, cy, 14, 8, 0, 0, Math.PI * 2);
          ctx.fill();
          // 尾ひれ（bezier）
          ctx.beginPath();
          ctx.moveTo(cx + 12, cy);
          ctx.bezierCurveTo(cx + 22, cy - 10, cx + 26, cy - 4, cx + 22, cy);
          ctx.bezierCurveTo(cx + 26, cy + 4, cx + 22, cy + 10, cx + 12, cy);
          ctx.fillStyle = figColor2;
          ctx.fill();
          break;
        }
        case "cloth": {
          // 波型ライン
          ctx.strokeStyle = figColor;
          ctx.lineWidth = 2.5;
          for (let row = -1; row <= 1; row++) {
            ctx.beginPath();
            ctx.moveTo(cx - 18, cy + row * 8);
            for (let x = -18; x <= 18; x += 6) {
              ctx.quadraticCurveTo(
                cx + x + 3, cy + row * 8 - 5,
                cx + x + 6, cy + row * 8
              );
            }
            ctx.stroke();
          }
          break;
        }
        case "mountain": {
          // 三角形
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 18);
          ctx.lineTo(cx + 18, cy + 10);
          ctx.lineTo(cx - 18, cy + 10);
          ctx.closePath();
          ctx.fill();
          // 雪
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.beginPath();
          ctx.moveTo(cx, cy - 18);
          ctx.lineTo(cx + 7, cy - 8);
          ctx.lineTo(cx - 7, cy - 8);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case "gem": {
          // 六角形
          ctx.fillStyle = figColor;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i - Math.PI / 6;
            const gx = cx + Math.cos(a) * 14;
            const gy = cy + Math.sin(a) * 14;
            i === 0 ? ctx.moveTo(gx, gy) : ctx.lineTo(gx, gy);
          }
          ctx.closePath();
          ctx.fill();
          // ハイライト
          ctx.fillStyle = "rgba(255,255,255,0.25)";
          ctx.beginPath();
          ctx.moveTo(cx - 4, cy - 10);
          ctx.lineTo(cx + 4, cy - 10);
          ctx.lineTo(cx, cy - 2);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case "bone": {
          // 中心棒
          ctx.fillStyle = figColor;
          ctx.fillRect(cx - 4, cy - 14, 8, 28);
          // 両端楕円×2
          for (const [bx, by] of [[cx, cy - 14], [cx, cy + 14]]) {
            ctx.beginPath();
            ctx.ellipse(bx, by, 10, 5, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          break;
        }
        case "fruit": {
          // 複数の小円
          const positions = [[cx - 8, cy - 4], [cx + 8, cy - 4], [cx, cy + 8], [cx - 4, cy - 12], [cx + 4, cy - 12]];
          const fColors = ["hsl(0,70%,60%)", "hsl(30,75%,55%)", "hsl(110,65%,50%)", "hsl(350,70%,60%)", "hsl(25,70%,55%)"];
          positions.forEach(function(pos, i) {
            ctx.beginPath();
            ctx.arc(pos[0], pos[1], 7, 0, Math.PI * 2);
            ctx.fillStyle = fColors[i];
            ctx.fill();
          });
          break;
        }
        case "road": {
          // 台形（遠近感のある道）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.moveTo(cx - 18, cy + 14);
          ctx.lineTo(cx + 18, cy + 14);
          ctx.lineTo(cx + 8, cy - 14);
          ctx.lineTo(cx - 8, cy - 14);
          ctx.closePath();
          ctx.fill();
          // 中央線
          ctx.strokeStyle = "rgba(255,255,255,0.4)";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([3, 3]);
          ctx.beginPath();
          ctx.moveTo(cx, cy + 14);
          ctx.lineTo(cx, cy - 14);
          ctx.stroke();
          ctx.setLineDash([]);
          break;
        }
        case "plant": {
          // 茎
          ctx.strokeStyle = figColor2;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(cx, cy + 14);
          ctx.lineTo(cx, cy - 10);
          ctx.stroke();
          // 葉（楕円）
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.ellipse(cx - 10, cy, 9, 5, -0.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + 10, cy - 6, 9, 5, 0.5, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case "yokai": {
          // 円の頭
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.arc(cx, cy + 2, 14, 0, Math.PI * 2);
          ctx.fill();
          // 角
          ctx.fillStyle = figColor2;
          ctx.beginPath();
          ctx.moveTo(cx - 8, cy - 10);
          ctx.lineTo(cx - 4, cy - 22);
          ctx.lineTo(cx, cy - 10);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(cx + 8, cy - 10);
          ctx.lineTo(cx + 4, cy - 22);
          ctx.lineTo(cx, cy - 10);
          ctx.closePath();
          ctx.fill();
          // 目
          ctx.fillStyle = "#1a1000";
          ctx.beginPath();
          ctx.arc(cx - 5, cy + 2, 2.5, 0, Math.PI * 2);
          ctx.arc(cx + 5, cy + 2, 2.5, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        default: {
          ctx.fillStyle = figColor;
          ctx.beginPath();
          ctx.arc(cx, cy, 14, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
      }
      ctx.restore();

      // 区切り線
      ctx.strokeStyle = "rgba(248,211,111,0.25)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(4, drawAreaH);
      ctx.lineTo(w - 4, drawAreaH);
      ctx.stroke();

      // 下部40% かな文字
      const textY = drawAreaH + (h - drawAreaH) / 2 + 2;
      ctx.font = "bold " + Math.floor((h - drawAreaH) * 0.72) + "px \"Hiragino Mincho ProN\", \"Yu Mincho\", serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#f8d36f";
      ctx.fillText(data.kana, cx, textY);

      // 金色ボーダー
      ctx.strokeStyle = "rgba(248,211,111,0.28)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(0.75, 0.75, w - 1.5, h - 1.5, 5);
      ctx.stroke();
    }

    // =====================================================================
    // DOM 参照
    // =====================================================================
    const elYomiKana      = document.getElementById("yomi-kana");
    const elYomiPhrase    = document.getElementById("yomi-phrase");
    const elFeedbackMsg   = document.getElementById("feedback-msg");
    const elStatCorrect   = document.getElementById("stat-correct");
    const elStatWrong     = document.getElementById("stat-wrong");
    const elStatRemain    = document.getElementById("stat-remain");
    const elStatTimer     = document.getElementById("stat-timer");
    const elTimerContainer = document.getElementById("timer-container");
    const elTimerBarWrap  = document.getElementById("timer-bar-wrap");
    const elTimerBar      = document.getElementById("timer-bar");
    const elGrid          = document.getElementById("efuda-grid");

    // =====================================================================
    // ゲームロジック
    // =====================================================================
    function startGame() {
      const cfg = DIFFICULTY_CONFIG[state.difficulty];
      clearTimeout(state.autoNextTimeout);
      clearInterval(state.timerInterval);
      SpeechEngine.cancel();

      state.deck = shuffle(KARUTA_DATA.map(function(d) { return d.id; }));
      state.correctCount = 0;
      state.wrongCount = 0;
      state.waitingNext = false;
      state.startTime = Date.now();

      elStatCorrect.textContent = "0";
      elStatWrong.textContent = "0";
      elStatRemain.textContent = String(state.deck.length);
      elFeedbackMsg.textContent = "";
      elFeedbackMsg.className = "feedback-msg";

      // タイマー表示制御
      if (cfg.timeLimit > 0) {
        elTimerContainer.style.display = "";
        elTimerBarWrap.style.display = "";
        elStatTimer.textContent = String(cfg.timeLimit);
        elTimerBar.style.width = "100%";
        elTimerBar.classList.remove("danger");
        startCountdown(cfg.timeLimit);
      } else {
        elTimerContainer.style.display = "none";
        elTimerBarWrap.style.display = "none";
      }

      renderGrid();
      showScreen("screen-game");
      nextCard();
    }

    function startCountdown(seconds) {
      let remaining = seconds;
      const cfg = DIFFICULTY_CONFIG[state.difficulty];
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(function() {
        remaining--;
        elStatTimer.textContent = String(remaining);
        elTimerBar.style.width = ((remaining / cfg.timeLimit) * 100) + "%";
        if (remaining <= 10) elTimerBar.classList.add("danger");
        if (remaining <= 0) {
          clearInterval(state.timerInterval);
          endGame();
        }
      }, 1000);
    }

    function renderGrid() {
      // DOM構築（XSS対策: textContent使用、innerHTML禁止）
      while (elGrid.firstChild) elGrid.removeChild(elGrid.firstChild);

      for (const data of KARUTA_DATA) {
        const wrap = document.createElement("div");
        wrap.className = "efuda-wrap";
        wrap.setAttribute("role", "listitem");
        wrap.setAttribute("aria-label", data.kana + "の絵札");
        wrap.dataset.id = String(data.id);

        const cvs = document.createElement("canvas");
        cvs.width = CARD_W;
        cvs.height = CARD_H;
        drawEfuda(cvs, data);

        wrap.appendChild(cvs);
        wrap.addEventListener("click", function() {
          const cardId = parseInt(wrap.dataset.id, 10);
          checkAnswer(cardId);
        });
        elGrid.appendChild(wrap);
      }
    }

    function nextCard() {
      state.waitingNext = false;
      if (state.deck.length === 0) {
        endGame();
        return;
      }
      const nextId = state.deck[0]; // deck先頭が次のカード
      const data = KARUTA_DATA[nextId];
      state.currentCard = data;

      elYomiKana.textContent = data.kana;
      elYomiPhrase.textContent = data.yomi;
      elFeedbackMsg.textContent = "";
      elFeedbackMsg.className = "feedback-msg";

      const cfg = DIFFICULTY_CONFIG[state.difficulty];
      SpeechEngine.speak(data.yomi, cfg.speechRate);
    }

    function checkAnswer(clickedId) {
      if (state.waitingNext) return;
      if (!state.currentCard) return;
      // 既に正解済みのカードはクリック不可（answered クラスがついている）
      const wrap = elGrid.querySelector("[data-id=\"" + clickedId + "\"]");
      if (!wrap || wrap.classList.contains("answered")) return;

      const isCorrect = clickedId === state.currentCard.id;
      const cfg = DIFFICULTY_CONFIG[state.difficulty];

      if (isCorrect) {
        state.correctCount++;
        elStatCorrect.textContent = String(state.correctCount);
        elFeedbackMsg.textContent = "正解！ / Correct!";
        elFeedbackMsg.className = "feedback-msg ok";
        wrap.classList.add("correct-flash");
        // アニメーション後に消滅
        setTimeout(function() {
          wrap.classList.add("answered");
          wrap.classList.remove("correct-flash");
        }, 280);
        // deckから除去
        state.deck = state.deck.filter(function(id) { return id !== clickedId; });
        elStatRemain.textContent = String(state.deck.length);
        state.waitingNext = true;
        clearTimeout(state.autoNextTimeout);
        state.autoNextTimeout = setTimeout(nextCard, cfg.autoNext);
      } else {
        state.wrongCount++;
        elStatWrong.textContent = String(state.wrongCount);
        elFeedbackMsg.textContent = "違います / Wrong — " + state.currentCard.kana;
        elFeedbackMsg.className = "feedback-msg ng";
        wrap.classList.add("wrong-flash");
        setTimeout(function() {
          wrap.classList.remove("wrong-flash");
        }, 450);
      }
    }

    function endGame() {
      clearInterval(state.timerInterval);
      clearTimeout(state.autoNextTimeout);
      SpeechEngine.cancel();

      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      const total = state.correctCount + state.wrongCount;
      const rate = total > 0 ? Math.round((state.correctCount / total) * 100) : 0;
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      const timeStr = minutes > 0
        ? minutes + "分" + seconds + "秒"
        : seconds + "秒";

      // ベストスコア（localStorage）
      const bestKey = "karuta_best_" + state.difficulty;
      let best = parseInt(localStorage.getItem(bestKey) || "0", 10);
      if (state.correctCount > best) {
        best = state.correctCount;
        localStorage.setItem(bestKey, String(best));
      }

      // リザルト表示（textContent使用）
      document.getElementById("result-score").textContent = String(state.correctCount);
      document.getElementById("result-correct").textContent = String(state.correctCount);
      document.getElementById("result-wrong").textContent = String(state.wrongCount);
      document.getElementById("result-rate").textContent = rate + "%";
      document.getElementById("result-time").textContent = timeStr;
      document.getElementById("result-best").textContent = String(best);

      showScreen("screen-result");
    }

    // =====================================================================
    // UI イベント
    // =====================================================================
    // 難易度ボタン
    document.querySelectorAll(".diff-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".diff-btn").forEach(function(b) {
          b.classList.remove("selected");
        });
        btn.classList.add("selected");
        state.difficulty = btn.dataset.diff;
      });
    });

    // スタートボタン
    document.getElementById("btn-start").addEventListener("click", function() {
      startGame();
    });

    // 戻るボタン
    document.getElementById("btn-back-to-start").addEventListener("click", function(e) {
      e.preventDefault();
      clearInterval(state.timerInterval);
      clearTimeout(state.autoNextTimeout);
      SpeechEngine.cancel();
      showScreen("screen-start");
    });

    // 読み上げボタン
    document.getElementById("btn-speak").addEventListener("click", function() {
      if (state.currentCard) {
        const cfg = DIFFICULTY_CONFIG[state.difficulty];
        SpeechEngine.speak(state.currentCard.yomi, cfg.speechRate);
      }
    });

    // もう一度ボタン
    document.getElementById("btn-retry").addEventListener("click", function() {
      startGame();
    });
  </script>
</body>
</html>
