<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Notebook — hide</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
        integrity="sha384-oxHpXKMl0SqN5PH/OkQfnlvLbBEqkmk/VVH0mhFkxIjVsJ/0nyxRUoUFUSjQEXU"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
        integrity="sha384-MYlnwkrj/YgpZi2HEcb+UZGpN0RsLWvHRd9JLZN0iNPuYZ5c8TA5gRxRMmpHJNJ"
        crossorigin="anonymous"></script>
<style>
  :root {
    --bg:      #0d1117;
    --surface: rgba(255,255,255,0.04);
    --line:    rgba(255,255,255,0.1);
    --text:    #e6edf3;
    --muted:   rgba(230,237,243,0.55);
    --cyan:    #00e5ff;
    --purple:  #9b59ff;
    --green:   #3fb950;
    --red:     #f85149;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header a.back {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  header a.back:hover { color: var(--cyan); }
  header h1 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 0.03em;
  }
  header .badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid rgba(155,89,255,0.5);
    color: var(--purple);
    margin-left: 4px;
  }

  /* ── Layout ── */
  .nb-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* ── Left Panel: Sources ── */
  .nb-sources-panel {
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 57px);
    position: sticky;
    top: 57px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .panel-header h2 {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .panel-header .src-count {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .source-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .source-item {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .source-item:hover { border-color: var(--cyan); }
  .source-item.selected { border-color: var(--cyan); background: rgba(0,229,255,0.06); }
  .source-item-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    padding-right: 20px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .source-item-preview {
    font-size: 0.7rem;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .source-item-chars {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .source-del-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .source-del-btn:hover { color: var(--red); background: rgba(248,81,73,0.12); }
  .empty-sources {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.8;
  }
  .panel-footer {
    padding: 10px 8px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }
  .btn-add-source {
    width: 100%;
    padding: 9px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 8px;
    color: var(--cyan);
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-add-source:hover { background: rgba(0,229,255,0.18); }

  /* ── Right Panel: Generate + Results ── */
  .nb-result-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
  }
  .result-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .btn-gen {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
  }
  .btn-gen:active { transform: scale(0.97); }
  .btn-gen:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-summary {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.35);
    color: var(--cyan);
  }
  .btn-summary:not(:disabled):hover { background: rgba(0,229,255,0.2); }
  .btn-outline {
    background: rgba(155,89,255,0.1);
    border-color: rgba(155,89,255,0.35);
    color: var(--purple);
  }
  .btn-outline:not(:disabled):hover { background: rgba(155,89,255,0.2); }
  .btn-both {
    background: rgba(255,45,120,0.08);
    border-color: rgba(255,45,120,0.3);
    color: #ff2d78;
  }
  .btn-both:not(:disabled):hover { background: rgba(255,45,120,0.18); }
  .worker-status {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .worker-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .worker-dot.unconfigured { background: #f0ad4e; }

  /* ── Worker URL config bar ── */
  .worker-config-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: rgba(240,173,78,0.06);
    border-bottom: 1px solid rgba(240,173,78,0.2);
    font-size: 0.75rem;
    color: #f0ad4e;
  }
  .worker-config-bar.hidden { display: none; }
  .worker-url-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(240,173,78,0.3);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.75rem;
    padding: 4px 8px;
    outline: none;
  }
  .worker-url-input:focus { border-color: var(--cyan); }
  .btn-set-url {
    background: rgba(240,173,78,0.15);
    border: 1px solid rgba(240,173,78,0.4);
    border-radius: 6px;
    color: #f0ad4e;
    font-size: 0.75rem;
    padding: 4px 10px;
    cursor: pointer;
  }
  .btn-set-url:hover { background: rgba(240,173,78,0.25); }

  /* ── Result sections ── */
  .result-area {
    padding: 20px;
    flex: 1;
  }
  .result-section {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .result-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
  }
  .result-section-header h3 {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-section-header h3.cyan { color: var(--cyan); }
  .result-section-header h3.purple { color: var(--purple); }
  .result-actions {
    display: flex;
    gap: 6px;
  }
  .btn-copy, .btn-download {
    background: none;
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.68rem;
    padding: 3px 8px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-copy:hover, .btn-download:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .result-body {
    padding: 16px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    min-height: 60px;
  }
  .result-body.loading {
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-body p { margin-bottom: 0.8em; }
  .result-body p:last-child { margin-bottom: 0; }
  .result-body h2 {
    font-size: 0.9rem;
    color: var(--cyan);
    margin: 1em 0 0.4em;
    border-bottom: 1px solid var(--line);
    padding-bottom: 4px;
  }
  .result-body h3 { font-size: 0.82rem; color: var(--purple); margin: 0.8em 0 0.3em; }
  .result-body ul, .result-body ol {
    padding-left: 1.4em;
    margin-bottom: 0.6em;
  }
  .result-body li { margin-bottom: 0.25em; }
  .result-body strong { color: var(--text); }
  .result-body code {
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.8em;
    font-family: 'Cascadia Code', Consolas, monospace;
  }
  .placeholder-msg {
    color: var(--muted);
    font-size: 0.78rem;
    padding: 12px 0;
    text-align: center;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.12);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  /* ── Modal ── */
  dialog#nb-add-modal {
    background: #161b22;
    border: 1px solid var(--line);
    border-radius: 14px;
    color: var(--text);
    padding: 0;
    width: 90%;
    max-width: 560px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .modal-header h3 { font-size: 0.9rem; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  .modal-body label { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; display: block; }
  .modal-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.82rem;
    padding: 8px 10px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--cyan); }
  textarea.modal-input {
    resize: vertical;
    min-height: 160px;
    max-height: 340px;
    line-height: 1.5;
  }
  .modal-char-count { font-size: 0.67rem; color: var(--muted); text-align: right; margin-top: -4px; }
  .modal-char-count.warn { color: #f0ad4e; }
  .modal-char-count.over { color: var(--red); }
  .modal-or { text-align: center; font-size: 0.72rem; color: var(--muted); }
  .modal-file-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-file-select {
    padding: 7px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-file-select:hover { background: rgba(255,255,255,0.1); }
  .file-name-display { font-size: 0.72rem; color: var(--muted); }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
  }
  .btn-cancel {
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
  }
  .btn-cancel:hover { color: var(--text); }
  .btn-confirm {
    padding: 8px 20px;
    background: rgba(0,229,255,0.12);
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 8px;
    color: var(--cyan);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-confirm:not(:disabled):hover { background: rgba(0,229,255,0.22); }
  .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .nb-layout { grid-template-columns: 1fr; }
    .nb-sources-panel {
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    .source-list { max-height: 260px; }
    .result-toolbar { padding: 10px 14px; }
    .result-area { padding: 14px; }
  }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← ホームへ</a>
  <h1>📓 AI Notebook</h1>
  <span class="badge">BETA</span>
</header>

<!-- Worker URL config bar (shown when URL not set) -->
<div id="worker-config-bar" class="worker-config-bar hidden">
  <span>⚠️ Worker URL 未設定 — デプロイ後に設定してください:</span>
  <input id="worker-url-input" class="worker-url-input" type="url"
         placeholder="https://notebook-proxy.YOUR_SUBDOMAIN.workers.dev">
  <button class="btn-set-url" id="btn-set-url">設定</button>
</div>

<div class="nb-layout">

  <!-- Left: Sources -->
  <aside class="nb-sources-panel">
    <div class="panel-header">
      <h2>ソース</h2>
      <span class="src-count" id="src-count">0 / 5</span>
    </div>
    <div class="source-list" id="source-list">
      <div class="empty-sources" id="empty-sources">
        ソースがありません<br>
        <small>テキストを追加して AI に解析させましょう</small>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn-add-source" id="btn-add-source">
        <span>＋</span> ソースを追加
      </button>
    </div>
  </aside>

  <!-- Right: Generate + Results -->
  <main class="nb-result-panel">
    <div class="result-toolbar">
      <button class="btn-gen btn-summary" id="btn-gen-summary">📝 要約生成</button>
      <button class="btn-gen btn-outline" id="btn-gen-outline">📋 アウトライン生成</button>
      <button class="btn-gen btn-both"    id="btn-gen-both">✨ 両方生成</button>
      <div class="worker-status">
        <div class="worker-dot" id="worker-dot"></div>
        <span id="worker-status-text">Worker 設定済み</span>
      </div>
    </div>

    <div class="result-area">
      <!-- Summary -->
      <div class="result-section" id="section-summary">
        <div class="result-section-header">
          <h3 class="cyan">📝 要約</h3>
          <div class="result-actions">
            <button class="btn-copy" data-target="summary">コピー</button>
            <button class="btn-download" data-target="summary" data-ext="txt">DL</button>
          </div>
        </div>
        <div class="result-body" id="result-summary">
          <p class="placeholder-msg">「要約生成」または「両方生成」ボタンを押してください</p>
        </div>
      </div>

      <!-- Outline -->
      <div class="result-section" id="section-outline">
        <div class="result-section-header">
          <h3 class="purple">📋 アウトライン</h3>
          <div class="result-actions">
            <button class="btn-copy" data-target="outline">コピー</button>
            <button class="btn-download" data-target="outline" data-ext="md">DL</button>
          </div>
        </div>
        <div class="result-body" id="result-outline">
          <p class="placeholder-msg">「アウトライン生成」または「両方生成」ボタンを押してください</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Source Modal -->
<dialog id="nb-add-modal">
  <div class="modal-header">
    <h3>ソースを追加</h3>
    <button class="modal-close" id="modal-close">✕</button>
  </div>
  <div class="modal-body">
    <div>
      <label for="nb-source-title">タイトル（省略可）</label>
      <input id="nb-source-title" class="modal-input" type="text" placeholder="ソース 1">
    </div>
    <div>
      <label for="nb-source-text">テキスト（最大 8,000 文字）</label>
      <textarea id="nb-source-text" class="modal-input" placeholder="テキストをここにペーストしてください..."></textarea>
      <div class="modal-char-count" id="char-count">0 / 8,000</div>
    </div>
    <div class="modal-or">— または —</div>
    <div class="modal-file-row">
      <button class="btn-file-select" id="btn-file-select">📂 ファイルを選択</button>
      <span class="file-name-display" id="file-name-display">対応形式: .txt .md</span>
      <input type="file" id="nb-file-input" accept=".txt,.md" style="display:none">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" id="modal-cancel">キャンセル</button>
    <button class="btn-confirm" id="modal-confirm" disabled>追加</button>
  </div>
</dialog>

<script>
'use strict';

// ── Worker URL ──────────────────────────────────────────────────────────────
const WORKER_URL_KEY = 'nb-worker-url';
const DEFAULT_WORKER = 'https://notebook-proxy.hifukasawa77.workers.dev';
let workerUrl = localStorage.getItem(WORKER_URL_KEY) || DEFAULT_WORKER;

function updateWorkerStatus() {
  const dot  = document.getElementById('worker-dot');
  const text = document.getElementById('worker-status-text');
  const bar  = document.getElementById('worker-config-bar');
  if (workerUrl === DEFAULT_WORKER) {
    dot.className = 'worker-dot unconfigured';
    text.textContent = 'Worker URL 未確認';
    bar.classList.remove('hidden');
    document.getElementById('worker-url-input').value = workerUrl;
  } else {
    dot.className = 'worker-dot';
    text.textContent = 'Worker 設定済み';
    bar.classList.add('hidden');
  }
}

document.getElementById('btn-set-url').addEventListener('click', () => {
  const v = document.getElementById('worker-url-input').value.trim();
  if (!v.startsWith('https://')) return alert('https:// で始まるURLを入力してください');
  workerUrl = v;
  localStorage.setItem(WORKER_URL_KEY, v);
  updateWorkerStatus();
});

// ── Sources ─────────────────────────────────────────────────────────────────
const MAX_SOURCES = 5;
const MAX_SOURCE_CHARS = 8000;
let sources = JSON.parse(localStorage.getItem('nb-sources') || '[]');
let selectedSource = -1;

function saveSources() {
  localStorage.setItem('nb-sources', JSON.stringify(sources));
}

function renderSources() {
  const list  = document.getElementById('source-list');
  const empty = document.getElementById('empty-sources');
  const count = document.getElementById('src-count');
  count.textContent = `${sources.length} / ${MAX_SOURCES}`;
  document.getElementById('btn-add-source').disabled = sources.length >= MAX_SOURCES;

  const items = list.querySelectorAll('.source-item');
  items.forEach(el => el.remove());

  if (sources.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  sources.forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'source-item' + (i === selectedSource ? ' selected' : '');
    div.dataset.index = i;
    const chars = src.text.length.toLocaleString();
    div.innerHTML = `
      <div class="source-item-title">${escHtml(src.title || `ソース ${i + 1}`)}</div>
      <div class="source-item-preview">${escHtml(src.text.slice(0, 100))}</div>
      <div class="source-item-chars">${chars} 文字</div>
      <button class="source-del-btn" data-del="${i}" title="削除">✕</button>`;
    div.addEventListener('click', (e) => {
      if (e.target.dataset.del !== undefined) return;
      selectedSource = i;
      renderSources();
    });
    div.querySelector('.source-del-btn').addEventListener('click', () => {
      sources.splice(i, 1);
      if (selectedSource >= sources.length) selectedSource = sources.length - 1;
      saveSources();
      renderSources();
    });
    list.appendChild(div);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ────────────────────────────────────────────────────────────────────
const modal = document.getElementById('nb-add-modal');

document.getElementById('btn-add-source').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click',  closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);

function openModal() {
  if (sources.length >= MAX_SOURCES) return;
  document.getElementById('nb-source-title').value = '';
  document.getElementById('nb-source-text').value  = '';
  document.getElementById('file-name-display').textContent = '対応形式: .txt .md';
  updateCharCount();
  modal.showModal();
}
function closeModal() { modal.close(); }
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

const textArea = document.getElementById('nb-source-text');
const charCountEl = document.getElementById('char-count');
const confirmBtn  = document.getElementById('modal-confirm');

function updateCharCount() {
  const len = textArea.value.length;
  charCountEl.textContent = `${len.toLocaleString()} / 8,000`;
  charCountEl.className = 'modal-char-count' + (len > MAX_SOURCE_CHARS ? ' over' : len > 6000 ? ' warn' : '');
  confirmBtn.disabled = len === 0;
}
textArea.addEventListener('input', updateCharCount);

// File input
document.getElementById('btn-file-select').addEventListener('click', () => {
  document.getElementById('nb-file-input').click();
});
document.getElementById('nb-file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  textArea.value = text.slice(0, MAX_SOURCE_CHARS);
  document.getElementById('file-name-display').textContent = file.name;
  if (!document.getElementById('nb-source-title').value) {
    document.getElementById('nb-source-title').value = file.name.replace(/\.[^.]+$/, '');
  }
  updateCharCount();
  e.target.value = '';
});

document.getElementById('modal-confirm').addEventListener('click', () => {
  const text  = textArea.value.trim().slice(0, MAX_SOURCE_CHARS);
  if (!text) return;
  const title = document.getElementById('nb-source-title').value.trim() || `ソース ${sources.length + 1}`;
  sources.push({ title, text });
  saveSources();
  renderSources();
  closeModal();
});

// ── Results storage ──────────────────────────────────────────────────────────
let resultCache = JSON.parse(localStorage.getItem('nb-result') || '{}');

function saveResult(data) {
  Object.assign(resultCache, data);
  localStorage.setItem('nb-result', JSON.stringify(resultCache));
}

function renderResult(data) {
  if (data.summary !== undefined) {
    const el = document.getElementById('result-summary');
    el.className = 'result-body';
    el.innerHTML = DOMPurify.sanitize(marked.parse(data.summary));
  }
  if (data.outline !== undefined) {
    const el = document.getElementById('result-outline');
    el.className = 'result-body';
    el.innerHTML = DOMPurify.sanitize(marked.parse(data.outline));
  }
}

function showLoading(targets) {
  targets.forEach(t => {
    const el = document.getElementById(`result-${t}`);
    el.className = 'result-body loading';
    el.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
  });
}

// ── Generate ─────────────────────────────────────────────────────────────────
async function generate(mode) {
  if (sources.length === 0) {
    alert('ソースを追加してから生成してください。');
    return;
  }

  const targets = mode === 'both' ? ['summary', 'outline'] : [mode];
  showLoading(targets);

  const btns = document.querySelectorAll('.btn-gen');
  btns.forEach(b => b.disabled = true);

  try {
    const res = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sources: sources.map(s => s.text), mode }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    renderResult(data);
    saveResult(data);
  } catch (err) {
    targets.forEach(t => {
      const el = document.getElementById(`result-${t}`);
      el.className = 'result-body';
      el.innerHTML = `<p style="color:var(--red)">エラー: ${escHtml(err.message)}</p><p style="color:var(--muted);font-size:0.72rem">Worker URL の設定を確認してください。</p>`;
    });
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

document.getElementById('btn-gen-summary').addEventListener('click', () => generate('summary'));
document.getElementById('btn-gen-outline').addEventListener('click', () => generate('outline'));
document.getElementById('btn-gen-both').addEventListener('click',    () => generate('both'));

// ── Copy / Download ──────────────────────────────────────────────────────────
document.querySelectorAll('.btn-copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const raw = resultCache[target];
    if (!raw) return;
    navigator.clipboard.writeText(raw).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ コピー済み';
      setTimeout(() => btn.textContent = orig, 1800);
    });
  });
});

document.querySelectorAll('.btn-download').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.target;
    const raw = resultCache[target];
    if (!raw) return;
    const ext  = btn.dataset.ext || 'txt';
    const blob = new Blob([raw], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `notebook-${target}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
  });
});

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  marked.setOptions({ breaks: true, gfm: true });
  updateWorkerStatus();
  renderSources();
  if (resultCache.summary) renderResult({ summary: resultCache.summary });
  if (resultCache.outline) renderResult({ outline: resultCache.outline });
})();
</script>
</body>
