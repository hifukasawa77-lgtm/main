<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="戦国の野望 — 信長の野望風の戦国歴史シミュレーション。全国64洲をヘックス戦で攻め取る。1560/1568/1574の3シナリオ。Canvas + GameKit製。">
<title>戦国の野望 | Sengoku no Yabou — 戦国シミュレーション</title>
<style>
  :root { --bg:#05070d; --cyan:#22d3ee; --purple:#a78bfa; --text:#e2e8f0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(circle at 50% -10%, #0b1426 0%, #05070d 60%);
    color: var(--text);
    font-family: "Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;
    display:flex; flex-direction:column;
    min-height:100vh; gap:10px; padding:10px;
  }
  body.fit-canvas { align-items:center; justify-content:center; overflow:hidden; }
  body.native-canvas { align-items:flex-start; justify-content:flex-start; overflow:auto; }
  canvas {
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
    background:var(--bg); box-shadow:0 12px 48px rgba(0,0,0,0.65);
    touch-action:none;
  }
  body.fit-canvas canvas { width:calc(100vw - 20px); height:calc(100vh - 20px); max-width:none; max-height:none; }
  body.fit-canvas .hint { display:none; }
  body.native-canvas canvas { max-width:none; max-height:none; }
  .hint { font-size:12px; color:#8aa0b8; text-align:center; line-height:1.6; }
  .hint b { color:var(--cyan); }

  /* ---- 全画面UI（タッチ端末のみ表示） ---- */
  .fs-toggle, .fs-gate { display:none; }
  body.is-touch .fs-toggle { display:flex; }
  .fs-toggle {
    position:fixed; top:12px; right:12px; z-index:50;
    width:44px; height:44px; align-items:center; justify-content:center;
    font-size:20px; line-height:1; color:#e2e8f0;
    background:rgba(12,20,36,0.8); border:1px solid rgba(34,211,238,0.5);
    border-radius:12px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,0.5); cursor:pointer;
  }
  .fs-toggle:active { background:rgba(34,211,238,0.18); }
  body.is-touch.is-fullscreen .fs-toggle { top:max(12px, env(safe-area-inset-top)); right:max(12px, env(safe-area-inset-right)); }

  body.is-touch .fs-gate { display:flex; }
  .fs-gate {
    position:fixed; inset:0; z-index:100;
    align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(circle at 50% 30%, rgba(11,20,38,0.92) 0%, rgba(5,7,13,0.97) 70%);
    -webkit-tap-highlight-color:transparent; cursor:pointer;
  }
  .fs-gate-card {
    max-width:420px; width:100%; text-align:center;
    padding:30px 26px; border-radius:20px;
    background:rgba(8,12,22,0.7); border:1px solid rgba(232,192,122,0.45);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    box-shadow:0 16px 60px rgba(0,0,0,0.6);
  }
  .fs-gate-icon { font-size:46px; line-height:1; color:var(--cyan); margin-bottom:10px; }
  .fs-gate-title { font-size:28px; font-weight:bold; color:#e8c07a; letter-spacing:2px; }
  .fs-gate-jp { font-size:16px; color:#e2e8f0; margin-top:14px; }
  .fs-gate-en { font-size:12px; color:#7d93ab; margin-top:4px; }
  .fs-gate-rotate {
    display:none; margin-top:20px; padding:10px 12px; border-radius:10px;
    font-size:12px; color:#a78bfa; background:rgba(167,139,250,0.10);
    border:1px solid rgba(167,139,250,0.30);
  }
  @media (orientation:portrait) { body.is-touch .fs-gate-rotate { display:block; } }

  /* ---- 全画面表示中はキャンバスを画面いっぱいに ---- */
  body.is-fullscreen { padding:0; gap:0; }
  body.is-fullscreen canvas, :fullscreen canvas {
    border:0; border-radius:0; box-shadow:none;
  }
  body.is-fullscreen.fit-canvas canvas { width:100vw; height:100vh; max-width:none; max-height:none; }
  /* 横向きフルスクリーン時は画面いっぱいに引き伸ばす（左右の黒帯を解消） */
  @media (orientation:landscape){
    body.is-fullscreen canvas {
      width:100vw; height:100vh;
      max-width:none; max-height:none;
    }
  }
  .castle-add-panel {
    position:fixed; top:160px; right:24px; z-index:85;
    width:min(390px, calc(100vw - 32px)); display:none;
    padding:18px; border-radius:14px;
    background:rgba(8,13,24,0.92); border:1px solid rgba(232,192,122,0.55);
    box-shadow:0 16px 44px rgba(0,0,0,0.58); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    color:#e2e8f0; font-family:"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;
  }
  body.castle-add-open .castle-add-panel { display:block; }
  .castle-add-title { font-size:22px; font-weight:800; color:#facc15; margin-bottom:10px; }
  .castle-add-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .castle-add-field { display:flex; flex-direction:column; gap:5px; }
  .castle-add-field.wide { grid-column:1 / -1; }
  .castle-add-field label { font-size:13px; color:#9fb2c6; }
  .castle-add-field input, .castle-add-field select {
    min-height:42px; border-radius:8px; border:1px solid rgba(148,163,184,0.45);
    background:rgba(15,23,42,0.88); color:#f8fafc; padding:8px 10px; font-size:16px; outline:none;
  }
  .castle-add-field input:focus, .castle-add-field select:focus { border-color:#38bdf8; box-shadow:0 0 0 2px rgba(56,189,248,0.18); }
  .castle-add-help { margin-top:10px; font-size:12px; line-height:1.55; color:#cbd5e1; }
  .castle-add-actions { display:flex; gap:10px; margin-top:14px; }
  .castle-add-actions button {
    flex:1; min-height:44px; border-radius:8px; border:1px solid rgba(232,192,122,0.55);
    background:rgba(30,41,59,0.92); color:#f8fafc; font-weight:800; font-size:16px; cursor:pointer;
  }
  .castle-add-actions button.primary { background:rgba(217,119,6,0.88); border-color:rgba(251,191,36,0.75); }
  .castle-add-actions button:hover { filter:brightness(1.12); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="fsToggle" class="fs-toggle" type="button" aria-label="全画面 / Fullscreen">⛶</button>
<div id="fsGate" class="fs-gate" role="button" tabindex="0" aria-label="タップして全画面で開始 / Tap to start fullscreen">
  <div class="fs-gate-card">
    <div class="fs-gate-icon">⛶</div>
    <div class="fs-gate-title">戦国の野望</div>
    <div class="fs-gate-jp">タップして横向き全画面で開始</div>
    <div class="fs-gate-en">Tap to play in fullscreen landscape</div>

  </div>
</div>
<div id="castleAddPanel" class="castle-add-panel" aria-label="城追加モード">

  <div class="castle-add-grid">
    <div class="castle-add-field wide"><label for="castleAddName">城名</label><input id="castleAddName" type="text" placeholder="例: 新城" autocomplete="off"></div>
    <div class="castle-add-field"><label for="castleAddX">城位置 x</label><input id="castleAddX" type="number" inputmode="numeric" step="1"></div>
    <div class="castle-add-field"><label for="castleAddY">城位置 y</label><input id="castleAddY" type="number" inputmode="numeric" step="1"></div>
    <div class="castle-add-field wide"><label for="castleAddDaimyo">所属大名</label><select id="castleAddDaimyo"></select></div>
    <div class="castle-add-field wide"><label for="castleAddProvince">国名</label><input id="castleAddProvince" type="text" placeholder="例: 武蔵" autocomplete="off"></div>
  </div>
  <div class="castle-add-help">地図をクリック/タップすると x,y が入ります。確定するとその座標に城を配置します。</div>
  <div class="castle-add-actions"><button id="castleAddCancel" type="button">閉じる</button><button id="castleAddConfirm" class="primary" type="button">確定</button></div>
</div>
<p class="hint"><b>戦国の野望</b> / Sengoku no Yabou &nbsp;|&nbsp; クリックで操作 — Click to play &nbsp;|&nbsp; 全国64洲をヘックス戦で制覇せよ</p>

<script src="gamekit/gamekit.js"></script>
<script>
'use strict';

/* =====================================================================
 * 戦国の野望 (Sengoku no Yabou) — GameKit製 戦国歴史シミュレーション
 * 64洲 / ヘックス戦 / 3シナリオ(1560,1568,1574) / 全国武将
 * ===================================================================== */

const castleAddPanel = document.getElementById('castleAddPanel');
const W = 2560, H = 2080;
const canvas = document.getElementById('game');
const MAP_PAN = { enabled:false, active:false, dragging:false, startX:0, startY:0, scrollX:0, scrollY:0 };
const CASTLE_POS_STORE = 'sengokuCastleMapPositions:v2';
function loadCastlePositionOverrides(){
  try { return JSON.parse(localStorage.getItem(CASTLE_POS_STORE) || '{}') || {}; }
  catch (_) { return {}; }
}
const CASTLE_POS_OVERRIDES = loadCastlePositionOverrides();
function saveCastlePositionOverrides(){
  try { localStorage.setItem(CASTLE_POS_STORE, JSON.stringify(CASTLE_POS_OVERRIDES)); }
  catch (_) {}
}
function clamp01(v){ return Math.max(0, Math.min(1, Number.isFinite(v) ? v : 0)); }
function clampRange(v, min, max){ return Math.max(min, Math.min(max, Number.isFinite(v) ? v : min)); }
function mapImageMetrics(){
  const img = ASSETS && ASSETS.img && ASSETS.img.map;
  const iw = img && (img.naturalWidth || img.width), ih = img && (img.naturalHeight || img.height);
  if (!iw || !ih) return null;
  const c=MAP.clip;
  const scale = Math.max(c.w/iw, c.h/ih);
  const sw = c.w/scale, sh = c.h/scale;
  return { c, iw, ih, sw, sh, sx:(iw-sw)/2, sy:(ih-sh)/2 };
}
function normalizedCastlePoint(x, y){
  const m=mapImageMetrics();
  if (m){
    const ix = clampRange(m.sx + (x-m.c.x)/m.c.w*m.sw, 0, m.iw);
    const iy = clampRange(m.sy + (y-m.c.y)/m.c.h*m.sh, 0, m.ih);
    return { mx:clamp01(ix/m.iw), my:clamp01(iy/m.ih) };
  }
  const c=MAP.clip;
  return { u:clamp01((x-c.x)/c.w), v:clamp01((y-c.y)/c.h) };
}
function castleOverridePoint(id){
  const p=CASTLE_POS_OVERRIDES[id];
  if (!p) return null;
  const c=MAP.clip;
  const m=mapImageMetrics();
  if (m && Number.isFinite(p.mx) && Number.isFinite(p.my)){
    const ix=clamp01(p.mx)*m.iw, iy=clamp01(p.my)*m.ih;
    return [
      clampRange(m.c.x + ((ix-m.sx)/m.sw)*m.c.w, m.c.x, m.c.x+m.c.w),
      clampRange(m.c.y + ((iy-m.sy)/m.sh)*m.c.h, m.c.y, m.c.y+m.c.h)
    ];
  }
  if (Number.isFinite(p.u) && Number.isFinite(p.v)) return [c.x+p.u*c.w, c.y+p.v*c.h];
  if (Number.isFinite(p.x) && Number.isFinite(p.y)) return [p.x, p.y];
  return null;
}
function setCastlePositionOverride(id, x, y){
  CASTLE_POS_OVERRIDES[id] = normalizedCastlePoint(x, y);
}
const CUSTOM_CASTLE_STORE = 'sengokuCustomCastles:v1';
function loadCustomCastles(){
  try { const v=JSON.parse(localStorage.getItem(CUSTOM_CASTLE_STORE) || '[]'); return Array.isArray(v)?v:[]; }
  catch (_) { return []; }
}
const CUSTOM_CASTLES = loadCustomCastles();
function saveCustomCastles(){
  try { localStorage.setItem(CUSTOM_CASTLE_STORE, JSON.stringify(CUSTOM_CASTLES)); }
  catch (_) {}
}
function mapWorldToImagePoint(wx, wy){
  const m=mapImageMetrics();
  if (!m) return null;
  const ix = clampRange(m.sx + (wx-m.c.x)/m.c.w*m.sw, 0, m.iw);
  const iy = clampRange(m.sy + (wy-m.c.y)/m.c.h*m.sh, 0, m.ih);
  return {x:Math.round(ix), y:Math.round(iy), mx:clamp01(ix/m.iw), my:clamp01(iy/m.ih)};
}
function mapImagePointToWorld(mx, my){
  const m=mapImageMetrics();
  if (!m) return {x:MAP.clip.x+MAP.clip.w*clamp01(mx), y:MAP.clip.y+MAP.clip.h*clamp01(my)};
  const ix=clamp01(mx)*m.iw, iy=clamp01(my)*m.ih;
  return {
    x:clampRange(m.c.x + ((ix-m.sx)/m.sw)*m.c.w, m.c.x, m.c.x+m.c.w),
    y:clampRange(m.c.y + ((iy-m.sy)/m.sh)*m.c.h, m.c.y, m.c.y+m.c.h)
  };
}
function customCastleId(name){
  const suffix = Date.now().toString(36) + Math.floor(Math.random()*9999).toString(36);
  return 'custom_castle_' + suffix;
}
function addCustomCastleToData(c){
  if (!c || !c.id) return;
  const p={id:c.id, nameJP:c.provinceName||c.castleName||'追加国', nameEN:'Custom Castle', region:'追加', x:500, y:325, terrain:c.terrain||'plain', kokudaka:c.kokudaka||50, neighbors:c.neighborId?[c.neighborId]:[]};
  if (DATA.provById[c.id]) Object.assign(DATA.provById[c.id], p);
  else { DATA.provinces.push(p); DATA.provById[c.id]=p; }
  if (c.neighborId && DATA.provById[c.neighborId]){
    const nb=DATA.provById[c.neighborId];
    if (!(nb.neighbors||[]).includes(c.id)) (nb.neighbors=nb.neighbors||[]).push(c.id);
  }
  CASTLE_NAMES[c.id]=c.castleName||p.nameJP;
  if (Number.isFinite(c.mx) && Number.isFinite(c.my)) CASTLE_POS_OVERRIDES[c.id]={mx:clamp01(c.mx), my:clamp01(c.my)};
  if (DATA.scenarios){
    DATA.scenarios.forEach(scn=>{
      scn.own=scn.own||{}; scn.place=scn.place||{};
      scn.own[c.id]=c.daimyoId;
      if (!scn.place[c.id]) scn.place[c.id]=[];
    });
  }
}
function applyCustomCastlesToData(){ CUSTOM_CASTLES.forEach(addCustomCastleToData); saveCastlePositionOverrides(); }
function ensureCustomCastlesInState(state){
  if (!state || !state.provinces) return;
  CUSTOM_CASTLES.forEach(c=>{
    if (!DATA.provById[c.id]) addCustomCastleToData(c);
    if (!state.provinces[c.id]) state.provinces[c.id]={owner:c.daimyoId, soldiers:800, development:35, castleLevel:1, generals:[], hasActed:false};
    else state.provinces[c.id].owner=c.daimyoId;
  });
}
function setCanvasViewportMode(mode){
  const fit = mode !== 'native';
  document.body.classList.toggle('fit-canvas', fit);
  document.body.classList.toggle('native-canvas', !fit);
  MAP_PAN.enabled = !fit;
  MAP_PAN.active = false;
  MAP_PAN.dragging = false;
}
function canvasLocalFromPointerEvent(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches ? e.touches[0] : e;
  return {x:((p.clientX-r.left)/r.width)*canvas.width, y:((p.clientY-r.top)/r.height)*canvas.height};
}
function clientPoint(e){ const p=e.touches ? e.touches[0] : e; return {x:p.clientX, y:p.clientY}; }
function clientToCanvasXY(clientX, clientY){
  const r=canvas.getBoundingClientRect();
  return {x:((clientX-r.left)/r.width)*canvas.width, y:((clientY-r.top)/r.height)*canvas.height};
}
function canStartMapPan(e){
  if (!MAP_PAN.enabled) return false;
  const p=canvasLocalFromPointerEvent(e);
  return p.x>=MAP.clip.x && p.x<=MAP.clip.x+MAP.clip.w-320 && p.y>=MAP.clip.y+56 && p.y<=MAP.clip.y+MAP.clip.h-140;
}
function startMapPan(e){
  if (!canStartMapPan(e)) return;
  const p=clientPoint(e);
  MAP_PAN.active = true; MAP_PAN.dragging = false;
  MAP_PAN.startX = p.x; MAP_PAN.startY = p.y;
  MAP_PAN.scrollX = window.scrollX; MAP_PAN.scrollY = window.scrollY;
}
function moveMapPan(e){
  if (!MAP_PAN.enabled || !MAP_PAN.active) return;
  const p=clientPoint(e), dx=p.x-MAP_PAN.startX, dy=p.y-MAP_PAN.startY;
  if (Math.abs(dx)+Math.abs(dy) > 6) MAP_PAN.dragging = true;
  if (MAP_PAN.dragging){ window.scrollTo(MAP_PAN.scrollX-dx, MAP_PAN.scrollY-dy); e.preventDefault(); }
}
function endMapPan(){ MAP_PAN.active = false; }
canvas.addEventListener('mousedown', startMapPan);
window.addEventListener('mousemove', moveMapPan, {passive:false});
window.addEventListener('mouseup', endMapPan);
canvas.addEventListener('touchstart', startMapPan, {passive:false});
window.addEventListener('touchmove', moveMapPan, {passive:false});
window.addEventListener('touchend', endMapPan);
const game = new GameKit.Engine(canvas, { width: W, height: H });
const save = new GameKit.Save('sengoku');
const SAVE_VERSION = 1;

/* ---- 静的データ登録（JSONロード後に格納） ---- */
const DATA = { provinces:null, provById:{}, generals:null, genById:{}, scenarios:null };
const GPT_ASSETS = {
  map:'assets/sengoku/gpt/sengoku-satellite-japan-gpt-image-2-v6.png',
  title: 'assets/sengoku/gpt/sengoku-title-gpt-image-2.jpg',
  battle: 'assets/sengoku/gpt/sengoku-hex-battlefield-gpt-image-2.jpg',
  battleTiles: 'assets/sengoku/gpt/sengoku-hex-terrain-atlas-gpt-image-2.jpg',
  portrait1: 'assets/sengoku/gpt/sengoku-portraits-page-1-gpt-image-2.jpg',
  portrait2: 'assets/sengoku/gpt/sengoku-portraits-page-2-gpt-image-2.jpg',
  portrait3: 'assets/sengoku/gpt/sengoku-portraits-page-3-gpt-image-2.jpg',
  portrait4: 'assets/sengoku/gpt/sengoku-portraits-page-4-gpt-image-2.jpg',
  portrait5: 'assets/sengoku/gpt/sengoku-portraits-page-5-northern-clans-gpt-image-2.png',
  portrait6: 'assets/sengoku/gpt/sengoku-portraits-page-6-added-clans-gpt-image-2.png',
  portraitFixHojoUjiyasu: 'assets/sengoku/gpt/sengoku-portrait-fix-hojo-ujiyasu-gpt-image-2.png',
  kamon: 'assets/sengoku/gpt/sengoku-kamon-atlas-gpt-image-2-small.jpg',
  kamonExtra: 'assets/sengoku/gpt/sengoku-kamon-extra-northern-clans-gpt-image-2.png',
};
const ASSETS = { img:{}, portraitSlots:{}, portraitCols:6, portraitRows:6, kamonCols:5, kamonRows:5, extraKamonCols:4, extraKamonRows:2 };
const KAMON_CLANS = ['date','mogami','satake','satomi','hojo','uesugi','asakura','honganji','takeda','saito','imagawa','oda','kitabatake','rokkaku','miyoshi','ukita','amago','mori','kono','chosokabe','otomo','ryuzoji','shimazu','tokugawa','azai'];
const KAMON_SLOT = Object.fromEntries(KAMON_CLANS.map((id,i)=>[id,{col:i%5,row:Math.floor(i/5)}]));
const EXTRA_KAMON_CLANS = ['tsugaru','nanbu','kasai','soma','ashina','ando','jinbo','miki'];
const EXTRA_KAMON_SLOT = Object.fromEntries(EXTRA_KAMON_CLANS.map((id,i)=>[id,{img:'kamonExtra',col:i%4,row:Math.floor(i/4),cols:4,rows:2}]));

const PORTRAIT_FIX_SLOTS = {
  hojo_ujiyasu:{img:'portraitFixHojoUjiyasu',col:0,row:0,cols:1,rows:1}
};

const EXTRA_PORTRAIT_SLOTS = {
  tsugaru_tamenobu:{img:'portrait5',col:0,row:0}, tsugaru_nobuhira:{img:'portrait5',col:1,row:0}, numata_sukemitsu:{img:'portrait5',col:2,row:0},
  nanbu_nobunao:{img:'portrait5',col:3,row:0}, kunohe_masazane:{img:'portrait5',col:4,row:0}, kasai_harunobu:{img:'portrait5',col:5,row:0},
  kasai_chikanobu:{img:'portrait5',col:0,row:1}, soma_morotane:{img:'portrait5',col:1,row:1}, soma_takamitsu:{img:'portrait5',col:2,row:1},
  ando_chikasue:{img:'portrait5',col:3,row:1}, minato_suehide:{img:'portrait5',col:4,row:1}, inawashiro_morikuni:{img:'portrait5',col:5,row:1},  kojima_motoshige:{img:'portrait5',col:0,row:2},
  daihoji_yoshimasu:{img:'portrait6',col:0,row:0,cols:4,rows:2}, tozenji_yoshinaga:{img:'portrait6',col:1,row:0,cols:4,rows:2},
  osaki_yoshinao:{img:'portrait6',col:2,row:0,cols:4,rows:2}, ujiie_yoshitsugu:{img:'portrait6',col:3,row:0,cols:4,rows:2},
  miki_yoritsuna:{img:'portrait5',col:1,row:2}, miki_naoyori:{img:'portrait5',col:2,row:2},
  bessho_nagaharu:{img:'portrait6',col:0,row:1,cols:4,rows:2}, bessho_shigemune:{img:'portrait6',col:1,row:1,cols:4,rows:2},
  ichijo_kanesada:{img:'portrait6',col:2,row:1,cols:4,rows:2}, doi_soshan:{img:'portrait6',col:3,row:1,cols:4,rows:2}
};

function snapCastlePointToLand(id, x, y){

  if (isLandWorld(insideX, insideY)){

    const steps = Math.max(16, Math.ceil(r/5));

function cloneFallbackData(key){
  const data = DATA_FALLBACKS[key];
  if (!data) throw new Error('Missing embedded Sengoku data: ' + key);
  return JSON.parse(JSON.stringify(data));
}
function loadSengokuJSON(key, url){
  if (location.protocol === 'file:') return Promise.resolve(cloneFallbackData(key));
  return GameKit.Assets.loadJSON(url).catch(err=>{
    console.warn('Using embedded Sengoku data fallback:', url, err);
    return cloneFallbackData(key);
  });
}
function loadOneImage(name, url){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = () => resolve([name, img]);
    img.onerror = err => { console.warn('Optional image failed:', url, err); resolve([name, null]); };
    img.src = url;
  });
}
async function loadOptionalImages(map){
  const pairs = [];
  for (const [name, url] of Object.entries(map)) pairs.push(await loadOneImage(name, url));
  return Object.fromEntries(pairs.filter(([,img])=>!!img));
}

  1568: {spear:0.50, cavalry:0.25, bow:0.13, gun:0.12},
  1574: {spear:0.44, cavalry:0.20, bow:0.14, gun:0.22},
};
function compFor(year, family){
  const base = Object.assign({}, COMP[year] || COMP[1568]);
  if (family==='takeda') { base.cavalry += 0.10; base.spear -= 0.10; }
  if (family==='oda')    { base.gun += 0.08; base.spear -= 0.08; }
  if (family==='shimazu'){ base.gun += 0.05; base.bow -= 0.05; }
  if (family==='otomo')  { base.gun += 0.05; base.spear -= 0.05; }
  let sum = 0; for (const k in base){ if(base[k]<0) base[k]=0; sum+=base[k]; }
  for (const k in base) base[k] /= sum;
  return base;
}

function T(ctx, str, x, y, opts={}){
  ctx.save();
  ctx.font = (opts.weight?opts.weight+' ':'') + (opts.size||14) + 'px "Hiragino Sans","Yu Gothic","Segoe UI",sans-serif';
  ctx.fillStyle = opts.color || '#e2e8f0';
  ctx.textAlign = opts.align || 'left';
  ctx.textBaseline = opts.baseline || 'top';
  if (opts.shadow){ ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=4; }
  ctx.fillText(str, x, y);
  ctx.restore();
}
function drawCoverImage(ctx, img, x, y, w, h, alpha=1){
  if (!img) return false;
  const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
  if (!iw || !ih) return false;
  const scale = Math.max(w/iw, h/ih);
  const sw = w/scale, sh = h/scale;
  const sx = (iw-sw)/2, sy = (ih-sh)/2;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  ctx.restore();
  return true;
}
function drawLogicalPath(ctx, points, closed){
  if (!points || points.length<2) return;
  ctx.beginPath();
  ctx.moveTo(toScreenX(points[0][0]), toScreenY(points[0][1]));
  for (let i=1;i<points.length;i++) ctx.lineTo(toScreenX(points[i][0]), toScreenY(points[i][1]));
  if (closed) ctx.closePath();
}
function drawLandPath(ctx){
  ctx.beginPath();
  COAST_OUTLINES.forEach(outline=>{
    if (!outline.points || outline.points.length<3) return;
    ctx.moveTo(toScreenX(outline.points[0][0]), toScreenY(outline.points[0][1]));
    for (let i=1;i<outline.points.length;i++) ctx.lineTo(toScreenX(outline.points[i][0]), toScreenY(outline.points[i][1]));
    ctx.closePath();
  });
}
function clipToLand(ctx){
  ctx.beginPath(); ctx.rect(MAP.clip.x, MAP.clip.y, MAP.clip.w, MAP.clip.h); ctx.clip();
  drawLandPath(ctx); ctx.clip();
}
function pointInLand(x, y){
  return COAST_OUTLINES.some(outline=>{
    const poly = outline.points.map(pt=>[toScreenX(pt[0]), toScreenY(pt[1])]);
    return pointInPoly(x, y, poly);
  });
}
function drawTerrainBackdrop(ctx, mapImg, t=0){
  const c=MAP.clip;
  ctx.save();
  ctx.beginPath(); ctx.rect(c.x,c.y,c.w,c.h); ctx.clip();
  if (!drawCoverImage(ctx, mapImg, c.x, c.y, c.w, c.h, 1)) {
    const sea=ctx.createLinearGradient(c.x,c.y,c.x+c.w,c.y+c.h);
    sea.addColorStop(0,'#123a5c'); sea.addColorStop(0.45,'#071f38'); sea.addColorStop(1,'#03101f');
    ctx.fillStyle=sea; ctx.fillRect(c.x,c.y,c.w,c.h);
  }
  ctx.fillStyle='rgba(3,7,14,0.08)'; ctx.fillRect(c.x,c.y,c.w,c.h);
  ctx.restore();
}
function drawCoastlineGuide(ctx){
  ctx.save();
  ctx.beginPath(); ctx.rect(MAP.clip.x, MAP.clip.y, MAP.clip.w, MAP.clip.h); ctx.clip();
  COAST_OUTLINES.forEach(outline=>{
    drawLogicalPath(ctx, outline.points, outline.closed);
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.setLineDash([]);
    ctx.lineWidth=3.2; ctx.strokeStyle='rgba(2,6,23,0.58)'; ctx.stroke();
    drawLogicalPath(ctx, outline.points, outline.closed);
    ctx.lineWidth=1.1; ctx.strokeStyle='rgba(226,232,240,0.68)'; ctx.stroke();
    drawLogicalPath(ctx, outline.points, outline.closed);
    ctx.lineWidth=0.55; ctx.strokeStyle='rgba(34,211,238,0.30)'; ctx.stroke();
  });
  ctx.restore();
}

function drawGeneralPortrait(ctx, gid, x, y, size, opts={}){
  const slot = ASSETS.portraitSlots[gid];
  const img = slot && ASSETS.img[slot.img];
  const g = DATA.genById[gid];
  const radius = opts.radius===undefined ? Math.min(10, size/4) : opts.radius;
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, radius);
  ctx.clip();
  let drawn=false;
  if (img){
    const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
    const cw = iw / (slot.cols || ASSETS.portraitCols), ch = ih / (slot.rows || ASSETS.portraitRows);
    ctx.drawImage(img, slot.col*cw, slot.row*ch, cw, ch, x, y, size, size);
    drawn=true;
  }
  if (!drawn){
    const family = g ? g.family : 'unknown';
    const hue = Array.from(family).reduce((a,c)=>a+c.charCodeAt(0),0) % 360;
    ctx.fillStyle = 'hsl(' + hue + ' 45% 30%)';
    ctx.fillRect(x,y,size,size);
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.beginPath(); ctx.arc(x+size*0.5, y+size*0.42, size*0.22, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(x+size*0.28, y+size*0.66, size*0.44, size*0.28);
  }
  ctx.restore();
  ctx.lineWidth = opts.lineWidth || 1.2;
  ctx.strokeStyle = opts.stroke || 'rgba(232,192,122,0.55)';
  ctx.beginPath(); ctx.roundRect(x, y, size, size, radius); ctx.stroke();
}

function drawKamon(ctx, clanId, x, y, size, fallbackColor='#64748b'){

  ctx.fillStyle=fallbackColor || '#64748b';

  ctx.shadowColor='transparent';
  const rg=ctx.createRadialGradient(cx-size*0.18, cy-size*0.22, size*0.08, cx, cy, size*0.55);

  if (img && slot){
    const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;

    ctx.beginPath(); ctx.moveTo(x+size*0.32,cy); ctx.lineTo(x+size*0.68,cy); ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  ctx.lineWidth=Math.max(2,size*0.13); ctx.strokeStyle=fallbackColor || '#64748b'; ctx.beginPath(); ctx.arc(cx,cy,size/2-ctx.lineWidth/2,0,Math.PI*2); ctx.stroke();

  ctx.restore();

  ctx.font = (opts.weight||'bold') + ' ' + size + 'px "Hiragino Sans","Yu Gothic","Segoe UI",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  chars.forEach((ch,i)=>{
    const yy=y+pad+i*gap+gap/2;
    ctx.fillStyle='rgba(2,6,23,0.9)'; ctx.fillText(ch, x+0.8, yy+0.8);
    ctx.fillStyle=opts.color || '#f8fafc'; ctx.fillText(ch, x, yy);
  });
  ctx.restore();
  return h;
}
function castleNameForProvince(p){ return CASTLE_NAMES[p.id] || (p.nameJP + '城'); }

function pointInRect(p, r){ return p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function pointInPoly(px, py, poly){
  let inside=false;
  for (let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
/* 半平面でポリゴンをクリップ（A側=サイト側を残す）Sutherland-Hodgman */
function clipHalfPlane(poly, ax, ay, bx, by){
  const mx=(ax+bx)/2, my=(ay+by)/2, nx=bx-ax, ny=by-ay;
  const inside = (px,py)=> ((px-mx)*nx + (py-my)*ny) <= 0;
  const out=[];
  for (let i=0;i<poly.length;i++){
    const cur=poly[i], nxt=poly[(i+1)%poly.length];
    const ci=inside(cur[0],cur[1]), ni=inside(nxt[0],nxt[1]);
    if (ci) out.push(cur);
    if (ci!==ni){
      const d1=(cur[0]-mx)*nx+(cur[1]-my)*ny;
      const d2=(nxt[0]-mx)*nx+(nxt[1]-my)*ny;
      const t=d1/(d1-d2);
      out.push([cur[0]+t*(nxt[0]-cur[0]), cur[1]+t*(nxt[1]-cur[1])]);
    }
  }
  return out;
}
/* 各洲のVoronoiセル（画面座標）を計算してキャッシュ */
function computeProvinceCells(){
  const sites = DATA.provinces.map(p=>{ const [x,y]=provinceScreenPoint(p); return {id:p.id, x, y}; });
  const Rpx = MAP.R * MAP.s;
  const cells = {};
  for (const s of sites){
    let poly = [
      [s.x-Rpx, s.y-Rpx],[s.x+Rpx, s.y-Rpx],
      [s.x+Rpx, s.y+Rpx],[s.x-Rpx, s.y+Rpx]
    ];
    for (const o of sites){
      if (o.id===s.id) continue;
      const d = Math.hypot(o.x-s.x, o.y-s.y);
      if (d > Rpx*2.4) continue;
      poly = clipHalfPlane(poly, s.x, s.y, o.x, o.y);
      if (poly.length<3) break;
    }
    cells[s.id] = poly;
  }
  return cells;
}

/* ===================================================================
 * GameState 構築
 * =================================================================== */
function deriveProvinceStats(kok, isCapital){
  const development = Math.round(clamp(28 + kok/16, 20, 95));
  const castleLevel = isCapital ? 3 : (kok>=350 ? 2 : 1);
  const soldiers = Math.round(clamp(kok * 2.0 * (isCapital?1.35:1.0), 200, 6500));
  return { development, castleLevel, soldiers };
}
function buildGameState(scenarioId, playerDaimyo){
  const scn = DATA.scenarios.find(s=>s.id===scenarioId);
  const dById = {}; scn.daimyo.forEach(d=>dById[d.id]=d);
  const state = {
    version: SAVE_VERSION,
    scenarioId, year: scn.year, scenarioNameJP: scn.nameJP,
    turn:1, season:0, playerDaimyo,
    daimyo:{}, provinces:{}, generals:{},
    rng: (Date.now() & 0xffffff) ^ scenarioId,
    log:[], pendingBattle:null, pendingResult:null,
  };
  // count provinces per daimyo for starting gold
  const owncnt = {};
  for (const pid in scn.own){ const d=scn.own[pid]; owncnt[d]=(owncnt[d]||0)+1; }
  scn.daimyo.forEach(d=>{
    state.daimyo[d.id] = { id:d.id, gold: 1000 + (owncnt[d.id]||1)*280, alive:true };
  });
  // generals runtime (all inactive initially)
  DATA.generals.forEach(g=>{ state.generals[g.id]={loyalty:0, alive:true, location:null, daimyo:null}; });
  // provinces
  DATA.provinces.forEach(p=>{
    const owner = scn.own[p.id] || null;
    const prov = { owner, soldiers:0, development:0, castleLevel:1, generals:[], hasActed:false };
    if (owner){
      const dd = dById[owner];
      const isCap = dd && dd.capital===p.id;
      const st = deriveProvinceStats(p.kokudaka, isCap);
      prov.soldiers = st.soldiers; prov.development = st.development; prov.castleLevel = st.castleLevel;
    }
    state.provinces[p.id] = prov;
  });
  // place lords at capitals
  scn.daimyo.forEach(d=>{
    const g = state.generals[d.lord];
    if (g){ g.loyalty=100; g.location=d.capital; g.daimyo=d.id;
      if (state.provinces[d.capital]) state.provinces[d.capital].generals.push(d.lord); }
  });
  // place retainers
  for (const pid in scn.place){
    const owner = scn.own[pid];
    scn.place[pid].forEach(gid=>{
      const g = state.generals[gid];
      if (g && g.location==null){
        g.loyalty=82; g.location=pid; g.daimyo=owner;
        if (state.provinces[pid]) state.provinces[pid].generals.push(gid);
      }
    });
  }
  return state;
}

/* ---- state アクセス補助 ---- */
function provOwner(state, pid){ return state.provinces[pid].owner; }
function daimyoOf(state){ return DATA.scenarios.find(s=>s.id===state.scenarioId).daimyo; }
function daimyoDef(state, did){ return daimyoOf(state).find(d=>d.id===did); }
function bestGeneralIn(state, pid){
  const prov = state.provinces[pid];
  let best=null, bestScore=-1;
  prov.generals.forEach(gid=>{
    if (!state.generals[gid].alive) return;
    const g = DATA.genById[gid];
    const sc = g.stats.tou + g.stats.bu*0.4;
    if (sc>bestScore){ bestScore=sc; best=gid; }
  });
  return best;
}
function provinceStrength(state, pid){
  const prov = state.provinces[pid];
  const bg = bestGeneralIn(state, pid);
  const tou = bg ? DATA.genById[bg].stats.tou : 45;
  return prov.soldiers * (1 + tou/200) * (1 + prov.castleLevel*0.08);
}
function ownedProvinces(state, did){
  return DATA.provinces.filter(p=>state.provinces[p.id].owner===did).map(p=>p.id);
}
function neighborsOf(pid){ return (DATA.provById[pid].neighbors)||[]; }

/* ===================================================================
 * 戦闘モデル（手動・自動共通の評価関数）
 * =================================================================== */
function armyQuality(generals, year, family, defender, castleLevel, terrain){
  let bu=50, tou=50;
  if (generals && generals.length){
    let mb=0, mt=0;
    generals.forEach(gid=>{ const g=DATA.genById[gid]; if(!g) return; mb=Math.max(mb,g.stats.bu); mt=Math.max(mt,g.stats.tou); });
    bu=mb||50; tou=mt||50;
  }
  const comp = compFor(year, family);
  // 1.0を基準に、武将能力・鉄砲比率で加減（差が出すぎないスケール）
  let q = 1 + (bu-50)/180 + (tou-50)/300 + comp.gun*0.20;
  if (defender){
    // 城は基準Lv1で補正0、Lv5で+20%
    q *= (1 + Math.max(0,(castleLevel||1)-1)*0.05);
    if (terrain==='mountain') q *= 1.12;
    else if (terrain==='river') q *= 1.08;
    else if (terrain==='coast') q *= 1.03;
  }
  return q;
}
/* 自動解決（ヘッドレス・集約攻防） */
function autoResolveBattle(opts){
  // opts: {atkSoldiers, atkGenerals, atkFamily, defSoldiers, defGenerals, defFamily, year, castleLevel, terrain, rngFn}
  const rnd = opts.rngFn || Math.random;
  let an = opts.atkSoldiers, dn = opts.defSoldiers;
  const a0=an, d0=dn;
  // 戦ごとの士気・運（±10%）で番狂わせの余地を残す
  const aq = armyQuality(opts.atkGenerals, opts.year, opts.atkFamily, false, 0, null) * (0.9+rnd()*0.2);
  const dq = armyQuality(opts.defGenerals, opts.year, opts.defFamily, true, opts.castleLevel, opts.terrain) * (0.9+rnd()*0.2);
  let round=0;
  while (round<24 && an>a0*0.16 && dn>d0*0.16){
    const aDmg = an*aq*0.105*(0.85+rnd()*0.3);
    const dDmg = dn*dq*0.105*(0.85+rnd()*0.3);
    dn -= aDmg; an -= dDmg;
    round++;
  }
  an=Math.max(0,Math.round(an)); dn=Math.max(0,Math.round(dn));
  const aFrac = an/Math.max(1,a0), dFrac = dn/Math.max(1,d0);
  const attackerWins = aFrac >= dFrac;
  return { attackerWins, atkSurvivors:an, defSurvivors:dn };
}
/* 武将の戦死判定 */
function rollGeneralDeaths(state, generals, lossFrac, isLord){
  const dead=[];
  generals.forEach(gid=>{
    const g = state.generals[gid];
    if (!g || !g.alive) return;
    let chance = 0.10 + lossFrac*0.4;
    if (isLord && isLord(gid)) chance *= 0.5;
    if (Math.random() < chance){ g.alive=false; dead.push(gid); }
  });
  return dead;
}

}

    this.overlay=null; this.march=null; this.message=null; this.messageT=0;
    this.showClans=false; this.castleEdit=false; this.castleAddOpen=false; this.dragCastle=null; this.pinching=false; this.press=null; this.dragLast=null; this.lastMapCoord=null; this._suppressTapUntil=0;
    this.particles = new GameKit.Particles(W, H, {count:24, colors:['#1e3a5f','#2a2150']});
    // カメラ（ズーム/パン）。初期は3倍ズームで自国領中心。
    let cx=this._clipCx, cy=this._clipCy;
    const pd=daimyoDef(this.state, this.state.playerDaimyo);
    const capProv = pd && DATA.provById[pd.capital];
    if (capProv){ const pt=provinceScreenPoint(capProv); cx=pt[0]; cy=pt[1]; }
    this.cam = { zoom:3, cx, cy, min:1, max:6 };
    this._clampCam();
    this._bindInput();
    // 戦闘から戻った結果の適用
    if (this.state.pendingResult){ this.overlay = {type:'battleResult', data:this.state.pendingResult}; this.state.pendingResult=null; }
    this._checkEnd(game);
    this._save();
  }
  exit(){ this._hideCastleAddPanel(); this._unbindInput(); }
  _save(){ this.state.version=SAVE_VERSION; save.set('autosave', this.state); }
  _flash(jp){ this.message=jp; this.messageT=2.2; }

  /* ---- カメラ（ズーム/パン） ---- */
  get _clipCx(){ return MAP.clip.x + MAP.clip.w/2; }
  get _clipCy(){ return MAP.clip.y + MAP.clip.h/2; }
  _camApply(ctx){ const c=this.cam; ctx.translate(this._clipCx, this._clipCy); ctx.scale(c.zoom, c.zoom); ctx.translate(-c.cx, -c.cy); }
  _screenToWorld(sx, sy){ const c=this.cam; return { x:(sx-this._clipCx)/c.zoom + c.cx, y:(sy-this._clipCy)/c.zoom + c.cy }; }
  _worldToScreen(wx, wy){ const c=this.cam; return { x:(wx-c.cx)*c.zoom + this._clipCx, y:(wy-c.cy)*c.zoom + this._clipCy }; }
  _clampCam(){
    const c=this.cam; c.zoom = clamp(c.zoom, c.min, c.max);
    const halfW=(MAP.clip.w/2)/c.zoom, halfH=(MAP.clip.h/2)/c.zoom;
    const minX=MAP.clip.x+halfW, maxX=MAP.clip.x+MAP.clip.w-halfW;
    const minY=MAP.clip.y+halfH, maxY=MAP.clip.y+MAP.clip.h-halfH;
    c.cx = minX>maxX ? this._clipCx : clamp(c.cx, minX, maxX);
    c.cy = minY>maxY ? this._clipCy : clamp(c.cy, minY, maxY);
  }
  _zoomAt(sx, sy, factor){
    const w=this._screenToWorld(sx, sy);
    this.cam.zoom = clamp(this.cam.zoom*factor, this.cam.min, this.cam.max);
    this.cam.cx = w.x - (sx-this._clipCx)/this.cam.zoom;
    this.cam.cy = w.y - (sy-this._clipCy)/this.cam.zoom;
    this._clampCam();
  }
  _bindInput(){
    this._touchState=null;
    this._onWheel=(e)=>{ e.preventDefault(); const p=clientToCanvasXY(e.clientX,e.clientY); this._zoomAt(p.x,p.y, e.deltaY<0?1.12:1/1.12); };
    this._onTouchStart=(e)=>{
      if (e.touches.length===2){
        const a=e.touches[0], b=e.touches[1];
        const dist=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
        const mid=clientToCanvasXY((a.clientX+b.clientX)/2,(a.clientY+b.clientY)/2);
        this._touchState={dist, zoom:this.cam.zoom, world:this._screenToWorld(mid.x,mid.y)};
        this.pinching=true; e.preventDefault();
      }
    };
    this._onTouchMove=(e)=>{
      if (e.touches.length===2 && this._touchState){
        const a=e.touches[0], b=e.touches[1];
        const dist=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY) || 1;
        const mid=clientToCanvasXY((a.clientX+b.clientX)/2,(a.clientY+b.clientY)/2);
        this.cam.zoom=clamp(this._touchState.zoom*(dist/this._touchState.dist), this.cam.min, this.cam.max);
        this.cam.cx=this._touchState.world.x-(mid.x-this._clipCx)/this.cam.zoom;
        this.cam.cy=this._touchState.world.y-(mid.y-this._clipCy)/this.cam.zoom;
        this._clampCam(); e.preventDefault();
      }
    };
    this._onTouchEnd=(e)=>{ if (!e.touches || e.touches.length<2){ this._touchState=null; if (this.pinching){ this.pinching=false; this._suppressTapUntil=this.t+0.3; } } };
    this._onPointerUpCoord=(e)=>{
      if (this.pinching || this.t < (this._suppressTapUntil||0)) return;
      const p=clientToCanvasXY(e.clientX, e.clientY);
      if (!pointInRect(p, MAP.clip)) return;
      if (this.press && this.press.dragged) return;
      this._recordMapCoordinateFromScreen(p.x, p.y);
    };
    canvas.addEventListener('wheel', this._onWheel, {passive:false});
    canvas.addEventListener('touchstart', this._onTouchStart, {passive:false});
    canvas.addEventListener('touchmove', this._onTouchMove, {passive:false});
    canvas.addEventListener('touchend', this._onTouchEnd);
    canvas.addEventListener('touchcancel', this._onTouchEnd);
    canvas.addEventListener('pointerup', this._onPointerUpCoord);
  }
  _unbindInput(){
    if (this._onWheel) canvas.removeEventListener('wheel', this._onWheel);
    if (this._onTouchStart) canvas.removeEventListener('touchstart', this._onTouchStart);
    if (this._onTouchMove) canvas.removeEventListener('touchmove', this._onTouchMove);
    if (this._onTouchEnd){ canvas.removeEventListener('touchend', this._onTouchEnd); canvas.removeEventListener('touchcancel', this._onTouchEnd); }
    if (this._onPointerUpCoord) canvas.removeEventListener('pointerup', this._onPointerUpCoord);
  }

  /* ---- 入力 ---- */
  update(dt, game){
    this.t+=dt; this.particles.update(dt);
    if (this.messageT>0) this.messageT-=dt;
    const p=game.input.pointer; this.hover=null;

    if (this.overlay){ this._updateOverlay(game, p); return; }

    const btns = this._buttons();
    updateButtonHot(btns, p);
    if (!this.showClans && !this.castleEdit && pointInRect(p, MAP.clip)) this.hover = this._pickProvince(p.x, p.y);

    // ピンチ中はパン/タップを無効化
    if (this.pinching){ this.press=null; this.dragLast=null; return; }
    if (this.castleEdit){ this._updateCastleEditor(game, p, btns); return; }

    if (p.justPressed){
      this.press = {x:p.x, y:p.y, dragged:false, onBtn: btns.some(b=>b.on!==false && pointInRect(p,b))};
      this.dragLast = {x:p.x, y:p.y};
    }
    if (this.press && p.isDown){
      if (Math.hypot(p.x-this.press.x, p.y-this.press.y)>10) this.press.dragged = true;
      // ドラッグ/スワイプで地図をパン（ボタン上開始・一覧表示中は除く）
      if (this.press.dragged && this.dragLast && !this.press.onBtn && !this.showClans){
        this.cam.cx -= (p.x-this.dragLast.x)/this.cam.zoom;
        this.cam.cy -= (p.y-this.dragLast.y)/this.cam.zoom;
        this._clampCam();
      }
      this.dragLast = {x:p.x, y:p.y};
    }
    if (this.press && !p.isDown){
      const press=this.press; this.press=null; this.dragLast=null;
      if (this.t < (this._suppressTapUntil||0)) return;
      if (!press.dragged) this._activateMapPoint(game, press.x, press.y, btns);
    }
  }
  _castleAddUi(){
    if (!castleAddPanel) return null;
    return {
      panel:castleAddPanel,
      name:document.getElementById('castleAddName'),
      x:document.getElementById('castleAddX'),
      y:document.getElementById('castleAddY'),
      daimyo:document.getElementById('castleAddDaimyo'),
      province:document.getElementById('castleAddProvince'),
      confirm:document.getElementById('castleAddConfirm'),
      cancel:document.getElementById('castleAddCancel')
    };
  }
  _startCastleAdd(game){
    const ui=this._castleAddUi(); if (!ui) return;
    this.castleAddOpen=true; this.castleEdit=false; this.showClans=false;
    document.body.classList.add('castle-add-open');
    ui.daimyo.innerHTML='';
    daimyoOf(this.state).filter(d=>this.state.daimyo[d.id] && this.state.daimyo[d.id].alive!==false).forEach(d=>{
      const opt=document.createElement('option'); opt.value=d.id; opt.textContent=d.nameJP+'家'; ui.daimyo.appendChild(opt);
    });
    ui.daimyo.value=this.state.playerDaimyo;
    if (this.lastMapCoord){ ui.x.value=this.lastMapCoord.x; ui.y.value=this.lastMapCoord.y; }
    ui.confirm.onclick=()=>this._confirmCastleAdd(game);
    ui.cancel.onclick=()=>this._hideCastleAddPanel();
    if (game && game.audio) game.audio.beep(720,0.06,'triangle');
    this._flash('地図をクリックして城の座標を指定してください');
  }
  _hideCastleAddPanel(){
    this.castleAddOpen=false;
    if (castleAddPanel) document.body.classList.remove('castle-add-open');
  }
  _syncCastleAddCoord(pt){
    const ui=this._castleAddUi();
    if (!ui || !pt) return;
    ui.x.value=pt.x; ui.y.value=pt.y;
  }
  _recordMapCoordinateFromScreen(x, y){
    if (!pointInRect({x,y}, MAP.clip)) return null;
    const w=this._screenToWorld(x,y);
    const pt=mapWorldToImagePoint(w.x,w.y);
    if (!pt) return null;
    this.lastMapCoord=pt;
    if (this.castleAddOpen) this._syncCastleAddCoord(pt);
    return pt;
  }
  _nearestProvinceByWorld(wx, wy){
    let best=null, bestD=Infinity;
    for (const p of DATA.provinces){
      if (p.id && p.id.startsWith('custom_castle_')) continue;
      const [px,py]=provinceScreenPoint(p);
      const d=Math.hypot(px-wx, py-wy);
      if (d<bestD){ bestD=d; best=p.id; }
    }
    return best;
  }
  _confirmCastleAdd(game){
    const ui=this._castleAddUi(); if (!ui) return;
    const castleName=(ui.name.value||'').trim();
    const provinceName=(ui.province.value||castleName.replace(/城$/,'')||'追加国').trim();
    const daimyoId=ui.daimyo.value || this.state.playerDaimyo;
    const img=ASSETS.img.map;
    const iw=img && (img.naturalWidth||img.width), ih=img && (img.naturalHeight||img.height);
    const rawX=(ui.x.value||'').trim(), rawY=(ui.y.value||'').trim();
    const x=Number(rawX), y=Number(rawY);
    if (!castleName){ this._flash('城名を入力してください'); return; }
    if (!iw || !ih || rawX==='' || rawY==='' || !Number.isFinite(x) || !Number.isFinite(y)){ this._flash('地図上をクリックして座標を指定してください'); return; }
    const mx=clamp01(x/iw), my=clamp01(y/ih);
    const world=mapImagePointToWorld(mx,my);
    const neighborId=this._nearestProvinceByWorld(world.x, world.y);
    const id=customCastleId(castleName);
    const c={id, castleName, provinceName, daimyoId, mx, my, x:Math.round(x), y:Math.round(y), neighborId, terrain:'plain', kokudaka:50};
    CUSTOM_CASTLES.push(c); saveCustomCastles(); addCustomCastleToData(c); saveCastlePositionOverrides();
    ensureCustomCastlesInState(this.state);
    this.cells=computeProvinceCells(); this.selected=id; this.mode='select'; this.hover=null;
    this._hideCastleAddPanel(); this._save();
    if (game && game.audio) game.audio.beep(880,0.08,'triangle');
    this._flash(castleName+'を追加しました');
  }
  _startCastleEdit(game){
    this.castleEdit=true; this.showClans=false; this.mode='select'; this.selected=null; this.hover=null; this.dragCastle=null;
    if (game && game.audio) game.audio.beep(720,0.06,'triangle');
    this._flash('城をドラッグして位置を調整できます');
  }
  _finishCastleEdit(game){
    this.castleEdit=false; this.dragCastle=null; saveCastlePositionOverrides(); this.cells=computeProvinceCells();
    if (game && game.audio) game.audio.beep(880,0.08,'triangle');
    this._flash('城の位置を確定しました');
  }
  _updateCastleEditor(game, p, btns){
    if (p.justPressed){
      for (const b of btns){
        if ((b.on!==false)&&pointInRect(p,b)){
          this.press=null; this.dragLast=null; this.dragCastle=null;
          game.audio.beep(600,0.05,'sine'); b.action(game); return;
        }
      }
      const hit=this._pickCastleMarker(p.x,p.y);
      this.press = {x:p.x, y:p.y, dragged:false, onBtn:false, onCastle:!!hit};
      this.dragLast = {x:p.x, y:p.y};
      if (hit){
        const w=this._screenToWorld(p.x,p.y);
        this.dragCastle={id:hit.id, ox:0, oy:0};
        setCastlePositionOverride(hit.id, w.x, w.y);
        const pt=castleOverridePoint(hit.id);
        CASTLE_LAND_SNAP_CACHE[hit.id + ':' + Math.round(pt[0]) + ',' + Math.round(pt[1])] = {x:pt[0], y:pt[1]};
        this.selected=hit.id;
      } else {
        this.dragCastle=null;
      }
    }
    if (this.press && p.isDown){
      if (Math.hypot(p.x-this.press.x, p.y-this.press.y)>10) this.press.dragged = true;
      if (this.dragCastle){
        const w=this._screenToWorld(p.x,p.y), d=this.dragCastle, c=MAP.clip;
        const nx=clamp(w.x-d.ox, c.x+16, c.x+c.w-16), ny=clamp(w.y-d.oy, c.y+16, c.y+c.h-16);
        setCastlePositionOverride(d.id, nx, ny);
        const pt=castleOverridePoint(d.id);
        CASTLE_LAND_SNAP_CACHE[d.id + ':' + Math.round(pt[0]) + ',' + Math.round(pt[1])] = {x:pt[0], y:pt[1]};
      } else if (this.press.dragged && this.dragLast){
        this.cam.cx -= (p.x-this.dragLast.x)/this.cam.zoom;
        this.cam.cy -= (p.y-this.dragLast.y)/this.cam.zoom;
        this._clampCam();
      }
      this.dragLast = {x:p.x, y:p.y};
    }
    if (this.press && !p.isDown){
      const press=this.press; this.press=null; this.dragLast=null;
      if (this.dragCastle){
        const d=this.dragCastle, cur=castleOverridePoint(d.id);
        if (cur){ const fixed=snapCastlePointToLand(d.id, cur[0], cur[1]); setCastlePositionOverride(d.id, fixed[0], fixed[1]); }
        saveCastlePositionOverrides();
        this.cells=computeProvinceCells();
        this.dragCastle=null;
      } else if (!press.dragged){
        this._recordMapCoordinateFromScreen(p.x, p.y);
      }
    }
  }
  _pickCastleMarker(x,y){
    if (!pointInRect({x,y}, MAP.clip)) return null;
    let best=null, bestScore=Infinity;
    for (const p of DATA.provinces){
      const prov=this.state.provinces[p.id]; if (!prov || !prov.owner) continue;
      const [cx,cy]=provinceScreenPoint(p);
      const marker=this._worldToScreen(cx-7, cy+12);
      const castleName=castleNameForProvince(p);
      const labelH=Math.max(44, Array.from(castleName).length*18+18);
      const labelW=54;
      const labelX=marker.x-labelW/2, labelY=marker.y-labelH-22;
      const dx=Math.max(labelX-x, 0, x-(labelX+labelW));
      const dy=Math.max(labelY-y, 0, y-(labelY+labelH+58));
      const rectDist=Math.hypot(dx,dy);
      const markerDist=Math.hypot(x-marker.x, y-marker.y);
      const score=Math.min(markerDist, rectDist);
      if (score<bestScore){ bestScore=score; best=p; }
    }
    return bestScore<=96 ? best : null;
  }
  _activateMapPoint(game, x, y, btns){
    const p={x,y};
    for (const b of btns){ if ((b.on!==false)&&pointInRect(p,b)){ game.audio.beep(600,0.06,'triangle'); b.action(game); return; } }
    if (this.showClans) return;
    const pid = this._pickProvince(x, y);
    if (pid) this._clickProvince(game, pid);
  }
  _pickProvince(x,y){
    if (!pointInRect({x,y}, MAP.clip)) return null;
    const w=this._screenToWorld(x,y);
    for (const id in this.cells){ if (this.cells[id].length>=3 && pointInPoly(w.x,w.y,this.cells[id])) return id; }
    return null;
  }
  _clickProvince(game, pid){
    const st=this.state; const prov=st.provinces[pid];
    if (this.mode==='select'){
      if (prov.owner===st.playerDaimyo){ this.selected=pid; this.mode='province'; game.audio.beep(720,0.05,'sine'); }
      else { this.overlay={type:'provinceInfo', pid}; }
    } else if (this.mode==='province'){
      if (pid===this.selected){ this.selected=null; this.mode='select'; return; }
      const src=st.provinces[this.selected];
      if (neighborsOf(this.selected).includes(pid)){
        if (src.hasActed){ this._flash('この洲は今ターン既に出陣済'); return; }
        if (src.soldiers<=100){ this._flash('兵が足りません'); return; }
        this._openMarch(this.selected, pid);
      } else if (prov.owner===st.playerDaimyo){
        this.selected=pid; // 別の自国洲へ選択切替
      } else {
        this.overlay={type:'provinceInfo', pid};
      }
    }
  }

  /* ---- 出陣（March）オーバーレイ ---- */
  _openMarch(srcId, dstId){
    const st=this.state; const src=st.provinces[srcId];
    const maxSend = src.soldiers-100;
    this.march = {
      srcId, dstId,
      troops: Math.max(100, Math.round(maxSend*0.6/100)*100),
      maxSend,
      generals: src.generals.filter(g=>st.generals[g].alive).slice(),
      pick: {},
    };
    // デフォルトで最強武将を選択
    const bg = bestGeneralIn(st, srcId);
    if (bg) this.march.pick[bg]=true;
    this.overlay={type:'march'};
  }
  _confirmMarch(game, auto){
    const st=this.state, m=this.march;
    const src=st.provinces[m.srcId], dst=st.provinces[m.dstId];
    const troops=clamp(m.troops, 100, m.maxSend);
    const gens=Object.keys(m.pick).filter(g=>m.pick[g]);
    const enemy = dst.owner!==st.playerDaimyo;
    src.soldiers -= troops;
    // 武将を出陣元から外す
    gens.forEach(g=>{ const i=src.generals.indexOf(g); if(i>=0) src.generals.splice(i,1); });
    src.hasActed=true;
    if (!enemy){
      // 増援（自国洲へ移動）
      dst.soldiers += troops;
      gens.forEach(g=>{ st.generals[g].location=m.dstId; dst.generals.push(g); });
      this.overlay=null; this.march=null; this.selected=null; this.mode='select';
      game.audio.beep(520,0.1,'sine'); this._flash('増援を送りました'); this._save();
      return;
    }
    // 攻撃
    const ctx = this._buildBattleContext(m.srcId, m.dstId, troops, gens);
    this.overlay=null; this.march=null;
    if (auto){
      this._resolveAutoPlayerBattle(game, ctx);
    } else {
      st.pendingBattle = ctx;
      game.changeScene(new BattleScene(st));
    }
  }
  _buildBattleContext(srcId, dstId, troops, gens){
    const st=this.state; const dst=st.provinces[dstId];
    const dstOwner = dst.owner;
    const dDef = dstOwner? daimyoDef(st, dstOwner) : null;
    return {
      srcId, dstId,
      year: st.year,
      attacker: { daimyo: st.playerDaimyo, family: daimyoDef(st,st.playerDaimyo).id, soldiers: troops, generals: gens },
      defender: { daimyo: dstOwner, family: dstOwner||'', soldiers: dst.soldiers, generals: dst.generals.filter(g=>st.generals[g].alive).slice(), castleLevel: dst.castleLevel },
      terrain: DATA.provById[dstId].terrain,
    };
  }
  _resolveAutoPlayerBattle(game, ctx){
    const st=this.state;
    const res = autoResolveBattle({
      atkSoldiers:ctx.attacker.soldiers, atkGenerals:ctx.attacker.generals, atkFamily:ctx.attacker.family,
      defSoldiers:ctx.defender.soldiers, defGenerals:ctx.defender.generals, defFamily:ctx.defender.family,
      year:ctx.year, castleLevel:ctx.defender.castleLevel, terrain:ctx.terrain,
    });
    applyBattleResult(st, ctx, res);
    game.audio.jingle(res.attackerWins?[{f:523,d:0.1},{f:784,d:0.16}]:[{f:392,d:0.12},{f:262,d:0.2}]);
    this.overlay={type:'battleResult', data: st.pendingResult}; st.pendingResult=null;
    this.selected=null; this.mode='select'; this._save();
  }

  /* ---- コマンド: 内政/徴兵 ---- */
  _develop(game){
    const st=this.state, pid=this.selected, prov=st.provinces[pid];
    const cost=220;
    if (st.daimyo[st.playerDaimyo].gold<cost){ this._flash('金が足りません'); return; }
    if (prov.development>=95){ this._flash('開発度は最大です'); return; }
    st.daimyo[st.playerDaimyo].gold-=cost;
    prov.development=clamp(prov.development+6,0,95);
    game.audio.beep(680,0.08,'sine'); this._flash('開発度+6'); this._save();
  }
  _castle(game){
    const st=this.state, pid=this.selected, prov=st.provinces[pid];
    if (prov.castleLevel>=5){ this._flash('城は最大規模です'); return; }
    const cost=(prov.castleLevel+1)*700;
    if (st.daimyo[st.playerDaimyo].gold<cost){ this._flash('金が足りません'); return; }
    st.daimyo[st.playerDaimyo].gold-=cost;
    prov.castleLevel++;
    game.audio.beep(560,0.12,'triangle'); this._flash('城を強化（Lv'+prov.castleLevel+'）'); this._save();
  }
  _recruit(game){
    const st=this.state, pid=this.selected, prov=st.provinces[pid];
    const add=500;
    const cap=DATA.provById[pid].kokudaka*4 + prov.castleLevel*600;
    if (prov.soldiers>=cap){ this._flash('これ以上徴兵できません'); return; }
    const bg=bestGeneralIn(st,pid); const sei=bg?DATA.genById[bg].stats.sei:45;
    const cost=Math.round(add*(0.6 - sei/400));
    if (st.daimyo[st.playerDaimyo].gold<cost){ this._flash('金が足りません'); return; }
    st.daimyo[st.playerDaimyo].gold-=cost;
    prov.soldiers=Math.min(cap, prov.soldiers+add);
    game.audio.beep(440,0.1,'square'); this._flash('兵+'+add+'（費用 '+cost+'貫）'); this._save();
  }

  /* ---- ターン終了 → AI処理 ---- */
  _endTurn(game){
    const st=this.state;
    // 収入
    daimyoOf(st).forEach(d=>{
      if (!st.daimyo[d.id].alive) return;
      let inc=0;
      ownedProvinces(st,d.id).forEach(pid=>{
        const prov=st.provinces[pid];
        inc += Math.round(DATA.provById[pid].kokudaka*(prov.development/100)*SEASONS[st.season].mod*0.9);
      });
      st.daimyo[d.id].gold += inc;
    });
    // AI 各大名
    const aiLog=[];
    daimyoOf(st).forEach(d=>{
      if (d.id===st.playerDaimyo || !st.daimyo[d.id].alive) return;
      runStrategicAI(st, d, aiLog);
    });
    // 行動フラグ・季節・ターン更新
    for (const pid in st.provinces) st.provinces[pid].hasActed=false;
    st.season=(st.season+1)%4;
    if (st.season===0) st.year++;
    st.turn++;
    this.selected=null; this.mode='select';
    this._updateDaimyoAlive();
    this.overlay={type:'turnSummary', data:aiLog};
    game.audio.beep(500,0.12,'triangle');
    this._save();
    this._checkEnd(game);
  }
  _updateDaimyoAlive(){
    const st=this.state;
    daimyoOf(st).forEach(d=>{ if (ownedProvinces(st,d.id).length===0) st.daimyo[d.id].alive=false; });
  }
  _checkEnd(game){
    const st=this.state;
    const mine=ownedProvinces(st, st.playerDaimyo).length;
    if (mine===0){ this.overlay={type:'gameover', win:false}; }
    else if (mine===DATA.provinces.length){ this.overlay={type:'gameover', win:true}; }
  }

  _drawMap(ctx){
    ctx.save();
    ctx.beginPath(); ctx.rect(MAP.clip.x, MAP.clip.y, MAP.clip.w, MAP.clip.h); ctx.clip();
    ctx.save();
    this._camApply(ctx);

    this._drawCastleEditHints(ctx);

  _drawCastleLayer(ctx){
    const st=this.state;
    const occupied=[];
    const overlaps=(a,b)=>!(a.x+a.w<b.x || b.x+b.w<a.x || a.y+a.h<b.y || b.y+b.h<a.y);
    const clampRect=(r)=>({
      x:clamp(r.x, MAP.clip.x+4, MAP.clip.x+MAP.clip.w-r.w-4),
      y:clamp(r.y, MAP.clip.y+4, MAP.clip.y+MAP.clip.h-r.h-4),
      w:r.w, h:r.h
    });
    const entries = DATA.provinces.map(p=>{
      const prov=st.provinces[p.id];
      const dd=prov.owner?daimyoDef(st, prov.owner):null;
      const capital = !!(dd && dd.capital===p.id);
      const hot = p.id===this.selected || p.id===this.hover;
      return {p, prov, dd, capital, hot, priority:(hot?10000:0)+(capital?5000:0)+p.kokudaka};
    }).filter(e=>e.dd).sort((a,b)=>b.priority-a.priority);
    for (const e of entries){
      const p=e.p, dd=e.dd;
      const [cx, cy]=provinceScreenPoint(p);
      const iconSize=e.capital?25:20;
      drawCastleIcon(ctx, cx-7, cy+12, iconSize, dd.color);
      const name=castleNameForProvince(p);
      const force=e.hot;
      const labelSize=force?17:(e.capital?15:14);
      const gap=force?17:(e.capital?15:14);
      const labelH=Math.max(24, Array.from(name).length*gap+10);
      const labelW=labelSize+14;
      const crestSize=e.capital?26:22;        // 城アイコンに被せる家紋（やや大きめで覆う）
      const icx=cx-7, icy=cy+12;              // 城アイコンの中心
      const crestX=icx-crestSize/2, crestY=icy-crestSize/2;   // アイコン中心に重ねる
      occupied.push({x:crestX, y:crestY, w:crestSize, h:crestSize});  // 家紋の占有（他の城名が重ならないように）
      // ラベルが海へはみ出さないよう陸地率を見る（既存ロジック踏襲）
      const seaFracRect=(r)=>{ let s=0,n=0; const stepX=Math.max(6,r.w/3);
        for (let sx=r.x+4; sx<=r.x+r.w-2; sx+=stepX) for (let sy=r.y+4; sy<=r.y+r.h-2; sy+=12){ n++; if (!isLandWorld(sx,sy)) s++; }
        return n? s/n : 0; };
      // 城名は家紋の「すぐ上」に。基本は真上中央、重なる時だけ僅かに横ずらし／少し上へ
      const nameRect=(dx,dy)=>clampRect({x:icx+dx-labelW/2, y:crestY-3-labelH+dy, w:labelW, h:labelH});
      const cand=[ [0,0],[14,0],[-14,0],[0,-12],[26,0],[-26,0] ];
      let pick=null, best=null;
      for (const [dx,dy] of cand){
        const r=nameRect(dx,dy);
        const collide=occupied.some(o=>overlaps(r,o));
        const sea=seaFracRect(r);
        if (!collide && sea<=0.12){ pick=r; break; }   // 真上中央が空き＆陸地：即採用
        const score=(collide?1:0)+sea+(Math.abs(dx)+Math.abs(dy))*0.01;  // 小さいほど良い（中央・すぐ上を優先）
        if (!best || score<best.score) best={r,score};
      }
      const nrect = pick || (best?best.r:nameRect(0,0));
      // 描画: 城アイコンに家紋を被せ、その上に城名
      drawKamon(ctx, dd.id, crestX, crestY, crestSize, dd.color);
      drawVerticalLabel(ctx, name, nrect.x+nrect.w/2, nrect.y, {size:labelSize, gap, fill:force?'rgba(8,12,18,0.92)':'rgba(8,12,18,0.70)', stroke:dd.color, color:'#ffffff'});
      occupied.push(nrect);
    }
  }

  _drawMarch(ctx){
