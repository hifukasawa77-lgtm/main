<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CITY BUILDER</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#a8d8ea;--panel:#f5f5f5;--border:#d0d0d0;--txt:#333;--txt2:#777;
  --blue:#2979ff;--red:#e53935;--green:#43a047;--amber:#f9a825;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--sky);color:var(--txt);font-family:'Segoe UI',Arial,sans-serif;user-select:none}
#app{display:grid;grid-template-rows:46px 1fr;grid-template-columns:186px 1fr;height:100vh}

/* HUD */
#hud{
  grid-column:1/-1;grid-row:1;display:flex;align-items:center;gap:0;
  background:#fff;border-bottom:2px solid var(--border);padding:0 14px;
  font-size:.76rem;box-shadow:0 2px 6px rgba(0,0,0,.08);flex-shrink:0;
}
.hud-title{font-size:.94rem;font-weight:800;color:var(--blue);letter-spacing:.5px;margin-right:20px}
.stat{display:flex;align-items:center;gap:4px;margin-right:16px}
.stat-lbl{color:var(--txt2);font-size:.68rem}
.stat-val{font-weight:700;color:var(--txt)}
.stat-val.neg{color:var(--red)}.stat-val.pos{color:var(--green)}
#hud-yr{margin-left:auto;font-weight:700;color:var(--blue);font-size:.76rem}

/* Sidebar */
#sidebar{
  grid-column:1;grid-row:2;background:var(--panel);border-right:1px solid var(--border);
  padding:8px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
}
.tg-label{font-size:.58rem;font-weight:700;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;padding:0 3px;margin-bottom:3px}
.tool-btn{
  display:flex;align-items:center;gap:7px;width:100%;
  padding:6px 8px;background:#fff;border:1.5px solid var(--border);
  border-radius:6px;color:var(--txt);font-family:inherit;font-size:.74rem;
  cursor:pointer;text-align:left;transition:all .1s;margin-bottom:2px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.tool-btn:hover{border-color:#aaa;background:#fafafa}
.tool-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(41,121,255,.3)}
.tool-icon{width:22px;height:22px;border-radius:3px;flex-shrink:0;image-rendering:pixelated}
.tool-cost{margin-left:auto;font-size:.66rem;color:var(--txt2);font-weight:600;white-space:nowrap}
.tool-btn.active .tool-cost{color:rgba(255,255,255,.85)}
#tips{margin-top:auto;border-top:1px solid var(--border);padding:8px 3px 0;font-size:.6rem;color:var(--txt2);line-height:1.8}

/* Canvas */
#canvas-wrap{grid-column:2;grid-row:2;position:relative;overflow:hidden;cursor:crosshair}
#city-canvas{display:block}

/* Toast */
#toast{
  position:absolute;bottom:62px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,.88);color:#fff;border-radius:22px;
  padding:7px 20px;font-size:.78rem;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap;
}
#toast.show{opacity:1}
#toast.err{background:rgba(229,57,53,.92)}
#toast.ok{background:rgba(67,160,71,.92)}

/* Controls */
#ctrl{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:4px}
.ctrl-btn{
  width:32px;height:32px;background:#fff;border:1.5px solid var(--border);
  border-radius:7px;color:var(--txt);font-size:1.05rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.1);
}
.ctrl-btn:hover{background:#f0f0f0}
#speed-ctrl{position:absolute;left:12px;bottom:12px;display:flex;gap:4px}
.spd-btn{
  padding:5px 10px;background:#fff;border:1.5px solid var(--border);
  border-radius:7px;color:var(--txt2);font-family:inherit;font-size:.7rem;
  cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.08);transition:all .1s;
}
.spd-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
#minimap-wrap{
  position:absolute;right:12px;top:12px;border:2px solid var(--border);
  background:#fff;border-radius:5px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12);
}
#minimap{display:block;image-rendering:pixelated}
</style>
</head>
<body>
<div id="app">
<div id="hud">
  <span class="hud-title">🏙️ CITY BUILDER</span>
  <span class="stat"><span class="stat-lbl">💰 資金</span><span class="stat-val" id="hv-funds">$10,000</span></span>
  <span class="stat"><span class="stat-lbl">👥 人口</span><span class="stat-val" id="hv-pop">0</span></span>
  <span class="stat"><span class="stat-lbl">😊 幸福</span><span class="stat-val" id="hv-happy">100%</span></span>
  <span class="stat"><span class="stat-lbl">📈 収入</span><span class="stat-val" id="hv-income">$0</span></span>
  <span id="hud-yr">📅 年：<span id="hv-year">1</span></span>
</div>

<div id="sidebar">
  <div>
    <div class="tg-label">道路・交通</div>
    <button class="tool-btn active" data-tool="road"><canvas class="tool-icon" id="ico-road"></canvas>道路<span class="tool-cost">$50</span></button>
    <button class="tool-btn" data-tool="rail"><canvas class="tool-icon" id="ico-rail"></canvas>線路<span class="tool-cost">$80</span></button>
    <button class="tool-btn" data-tool="station"><canvas class="tool-icon" id="ico-station"></canvas>駅<span class="tool-cost">$1,000</span></button>
    <button class="tool-btn" data-tool="airport"><canvas class="tool-icon" id="ico-airport"></canvas>空港<span class="tool-cost">$5,000</span></button>
  </div>
  <div>
    <div class="tg-label">ゾーニング</div>
    <button class="tool-btn" data-tool="residential"><canvas class="tool-icon" id="ico-residential"></canvas>住宅<span class="tool-cost">$200</span></button>
    <button class="tool-btn" data-tool="commercial"><canvas class="tool-icon" id="ico-commercial"></canvas>商業<span class="tool-cost">$400</span></button>
    <button class="tool-btn" data-tool="industrial"><canvas class="tool-icon" id="ico-industrial"></canvas>工業<span class="tool-cost">$300</span></button>
    <button class="tool-btn" data-tool="park"><canvas class="tool-icon" id="ico-park"></canvas>公園<span class="tool-cost">$100</span></button>
  </div>
  <div>
    <div class="tg-label">公共施設</div>
    <button class="tool-btn" data-tool="police"><canvas class="tool-icon" id="ico-police"></canvas>警察署<span class="tool-cost">$600</span></button>
    <button class="tool-btn" data-tool="fire"><canvas class="tool-icon" id="ico-fire"></canvas>消防署<span class="tool-cost">$500</span></button>
    <button class="tool-btn" data-tool="hospital"><canvas class="tool-icon" id="ico-hospital"></canvas>病院<span class="tool-cost">$800</span></button>
    <button class="tool-btn" data-tool="school"><canvas class="tool-icon" id="ico-school"></canvas>学校<span class="tool-cost">$400</span></button>
    <button class="tool-btn" data-tool="stadium"><canvas class="tool-icon" id="ico-stadium"></canvas>スタジアム<span class="tool-cost">$2,000</span></button>
  </div>
  <div>
    <div class="tg-label">電力</div>
    <button class="tool-btn" data-tool="power"><canvas class="tool-icon" id="ico-power"></canvas>発電所<span class="tool-cost">$1,000</span></button>
    <button class="tool-btn" data-tool="thermal"><canvas class="tool-icon" id="ico-thermal"></canvas>火力発電所<span class="tool-cost">$2,000</span></button>
    <button class="tool-btn" data-tool="nuclear"><canvas class="tool-icon" id="ico-nuclear"></canvas>原子力発電所<span class="tool-cost">$10,000</span></button>
  </div>
  <div>
    <div class="tg-label">ユーティリティ <span style="font-size:.55rem;opacity:.6">(重ね置き可)</span></div>
    <button class="tool-btn" data-tool="powerline"><canvas class="tool-icon" id="ico-powerline"></canvas>送電線<span class="tool-cost">$40</span></button>
    <button class="tool-btn" data-tool="gas"><canvas class="tool-icon" id="ico-gas"></canvas>ガス管<span class="tool-cost">$30</span></button>
    <button class="tool-btn" data-tool="water"><canvas class="tool-icon" id="ico-water"></canvas>水道管<span class="tool-cost">$25</span></button>
    <button class="tool-btn" data-tool="sewer"><canvas class="tool-icon" id="ico-sewer"></canvas>下水<span class="tool-cost">$20</span></button>
  </div>
  <div>
    <div class="tg-label">ツール</div>
    <button class="tool-btn" data-tool="bulldoze"><canvas class="tool-icon" id="ico-bulldoze"></canvas>撤去<span class="tool-cost">$10</span></button>
  </div>
  <div id="tips">
    右ドラッグ: 移動<br>
    ホイール: ズーム<br>
    R線 J路 K駅 A空港<br>
    H住 C商 I工 P公園<br>
    Q警 F消 M病 O学<br>
    D競 E発 T火力 N原子<br>
    L電線 G瓦斯 W水 Z下水<br>
    B撤去
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="city-canvas"></canvas>
  <div id="toast"></div>
  <div id="minimap-wrap"><canvas id="minimap" width="100" height="100"></canvas></div>
  <div id="ctrl">
    <button class="ctrl-btn" id="zoom-in">+</button>
    <button class="ctrl-btn" id="zoom-out">−</button>
    <button class="ctrl-btn" id="center-btn" style="font-size:.75rem">⌖</button>
  </div>
  <div id="speed-ctrl">
    <button class="spd-btn" data-spd="0">⏸</button>
    <button class="spd-btn active" data-spd="1">▶</button>
    <button class="spd-btn" data-spd="3">▶▶</button>
  </div>
</div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
//  Tile type enum
// ════════════════════════════════════════════════════════════
const T = {
  EMPTY:0, ROAD:1, RESIDENTIAL:2, COMMERCIAL:3, INDUSTRIAL:4, PARK:5,
  POWER:6, THERMAL:7, NUCLEAR:8,
  POLICE:9, FIRE:10, HOSPITAL:11, SCHOOL:12,
  STADIUM:13, AIRPORT:14,
  RAIL:15, STATION:16,
};
const GRID=40, BASE=32, SIM_MS=5000;

const COSTS={
  road:50,rail:80,station:1000,airport:5000,
  residential:200,commercial:400,industrial:300,park:100,
  police:600,fire:500,hospital:800,school:400,stadium:2000,
  power:1000,thermal:2000,nuclear:10000,
  powerline:40,gas:30,water:25,sewer:20,
  bulldoze:10,
};
const EXPENSE_T={
  [T.ROAD]:2,[T.RAIL]:3,[T.STATION]:40,[T.AIRPORT]:500,
  [T.RESIDENTIAL]:1,[T.COMMERCIAL]:5,[T.INDUSTRIAL]:7,[T.PARK]:1,
  [T.POLICE]:80,[T.FIRE]:60,[T.HOSPITAL]:100,[T.SCHOOL]:50,[T.STADIUM]:200,
  [T.POWER]:28,[T.THERMAL]:60,[T.NUCLEAR]:200,
};
const INCOME_COM=[0,80,150,260];
const INCOME_IND=[0,45,90,160];
const POP_LV=[0,14,32,60];

const UTIL_TOOLS=new Set(['powerline','gas','water','sewer']);
const TOOL_TYPE={
  road:T.ROAD,rail:T.RAIL,station:T.STATION,airport:T.AIRPORT,
  residential:T.RESIDENTIAL,commercial:T.COMMERCIAL,industrial:T.INDUSTRIAL,park:T.PARK,
  police:T.POLICE,fire:T.FIRE,hospital:T.HOSPITAL,school:T.SCHOOL,stadium:T.STADIUM,
  power:T.POWER,thermal:T.THERMAL,nuclear:T.NUCLEAR,
};

// ════════════════════════════════════════════════════════════
//  Grid
// ════════════════════════════════════════════════════════════
function mkTile(type){
  return{type,level:type===0?0:1,powered:false,road:false,rail:false,
    gasAccess:false,waterAccess:false,sewerAccess:false,
    pollution:0,growTimer:0,
    util:{gas:false,water:false,powerline:false,sewer:false}};
}
const grid=Array.from({length:GRID},()=>Array.from({length:GRID},()=>mkTile(T.EMPTY)));

const gs={
  funds:10000,year:1,population:0,happiness:100,income:0,
  tool:'road',speed:1,
  cam:{x:0,y:0},zoom:1.6,
  hover:null,dragging:false,dragPt:null,drawing:false,lastSim:0,
};

// ════════════════════════════════════════════════════════════
//  Canvas setup
// ════════════════════════════════════════════════════════════
const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('city-canvas');
const ctx=canvas.getContext('2d');
const mm=document.getElementById('minimap');
const mctx=mm.getContext('2d');

function ts(){return BASE*gs.zoom;}
function resize(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;if(gs.cam.x===0&&gs.cam.y===0)center();}
function center(){gs.cam.x=(canvas.width-GRID*ts())/2;gs.cam.y=(canvas.height-GRID*ts())/2;}
resize();window.addEventListener('resize',resize);

// ════════════════════════════════════════════════════════════
//  Drawing helpers
// ════════════════════════════════════════════════════════════
function drand(x,y,n){return Math.abs(Math.sin(x*127.1+y*311.7+n*74.3))%1;}

function grass(c,s){
  c.fillStyle='#7ec850';c.fillRect(0,0,s,s);
  c.fillStyle='rgba(0,0,0,.04)';c.fillRect(0,0,s,s*.5);
  c.strokeStyle='rgba(0,0,0,.07)';c.lineWidth=.5;c.strokeRect(.5,.5,s-1,s-1);
}
function drawStar(c,cx,cy,n,R,r){
  c.beginPath();
  for(let i=0;i<n*2;i++){const rad=i%2?r:R,a=(i*Math.PI/n)-Math.PI/2;i?c.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a)):c.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));}
  c.closePath();c.fill();
}
function hasAdj(tx,ty,check){
  return[[0,1],[0,-1],[1,0],[-1,0]].some(([dx,dy])=>{
    const nx=tx+dx,ny=ty+dy;
    return nx>=0&&ny>=0&&nx<GRID&&ny<GRID&&check(grid[ny][nx]);
  });
}

// ════════════════════════════════════════════════════════════
//  Tile draw functions
// ════════════════════════════════════════════════════════════
function drawEmpty(c,s){grass(c,s);}

function drawRoad(c,s,tx,ty){
  grass(c,s);
  const L=tx>0&&grid[ty][tx-1].type===T.ROAD,R=tx<GRID-1&&grid[ty][tx+1].type===T.ROAD;
  const U=ty>0&&grid[ty-1][tx].type===T.ROAD,D=ty<GRID-1&&grid[ty+1][tx].type===T.ROAD;
  const mid=s/2,hw=s*.3;
  c.fillStyle='#888';
  c.fillRect(mid-hw,mid-hw,hw*2,hw*2);
  if(L||(!R&&!U&&!D))c.fillRect(0,mid-hw,mid-hw,hw*2);
  if(R||(!L&&!U&&!D))c.fillRect(mid+hw,mid-hw,mid-hw,hw*2);
  if(U||(!L&&!R&&!D))c.fillRect(mid-hw,0,hw*2,mid-hw);
  if(D||(!L&&!R&&!U))c.fillRect(mid-hw,mid+hw,hw*2,mid-hw);
  c.strokeStyle='#fff';c.lineWidth=Math.max(.8,s*.025);c.setLineDash([s*.12,s*.1]);
  c.beginPath();
  if(L||R||(!U&&!D)){c.moveTo(L?0:mid,mid);c.lineTo(R?s:mid,mid);}
  if(U||D){c.moveTo(mid,U?0:mid);c.lineTo(mid,D?s:mid);}
  if(!L&&!R&&!U&&!D){c.moveTo(0,mid);c.lineTo(s,mid);c.moveTo(mid,0);c.lineTo(mid,s);}
  c.stroke();c.setLineDash([]);
}

function drawRail(c,s,tx,ty){
  c.fillStyle='#c8a96e';c.fillRect(0,0,s,s);
  c.strokeStyle='rgba(0,0,0,.07)';c.lineWidth=.5;c.strokeRect(.5,.5,s-1,s-1);
  const L=tx>0&&grid[ty][tx-1].type===T.RAIL,R=tx<GRID-1&&grid[ty][tx+1].type===T.RAIL;
  const U=ty>0&&grid[ty-1][tx].type===T.RAIL,D=ty<GRID-1&&grid[ty+1][tx].type===T.RAIL;
  const hasH=L||R||(!U&&!D),hasV=U||D||(!L&&!R);
  const mid=s/2,rw=s*.08;
  // Rail tracks
  c.fillStyle='#aaa';
  if(hasH){
    const y1=mid-s*.2,y2=mid+s*.2-rw;
    c.fillRect(L?0:mid-rw,y1,L&&R?s:s*.5+rw,rw);
    c.fillRect(L?0:mid-rw,y2,L&&R?s:s*.5+rw,rw);
    // Ties
    c.fillStyle='#8b6914';
    for(let i=0;i<5;i++){const tx2=(i+.5)*s*.2;c.fillRect(tx2-s*.035,y1-s*.02,s*.07,y2-y1+rw+s*.04);}
  }
  if(hasV){
    const x1=mid-s*.2,x2=mid+s*.2-rw;
    c.fillStyle='#aaa';
    c.fillRect(x1,U?0:mid-rw,rw,U&&D?s:s*.5+rw);
    c.fillRect(x2,U?0:mid-rw,rw,U&&D?s:s*.5+rw);
    c.fillStyle='#8b6914';
    for(let i=0;i<5;i++){const ty2=(i+.5)*s*.2;c.fillRect(x1-s*.02,ty2-s*.035,x2-x1+rw+s*.04,s*.07);}
  }
}

function drawStation(c,s){
  grass(c,s);
  // Platform
  c.fillStyle='#d0d0d0';c.fillRect(s*.08,s*.35,s*.84,s*.55);
  // Building
  c.fillStyle='#e8e8e0';c.fillRect(s*.12,s*.14,s*.76,s*.28);
  c.fillStyle='#c0b040';c.fillRect(s*.12,s*.14,s*.76,s*.07);
  // Roof cover
  c.fillStyle='#4a4a4a';c.fillRect(s*.04,s*.32,s*.92,s*.06);
  // Windows
  c.fillStyle='#aad0f0';
  [.18,.38,.58,.78].forEach(x=>c.fillRect(s*x,s*.19,s*.14,s*.12));
  // Sign
  c.fillStyle='#2979ff';c.fillRect(s*.3,s*.38,s*.4,s*.1);
  c.fillStyle='#fff';c.font=`bold ${s*.08}px sans-serif`;c.textAlign='center';c.fillText('駅',s*.5,s*.465);
}

function drawAirport(c,s){
  grass(c,s);
  // Runway
  c.fillStyle='#555';c.fillRect(0,s*.44,s,s*.12);
  c.fillStyle='#fff';c.setLineDash([s*.06,s*.04]);
  c.beginPath();c.moveTo(0,s*.5);c.lineTo(s,s*.5);
  c.strokeStyle='#fff';c.lineWidth=s*.02;c.stroke();c.setLineDash([]);
  // Terminal
  c.fillStyle='#d8dde4';c.fillRect(s*.08,s*.06,s*.84,s*.32);
  c.fillStyle='#b0b8c4';c.fillRect(s*.08,s*.06,s*.84,s*.07);
  // Windows strip
  c.fillStyle='#aad0f0';
  for(let i=0;i<7;i++)c.fillRect(s*(.12+i*.12),s*.1,s*.08,s*.16);
  // Plane
  c.fillStyle='#e8e8e8';
  c.beginPath();
  c.ellipse(s*.5,s*.5,s*.12,s*.04,0,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(s*.42,s*.46);c.lineTo(s*.38,s*.38);c.lineTo(s*.48,s*.44);c.closePath();c.fill();
  c.beginPath();c.moveTo(s*.58,s*.46);c.lineTo(s*.62,s*.38);c.lineTo(s*.52,s*.44);c.closePath();c.fill();
}

function drawResidential(c,s,lv,powered){
  lv=lv||1;grass(c,s);
  if(lv===1){
    const bw=s*.56,bh=s*.46,bx=(s-bw)/2+2,by=s-bh-s*.07+2;
    c.fillStyle='rgba(0,0,0,.1)';c.fillRect(bx,by,bw,bh);
    c.fillStyle='#dde8f5';c.fillRect(bx-2,by-2,bw,bh);
    c.fillStyle=powered?'#c0392b':'#aaa';
    c.beginPath();c.moveTo(bx-2-s*.07,by-2);c.lineTo(bx-2+bw/2,by-2-bh*.45);c.lineTo(bx-2+bw+s*.07,by-2);c.closePath();c.fill();
    c.fillStyle='#7b5e3a';c.fillRect(bx-2+bw*.5-bw*.1,by-2+bh*.62,bw*.2,bh*.38);
    c.fillStyle=powered?'#fffde7':'#aaa';
    c.fillRect(bx-2+bw*.14,by-2+bh*.26,bw*.17,bh*.2);c.fillRect(bx-2+bw*.62,by-2+bh*.26,bw*.17,bh*.2);
  }else if(lv===2){
    const bw=s*.62,bh=s*.68,bx=(s-bw)/2+2,by=s-bh-s*.05+2;
    c.fillStyle='rgba(0,0,0,.1)';c.fillRect(bx,by,bw,bh);
    c.fillStyle='#b0c4de';c.fillRect(bx-2,by-2,bw,bh);
    c.fillStyle=powered?'#2980b9':'#999';c.fillRect(bx-2,by-2,bw,bh*.07);
    for(let r=0;r<3;r++)for(let cl=0;cl<3;cl++){
      c.fillStyle=powered?'#fffde7':'#ccc';
      c.fillRect(bx-2+bw*(.1+cl*.3),by-2+bh*(.16+r*.28),bw*.18,bh*.14);
    }
  }else{
    const bw=s*.52,bh=s*.88,bx=(s-bw)/2+2,by=s-bh-s*.04+2;
    c.fillStyle='rgba(0,0,0,.12)';c.fillRect(bx,by,bw,bh);
    const g=c.createLinearGradient(bx-2,0,bx-2+bw,0);
    g.addColorStop(0,'#7da6c8');g.addColorStop(.45,'#a8cadf');g.addColorStop(1,'#7da6c8');
    c.fillStyle=g;c.fillRect(bx-2,by-2,bw,bh);
    for(let r=0;r<9;r++)for(let cl=0;cl<3;cl++){

// ─── Utility overlay ──────────────────────────────────────────
function drawUtilOverlay(c,s,tile,tx,ty){
  const u=tile.util;
  // Powerline: pole + wires
  if(u.powerline){
    const L=tx>0&&grid[ty][tx-1].util.powerline;
    const R=tx<GRID-1&&grid[ty][tx+1].util.powerline;
    const U=ty>0&&grid[ty-1][tx].util.powerline;
    const D=ty<GRID-1&&grid[ty+1][tx].util.powerline;
    const mid=s/2;
    c.fillStyle='#888';c.fillRect(mid-s*.025,0,s*.05,s);// pole
    if(L||(!R&&!U&&!D))c.fillRect(0,mid-s*.025,mid,s*.05);
    if(R||(!L&&!U&&!D))c.fillRect(mid,mid-s*.025,mid,s*.05);
    c.fillStyle='#666';c.fillRect(s*.2,mid-s*.04,s*.6,s*.025);c.fillRect(s*.2,mid+s*.015,s*.6,s*.025);
    c.fillStyle='#f9c846';c.beginPath();c.arc(mid,s*.05,s*.03,0,Math.PI*2);c.fill();
  }
  // Pipe utilities
  const pipes=[
    {key:'gas',   col:'#ff8c00',y:.82},
    {key:'water', col:'#2196f3',y:.88},
    {key:'sewer', col:'#546e7a',y:.94},
  ];
  pipes.forEach(({key,col,y})=>{
    if(!u[key]) return;
    const L=tx>0&&grid[ty][tx-1].util[key];
    const R=tx<GRID-1&&grid[ty][tx+1].util[key];
    const U2=ty>0&&grid[ty-1][tx].util[key];
    const D2=ty<GRID-1&&grid[ty+1][tx].util[key];
    const pw=s*.08,ph=s*.06,mid=s/2;
    c.fillStyle=col;
    c.fillRect(L?0:mid-pw/2,s*y-ph/2,L&&R?s:pw,ph);// horiz
    if(!L&&!R)c.fillRect(mid-pw/2,s*y-ph/2,pw,ph);
    if(U2)c.fillRect(mid-pw/2,0,pw,s*y-ph/2);
    if(D2)c.fillRect(mid-pw/2,s*y+ph/2,pw,s-s*y-ph/2);
    c.beginPath();c.arc(mid,s*y,ph*.6,0,Math.PI*2);c.fill();
  });
}

//  Minimap
// ════════════════════════════════════════════════════════════
const MM_COL={
  [T.EMPTY]:'#7ec850',[T.ROAD]:'#888',[T.RAIL]:'#c8a96e',[T.STATION]:'#7c4dff',[T.AIRPORT]:'#546e7a',
  [T.RESIDENTIAL]:'#5b9bd5',[T.COMMERCIAL]:'#e07b39',[T.INDUSTRIAL]:'#9b9b9b',[T.PARK]:'#5aab5a',
  [T.POWER]:'#f9c846',[T.THERMAL]:'#ff8f00',[T.NUCLEAR]:'#00c853',
  [T.POLICE]:'#1a237e',[T.FIRE]:'#c62828',[T.HOSPITAL]:'#e0e0e0',[T.SCHOOL]:'#fff9c4',
  [T.STADIUM]:'#4caf50',
};
function drawMinimap(){
  const cell=mm.width/GRID;
  mctx.fillStyle='#7ec850';mctx.fillRect(0,0,mm.width,mm.height);
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    const t=grid[y][x];if(t.type===T.EMPTY)continue;
    mctx.fillStyle=MM_COL[t.type]||'#ccc';
    mctx.fillRect(x*cell,y*cell,cell+.5,cell+.5);
  }
  const vx=(-gs.cam.x/ts())*cell,vy=(-gs.cam.y/ts())*cell;
  const vw=(canvas.width/ts())*cell,vh=(canvas.height/ts())*cell;
  mctx.strokeStyle='rgba(41,121,255,.9)';mctx.lineWidth=1;
  mctx.strokeRect(vx,vy,vw,vh);
}

// ════════════════════════════════════════════════════════════
//  Render
// ════════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#a8d8ea';ctx.fillRect(0,0,canvas.width,canvas.height);
  const size=ts();
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    const px=gs.cam.x+x*size,py=gs.cam.y+y*size;
    if(px+size<0||py+size<0||px>canvas.width||py>canvas.height)continue;
    const t=grid[y][x];
    ctx.save();ctx.translate(px,py);
    switch(t.type){
      case T.EMPTY:       drawEmpty(ctx,size);break;
      case T.ROAD:        drawRoad(ctx,size,x,y);break;
      case T.RAIL:        drawRail(ctx,size,x,y);break;
      case T.STATION:     drawStation(ctx,size);break;
      case T.AIRPORT:     drawAirport(ctx,size);break;
      case T.RESIDENTIAL: drawResidential(ctx,size,t.level,t.powered);break;
      case T.COMMERCIAL:  drawCommercial(ctx,size,t.level,t.powered);break;
      case T.INDUSTRIAL:  drawIndustrial(ctx,size,t.level,t.powered);break;
      case T.PARK:        drawPark(ctx,size);break;
      case T.POWER:       drawPower(ctx,size);break;
      case T.THERMAL:     drawThermal(ctx,size);break;
      case T.NUCLEAR:     drawNuclear(ctx,size);break;
      case T.POLICE:      drawPolice(ctx,size);break;
      case T.FIRE:        drawFire(ctx,size);break;
      case T.HOSPITAL:    drawHospital(ctx,size);break;
      case T.SCHOOL:      drawSchool(ctx,size);break;
      case T.STADIUM:     drawStadium(ctx,size);break;
    }
    if(t.util.gas||t.util.water||t.util.powerline||t.util.sewer)drawUtilOverlay(ctx,size,t,x,y);
    ctx.restore();
  }
  // Hover
  if(gs.hover&&gs.hover.x>=0&&gs.hover.y>=0&&gs.hover.x<GRID&&gs.hover.y<GRID){
    const {x,y}=gs.hover;
    const px=gs.cam.x+x*size,py=gs.cam.y+y*size;
    ctx.strokeStyle='rgba(41,121,255,.85)';ctx.lineWidth=2.5;
    ctx.setLineDash([4,3]);ctx.strokeRect(px+1.5,py+1.5,size-3,size-3);ctx.setLineDash([]);
  }
  drawMinimap();
}

// ════════════════════════════════════════════════════════════
//  Simulation
// ════════════════════════════════════════════════════════════
function bfsFrom(...types){
  const vis=Array.from({length:GRID},()=>new Array(GRID).fill(false));
  const q=[];
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    if(types.includes(grid[y][x].type)){vis[y][x]=true;q.push([x,y]);}
  }
  const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
  for(let i=0;i<q.length;i++){
    const [cx,cy]=q[i];
    for(const [dx,dy] of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(nx<0||ny<0||nx>=GRID||ny>=GRID||vis[ny][nx])continue;
      if(grid[ny][nx].type===T.EMPTY&&!grid[ny][nx].util.powerline)continue;
      vis[ny][nx]=true;q.push([nx,ny]);
    }
  }
  return vis;
}

function bfsRail(){
  const vis=Array.from({length:GRID},()=>new Array(GRID).fill(false));
  const q=[];
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    if(grid[y][x].type===T.RAIL||grid[y][x].type===T.STATION){vis[y][x]=true;q.push([x,y]);}
  }
  const dirs=[[0,1],[0,-1],[1,0],[-1,0]];
  for(let i=0;i<q.length;i++){
    const [cx,cy]=q[i];
    for(const [dx,dy] of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(nx<0||ny<0||nx>=GRID||ny>=GRID||vis[ny][nx])continue;
      if(grid[ny][nx].type===T.EMPTY)continue;
      vis[ny][nx]=true;q.push([nx,ny]);
    }
  }
  return vis;
}

function covMap(type,radius){
  const m=Array.from({length:GRID},()=>new Array(GRID).fill(0));
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    if(grid[y][x].type!==type)continue;
    for(let dy=-radius;dy<=radius;dy++)for(let dx=-radius;dx<=radius;dx++){
      const ny=y+dy,nx=x+dx;
      if(ny>=0&&nx>=0&&ny<GRID&&nx<GRID)m[ny][nx]++;
    }
  }
  return m;
}

function simulate(){
  // BFS
  const roadVis=bfsFrom(T.ROAD,T.STATION);
  const powerVis=bfsFrom(T.POWER,T.THERMAL,T.NUCLEAR);
  const railVis=bfsRail();

  // Utility access (any adjacent utility tile)
  const utilAccess={gas:Array.from({length:GRID},()=>new Array(GRID).fill(false)),
                    water:Array.from({length:GRID},()=>new Array(GRID).fill(false)),
                    sewer:Array.from({length:GRID},()=>new Array(GRID).fill(false))};
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    ['gas','water','sewer'].forEach(k=>{
      if(grid[y][x].util[k])utilAccess[k][y][x]=true;
      [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{
        const nx=x+dx,ny=y+dy;
        if(nx>=0&&ny>=0&&nx<GRID&&ny<GRID&&grid[ny][nx].util[k])utilAccess[k][y][x]=true;
      });
    });
  }

  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    grid[y][x].powered=powerVis[y][x];
    grid[y][x].road=roadVis[y][x];
    grid[y][x].rail=railVis[y][x];
    grid[y][x].gasAccess=utilAccess.gas[y][x];
    grid[y][x].waterAccess=utilAccess.water[y][x];
    grid[y][x].sewerAccess=utilAccess.sewer[y][x];
  }

  // Pollution
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    let p=0;
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
      const ny=y+dy,nx=x+dx;if(ny<0||nx<0||ny>=GRID||nx>=GRID)continue;
      const tt=grid[ny][nx].type;
      if(tt===T.INDUSTRIAL)p+=Math.max(0,5-Math.max(Math.abs(dx),Math.abs(dy)))*(grid[ny][nx].level||1);
      if(tt===T.THERMAL)  p+=Math.max(0,6-Math.max(Math.abs(dx),Math.abs(dy)))*2;
      if(tt===T.NUCLEAR)  p+=Math.max(0,3-Math.max(Math.abs(dx),Math.abs(dy)));
    }
    grid[y][x].pollution=p;
  }

  // Coverage maps
  const cov={
    park:   covMap(T.PARK,3),    police:  covMap(T.POLICE,5),
    fire:   covMap(T.FIRE,5),    hospital:covMap(T.HOSPITAL,5),
    school: covMap(T.SCHOOL,4),  stadium: covMap(T.STADIUM,8),
    airport:covMap(T.AIRPORT,6), station: covMap(T.STATION,5),
  };

  let income=0,expense=0,pop=0,happySum=0,happyN=0;
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
    const t=grid[y][x];if(t.type===T.EMPTY)continue;
    expense+=(EXPENSE_T[t.type]||0)*(t.level||1);
    // Utility tile annual cost
    if(t.util.powerline)expense+=2;if(t.util.gas)expense+=1;if(t.util.water)expense+=1;if(t.util.sewer)expense+=1;

    // Grow (residential/commercial/industrial only)
    if([T.RESIDENTIAL,T.COMMERCIAL,T.INDUSTRIAL].includes(t.type)&&t.road&&t.powered){
      t.growTimer++;
      const thr=t.type===T.RESIDENTIAL?6:t.type===T.COMMERCIAL?8:10;
      if(t.growTimer>=thr&&t.level<3){t.level++;t.growTimer=0;showToast(`🏗️ 建物が成長！(${x},${y})`,'ok');}
    }

    if(t.type===T.COMMERCIAL)income+=INCOME_COM[t.level]||0;
    if(t.type===T.INDUSTRIAL)income+=INCOME_IND[t.level]||0;
    if(t.type===T.STADIUM)income+=300;
    if(t.type===T.AIRPORT)income+=1000;
    if(t.type===T.STATION)income+=80;

    if(t.type===T.RESIDENTIAL){
      pop+=POP_LV[t.level]||0;
      let h=40
        +(t.powered?15:0)
        +cov.park[y][x]*15
        +cov.police[y][x]*12
        +cov.fire[y][x]*10
        +cov.hospital[y][x]*18
        +cov.school[y][x]*10
        +cov.stadium[y][x]*6
        +cov.airport[y][x]*5
        +cov.station[y][x]*8
        +(t.gasAccess?5:0)+(t.waterAccess?8:0)+(t.sewerAccess?6:0)
        -t.pollution*6;
      happySum+=Math.max(0,Math.min(100,h));happyN++;
    }
  }
  const net=income-expense;
  gs.funds+=net;gs.income=net;gs.population=pop;
  gs.happiness=happyN>0?Math.min(100,Math.round(happySum/happyN)):100;
  gs.year++;updateHUD();
}

function updateHUD(){
  const f=gs.funds;
  const fe=document.getElementById('hv-funds');
  fe.textContent='$'+f.toLocaleString();fe.className='stat-val'+(f<0?' neg':'');
  document.getElementById('hv-pop').textContent=gs.population.toLocaleString();
  document.getElementById('hv-happy').textContent=gs.happiness+'%';
  const ie=document.getElementById('hv-income');
  ie.textContent=(gs.income>=0?'+':'')+'$'+gs.income.toLocaleString();
  ie.className='stat-val'+(gs.income<0?' neg':' pos');
  document.getElementById('hv-year').textContent=gs.year;
}
let _tt=null;
function showToast(txt,kind=''){
  const el=document.getElementById('toast');el.textContent=txt;el.className='show'+(kind?' '+kind:'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3000);
}

// ════════════════════════════════════════════════════════════
//  Place tile / utility
// ════════════════════════════════════════════════════════════
function placeTile(tx,ty){
  if(tx<0||ty<0||tx>=GRID||ty>=GRID)return;
  const t=grid[ty][tx];

  if(gs.tool==='bulldoze'){
    const hasUtil=t.util.gas||t.util.water||t.util.powerline||t.util.sewer;
    if(t.type===T.EMPTY&&!hasUtil)return;
    if(gs.funds<COSTS.bulldoze){showToast('💸 資金不足！','err');return;}
    gs.funds-=COSTS.bulldoze;
    const preserved=Object.assign({},t.util);// clear one util at a time? just clear all
    grid[ty][tx]=mkTile(T.EMPTY);
    updateHUD();return;
  }

  if(UTIL_TOOLS.has(gs.tool)){
    if(t.util[gs.tool])return;
    const cost=COSTS[gs.tool];
    if(gs.funds<cost){showToast('💸 資金不足！','err');return;}
    gs.funds-=cost;t.util[gs.tool]=true;updateHUD();return;
  }

  const nt=TOOL_TYPE[gs.tool];if(nt===undefined||t.type===nt)return;
  const cost=COSTS[gs.tool];
  if(gs.funds<cost){showToast('💸 資金不足！','err');return;}
  gs.funds-=cost;
  const savedUtil={...t.util};
  grid[ty][tx]=mkTile(nt);
  grid[ty][tx].util=savedUtil;
  updateHUD();
}

  if(e.button===2){gs.dragging=true;gs.dragPt={sx:e.clientX,sy:e.clientY,cx:gs.cam.x,cy:gs.cam.y};return;}
  const r=wrap.getBoundingClientRect();gs.drawing=true;
  const{x,y}=s2t(e.clientX-r.left,e.clientY-r.top);placeTile(x,y);
});

  const r=wrap.getBoundingClientRect();
  const sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(gs.dragging&&gs.dragPt){gs.cam.x=gs.dragPt.cx+(e.clientX-gs.dragPt.sx);gs.cam.y=gs.dragPt.cy+(e.clientY-gs.dragPt.sy);return;}
  gs.hover=s2t(sx,sy);if(gs.drawing)placeTile(gs.hover.x,gs.hover.y);

  const f=e.deltaY<0?1.12:.9;const nz=Math.max(.4,Math.min(5,gs.zoom*f));
  gs.cam.x=mx-(mx-gs.cam.x)*(nz/gs.zoom);gs.cam.y=my-(my-gs.cam.y)*(nz/gs.zoom);gs.zoom=nz;
},{passive:false});

  e.preventDefault();
  if(e.touches.length===1){const r=wrap.getBoundingClientRect(),t=e.touches[0];const tile=s2t(t.clientX-r.left,t.clientY-r.top);gs.drawing=true;gs.hover=tile;placeTile(tile.x,tile.y);}

},{passive:false});

  e.preventDefault();const r=wrap.getBoundingClientRect();
  if(e.touches.length===1&&gs.drawing){const t=e.touches[0],tile=s2t(t.clientX-r.left,t.clientY-r.top);gs.hover=tile;placeTile(tile.x,tile.y);}
  else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(_ltd)gs.zoom=Math.max(.4,Math.min(5,gs.zoom*(d/_ltd)));_ltd=d;const nc={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};if(_tc){gs.cam.x+=nc.x-_tc.x;gs.cam.y+=nc.y-_tc.y;}_tc=nc;}
