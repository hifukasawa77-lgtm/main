    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="240"></canvas>
    </div>

        <p>アイテム切替: <kbd>1</kbd> 爆弾 <kbd>2</kbd> 弓矢 <kbd>3</kbd> 蝋燭 <kbd>4</kbd> 回復薬</p>
        <p style="color: #fcd8a8;">中央に「街（3x3）」が出現！住人と話し、お金を貯めて店でアイテムを買い揃えよう！</p>

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // ==========================================
        // ✨ PARTICLE SYSTEM
        // ==========================================
        const particles = [];
        function spawnParticles(x, y, color, count, spread, speed, life) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = speed * (0.5 + Math.random());
                particles.push({
                    x, y,
                    dx: Math.cos(angle) * s * spread,
                    dy: Math.sin(angle) * s * spread,
                    life, maxLife: life,
                    color, size: 1 + Math.random() * 2
                });
            }
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.dx; p.y += p.dy;
                p.dx *= 0.92; p.dy *= 0.92;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        function drawParticles(offsetX, offsetY) {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(Math.round(p.x + offsetX), Math.round(p.y + offsetY + UI_OFFSET), p.size, p.size);
            });
            ctx.globalAlpha = 1;
        }

            shakeIntensity = intensity; shakeTimer = duration;
        }
        function getShakeOffset() {
            if (shakeTimer <= 0) return {x:0, y:0};
            shakeTimer--;
            return { x: (Math.random()-0.5)*shakeIntensity*2, y: (Math.random()-0.5)*shakeIntensity*2 };
        }

        function initAudio() {
            if(isAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isAudioInitialized = true;
                let t = audioCtx.currentTime + 0.1;
                melodyTime = t;
                bassTime = t;
            } catch(e) { console.error("Web Audio API not supported", e); }
        }

        function playTone(freq, type, duration, vol, startTime) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
            gain.gain.setValueAtTime(vol, startTime + duration - 0.02);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function scheduleAudio() {
            if(!isAudioInitialized || gameState === 'TITLE' || gameState === 'GAMEOVER') return;
            let lookahead = audioCtx.currentTime + 0.5;
            
            while(melodyTime < lookahead) {
                let note = bgmTrack[melodyIndex];
                if(note[0] !== N.R) {
                    playTone(note[0], 'square', note[1] * BEAT_LEN * 0.8, 0.04, melodyTime);
                }
                melodyTime += note[1] * BEAT_LEN;
                melodyIndex = (melodyIndex + 1) % bgmTrack.length;
            }
            
            while(bassTime < lookahead) {
                let note = bassTrack[bassIndex];
                if(note[0] !== N.R) {
                    playTone(note[0], 'triangle', note[1] * BEAT_LEN * 0.9, 0.06, bassTime);
                }
                bassTime += note[1] * BEAT_LEN;
                bassIndex = (bassIndex + 1) % bassTrack.length;
            }
        }

        function playSFX(type) {
            if(!isAudioInitialized) return;
            const t = audioCtx.currentTime;
            if (type === 'sword') {
                playTone(880, 'square', 0.05, 0.03, t);
                playTone(1046, 'square', 0.1, 0.03, t + 0.05);
            } else if (type === 'hit') {
                playTone(150, 'sawtooth', 0.1, 0.08, t);
            } else if (type === 'item') {
                playTone(523, 'square', 0.1, 0.05, t);
                playTone(659, 'square', 0.1, 0.05, t + 0.1);
                playTone(784, 'square', 0.2, 0.05, t + 0.2);
            } else if (type === 'hurt') {
                playTone(349, 'sawtooth', 0.1, 0.08, t);
                playTone(329, 'sawtooth', 0.2, 0.08, t + 0.1);
            } else if (type === 'block') {
                playTone(1200, 'square', 0.05, 0.02, t);
            } else if (type === 'jump') {
                playTone(600, 'square', 0.1, 0.02, t);
                playTone(800, 'square', 0.1, 0.02, t + 0.1);
            } else if (type === 'talk') {
                playTone(400, 'square', 0.05, 0.02, t);
                playTone(600, 'square', 0.05, 0.02, t+0.05);
            } else if (type === 'buy') {
                playTone(880, 'square', 0.1, 0.05, t);
                playTone(1100, 'square', 0.1, 0.05, t+0.1);
                playTone(1320, 'square', 0.2, 0.05, t+0.2);
            } else if (type === 'error') {
                playTone(200, 'sawtooth', 0.2, 0.05, t);

                playTone(100, 'sawtooth', 0.3, 0.1, t);

            }

                            let mudCount = 0; let deepCount = 0;
                            for(let dr=-1; dr<=1; dr++){
                                for(let dc=-1; dc<=1; dc++){
                                    if(tiles[r+dr][c+dc] === 4) mudCount++;
                                    if(tiles[r+dr][c+dc] === 2) deepCount++;
                                }
                            }
                            if (deepCount >= 4) newTiles[r][c] = 2;
                            else if (mudCount >= 4) newTiles[r][c] = 4;
                            else if (mudCount < 2 && deepCount < 2) newTiles[r][c] = 0;
                        }
                    }
                    tiles = newTiles;
                }
            }
            
            if (biome === 'town') {
                // Spawn NPCs
                let npcs = [];
                if (rx === 0 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 5*TILE, rx, ry, 'man', 'ここは はじまりのまち です。'));
                    npcs.push(new NPC(12*TILE, 6*TILE, rx, ry, 'woman', 'まもの には きをつけて！'));
                    npcs.push(new NPC(4*TILE, 7*TILE, rx, ry, 'dog', 'ワン！ワン！'));
                    npcs.push(new NPC(6*TILE, 3*TILE, rx, ry, 'chicken', 'コケッコッコー！'));
                } else if (rx === -1 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'weapon'));
                    npcs.push(new NPC(4*TILE, 5*TILE, rx, ry, 'man', 'ぶきや は けんや ゆみを うっているぞ。'));
                } else if (rx === 1 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'armor'));
                    npcs.push(new NPC(12*TILE, 6*TILE, rx, ry, 'woman', 'たて がないと たま をふせげないわ。'));
                } else if (rx === 0 && ry === -1) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'item'));
                    npcs.push(new NPC(3*TILE, 3*TILE, rx, ry, 'dog', 'クゥーン...'));
                } else {
                    npcs.push(new NPC((4+Math.random()*8)*TILE, (4+Math.random()*4)*TILE, rx, ry, Math.random() < 0.5 ? 'man':'woman', 'こんにちは！'));
                    if (Math.random() < 0.5) npcs.push(new NPC((2+Math.random()*12)*TILE, (2+Math.random()*8)*TILE, rx, ry, 'chicken', 'ココッ！'));
                }
                return { biome: biome, tiles: tiles, npcs: npcs };
            }

            // Spawn Enemies for other biomes
            let enemyList = [];
            let numEnemies = Math.floor(Math.random() * 6) + 3; 
            for(let i=0; i<numEnemies; i++) {
                let ex = (2 + Math.floor(Math.random() * 12)) * TILE;
                let ey = (2 + Math.floor(Math.random() * 7)) * TILE;
                let type = 'octorok';
                let rand = Math.random();
                if (biome === 'grassland') { type = rand < 0.4 ? 'moblin' : 'octorok'; } 
                else if (biome === 'desert') { type = 'worm'; } 
                else if (biome === 'mountain') { type = rand < 0.4 ? 'bat' : 'spider'; } 
                else if (biome === 'volcano') { type = rand < 0.5 ? 'bat' : 'moblin'; } 
                else if (biome === 'swamp') { type = rand < 0.4 ? 'moblin' : (rand < 0.7 ? 'bat' : 'octorok'); } 
                else if (biome === 'snow') { type = 'spider'; }
                enemyList.push(new Enemy(ex, ey, rx, ry, type));
            }

            return { biome: biome, tiles: tiles, enemies: enemyList };
        }

        function getRoom(x, y) {
            const key = getRoomKey(x, y);
            if (!worldMap[key]) {
                worldMap[key] = generateRoom(x, y);
            }
            return worldMap[key];
        }

        let currentRoomX = 0; let currentRoomY = 0;
        let isTransitioning = false; let transOffset = { x: 0, y: 0 };
        let nextRoomData = null;
        let transDirX = 0, transDirY = 0, transProgress = 0;

        function isSolid(tileId) {
            return tileId === 1 || tileId === 2 || (tileId >= 20 && tileId <= 28) || (tileId >= 40 && tileId <= 43) || tileId === undefined;
        }

        function checkCollision(x, y, w, h) {
            const room = getRoom(currentRoomX, currentRoomY);
            if (!room) return true;
            const leftCol = Math.floor(x / TILE);
            const rightCol = Math.floor((x + w - 1) / TILE);
            const topRow = Math.floor(y / TILE);
            const bottomRow = Math.floor((y + h - 1) / TILE);
            if (leftCol < 0 || rightCol >= SCREEN_COLS || topRow < 0 || bottomRow >= SCREEN_ROWS) return false;
            for (let r = topRow; r <= bottomRow; r++) {
                for (let c = leftCol; c <= rightCol; c++) {
                    if (isSolid(room.tiles[r][c])) return true;
                }
            }
            return false;
        }

        // --- ENTITIES ---
        class Player {
            constructor(x, y) {
                this.reset(x, y);
            }
            reset(x, y) {
                this.x = x; this.y = y; this.w = 12; this.h = 12;
                this.baseSpeed = 1.5; this.dir = 'down';
                this.health = 6; this.maxHealth = 6;
                this.animFrame = 1; this.animTimer = 0;
                this.isAttacking = false; this.attackTimer = 0;
                this.swordHitbox = null; this.invincibleTimer = 0;
                rupees = 0;
                inventory = { bombs: 0, arrows: 0, keys: 0, potions: 0 };
                equipment = { shield: false, bow: false, armorLevel: 0, candle: false };
                activeItem = 'none';
            }

            update() {
                if (isTransitioning) return;
                if (this.invincibleTimer > 0) this.invincibleTimer--;

                if (this.x < 0) {
                    if (currentRoomX > -12) startTransition(-1, 0);
                    else this.x = 0;
                }
                else if (this.x + this.w > SCREEN_COLS * TILE) {
                    if (currentRoomX < 12) startTransition(1, 0);
                    else this.x = SCREEN_COLS * TILE - this.w;
                }
                else if (this.y < 0) {
                    if (currentRoomY > -12) startTransition(0, -1);
                    else this.y = 0;
                }
                else if (this.y + this.h > SCREEN_ROWS * TILE) {
                    if (currentRoomY < 12) startTransition(0, 1);
                    else this.y = SCREEN_ROWS * TILE - this.h;
                }
                
                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                        this.swordHitbox = null;
                    }
                    return;
                }

                // Handle Dialogue / Shop interaction
                if (isJustPressed('Space') || isJustPressed('KeyZ')) {
                    // Check for NPC in front
                    let talkHx = this.x, talkHy = this.y;
                    if(this.dir === 'up') talkHy -= 16;
                    if(this.dir === 'down') talkHy += 16;
                    if(this.dir === 'left') talkHx -= 16;
                    if(this.dir === 'right') talkHx += 16;
                    let talkRect = {x:talkHx, y:talkHy, w:16, h:16};
                    
                    const room = getRoom(currentRoomX, currentRoomY);
                    if(room.npcs) {
                        for(let npc of room.npcs) {
                            if(checkAABB(talkRect, npc)) {
                                if(npc.type === 'merchant') {
                                    startShop(npc.role, npc);
                                } else {
                                    startDialogue([npc.role]);
                                }
                                return;
                            }
                        }
                    }
                    // If no NPC, attack
                    this.isAttacking = true;
                    this.attackTimer = 12;
                    this.swordHitbox = { x: talkHx, y: talkHy, w: 16, h: 16 };
                    playSFX('sword');
                    // Sword slash particles
                    spawnParticles(talkHx+8, talkHy+8+UI_OFFSET, '#f8d8b0', 6, 1.5, 2, 10);
                    spawnParticles(talkHx+8, talkHy+8+UI_OFFSET, '#ffffff', 4, 2, 1.5, 8);
                    return;
                }

                // Handle Items
                if (isJustPressed('Digit1') && inventory.bombs > 0) activeItem = 'bomb';
                if (isJustPressed('Digit2') && equipment.bow) activeItem = 'bow';
                if (isJustPressed('Digit3') && equipment.candle) activeItem = 'candle';
                if (isJustPressed('Digit4') && inventory.potions > 0) activeItem = 'potion';

                if (isJustPressed('KeyX') || isJustPressed('ShiftLeft') || isJustPressed('ShiftRight')) {
                    this.useItem();
                }

                let speed = this.baseSpeed;
                const room = getRoom(currentRoomX, currentRoomY);
                if (room) {
                    let cx = Math.floor((this.x + this.w/2) / TILE);
                    let cy = Math.floor((this.y + this.h/2) / TILE);
                    if (cy >= 0 && cy < SCREEN_ROWS && cx >= 0 && cx < SCREEN_COLS) {
                        if (room.tiles[cy][cx] === 4) speed = this.baseSpeed * 0.5;
                    }
                }

                let dx = 0, dy = 0, isMoving = false;
                if (keys['KeyW'] || keys['ArrowUp']) { dy = -speed; this.dir = 'up'; isMoving = true; }
                else if (keys['KeyS'] || keys['ArrowDown']) { dy = speed; this.dir = 'down'; isMoving = true; }
                else if (keys['KeyA'] || keys['ArrowLeft']) { dx = -speed; this.dir = 'left'; isMoving = true; }
                else if (keys['KeyD'] || keys['ArrowRight']) { dx = speed; this.dir = 'right'; isMoving = true; }

                if (dx !== 0 && !checkCollision(this.x + dx, this.y, this.w, this.h)) this.x += dx;
                if (dy !== 0 && !checkCollision(this.x, this.y + dy, this.w, this.h)) this.y += dy;

                if (isMoving) {
                    this.animTimer++;
                    if (this.animTimer > (speed < 1 ? 16 : 8)) {
                        this.animTimer = 0;
                        this.animFrame = this.animFrame === 1 ? 2 : 1;
                    }
                } else {
                    this.animFrame = 1;
                }
            }

            useItem() {
                if (activeItem === 'bomb' && inventory.bombs > 0) {
                    inventory.bombs--;
                    if(inventory.bombs <= 0) activeItem = 'none';
                    let bx = this.x; let by = this.y;
                    if(this.dir === 'up') by -= 16; if(this.dir === 'down') by += 16;
                    if(this.dir === 'left') bx -= 16; if(this.dir === 'right') bx += 16;
                    hazards.push(new Bomb(bx, by));
                } else if (activeItem === 'bow' && inventory.arrows > 0) {
                    inventory.arrows--;
                    let dx = 0, dy = 0;
                    if(this.dir === 'up') dy = -4; if(this.dir === 'down') dy = 4;
                    if(this.dir === 'left') dx = -4; if(this.dir === 'right') dx = 4;
                    playerProjectiles.push(new PlayerProjectile(this.x+2, this.y+2, dx, dy, 'arrow'));
                    playSFX('arrow');
                } else if (activeItem === 'candle') {
                    let dx = 0, dy = 0;
                    if(this.dir === 'up') dy = -2; if(this.dir === 'down') dy = 2;
                    if(this.dir === 'left') dx = -2; if(this.dir === 'right') dx = 2;
                    playerProjectiles.push(new PlayerProjectile(this.x+2, this.y+2, dx, dy, 'fire'));
                    playSFX('fire');
                } else if (activeItem === 'potion' && inventory.potions > 0) {
                    inventory.potions--;
                    if(inventory.potions <= 0) activeItem = 'none';
                    this.health = Math.min(this.maxHealth, this.health + 6);
                    playSFX('item');
                }
            }

            draw() {
                if (this.invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
                const drawX = Math.round(this.x + transOffset.x - 2);
                const drawY = Math.round(this.y + transOffset.y + UI_OFFSET - 2);
                
                if (this.isAttacking) {
                    let sX = drawX, sY = drawY;
                    if (this.dir === 'up') sY -= 14;
                    if (this.dir === 'down') sY += 14;
                    if (this.dir === 'left') sX -= 14;
                    if (this.dir === 'right') sX += 14;
                    ctx.drawImage(sprites['sword_' + this.dir], sX, sY);
                }
                
                ctx.save();
                if(equipment.armorLevel === 1) ctx.filter = 'hue-rotate(90deg)'; // Greenish/Different
                if(equipment.armorLevel === 2) ctx.filter = 'hue-rotate(180deg)'; // Reddish
                ctx.drawImage(sprites[`link_${this.dir}_${this.animFrame}`], drawX, drawY);
                ctx.restore();
            }

            takeDamage() {
                if (this.invincibleTimer <= 0) {
                    let dmg = 1;
                    if(equipment.armorLevel === 1) dmg = 0.75;
                    if(equipment.armorLevel === 2) dmg = 0.5;
                    if(equipment.armorLevel === 1 && Math.random() < 0.25) dmg = 0;
                    if(equipment.armorLevel === 2 && Math.random() < 0.5) dmg = 0;
                    if (dmg > 0) {
                        this.health -= 1;
                        this.invincibleTimer = 40;
                        playSFX('hurt');
                        spawnParticles(this.x+6, this.y+6+UI_OFFSET, '#d82800', 6, 1.5, 2, 12);
                        triggerShake(3, 8);
                        if (this.health <= 0) {
                            gameState = 'GAMEOVER';
                        }
                    }
                }
            }
        }

        class NPC {
            constructor(x, y, roomX, roomY, type, role) {
                this.x = x; this.y = y; this.w = 14; this.h = 14;
                this.roomX = roomX; this.roomY = roomY;
                this.type = type; 
                this.role = role;
                this.timer = 0; this.dx = 0; this.dy = 0;
                this.animFrame = 1; this.animTimer = 0;
            }
            update() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY || isTransitioning) return;
                
                if (this.type !== 'merchant') {
                    if (this.timer <= 0) {
                        this.timer = 60 + Math.random() * 100;
                        if (Math.random() < 0.5) {
                            this.dx = 0; this.dy = 0;
                        } else {
                            const dirs = [[0,-0.5],[0,0.5],[-0.5,0],[0.5,0]];
                            const d = dirs[Math.floor(Math.random()*dirs.length)];
                            this.dx = d[0]; this.dy = d[1];
                        }
                    }
                    this.timer--;
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                    
                    if (this.dx !== 0 || this.dy !== 0) {
                        this.animTimer++;
                        if (this.animTimer > 15) {
                            this.animTimer = 0;
                            this.animFrame = this.animFrame === 1 ? 2 : 1;
                        }
                    }
                }
            }
            draw() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY) return;
                let sprName = `npc_${this.type}_${this.animFrame}`;
                if (this.type === 'merchant') sprName = 'merchant';
                // Fallback for simple sprites
                if (!sprites[sprName]) sprName = `npc_${this.type}`; // like dog or chicken without anim frames if not defined properly, but we will define them.
                if (!sprites[sprName]) sprName = 'npc_man_1'; // ultimate fallback

                ctx.drawImage(sprites[sprName], Math.round(this.x + transOffset.x), Math.round(this.y + transOffset.y + UI_OFFSET));
            }
        }

        class Bomb {
            constructor(x, y) {
                this.x = x; this.y = y; this.w = 16; this.h = 16;
                this.timer = 90;
                this.active = true;
                playSFX('bomb');
            }
            update() {
                if(isTransitioning) return;
                this.timer--;
                if(this.timer === 0) {
                    playSFX('hit');
                    // Explosion hit logic
                    let explodeRect = {x: this.x-16, y: this.y-16, w: 48, h: 48};
                    const room = getRoom(currentRoomX, currentRoomY);
                    if(room.enemies) {
                        room.enemies.forEach(e => {
                            if(checkAABB(explodeRect, e)) {
                                e.takeDamage(this.x, this.y); e.takeDamage(this.x, this.y); // Double damage
                            }
                        });
                    }
                    if(checkAABB(explodeRect, player)) player.takeDamage();
                }
                if(this.timer < -15) this.active = false;
            }
            draw() {
                if(this.timer > 0) {
                    if(this.timer % 10 < 5) ctx.drawImage(sprites['ico_bomb'], Math.round(this.x + transOffset.x), Math.round(this.y + transOffset.y + UI_OFFSET));
                } else {
                    ctx.drawImage(sprites['bomb_flash'], Math.round(this.x + transOffset.x - 16), Math.round(this.y + transOffset.y + UI_OFFSET - 16), 48, 48);
                }
            }
        }

        class PlayerProjectile {
            constructor(x, y, dx, dy, type) {
                this.x = x; this.y = y; this.w = 8; this.h = 8;
                this.dx = dx; this.dy = dy; this.type = type;
                this.active = true;
                this.timer = type === 'fire' ? 30 : 100;
            }
            update() {
                if(isTransitioning) return;
                this.x += this.dx; this.y += this.dy;
                this.timer--;
                if (checkCollision(this.x, this.y, this.w, this.h) || this.timer <= 0) this.active = false;
                
                const room = getRoom(currentRoomX, currentRoomY);
                if(room.enemies) {
                    room.enemies.forEach(e => {
                        if(this.active && checkAABB(this, e)) {
                            e.takeDamage(this.x, this.y);
                            if(this.type === 'arrow') this.active = false;
                        }
                    });
                }
            }
            draw() {
                let sprName = 'proj_fire';
                if (this.type === 'arrow') {
                    if(this.dy < 0) sprName = 'proj_arrow_up';
                    if(this.dy > 0) sprName = 'proj_arrow_down';
                    if(this.dx < 0) sprName = 'proj_arrow_left';
                    if(this.dx > 0) sprName = 'proj_arrow_right';
                }
                ctx.drawImage(sprites[sprName], Math.round(this.x + transOffset.x - 4), Math.round(this.y + transOffset.y + UI_OFFSET - 4));
            }
        }

        // Projectiles and Enemies classes from previous, updated for lists
        class Projectile {
            constructor(x, y, dx, dy) {
                this.x = x; this.y = y; this.w = 8; this.h = 8;
                this.dx = dx; this.dy = dy; this.active = true;
            }
            update() {
                this.x += this.dx; this.y += this.dy;
                if (checkCollision(this.x, this.y, this.w, this.h) || 
                    this.x < 0 || this.x > SCREEN_COLS*TILE || 
                    this.y < 0 || this.y > SCREEN_ROWS*TILE) {
                    this.active = false;
                }
            }
            draw() {
                ctx.drawImage(sprites['rock_proj'], Math.round(this.x + transOffset.x - 4), Math.round(this.y + transOffset.y + UI_OFFSET - 4));
            }
        }

        class FallingRock {
            constructor() {
                this.x = Math.floor(Math.random() * SCREEN_COLS) * TILE;
                this.y = -16; this.w = 12; this.h = 12;
                this.dy = 1.5 + Math.random() * 1.5;
                this.active = true;
            }
            update() {
                if(isTransitioning) return;
                this.y += this.dy;
                if(this.y > SCREEN_ROWS * TILE) this.active = false;
            }
            draw() {
                ctx.drawImage(sprites['falling_rock'], Math.round(this.x + transOffset.x - 2), Math.round(this.y + transOffset.y + UI_OFFSET - 2));
            }
        }

        class Enemy {
            constructor(x, y, roomX, roomY, type='octorok') {
                this.x = x; this.y = y; this.w = 14; this.h = 14;
                this.roomX = roomX; this.roomY = roomY;
                this.type = type;
                this.timer = 0; this.dx = 0; this.dy = 0;
                this.knockbackTimer = 0; this.kdx = 0; this.kdy = 0;
                this.animFrame = 1; this.animTimer = 0;
                this.isInvincible = false;
                
                switch(type) {
                    case 'moblin': this.health = 4; this.baseSpeed = 0.6; break;
                    case 'bat': this.health = 1; this.baseSpeed = 0.8; break;
                    case 'spider': this.health = 3; this.baseSpeed = 2.0; this.state = 'wait'; break;
                    case 'worm': this.health = 2; this.baseSpeed = 0.7; this.state = 'hidden'; this.timer = 60; this.isInvincible = true; break;
                    default: this.health = 2; this.baseSpeed = 0.5; break; 
                }
            }

            update() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY || isTransitioning) return;
                if (this.knockbackTimer > 0) {
                    this.knockbackTimer--;
                    if (!checkCollision(this.x + this.kdx, this.y + this.kdy, this.w, this.h) || this.type === 'bat') {
                        this.x += this.kdx; this.y += this.kdy;
                    }
                    return;
                }

                let speed = this.baseSpeed;
                this.timer--;

                if (this.type === 'bat') {
                    if (this.timer <= 0) {
                        this.timer = 20 + Math.random() * 40;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx) + (Math.random() - 0.5) * 2;
                        this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                    }
                    this.x += this.dx; this.y += this.dy;
                } 
                else if (this.type === 'moblin') {
                    if (this.timer <= 0) {
                        this.timer = 15;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx);
                        this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                    }
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                }
                else if (this.type === 'spider') {
                    if (this.state === 'wait') {
                        this.isInvincible = false;
                        if (this.timer <= 0) {
                            this.state = 'jump'; this.timer = 30; this.isInvincible = true;
                            let pdx = player.x - this.x; let pdy = player.y - this.y;
                            let angle = Math.atan2(pdy, pdx);
                            this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                            playSFX('jump');
                        }
                    } else if (this.state === 'jump') {
                        this.x += this.dx; this.y += this.dy; 
                        if (this.timer <= 0) { this.state = 'wait'; this.timer = 60 + Math.random() * 60; }
                    }
                }
                else if (this.type === 'worm') {
                    if (this.state === 'hidden') {
                        this.isInvincible = true;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx);
                        this.dx = Math.cos(angle) * (speed * 0.5); this.dy = Math.sin(angle) * (speed * 0.5);
                        if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                        if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;

                        if (this.timer <= 0 && Math.hypot(pdx, pdy) < 60) {
                            this.state = 'emerge'; this.timer = 80; this.isInvincible = false;
                        }
                    } else if (this.state === 'emerge') {
                        this.dx = 0; this.dy = 0;
                        if (this.timer <= 0) { this.state = 'hidden'; this.timer = 120 + Math.random() * 60; }
                    }
                }
                else {
                    if (this.timer <= 0) {
                        if (Math.random() < 0.3) {
                            this.dx = 0; this.dy = 0; this.timer = 40;
                            let pdx = player.x - this.x, pdy = player.y - this.y;
                            let shootDx = 0, shootDy = 0;
                            if (Math.abs(pdx) > Math.abs(pdy)) shootDx = pdx > 0 ? 2 : -2;
                            else shootDy = pdy > 0 ? 2 : -2;
                            projectiles.push(new Projectile(this.x + 4, this.y + 4, shootDx, shootDy));
                        } else {
                            this.timer = 60 + Math.random() * 60;
                            const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
                            const d = dirs[Math.floor(Math.random()*dirs.length)];
                            this.dx = d[0] * speed; this.dy = d[1] * speed;
                        }
                    }
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    else this.timer = 0;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                    else this.timer = 0;
                }
                
                if (this.x < 0) this.x = 0;
                if (this.x > SCREEN_COLS*TILE - this.w) this.x = SCREEN_COLS*TILE - this.w;
                if (this.y < 0) this.y = 0;
                if (this.y > SCREEN_ROWS*TILE - this.h) this.y = SCREEN_ROWS*TILE - this.h;

                if (this.dx !== 0 || this.dy !== 0 || this.type === 'spider' || this.type === 'worm') {
                    this.animTimer++;
                    if (this.animTimer > 15) {
                        this.animTimer = 0;
                        this.animFrame = this.animFrame === 1 ? 2 : 1;
                    }
                }
            }
            
            draw() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY) return;
                if (this.knockbackTimer > 0 && Math.floor(Date.now()/50)%2===0) return;
                
                let sprName = `${this.type}_${this.animFrame}`;
                if (this.type === 'spider' && this.state === 'jump') sprName = 'spider_2';
                if (this.type === 'spider' && this.state === 'wait') sprName = 'spider_1';
                if (this.type === 'worm' && this.state === 'hidden') sprName = 'worm_hidden';
                if (this.type === 'worm' && this.state === 'emerge') sprName = 'worm_emerge';
                
                let drawY = this.y;
                if (this.type === 'spider' && this.state === 'jump') {
                    let elapsed = 30 - this.timer;
                    let height = Math.sin((elapsed / 30) * Math.PI) * 20;
                    drawY -= height;
                }
                ctx.drawImage(sprites[sprName], Math.round(this.x + transOffset.x), Math.round(drawY + transOffset.y + UI_OFFSET));
            }
            
            takeDamage(px, py) {
                if (this.isInvincible) return;
                this.health--;
                this.knockbackTimer = 15;
                const dist = Math.hypot(this.x - px, this.y - py);
                if(dist > 0) {
                    this.kdx = ((this.x - px) / dist) * 2;
                    this.kdy = ((this.y - py) / dist) * 2;
                }
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.w = 16; this.h = 16;
                this.type = type; this.active = true;
            }
            draw() {
                if (!this.active) return;
                ctx.drawImage(sprites[this.type], Math.round(this.x + transOffset.x), Math.round(this.y + transOffset.y + UI_OFFSET));
            }
        }

        let player = new Player(120, 120);
        let projectiles = []; let playerProjectiles = []; let items = []; let hazards = []; 

        function startDialogue(lines) {
            gameState = 'DIALOGUE';
            dialogueText = lines;
            dialogueIndex = 0;
            playSFX('talk');
        }

        function startShop(type, npcObj) {
            gameState = 'SHOP';
            shopType = type;
            currentNPC = npcObj;
            shopCursor = 0;
            if(type === 'weapon') {
                shopItemsData = [
                    {name: '弓 (Bow)', price: 100, type: 'bow', desc: 'や を いることができる。'},
                    {name: '矢x10 (Arrows)', price: 20, type: 'arrows', desc: 'ゆみ の たま。'},
                    {name: '爆弾 (Bomb)', price: 30, type: 'bomb', desc: 'かべ や まもの を ふきとばす。'}
                ];
            } else if (type === 'armor') {
                shopItemsData = [
                    {name: '盾 (Shield)', price: 50, type: 'shield', desc: 'たま を ふせぐ。'},
                    {name: '皮の服 (Clothes)', price: 100, type: 'clothes', desc: 'ダメージ が すこし へる。'},
                    {name: '皮の鎧 (Armor)', price: 250, type: 'armor', desc: 'ダメージ が はんぶんになる。'}
                ];
            } else if (type === 'item') {
                shopItemsData = [
                    {name: '回復薬 (Potion)', price: 20, type: 'potion', desc: 'ライフ が 2つ かいふくする。'},
                    {name: '蝋燭 (Candle)', price: 60, type: 'candle', desc: 'ほのお を はなつ。なんどでもつかえる。'},
                    {name: '鍵 (Key)', price: 50, type: 'key', desc: 'とびら を あけるための かぎ。'}
                ];
            }
        }

        function buyShopItem(item) {
            if (rupees >= item.price) {
                if(item.type === 'bow' && equipment.bow) { playSFX('error'); return; }
                if(item.type === 'shield' && equipment.shield) { playSFX('error'); return; }
                if(item.type === 'clothes' && equipment.armorLevel >= 1) { playSFX('error'); return; }
                if(item.type === 'armor' && equipment.armorLevel >= 2) { playSFX('error'); return; }
                if(item.type === 'candle' && equipment.candle) { playSFX('error'); return; }

                rupees -= item.price;
                playSFX('buy');
                
                if(item.type === 'bow') equipment.bow = true;
                if(item.type === 'shield') equipment.shield = true;
                if(item.type === 'clothes') equipment.armorLevel = 1;
                if(item.type === 'armor') equipment.armorLevel = 2;
                if(item.type === 'candle') equipment.candle = true;
                
                if(item.type === 'bomb') inventory.bombs += 1; // 1 bomb per buy? Or 5? Let's say 5 for 30r.
                if(item.type === 'arrows') inventory.arrows += 10;
                if(item.type === 'potion') inventory.potions += 1;
                if(item.type === 'key') inventory.keys += 1;
                
                if(item.type === 'bomb' && item.price === 30) inventory.bombs += 4; // Total 5
            } else {
                playSFX('error');
            }
        }

        // --- ROOM RENDERING ---
        function drawRoom(roomData, offsetX, offsetY) {
            if (!roomData) return;
            const biome = roomData.biome;
            if (biome === 'grassland' && window.grassPattern) {
                ctx.fillStyle = window.grassPattern;
            } else {
                ctx.fillStyle = BIOME_BG[biome];
            }
            ctx.fillRect(offsetX, offsetY + UI_OFFSET, SCREEN_COLS * TILE, SCREEN_ROWS * TILE);

            for (let r = 0; r < SCREEN_ROWS; r++) {
                for (let c = 0; c < SCREEN_COLS; c++) {
                    const tile = roomData.tiles[r][c];
                    
                    if (biome === 'swamp') {
                        if (tile === 0) ctx.drawImage(sprites['ground_swamp'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        else if (tile === 4) ctx.drawImage(sprites['mud_swamp'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                    }
                    if (biome === 'town') {
                        if (tile === 3) ctx.drawImage(sprites['ground_town'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        if (tile === 40) ctx.drawImage(sprites['fence_h'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        if (tile === 41) ctx.drawImage(sprites['fence_v'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        if (tile === 42) ctx.drawImage(sprites['mailbox'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        if (tile === 43) ctx.drawImage(sprites['bush'], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        if (tile >= 20 && tile <= 28) {
                            const houseSprites = ['house_rtl','house_rtm','house_rtr','house_rbl','house_rbm','house_rbr','house_wl','house_door','house_wr'];
                            ctx.drawImage(sprites[houseSprites[tile - 20]], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                        }
                    }
                    
                    if (tile === 0 || tile === 4 || tile >= 3) continue;
                    let sprName = tile === 1 ? 'wall_' + biome : 'obs_' + biome;
                    if(sprites[sprName]) ctx.drawImage(sprites[sprName], offsetX + c * TILE, offsetY + r * TILE + UI_OFFSET);
                }
            }
        }

        function startTransition(dx, dy) {
            isTransitioning = true;
            transDirX = dx; transDirY = dy; transProgress = 0;
            nextRoomData = getRoom(currentRoomX + dx, currentRoomY + dy);
            projectiles = []; playerProjectiles = []; hazards = [];
        }

        function updateTransition() {
            if (!isTransitioning) return;
            const speed = 4; transProgress += speed;
            if (transDirX !== 0) player.x -= transDirX * speed;
            if (transDirY !== 0) player.y -= transDirY * speed;

            const maxDist = transDirX !== 0 ? SCREEN_COLS * TILE : SCREEN_ROWS * TILE;
            if (transProgress >= maxDist) {
                currentRoomX += transDirX; currentRoomY += transDirY;
                isTransitioning = false; transOffset = {x:0, y:0};
                if (transDirX === 1) player.x = 2; else if (transDirX === -1) player.x = SCREEN_COLS * TILE - player.w - 2;
                if (transDirY === 1) player.y = 2; else if (transDirY === -1) player.y = SCREEN_ROWS * TILE - player.h - 2;
            } else {
                transOffset.x = -transDirX * transProgress; transOffset.y = -transDirY * transProgress;
            }
        }

        function checkAABB(r1, r2) {
            return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
        }

        function shieldBlocks(proj) {
            if (!equipment.shield) return false;
            if (player.isAttacking) return false;
            if (player.dir === 'up' && proj.dy > 0) return true;
            if (player.dir === 'down' && proj.dy < 0) return true;
            if (player.dir === 'left' && proj.dx > 0) return true;
            if (player.dir === 'right' && proj.dx < 0) return true;
            return false;
        }

        // --- STATE LOOPS ---
        function updatePlaying() {
            if (isTransitioning) { updateTransition(); return; }
            player.update();
            const currentRoom = getRoom(currentRoomX, currentRoomY);
            
            if (currentRoom && currentRoom.npcs) {
                currentRoom.npcs.forEach(n => n.update());
            }

            if (currentRoom && currentRoom.biome === 'mountain') {
                if (Math.random() < 0.02) hazards.push(new FallingRock());
            }

            hazards.forEach(h => h.update());
            hazards = hazards.filter(h => h.active);

            playerProjectiles.forEach(p => p.update());
            playerProjectiles = playerProjectiles.filter(p => p.active);

            projectiles.forEach(p => p.update());
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (p.active && checkAABB(p, player)) {
                    p.active = false;
                    if (!shieldBlocks(p)) player.takeDamage();
                    else playSFX('block');
                }
            }
            projectiles = projectiles.filter(p => p.active);

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (item.active && checkAABB(item, player)) {
                    item.active = false;
                    playSFX('item');
                    if (item.type === 'heart') player.health = Math.min(player.health + 2, player.maxHealth);
                    else if (item.type === 'rupee') rupees++;
                }
            }
            items = items.filter(i => i.active);

            // Cut bushes
            if (player.isAttacking && player.swordHitbox) {
                let tileX = Math.floor((player.swordHitbox.x + player.swordHitbox.w/2) / TILE);
                let tileY = Math.floor((player.swordHitbox.y + player.swordHitbox.h/2) / TILE);
                if (tileX >= 0 && tileX < SCREEN_COLS && tileY >= 0 && tileY < SCREEN_ROWS) {
                    if (currentRoom.tiles[tileY][tileX] === 43) {
                        currentRoom.tiles[tileY][tileX] = 0; // turn into grass
                        playSFX('hit');
                        if (Math.random() < 0.2) items.push(new Item(tileX * TILE, tileY * TILE, Math.random() < 0.5 ? 'heart' : 'rupee'));
                    }
                }
            }

            if (currentRoom.enemies) {
                for (let i = currentRoom.enemies.length - 1; i >= 0; i--) {
                    const e = currentRoom.enemies[i];
                    e.update();
                    if (player.isAttacking && player.swordHitbox && e.roomX === currentRoomX && e.roomY === currentRoomY) {
                        if (e.knockbackTimer === 0 && !e.isInvincible && checkAABB(player.swordHitbox, e)) {
                            e.takeDamage(player.x, player.y); playSFX('hit');
                            spawnParticles(e.x+7, e.y+7+UI_OFFSET, '#d82800', 8, 2, 2.5, 14);
                            spawnParticles(e.x+7, e.y+7+UI_OFFSET, '#f89800', 5, 1.5, 2, 10);
                            triggerShake(2, 6);
                            if (e.health <= 0) {
                                spawnParticles(e.x+7, e.y+7+UI_OFFSET, '#f8f8f8', 10, 2.5, 3, 18);
                                spawnParticles(e.x+7, e.y+7+UI_OFFSET, '#fcd8a8', 8, 2, 2, 16);
                                currentRoom.enemies.splice(i, 1);
                                if (Math.random() < 0.5) items.push(new Item(e.x, e.y, Math.random() < 0.5 ? 'heart' : 'rupee'));
                            }
                        }
                    }
                    if (e.roomX === currentRoomX && e.roomY === currentRoomY && !e.isInvincible && checkAABB(player, e)) {
                        player.takeDamage();
                    }
                }
            }
        }

        function updateDialogue() {
            if (isJustPressed('Space') || isJustPressed('KeyZ')) {
                dialogueIndex++;
                if (dialogueIndex >= dialogueText.length) {
                    gameState = 'PLAYING';
                } else {
                    playSFX('talk');
                }
            }
        }

        function updateShop() {
            if (isJustPressed('ArrowUp') || isJustPressed('KeyW')) {
                shopCursor = (shopCursor - 1 + shopItemsData.length) % shopItemsData.length;
                playSFX('talk');
            }
            if (isJustPressed('ArrowDown') || isJustPressed('KeyS')) {
                shopCursor = (shopCursor + 1) % shopItemsData.length;
                playSFX('talk');
            }
            if (isJustPressed('Space') || isJustPressed('KeyZ')) {
                buyShopItem(shopItemsData[shopCursor]);
            }
            if (isJustPressed('Escape') || isJustPressed('KeyX') || isJustPressed('ShiftLeft')) {
                gameState = 'PLAYING';
            }
        }

        const BIOME_NAMES = {
            town: 'はじまりのまち', grassland: 'そうげん', desert: 'さばく',
            volcano: 'かざん', swamp: 'どろぬま', snow: 'せつげん', mountain: 'さんがく'
        };

        function drawUI() {
            // UI background with gradient
            const uiGrad = ctx.createLinearGradient(0,0,0,UI_OFFSET);
            uiGrad.addColorStop(0,'#1a1a2e'); uiGrad.addColorStop(1,'#000');
            ctx.fillStyle = uiGrad;
            ctx.fillRect(0, 0, canvas.width, UI_OFFSET);
            // Gold border
            ctx.fillStyle = '#d8a038';
            ctx.fillRect(0, UI_OFFSET-2, canvas.width, 2);
            
            const biome = getRoom(currentRoomX, currentRoomY).biome;
            ctx.font = '8px monospace';
            ctx.fillStyle = BIOME_BG[biome];
            ctx.fillText(`\u25b6 ${BIOME_NAMES[biome]}`, 4, 10);
            ctx.fillStyle = '#888';
            ctx.fillText(`[${currentRoomX},${-currentRoomY}]`, 4, 20);

            // Rupees with glow
            ctx.drawImage(sprites['rupee'], 4, 22);
            ctx.fillStyle = '#b8f818';
            ctx.fillText('x' + rupees, 20, 32);

            // Inventory panel
            ctx.fillStyle = '#0d0d20';
            ctx.fillRect(78, 2, 86, 60);
            ctx.strokeStyle = '#d8a038'; ctx.lineWidth = 1;
            ctx.strokeRect(78, 2, 86, 60);
            
            let sx = 80, sy = 6;
            const items4 = [
                {key:'bomb', lbl:'1', ico:'ico_bomb', val:()=>inventory.bombs>0, cnt:()=>`x${inventory.bombs}`},
                {key:'bow', lbl:'2', ico:'ico_bow', val:()=>equipment.bow, cnt:()=>`x${inventory.arrows}`},
                {key:'candle', lbl:'3', ico:'ico_candle', val:()=>equipment.candle, cnt:()=>''},
                {key:'potion', lbl:'4', ico:'ico_potion', val:()=>inventory.potions>0, cnt:()=>`x${inventory.potions}`}
            ];
            items4.forEach((it,idx) => {
                const row = Math.floor(idx/2), col = idx%2;
                const ix = sx + col*42, iy = sy + row*28;
                const active = activeItem===it.key;
                ctx.fillStyle = active ? '#302010' : '#0a0a18';
                ctx.fillRect(ix, iy, 40, 26);
                if(active){ctx.strokeStyle='#fc9838';ctx.strokeRect(ix,iy,40,26);}
                ctx.fillStyle = active ? '#fcd8a8' : '#888';
                ctx.fillText(it.lbl+':', ix+2, iy+9);
                if(it.val()) ctx.drawImage(sprites[it.ico], ix+12, iy+2, 12, 12);
                ctx.fillStyle = active ? '#fff' : '#666';
                ctx.fillText(it.cnt(), ix+12, iy+22);
            });

            // Life
            ctx.fillStyle = '#d82800';
            ctx.font = '7px monospace';
            ctx.fillText('LIFE', 173, 10);
            for (let i = 0; i < player.maxHealth / 2; i++) {
                const hx = 170 + (i%4)*16, hy = 12 + Math.floor(i/4)*16;
                let val = player.health - (i * 2);
                if (val >= 2) ctx.drawImage(sprites['heart'], hx, hy);
                else if (val === 1) ctx.drawImage(sprites['heart_half'], hx, hy);
                else ctx.drawImage(sprites['heart_empty'], hx, hy);
            }

            // Equipment bar
            ctx.font = '8px monospace';
            let ex = 170, ey = 46;
            if(equipment.shield){ctx.drawImage(sprites['ico_shield'],ex,ey);ex+=16;}
            if(equipment.armorLevel===1){ctx.drawImage(sprites['ico_clothes'],ex,ey);ex+=16;}
            if(equipment.armorLevel===2){ctx.drawImage(sprites['ico_armor'],ex,ey);ex+=16;}
            if(inventory.keys>0){ctx.drawImage(sprites['ico_key'],ex,ey);ctx.fillStyle='#fff';ctx.fillText('x'+inventory.keys,ex+14,ey+10);}
        }

        function drawGame() {
            const shake = getShakeOffset();
            ctx.save();
            if (shake.x || shake.y) ctx.translate(Math.round(shake.x), Math.round(shake.y));
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isTransitioning) {
                drawRoom(getRoom(currentRoomX, currentRoomY), transOffset.x, transOffset.y);
                drawRoom(nextRoomData, transOffset.x + transDirX * (SCREEN_COLS * TILE), transOffset.y + transDirY * (SCREEN_ROWS * TILE));
            } else {
                drawRoom(getRoom(currentRoomX, currentRoomY), 0, 0);
            }

            items.forEach(i => i.draw());
            hazards.forEach(h => h.draw());
            playerProjectiles.forEach(p => p.draw());
            projectiles.forEach(p => p.draw());
            drawParticles(transOffset.x, transOffset.y);
            
            const cr = getRoom(currentRoomX, currentRoomY);
            if(cr.npcs) cr.npcs.forEach(n => n.draw());
            if(cr.enemies) {
                [...cr.enemies].sort((a,b) => (a.state==='jump'?1:0)-(b.state==='jump'?1:0)).forEach(e => e.draw());
            }
            
            player.draw();
            ctx.restore();
            drawUI();

            if (gameState === 'DIALOGUE') {
                ctx.fillStyle = '#000'; ctx.fillRect(16, canvas.height - 48, canvas.width - 32, 40);
                ctx.strokeStyle = '#fff'; ctx.strokeRect(16, canvas.height - 48, canvas.width - 32, 40);
                ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
                ctx.fillText(dialogueText[dialogueIndex], 24, canvas.height - 24);
                ctx.fillText("▼", canvas.width - 36, canvas.height - 16);
            }

            if (gameState === 'SHOP') {
                ctx.fillStyle = '#000'; ctx.fillRect(16, 80, canvas.width - 32, 120);
                ctx.strokeStyle = '#fff'; ctx.strokeRect(16, 80, canvas.width - 32, 120);
                ctx.fillStyle = '#fcd8a8'; ctx.font = '12px monospace';
                ctx.fillText("いらっしゃい！ なにを かう？ (Xでやめる)", 24, 100);
                
                shopItemsData.forEach((item, idx) => {
                    ctx.fillStyle = idx === shopCursor ? '#fff' : '#888';
                    ctx.fillText(`${idx === shopCursor ? '▶' : ' '} ${item.name} - ${item.price} R`, 24, 120 + idx * 16);
                });
                
                ctx.fillStyle = '#a8e0f8';
                ctx.fillText(shopItemsData[shopCursor].desc, 24, 180);
            }
        }

        // Title screen star field
        const stars = Array.from({length:80}, () => ({x: Math.random()*256, y: Math.random()*240, s: Math.random(), bright: Math.random()}));
        let titleFrame = 0;
        function drawTitle() {
            titleFrame++;
            // Sky gradient
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, '#050520');
            grad.addColorStop(1, '#0a0a40');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Stars
            stars.forEach(st => {
                const twinkle = 0.4 + 0.6 * Math.sin(titleFrame * 0.05 + st.bright * 10);
                ctx.globalAlpha = twinkle;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(Math.round(st.x), Math.round(st.y), st.s < 0.3 ? 2 : 1, st.s < 0.3 ? 2 : 1);
            });
            ctx.globalAlpha = 1;
            // Mountains
            ctx.fillStyle = '#1a1a4a';
            ctx.beginPath(); ctx.moveTo(0,180);
            for(let x=0;x<=256;x+=16){ctx.lineTo(x, 180 - Math.abs(Math.sin(x*0.04)*40+Math.sin(x*0.07)*20));}
            ctx.lineTo(256,240);ctx.lineTo(0,240);ctx.closePath();ctx.fill();
            ctx.fillStyle = '#0d0d30';
            ctx.beginPath(); ctx.moveTo(0,200);
            for(let x=0;x<=256;x+=10){ctx.lineTo(x, 200 - Math.abs(Math.sin(x*0.06+1)*30+Math.sin(x*0.1)*15));}
            ctx.lineTo(256,240);ctx.lineTo(0,240);ctx.closePath();ctx.fill();
            // Title glow
            ctx.shadowColor = '#fc9838'; ctx.shadowBlur = 8;
            ctx.fillStyle = '#fc9838'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
            ctx.fillText('\u2605 THE INFINITE QUEST \u2605', canvas.width/2, 80);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fcd8a8'; ctx.font = '10px monospace';
            ctx.fillText('~  Retro Adventure RPG  ~', canvas.width/2, 96);
            // Blink
            if (Math.floor(titleFrame/30)%2===0) {
                ctx.fillStyle = '#ffffff';
                ctx.fillText('PRESS SPACE TO START', canvas.width/2, 140);
            }
            ctx.fillStyle = '#888'; ctx.font = '8px monospace';
            ctx.fillText('WASD:\u79fb\u52d5  Space/Z:\u3051\u3093  X:\u30a2\u30a4\u30c6\u30e0', canvas.width/2, 200);
            ctx.fillText('1:\u7206\u5f3e 2:\u5f13\u77e2 3:\u8001\u71ed 4:\u56de\u5fa9\u85ac', canvas.width/2, 212);
            ctx.textAlign = 'left';
        }

        function drawGameOver() {
            drawGame();
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d82800'; ctx.font = '20px monospace'; ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
            ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
            ctx.fillText("PRESS SPACE TO RESTART", canvas.width/2, canvas.height/2 + 30);
            ctx.textAlign = 'left';
        }

        function update() {
            scheduleAudio();
            updateParticles();
            if (gameState === 'TITLE') {
                if (isJustPressed('Space')) {
                    player.reset(120, 120); currentRoomX=0; currentRoomY=0; gameState = 'PLAYING'; playSFX('item');
                }
            } else if (gameState === 'GAMEOVER') {
                if (isJustPressed('Space')) {
                    player.reset(120, 120); currentRoomX=0; currentRoomY=0; gameState = 'PLAYING'; playSFX('item');
                }
            } else if (gameState === 'PLAYING') {
                updatePlaying();
            } else if (gameState === 'DIALOGUE') {
                updateDialogue();
            } else if (gameState === 'SHOP') {
                updateShop();
            }
        }

        function draw() {
            if (gameState === 'TITLE') drawTitle();
            else if (gameState === 'GAMEOVER') drawGameOver();
            else drawGame();
        }

        function loop() {
            update(); draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
