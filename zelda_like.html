    <title>Fahren Kingdom Quest - Retro Adventure RPG</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;

            margin-top: 0;
            color: #fc9838;
            text-shadow: 2px 2px #d82800;

        #game-container {
            position: relative;

            box-shadow: 0 0 20px rgba(0,0,0,0.8);

        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: auto;
        }
        .instructions {
            margin-top: 20px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            max-width: 800px;
        }
        kbd {
            background: #444;
            padding: 2px 6px;
            border-radius: 4px;
        }
        #audio-status {
            color: #fcd8a8;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>

    <h1>Fahren Kingdom Quest / ファーレン王国クエスト</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="256" height="240"></canvas>
    </div>

    <div class="instructions">
        <p>移動 / Move: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> | 剣・会話 / Sword・Talk: <kbd>Space</kbd> or <kbd>Z</kbd> | アイテム / Item: <kbd>Shift</kbd> or <kbd>X</kbd> | メニュー / Menu: <kbd>Enter</kbd></p>
        <p>アイテム切替 / Select: <kbd>1</kbd> 爆弾 <kbd>2</kbd> 弓矢 <kbd>3</kbd> ろうそく <kbd>4</kbd> 回復薬</p>
        <p style="color: #fcd8a8;">人間、エルフ、ドワーフが共存するファーレン王国を25×25画面のフィールドとして探索します。</p>
    </div>

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;

        // ==========================================
        // ✨ PARTICLE SYSTEM
        // ==========================================
        const particles = [];
        function spawnParticles(x, y, color, count, spread, speed, life) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const s = speed * (0.5 + Math.random());
                particles.push({
                    x, y,
                    dx: Math.cos(angle) * s * spread,
                    dy: Math.sin(angle) * s * spread,
                    life, maxLife: life,
                    color, size: 1 + Math.random() * 2
                });
            }
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.dx; p.y += p.dy;
                p.dx *= 0.92; p.dy *= 0.92;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        function drawParticles(offsetX, offsetY) {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(Math.round(p.x + offsetX), Math.round(p.y + offsetY + UI_OFFSET), p.size, p.size);
            });
            ctx.globalAlpha = 1;
        }

        // 📳 SCREEN SHAKE
        // ==========================================

            shakeIntensity = intensity; shakeTimer = duration;
        }
        function getShakeOffset() {
            if (shakeTimer <= 0) return {x:0, y:0};
            shakeTimer--;
            return { x: (Math.random()-0.5)*shakeIntensity*2, y: (Math.random()-0.5)*shakeIntensity*2 };
        }

        function initAudio() {
            if(isAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isAudioInitialized = true;
                let t = audioCtx.currentTime + 0.1;
                melodyTime = t;
                bassTime = t;
            } catch(e) { console.error("Web Audio API not supported", e); }
        }

        function playTone(freq, type, duration, vol, startTime) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
            gain.gain.setValueAtTime(vol, startTime + duration - 0.02);
            gain.gain.linearRampToValueAtTime(0, startTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function scheduleAudio() {
            if(!isAudioInitialized || gameState === 'TITLE' || gameState === 'GAMEOVER') return;
            let lookahead = audioCtx.currentTime + 0.5;
            
            while(melodyTime < lookahead) {
                let note = bgmTrack[melodyIndex];
                if(note[0] !== N.R) {
                    playTone(note[0], 'square', note[1] * BEAT_LEN * 0.8, 0.04, melodyTime);
                }
                melodyTime += note[1] * BEAT_LEN;
                melodyIndex = (melodyIndex + 1) % bgmTrack.length;
            }
            
            while(bassTime < lookahead) {
                let note = bassTrack[bassIndex];
                if(note[0] !== N.R) {
                    playTone(note[0], 'triangle', note[1] * BEAT_LEN * 0.9, 0.06, bassTime);
                }
                bassTime += note[1] * BEAT_LEN;
                bassIndex = (bassIndex + 1) % bassTrack.length;
            }
        }

        function playSFX(type) {
            if(!isAudioInitialized) return;
            const t = audioCtx.currentTime;
            if (type === 'sword') {
                playTone(880, 'square', 0.05, 0.03, t);
                playTone(1046, 'square', 0.1, 0.03, t + 0.05);
            } else if (type === 'hit') {
                playTone(150, 'sawtooth', 0.1, 0.08, t);
            } else if (type === 'item') {
                playTone(523, 'square', 0.1, 0.05, t);
                playTone(659, 'square', 0.1, 0.05, t + 0.1);
                playTone(784, 'square', 0.2, 0.05, t + 0.2);
            } else if (type === 'hurt') {
                playTone(349, 'sawtooth', 0.1, 0.08, t);
                playTone(329, 'sawtooth', 0.2, 0.08, t + 0.1);
            } else if (type === 'block') {
                playTone(1200, 'square', 0.05, 0.02, t);
            } else if (type === 'jump') {
                playTone(600, 'square', 0.1, 0.02, t);
                playTone(800, 'square', 0.1, 0.02, t + 0.1);
            } else if (type === 'talk') {
                playTone(400, 'square', 0.05, 0.02, t);
                playTone(600, 'square', 0.05, 0.02, t+0.05);
            } else if (type === 'buy') {
                playTone(880, 'square', 0.1, 0.05, t);
                playTone(1100, 'square', 0.1, 0.05, t+0.1);
                playTone(1320, 'square', 0.2, 0.05, t+0.2);
            } else if (type === 'error') {
                playTone(200, 'sawtooth', 0.2, 0.05, t);

                playTone(100, 'sawtooth', 0.3, 0.1, t);

                playTone(300, 'sawtooth', 0.2, 0.05, t);
            }
        }

        // --- GPT IMAGE 2 HERO SPRITESHEET ---
        function applyAIGraphics() {
            function sliceHeroSheet(imgSrc, size) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        const cols = 3;
                        const rows = 4;
                        const cellW = img.width / cols;
                        const cellH = img.height / rows;
                        const rowByDir = { down: 0, left: 1, right: 2, up: 3 };
                        const colByFrame = { idle: 1, step: 0 };
                        const output = {};

                        const frames = [];
                        Object.entries(rowByDir).forEach(([dir, row]) => {
                            Object.entries(colByFrame).forEach(([frameName, col]) => {
                                const crop = document.createElement('canvas');
                                crop.width = cellW;
                                crop.height = cellH;
                                const cctx = crop.getContext('2d');
                                cctx.drawImage(img, col * cellW, row * cellH, cellW, cellH, 0, 0, cellW, cellH);

                                const imageData = cctx.getImageData(0, 0, crop.width, crop.height);
                                const data = imageData.data;
                                let minX = crop.width, minY = crop.height, maxX = 0, maxY = 0;
                                for (let y = 0; y < crop.height; y++) {
                                    for (let x = 0; x < crop.width; x++) {
                                        const alpha = data[(y * crop.width + x) * 4 + 3];
                                        if (alpha > 12) {
                                            minX = Math.min(minX, x);
                                            minY = Math.min(minY, y);
                                            maxX = Math.max(maxX, x);
                                            maxY = Math.max(maxY, y);
                                        }
                                    }
                                }
                                frames.push({ dir, frameName, crop, minX, minY, maxX, maxY });
                            });
                        });

                        const validFrames = frames.filter(frame => frame.maxX > frame.minX && frame.maxY > frame.minY);
                        const maxFrameW = Math.max(...validFrames.map(frame => frame.maxX - frame.minX + 1));
                        const maxFrameH = Math.max(...validFrames.map(frame => frame.maxY - frame.minY + 1));
                        const sharedScale = Math.min((size - 2) / maxFrameW, (size - 2) / maxFrameH);

                        frames.forEach(frameInfo => {
                            const frame = document.createElement('canvas');
                            frame.width = size;
                            frame.height = size;
                            const fctx = frame.getContext('2d');
                            fctx.imageSmoothingEnabled = true;

                            if (frameInfo.maxX > frameInfo.minX && frameInfo.maxY > frameInfo.minY) {
                                const srcW = frameInfo.maxX - frameInfo.minX + 1;
                                const srcH = frameInfo.maxY - frameInfo.minY + 1;
                                const dstW = Math.max(1, Math.round(srcW * sharedScale));
                                const dstH = Math.max(1, Math.round(srcH * sharedScale));
                                const dstX = Math.floor((size - dstW) / 2);
                                const dstY = Math.max(0, size - dstH - 1);
                                fctx.drawImage(frameInfo.crop, frameInfo.minX, frameInfo.minY, srcW, srcH, dstX, dstY, dstW, dstH);
                            }
                            output[`${frameInfo.dir}_${frameInfo.frameName}`] = frame;
                        });

                        function mirrorFrame(frame) {
                            const mirrored = document.createElement('canvas');
                            mirrored.width = frame.width;
                            mirrored.height = frame.height;
                            const mctx = mirrored.getContext('2d');
                            mctx.translate(frame.width, 0);
                            mctx.scale(-1, 1);
                            mctx.drawImage(frame, 0, 0);
                            return mirrored;
                        }
                        output.right_idle = mirrorFrame(output.left_idle);
                        output.right_step = mirrorFrame(output.left_step);

                        resolve(output);
                    };
                    img.src = imgSrc;
                });
            }

            function sliceTerrainSheet(imgSrc, size) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        const cols = 3;
                        const rows = 3;
                        const cellW = img.width / cols;
                        const cellH = img.height / rows;
                        const inset = 2;
                        const frameMap = [
                            ['terrain_grassland', 'terrain_desert', 'terrain_mountain'],
                            ['terrain_wetland', 'terrain_poison_swamp', 'terrain_river'],
                            ['terrain_wood_bridge', 'terrain_stone_bridge', 'terrain_snowfield']
                        ];
                        const output = {};

                        frameMap.forEach((rowFrames, row) => {
                            rowFrames.forEach((name, col) => {
                                const frame = document.createElement('canvas');
                                frame.width = size;
                                frame.height = size;
                                const fctx = frame.getContext('2d');
                                fctx.imageSmoothingEnabled = true;
                                // GPT Image 2 の3x3シートから対象セルを切り出す。
                                // セル境界の細い線が出ないよう、上下左右を少し内側から取得する。
                                fctx.drawImage(
                                    img,
                                    col * cellW + inset,
                                    row * cellH + inset,
                                    cellW - inset * 2,
                                    cellH - inset * 2,
                                    0,
                                    0,
                                    size,
                                    size
                                );
                                output[name] = frame;
                            });
                        });

                        resolve(output);
                    };
                    img.src = imgSrc;
                });

            function loadSingleObject(imgSrc, width, height) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        const crop = document.createElement('canvas');
                        crop.width = img.width;
                        crop.height = img.height;
                        const cctx = crop.getContext('2d');
                        cctx.drawImage(img, 0, 0);

                        const imageData = cctx.getImageData(0, 0, crop.width, crop.height);
                        const data = imageData.data;
                        let minX = crop.width, minY = crop.height, maxX = 0, maxY = 0;
                        for (let y = 0; y < crop.height; y++) {
                            for (let x = 0; x < crop.width; x++) {
                                const alpha = data[(y * crop.width + x) * 4 + 3];
                                if (alpha > 12) {
                                    minX = Math.min(minX, x);
                                    minY = Math.min(minY, y);
                                    maxX = Math.max(maxX, x);
                                    maxY = Math.max(maxY, y);
                                }
                            }
                        }

                        const frame = document.createElement('canvas');
                        frame.width = width;
                        frame.height = height;
                        const fctx = frame.getContext('2d');
                        fctx.imageSmoothingEnabled = true;
                        if (maxX > minX && maxY > minY) {
                            const srcW = maxX - minX + 1;
                            const srcH = maxY - minY + 1;
                            fctx.drawImage(crop, minX, minY, srcW, srcH, 0, 0, width, height);
                        }
                        resolve(frame);
                    };
                    img.src = imgSrc;

                        if ((r <= 3 || r >= 7) && (c <= 3 || c >= 12)) tile = 1;

                addCastleNpc(npcs, tiles, rx, ry, 6, 7, 'woman', '北郭の城門は王家の儀礼門よ。巡回兵の邪魔をしないでね。');
            } else if (Math.abs(dx) === 2 && Math.abs(dy) <= 1) {
                addCastleNpc(npcs, tiles, rx, ry, 7, 8, 'man', '城壁の角は狭い。壁沿いではなく、石畳の道を歩くと安全だ。');
            } else if ((dx === -1 || dx === 1) && dy === 0) {
                addCastleNpc(npcs, tiles, rx, ry, 7, 8, 'woman', 'この城壁は隣の区画まで続いているわ。正門から本丸へ入れるの。');
            }

            return npcs;
        }

        function isInsideWorld(rx, ry) {
            return rx >= WORLD_MIN && rx <= WORLD_MAX && ry >= WORLD_MIN && ry <= WORLD_MAX;
        }

        function getWorldCode(rx, ry) {
            if (!isInsideWorld(rx, ry)) return 'M';
            return FAHREN_LAYOUT[ry - WORLD_MIN][rx - WORLD_MIN];
        }

        function getBiome(rx, ry) {
            return BIOME_BY_CODE[getWorldCode(rx, ry)] || 'grassland';
        }

        const worldMap = {};
        function getRoomKey(x, y) { return `${x},${y}`; }
        
        function generateRoom(rx, ry) {
            const biome = getBiome(rx, ry);
            let tiles = [];
            const townTiles = biome === 'town' ? createTownTiles(rx, ry) : null;
            
            for(let r = 0; r < SCREEN_ROWS; r++) {
                let row = [];
                for(let c = 0; c < SCREEN_COLS; c++) {
                    let isEdge = (r === 0 || r === SCREEN_ROWS-1 || c === 0 || c === SCREEN_COLS-1);
                    let isDoor = false;
                    if (r === 0 && c >= 7 && c <= 8 && ry > WORLD_MIN) isDoor = true;
                    if (r === SCREEN_ROWS-1 && c >= 7 && c <= 8 && ry < WORLD_MAX) isDoor = true;
                    if (c === 0 && r >= 4 && r <= 6 && rx > WORLD_MIN) isDoor = true;
                    if (c === SCREEN_COLS-1 && r >= 4 && r <= 6 && rx < WORLD_MAX) isDoor = true;
                    
                    if (biome === 'town') {
                        row.push(townTiles[r][c]);
                    } else {
                        if (isEdge && !isDoor) {
                            row.push(1);
                        } else if (isEdge && isDoor) {
                            row.push(0);
                        } else {
                            let isPath = (c >= 6 && c <= 9) || (r >= 3 && r <= 7);
                            if (biome === 'swamp') {
                                if (isPath) row.push(Math.random() < 0.4 ? 4 : 0);
                                else {
                                    let rand = Math.random();
                                    if (rand < 0.1) row.push(1);      
                                    else if (rand < 0.3) row.push(2); 
                                    else if (rand < 0.7) row.push(4); 
                                    else row.push(0);                 
                                }
                            } else if (biome === 'lake') {
                                if (isPath) row.push((c >= 7 && c <= 8) || (r >= 4 && r <= 6) ? 0 : 2);
                                else {
                                    let rand = Math.random();
                                    if (rand < 0.72) row.push(2);
                                    else if (rand < 0.88) row.push(0);
                                    else row.push(1);
                                }
                            } else if (biome === 'forest') {
                                if (isPath) row.push(0);
                                else {
                                    let rand = Math.random();
                                    if (rand < 0.22) row.push(1);
                                    else if (rand < 0.34) row.push(43);
                                    else if (rand < 0.46) row.push(2);
                                    else row.push(0);
                                }
                            } else {
                                if (isPath) row.push(0);
                                else {
                                    let rand = Math.random();
                                    if (rand < 0.15) row.push(1); 
                                    else if (rand < 0.3) row.push(2); 
                                    else row.push(0);
                                }
                            }
                        }
                    }
                }
                tiles.push(row);
            }

            if (biome === 'swamp') {
                for(let iter=0; iter<2; iter++) {
                    let newTiles = JSON.parse(JSON.stringify(tiles));
                    for(let r=1; r<SCREEN_ROWS-1; r++) {
                        for(let c=1; c<SCREEN_COLS-1; c++) {
                            if (tiles[r][c] === 1) continue;
                            let mudCount = 0; let deepCount = 0;
                            for(let dr=-1; dr<=1; dr++){
                                for(let dc=-1; dc<=1; dc++){
                                    if(tiles[r+dr][c+dc] === 4) mudCount++;
                                    if(tiles[r+dr][c+dc] === 2) deepCount++;
                                }
                            }
                            if (deepCount >= 4) newTiles[r][c] = 2;
                            else if (mudCount >= 4) newTiles[r][c] = 4;
                            else if (mudCount < 2 && deepCount < 2) newTiles[r][c] = 0;
                        }
                    }
                    tiles = newTiles;
                }
            }
            
            if (biome === 'town') {
                // Spawn NPCs
                let npcs = [];
                const settlementCode = getWorldCode(rx, ry);
                if (settlementCode === 'C') {
                    npcs = createCastleNpcs(rx, ry, tiles);
                } else if (settlementCode === 'V') {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', Math.random() < 0.5 ? 'item' : 'weapon'));
                    npcs.push(new NPC(5*TILE, 6*TILE, rx, ry, 'man', '旅人よ、道は王都へ続く。砂漠、森、山、湿原で敵の気配が強まっている。'));
                    npcs.push(new NPC(12*TILE, 7*TILE, rx, ry, 'woman', '湖のほとりでは水辺の魔物に気をつけて。'));
                } else if (rx === 0 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 5*TILE, rx, ry, 'man', 'ここは はじまりのまち です。'));
                    npcs.push(new NPC(12*TILE, 6*TILE, rx, ry, 'woman', 'まもの には きをつけて！'));
                    npcs.push(new NPC(4*TILE, 7*TILE, rx, ry, 'dog', 'ワン！ワン！'));
                    npcs.push(new NPC(6*TILE, 3*TILE, rx, ry, 'chicken', 'コケッコッコー！'));
                } else if (rx === -1 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'weapon'));
                    npcs.push(new NPC(4*TILE, 5*TILE, rx, ry, 'man', 'ぶきや は けんや ゆみを うっているぞ。'));
                } else if (rx === 1 && ry === 0) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'armor'));
                    npcs.push(new NPC(12*TILE, 6*TILE, rx, ry, 'woman', 'たて がないと たま をふせげないわ。'));
                } else if (rx === 0 && ry === -1) {
                    npcs.push(new NPC(8*TILE, 3*TILE, rx, ry, 'merchant', 'item'));
                    npcs.push(new NPC(3*TILE, 3*TILE, rx, ry, 'dog', 'クゥーン...'));
                } else {
                    npcs.push(new NPC((4+Math.random()*8)*TILE, (4+Math.random()*4)*TILE, rx, ry, Math.random() < 0.5 ? 'man':'woman', 'こんにちは！'));
                    if (Math.random() < 0.5) npcs.push(new NPC((2+Math.random()*12)*TILE, (2+Math.random()*8)*TILE, rx, ry, 'chicken', 'ココッ！'));
                }
                return { biome: biome, worldX: rx, worldY: ry, tiles: tiles, npcs: npcs };
            }

            // Spawn Enemies for other biomes
            let enemyList = [];
            const bossDef = getBossDefinition(rx, ry);
            if (bossDef) {
                enemyList.push(new Enemy(7 * TILE, 4 * TILE, rx, ry, bossDef.type));
                return { biome: biome, worldX: rx, worldY: ry, tiles: tiles, enemies: enemyList, boss: bossDef };
            }

            let numEnemies = Math.floor(Math.random() * 6) + 3; 
            for(let i=0; i<numEnemies; i++) {
                let ex = (2 + Math.floor(Math.random() * 12)) * TILE;
                let ey = (2 + Math.floor(Math.random() * 7)) * TILE;
                enemyList.push(new Enemy(ex, ey, rx, ry, pickEnemyTypeForBiome(biome)));
            }

            return { biome: biome, worldX: rx, worldY: ry, tiles: tiles, enemies: enemyList };
        }

        function getRoom(x, y) {
            const key = getRoomKey(x, y);
            if (!worldMap[key]) {
                worldMap[key] = generateRoom(x, y);
            }
            return worldMap[key];
        }

        let currentRoomX = START_ROOM_X; let currentRoomY = START_ROOM_Y;
        let isTransitioning = false; let transOffset = { x: 0, y: 0 };
        let nextRoomData = null;
        let transDirX = 0, transDirY = 0, transProgress = 0;

        function isSolid(tileId) {
            return tileId === 1 || tileId === 2 || (tileId >= 20 && tileId <= 28) || (tileId >= 40 && tileId <= 43) || tileId === undefined;
        }

        function checkCollision(x, y, w, h) {
            const room = getRoom(currentRoomX, currentRoomY);
            if (!room) return true;
            const leftCol = Math.floor(x / TILE);
            const rightCol = Math.floor((x + w - 1) / TILE);
            const topRow = Math.floor(y / TILE);
            const bottomRow = Math.floor((y + h - 1) / TILE);
            if (leftCol < 0 || rightCol >= SCREEN_COLS || topRow < 0 || bottomRow >= SCREEN_ROWS) return false;
            for (let r = topRow; r <= bottomRow; r++) {
                for (let c = leftCol; c <= rightCol; c++) {
                    if (isSolid(room.tiles[r][c])) return true;
                }
            }
            return false;
        }

        // --- ENTITIES ---
        class Player {
            constructor(x, y) {
                this.reset(x, y);
            }
            reset(x, y) {
                this.x = x; this.y = y; this.w = 12; this.h = 12;
                this.baseSpeed = 1.5; this.dir = 'down';
                this.health = 6; this.maxHealth = 6;
                this.animFrame = 1; this.animTimer = 0;
                this.isAttacking = false; this.attackTimer = 0;
                this.swordHitbox = null; this.invincibleTimer = 0;
                rupees = 0;
                inventory = { bombs: 0, arrows: 0, keys: 0, potions: 0 };
                equipment = { shield: false, bow: false, armorLevel: 0, candle: false };
                activeItem = 'none';
                sacredStones = {};
            }

            update() {
                if (isTransitioning) return;
                if (this.invincibleTimer > 0) this.invincibleTimer--;

                if (this.x < 0) {
                    if (currentRoomX > WORLD_MIN) startTransition(-1, 0);
                    else this.x = 0;
                }
                else if (this.x + this.w > SCREEN_COLS * TILE) {
                    if (currentRoomX < WORLD_MAX) startTransition(1, 0);
                    else this.x = SCREEN_COLS * TILE - this.w;
                }
                else if (this.y < 0) {
                    if (currentRoomY > WORLD_MIN) startTransition(0, -1);
                    else this.y = 0;
                }
                else if (this.y + this.h > SCREEN_ROWS * TILE) {
                    if (currentRoomY < WORLD_MAX) startTransition(0, 1);
                    else this.y = SCREEN_ROWS * TILE - this.h;
                }
                
                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                        this.swordHitbox = null;
                    }
                    return;
                }

                // Handle Dialogue / Shop interaction
                if (isJustPressed('Space') || isJustPressed('KeyZ')) {
                    // Check for NPC in front
                    let talkHx = this.x, talkHy = this.y;
                    if(this.dir === 'up') talkHy -= 16;
                    if(this.dir === 'down') talkHy += 16;
                    if(this.dir === 'left') talkHx -= 16;
                    if(this.dir === 'right') talkHx += 16;
                    let talkRect = {x:talkHx, y:talkHy, w:16, h:16};
                    
                    const room = getRoom(currentRoomX, currentRoomY);
                    if(room.npcs) {
                        for(let npc of room.npcs) {
                            if(checkAABB(talkRect, npc)) {
                                if(npc.type === 'merchant') {
                                    startShop(npc.role, npc);
                                } else {
                                    startDialogue([npc.role]);
                                }
                                return;
                            }
                        }
                    }
                    // If no NPC, attack
                    this.isAttacking = true;
                    this.attackTimer = 12;
                    this.swordHitbox = { x: talkHx, y: talkHy, w: 16, h: 16 };
                    playSFX('sword');
                    // Sword slash particles
                    spawnParticles(talkHx+8, talkHy+8+UI_OFFSET, '#f8d8b0', 6, 1.5, 2, 10);
                    spawnParticles(talkHx+8, talkHy+8+UI_OFFSET, '#ffffff', 4, 2, 1.5, 8);
                    return;
                }

                // Handle Items
                if (isJustPressed('Digit1') && inventory.bombs > 0) activeItem = 'bomb';
                if (isJustPressed('Digit2') && equipment.bow) activeItem = 'bow';
                if (isJustPressed('Digit3') && equipment.candle) activeItem = 'candle';
                if (isJustPressed('Digit4') && inventory.potions > 0) activeItem = 'potion';

                if (isJustPressed('KeyX') || isJustPressed('ShiftLeft') || isJustPressed('ShiftRight')) {
                    this.useItem();
                }

                let speed = this.baseSpeed;
                const room = getRoom(currentRoomX, currentRoomY);
                if (room) {
                    let cx = Math.floor((this.x + this.w/2) / TILE);
                    let cy = Math.floor((this.y + this.h/2) / TILE);
                    if (cy >= 0 && cy < SCREEN_ROWS && cx >= 0 && cx < SCREEN_COLS) {
                        if (room.tiles[cy][cx] === 4) speed = this.baseSpeed * 0.5;
                    }
                }

                let dx = 0, dy = 0, isMoving = false;
                if (keys['KeyW'] || keys['ArrowUp']) { dy = -speed; this.dir = 'up'; isMoving = true; }
                else if (keys['KeyS'] || keys['ArrowDown']) { dy = speed; this.dir = 'down'; isMoving = true; }
                else if (keys['KeyA'] || keys['ArrowLeft']) { dx = -speed; this.dir = 'left'; isMoving = true; }
                else if (keys['KeyD'] || keys['ArrowRight']) { dx = speed; this.dir = 'right'; isMoving = true; }

                if (dx !== 0 && !checkCollision(this.x + dx, this.y, this.w, this.h)) this.x += dx;
                if (dy !== 0 && !checkCollision(this.x, this.y + dy, this.w, this.h)) this.y += dy;

                if (isMoving) {
                    this.animTimer++;
                    if (this.animTimer > (speed < 1 ? 16 : 8)) {
                        this.animTimer = 0;
                        this.animFrame = this.animFrame === 1 ? 2 : 1;
                    }
                } else {
                    this.animFrame = 1;
                }
            }

            useItem() {
                if (activeItem === 'bomb' && inventory.bombs > 0) {
                    inventory.bombs--;
                    if(inventory.bombs <= 0) activeItem = 'none';
                    let bx = this.x; let by = this.y;
                    if(this.dir === 'up') by -= 16; if(this.dir === 'down') by += 16;
                    if(this.dir === 'left') bx -= 16; if(this.dir === 'right') bx += 16;
                    hazards.push(new Bomb(bx, by));
                } else if (activeItem === 'bow' && inventory.arrows > 0) {
                    inventory.arrows--;
                    let dx = 0, dy = 0;
                    if(this.dir === 'up') dy = -4; if(this.dir === 'down') dy = 4;
                    if(this.dir === 'left') dx = -4; if(this.dir === 'right') dx = 4;
                    playerProjectiles.push(new PlayerProjectile(this.x+2, this.y+2, dx, dy, 'arrow'));
                    playSFX('arrow');
                } else if (activeItem === 'candle') {
                    let dx = 0, dy = 0;
                    if(this.dir === 'up') dy = -2; if(this.dir === 'down') dy = 2;
                    if(this.dir === 'left') dx = -2; if(this.dir === 'right') dx = 2;
                    playerProjectiles.push(new PlayerProjectile(this.x+2, this.y+2, dx, dy, 'fire'));
                    playSFX('fire');
                } else if (activeItem === 'potion' && inventory.potions > 0) {
                    inventory.potions--;
                    if(inventory.potions <= 0) activeItem = 'none';
                    this.health = Math.min(this.maxHealth, this.health + 6);
                    playSFX('item');
                }
            }

            draw() {
                if (this.invincibleTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
                const sprite = sprites[`link_${this.dir}_${this.animFrame}`];
                const drawX = Math.round(this.x + transOffset.x + this.w / 2 - sprite.width / 2);
                const drawY = Math.round(this.y + transOffset.y + UI_OFFSET + this.h - sprite.height + 4);
                
                if (this.isAttacking) {
                    let sX = drawX, sY = drawY;
                    if (this.dir === 'up') sY -= 14;
                    if (this.dir === 'down') sY += 14;
                    if (this.dir === 'left') sX -= 14;
                    if (this.dir === 'right') sX += 14;
                    ctx.drawImage(sprites['sword_' + this.dir], sX, sY);
                }
                
                ctx.save();
                if(equipment.armorLevel === 1) ctx.filter = 'hue-rotate(90deg)'; // Greenish/Different
                if(equipment.armorLevel === 2) ctx.filter = 'hue-rotate(180deg)'; // Reddish
                ctx.drawImage(sprite, drawX, drawY);
                ctx.restore();
            }

            takeDamage() {
                if (invincibleMode) {
                    this.invincibleTimer = Math.max(this.invincibleTimer, 12);
                    playSFX('block');
                    return;
                }
                if (this.invincibleTimer <= 0) {
                    let dmg = 1;
                    if(equipment.armorLevel === 1) dmg = 0.75;
                    if(equipment.armorLevel === 2) dmg = 0.5;
                    if(equipment.armorLevel === 1 && Math.random() < 0.25) dmg = 0;
                    if(equipment.armorLevel === 2 && Math.random() < 0.5) dmg = 0;
                    if (dmg > 0) {
                        this.health -= 1;
                        this.invincibleTimer = 40;
                        playSFX('hurt');
                        spawnParticles(this.x+6, this.y+6+UI_OFFSET, '#d82800', 6, 1.5, 2, 12);
                        triggerShake(3, 8);
                        if (this.health <= 0) {
                            gameState = 'GAMEOVER';
                        }
                    }
                }
            }
        }

        class NPC {
            constructor(x, y, roomX, roomY, type, role) {
                this.x = x; this.y = y; this.w = 14; this.h = 14;
                this.roomX = roomX; this.roomY = roomY;
                this.type = type; 
                this.role = role;
                this.timer = 0; this.dx = 0; this.dy = 0;
                this.animFrame = 1; this.animTimer = 0;
            }
            update() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY || isTransitioning) return;
                
                if (this.type !== 'merchant') {
                    if (this.timer <= 0) {
                        this.timer = 60 + Math.random() * 100;
                        if (Math.random() < 0.5) {
                            this.dx = 0; this.dy = 0;
                        } else {
                            const dirs = [[0,-0.5],[0,0.5],[-0.5,0],[0.5,0]];
                            const d = dirs[Math.floor(Math.random()*dirs.length)];
                            this.dx = d[0]; this.dy = d[1];
                        }
                    }
                    this.timer--;
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                    
                    if (this.dx !== 0 || this.dy !== 0) {
                        this.animTimer++;
                        if (this.animTimer > 15) {
                            this.animTimer = 0;
                            this.animFrame = this.animFrame === 1 ? 2 : 1;
                        }
                    }
                }
            }
            draw() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY) return;
                let sprName = `npc_${this.type}_${this.animFrame}`;
                if (this.type === 'merchant') sprName = 'merchant';
                // Fallback for simple sprites
                if (!sprites[sprName]) sprName = `npc_${this.type}`; // like dog or chicken without anim frames if not defined properly, but we will define them.
                if (!sprites[sprName]) sprName = 'npc_man_1'; // ultimate fallback

                const spr = sprites[sprName];
                if (!spr) return;
                const drawX = Math.round(this.x + transOffset.x + this.w / 2 - spr.width / 2);
                const drawY = Math.round(this.y + transOffset.y + UI_OFFSET + this.h - spr.height + 4);
                ctx.drawImage(spr, drawX, drawY);
            }
        }

        class Bomb {
            constructor(x, y) {
                this.x = x; this.y = y; this.w = 16; this.h = 16;
                this.timer = 90;
                this.active = true;
                playSFX('bomb');
            }
            update() {
                if(isTransitioning) return;
                this.timer--;
                if(this.timer === 0) {
                    playSFX('hit');
                    // Explosion hit logic
                    let explodeRect = {x: this.x-16, y: this.y-16, w: 48, h: 48};
                    const room = getRoom(currentRoomX, currentRoomY);
                    if(room.enemies) {
                        room.enemies.forEach(e => {
                            if(checkAABB(explodeRect, e)) {
                                e.takeDamage(this.x, this.y); e.takeDamage(this.x, this.y); // Double damage
                            }
                        });
                    }
                    if(checkAABB(explodeRect, player)) player.takeDamage();
                }
                if(this.timer < -15) this.active = false;
            }
            draw() {
                if(this.timer > 0) {
                    if(this.timer % 10 < 5) ctx.drawImage(sprites['ico_bomb'], Math.round(this.x + transOffset.x), Math.round(this.y + transOffset.y + UI_OFFSET));
                } else {
                    ctx.drawImage(sprites['bomb_flash'], Math.round(this.x + transOffset.x - 16), Math.round(this.y + transOffset.y + UI_OFFSET - 16), 48, 48);
                }
            }
        }

        class PlayerProjectile {
            constructor(x, y, dx, dy, type) {
                this.x = x; this.y = y; this.w = 8; this.h = 8;
                this.dx = dx; this.dy = dy; this.type = type;
                this.active = true;
                this.timer = type === 'fire' ? 30 : 100;
            }
            update() {
                if(isTransitioning) return;
                this.x += this.dx; this.y += this.dy;
                this.timer--;
                if (checkCollision(this.x, this.y, this.w, this.h) || this.timer <= 0) this.active = false;
                
                const room = getRoom(currentRoomX, currentRoomY);
                if(room.enemies) {
                    room.enemies.forEach(e => {
                        if(this.active && checkAABB(this, e)) {
                            e.takeDamage(this.x, this.y);
                            if(this.type === 'arrow') this.active = false;
                        }
                    });
                }
            }
            draw() {
                let sprName = 'proj_fire';
                if (this.type === 'arrow') {
                    if(this.dy < 0) sprName = 'proj_arrow_up';
                    if(this.dy > 0) sprName = 'proj_arrow_down';
                    if(this.dx < 0) sprName = 'proj_arrow_left';
                    if(this.dx > 0) sprName = 'proj_arrow_right';
                }
                ctx.drawImage(sprites[sprName], Math.round(this.x + transOffset.x - 4), Math.round(this.y + transOffset.y + UI_OFFSET - 4));
            }
        }

        // Projectiles and Enemies classes from previous, updated for lists
        class Projectile {
            constructor(x, y, dx, dy) {
                this.x = x; this.y = y; this.w = 8; this.h = 8;
                this.dx = dx; this.dy = dy; this.active = true;
            }
            update() {
                this.x += this.dx; this.y += this.dy;
                if (checkCollision(this.x, this.y, this.w, this.h) || 
                    this.x < 0 || this.x > SCREEN_COLS*TILE || 
                    this.y < 0 || this.y > SCREEN_ROWS*TILE) {
                    this.active = false;
                }
            }
            draw() {
                ctx.drawImage(sprites['rock_proj'], Math.round(this.x + transOffset.x - 4), Math.round(this.y + transOffset.y + UI_OFFSET - 4));
            }
        }

        class FallingRock {
            constructor() {
                this.x = Math.floor(Math.random() * SCREEN_COLS) * TILE;
                this.y = -16; this.w = 12; this.h = 12;
                this.dy = 1.5 + Math.random() * 1.5;
                this.active = true;
            }
            update() {
                if(isTransitioning) return;
                this.y += this.dy;
                if(this.y > SCREEN_ROWS * TILE) this.active = false;
            }
            draw() {
                ctx.drawImage(sprites['falling_rock'], Math.round(this.x + transOffset.x - 2), Math.round(this.y + transOffset.y + UI_OFFSET - 2));
            }
        }

        class Enemy {
            constructor(x, y, roomX, roomY, type='octorok') {
                this.roomX = roomX; this.roomY = roomY;
                this.type = type;
                this.timer = 0; this.dx = 0; this.dy = 0;
                this.knockbackTimer = 0; this.kdx = 0; this.kdy = 0;
                this.animFrame = 1; this.animTimer = 0;
                this.isInvincible = false;
                
                const profile = getEnemyProfile(type);
                const size = profile.size || 14;
                this.x = x; this.y = y; this.w = size; this.h = size;
                this.behavior = profile.behavior;
                this.health = profile.health;
                this.maxHealth = profile.health;
                this.baseSpeed = profile.speed;
                this.isBoss = !!profile.boss;
                if (this.behavior === 'jumper') this.state = 'wait';
                if (this.behavior === 'burrower') {
                    this.state = 'hidden';
                    this.timer = 60;
                    this.isInvincible = true;
                }
            }

            update() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY || isTransitioning) return;
                if (this.knockbackTimer > 0) {
                    this.knockbackTimer--;
                    if (!checkCollision(this.x + this.kdx, this.y + this.kdy, this.w, this.h) || this.behavior === 'flyer') {
                        this.x += this.kdx; this.y += this.kdy;
                    }
                    return;
                }

                let speed = this.baseSpeed;
                this.timer--;

                if (this.behavior === 'flyer') {
                    if (this.timer <= 0) {
                        this.timer = 20 + Math.random() * 40;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx) + (Math.random() - 0.5) * 2;
                        this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                    }
                    this.x += this.dx; this.y += this.dy;
                } 
                else if (this.behavior === 'chaser') {
                    if (this.timer <= 0) {
                        this.timer = 15;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx);
                        this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                    }
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                }
                else if (this.behavior === 'jumper') {
                    if (this.state === 'wait') {
                        this.isInvincible = false;
                        if (this.timer <= 0) {
                            this.state = 'jump'; this.timer = 30; this.isInvincible = true;
                            let pdx = player.x - this.x; let pdy = player.y - this.y;
                            let angle = Math.atan2(pdy, pdx);
                            this.dx = Math.cos(angle) * speed; this.dy = Math.sin(angle) * speed;
                            playSFX('jump');
                        }
                    } else if (this.state === 'jump') {
                        this.x += this.dx; this.y += this.dy; 
                        if (this.timer <= 0) { this.state = 'wait'; this.timer = 60 + Math.random() * 60; }
                    }
                }
                else if (this.behavior === 'burrower') {
                    if (this.state === 'hidden') {
                        this.isInvincible = true;
                        let pdx = player.x - this.x; let pdy = player.y - this.y;
                        let angle = Math.atan2(pdy, pdx);
                        this.dx = Math.cos(angle) * (speed * 0.5); this.dy = Math.sin(angle) * (speed * 0.5);
                        if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                        if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;

                        if (this.timer <= 0 && Math.hypot(pdx, pdy) < 60) {
                            this.state = 'emerge'; this.timer = 80; this.isInvincible = false;
                        }
                    } else if (this.state === 'emerge') {
                        this.dx = 0; this.dy = 0;
                        if (this.timer <= 0) { this.state = 'hidden'; this.timer = 120 + Math.random() * 60; }
                    }
                }
                else {
                    if (this.timer <= 0) {
                        if (this.behavior === 'shooter' && Math.random() < 0.3) {
                            this.dx = 0; this.dy = 0; this.timer = 40;
                            let pdx = player.x - this.x, pdy = player.y - this.y;
                            let shootDx = 0, shootDy = 0;
                            if (Math.abs(pdx) > Math.abs(pdy)) shootDx = pdx > 0 ? 2 : -2;
                            else shootDy = pdy > 0 ? 2 : -2;
                            projectiles.push(new Projectile(this.x + this.w / 2 - 4, this.y + this.h / 2 - 4, shootDx, shootDy));
                        } else {
                            this.timer = 60 + Math.random() * 60;
                            const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
                            const d = dirs[Math.floor(Math.random()*dirs.length)];
                            this.dx = d[0] * speed; this.dy = d[1] * speed;
                        }
                    }
                    if (!checkCollision(this.x + this.dx, this.y, this.w, this.h)) this.x += this.dx;
                    else this.timer = 0;
                    if (!checkCollision(this.x, this.y + this.dy, this.w, this.h)) this.y += this.dy;
                    else this.timer = 0;
                }
                
                if (this.x < 0) this.x = 0;
                if (this.x > SCREEN_COLS*TILE - this.w) this.x = SCREEN_COLS*TILE - this.w;
                if (this.y < 0) this.y = 0;
                if (this.y > SCREEN_ROWS*TILE - this.h) this.y = SCREEN_ROWS*TILE - this.h;

                if (this.dx !== 0 || this.dy !== 0 || this.behavior === 'jumper' || this.behavior === 'burrower') {
                    this.animTimer++;
                    if (this.animTimer > 15) {
                        this.animTimer = 0;
                        this.animFrame = this.animFrame === 1 ? 2 : 1;
                    }
                }
            }
            
            draw() {
                if (this.roomX !== currentRoomX || this.roomY !== currentRoomY) return;
                if (this.knockbackTimer > 0 && Math.floor(Date.now()/50)%2===0) return;
                
                let sprName = `${this.type}_${this.animFrame}`;
                if (this.behavior === 'jumper' && this.state === 'jump') sprName = `${this.type}_2`;
                if (this.behavior === 'jumper' && this.state === 'wait') sprName = `${this.type}_1`;
                if (this.type === 'worm' && this.state === 'hidden') sprName = 'worm_hidden';
                if (this.type === 'worm' && this.state === 'emerge') sprName = 'worm_emerge';
                if (this.type !== 'worm' && this.behavior === 'burrower' && this.state === 'hidden') sprName = `${this.type}_1`;
                if (this.type !== 'worm' && this.behavior === 'burrower' && this.state === 'emerge') sprName = `${this.type}_2`;
                
                let drawY = this.y;
                if (this.behavior === 'jumper' && this.state === 'jump') {
                    let elapsed = 30 - this.timer;
                    let height = Math.sin((elapsed / 30) * Math.PI) * 20;
                    drawY -= height;
                }
                const spr = sprites[sprName];
                if (!spr) return;
                const drawX = Math.round(this.x + transOffset.x + this.w / 2 - spr.width / 2);
                const sy = Math.round(drawY + transOffset.y + UI_OFFSET + this.h - spr.height + 4);
                ctx.drawImage(spr, drawX, sy);
            }
            
            takeDamage(px, py) {
                if (this.isInvincible) return;
                this.health--;
                this.knockbackTimer = 15;
                const dist = Math.hypot(this.x - px, this.y - py);
                if(dist > 0) {
                    this.kdx = ((this.x - px) / dist) * 2;
                    this.kdy = ((this.y - py) / dist) * 2;
                }
            }
        }

        const SAVE_SLOT_COUNT = 3;
        const SAVE_KEY_PREFIX = 'fahren_kingdom_quest_save_';

        function getSaveSlotKey(slot) {
            return `${SAVE_KEY_PREFIX}${slot}`;
        }

        function createSaveData() {
            return {
                version: 1,
                savedAt: new Date().toISOString(),
                player: {
                    x: Math.round(player.x),
                    y: Math.round(player.y),
                    health: player.health,
                    maxHealth: player.maxHealth,
                    dir: player.dir
                },
                room: { x: currentRoomX, y: currentRoomY },
                rupees,
                inventory: { ...inventory },
                equipment: { ...equipment },
                activeItem,
                sacredStones: { ...sacredStones }
            };
        }

        function readSaveSlot(slot) {
            try {
                const raw = localStorage.getItem(getSaveSlotKey(slot));
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function writeSaveSlot(slot) {
            try {
                localStorage.setItem(getSaveSlotKey(slot), JSON.stringify(createSaveData()));
                menuMessage = `File ${slot} にセーブしました`;
                playSFX('item');
            } catch (e) {
                menuMessage = 'セーブに失敗しました';
                playSFX('error');
            }
        }

        function applySaveData(data) {
            if (!data || !data.player || !data.room) return false;
            currentRoomX = Math.max(WORLD_MIN, Math.min(WORLD_MAX, data.room.x ?? START_ROOM_X));
            currentRoomY = Math.max(WORLD_MIN, Math.min(WORLD_MAX, data.room.y ?? START_ROOM_Y));
            player.reset(data.player.x ?? 120, data.player.y ?? 120);
            player.maxHealth = data.player.maxHealth ?? player.maxHealth;
            player.health = Math.max(1, Math.min(data.player.health ?? player.maxHealth, player.maxHealth));
            player.dir = data.player.dir || 'down';
            rupees = data.rupees ?? 0;
            inventory = { bombs: 0, arrows: 0, keys: 0, potions: 0, ...(data.inventory || {}) };
            equipment = { shield: false, bow: false, armorLevel: 0, candle: false, ...(data.equipment || {}) };
            activeItem = data.activeItem || 'none';
            sacredStones = { ...(data.sacredStones || {}) };
            Object.keys(worldMap).forEach(key => delete worldMap[key]);
            projectiles = []; playerProjectiles = []; items = []; hazards = [];
            isTransitioning = false; nextRoomData = null; transOffset = { x: 0, y: 0 };
            gameState = 'PLAYING';
            menuMessage = 'ロードしました';
            playSFX('item');
            return true;
        }

        function formatSaveSlot(slot) {
            const data = readSaveSlot(slot);
            if (!data) return `File ${slot}: EMPTY`;
            const stones = Object.keys(data.sacredStones || {}).length;
            const date = data.savedAt ? new Date(data.savedAt) : null;
            const stamp = date && !Number.isNaN(date.getTime())
                ? `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`
                : 'saved';
            return `File ${slot}: ${stamp} S ${stones}/7 [${data.room?.x ?? 0},${-(data.room?.y ?? 0)}]`;
        }

        function buyShopItem(item) {
            if (rupees >= item.price) {
                if(item.type === 'bow' && equipment.bow) { playSFX('error'); return; }
                if(item.type === 'shield' && equipment.shield) { playSFX('error'); return; }
                if(item.type === 'clothes' && equipment.armorLevel >= 1) { playSFX('error'); return; }
                if(item.type === 'armor' && equipment.armorLevel >= 2) { playSFX('error'); return; }
                if(item.type === 'candle' && equipment.candle) { playSFX('error'); return; }

                rupees -= item.price;
                playSFX('buy');
                
                if(item.type === 'bow') equipment.bow = true;
                if(item.type === 'shield') equipment.shield = true;
                if(item.type === 'clothes') equipment.armorLevel = 1;
                if(item.type === 'armor') equipment.armorLevel = 2;
                if(item.type === 'candle') equipment.candle = true;
                
                if(item.type === 'bomb') inventory.bombs += 1; // 1 bomb per buy? Or 5? Let's say 5 for 30r.
                if(item.type === 'arrows') inventory.arrows += 10;
                if(item.type === 'potion') inventory.potions += 1;
                if(item.type === 'key') inventory.keys += 1;
                
                if(item.type === 'bomb' && item.price === 30) inventory.bombs += 4; // Total 5
            } else {
                playSFX('error');
            }
        }

        // --- ROOM RENDERING ---
        const terrainLayerCache = new WeakMap();

        function getBaseTerrainSprite(biome) {
            if (biome === 'forest') return sprites.terrain_grassland;
            if (biome === 'grassland') return sprites.terrain_grassland;
            if (biome === 'desert') return sprites.terrain_desert;
            if (biome === 'mountain') return sprites.terrain_mountain;
            if (biome === 'swamp') return sprites.terrain_wetland || sprites.ground_swamp;
            if (biome === 'lake') return sprites.terrain_river;
            if (biome === 'snow') return sprites.terrain_snowfield;
            if (biome === 'volcano') return sprites.terrain_mountain;
            if (biome === 'town') return sprites.terrain_grassland || sprites.ground_town;
            return null;
        }

        function getObjectSpriteBiome(biome) {
            if (biome === 'forest') return 'grassland';
            if (biome === 'lake') return 'swamp';
            return biome;
        }

        function drawTerrainSprite(layerCtx, sprite, c, r) {
            if (!sprite) return;
            layerCtx.drawImage(sprite, c * TILE, r * TILE);
        }

        function hasFahrenWorldMapBase(roomData) {
            return fahrenWorldMapReady &&
                fahrenWorldMapImage.naturalWidth &&
                roomData.worldX !== undefined &&
                roomData.worldY !== undefined &&
                isInsideWorld(roomData.worldX, roomData.worldY);
        }

        function drawFahrenWorldMapSlice(layerCtx, roomData) {
            if (!hasFahrenWorldMapBase(roomData)) {
                return false;
            }

            const col = roomData.worldX - WORLD_MIN;
            const row = roomData.worldY - WORLD_MIN;
            if (col < 0 || col >= WORLD_SIZE || row < 0 || row >= WORLD_SIZE) return false;

            const cellW = fahrenWorldMapImage.naturalWidth / WORLD_SIZE;
            const cellH = fahrenWorldMapImage.naturalHeight / WORLD_SIZE;
            const bleed = 0.08;
            const sx = Math.max(0, (col - bleed) * cellW);
            const sy = Math.max(0, (row - bleed) * cellH);
            const sw = Math.min(fahrenWorldMapImage.naturalWidth - sx, cellW * (1 + bleed * 2));
            const sh = Math.min(fahrenWorldMapImage.naturalHeight - sy, cellH * (1 + bleed * 2));

            layerCtx.save();
            layerCtx.imageSmoothingEnabled = true;
            layerCtx.globalAlpha = 0.16;
            layerCtx.drawImage(fahrenWorldMapImage, sx, sy, sw, sh, 0, 0, layerCtx.canvas.width, layerCtx.canvas.height);
            layerCtx.restore();
            return true;
        }

        function buildTerrainLayer(roomData) {
            const layer = document.createElement('canvas');
            layer.width = SCREEN_COLS * TILE;
            layer.height = SCREEN_ROWS * TILE;
            const layerCtx = layer.getContext('2d');
            const biome = roomData.biome;

            if (biome === 'grassland' && window.grassPattern) {
                layerCtx.fillStyle = window.grassPattern;
            } else {
                layerCtx.fillStyle = BIOME_BG[biome];
            }
            layerCtx.fillRect(0, 0, layer.width, layer.height);

            const hasWorldMapBase = drawFahrenWorldMapSlice(layerCtx, roomData);

            const baseTerrain = getBaseTerrainSprite(biome);
            if (baseTerrain) {
                layerCtx.globalAlpha = hasWorldMapBase ? 0.92 : 1;
                for (let r = 0; r < SCREEN_ROWS; r++) {
                    for (let c = 0; c < SCREEN_COLS; c++) {
                        drawTerrainSprite(layerCtx, baseTerrain, c, r);
                    }
                }
                layerCtx.globalAlpha = 1;
            }

            for (let r = 0; r < SCREEN_ROWS; r++) {
                for (let c = 0; c < SCREEN_COLS; c++) {
                    const tile = roomData.tiles[r][c];

                    if (biome === 'lake' && tile === 0) {
                        drawTerrainSprite(layerCtx, sprites.terrain_wood_bridge || sprites.terrain_river, c, r);
                    }
                    if (biome === 'swamp') {
                        if (tile === 0) drawTerrainSprite(layerCtx, sprites.ground_swamp, c, r);
                        else if (tile === 4) drawTerrainSprite(layerCtx, sprites.mud_swamp, c, r);
                    }
                    if (biome === 'town' && tile === 3) {
                        drawTerrainSprite(layerCtx, sprites.ground_town, c, r);
                    }
                }
            }

            return layer;
        }

        function getTerrainLayer(roomData) {
            const cached = terrainLayerCache.get(roomData);
            if (cached && cached.version === terrainGraphicsVersion) return cached.canvas;

            const canvas = buildTerrainLayer(roomData);
            terrainLayerCache.set(roomData, {
                canvas,
                version: terrainGraphicsVersion
            });
            return canvas;
        }

        function drawTownWallTile(x, y) {
            if (sprites.wall_town) {
                ctx.drawImage(sprites.wall_town, x, y, TILE, TILE);
                return;
            }
            ctx.fillStyle = '#4f565c';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#8d969b';
            ctx.fillRect(x + 1, y + 1, TILE - 2, 5);
            ctx.fillStyle = '#6f777d';
            ctx.fillRect(x + 1, y + 7, TILE - 2, 7);
            ctx.strokeStyle = '#2a2f34';
            ctx.lineWidth = 1;
            ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
            ctx.beginPath();
            ctx.moveTo(x + 8.5, y + 1);
            ctx.lineTo(x + 8.5, y + 14);
            ctx.moveTo(x + 1, y + 7.5);
            ctx.lineTo(x + 15, y + 7.5);
            ctx.stroke();
        }
