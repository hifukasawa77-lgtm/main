<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百人一首かるた | hide portfolio</title>
  <style>
    :root {
      --bg: #070711;
      --panel: rgba(14, 18, 38, 0.78);
      --panel-strong: rgba(18, 24, 48, 0.92);
      --line: rgba(119, 224, 255, 0.2);
      --text: #f5f7fb;
      --muted: #aeb7cc;
      --cyan: #22d3ee;
      --magenta: #f472b6;
      --purple: #a78bfa;
      --gold: #f8d36f;
      --danger: #fb7185;
      --good: #34d399;
      --card-w: 90px;
      --card-h: 140px;
      --radius: 8px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.52);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(34, 211, 238, 0.18), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(244, 114, 182, 0.16), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(167, 139, 250, 0.14), transparent 34%),
        linear-gradient(160deg, #050510 0%, #10061c 46%, #06121f 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }

    header {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    .logo {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.08em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(34, 211, 238, 0.36);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(244, 114, 182, 0.15));
      box-shadow: 0 0 24px rgba(34, 211, 238, 0.16);
      font-size: 18px;
    }

    .back-link,
    button {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(15, 23, 42, 0.55);
      border-radius: 999px;
      padding: 8px 14px;
      text-decoration: none;
      font: inherit;
      font-size: 0.86rem;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .back-link:hover,
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.13);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    /* ---- Screen management ---- */
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: block; }

    /* ---- Start screen ---- */
    #screen-start {
      max-width: 640px;
      margin: 40px auto 0;
      padding: 0 16px 60px;
      text-align: center;
    }

    #screen-start h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--cyan);
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      margin-bottom: 36px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .mode-btn {
      border-radius: 14px;
      border: 1.5px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(10px);
      padding: 18px 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.16s ease;
      line-height: 1.6;
    }

    .mode-btn small {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
    }

    .mode-btn.selected,
    .mode-btn:hover {
      border-color: var(--cyan);
      background: rgba(34, 211, 238, 0.12);
      transform: translateY(-2px);
    }

    /* ---- Play mode / AI difficulty ---- */
    .section-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 10px 0 6px;
      text-align: left;
    }

    .play-mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .play-mode-btn {
      border-radius: 14px;
      border: 1.5px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(10px);
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.16s ease;
      line-height: 1.6;
    }

    .play-mode-btn small {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--muted);
    }

    .play-mode-btn.selected,
    .play-mode-btn:hover {
      border-color: var(--cyan);
      background: rgba(34, 211, 238, 0.12);
      transform: translateY(-2px);
    }

    #ai-difficulty-section {
      margin-bottom: 10px;
    }

    .ai-diff-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .ai-diff-btn {
      border-radius: 14px;
      border: 1.5px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(10px);
      padding: 12px 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.16s ease;
      line-height: 1.6;
    }

    .ai-diff-btn small {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--muted);
    }

    .ai-diff-btn.selected,
    .ai-diff-btn:hover {
      border-color: rgba(167, 139, 250, 0.9);
      background: rgba(167, 139, 250, 0.12);
      transform: translateY(-2px);
    }

    /* 対AIモード: 勝敗テキスト */
    .winner-text {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .winner-text.win  { color: #34d399; }
    .winner-text.lose { color: #fb7185; }
    .winner-text.draw { color: #f8d36f; }

    /* 対AIモード: infobar スコア表示 */
    #label-player-score,
    #label-ai-score {
      font-variant-numeric: tabular-nums;
    }

    #btn-start {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px 40px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.86), rgba(167, 139, 250, 0.82));
      border: none;
      color: #050510;
      letter-spacing: 0.06em;
      margin-top: 8px;
    }

    #btn-start:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(34, 211, 238, 1), rgba(167, 139, 250, 1));
      transform: translateY(-2px);
    }

    /* ---- Game screen ---- */
    #screen-game {
      max-width: min(1000px, calc(100vw - 16px));
      margin: 16px auto 0;
      padding: 0 8px 40px;
    }

    #info-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 16px;
      margin-bottom: 14px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 0.88rem;
    }

    #info-bar span { color: var(--muted); }
    #info-bar span b { color: var(--text); }

    #yomi-area {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(248, 211, 111, 0.3);
      border-radius: 18px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      min-height: 100px;
    }

    .yomi-label {
      font-size: 0.72rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      writing-mode: vertical-rl;
      flex-shrink: 0;
      padding-top: 4px;
    }

    #yomi-kami {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      line-height: 1.9;
      color: var(--text);
      flex: 1;
    }

    #yomi-poet {
      font-size: 0.8rem;
      color: var(--muted);
      flex-shrink: 0;
      align-self: flex-end;
    }

    #yomi-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 8px;
      display: block;
    }

    #field-canvas {
      display: block;
      width: 100%;
      border-radius: 12px;
      cursor: default;
      touch-action: none;
    }

    /* ---- Feedback overlay ---- */
    #feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      z-index: 100;
      padding: 18px 44px;
      border-radius: 14px;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    #feedback.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #feedback.correct {
      background: rgba(52, 211, 153, 0.18);
      border: 1.5px solid var(--good);
      color: var(--good);
    }

    #feedback.wrong {
      background: rgba(251, 113, 133, 0.15);
      border: 1.5px solid var(--danger);
      color: var(--danger);
    }

    /* ---- Result screen ---- */
    #screen-result {
      max-width: 540px;
      margin: 60px auto 0;
      padding: 0 16px 80px;
      text-align: center;
    }

    #screen-result h2 {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--cyan);
      margin-bottom: 40px;
    }

    .result-stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .stat {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px 28px;
      min-width: 120px;
    }

    .stat span {
      display: block;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--cyan);
    }

    .stat small {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 4px;
      display: block;
    }

    #btn-retry {
      font-size: 1.05rem;
      font-weight: 700;
      padding: 13px 36px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.86), rgba(167, 139, 250, 0.82));
      border: none;
      color: #050510;
      display: block;
      margin: 0 auto 16px;
    }

    #screen-result .back-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.85rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 500px) {
      .mode-grid { grid-template-columns: 1fr 1fr; }
      #yomi-area { padding: 14px 14px; }
      #yomi-kami { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-mark">歌</span>百人一首
  </a>
  <a class="back-link" href="index.html#works">← ポートフォリオへ</a>
</header>

<!-- スタート画面 / Start screen -->
<div id="screen-start" class="screen active">
  <h1>百人一首かるた</h1>
  <p class="subtitle">Hyakunin Isshu Karuta</p>
  <p class="section-label">プレイモード / Play Mode</p>
  <div class="play-mode-grid">
    <button class="play-mode-btn selected" data-play="solo">ひとりプレイ<br><small>Solo Play</small></button>
    <button class="play-mode-btn" data-play="vs_ai">対AIモード<br><small>VS AI</small></button>
  </div>
  <div id="ai-difficulty-section" style="display:none;">
    <p class="section-label">AI強さ / AI Level</p>
    <div class="ai-diff-grid">
      <button class="ai-diff-btn" data-ai="weak">弱<br><small>Weak</small></button>
      <button class="ai-diff-btn" data-ai="normal">普通<br><small>Normal</small></button>
      <button class="ai-diff-btn" data-ai="strong">強<br><small>Strong</small></button>
      <button class="ai-diff-btn" data-ai="expert">鬼強<br><small>Expert</small></button>
    </div>
  </div>
  <p class="section-label">難易度 / Difficulty</p>
  <div class="mode-grid">
    <button class="mode-btn" data-mode="practice">練習<br><small>10首・5枚場</small></button>
    <button class="mode-btn" data-mode="easy">初級<br><small>25首・8枚場</small></button>
    <button class="mode-btn" data-mode="medium">中級<br><small>50首・10枚場</small></button>
    <button class="mode-btn" data-mode="hard">上級<br><small>100首・15枚場</small></button>
  </div>
  <button id="btn-start" disabled>ゲーム開始 / Start</button>
</div>

<!-- ゲーム画面 / Game screen -->
<div id="screen-game" class="screen">
  <div id="info-bar">
    <span><b id="label-progress">0 / 10</b>&nbsp;問</span>
    <span>正解 <b id="label-score">0</b></span>
    <span>ミス <b id="label-miss">0</b></span>
    <span id="vs-score-area" style="display:none;">あなた: <b id="label-player-score">0</b>　AI: <b id="label-ai-score">0</b></span>
  </div>
  <div id="yomi-area">
    <img id="yomi-efuda" src="" alt="絵札" width="80" height="122"
      style="flex-shrink:0;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.5);display:none;"
      loading="lazy" decoding="async">
    <span class="yomi-label">読み札 / Yomi</span>
    <div style="flex:1">
      <p id="yomi-kami"></p>
      <span id="yomi-hint">↓ 下の句の取り札を選んでください / Select the matching card below</span>
    </div>
    <span id="yomi-poet"></span>
  </div>
  <canvas id="field-canvas" aria-label="取り札フィールド / Card field"></canvas>
  <div id="feedback"></div>
</div>

<!-- 結果画面 / Result screen -->
<div id="screen-result" class="screen">
  <h2>結果 / Result</h2>
  <!-- 対AIモード用（通常は非表示） -->
  <div id="result-vs-section" style="display:none;">
    <p id="res-winner" class="winner-text"></p>
    <div class="result-stats">
      <div class="stat"><span id="res-player-score">0</span><small>あなた / You</small></div>
      <div class="stat"><span id="res-ai-score">0</span><small>AI</small></div>
      <div class="stat"><span id="res-miss-vs">0</span><small>ミス / Miss</small></div>
    </div>
  </div>
  <!-- ひとりプレイ用（対AIモード時は非表示） -->
  <div id="result-solo-section">
    <div class="result-stats">
      <div class="stat"><span id="res-score">0</span><small>正解 / Correct</small></div>
      <div class="stat"><span id="res-miss">0</span><small>ミス / Missed</small></div>
      <div class="stat"><span id="res-accuracy">0%</span><small>正答率 / Accuracy</small></div>
    </div>
  </div>
  <button id="btn-retry">もう一度 / Play Again</button>
  <a href="index.html" class="back-link">← ポートフォリオへ戻る</a>
</div>

<script>
'use strict';

/* =====================================================
   POEMS_DATA — 小倉百人一首 全100首
   形式: { id, poet, kami, shimo, kana_kami, kana_shimo }
   上の句・下の句は句の区切りをスペースで表記
===================================================== */
const POEMS_DATA = [
  { id:1,  poet:"天智天皇",    kami:"秋の田の かりほの庵の 苫をあらみ",   shimo:"わが衣手は 露にぬれつつ",       kana_kami:"あきのたの かりほのいおの とまをあらみ",       kana_shimo:"わがころもでは つゆにぬれつつ" },
  { id:2,  poet:"持統天皇",    kami:"春過ぎて 夏来にけらし 白妙の",       shimo:"衣ほすてふ 天の香具山",          kana_kami:"はるすぎて なつきにけらし しろたえの",          kana_shimo:"ころもほすてふ あまのかぐやま" },
  { id:3,  poet:"柿本人麻呂",  kami:"あしびきの 山鳥の尾の しだり尾の",   shimo:"ながながし夜を ひとりかも寝む",   kana_kami:"あしびきの やまどりのおの しだりおの",          kana_shimo:"ながながしよを ひとりかもねむ" },
  { id:4,  poet:"山部赤人",    kami:"田子の浦に うち出でてみれば 白妙の", shimo:"富士の高嶺に 雪は降りつつ",      kana_kami:"たごのうらに うちいでてみれば しろたえの",      kana_shimo:"ふじのたかねに ゆきはふりつつ" },
  { id:5,  poet:"猿丸大夫",    kami:"奥山に もみぢ踏み分け 鳴く鹿の",     shimo:"声聞くときぞ 秋は悲しき",        kana_kami:"おくやまに もみじふみわけ なくしかの",          kana_shimo:"こえきくときぞ あきはかなしき" },
  { id:6,  poet:"中納言家持",  kami:"かささぎの 渡せる橋に おく霜の",      shimo:"白きを見れば 夜ぞ更けにける",    kana_kami:"かささぎの わたせるはしに おくしもの",          kana_shimo:"しろきをみれば よぞふけにける" },
  { id:7,  poet:"安倍仲麻呂",  kami:"天の原 ふりさけ見れば 春日なる",      shimo:"三笠の山に 出でし月かも",        kana_kami:"あまのはら ふりさけみれば かすがなる",          kana_shimo:"みかさのやまに いでしつきかも" },
  { id:8,  poet:"喜撰法師",    kami:"わが庵は 都のたつみ しかぞすむ",       shimo:"世をうぢ山と 人はいふなり",      kana_kami:"わがいおは みやこのたつみ しかぞすむ",          kana_shimo:"よをうぢやまと ひとはいふなり" },
  { id:9,  poet:"小野小町",    kami:"花の色は 移りにけりな いたづらに",    shimo:"わが身世にふる ながめせしまに",  kana_kami:"はなのいろは うつりにけりな いたずらに",        kana_shimo:"わがみよにふる ながめせしまに" },
  { id:10, poet:"蝉丸",        kami:"これやこの 行くも帰るも 別れては",    shimo:"知るも知らぬも 逢坂の関",        kana_kami:"これやこの ゆくもかえるも わかれては",          kana_shimo:"しるもしらぬも おうさかのせき" },
  { id:11, poet:"参議篁",      kami:"わたの原 八十島かけて 漕ぎ出でぬと", shimo:"人には告げよ 海人の釣舟",        kana_kami:"わたのはら やそしまかけて こぎいでぬと",        kana_shimo:"ひとにはつげよ あまのつりぶね" },
  { id:12, poet:"僧正遍昭",    kami:"天つ風 雲の通ひ路 吹き閉ぢよ",      shimo:"乙女の姿 しばしとどめむ",        kana_kami:"あまつかぜ くものかよいじ ふきとじよ",          kana_shimo:"おとめのすがた しばしとどめむ" },
  { id:13, poet:"陽成院",      kami:"筑波嶺の 峰より落つる みなの川",      shimo:"恋ぞ積もりて 淵となりぬる",      kana_kami:"つくばねの みねよりおつる みなのがわ",          kana_shimo:"こいぞつもりて ふちとなりぬる" },
  { id:14, poet:"河原左大臣",  kami:"陸奥の しのぶもぢずり 誰ゆゑに",     shimo:"乱れそめにし われならなくに",    kana_kami:"みちのくの しのぶもじずり たれゆえに",          kana_shimo:"みだれそめにし われならなくに" },

/* =====================================================
   定数
===================================================== */
const CARD_W = 90;
const CARD_H = 140;
const GAP    = 10;
const CARD_BG_NORMAL  = "rgba(20, 28, 58, 0.92)";
const CARD_BG_CORRECT = "rgba(52, 211, 153, 0.18)";
const CARD_BG_WRONG   = "rgba(251, 113, 133, 0.15)";
const CARD_BD_NORMAL  = "rgba(119, 224, 255, 0.28)";
const CARD_BD_HOVER   = "rgba(34, 211, 238, 0.70)";
const CARD_BD_CORRECT = "rgba(52, 211, 153, 0.85)";
const CARD_BD_WRONG   = "rgba(251, 113, 133, 0.85)";

const MODE_CONFIG = {
  practice: { total: 10,  field: 5  },
  easy:     { total: 25,  field: 8  },
  medium:   { total: 50,  field: 10 },
  hard:     { total: 100, field: 15 },
};

const AI_CONFIG = {
  weak:   { minDelay: 3000, maxDelay: 5000, missRate: 0.15 },
  normal: { minDelay: 1500, maxDelay: 3000, missRate: 0.00 },
  strong: { minDelay:  500, maxDelay: 1500, missRate: 0.00 },
  expert: { minDelay:  200, maxDelay:  800, missRate: 0.00 },
};

/* =====================================================
   ユーティリティ
===================================================== */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function poemById(id) {
  return POEMS_DATA.find(p => p.id === id);
}

/* =====================================================
   KarutaGame — ゲームロジック
===================================================== */
class KarutaGame {
  constructor(mode) {
    this._cfg = MODE_CONFIG[mode];
    this._allIds = POEMS_DATA.map(p => p.id);
    this.score = 0;
    this.mistakeCount = 0;
    this.currentIndex = 0;
    this.questions = [];   // 出題順に並べた歌ID
    this.fieldIds = [];    // 現在フィールドにある歌IDの配列
    this._answered = false; // 連打防止
    this.isVsAI = false;   // 対AIモードフラグ
    this.playerScore = 0;  // プレイヤー取得枚数（対AIモード用）
    this.aiScore = 0;      // AI取得枚数（対AIモード用）
  }

  start() {
    this.questions = shuffle(this._allIds).slice(0, this._cfg.total);
    this.currentIndex = 0;
    this.score = 0;
    this.mistakeCount = 0;
    this._buildField();
    this._answered = false;
    if (this.isVsAI) {
      this.playerScore = 0;
      this.aiScore = 0;
    }
  }

  _buildField() {
    const correctId = this.questions[this.currentIndex];
    const pool = this._allIds.filter(id => id !== correctId);
    const dummies = shuffle(pool).slice(0, this._cfg.field - 1);
    this.fieldIds = shuffle([correctId, ...dummies]);
  }

  get currentPoem() {
    return poemById(this.questions[this.currentIndex]);
  }

  get fieldPoems() {
    return this.fieldIds.map(id => poemById(id));
  }

  isFinished() {
    return this.currentIndex >= this.questions.length;
  }

  // 正解IDを返す
  correctId() {
    return this.questions[this.currentIndex];
  }

  // 回答。戻り値: 'correct' | 'wrong' | 'already'
  answer(poemId) {
    if (this._answered) return 'already';
    if (poemId === this.correctId()) {
      this._answered = true;
      this.score++;
      if (this.isVsAI) this.playerScore++; // 対AIモード時はプレイヤーの取得枚数も加算
      return 'correct';
    } else {
      this.mistakeCount++;
      return 'wrong';
    }
  }

  nextQuestion() {
    this.currentIndex++;
    this._answered = false;
    if (!this.isFinished()) {
      // フィールドから正解済みカードを除去して次の問題の正解を追加
      const prevCorrect = this.questions[this.currentIndex - 1];
      this.fieldIds = this.fieldIds.filter(id => id !== prevCorrect);
      // 新しい正解カードを追加し、フィールド枚数が足りなければダミーを補充
      const nextCorrect = this.questions[this.currentIndex];
      if (!this.fieldIds.includes(nextCorrect)) {
        this.fieldIds.push(nextCorrect);
      }
      this.fieldIds = shuffle(this.fieldIds);
    }
  }

  // AIが取った時に呼ぶ。戻り値: 'ai_correct' | 'already'
  aiTake() {
    if (this._answered) return 'already';
    this._answered = true;
    this.aiScore++;
    return 'ai_correct';
  }

  // 対AIモードの結果オブジェクトを返す
  getVsResult() {
    const base = this.getResult();
    const winner =
      this.playerScore > this.aiScore ? 'player' :
      this.playerScore < this.aiScore ? 'ai' : 'draw';
    return { ...base, playerScore: this.playerScore, aiScore: this.aiScore, winner };
  }

  getResult() {
    const total = this.questions.length;
    const accuracy = total > 0 ? Math.round((this.score / total) * 100) : 0;
    return { score: this.score, miss: this.mistakeCount, accuracy, total };
  }
}

/* =====================================================
   KarutaAI — AIタイマー管理
===================================================== */
class KarutaAI {
  constructor(difficulty) {
    this._difficulty = difficulty;
    this._cfg = AI_CONFIG[difficulty];
    this._timer = null;
    this._remaining = 0;
    this._totalDelay = 0;
    this._startTime = 0;
    this._correctId = null; // ペナルティ時のコールバックで参照するため保持
    this.onTake = null; // (correctId) => void
  }

  start(correctId, onTake) {
    this.cancel();
    this._correctId = correctId;
    this.onTake = onTake;
    // missRate による取り損ね判定
    if (Math.random() < this._cfg.missRate) {
      this._totalDelay = 0;
      return;
    }
    const { minDelay, maxDelay } = this._cfg;
    this._totalDelay = minDelay + Math.random() * (maxDelay - minDelay);
    this._startTime = performance.now();
    this._timer = setTimeout(() => {
      if (this.onTake) this.onTake(this._correctId);
    }, this._totalDelay);
  }

  cancel() {
    if (this._timer !== null) {
      clearTimeout(this._timer);
      this._timer = null;
    }
    this._totalDelay = 0;
  }

  penalize() {
    if (this._timer === null) return;
    clearTimeout(this._timer);
    const elapsed = performance.now() - this._startTime;
    const remaining = Math.max(0, this._totalDelay - elapsed);
    const newDelay = remaining * 0.5;
    this._totalDelay = elapsed + newDelay;
    this._timer = setTimeout(() => {
      if (this.onTake) this.onTake(this._correctId); // 保持しているcorrectIdを使用
    }, newDelay);
  }

  getProgress() {
    if (this._totalDelay <= 0) return 1.0;
    const elapsed = performance.now() - this._startTime;
    return Math.min(1.0, elapsed / this._totalDelay);
  }
}

/* =====================================================
   CardRenderer — Canvas描画
===================================================== */
class CardRenderer {
  constructor(canvas, game) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.game = game;
    this.cards = [];      // { id, x, y, w, h, state }
    this.hoveredId = null;
    this.isVsAI = false;  // 対AIモードフラグ
    this.aiProgress = 0;  // 0.0〜1.0（プログレスバー描画用）
  }

  // カード位置を計算してthis.cardsに格納
  layout() {
    const cw = this.canvas.width;
    const ids = this.game.fieldIds;
    const count = ids.length;

    // 対AIモード時はプログレスバー分のオフセット
    const progressBarH = this.isVsAI ? 32 : 0;

    // カラム数を計算（最低1列）
    const cols = Math.max(1, Math.floor((cw + GAP) / (CARD_W + GAP)));
    const rows = Math.ceil(count / cols);

    // Canvas高さを更新（プログレスバー分を加算）
    const fieldH = rows * (CARD_H + GAP) + GAP + 10;
    this.canvas.height = Math.max(fieldH + progressBarH, CARD_H + 20 + progressBarH);

    // 中央揃えのためのオフセット計算
    const usedW = Math.min(count, cols) * (CARD_W + GAP) - GAP;
    const offsetX = Math.max(0, Math.floor((cw - usedW) / 2));

    this.cards = ids.map((id, idx) => {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      return {
        id,
        x: offsetX + col * (CARD_W + GAP),
        y: progressBarH + GAP + row * (CARD_H + GAP), // プログレスバー分下にずらす
        w: CARD_W,
        h: CARD_H,
        state: 'normal',   // 'normal'|'correct'|'wrong'|'ai_take'
        alpha: 1,
      };
    });
  }

  draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    // 対AIモード時はプログレスバーを描画
    if (this.isVsAI) {
      this._drawProgressBar();
    }
    for (const card of this.cards) {
      if (card.alpha <= 0) continue;
      ctx.globalAlpha = card.alpha;
      this._drawCard(ctx, card);
      ctx.globalAlpha = 1;
    }
  }

  _drawCard(ctx, card) {
    const { x, y, w, h, state, id } = card;
    const isHovered = (state === 'normal' && this.hoveredId === id);
    const poem = poemById(id);
    if (!poem) return;

    // 背景色・枠色を状態に応じて決定
    let bg = CARD_BG_NORMAL;
    let bd = isHovered ? CARD_BD_HOVER : CARD_BD_NORMAL;
    if (state === 'correct')  { bg = CARD_BG_CORRECT;             bd = CARD_BD_CORRECT;             }
    if (state === 'wrong')    { bg = CARD_BG_WRONG;               bd = CARD_BD_WRONG;               }
    if (state === 'ai_take')  { bg = 'rgba(219,39,119,0.18)';     bd = 'rgba(219,39,119,0.85)';     } // AI取得カード

    // 外枠（角丸矩形）
    ctx.save();
    ctx.beginPath();
    this._roundRect(ctx, x, y, w, h, 8);
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.strokeStyle = bd;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 内側の二重罫線（和風装飾）
    ctx.beginPath();
    this._roundRect(ctx, x + 4, y + 4, w - 8, h - 8, 5);
    ctx.strokeStyle = state === 'correct' ? 'rgba(52,211,153,0.35)' :
                      state === 'wrong'   ? 'rgba(251,113,133,0.3)' :
                      'rgba(119,224,255,0.12)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 上部アクセントライン（金色）
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 14);
    ctx.lineTo(x + w - 10, y + 14);
    ctx.strokeStyle = 'rgba(248,211,111,0.55)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 下部アクセントライン（金色）
    ctx.beginPath();
    ctx.moveTo(x + 10, y + h - 14);
    ctx.lineTo(x + w - 10, y + h - 14);
    ctx.strokeStyle = 'rgba(248,211,111,0.55)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 縦書きテキスト（下の句）
    ctx.fillStyle = state === 'correct' ? '#34d399' :
                    state === 'wrong'   ? '#fb7185' :
                    '#f5f7fb';
    ctx.font = 'bold 13px "Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    const shimoParts = poem.shimo.split(' ');
    if (shimoParts.length >= 2) {
      // 2句あれば右列・左列に分けて縦書き
      const rightPart = shimoParts[0];
      const leftPart  = shimoParts[1];
      const lineH = 16;
      const textTop = y + 22;
      // 右列（右側に配置）
      const rightX = x + Math.floor(w * 0.62);
      this._drawVerticalText(ctx, rightPart, rightX, textTop, lineH);
      // 左列
      const leftX = x + Math.floor(w * 0.38);
      this._drawVerticalText(ctx, leftPart, leftX, textTop, lineH);
    } else {
      // 1句まとめて縦書き
      const cx = x + Math.floor(w / 2);
      this._drawVerticalText(ctx, poem.shimo.replace(/ /g, ''), cx, y + 22, 16);
    }

    ctx.restore();
  }

  _drawVerticalText(ctx, text, cx, startY, lineH) {
    const chars = [...text]; // サロゲートペア対応
    chars.forEach((ch, i) => {
      ctx.fillText(ch, cx, startY + i * lineH);
    });
  }

  _roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // クリック座標からカードIDを返す（ない場合null）
  hitTest(px, py) {
    for (const card of this.cards) {
      if (card.state !== 'normal') continue;
      if (card.alpha <= 0) continue;
      if (px >= card.x && px <= card.x + card.w &&
          py >= card.y && py <= card.y + card.h) {
        return card.id;
      }
    }
    return null;
  }

  // MouseEvent/TouchEvent → Canvas座標
  getPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width  / rect.width;
    const scaleY = this.canvas.height / rect.height;
    const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
    const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top)  * scaleY,
    };
  }

  // 正解カードをフェードアウト
  animateCorrect(poemId) {
    const card = this.cards.find(c => c.id === poemId);
    if (!card) return;
    card.state = 'correct';
    this.draw();
    const start = performance.now();
    const dur = 600;
    const step = (now) => {
      const t = Math.min(1, (now - start) / dur);
      card.alpha = 1 - t;
      this.draw();
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  // 不正解カードを赤く点滅させて通常に戻す
  animateWrong(poemId) {
    const card = this.cards.find(c => c.id === poemId);
    if (!card) return;
    card.state = 'wrong';
    this.draw();
    setTimeout(() => {
      card.state = 'normal';
      this.draw();
    }, 700);
  }

  // AIが取ったカードをマゼンタでフラッシュしてフェードアウト
  animateAiTake(poemId) {
    const card = this.cards.find(c => c.id === poemId);
    if (!card) return;
    card.state = 'ai_take';
    this.draw();
    const start = performance.now();
    const dur = 600;
    const step = (now) => {
      const t = Math.min(1, (now - start) / dur);
      card.alpha = 1 - t;
      this.draw();
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  // AIプログレスバーを描画（対AIモード時のみ呼ばれる）
  _drawProgressBar() {
    const ctx = this.ctx;
    const cw = this.canvas.width;
    const barY = 6;
    const barH = 14;
    const barX = 8;
    const barW = cw - 16;

    // 背景トラック
    ctx.save();
    ctx.beginPath();
    this._roundRect(ctx, barX, barY, barW, barH, 7);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();

    // 進捗（1.0に近づくほど赤くなる警告色）
    const prog = Math.min(1.0, this.aiProgress);
    const fillW = Math.max(0, barW * (1 - prog)); // 残り時間を表す（左から右へ減る）
    if (fillW > 0) {
      // 色: シアン(0%) → マゼンタ(70%) → レッド(100%)
      const r = Math.round(prog < 0.7 ? prog / 0.7 * 200 : 200 + (prog - 0.7) / 0.3 * 55);
      const g = Math.round(Math.max(0, 200 - prog * 200));
      const b = Math.round(prog < 0.5 ? 255 : 255 - (prog - 0.5) / 0.5 * 200);
      ctx.beginPath();
      this._roundRect(ctx, barX, barY, fillW, barH, 7);
      ctx.fillStyle = `rgba(${r},${g},${b},0.75)`;
      ctx.fill();
    }

    // ラベル
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('AI', barX + 4, barY + barH - 3);
    ctx.restore();
  }
}

/* =====================================================
   画面管理
===================================================== */
const screens = {
  start:  document.getElementById('screen-start'),
  game:   document.getElementById('screen-game'),
  result: document.getElementById('screen-result'),
};

function showScreen(name) {
  for (const [key, el] of Object.entries(screens)) {
    el.classList.toggle('active', key === name);
  }
}

function updateInfoBar(game) {
  document.getElementById('label-progress').textContent =
    (game.currentIndex + 1) + ' / ' + game.questions.length;
  if (playMode === 'vs_ai') {
    // 対AIモード: スコアエリアを切り替え
    document.getElementById('label-score').closest('span').style.display = 'none';
    document.getElementById('label-miss').closest('span').style.display  = 'none';
    const vsArea = document.getElementById('vs-score-area');
    vsArea.style.display = '';
    document.getElementById('label-player-score').textContent = game.playerScore;
    document.getElementById('label-ai-score').textContent     = game.aiScore;
  } else {
    document.getElementById('label-score').closest('span').style.display = '';
    document.getElementById('label-miss').closest('span').style.display  = '';
    document.getElementById('vs-score-area').style.display = 'none';
    document.getElementById('label-score').textContent = game.score;
    document.getElementById('label-miss').textContent  = game.mistakeCount;
  }
}

let _feedbackTimer = null;
function showFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg; // XSS対策: textContent使用
  el.className = 'show ' + type;
  if (_feedbackTimer) clearTimeout(_feedbackTimer);
  _feedbackTimer = setTimeout(() => {
    el.className = '';
  }, 900);
}

function showYomiArea(poem) {
  document.getElementById('yomi-kami').textContent = poem.kami;
  document.getElementById('yomi-poet').textContent = poem.poet;
  const efuda = document.getElementById('yomi-efuda');
  const padded = String(poem.id).padStart(3, '0');
  efuda.src = `assets/karuta/card_${padded}.svg`;
  efuda.alt = `第${poem.id}首 絵札`;
  efuda.style.display = 'block';
}

function showResult(game) {
  // ひとりプレイ用セクション表示
  document.getElementById('result-solo-section').style.display = '';
  document.getElementById('result-vs-section').style.display   = 'none';
  const r = game.getResult();
  document.getElementById('res-score').textContent    = r.score;
  document.getElementById('res-miss').textContent     = r.miss;
  document.getElementById('res-accuracy').textContent = r.accuracy + '%';
  showScreen('result');
}

function showVsResult(game) {
  // 対AIモード用セクション表示
  document.getElementById('result-solo-section').style.display = 'none';
  document.getElementById('result-vs-section').style.display   = '';
  const r = game.getVsResult();
  const winnerText =
    r.winner === 'player' ? '勝ち / You Win!' :
    r.winner === 'ai'     ? '負け / AI Wins'  : '引き分け / Draw';
  const winnerEl = document.getElementById('res-winner');
  winnerEl.textContent = winnerText;
  // 勝敗に応じた色クラス
  winnerEl.className = 'winner-text ' + (
    r.winner === 'player' ? 'win' :
    r.winner === 'ai'     ? 'lose' : 'draw'
  );
  document.getElementById('res-player-score').textContent = r.playerScore;
  document.getElementById('res-ai-score').textContent     = r.aiScore;
  document.getElementById('res-miss-vs').textContent      = r.miss;
  showScreen('result');
}

/* =====================================================
   AIプログレスバー更新ループ
===================================================== */
function startProgressLoop() {
  function loop() {
    if (!game || !ai || !renderer || game.isFinished()) return;
    renderer.aiProgress = ai.getProgress();
    renderer.draw();
    _progressRaf = requestAnimationFrame(loop);
  }
  _progressRaf = requestAnimationFrame(loop);
}

function stopProgressLoop() {
  if (_progressRaf !== null) {
    cancelAnimationFrame(_progressRaf);
    _progressRaf = null;
  }
}

/* =====================================================
   Web Speech API（読み上げ）
===================================================== */
function speakKami(poem) {
  if (!window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(poem.kana_kami);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

/* =====================================================
   Canvas リサイズ
===================================================== */
const canvas = document.getElementById('field-canvas');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 16, 1000);
  canvas.width = maxW;
}

/* =====================================================
   ゲーム状態
===================================================== */
let game     = null;
let renderer = null;
let selectedMode = null;
let playMode  = 'solo';    // 'solo' | 'vs_ai'
let selectedAI = null;     // 'weak' | 'normal' | 'strong' | 'expert'
let ai = null;             // KarutaAI インスタンス
let _progressRaf = null;   // プログレスバー用 rAF ID

function startGame() {
  stopProgressLoop(); // 前回のループを念のため停止
  game = new KarutaGame(selectedMode);
  game.isVsAI = (playMode === 'vs_ai');
  game.start();
  renderer = new CardRenderer(canvas, game);
  renderer.isVsAI = (playMode === 'vs_ai');

  if (playMode === 'vs_ai') {
    ai = new KarutaAI(selectedAI);
  } else {
    ai = null;
  }

  showScreen('game');
  resizeCanvas();
  renderer.layout();
  renderer.draw();
  showYomiArea(game.currentPoem);
  updateInfoBar(game);
  speakKami(game.currentPoem);

  if (playMode === 'vs_ai') {
    startProgressLoop();
    ai.start(game.correctId(), onAiTake);
  }
}

function onAnswer(poemId) {
  const result = game.answer(poemId);
  if (result === 'already') return;

  if (result === 'correct') {
    if (playMode === 'vs_ai') ai.cancel(); // AIタイマー停止
    renderer.animateCorrect(poemId);
    showFeedback('正解！ Correct!', 'correct');
    updateInfoBar(game);
    setTimeout(() => {
      game.nextQuestion();
      if (game.isFinished()) {
        stopProgressLoop();
        if (playMode === 'vs_ai') {
          showVsResult(game);
        } else {
          showResult(game);
        }
      } else {
        renderer.layout();
        renderer.draw();
        showYomiArea(game.currentPoem);
        updateInfoBar(game);
        speakKami(game.currentPoem);
        if (playMode === 'vs_ai') {
          ai.start(game.correctId(), onAiTake);
        }
      }
    }, 850);
  } else {
    renderer.animateWrong(poemId);
    showFeedback('もう一度 / Try again', 'wrong');
    updateInfoBar(game);
    if (playMode === 'vs_ai') ai.penalize(); // ペナルティ適用
  }
}

function onAiTake(correctId) {
  const result = game.aiTake();
  if (result === 'already') return;
  renderer.animateAiTake(correctId);
  showFeedback('AIが取りました / AI took it', 'wrong');
  updateInfoBar(game);
  setTimeout(() => {
    game.nextQuestion();
    if (game.isFinished()) {
      stopProgressLoop();
      showVsResult(game);
    } else {
      renderer.layout();
      renderer.draw();
      showYomiArea(game.currentPoem);
      updateInfoBar(game);
      speakKami(game.currentPoem);
      ai.start(game.correctId(), onAiTake);
    }
  }, 900);
}

/* =====================================================
   イベントハンドラ
===================================================== */
// 開始ボタン有効化チェック
function checkStartable() {
  const ok = selectedMode !== null &&
             (playMode === 'solo' || selectedAI !== null);
  document.getElementById('btn-start').disabled = !ok;
}

// プレイモード選択（ひとりプレイ / 対AIモード）
document.querySelectorAll('[data-play]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-play]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    playMode = btn.dataset.play;
    const aiSection = document.getElementById('ai-difficulty-section');
    aiSection.style.display = playMode === 'vs_ai' ? '' : 'none';
    checkStartable();
  });
});

// AI難易度選択
document.querySelectorAll('[data-ai]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-ai]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedAI = btn.dataset.ai;
    checkStartable();
  });
});

// 難易度選択
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = btn.dataset.mode;
    checkStartable();
  });
});

// ゲーム開始
document.getElementById('btn-start').addEventListener('click', () => {
  if (selectedMode && (playMode === 'solo' || selectedAI !== null)) startGame();
});

// Canvas クリック
canvas.addEventListener('click', e => {
  if (!renderer) return;
  const pos = renderer.getPos(e);
  const poemId = renderer.hitTest(pos.x, pos.y);
  if (poemId !== null) onAnswer(poemId);
});

// Canvas タッチ（モバイル対応）
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!renderer) return;
  const t = e.touches[0];
  const pos = { x: 0, y: 0 };
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  pos.x = (t.clientX - rect.left) * scaleX;
  pos.y = (t.clientY - rect.top)  * scaleY;
  const poemId = renderer.hitTest(pos.x, pos.y);
  if (poemId !== null) onAnswer(poemId);
}, { passive: false });

// Canvas ホバー（マウスのみ）
canvas.addEventListener('mousemove', e => {
  if (!renderer) return;
  const pos = renderer.getPos(e);
  const hovered = renderer.hitTest(pos.x, pos.y);
  if (renderer.hoveredId !== hovered) {
    renderer.hoveredId = hovered;
    renderer.draw();
  }
  canvas.style.cursor = hovered !== null ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  if (!renderer) return;
  renderer.hoveredId = null;
  renderer.draw();
  canvas.style.cursor = 'default';
});

// ウィンドウリサイズ対応
window.addEventListener('resize', () => {
  if (!renderer) return;
  resizeCanvas();
  renderer.layout();
  renderer.draw();
});

// もう一度 / リトライ
document.getElementById('btn-retry').addEventListener('click', () => {
  stopProgressLoop();
  selectedMode = null;
  selectedAI = null;
  playMode = 'solo';
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('[data-ai]').forEach(b => b.classList.remove('selected'));
  // プレイモードをひとりプレイに戻す
  document.querySelectorAll('[data-play]').forEach(b => b.classList.remove('selected'));
  const soloBtn = document.querySelector('[data-play="solo"]');
  if (soloBtn) soloBtn.classList.add('selected');
  document.getElementById('ai-difficulty-section').style.display = 'none';
  document.getElementById('btn-start').disabled = true;
  showScreen('start');
});
</script>
