<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実績称号生成エージェント | hide portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: rgba(255,255,255,0.05);
    --cyan: #00d4ff;
    --purple: #9b59b6;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: rgba(0,212,255,0.2);
    --common: #888;
    --rare: #3498db;
    --epic: #9b59b6;
    --legendary: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }
  a.back {
    display: inline-block;
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 32px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p { color: var(--text-dim); font-size: 0.9rem; }
  .container { max-width: 960px; margin: 0 auto; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    backdrop-filter: blur(10px);
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--cyan);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  textarea, input[type="password"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Fira Code', monospace;
    font-size: 0.82rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="password"]:focus { border-color: var(--cyan); }
  textarea { height: 260px; }
  input[type="password"] { height: 40px; margin-bottom: 16px; }
  .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .col-code { flex: 1; min-width: 260px; }
  .col-ctrl { width: 260px; min-width: 220px; }
  button.primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 8px;
  }
  button.primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.secondary {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.secondary:hover { background: rgba(0,212,255,0.1); }
  .spinner {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--cyan);
    font-size: 0.9rem;
  }
  .spinner.active { display: block; }
  .spinner::before {
    content: '';
    display: block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; }
  .result.active { display: block; }
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--cyan);
  }
  .rarity-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .rarity-btn {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: 'Fira Code', monospace;
    transition: all 0.2s;
    background: transparent;
  }
  .rarity-btn[data-rarity="all"] { border-color: var(--border); color: var(--text-dim); }
  .rarity-btn[data-rarity="common"] { border-color: var(--common); color: var(--common); }
  .rarity-btn[data-rarity="rare"] { border-color: var(--rare); color: var(--rare); }
  .rarity-btn[data-rarity="epic"] { border-color: var(--epic); color: var(--epic); }
  .rarity-btn[data-rarity="legendary"] { border-color: var(--legendary); color: var(--legendary); }
  .rarity-btn.active { opacity: 1; }
  .rarity-btn:not(.active) { opacity: 0.4; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .ach-card {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid var(--common);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }
  .ach-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .ach-card[data-rarity="rare"] { border-left-color: var(--rare); }
  .ach-card[data-rarity="epic"] { border-left-color: var(--epic); }
  .ach-card[data-rarity="legendary"] {
    border-left-color: var(--legendary);
    background: rgba(243,156,18,0.05);
  }
  .ach-card.hidden { display: none; }
  .ach-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .ach-icon { font-size: 1.6rem; line-height: 1; }
  .ach-name { font-size: 0.9rem; color: var(--text); font-weight: 500; }
  .ach-rarity {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-left: auto;
    flex-shrink: 0;
  }
  [data-rarity="common"] .ach-rarity { color: var(--common); }
  [data-rarity="rare"] .ach-rarity { color: var(--rare); }
  [data-rarity="epic"] .ach-rarity { color: var(--epic); }
  [data-rarity="legendary"] .ach-rarity { color: var(--legendary); }
  .ach-desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 6px; }
  .ach-code { font-size: 0.72rem; color: rgba(0,212,255,0.6); font-style: italic; }
  .export-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .error-msg {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    padding: 16px;
    color: #e74c3c;
    font-size: 0.85rem;
    display: none;
    margin-bottom: 16px;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← portfolio へ戻る</a>
  <header>
    <h1>実績・称号生成エージェント</h1>
    <p>ゲームコードを貼り付けると、AIがユニークな実績称号を20個自動生成します</p>
  </header>

  <div class="card">
    <div class="row">
      <div class="col-code">
        <label>ゲームコード（HTML / JavaScript）</label>
        <textarea id="code" placeholder="称号を生成したいゲームのコードを貼り付けてください..."></textarea>
      </div>
      <div class="col-ctrl">
        <label>Anthropic API キー</label>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
        <button class="primary" id="submitBtn" onclick="generateAchievements()">称号を生成する</button>
        <p style="font-size:0.72rem;color:var(--text-dim);margin-top:10px;line-height:1.5;">
          キーはリクエスト時のみ使用。<br>保存・記録されません。
        </p>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="spinner" id="spinner">AIが実績を考案中...</div>

  <div class="result card" id="result">
    <div class="result-header">
      <div class="game-title" id="gameTitle"></div>
      <div class="rarity-filter">
        <button class="rarity-btn active" data-rarity="all" onclick="filterRarity('all',this)">ALL</button>
        <button class="rarity-btn active" data-rarity="common" onclick="filterRarity('common',this)">Common</button>
        <button class="rarity-btn active" data-rarity="rare" onclick="filterRarity('rare',this)">Rare</button>
        <button class="rarity-btn active" data-rarity="epic" onclick="filterRarity('epic',this)">Epic</button>
        <button class="rarity-btn active" data-rarity="legendary" onclick="filterRarity('legendary',this)">Legendary</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="export-bar">
      <button class="secondary" onclick="exportJs()">JS実装をコピー</button>
    </div>
  </div>
</div>

<script>
let achievementData = [];
let activeFilters = new Set(['common','rare','epic','legendary']);

function filterRarity(rarity, btn) {
  if (rarity === 'all') {
    const allActive = activeFilters.size === 4;
    if (allActive) {
      activeFilters.clear();
    } else {
      activeFilters = new Set(['common','rare','epic','legendary']);
    }
    document.querySelectorAll('.rarity-btn[data-rarity]').forEach(b => {
      b.classList.toggle('active', !allActive || b.dataset.rarity === 'all');
    });
  } else {
    if (activeFilters.has(rarity)) {
      activeFilters.delete(rarity);
      btn.classList.remove('active');
    } else {
      activeFilters.add(rarity);
      btn.classList.add('active');
    }
    document.querySelector('.rarity-btn[data-rarity="all"]').classList.toggle('active', activeFilters.size === 4);
  }
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.ach-card').forEach(card => {
    card.classList.toggle('hidden', !activeFilters.has(card.dataset.rarity));
  });
}

function exportJs() {
  const js = `// 実績システム — AI生成
const ACHIEVEMENTS = ${JSON.stringify(achievementData, null, 2)};

const earned = new Set();

function checkAchievements(gameState) {
  ACHIEVEMENTS.forEach(a => {
    if (!earned.has(a.name)) {
      try {
        // 各achievementのcondition_codeをゲームの状態に合わせて実装してください
        // 例: if (gameState.score >= 1000) { unlock(a); }
      } catch(e) {}
    }
  });
}

function unlock(achievement) {
  earned.add(achievement.name);
  showToast(achievement);
}

function showToast(achievement) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.9);border:1px solid #00d4ff;border-radius:8px;padding:12px 16px;color:#e0e0e0;font-family:monospace;z-index:9999;animation:fadeIn 0.3s ease';
  toast.innerHTML = \`<span style="font-size:1.4rem">\${achievement.icon}</span> <strong style="color:#00d4ff">\${achievement.name}</strong><br><small style="color:#888">\${achievement.description}</small>\`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}`;

  navigator.clipboard.writeText(js).then(() => {
    const btn = event.target;
    btn.textContent = 'コピーしました!';
    setTimeout(() => btn.textContent = 'JS実装をコピー', 2000);
  });
}

async function generateAchievements() {
  const code = document.getElementById('code').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const result = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');

  if (!code) { alert('コードを入力してください'); return; }
  if (!apiKey) { alert('APIキーを入力してください'); return; }

  btn.disabled = true;
  spinner.classList.add('active');
  result.classList.remove('active');
  errorMsg.classList.remove('active');

  try {
    const res = await fetch('http://localhost:3001/api/agent/achievement', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey
      },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const text = data.content?.[0]?.text || '';
    const parsed = JSON.parse(text);

    achievementData = parsed.achievements || [];
    document.getElementById('gameTitle').textContent = parsed.game_title || '';
    activeFilters = new Set(['common','rare','epic','legendary']);
    document.querySelectorAll('.rarity-btn').forEach(b => b.classList.add('active'));

    const grid = document.getElementById('grid');
    grid.innerHTML = achievementData.map(a => `
      <div class="ach-card" data-rarity="${escHtml(a.rarity)}">
        <div class="ach-top">
          <span class="ach-icon">${escHtml(a.icon)}</span>
          <span class="ach-name">${escHtml(a.name)}</span>
          <span class="ach-rarity">${escHtml(a.rarity)}</span>
        </div>
        <div class="ach-desc">${escHtml(a.description)}</div>
        <div class="ach-code">${escHtml(a.condition_code)}</div>
      </div>
    `).join('');

    result.classList.add('active');
  } catch (err) {
    errorMsg.textContent = 'エラー: ' + err.message;
    errorMsg.classList.add('active');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
