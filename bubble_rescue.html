<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>バブル・レスキュー・クライマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06061e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
      overflow: hidden;
    }
    #wrapper {
      position: relative;
      width: 480px;
      max-width: 100vw;
    }
    canvas {
      display: block;
      width: 100%;
      image-rendering: pixelated;
      border: 2px solid #223;
      cursor: crosshair;
    }
    #hud-dom {
      position: absolute;
      top: 6px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #fff;
      text-shadow: 0 1px 4px #000;
    }
    #score-disp  { color: #ffd700; font-weight: bold; }
    #stage-disp  { color: #aaeeff; }
    #target-disp { color: #88ffaa; }
    #hint {
      color: #556677;
      font-size: 11px;
      text-align: center;
      padding: 4px 0;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="hud-dom">
      <span id="score-disp">SCORE: 0</span>
      <span id="stage-disp">STAGE 1</span>
      <span id="target-disp">0 / 10</span>
    </div>
    <canvas id="c" width="480" height="640"></canvas>
  </div>
  <div id="hint">クリック/タップ: 泡を割る | 小人をドラッグ: 経路を引く | カラスに注意 | ⚡雷は即死</div>
  <script>
'use strict';
// === 定数 ===
const W = 480, H = 640;
const GROUND_Y = 590;
const GNOME_H = 28;
const BUBBLE_FLOW_Y = 250;
const CLIMB_SPEED = 1.5;
const LADDER_HEIGHT = 90;

// Phase 4: 10ステージ化。Stage 4以降は危険アイテム(bomb/hammer)混入
const STAGE_CFG = [
  { gnomes:2, bubbleRate:160, bubbleSpeed:0.8, target:10, maxBubbles:4, lives:3,
    bgColor:['#06061e','#0a1a3e'],
    contents:['coin','coin','ladder','ladder','coin'] },
  { gnomes:2, bubbleRate:130, bubbleSpeed:1.0, target:15, maxBubbles:5, lives:3,
    bgColor:['#06061e','#0a1a3e'],
    contents:['coin','ladder','chest','coin','tool','coin'] },
  { gnomes:3, bubbleRate:110, bubbleSpeed:1.2, target:20, maxBubbles:6, lives:3,
    bgColor:['#06061e','#0a1a3e'],
    contents:['coin','chest','tool','chest','coin','ladder','coin'] },
  { gnomes:3, bubbleRate:95,  bubbleSpeed:1.4, target:28, maxBubbles:6, lives:3,
    bgColor:['#08062a','#120a3e'],
    contents:['coin','chest','tool','coin','bomb','ladder','coin'] },
  { gnomes:3, bubbleRate:80,  bubbleSpeed:1.6, target:35, maxBubbles:7, lives:3,
    bgColor:['#08062a','#120a3e'],
    contents:['coin','chest','tool','coin','bomb','ladder','hammer'] },
  { gnomes:4, bubbleRate:70,  bubbleSpeed:1.8, target:45, maxBubbles:7, lives:3,
    bgColor:['#0a0630','#1a0a3e'],
    contents:['coin','chest','tool','coin','bomb','ladder','hammer'] },
  { gnomes:4, bubbleRate:60,  bubbleSpeed:2.0, target:55, maxBubbles:8, lives:3,
    bgColor:['#0a0630','#1a0a3e'],
    contents:['coin','chest','bomb','coin','tool','ladder','hammer','bomb','coin'] },
  { gnomes:4, bubbleRate:55,  bubbleSpeed:2.1, target:65, maxBubbles:8, lives:2,
    bgColor:['#100430','#200636'],
    contents:['coin','bomb','tool','coin','bomb','ladder','hammer','chest','coin'] },
  { gnomes:4, bubbleRate:50,  bubbleSpeed:2.3, target:75, maxBubbles:8, lives:2,
    bgColor:['#100430','#200636'],
    contents:['coin','bomb','tool','hammer','bomb','ladder','hammer','chest','coin'] },
  { gnomes:5, bubbleRate:42,  bubbleSpeed:2.5, target:80, maxBubbles:9, lives:2,
    bgColor:['#1e0010','#2a0010'],
    contents:['coin','bomb','hammer','coin','bomb','ladder','hammer','bomb','coin','chest'] },
];
const ITEM_SCORE = { coin:10, chest:50, ladder:5, tool:20, bomb:0, hammer:0 };
// Phase 8-1: 危険アイテム種別
const HAZARD_TYPES = new Set(['bomb', 'hammer']);
const MAX_LIVES = 3;

// === キャンバス ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// === Audio System (Phase 3) ===
const AudioSystem = {
  ctx: null, masterGain: null, bgmNodes: [], muted: false,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.4;
    this.masterGain.connect(this.ctx.destination);
  },
  toggleMute() {
    this.muted = !this.muted;
    if (this.masterGain) this.masterGain.gain.value = this.muted ? 0 : 0.4;
  },
  startBGM() {
    if (!this.ctx) return;
    this.stopBGM();
    // 8bit風メロディ: square波ループ
    const notes = [523, 587, 659, 784, 659, 587, 523, 440];
    const noteDur = 0.22;
    const loopDur = notes.length * noteDur;
    const ac = this.ctx;
    const now = ac.currentTime;
    const loopRepeat = 16;
    for (let rep = 0; rep < loopRepeat; rep++) {
      notes.forEach((freq, i) => {
        const t = now + (rep * loopDur) + i * noteDur;
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.02);
        g.gain.setValueAtTime(0.12, t + noteDur * 0.7);
        g.gain.linearRampToValueAtTime(0.0, t + noteDur * 0.9);
        osc.connect(g); g.connect(this.masterGain);
        osc.start(t); osc.stop(t + noteDur);
        this.bgmNodes.push(osc);
      });
    }
  },
  stopBGM() {
    this.bgmNodes.forEach(n => { try { n.stop(); n.disconnect(); } catch(e){} });
    this.bgmNodes = [];
  },
  playSE(type) {
    if (!this.ctx) return;
    const ac = this.ctx;
    const now = ac.currentTime;
    const g = ac.createGain();
    g.connect(this.masterGain);
    switch(type) {
      case 'pop': {
        const osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.12);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.connect(g); osc.start(now); osc.stop(now + 0.12);
        break;
      }
      case 'collect': {
        [440, 660, 880].forEach((f, i) => {
          const o = ac.createOscillator();
          const og = ac.createGain();
          o.type = 'square'; o.frequency.value = f;
          const t = now + i * 0.06;
          og.gain.setValueAtTime(0.15, t);
          og.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
          o.connect(og); og.connect(this.masterGain);
          o.start(t); o.stop(t + 0.09);
        });
        break;
      }
      case 'combo': {
        [523, 784, 1047, 1568].forEach((f, i) => {
          const o = ac.createOscillator();
          const og = ac.createGain();
          o.type = 'square'; o.frequency.value = f;
          const t = now + i * 0.04;
          og.gain.setValueAtTime(0.18, t);
          og.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
          o.connect(og); og.connect(this.masterGain);
          o.start(t); o.stop(t + 0.07);
        });
        break;
      }
      case 'miss': {
        const osc = ac.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.connect(g); osc.start(now); osc.stop(now + 0.25);
        break;
      }
      case 'gameover': {
        [400, 300, 200, 150].forEach((f, i) => {
          const o = ac.createOscillator();
          const og = ac.createGain();
          o.type = 'square'; o.frequency.value = f;
          const t = now + i * 0.18;
          og.gain.setValueAtTime(0.2, t);
          og.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          o.connect(og); og.connect(this.masterGain);
          o.start(t); o.stop(t + 0.15);
        });
        break;
      }
      case 'clear': {
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = ac.createOscillator();
          const og = ac.createGain();
          o.type = 'square'; o.frequency.value = f;
          const t = now + i * 0.12;
          og.gain.setValueAtTime(0.2, t);
          og.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
          o.connect(og); og.connect(this.masterGain);
          o.start(t); o.stop(t + 0.10);
        });
        break;
      }
      case 'ladder': {
        const osc = ac.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.exponentialRampToValueAtTime(440, now + 0.08);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.connect(g); osc.start(now); osc.stop(now + 0.08);
        break;
      }
      case 'bomb': {
        // 爆発音: ノイズバースト
        const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.3), ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
        const src = ac.createBufferSource();
        src.buffer = buf;
        const biquad = ac.createBiquadFilter();
        biquad.type = 'lowpass'; biquad.frequency.value = 400;
        src.connect(biquad); biquad.connect(g);
        g.gain.setValueAtTime(0.6, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        src.start(now);
        break;
      }
      case 'hammer': {
        const osc = ac.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
        g.gain.setValueAtTime(0.5, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.connect(g); osc.start(now); osc.stop(now + 0.15);
        break;
      }
      case 'crow': {
        const osc = ac.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(700, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.18);
        g.gain.setValueAtTime(0.18, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        osc.connect(g); osc.start(now); osc.stop(now + 0.18);
        break;
      }
      case 'thunder': {
        const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.5), ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++)
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 0.5);
        const src = ac.createBufferSource();
        src.buffer = buf;
        const biq = ac.createBiquadFilter();
        biq.type = 'highpass'; biq.frequency.value = 150;
        src.connect(biq); biq.connect(g);
        g.gain.setValueAtTime(0.7, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        src.start(now);
        break;
      }
    }
  }
};
function playSE(type) { AudioSystem.playSE(type); }

// === ハイスコア (Phase 5) ===
const HiScore = {
  scores: [0, 0, 0],
  load() {
    const saved = localStorage.getItem('brc_hi_v2');
    if (saved) { try { this.scores = JSON.parse(saved); } catch(e) {} }
    else {
      const old = parseInt(localStorage.getItem('bubble_rescue_hi') || '0');
      if (old > 0) { this.scores[0] = old; this.saveRaw(); }
    }
    hiScore = this.scores[0] || 0;
  },
  saveRaw() { localStorage.setItem('brc_hi_v2', JSON.stringify(this.scores)); },
  save() {
    const pos = this.scores.findIndex(s => score > s);
    if (pos < 0) return false;
    this.scores.splice(pos, 0, score);
    this.scores = this.scores.slice(0, 3);
    hiScore = this.scores[0];
    this.saveRaw();
    return true;
  }
};

// === 状態変数 ===
let state = 'title'; // 'title'|'play'|'gameover'|'clear'
let keys = {};
let frameCount = 0;
let stage = 0;
let score = 0;
let itemsCollected = 0;
let bubbles = [];
let gnomes  = [];
let items   = [];
let ladders = [];
let particles = []; // 後方互換のため残すが未使用
const POOL_SIZE = 200;
const _pPool = Array.from({ length: POOL_SIZE }, () =>
  ({ x:0, y:0, vx:0, vy:0, life:0, maxLife:45, color:'#fff', r:2, active:false })
);
let bubbleTimer = 0;
let isDrawing = false;
let drawnPath = [];
let activeGnomeIdx = -1;
let mouseDownPos = null;
let hasDragged = false;
const DRAG_THRESHOLD = 6;
let draggingLadder = null;

// Phase 1: ライフ・ハイスコア・コンボ状態変数
let lives = 3;
let hiScore = 0;
let stageStartTime = 0;
let comboCount = 0, comboTimer = 0;
const COMBO_WINDOW = 90;
let bonusPopups = [];

// 浮遊ブロック・カラス・雷
let floatingBlocks = [];
let crows = [];
let lightnings = [];
let lightningTimer = 0;

// === Visual Effects ===
let shakeFrames = 0, shakeAmt = 0;
let rings = [];

// === チュートリアル ===
let tutorialTimer = 0;
const TUTORIAL_DURATION = 240;

// D4: 背景色スムーズ遷移
let bgTransProgress = 1.0;
let prevBgColor = null;

// E3: エンドレスモード
let isEndless = false;

// HUDポーズボタンX（drawHUDBar・handlePlayClick で共用）
function getPauseButtonX() { return 38; }

// === エンティティ生成 ===
function makeBubble() {
  const cfg = STAGE_CFG[stage];
  const r = 22 + Math.random() * 18;
  const baseY = BUBBLE_FLOW_Y + (Math.random() - 0.5) * 60;
  return {
    x: W + r + Math.random() * 80,
    y: baseY,
    baseY,
    vx: -(cfg.bubbleSpeed + Math.random() * 0.4),
    vy: 0,
    radius: r,
    wobbleOffset: Math.random() * Math.PI * 2,
    wobbleAmp: 30 + Math.random() * 15,
    contents: cfg.contents[Math.floor(Math.random() * cfg.contents.length)],
    popped: false,
    popTimer: 0,
    alpha: 1,
  };
}

function makeGnome(x) {
  return {
    x, y: GROUND_Y - 5,
    vx: 0, vy: 0,
    onGround: true,
    onLadder: false,
    onRope: false,
    climbing: false,
    state: 'idle',
    waypoints: [],
    rawPath: null,
    jumpBoost: 1.0,
    jumpCooldown: 0,
    waypointTimer: 0,
    hatColor: ['#cc3333','#33aa33','#5555dd'][gnomes.length % 3],
    bodyColor: ['#3344cc','#884422','#338866'][gnomes.length % 3],
    expression: 'normal', expressionTimer: 0,
  };
}

function makeItem(x, y, type) {
  return {
    x, y,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -0.5,
    type,
    collected: false,
    landed: false,
  };
}

function makeLadder(x) {
  return { x, bottomY: GROUND_Y, height: LADDER_HEIGHT, active: true };
}

function spawnParticle(x, y, color) {
  const p = _pPool.find(p => !p.active);
  if (!p) return;
  const angle = Math.random() * Math.PI * 2;
  const speed = 1.5 + Math.random() * 3;
  p.x = x; p.y = y;
  p.vx = Math.cos(angle) * speed;
  p.vy = Math.sin(angle) * speed - 1;
  p.life = 25 + Math.floor(Math.random() * 20);
  p.maxLife = p.life;
  p.color = color; p.r = 2 + Math.random() * 3;
  p.active = true;
}

function makeRing(x, y, maxR, color) {
  return { x, y, r: maxR * 0.15, maxR, color, life: 20, maxLife: 20 };
}

function makeBlock(x, y, w) {
  return { x, y, w: w || 48, h: 18 };
}

function makeCrow() {
  const side = Math.random() < 0.5 ? 0 : 1;
  return {
    x: side === 0 ? -20 : W + 20,
    y: 80 + Math.random() * 200,
    vx: side === 0 ? (1.2 + Math.random() * 0.8) : -(1.2 + Math.random() * 0.8),
    vy: 0,
    wingAnim: 0,
    attackCooldown: 0,
    diving: false,
    diveTimer: 0,
    warnTimer: 0,
  };
}

function makeLightning(x) {
  return { x, phase: 'warn', timer: 0, boltPoints: null };
}

// === 物理ヘルパー ===
const GRAVITY = 0.35;

function dist2(ax, ay, bx, by) {
  return (ax - bx) ** 2 + (ay - by) ** 2;
}

function updateBubble(b) {
  if (b.popped) {
    b.popTimer++;
    b.alpha = Math.max(0, 1 - b.popTimer / 16);
    return;
  }
  b.x += b.vx;
  b.y = b.baseY + Math.sin(frameCount * 0.025 + b.wobbleOffset) * b.wobbleAmp;
}

function updateItem(it) {
  if (it.collected || it.landed) return;
  it.vy += GRAVITY;
  it.y  += it.vy;
  it.x  += it.vx;
  it.vx *= 0.97;
  if (it.y >= GROUND_Y - 10) {
    it.y = GROUND_Y - 10;
    it.vy *= -0.2;
    it.vx *= 0.6;
    if (Math.abs(it.vy) < 0.6) { it.vy = 0; it.vx = 0; it.landed = true; }
  }
  if (it.x < 10)     { it.x = 10;     it.vx = Math.abs(it.vx); }
  if (it.x > W - 10) { it.x = W - 10; it.vx = -Math.abs(it.vx); }
}

// === 泡POP・アイテム収集 ===
function popBubble(b) {
  if (b.popped) return;
  b.popped = true;
  items.push(makeItem(b.x, b.y, b.contents));
  const pColors = { coin:'#ffd700', chest:'#c8843a', tool:'#aaaacc', ladder:'#c8a06a', bomb:'#ff4400', hammer:'#888888' };
  for (let i = 0; i < 20; i++) spawnParticle(b.x, b.y, pColors[b.contents] || '#fff');
  rings.push(makeRing(b.x, b.y, b.radius * 2.0, pColors[b.contents] || '#aadeee'));
  playSE('pop');
  if (navigator.vibrate) navigator.vibrate(10);
}

function collectItem(it, gnome) {
  it.collected = true;
  // Phase 6: コンボシステム
  comboCount++;
  comboTimer = COMBO_WINDOW;
  const comboMult = Math.min(4, 1 + (comboCount - 1) * 0.5);
  const baseScore = ITEM_SCORE[it.type] || 0;
  const earned = Math.round(baseScore * comboMult);
  score += earned;
  itemsCollected++;
  if (it.type === 'tool') gnome.jumpBoost = Math.min(2.0, gnome.jumpBoost + 0.3);
  // ポップアップ表示
  if (comboCount >= 3) {
    bonusPopups.push({ x: it.x, y: it.y - 20, text: 'x' + comboMult.toFixed(1) + ' COMBO! +' + earned, life: 80, maxLife: 80, color: '#ff8800', large: true });
    playSE('combo'); // Phase 3: combo SE
    if (gnome) { gnome.expression = 'happy'; gnome.expressionTimer = 50; }
  } else {
    if (earned > 0) bonusPopups.push({ x: it.x, y: it.y - 20, text: '+' + earned, life: 60, maxLife: 60, color: '#ffd700', large: false });
    playSE('collect'); // Phase 3: collect SE
  }
  updateHUD();
  checkStageClear();
}

function checkStageClear() {
  const cfg = stage < STAGE_CFG.length ? STAGE_CFG[stage]
    : (() => { const b = STAGE_CFG[STAGE_CFG.length-1]; const ex = stage-STAGE_CFG.length+1; return {...b, target: b.target+ex*15}; })();
  if (itemsCollected < cfg.target) return;
  playSE('clear');
  if (!isEndless && stage === STAGE_CFG.length - 1) {
    HiScore.save(); state = 'clear';
  } else {
    showStageBonus();
  }
}

function placeLadder(x) {
  const existing = ladders.find(l => l.active && Math.abs(l.x - x) < 25);
  if (existing) {
    existing.height = Math.min(GROUND_Y - 30, existing.height + LADDER_HEIGHT);
  } else {
    ladders.push(makeLadder(x));
  }
  score += ITEM_SCORE['ladder'];
  itemsCollected++;
  playSE('ladder');
  bonusPopups.push({ x, y: GROUND_Y - 40, text: '🪜 SET!', life: 50, maxLife: 50, color: '#44ff88', large: false });
  rings.push(makeRing(x, GROUND_Y - 20, 30, '#44ff88'));
  updateHUD();
  checkStageClear();
}

// Phase 8-4: 小人消滅関数
function killGnome(g) {
  shakeFrames = 12; shakeAmt = 4;
  if (navigator.vibrate) navigator.vibrate(50);
  for (let i = 0; i < 16; i++) {
    spawnParticle(g.x, g.y, '#ff3333');
  }
  const idx = gnomes.indexOf(g);
  if (idx >= 0) gnomes.splice(idx, 1);
  lives = Math.max(0, lives - 1);
  updateHUD();
  if (gnomes.length === 0) {
    AudioSystem.stopBGM();
    playSE('gameover');
    HiScore.save();
    state = 'gameover';
  }
}

// Phase 6: ステージクリアボーナス
function showStageBonus() {
  const elapsed = (Date.now() - stageStartTime) / 1000;
  const timeBonus = Math.max(0, Math.round(500 - elapsed * 5));
  const comboBonus = comboCount * 20;
  score += timeBonus + comboBonus;
  for (let i = 0; i < 40; i++) spawnParticle(W/2, H/2, ['#ffd700','#ff88aa','#88ffcc','#88aaff'][i%4]);
  if (timeBonus > 0) bonusPopups.push({ x: W/2, y: H*0.4, text: 'TIME BONUS +' + timeBonus, life: 120, maxLife: 120, color: '#88ffcc', large: true });
  if (comboBonus > 0) bonusPopups.push({ x: W/2, y: H*0.5, text: 'COMBO BONUS +' + comboBonus, life: 120, maxLife: 120, color: '#ffaa44', large: true });
  const nextStage = stage + 1;
  setTimeout(() => {
    if (state === 'play') {
      stage = nextStage;
      itemsCollected = 0;
      if (stage >= STAGE_CFG.length) isEndless = true;
      initStage();
    }
  }, 1800);
}

// 最も高い（長い）アクティブな梯子を返す
function getBestLadder() {
  let best = null;
  for (const l of ladders) {
    if (l.active && (!best || l.height > best.height)) best = l;
  }
  return best;
}

// パスが急勾配（縦線=ロープ）か判定
function isPathSteep(path) {
  if (path.length < 2) return false;
  const dx = Math.abs(path[path.length - 1].x - path[0].x);
  const dy = Math.abs(path[path.length - 1].y - path[0].y);
  return dy > dx * 1.2; // 縦成分が横成分の1.2倍以上 → ロープ扱い
}

// パス上の最近傍点を返す
function getNearestOnPath(path, gx, gy) {
  let bestDist = Infinity, bestX = gx, bestY = gy;
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const lenSq = dx * dx + dy * dy;
    if (lenSq < 1) continue;
    let t = ((gx - a.x) * dx + (gy - a.y) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx, py = a.y + t * dy;
    const d = (gx - px) ** 2 + (gy - py) ** 2;
    if (d < bestDist) { bestDist = d; bestX = px; bestY = py; }
  }
  return { dist: Math.sqrt(bestDist), x: bestX, y: bestY };
}

// 引いた線の x 位置における y を線形補間で返す（範囲外なら null）
function getPathYAtX(path, x) {
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1];
    const minX = Math.min(a.x, b.x), maxX = Math.max(a.x, b.x);
    if (x >= minX - 2 && x <= maxX + 2) {
      if (Math.abs(b.x - a.x) < 1) return (a.y + b.y) / 2;
      const t = (x - a.x) / (b.x - a.x);
      return a.y + t * (b.y - a.y);
    }
  }
  return null;
}

// === 小人AI ===
function updateGnomeAI(g, idx) {
  // 1. ウェイポイント追跡（線引き）
  if (g.waypoints.length > 0) {
    // 300フレーム到達できなければ経路リセット
    g.waypointTimer++;
    if (g.waypointTimer > 300) { g.waypoints = []; g.rawPath = null; g.waypointTimer = 0; return; }

    // 到達済み・通過済みウェイポイントを除去
    while (g.waypoints.length > 0) {
      const w0 = g.waypoints[0];
      const d0 = Math.sqrt((w0.x - g.x) ** 2 + (w0.y - g.y) ** 2);
      if (d0 < 16 || (g.y <= w0.y + 4 && Math.abs(w0.x - g.x) < 32)) {
        g.waypoints.shift(); g.waypointTimer = 0;
      } else break;
    }
    if (g.waypoints.length === 0) { g.rawPath = null; return; }

    const wp = g.waypoints[0];
    const dx = wp.x - g.x;
    const dy = wp.y - g.y;
    const d  = Math.sqrt(dx * dx + dy * dy);

    if (g.onRope) {
      // ロープよじ登り: パスの方向ベクトルで直接移動
      const speed = 1.6;
      g.vx = d > 1 ? (dx / d) * speed : 0;
      g.vy = d > 1 ? (dy / d) * speed : 0;
      g.state = 'climb';
      return;
    }

    // 坂として歩けるか判定（dx方向の傾斜が緩やかなら坂歩き）
    const onSlope = g.rawPath && getPathYAtX(g.rawPath, g.x) !== null;

    g.vx = Math.sign(dx) * Math.min(2.0, d * 0.1) * 1.5;
    if (dy < -20 && g.onLadder) {
      g.climbing = true;
    } else if (dy < -8 && !onSlope && g.onGround && g.jumpCooldown === 0) {
      // 坂の上でなければジャンプ（垂直段差など）
      let minY = wp.y;
      for (let i = 1; i < Math.min(g.waypoints.length, 20); i++) {
        if (g.waypoints[i].y < minY) minY = g.waypoints[i].y;
      }
      const rise = g.y - minY;
      g.vy = -Math.min(10, Math.sqrt(rise * 0.18) + 2.5) * g.jumpBoost;
      g.onGround = false; g.jumpCooldown = 55; g.state = 'jump';
    }
    if (g.state !== 'jump') g.state = 'walk';
    return;
  }

  // 1.5 落下梯子を最優先で拾いに行く（既存梯子に連結するため）
  if (ladders.some(l => l.active)) {
    let nearestFallen = null, nearestFallenDist = Infinity;
    for (const it of items) {
      if (it.collected || !it.landed || it.type !== 'ladder') continue;
      const d = Math.abs(it.x - g.x);
      if (d < nearestFallenDist) { nearestFallenDist = d; nearestFallen = it; }
    }
    if (nearestFallen && nearestFallenDist < 320) {
      g.climbing = false;
      g.vx = Math.sign(nearestFallen.x - g.x) * 1.4;
      g.state = 'walk';
      return;
    }
  }

  // 2. 最寄りの泡を自動ターゲット（梯子経由含む）
  let bestTarget = null, bestScore = Infinity;
  for (const b of bubbles) {
    if (b.popped) continue;
    const dxB = Math.abs(b.x - g.x);
    if (dxB > 280) continue;
    const dyDirect = g.y - b.y;
    // 直接ジャンプで届くか
    if (dyDirect > 0 && dyDirect < 140 * g.jumpBoost) {
      const sc = dxB + dyDirect * 0.3;
      if (sc < bestScore) { bestScore = sc; bestTarget = { bubble: b, ladder: null }; }
    }
    // 梯子経由で届くか
    for (const lad of ladders) {
      if (!lad.active) continue;
      const dxBL = Math.abs(b.x - lad.x);
      if (dxBL > 80) continue;
      const ladTopY = lad.bottomY - lad.height;
      const dyFromTop = ladTopY - b.y;
      if (dyFromTop >= 0 && dyFromTop < 140 * g.jumpBoost) {
        const dxToLad = Math.abs(lad.x - g.x);
        const sc = dxToLad + dyFromTop * 0.3;
        if (sc < bestScore) { bestScore = sc; bestTarget = { bubble: b, ladder: lad }; }
      }
    }
  }

  if (bestTarget) {
    const { bubble: best, ladder: targetLad } = bestTarget;
    if (!targetLad) {
      // 直接ジャンプ
      g.climbing = false;
      const dx = best.x - g.x, absDx = Math.abs(dx);
      g.vx = absDx > 5 ? Math.sign(dx) * 1.4 : 0;
      g.state = absDx > 5 ? 'walk' : 'idle';
      const dy = g.y - best.y;
      if (absDx < best.radius + 15 && dy > 10 && dy < 140 * g.jumpBoost
          && g.onGround && g.jumpCooldown === 0) {
        g.vy = -Math.min(10, Math.sqrt(dy * 0.16) + 3) * g.jumpBoost;
        g.onGround = false; g.jumpCooldown = 50; g.state = 'jump';
      }
    } else {
      // 梯子経由
      const dxToLad = targetLad.x - g.x;
      const ladTopY = targetLad.bottomY - targetLad.height;
      if (Math.abs(dxToLad) > 8 && (g.onGround || !g.onLadder)) {
        g.vx = Math.sign(dxToLad) * 1.4; g.state = 'walk'; g.climbing = false;
      } else {
        g.vx = 0;
        if (g.y > ladTopY + 4) {
          g.climbing = true; g.state = 'climb';
        } else {
          // 梯子の先端に到達 → 泡に向かってジャンプ
          g.climbing = false;
          const dx = best.x - g.x, absDx = Math.abs(dx);
          g.vx = absDx > 5 ? Math.sign(dx) * 1.4 : 0;
          const dy = g.y - best.y;
          if (absDx < best.radius + 20 && dy > 0 && g.jumpCooldown === 0) {
            g.vy = -Math.min(10, Math.sqrt(dy * 0.16) + 3) * g.jumpBoost;
            g.onGround = false; g.jumpCooldown = 50; g.state = 'jump';
          }
        }
      }
    }
    return;
  }

  // 3. 落下アイテムを拾いに行く（梯子含む）
  let nearItem = null, nearDist = Infinity;
  for (const it of items) {
    if (it.collected || !it.landed) continue;
    const d = Math.abs(it.x - g.x);
    if (d < nearDist) { nearDist = d; nearItem = it; }
  }
  if (nearItem && nearDist < 220) {
    g.vx = Math.sign(nearItem.x - g.x) * 1.2;
    g.state = 'walk';
    return;
  }

  // 4. アイドル（ランダム徘徊）
  if (frameCount % 110 === idx * 37 % 110) g.vx = (Math.random() - 0.5) * 1.4;
  g.state = Math.abs(g.vx) > 0.1 ? 'walk' : 'idle';
}

function updateGnomePhysics(g) {
  if (g.jumpCooldown > 0) g.jumpCooldown--;
  if (!g.onLadder && !g.onRope) g.vy += GRAVITY;

  g.x += g.vx;
  g.y += g.vy;

  // ロープ（急勾配の線）をよじ登る
  g.onRope = false;
  if (g.rawPath && g.rawPath.length > 1 && isPathSteep(g.rawPath)) {
    const near = getNearestOnPath(g.rawPath, g.x, g.y);
    if (near.dist < 20) {
      g.x = near.x;
      g.y = near.y;
      g.vy = 0;
      g.onRope = true;
    }
  }

  // 引いた線を坂として歩く（物理より先に判定して重力を打ち消す）
  if (!g.onRope && g.rawPath && g.rawPath.length > 1) {
    const pathY = getPathYAtX(g.rawPath, g.x);
    if (pathY !== null && g.y >= pathY - 32 && g.y < pathY + 8) {
      g.y = pathY;
      g.vy = 0;
      g.onGround = true;
    }
  }

  // 浮遊ブロックの上に乗る
  let onBlock = false;
  for (const bl of floatingBlocks) {
    if (g.vy >= 0
        && g.y >= bl.y - 5 && g.y <= bl.y + 10
        && g.x >= bl.x - 6 && g.x <= bl.x + bl.w + 6) {
      g.y = bl.y - 5;
      g.vy = 0;
      g.onGround = true;
      onBlock = true;
      if (g.state === 'jump') g.state = 'idle';
      break;
    }
  }

  // 地面（足底が g.y+5 になる描画オフセットを考慮して -5）
  if (g.y >= GROUND_Y - 5) {
    g.y = GROUND_Y - 5;
    g.vy = 0;
    g.onGround = true;
    if (g.state === 'jump') g.state = 'idle';
  } else if (!onBlock && !g.onRope && (!g.rawPath || getPathYAtX(g.rawPath, g.x) === null)) {
    g.onGround = false;
  }

  // 壁
  if (g.x < 10) { g.x = 10; g.vx = 0; }
  if (g.x > W - 10) { g.x = W - 10; g.vx = 0; }

  // 梯子
  g.onLadder = false;
  for (const lad of ladders) {
    if (!lad.active) continue;
    const topY = lad.bottomY - lad.height;
    if (Math.abs(g.x - lad.x) < 14 && g.y > topY - 5 && g.y < lad.bottomY + 5) {
      g.onLadder = true;
      g.x = lad.x;
      if (g.climbing) {
        g.vy = -CLIMB_SPEED;
      } else if (g.vy > 0) {
        g.vy = 0;
      }
      break;
    }
  }
  if (!g.onLadder) g.climbing = false;

  // 泡に触れたらPOP
  for (const b of bubbles) {
    if (b.popped) continue;
    const dy = (g.y - GNOME_H * 0.5) - b.y;
    const dx = g.x - b.x;
    if (dx * dx + dy * dy < (b.radius + 8) ** 2) popBubble(b);
  }

  // アイテム収集
  const COLLECT_R2 = 28 * 28;
  for (const it of items) {
    if (it.collected || !it.landed) continue;
    if (HAZARD_TYPES.has(it.type)) {
      // Phase 8-3: 危険アイテムは小人に当たると小人消滅
      if (dist2(g.x, g.y, it.x, it.y) < 30 * 30) {
        it.collected = true;
        killGnome(g);
        return; // この小人のループを抜ける
      }
    } else if (dist2(g.x, g.y, it.x, it.y) < COLLECT_R2) {
      if (it.type === 'ladder') {
        it.collected = true;
        const bestLad = getBestLadder();
        if (bestLad) {
          // 一番長い梯子に連結して伸ばす
          bestLad.height = Math.min(GROUND_Y - 30, bestLad.height + LADDER_HEIGHT);
          score += ITEM_SCORE['ladder'];
          itemsCollected++;
          playSE('ladder');
          updateHUD();
          checkStageClear();
        } else {
          placeLadder(it.x);
        }
      } else {
        collectItem(it, g);
      }
    }
  }
}
// === カラス更新 ===
function updateCrow(crow) {
  crow.wingAnim++;
  if (crow.attackCooldown > 0) crow.attackCooldown--;

  if (crow.diving) {
    crow.diveTimer++;
    crow.y += 2.5;

    // 小人に当たったら吹き飛ばす
    for (let i = gnomes.length - 1; i >= 0; i--) {
      const g = gnomes[i];
      if (dist2(crow.x, crow.y, g.x, g.y) < 28 * 28 && crow.attackCooldown === 0) {
        g.vx += Math.sign(g.x - crow.x) * 4;
        g.vy = -4.5;
        g.onGround = false;
        g.waypoints = [];
        g.rawPath = null;
        crow.attackCooldown = 100;
        playSE('crow');
        bonusPopups.push({ x: g.x, y: g.y - 30, text: 'CAW!', life: 50, maxLife: 50, color: '#ffaa00', large: false });
        g.expression = 'surprised'; g.expressionTimer = 65;
        break;
      }
    }

    // 梯子に触れたら破壊
    if (crow.attackCooldown === 0) {
      for (const lad of ladders) {
        if (!lad.active) continue;
        if (Math.abs(crow.x - lad.x) < 18 && crow.y > lad.bottomY - lad.height - 10 && crow.y < lad.bottomY) {
          lad.active = false;
          crow.attackCooldown = 130;
          playSE('crow');
          bonusPopups.push({ x: lad.x, y: lad.bottomY - lad.height / 2, text: '梯子破壊!', life: 70, maxLife: 70, color: '#ff4444', large: false });
          for (let k = 0; k < 8; k++) spawnParticle(lad.x, lad.bottomY - lad.height / 2, '#c8a06a');
          break;
        }
      }
    }

    if (crow.diveTimer > 45) {
      crow.diving = false;
      crow.diveTimer = 0;
      crow.vy = -2.5;
    }
  } else {
    crow.x += crow.vx;
    crow.y += crow.vy;
    crow.vy *= 0.94;
    crow.vy += Math.sin(frameCount * 0.022 + crow.x * 0.012) * 0.06;
    crow.y = Math.max(55, Math.min(340, crow.y));

    // 画面外に出たら反対側から再登場
    if (crow.x < -40) { crow.x = W + 40; crow.vx = Math.abs(crow.vx); }
    if (crow.x > W + 40) { crow.x = -40; crow.vx = -Math.abs(crow.vx); }

    // D3: 警告フェーズ中は警告タイマーを消化してからダイブ
    if (crow.warnTimer > 0) {
      crow.warnTimer--;
      if (crow.warnTimer === 0) { crow.diving = true; crow.diveTimer = 0; }
    } else if (crow.attackCooldown === 0) {
      // 近くに小人がいれば警告開始
      for (const g of gnomes) {
        const dx = Math.abs(crow.x - g.x);
        const dy = crow.y - g.y;
        if (dx < 55 && dy > 20 && dy < 260) {
          crow.warnTimer = 30;
          break;
        }
      }
    }
  }
}

// === 雷更新 ===
function updateLightning(lt) {
  lt.timer++;
  if (lt.phase === 'warn') {
    if (lt.timer >= 65) {
      lt.phase = 'strike';
      lt.timer = 0;
      // ボルトの折れ線を事前生成（毎フレーム乱数を使わないよう）
      const pts = [{ x: lt.x, y: 0 }];
      for (let i = 1; i < 9; i++) {
        pts.push({ x: lt.x + (Math.random() - 0.5) * 22, y: (GROUND_Y / 9) * i });
      }
      pts.push({ x: lt.x, y: GROUND_Y });
      lt.boltPoints = pts;
      playSE('thunder');
      // 小人が範囲内なら即死
      for (let i = gnomes.length - 1; i >= 0; i--) {
        if (Math.abs(gnomes[i].x - lt.x) < 26) killGnome(gnomes[i]);
      }
    }
  } else if (lt.phase === 'strike') {
    if (lt.timer >= 22) lt.phase = 'done';
  }
}

// === HUD更新 ===
function updateHUD() {
  document.getElementById('score-disp').textContent  = 'SCORE: ' + score;
  document.getElementById('stage-disp').textContent  = 'STAGE ' + (stage + 1);
  document.getElementById('target-disp').textContent = itemsCollected + ' / ' + STAGE_CFG[stage].target;
}

// === 描画ヘルパー ===
function drawBackground() {
  // D4: ステージ間背景色補間
  function lerpHex(a, b, t) {
    const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
    const r  = Math.round(((pa>>16)&0xff)*(1-t)+((pb>>16)&0xff)*t);
    const g2 = Math.round(((pa>>8) &0xff)*(1-t)+((pb>>8) &0xff)*t);
    const bl = Math.round((pa      &0xff)*(1-t)+(pb      &0xff)*t);
    return '#'+[r,g2,bl].map(v=>v.toString(16).padStart(2,'0')).join('');
  }
  const cur = stage < STAGE_CFG.length ? STAGE_CFG[stage].bgColor : ['#1e0010','#2a0010'];
  const bgColor = prevBgColor && bgTransProgress < 1
    ? [lerpHex(prevBgColor[0], cur[0], bgTransProgress), lerpHex(prevBgColor[1], cur[1], bgTransProgress)]
    : cur;
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, bgColor[0]);
  grad.addColorStop(0.75, bgColor[1]);
  grad.addColorStop(1, '#0a2a0a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // D1: 視差星2層（遠層30個・近層15個）
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137 + 29) + frameCount * 0.04) % W;
    const sy = (i * 97 + 11) % (H - 120);
    const a  = 0.2 + 0.3 * ((Math.sin(frameCount * 0.03 + i) + 1) / 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(sx, sy, 1, 1);
  }
  for (let i = 0; i < 15; i++) {
    const sx = ((i * 211 + 73) + frameCount * 0.11) % W;
    const sy = (i * 59 + 43) % (H - 120);
    const a  = 0.5 + 0.4 * ((Math.sin(frameCount * 0.05 + i * 1.7) + 1) / 2);
    ctx.fillStyle = `rgba(220,240,255,${a})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function drawGround() {
  ctx.fillStyle = '#1a4a1a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#2d6a2d';
  ctx.fillRect(0, GROUND_Y, W, 10);
  ctx.fillStyle = '#3d8a3d';
  for (let x = 8; x < W; x += 22) {
    ctx.fillRect(x,     GROUND_Y - 5, 3, 5);
    ctx.fillRect(x + 6, GROUND_Y - 7, 3, 7);
    ctx.fillRect(x + 12,GROUND_Y - 4, 3, 4);
  }
}

function drawBubble(b) {
  if (b.popped && b.alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = b.alpha;
  const r = b.popped ? b.radius * Math.max(0.05, 1 - b.popTimer * 0.06) : b.radius;
  const grad = ctx.createRadialGradient(b.x - r * 0.3, b.y - r * 0.35, r * 0.05, b.x, b.y, r);
  grad.addColorStop(0,   'rgba(200,240,255,0.55)');
  grad.addColorStop(0.6, 'rgba(80,180,255,0.18)');
  grad.addColorStop(1,   'rgba(60,140,220,0.38)');
  ctx.beginPath();
  ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // 危険アイテムの泡は内部に赤ティントを重ねる
  if (HAZARD_TYPES.has(b.contents) && !b.popped) {
    const pulse2 = 0.5 + 0.5 * Math.sin(frameCount * 0.18);
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,0,0,${0.07 + 0.05 * pulse2})`;
    ctx.fill();
  }
  // 危険アイテムの泡は赤縁グロー＋太いボーダーで点滅表示
  if (HAZARD_TYPES.has(b.contents)) {
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.18);
    ctx.strokeStyle = `rgba(255,50,50,${0.7 + 0.3 * pulse})`;
    ctx.lineWidth = 4;
    ctx.shadowColor = '#ff2200';
    ctx.shadowBlur = 8 + 10 * pulse;
  } else {
    ctx.strokeStyle = 'rgba(180,240,255,0.85)';
    ctx.lineWidth = 1.5;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  // ハイライト
  ctx.beginPath();
  ctx.arc(b.x - r * 0.28, b.y - r * 0.32, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
  // 中身アイコン（危険アイテムは拡大表示）
  if (!b.popped) drawItemIcon(b.x, b.y, b.contents,
    Math.floor(r * (HAZARD_TYPES.has(b.contents) ? 0.68 : 0.55)));
  ctx.restore();
}

function drawItemIcon(x, y, type, size) {
  ctx.save();
  if (type === 'coin') {
    ctx.beginPath();
    ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.strokeStyle = '#c8a000';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#a07800';
    ctx.font = `bold ${Math.max(8, size * 0.75)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('G', x, y + 1);
  } else if (type === 'chest') {
    const s = size * 0.7;
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(x - s, y - s * 0.5, s * 2, s * 1.1);
    ctx.fillStyle = '#c8841a';
    ctx.fillRect(x - s, y - s * 0.5, s * 2, s * 0.45);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(x - s * 0.22, y - s * 0.15, s * 0.44, s * 0.38);
    ctx.strokeStyle = '#5a2a00';
    ctx.lineWidth = 1;
    ctx.strokeRect(x - s, y - s * 0.5, s * 2, s * 1.1);
  } else if (type === 'ladder') {
    ctx.strokeStyle = '#c8a06a';
    ctx.lineWidth = 2;
    const h = size * 1.1, w = size * 0.65;
    ctx.beginPath(); ctx.moveTo(x - w, y - h); ctx.lineTo(x - w, y + h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + w, y - h); ctx.lineTo(x + w, y + h); ctx.stroke();
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(x - w, y + i * h * 0.45);
      ctx.lineTo(x + w, y + i * h * 0.45);
      ctx.stroke();
    }
  } else if (type === 'tool') {
    ctx.fillStyle = '#999';
    ctx.fillRect(x - size * 0.22, y - size * 0.8, size * 0.44, size * 1.3);
    ctx.fillStyle = '#bbb';
    ctx.fillRect(x - size * 0.5, y - size * 0.8, size, size * 0.35);
    ctx.fillRect(x - size * 0.5, y - size * 0.55, size, size * 0.2);
  } else if (type === 'bomb') {
    // Phase 8-2: 爆弾 — 黒い円 + 導火線 + 点滅火花
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(x, y, size * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ff8800'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + size * 0.5, y - size * 0.5);
    ctx.quadraticCurveTo(x + size, y - size, x + size * 0.8, y - size * 1.2);
    ctx.stroke();
    // 火花（点滅）
    if (Math.floor(frameCount / 4) % 2 === 0) {
      ctx.fillStyle = '#ffdd00';
      ctx.beginPath(); ctx.arc(x + size * 0.8, y - size * 1.2, size * 0.25, 0, Math.PI * 2); ctx.fill();
    }
  } else if (type === 'hammer') {
    // Phase 8-2: ハンマー — 矩形ヘッド + 柄
    ctx.fillStyle = '#888';
    ctx.fillRect(x - size * 0.9, y - size * 0.9, size * 1.8, size * 0.7); // ヘッド
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(x - size * 0.15, y - size * 0.2, size * 0.3, size * 1.2); // 柄
  }
  ctx.restore();
}

function drawLadder(lad) {
  const x = lad.x, top = lad.bottomY - lad.height, bot = lad.bottomY;
  ctx.strokeStyle = '#c8a06a';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x - 8, top); ctx.lineTo(x - 8, bot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 8, top); ctx.lineTo(x + 8, bot); ctx.stroke();
  ctx.lineWidth = 2;
  const steps = Math.floor(lad.height / 13);
  for (let i = 0; i <= steps; i++) {
    const ry = top + (i / steps) * lad.height;
    ctx.beginPath(); ctx.moveTo(x - 8, ry); ctx.lineTo(x + 8, ry); ctx.stroke();
  }
}

function drawGnome(g) {
  // 表情タイマー更新
  if (g.expressionTimer > 0) g.expressionTimer--;
  else g.expression = 'normal';

  const x = Math.round(g.x), y = Math.round(g.y);
  const bob = g.state === 'walk' ? Math.sin(frameCount * 0.28) * 1.5 : 0;
  const ay = y + bob; // animation y offset applied to body

  // 帽子（三角）
  ctx.fillStyle = g.hatColor;
  ctx.beginPath();
  ctx.moveTo(x, ay - GNOME_H - 8);
  ctx.lineTo(x - 8, ay - GNOME_H + 3);
  ctx.lineTo(x + 8, ay - GNOME_H + 3);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = g.bodyColor;
  ctx.fillRect(x - 9, ay - GNOME_H + 3, 18, 3);

  // 顔
  ctx.fillStyle = '#f5c07a';
  ctx.fillRect(x - 6, ay - GNOME_H + 6, 12, 10);
  if (g.expression === 'surprised') {
    // 驚き顔: 大きい目＋O型の口
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 4, ay - GNOME_H + 7, 3, 3);
    ctx.fillRect(x + 1, ay - GNOME_H + 7, 3, 3);
    ctx.beginPath();
    ctx.arc(x, ay - GNOME_H + 13, 2, 0, Math.PI * 2);
    ctx.fill();
  } else if (g.expression === 'happy') {
    // 笑顔: 通常目＋上向きカーブ口
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 4, ay - GNOME_H + 8, 2, 2);
    ctx.fillRect(x + 2, ay - GNOME_H + 8, 2, 2);
    ctx.beginPath();
    ctx.arc(x, ay - GNOME_H + 11, 3, 0, Math.PI);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    // 通常顔
    ctx.fillStyle = '#222';
    ctx.fillRect(x - 4, ay - GNOME_H + 8, 2, 2);
    ctx.fillRect(x + 2, ay - GNOME_H + 8, 2, 2);
    ctx.fillStyle = '#d08060';
    ctx.fillRect(x - 1, ay - GNOME_H + 11, 2, 2);
  }

  // ボディ
  ctx.fillStyle = g.bodyColor;
  ctx.fillRect(x - 7, ay - GNOME_H + 16, 14, 10);

  // 足（歩行アニメ）
  const legSwing = g.state === 'walk' ? Math.sin(frameCount * 0.3) * 3 : 0;
  ctx.fillStyle = '#3a2008';
  ctx.fillRect(x - 5, ay - GNOME_H + 26 + legSwing, 5, 7);
  ctx.fillRect(x,     ay - GNOME_H + 26 - legSwing, 5, 7);
}

function drawItem(it) {
  if (it.collected) return;
  ctx.save();
  if (!it.landed && it.type === 'ladder') {
    // 梯子アイテムはドラッグ可能なのでグロー表示
    ctx.shadowColor = '#c8a06a';
    ctx.shadowBlur = 8 + Math.sin(frameCount * 0.1) * 4;
  }
  drawItemIcon(it.x, it.y, it.type, 14);
  ctx.restore();
}

function drawParticles() {
  ctx.save();
  for (const p of _pPool) {
    if (!p.active) continue;
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life <= 0) { p.active = false; continue; }
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawRings() {
  ctx.save();
  for (let i = rings.length - 1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += (rg.maxR - rg.r) * 0.22;
    rg.life--;
    if (rg.life <= 0) { rings.splice(i, 1); continue; }
    const alpha = rg.life / rg.maxLife;
    ctx.globalAlpha = alpha * 0.75;
    ctx.strokeStyle = rg.color;
    ctx.lineWidth = 3 * alpha;
    ctx.shadowColor = rg.color;
    ctx.shadowBlur = 6 * alpha;
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// === 浮遊ブロック描画（マリオ風レンガ）===
function drawFloatingBlocks() {
  for (const bl of floatingBlocks) {
    const { x, y, w, h } = bl;
    // メイン面
    ctx.fillStyle = '#c8843a';
    ctx.fillRect(x, y, w, h);
    // 水平目地
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(x, y + Math.floor(h / 2) - 1, w, 2);
    // 垂直目地（上段・下段で半ズレ）
    const bw = Math.floor(w / 2);
    ctx.fillRect(x + bw - 1, y, 2, Math.floor(h / 2) - 1);
    ctx.fillRect(x + Math.floor(bw / 2) - 1, y + Math.floor(h / 2) + 1, 2, h - Math.floor(h / 2) - 1);
    ctx.fillRect(x + bw + Math.floor(bw / 2) - 1, y + Math.floor(h / 2) + 1, 2, h - Math.floor(h / 2) - 1);
    // 上端ハイライト
    ctx.fillStyle = '#e8a450';
    ctx.fillRect(x, y, w, 2);
    // 下端シャドウ
    ctx.fillStyle = '#6a3010';
    ctx.fillRect(x, y + h - 2, w, 2);
  }
}

// === カラス描画 ===
function drawCrow(crow) {
  const cx = Math.round(crow.x), cy = Math.round(crow.y);
  const wing = Math.sin(crow.wingAnim * 0.28) * 7;
  const facingRight = crow.vx >= 0;
  ctx.save();
  // 翼（左右）
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(cx - 13, cy + wing, 11, 5, -0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 13, cy + wing, 11, 5, 0.35, 0, Math.PI * 2);
  ctx.fill();
  // 胴体
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(cx, cy, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // くちばし
  ctx.fillStyle = '#cc7700';
  const bx = facingRight ? cx + 9 : cx - 9;
  const bdir = facingRight ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(bx, cy - 1);
  ctx.lineTo(bx + bdir * 7, cy + 1);
  ctx.lineTo(bx, cy + 4);
  ctx.closePath();
  ctx.fill();
  // 目（赤）
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(cx + bdir * 5, cy - 1, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // D3: 警告マーク
  if (crow.warnTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.floor(crow.warnTimer / 5) % 2 === 0 ? 1.0 : 0.3;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚠', cx, cy - 22);
    ctx.restore();
  }
}

// === 雷描画 ===
function drawLightnings() {
  for (const lt of lightnings) {
    if (lt.phase === 'done') continue;
    ctx.save();
    if (lt.phase === 'warn') {
      // 点滅する警告ライン
      if (Math.floor(lt.timer / 6) % 2 === 0) {
        ctx.strokeStyle = 'rgba(255,255,80,0.35)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(lt.x, 0);
        ctx.lineTo(lt.x, GROUND_Y);
        ctx.stroke();
        ctx.setLineDash([]);
        // 警告マーク
        ctx.fillStyle = 'rgba(255,220,0,0.7)';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⚡', lt.x, 50 + Math.sin(frameCount * 0.15) * 5);
      }
    } else if (lt.phase === 'strike' && lt.boltPoints) {
      const alpha = Math.max(0, 1 - lt.timer / 22);
      ctx.globalAlpha = alpha;
      // 光エフェクト
      ctx.fillStyle = 'rgba(255,255,180,0.2)';
      ctx.fillRect(lt.x - 32, 0, 64, GROUND_Y);
      // ボルト本体
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#ffff00';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(lt.boltPoints[0].x, lt.boltPoints[0].y);
      for (let i = 1; i < lt.boltPoints.length; i++) {
        ctx.lineTo(lt.boltPoints[i].x, lt.boltPoints[i].y);
      }
      ctx.stroke();
      // 細いコア
      ctx.strokeStyle = '#ffffaa';
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(lt.boltPoints[0].x, lt.boltPoints[0].y);
      for (let i = 1; i < lt.boltPoints.length; i++) {
        ctx.lineTo(lt.boltPoints[i].x, lt.boltPoints[i].y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ボーナスポップアップ表示（スコア加算時のフローティングテキスト）
function drawBonusPopups() {
  if (bonusPopups.length === 0) return;
  ctx.save();
  for (let i = bonusPopups.length - 1; i >= 0; i--) {
    const p = bonusPopups[i];
    p.y -= 0.6;
    p.life--;
    if (p.life <= 0) { bonusPopups.splice(i, 1); continue; }
    const alpha = Math.min(1, p.life / (p.maxLife * 0.35));
    ctx.globalAlpha = alpha;
    ctx.font = p.large ? 'bold 18px monospace' : 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.restore();
}

function drawPath() {
  ctx.save();
  ctx.setLineDash([5, 5]);
  ctx.lineWidth = 2;

  // 引き中のパス（水色）
  if (isDrawing && drawnPath.length >= 2) {
    ctx.strokeStyle = 'rgba(100,220,255,0.85)';
    ctx.beginPath();
    ctx.moveTo(drawnPath[0].x, drawnPath[0].y);
    for (let i = 1; i < drawnPath.length; i++) ctx.lineTo(drawnPath[i].x, drawnPath[i].y);
    ctx.stroke();
  }

  // 各小人のウェイポイント（小人位置→終点の点線）
  for (const g of gnomes) {
    if (g.waypoints.length < 1) continue;
    ctx.strokeStyle = 'rgba(160,255,180,0.7)';
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    for (const wp of g.waypoints) ctx.lineTo(wp.x, wp.y);
    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.restore();
}

// Phase 2: ハート描画関数（ベジェ曲線でハート形）
function drawHeart(cx, cy, size, filled) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx - size, cy - size * 0.6, cx - size * 1.6, cy + size * 0.5, cx, cy + size * 1.2);
  ctx.bezierCurveTo(cx + size * 1.6, cy + size * 0.5, cx + size, cy - size * 0.6, cx, cy + size * 0.3);
  ctx.closePath();
  ctx.fillStyle = filled ? '#ff4466' : 'rgba(255,80,120,0.25)';
  ctx.fill();
  ctx.strokeStyle = filled ? '#ff88aa' : 'rgba(255,80,120,0.4)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();
}

// === スクリーン描画 ===
function drawHUDBar() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,20,0.72)';
  ctx.fillRect(0, 0, W, 42);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE ' + score, 10, 27);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaeeff';
  ctx.fillText(isEndless ? 'ENDLESS ' + (stage - STAGE_CFG.length + 2) : 'STAGE ' + (stage + 1), W / 2, 27);

  // B2: コンボ表示（残り30フレームで赤フラッシュ＋タイマーバー）
  if (comboCount >= 2) {
    const warning = comboTimer > 0 && comboTimer < 30;
    const flash = warning && Math.floor(frameCount / 4) % 2 === 0;
    ctx.fillStyle = flash ? '#ff4444' : '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('COMBO x' + comboCount, W / 2, 40);
    if (comboTimer > 0) {
      const prog2 = comboTimer / COMBO_WINDOW;
      ctx.fillStyle = warning ? '#ff4444' : '#ffdd44';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(W / 2 - 30, 42, 60, 2);
      ctx.globalAlpha = 1;
      ctx.fillRect(W / 2 - 30, 42, 60 * prog2, 2);
    }
  }

  // Phase 2: ハートでライフ表示（右上端）
  const maxLives = STAGE_CFG[stage].lives || MAX_LIVES;
  for (let h = 0; h < maxLives; h++) {
    drawHeart(W - 18 - h * 22, 14, 7, h < lives);
  }

  // ミュートボタン
  ctx.textAlign = 'center';
  ctx.font = '14px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(AudioSystem.muted ? '🔇' : '🔊', W - 18 - maxLives * 22 - 22, 18);

  // B1: ポーズボタン
  ctx.fillText('⏸', getPauseButtonX(), 18);

  // プログレスバー（アイテム収集）
  ctx.textAlign = 'right';
  ctx.fillStyle = '#88ffaa';
  ctx.font = '12px monospace';
  ctx.fillText(itemsCollected + ' / ' + STAGE_CFG[stage].target, W - 18 - maxLives * 22 - 42, 27);
  const prog = Math.min(1, itemsCollected / STAGE_CFG[stage].target);
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(10, 33, W - 20, 5);
  ctx.fillStyle = '#44ff88';
  ctx.fillRect(10, 33, (W - 20) * prog, 5);

  // B3: タイムボーナスバー（右寄せ、金色）
  const elapsed = (Date.now() - stageStartTime) / 1000;
  const timeProg = Math.max(0, 1 - elapsed / 100);
  if (timeProg > 0) {
    const bw = 80, bx = W - bw - 10;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(bx, 38, bw, 3);
    ctx.fillStyle = timeProg > 0.3 ? '#ffd700' : '#ff8844';
    ctx.fillRect(bx, 38, bw * timeProg, 3);
  }

  ctx.restore();
}

// B1: ポーズオーバーレイ
function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,30,0.72)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaeeff';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('⏸ PAUSE', W / 2, H * 0.38);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '14px sans-serif';
  ctx.fillText(AudioSystem.muted ? '🔇 ミュート中' : '🔊 音あり', W / 2, H * 0.50);
  ctx.fillStyle = (Math.floor(frameCount / 22) % 2 === 0) ? '#ffffff' : '#66aaff';
  ctx.font = '14px monospace';
  ctx.fillText('タップ / Esc で再開', W / 2, H * 0.62);

}

// C2: 初回チュートリアルオーバーレイ
function drawTutorialOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,30,0.80)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaeeff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('操作ガイド', W / 2, H * 0.22);
  const tips = [
    ['👆 タップ',   '泡を割る'],

  tips.forEach(([icon, desc], i) => {
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'right';

    ctx.textAlign = 'left';

  });

}

function drawTitle() {
  drawBackground();
  // アニメーション泡
  for (let i = 0; i < 6; i++) {
    const bx = ((i * 83 + frameCount * 0.4) % W + W) % W;
    const by = ((H * 0.8 - frameCount * 0.6 + i * 110) % H + H) % H;
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.15 * Math.sin(frameCount * 0.03 + i);
    ctx.beginPath();
    ctx.arc(bx, by, 18 + i * 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(150,220,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaddff';
  ctx.font = 'bold 15px monospace';
  ctx.fillText('🫧  BUBBLE', W / 2, H * 0.25);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('RESCUE CLIMBER', W / 2, H * 0.33);
  ctx.fillStyle = '#88bbdd';
  ctx.font = '13px monospace';
  ctx.fillText('バブル・レスキュー・クライマー', W / 2, H * 0.41);

  // デモ小人
  const demoG = {
    x: W / 2, y: H * 0.62,
    state:'idle', hatColor:'#cc3333', bodyColor:'#3344cc'
  };
  drawGnome(demoG);

  // Phase 5: ハイスコア表示
  if (HiScore.scores[0] > 0) {
    ctx.font = 'bold 12px monospace';
    ['#ffd700','#cccccc','#cd7f32'].forEach((col, i) => {
      if (HiScore.scores[i] > 0) {
        ctx.fillStyle = col;
        ctx.fillText(['🥇','🥈','🥉'][i] + ' ' + HiScore.scores[i], W / 2, H * 0.50 + i * 15);
      }
    });
  }

  ctx.fillStyle = (Math.floor(frameCount / 22) % 2 === 0) ? '#ffffff' : '#66aaff';
  ctx.font = '16px monospace';
  ctx.fillText('クリック / タップ でスタート', W / 2, H * 0.62);

  // Phase 7: チュートリアル操作ヒント
  const tips = [
    '泡をクリックで割る → アイテムが落下',
    '小人がアイテムを拾う → スコア加算',
    '泡を見逃すとライフ(♥)が減少',
    '小人をドラッグ → 経路を指示できる',
  ];
  ctx.fillStyle = '#8899bb';
  ctx.font = '11px monospace';
  tips.forEach((t, i) => {
    ctx.fillText(t, W / 2, H * 0.72 + i * 16);
  });
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff5566';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('GAME OVER', W / 2, H * 0.35);
  ctx.fillStyle = '#ffd700';
  ctx.font = '22px monospace';
  ctx.fillText('SCORE: ' + score, W / 2, H * 0.46);
  ctx.fillStyle = '#aaaaff';
  ctx.font = '14px monospace';
  ctx.fillText('STAGE ' + (stage + 1) + ' まで到達', W / 2, H * 0.54);
  // Phase 5: ハイスコア・NEWレコード表示
  if (score >= hiScore && score > 0) {
    ctx.fillStyle = (Math.floor(frameCount / 18) % 2 === 0) ? '#ffd700' : '#ff88aa';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('★ NEW HI-SCORE! ★', W / 2, H * 0.63);
  } else if (hiScore > 0) {
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '13px monospace';
    ctx.fillText('BEST: ' + hiScore, W / 2, H * 0.63);
  }
  ctx.fillStyle = (Math.floor(frameCount / 22) % 2 === 0) ? '#fff' : '#66aaff';
  ctx.font = '15px monospace';
  ctx.fillText('クリック / タップ でリトライ', W / 2, H * 0.75);
  ctx.textAlign = 'left';
}

function drawClear() {
  ctx.fillStyle = 'rgba(0,10,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  // D2: 紙吹雪 80個（四角50＋円30）
  const cfColors = ['#ffd700','#ff88aa','#88ffcc','#88aaff','#ffaa44','#ffffff'];
  for (let i = 0; i < 50; i++) {
    ctx.fillStyle = cfColors[i % cfColors.length];
    ctx.fillRect(
      ((i * 137 + frameCount * 3) % W + W) % W,
      ((i * 79  + frameCount * 2) % H + H) % H, 5, 7
    );
  }
  for (let i = 0; i < 30; i++) {
    const cx2 = ((i * 173 + frameCount * 4 + 50) % W + W) % W;
    const cy2 = ((i * 113 + frameCount * 2.5 + 80) % H + H) % H;
    ctx.beginPath();
    ctx.arc(cx2, cy2, 3, 0, Math.PI * 2);
    ctx.fillStyle = cfColors[(i + 2) % cfColors.length];
    ctx.fill();
  }
  // D2: "ALL CLEAR!" スケールパルス
  const scale = 1.0 + 0.06 * Math.sin(frameCount * 0.12);
  ctx.save();
  ctx.translate(W / 2, H * 0.32);
  ctx.scale(scale, scale);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 18;
  ctx.font = 'bold 30px monospace';
  ctx.fillText('ALL CLEAR!', 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88ffcc';
  ctx.font = '20px monospace';
  ctx.fillText('全ステージクリア！', W / 2, H * 0.44);
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px monospace';
  ctx.fillText('最終スコア: ' + score, W / 2, H * 0.55);
  ctx.fillStyle = (Math.floor(frameCount / 22) % 2 === 0) ? '#fff' : '#ffd700';
  ctx.font = '15px monospace';
  ctx.fillText('クリック / タップ でタイトルへ', W / 2, H * 0.68);
  ctx.textAlign = 'left';
}

// === 入力処理 ===
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top)  * (H / rect.height),
  };
}

function handleStateClick(pos) {
  AudioSystem.init();
  if (state === 'title')    { initGame(); state = 'play'; AudioSystem.startBGM(); return true; }
  if (state === 'gameover') { initGame(); state = 'play'; AudioSystem.startBGM(); return true; }
  if (state === 'clear')    { state = 'title';            AudioSystem.stopBGM();  return true; }
  if (state === 'pause')    { state = 'play';                                     return true; }
  return false;
}

function handlePlayClick(pos) {
  // B1: ポーズボタン判定
  if (pos.y < 42 && Math.abs(pos.x - getPauseButtonX()) < 20) {
    state = 'pause'; return;
  }
  // C2: チュートリアルスキップ
  if (tutorialTimer > 0) { tutorialTimer = 0; return; }
  // C3: ミュートボタン判定（ヒット半径拡大: 18→30）
  const maxLives = STAGE_CFG[stage].lives || MAX_LIVES;
  const muteX = W - 18 - maxLives * 22 - 22;
  if (pos.y < 42 && Math.abs(pos.x - muteX) < 30) {
    AudioSystem.toggleMute();
    return;
  }
  // 泡をPOP
  for (const b of bubbles) {
    if (b.popped) continue;
    if (dist2(b.x, b.y, pos.x, pos.y) < (b.radius + 8) ** 2) { popBubble(b); return; }
  }
  // 梯子アイテムを設置（地面付近でクリック）
  for (const it of items) {
    if (it.collected || it.type !== 'ladder' || !it.landed) continue;
    if (dist2(it.x, it.y, pos.x, pos.y) < 30 * 30) {
      it.collected = true;
      placeLadder(it.x);
      return;
    }
  }
}

canvas.addEventListener('mousedown', e => {
  const pos = getCanvasPos(e);
  mouseDownPos = { ...pos };
  hasDragged = false;
  if (state !== 'play') return;
  // 小人の近くなら線引きモード
  activeGnomeIdx = -1;
  for (let i = 0; i < gnomes.length; i++) {
    if (dist2(gnomes[i].x, gnomes[i].y, pos.x, pos.y) < 45 * 45) {
      activeGnomeIdx = i;
      isDrawing = true;
      drawnPath = [pos];
      break;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const pos = getCanvasPos(e);
  if (mouseDownPos) {
    if (dist2(pos.x, pos.y, mouseDownPos.x, mouseDownPos.y) > DRAG_THRESHOLD * DRAG_THRESHOLD)
      hasDragged = true;
  }
  if (isDrawing && activeGnomeIdx >= 0) {
    const last = drawnPath[drawnPath.length - 1];
    if (dist2(pos.x, pos.y, last.x, last.y) > 64) drawnPath.push(pos);
  }
});

canvas.addEventListener('mouseup', e => {
  const pos = getCanvasPos(e);
  if (isDrawing && activeGnomeIdx >= 0 && drawnPath.length > 2) {
    gnomes[activeGnomeIdx].waypoints = [...drawnPath];
    gnomes[activeGnomeIdx].rawPath  = [...drawnPath];
    gnomes[activeGnomeIdx].waypointTimer = 0;
  }
  isDrawing = false;
  drawnPath = [];
  activeGnomeIdx = -1;
  if (!hasDragged) {
    if (!handleStateClick(pos) && state === 'play') handlePlayClick(pos);
  } else {
    if (state !== 'play') handleStateClick(pos);
  }
  mouseDownPos = null;
});

// タッチイベントをマウスイベントへ変換
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true, clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { bubbles: true, cancelable: true, clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  canvas.dispatchEvent(new MouseEvent('mouseup', { bubbles: true, cancelable: true, clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Enter') {
    if (state === 'title')    { initGame(); state = 'play'; }
    else if (state === 'gameover') { initGame(); state = 'play'; }
    else if (state === 'clear')    { state = 'title'; }
    else if (state === 'pause')    { state = 'play'; }
  }
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
    if (state === 'play')  state = 'pause';
    else if (state === 'pause') state = 'play';
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// === ゲーム管理 ===
function initStage() {
  // E3: エンドレス用に cfg を動的生成
  const cfg = stage < STAGE_CFG.length ? STAGE_CFG[stage] : (() => {
    const base = STAGE_CFG[STAGE_CFG.length - 1];
    const ex = stage - STAGE_CFG.length + 1;
    return { ...base,
      bubbleRate:  Math.max(25, base.bubbleRate - ex * 3),
      bubbleSpeed: Math.min(4.0, base.bubbleSpeed + ex * 0.15),
      target:      base.target + ex * 15,
      maxBubbles:  Math.min(12, base.maxBubbles + Math.floor(ex / 2)),
      bgColor:     ['#1e0010','#2a0010'],
    };
  })();
  // D4: 背景色遷移
  const prevStage = Math.max(0, stage - 1);
  prevBgColor = (prevStage < STAGE_CFG.length ? STAGE_CFG[prevStage] : { bgColor: ['#1e0010','#2a0010'] }).bgColor;
  bgTransProgress = 0;
  bubbles = []; items = []; ladders = [];
  _pPool.forEach(p => p.active = false); particles = []; rings = []; drawnPath = [];
  bubbleTimer = 0;
  gnomes = [];
  floatingBlocks = []; crows = []; lightnings = []; lightningTimer = 0;
  // Phase 2: ステージ開始時にlivesをリセット（Stage 8〜10はlives:2）
  lives = cfg.lives || MAX_LIVES;
  // Phase 6: コンボ・タイム計測リセット
  comboCount = 0; comboTimer = 0;
  stageStartTime = Date.now();
  bonusPopups = [];
  for (let i = 0; i < cfg.gnomes; i++) {
    gnomes.push(makeGnome(80 + i * Math.floor((W - 160) / Math.max(1, cfg.gnomes - 1))));
  }

  // 浮遊ブロックを生成（1～5個、ステージが進むほど増加）
  const blockCount = Math.min(5, stage + 1);
  for (let i = 0; i < blockCount; i++) {
    const bw = 40 + Math.floor(Math.random() * 36);
    const bx = 20 + Math.floor(Math.random() * (W - bw - 40));
    const by = 130 + Math.floor(Math.random() * 210);
    floatingBlocks.push(makeBlock(bx, by, bw));
  }

  // カラスを生成（ステージ3以降: 1〜3羽）
  if (stage >= 2) {
    const crowCount = Math.min(3, Math.floor((stage - 1) / 2) + 1);
    for (let i = 0; i < crowCount; i++) crows.push(makeCrow());
  }

  // 初期泡を2個スポーン
  bubbles.push(makeBubble());
  bubbles.push(makeBubble());
  bubbles[0].y = H * 0.6;
  bubbles[1].y = H * 0.45;
  updateHUD();
}

function initGame() {
  stage = 0; score = 0; itemsCollected = 0; isEndless = false;
  lives = MAX_LIVES;
  comboCount = 0; comboTimer = 0;
  bonusPopups = [];
  initStage();
  // C2: 初回チュートリアル
  if (!localStorage.getItem('brc_tutorial')) {
    tutorialTimer = TUTORIAL_DURATION;
    localStorage.setItem('brc_tutorial', '1');
  }
}

// === メインループ ===
function update() {
  frameCount++;
  if (tutorialTimer > 0) tutorialTimer--;
  if (bgTransProgress < 1) bgTransProgress = Math.min(1, bgTransProgress + 1 / 60);
  if (state !== 'play') return;
  const cfg = STAGE_CFG[stage];

  // 泡スポーン
  bubbleTimer++;
  if (bubbleTimer >= cfg.bubbleRate && bubbles.filter(b => !b.popped).length < cfg.maxBubbles) {
    bubbles.push(makeBubble());
    bubbleTimer = 0;
  }

  // 泡更新・削除
  for (let i = bubbles.length - 1; i >= 0; i--) {
    updateBubble(bubbles[i]);
    const b = bubbles[i];
    if (b.x < -b.radius - 20 && !b.popped) {
      // Phase 2: スコア減算→ライフ減少に変更（ただし危険アイテムは見逃しOK）
      if (!HAZARD_TYPES.has(b.contents)) {
        lives--;
        playSE('miss'); // Phase 3: miss SE
        if (lives <= 0) {
          AudioSystem.stopBGM();
          playSE('gameover');
          HiScore.save();
          state = 'gameover';
        }
      }
      bubbles.splice(i, 1);
    } else if (b.popped && b.alpha <= 0) bubbles.splice(i, 1);
  }

  // アイテム更新
  for (const it of items) updateItem(it);

  // Phase 6: コンボタイマー更新
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) comboCount = 0;
  }

  // カラス更新
  for (let i = crows.length - 1; i >= 0; i--) updateCrow(crows[i]);

  // 雷更新・スポーン（ステージ5以降）
  lightnings = lightnings.filter(lt => lt.phase !== 'done');
  for (const lt of lightnings) updateLightning(lt);
  if (stage >= 4) {
    lightningTimer++;
    const interval = Math.max(180, 520 - stage * 28);
    if (lightningTimer >= interval) {
      lightningTimer = 0;
      lightnings.push(makeLightning(44 + Math.random() * (W - 88)));
    }
  }

  // 小人更新（逆順でsplice時のスキップを防止）
  for (let i = gnomes.length - 1; i >= 0; i--) {
    if (!gnomes[i]) continue;
    updateGnomeAI(gnomes[i], i);
    updateGnomePhysics(gnomes[i]);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  if (state === 'title')    { drawTitle();    return; }
  if (state === 'gameover') { drawGameOver(); return; }
  if (state === 'clear')    { drawClear();    return; }

  // 画面シェイク
  let shakeX = 0, shakeY = 0;
  if (shakeFrames > 0) {
    shakeX = (Math.random() - 0.5) * shakeAmt * 2;
    shakeY = (Math.random() - 0.5) * shakeAmt * 2;
    shakeFrames--;
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();
  drawGround();
  drawFloatingBlocks();
  ladders.forEach(drawLadder);
  bubbles.forEach(drawBubble);
  items.forEach(drawItem);
  gnomes.forEach(drawGnome);
  crows.forEach(drawCrow);
  drawLightnings();
  drawParticles();
  drawRings();
  drawBonusPopups();
  drawPath();
  drawHUDBar();

  if (state === 'pause') drawPauseOverlay();
  if (state === 'play' && tutorialTimer > 0) drawTutorialOverlay();

  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

HiScore.load(); // Phase 5: ページロード時にハイスコアを読み込む
loop();
  </script>
