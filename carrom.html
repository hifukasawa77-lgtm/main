<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Carrom（キャロム） | hide portfolio</title>
  <meta name="description" content="南アジア発祥のフィンガービリヤード。物理シミュレーションでストライカーを弾き、キャロムメンをポケットへ。AI対戦3難易度。">
  <style>
    :root {
      --bg0: #05070d;
      --bg1: #0d1220;
      --panel: rgba(15,23,42,0.58);
      --line: rgba(148,163,184,0.24);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --cyan: #22d3ee;
      --purple: #a78bfa;
      --amber: #fbbf24;
      --good: #34d399;
      --danger: #fb7185;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      background:
        radial-gradient(900px 520px at 16% 0%, rgba(34,211,238,0.14), transparent 62%),
        radial-gradient(760px 520px at 92% 8%, rgba(167,139,250,0.13), transparent 58%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 72%);
    }

    /* ── ヘッダー ── */
    .site-header {
      width: min(1120px, calc(100% - 32px));
      padding: 16px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .back-link {
      color: rgba(226,232,240,0.9);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 13px;
      background: rgba(15,23,42,0.32);
      font-size: 0.84rem;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
      white-space: nowrap;
    }

    .back-link:hover {
      transform: translateY(-1px);
      border-color: rgba(34,211,238,0.42);
      background: rgba(15,23,42,0.48);
    }

    .site-title {
      color: var(--cyan);
      font-weight: 900;
      letter-spacing: 0.08em;
      font-size: 1.1rem;
    }

    .lang-btn {
      background: rgba(15,23,42,0.32);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      padding: 7px 13px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: border-color 0.14s ease;
    }

    .lang-btn:hover {
      border-color: rgba(34,211,238,0.42);
    }

    /* ── メインレイアウト ── */
    main {
      width: 100%;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 8px 0 40px;
    }

    .game-wrap {
      width: min(1120px, calc(100% - 32px));
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── キャンバスコンテナ ── */
    .canvas-container {
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius: var(--radius);
      padding: 12px;
    }

    canvas {
      display: block;
      width: min(600px, calc(100vw - 64px));
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── サイドパネル ── */
    .side-panel {
      width: min(260px, calc(100vw - 32px));
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* スコアブロック */
    .score-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.28);
    }

    .player-row { border-left: 3px solid var(--cyan); }
    .ai-row     { border-left: 3px solid var(--purple); }

    .score-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
    }

    .score-val {
      font-size: 1.4rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .player-row .score-val { color: var(--cyan); }
    .ai-row     .score-val { color: var(--purple); }

    /* 難易度ブロック */
    .diff-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .diff-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .diff-btns {
      display: flex;
      gap: 6px;
    }

    .diff-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(2,6,23,0.28);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.14s ease;
    }

    .diff-btn:hover {
      border-color: rgba(34,211,238,0.42);
      color: var(--text);
    }

    .diff-btn.active {
      border-color: var(--cyan);
      background: rgba(34,211,238,0.14);
      color: var(--cyan);
    }

    /* 新ゲームボタン */
    .new-game-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(34,211,238,0.4);
      background: rgba(34,211,238,0.12);
      color: var(--cyan);
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.14s ease;
      letter-spacing: 0.04em;
    }

    .new-game-btn:hover {
      background: rgba(34,211,238,0.22);
      transform: translateY(-1px);
    }

    /* ハウツー */
    .howto {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .howto p {
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.55;
      padding-left: 10px;
      border-left: 2px solid rgba(148,163,184,0.2);
    }

    /* ── オーバーレイ ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 2.5rem;
      border: 1px solid var(--line);
      text-align: center;
      max-width: 420px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .overlay-box h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: var(--cyan);
      letter-spacing: -0.02em;
    }

    .overlay-box h2 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: -0.02em;
    }

    .overlay-box p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .diff-select {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .diff-select label {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .diff-select .diff-btns {
      justify-content: center;
      gap: 10px;
    }

    .diff-select .diff-btn {
      flex: none;
      padding: 8px 18px;
      font-size: 0.84rem;
    }

    .start-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(34,211,238,0.5);
      background: rgba(34,211,238,0.16);
      color: var(--cyan);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.16s ease;
      letter-spacing: 0.04em;
    }

    .start-btn:hover {
      background: rgba(34,211,238,0.28);
      transform: translateY(-2px);
    }

    /* レスポンシブ */
    @media (max-width: 720px) {
      .side-panel { width: min(600px, calc(100vw - 32px)); }
      .game-wrap  { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="back-link" href="index.html">← portfolio</a>
    <span class="site-title">hide</span>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </header>

  <main>
    <div class="game-wrap">
      <div class="canvas-container">
        <canvas id="c" width="640" height="640"></canvas>
      </div>
      <aside class="side-panel">
        <div class="score-block">
          <div class="score-row player-row">
            <span class="score-label" id="lblPlayer">あなた</span>
            <span class="score-val" id="scorePlayer">0</span>
          </div>
          <div class="score-row ai-row">
            <span class="score-label" id="lblAI">AI</span>
            <span class="score-val" id="scoreAI">0</span>
          </div>
        </div>
        <div class="diff-block">
          <span class="diff-label" id="lblDiff">難易度</span>
          <div class="diff-btns">
            <button class="diff-btn" data-diff="easy"   id="dEasy"   onclick="setDiffSide('easy')">かんたん</button>
            <button class="diff-btn active" data-diff="normal" id="dNormal" onclick="setDiffSide('normal')">ふつう</button>
            <button class="diff-btn" data-diff="hard"   id="dHard"   onclick="setDiffSide('hard')">むずかしい</button>
          </div>
        </div>
        <button class="new-game-btn" id="newGameBtn" onclick="restartGame()">もう一度</button>
        <div class="howto">
          <p id="howto1">マウスでストライカーをドラッグ → 離して発射</p>
          <p id="howto2">ドラッグ距離 = パワー</p>
          <p id="howto3">白い駒を全部ポケットに入れると勝ち</p>
        </div>
      </aside>
    </div>
  </main>

  <!-- タイトルオーバーレイ -->
  <div id="overlay" class="overlay">
    <div class="overlay-box">
      <h1 id="ovTitle">Carrom キャロム</h1>
      <p id="ovSubtitle">ストライカーを弾いてキャロムメンをポケットへ</p>
      <div class="diff-select">
        <label id="ovDiffLabel">難易度 / Difficulty</label>
        <div class="diff-btns">
          <button class="diff-btn" data-diff="easy"   onclick="setDiff('easy')"  id="ovEasy">かんたん</button>
          <button class="diff-btn active" data-diff="normal" onclick="setDiff('normal')" id="ovNormal">ふつう</button>
          <button class="diff-btn" data-diff="hard"   onclick="setDiff('hard')"  id="ovHard">むずかしい</button>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="startGame()">ゲームスタート</button>
    </div>
  </div>

  <!-- 結果オーバーレイ -->
  <div id="resultOverlay" class="overlay hidden">
    <div class="overlay-box">
      <h2 id="resultTitle"></h2>
      <p  id="resultScore"></p>
      <button class="start-btn" id="resultBtn" onclick="restartOverlay()">もう一度</button>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────
    //  定数
    // ─────────────────────────────────────────────
    const FRICTION     = 0.988;
    const MIN_SPEED    = 0.15;
    const RESTITUTION  = 0.82;
    const SUBSTEPS     = 4;
    const BOARD_OFFSET = 64;
    const BOARD_SIZE   = 512;
    const R_MAN        = 13;
    const R_QUEEN      = 13;
    const R_STRIKER    = 19;
    const POCKET_R     = 28;
    const POCKET_POS   = [
      {x: 64,  y: 64 },
      {x: 576, y: 64 },
      {x: 64,  y: 576},
      {x: 576, y: 576}
    ];
    const CENTER     = {x: 320, y: 320};
    const BASELINE_Y = 540;
    const AI_Y       = 100;

    // ─────────────────────────────────────────────
    //  国際化
    // ─────────────────────────────────────────────
    let lang = 'ja';
    const i18n = {
      ja: {
        title:       'Carrom キャロム',
        subtitle:    'ストライカーを弾いてキャロムメンをポケットへ',
        playerScore: 'あなた',
        aiScore:     'AI',
        difficulty:  '難易度',
        easy:        'かんたん',
        normal:      'ふつう',
        hard:        'むずかしい',
        start:       'ゲームスタート',
        restart:     'もう一度',
        youWin:      'あなたの勝ち！',
        aiWin:       'AIの勝ち',
        draw:        '引き分け',
        howto1:      'マウスでストライカーをドラッグ → 離して発射',
        howto2:      'ドラッグ距離 = パワー',
        howto3:      '白い駒を全部ポケットに入れると勝ち',
        score:       'スコア'
      },
      en: {
        title:       'Carrom',
        subtitle:    'Flick the striker to pocket carrom men',
        playerScore: 'You',
        aiScore:     'AI',
        difficulty:  'Difficulty',
        easy:        'Easy',
        normal:      'Normal',
        hard:        'Hard',
        start:       'Start Game',
        restart:     'Play Again',
        youWin:      'You Win!',
        aiWin:       'AI Wins',
        draw:        'Draw',
        howto1:      'Drag striker to aim → release to shoot',
        howto2:      'Drag distance = power',
        howto3:      'Pocket all your pieces to win',
        score:       'Score'
      }
    };

    function t(key) { return i18n[lang][key] || key; }

    function toggleLang() {
      lang = lang === 'ja' ? 'en' : 'ja';
      document.getElementById('langBtn').textContent = lang === 'ja' ? 'EN' : 'JA';
      applyLang();
    }

    function applyLang() {
      document.getElementById('lblPlayer').textContent = t('playerScore');
      document.getElementById('lblAI').textContent     = t('aiScore');
      document.getElementById('lblDiff').textContent   = t('difficulty');
      document.getElementById('dEasy').textContent     = t('easy');
      document.getElementById('dNormal').textContent   = t('normal');
      document.getElementById('dHard').textContent     = t('hard');
      document.getElementById('newGameBtn').textContent = t('restart');
      document.getElementById('howto1').textContent    = t('howto1');
      document.getElementById('howto2').textContent    = t('howto2');
      document.getElementById('howto3').textContent    = t('howto3');
      document.getElementById('ovTitle').textContent   = t('title');
      document.getElementById('ovSubtitle').textContent = t('subtitle');
      document.getElementById('ovEasy').textContent    = t('easy');
      document.getElementById('ovNormal').textContent  = t('normal');
      document.getElementById('ovHard').textContent    = t('hard');
      document.getElementById('startBtn').textContent  = t('start');
      document.getElementById('resultBtn').textContent = t('restart');
      document.documentElement.lang = lang;
    }

    // ─────────────────────────────────────────────
    //  ゲーム状態
    // ─────────────────────────────────────────────
    let state = {
      pieces:        [],
      turn:          'player',
      phase:         'aim',
      scores:        {player: 0, ai: 0},
      queenPocketed: false,
      queenOwner:    null,
      difficulty:    'normal',
      gameOver:      false,
      winner:        null,
      needCover:     false,
      coverOwner:    null
    };

    // ─────────────────────────────────────────────
    //  initGame — ピース初期配置
    // ─────────────────────────────────────────────
    function initGame() {
      state.pieces        = [];
      state.turn          = 'player';
      state.phase         = 'aim';
      state.scores        = {player: 0, ai: 0};
      state.queenPocketed = false;
      state.queenOwner    = null;
      state.gameOver      = false;
      state.winner        = null;
      state.needCover     = false;
      state.coverOwner    = null;

      const CX = 320, CY = 320;

      // 外周リング（r=52, 12枚）
      const outerR = 52, outerN = 12;
      for (let i = 0; i < outerN; i++) {
        const angle = (i / outerN) * Math.PI * 2;
        state.pieces.push({
          x: CX + Math.cos(angle) * outerR,
          y: CY + Math.sin(angle) * outerR,
          vx: 0, vy: 0, r: R_MAN,
          type:   i % 2 === 0 ? 'white' : 'black',
          owner:  i % 2 === 0 ? 'player' : 'ai',
          pocketed: false, newlyPocketed: false
        });
      }

      // 内周リング（r=26, 6枚）
      const innerR = 26, innerN = 6;
      for (let i = 0; i < innerN; i++) {
        const angle = (i / innerN) * Math.PI * 2;
        state.pieces.push({
          x: CX + Math.cos(angle) * innerR,
          y: CY + Math.sin(angle) * innerR,
          vx: 0, vy: 0, r: R_MAN,
          type:  i % 2 === 0 ? 'white' : 'black',
          owner: i % 2 === 0 ? 'player' : 'ai',
          pocketed: false, newlyPocketed: false
        });
      }

      // クイーン（中央）
      state.pieces.push({
        x: CX, y: CY, vx: 0, vy: 0, r: R_QUEEN,
        type: 'queen', owner: null,
        pocketed: false, newlyPocketed: false
      });

      // プレイヤーストライカー
      state.pieces.push({
        x: CX, y: BASELINE_Y, vx: 0, vy: 0, r: R_STRIKER,
        type: 'striker', owner: 'player',
        pocketed: false, newlyPocketed: false
      });

      updateScoreUI();
    }

    // ─────────────────────────────────────────────
    //  物理エンジン
    // ─────────────────────────────────────────────
    function update() {
      if (state.phase !== 'rolling') return;

      for (let s = 0; s < SUBSTEPS; s++) {
        // 位置更新
        for (const p of state.pieces) {
          if (p.pocketed) continue;
          p.x += p.vx / SUBSTEPS;
          p.y += p.vy / SUBSTEPS;
        }
        // 壁バウンド
        for (const p of state.pieces) {
          if (p.pocketed) continue;
          wallBounce(p);
        }
        // ピース間衝突
        for (let i = 0; i < state.pieces.length; i++) {
          for (let j = i + 1; j < state.pieces.length; j++) {
            const a = state.pieces[i], b = state.pieces[j];
            if (a.pocketed || b.pocketed) continue;
            resolveCollision(a, b);
          }
        }
        // ポケット判定
        for (const p of state.pieces) {
          if (!p.pocketed) checkPocket(p);
        }
      }

      // 摩擦適用
      for (const p of state.pieces) {
        if (p.pocketed) continue;
        p.vx *= FRICTION;
        p.vy *= FRICTION;
        const spd = Math.hypot(p.vx, p.vy);
        if (spd < MIN_SPEED) { p.vx = 0; p.vy = 0; }
      }

      // 全停止チェック
      const allStopped = state.pieces.every(p => p.pocketed || (p.vx === 0 && p.vy === 0));
      if (allStopped) {
        state.phase = 'result';
        processResult();
      }
    }

    function wallBounce(p) {
      const lo = BOARD_OFFSET + p.r;
      const hi = BOARD_OFFSET + BOARD_SIZE - p.r;
      if (p.x < lo) { p.x = lo; p.vx =  Math.abs(p.vx) * RESTITUTION; }
      if (p.x > hi) { p.x = hi; p.vx = -Math.abs(p.vx) * RESTITUTION; }
      if (p.y < lo) { p.y = lo; p.vy =  Math.abs(p.vy) * RESTITUTION; }
      if (p.y > hi) { p.y = hi; p.vy = -Math.abs(p.vy) * RESTITUTION; }
    }

    function resolveCollision(a, b) {
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minD = a.r + b.r;
      if (dist >= minD || dist === 0) return;

      const nx = dx / dist, ny = dy / dist;
      const overlap = (minD - dist) / 2;
      a.x -= nx * overlap; a.y -= ny * overlap;
      b.x += nx * overlap; b.y += ny * overlap;

      const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
      const dot = dvx * nx + dvy * ny;
      if (dot >= 0) return;

      const impulse = -(1 + RESTITUTION) * dot / 2;
      a.vx += impulse * nx; a.vy += impulse * ny;
      b.vx -= impulse * nx; b.vy -= impulse * ny;
    }

    function checkPocket(p) {
      for (const pocket of POCKET_POS) {
        if (Math.hypot(p.x - pocket.x, p.y - pocket.y) < POCKET_R) {
          p.pocketed      = true;
          p.newlyPocketed = true;
          p.vx = 0; p.vy = 0;
          SoundFX.pocket();
          return;
        }
      }
    }

    // ─────────────────────────────────────────────
    //  ターン処理
    // ─────────────────────────────────────────────
    function processResult() {
      const striker = state.pieces.find(p => p.type === 'striker');
      const newly   = state.pieces.filter(p => p.newlyPocketed);

      // newlyPocketedフラグをリセット
      state.pieces.forEach(p => { p.newlyPocketed = false; });

      // ストライカーがポケットに落ちた → ファウル
      if (striker.pocketed) {
        striker.pocketed = false;
        striker.x  = 320;
        striker.y  = BASELINE_Y;
        striker.vx = 0; striker.vy = 0;
        const opp = state.turn === 'player' ? 'ai' : 'player';
        state.scores[opp]++;
        updateScoreUI();
        switchTurn();
        return;
      }

      const queen  = newly.find(p => p.type === 'queen');
      const myMen  = newly.filter(p => p.type !== 'queen' && p.type !== 'striker' && p.owner === state.turn);
      const anyMen = newly.filter(p => p.type !== 'queen' && p.type !== 'striker');

      if (queen) {
        if (myMen.length > 0) {
          // クイーン + 自駒 → クイーン確定（5点）
          state.scores[state.turn] += 5 + myMen.length;
          state.queenOwner = state.turn;
        } else {
          // クイーンのみ → ボード中央へ戻す
          queen.pocketed = false;
          queen.x = 320; queen.y = 320; queen.vx = 0; queen.vy = 0;
          state.scores[state.turn] += anyMen.filter(p => p.owner === state.turn).length;
        }
      } else {
        state.scores[state.turn] += myMen.length;
      }

      updateScoreUI();

      // 終了判定（ストライカー以外が全て落ちた）
      const remaining = state.pieces.filter(p => p.type !== 'striker' && !p.pocketed);
      if (remaining.length === 0) {
        endGame();
        return;
      }

      // ターン継続 or 交代
      if (myMen.length > 0 || (queen && myMen.length > 0)) {
        startAimPhase();  // 自駒を入れた → 同ターン継続
      } else {
        switchTurn();
      }
    }

    function switchTurn() {
      state.turn = state.turn === 'player' ? 'ai' : 'player';
      startAimPhase();
    }

    function startAimPhase() {
      const striker = state.pieces.find(p => p.type === 'striker');
      if (state.turn === 'player') {
        striker.x = 320; striker.y = BASELINE_Y;
      } else {
        striker.x = 320; striker.y = AI_Y;
      }
      striker.vx = 0; striker.vy = 0; striker.pocketed = false;
      state.phase = 'aim';

      if (state.turn === 'ai') {
        setTimeout(() => { AI.executeTurn(); }, 900);
      }
    }

    function endGame() {
      state.gameOver = true;
      if (state.scores.player > state.scores.ai) {
        state.winner = 'player';
      } else if (state.scores.ai > state.scores.player) {
        state.winner = 'ai';
      } else {
        state.winner = 'draw';
      }
      showResultOverlay();
    }

    function showResultOverlay() {
      const overlay = document.getElementById('resultOverlay');
      const titleEl = document.getElementById('resultTitle');
      const scoreEl = document.getElementById('resultScore');

      if (state.winner === 'player') {
        titleEl.textContent = t('youWin');
        titleEl.style.color = 'var(--cyan)';
      } else if (state.winner === 'ai') {
        titleEl.textContent = t('aiWin');
        titleEl.style.color = 'var(--purple)';
      } else {
        titleEl.textContent = t('draw');
        titleEl.style.color = 'var(--amber)';
      }
      scoreEl.textContent = t('playerScore') + ' ' + state.scores.player + ' — ' + state.scores.ai + ' ' + t('aiScore');
      overlay.classList.remove('hidden');
    }

    // ─────────────────────────────────────────────
    //  AIロジック
    // ─────────────────────────────────────────────
    const AI = {
      executeTurn() {
        const shot = this.calcShot();
        const striker = state.pieces.find(p => p.type === 'striker');
        striker.vx = Math.cos(shot.angle) * shot.power;
        striker.vy = Math.sin(shot.angle) * shot.power;
        state.phase = 'rolling';
        SoundFX.flick();
      },
      calcShot() {
        const targets = state.pieces.filter(p =>
          p.owner === 'ai' && !p.pocketed && p.type !== 'striker'
        );
        if (targets.length === 0) {
          return { angle: Math.random() * Math.PI * 2, power: 8 };
        }

        const striker     = state.pieces.find(p => p.type === 'striker');
        const noiseMap    = { easy: 0.35, normal: 0.15, hard: 0.04 };
        const powerMap    = { easy: 0.5,  normal: 0.75, hard: 1.0 };
        const noise       = noiseMap[state.difficulty];
        const powerFactor = powerMap[state.difficulty];

        // 最近傍ターゲットを選択
        let best = null, bestDist = Infinity;
        for (const target of targets) {
          const dist = Math.hypot(target.x - striker.x, target.y - striker.y);
          if (dist < bestDist) { bestDist = dist; best = target; }
        }

        const angle = Math.atan2(best.y - striker.y, best.x - striker.x)
                    + (Math.random() - 0.5) * noise * 2;
        const power = Math.min(Math.max(bestDist * 0.04 * powerFactor, 4), 18);
        return { angle, power };
      }
    };

    // ─────────────────────────────────────────────
    //  入力処理
    // ─────────────────────────────────────────────
    const canvas    = document.getElementById('c');
    const ctx       = canvas.getContext('2d');
    let aimAngle    = -Math.PI / 2;
    let aimPower    = 0;
    let isDragging  = false;
    let dragStart   = {x: 0, y: 0};
    let mousePos    = {x: 320, y: 320};

    function getCanvasPos(e) {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top)  * scaleY
      };
    }

    function onMove(e) {
      e.preventDefault();
      const pos = getCanvasPos(e);
      mousePos = pos;

      if (state.phase !== 'aim' || state.turn !== 'player') return;
      const striker = state.pieces.find(p => p.type === 'striker');
      const xMin = BOARD_OFFSET + R_STRIKER * 2;
      const xMax = BOARD_OFFSET + BOARD_SIZE - R_STRIKER * 2;
      striker.x = Math.max(xMin, Math.min(xMax, pos.x));

      if (isDragging) {
        const dx = dragStart.x - pos.x;
        const dy = dragStart.y - pos.y;
        aimAngle = Math.atan2(dy, dx);
        aimPower = Math.min(Math.hypot(dx, dy) / 8, 18);
      }
    }

    function onDown(e) {
      e.preventDefault();
      if (state.phase !== 'aim' || state.turn !== 'player') return;
      dragStart  = getCanvasPos(e);
      isDragging = true;
    }

    function onUp(e) {
      e.preventDefault();
      if (!isDragging) return;
      isDragging = false;
      if (state.phase !== 'aim' || state.turn !== 'player') return;
      if (aimPower < 1) return;
      const striker = state.pieces.find(p => p.type === 'striker');
      striker.vx = Math.cos(aimAngle) * aimPower;
      striker.vy = Math.sin(aimAngle) * aimPower;
      state.phase = 'rolling';
      SoundFX.flick();
      aimPower = 0;
    }

    canvas.addEventListener('mousemove',  onMove,  { passive: false });
    canvas.addEventListener('mousedown',  onDown,  { passive: false });
    canvas.addEventListener('mouseup',    onUp,    { passive: false });
    canvas.addEventListener('touchmove',  onMove,  { passive: false });
    canvas.addEventListener('touchstart', onDown,  { passive: false });
    canvas.addEventListener('touchend',   onUp,    { passive: false });

    // ─────────────────────────────────────────────
    //  描画処理
    // ─────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      drawPieces();
      if (state.phase === 'aim' && state.turn === 'player' && isDragging) {
        drawAimGuide();
      }
      drawHUD();
    }

    function drawBoard() {
      // 外枠（木製フレーム）
      ctx.fillStyle = '#5c3d0a';
      ctx.fillRect(0, 0, 640, 640);

      // ボード面グラデーション
      const grad = ctx.createLinearGradient(64, 64, 576, 576);
      grad.addColorStop(0,   '#d4a843');
      grad.addColorStop(0.5, '#c8a45a');
      grad.addColorStop(1,   '#b8860b');
      ctx.fillStyle = grad;
      ctx.fillRect(BOARD_OFFSET, BOARD_OFFSET, BOARD_SIZE, BOARD_SIZE);

      // 内枠線
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth   = 3;
      ctx.strokeRect(BOARD_OFFSET + 8, BOARD_OFFSET + 8, BOARD_SIZE - 16, BOARD_SIZE - 16);

      // 対角線
      ctx.beginPath();
      ctx.moveTo(BOARD_OFFSET + 16, BOARD_OFFSET + 16);
      ctx.lineTo(BOARD_OFFSET + BOARD_SIZE - 16, BOARD_OFFSET + BOARD_SIZE - 16);
      ctx.moveTo(BOARD_OFFSET + BOARD_SIZE - 16, BOARD_OFFSET + 16);
      ctx.lineTo(BOARD_OFFSET + 16, BOARD_OFFSET + BOARD_SIZE - 16);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      // センターサークル（外）
      ctx.beginPath();
      ctx.arc(320, 320, 64, 0, Math.PI * 2);
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // センターサークル（内）
      ctx.beginPath();
      ctx.arc(320, 320, 22, 0, Math.PI * 2);
      ctx.stroke();

      // ベースライン（プレイヤー側: 下、シアン）
      ctx.beginPath();
      ctx.moveTo(BOARD_OFFSET + 40, BASELINE_Y);
      ctx.lineTo(BOARD_OFFSET + BOARD_SIZE - 40, BASELINE_Y);
      ctx.strokeStyle = 'rgba(34,211,238,0.5)';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // ベースライン（AI側: 上、パープル）
      ctx.beginPath();
      ctx.moveTo(BOARD_OFFSET + 40, AI_Y);
      ctx.lineTo(BOARD_OFFSET + BOARD_SIZE - 40, AI_Y);
      ctx.strokeStyle = 'rgba(167,139,250,0.5)';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // ポケット4隅
      for (const pocket of POCKET_POS) {
        ctx.beginPath();
        ctx.arc(pocket.x, pocket.y, POCKET_R, 0, Math.PI * 2);
        ctx.fillStyle = '#0a0a0a';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(pocket.x, pocket.y, POCKET_R - 4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(34,211,238,0.15)';
        ctx.lineWidth   = 2;
        ctx.stroke();
      }
    }

    function drawPieces() {
      for (const p of state.pieces) {
        if (p.pocketed) continue;
        ctx.save();
        ctx.translate(p.x, p.y);

        if (p.type === 'white') {
          ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fillStyle = '#f0ead6'; ctx.fill();
          ctx.strokeStyle = '#8b6914'; ctx.lineWidth = 2; ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, p.r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(139,105,20,0.4)'; ctx.fill();

        } else if (p.type === 'black') {
          ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fillStyle = '#1a1a2e'; ctx.fill();
          ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.stroke();
          ctx.beginPath(); ctx.arc(0, 0, p.r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(100,100,150,0.4)'; ctx.fill();

        } else if (p.type === 'queen') {
          ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fillStyle = '#e53e3e'; ctx.fill();
          ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2.5; ctx.stroke();
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 12px serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('Q', 0, 1);

        } else if (p.type === 'striker') {
          ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          const sg = ctx.createRadialGradient(0, -4, 2, 0, 0, p.r);
          sg.addColorStop(0, 'rgba(100,240,255,0.95)');
          sg.addColorStop(1, 'rgba(34,211,238,0.7)');
          ctx.fillStyle = sg; ctx.fill();
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
        }

        ctx.restore();
      }
    }

    function drawAimGuide() {
      const striker = state.pieces.find(p => p.type === 'striker');
      const len     = aimPower * 8;
      ctx.save();
      ctx.translate(striker.x, striker.y);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(aimAngle) * len, Math.sin(aimAngle) * len);
      ctx.strokeStyle = 'rgba(34,211,238,0.7)';
      ctx.lineWidth   = 2;
      ctx.setLineDash([8, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
      // 矢先
      ctx.beginPath();
      ctx.arc(Math.cos(aimAngle) * len, Math.sin(aimAngle) * len, 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(34,211,238,0.9)';
      ctx.fill();
      ctx.restore();
    }

    function drawHUD() {
      const label = state.turn === 'player'
        ? (lang === 'ja' ? 'あなたのターン' : 'Your Turn')
        : (lang === 'ja' ? 'AIのターン'   : 'AI Turn');
      const color = state.turn === 'player' ? '#22d3ee' : '#a78bfa';

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(BOARD_OFFSET, BOARD_OFFSET, 180, 32);
      ctx.fillStyle = color;
      ctx.font      = 'bold 15px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, BOARD_OFFSET + 10, BOARD_OFFSET + 16);
    }

    // ─────────────────────────────────────────────
    //  効果音
    // ─────────────────────────────────────────────
    const SoundFX = (() => {
      let actx;
      function getCtx() {
        if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
        return actx;
      }
      function beep(freq, type, dur, vol = 0.15) {
        try {
          const ac   = getCtx();
          const osc  = ac.createOscillator();
          const gain = ac.createGain();
          osc.connect(gain); gain.connect(ac.destination);
          osc.type = type; osc.frequency.value = freq;
          gain.gain.setValueAtTime(vol, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
          osc.start(); osc.stop(ac.currentTime + dur);
        } catch (_) {}
      }
      return {
        flick:   () => beep(260, 'triangle', 0.07),
        collide: () => beep(380, 'sine',     0.05),
        pocket:  () => beep(180, 'sine',     0.18, 0.2)
      };
    })();

    // ─────────────────────────────────────────────
    //  ゲームループ
    // ─────────────────────────────────────────────
    let animId = null;

    function gameLoop() {
      update();
      draw();
      animId = requestAnimationFrame(gameLoop);
    }

    function stopLoop() {
      if (animId !== null) { cancelAnimationFrame(animId); animId = null; }
    }

    // ─────────────────────────────────────────────
    //  UI操作
    // ─────────────────────────────────────────────
    function updateScoreUI() {
      document.getElementById('scorePlayer').textContent = state.scores.player;
      document.getElementById('scoreAI').textContent     = state.scores.ai;
    }

    function setDiff(val) {
      state.difficulty = val;
      // オーバーレイ内のボタン更新
      ['ovEasy','ovNormal','ovHard'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      const map = { easy:'ovEasy', normal:'ovNormal', hard:'ovHard' };
      document.getElementById(map[val]).classList.add('active');
      // サイドパネルも更新
      ['dEasy','dNormal','dHard'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      const map2 = { easy:'dEasy', normal:'dNormal', hard:'dHard' };
      document.getElementById(map2[val]).classList.add('active');
    }

    function setDiffSide(val) {
      setDiff(val);
    }

    function startGame() {
      document.getElementById('overlay').classList.add('hidden');
      stopLoop();
      initGame();
      gameLoop();
    }

    function restartGame() {
      document.getElementById('resultOverlay').classList.add('hidden');
      stopLoop();
      initGame();
      gameLoop();
    }

    function restartOverlay() {
      document.getElementById('resultOverlay').classList.add('hidden');
      stopLoop();
      initGame();
      gameLoop();
    }

    // 初期表示
    applyLang();
  </script>
</body>
</html>
