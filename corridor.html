<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コリドール | Corridor Strategy</title>
<meta name="description" content="9×9盤で相手より先に向こう側へ到達する戦略ボードゲーム。壁を置いて進路を読み合うCPU対戦です。">
<style>
  :root {
    --bg: #f4efe5;
    --panel: rgba(255, 252, 244, 0.92);
    --ink: #263028;
    --muted: #6f756d;
    --line: #d4c4aa;
    --board: #6b4428;
    --cell: #d89f5a;
    --blue: #2563eb;
    --red: #dc2626;
    --accent: #7c8f58;
    --shadow: 0 18px 48px rgba(72, 52, 30, 0.18);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 10%, rgba(124, 143, 88, 0.18), transparent 30%),
      radial-gradient(circle at 88% 20%, rgba(180, 100, 69, 0.12), transparent 26%),
      linear-gradient(145deg, #fff8eb 0%, var(--bg) 58%, #e8dcc9 100%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  header {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    color: var(--ink);
    font-weight: 900;
    text-decoration: none;
  }

  .back-link {
    color: #426f8f;
    border: 1px solid rgba(66, 111, 143, 0.32);
    border-radius: 999px;
    padding: 7px 13px;
    background: rgba(255, 255, 255, 0.5);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 800;
  }

  main {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 10px 0 34px;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 20px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 4.4rem);
    line-height: 0.95;
    letter-spacing: 0;
  }

  .subtitle {
    color: var(--muted);
    font-weight: 750;
    margin-top: 8px;
  }

  .status {
    min-width: min(100%, 380px);
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: var(--shadow);
    font-weight: 800;
  }

  .status small {
    display: block;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 700;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(320px, 720px) minmax(260px, 1fr);
    gap: 18px;
    align-items: start;
  }

  .board-wrap, .side {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .board-wrap { padding: 14px; }

  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    background: #6b4428;
    cursor: pointer;
  }

  .side {
    padding: 14px;
    display: grid;
    gap: 12px;
  }

  .panel {
    border: 1px solid rgba(120, 91, 50, 0.24);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.42);
    padding: 12px;
  }

  .panel h2 {
    font-size: 0.95rem;
    margin-bottom: 8px;
  }

  .score {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .badge {
    border-radius: 6px;
    padding: 10px;
    font-weight: 850;
    background: #fff6e6;
    border: 1px solid var(--line);
  }

  .badge span {
    display: block;
    font-size: 1.5rem;
    margin-top: 2px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  button {
    border: 0;
    border-radius: 6px;
    padding: 10px 12px;
    background: #263028;
    color: #fff;
    font-weight: 850;
    cursor: pointer;
  }

  button.secondary { background: #7c8f58; }
  button.ghost {
    color: var(--ink);
    background: #fff6e6;
    border: 1px solid var(--line);
  }

  .mode {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .mode button.active {
    background: #426f8f;
  }

  .log {
    min-height: 86px;
    color: var(--muted);
    line-height: 1.55;
    font-size: 0.92rem;
  }

  @media (max-width: 900px) {
    .top, .layout { grid-template-columns: 1fr; display: grid; }
    .status { min-width: 0; }
  }
</style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">hide portfolio</a>
    <a class="back-link" href="index.html#works">ゲーム一覧へ戻る</a>
  </header>

  <main>
    <section class="top">
      <div>
        <h1>コリドール</h1>
        <p class="subtitle">Corridor Strategy / 9×9 board, 10 walls, CPU battle</p>
      </div>
      <div class="status" id="status">
        あなたの番です
        <small>駒を動かすか、壁を置いて相手の進路を読む</small>
      </div>
    </section>

    <section class="layout">
      <div class="board-wrap">
        <canvas id="board" width="720" height="720" aria-label="コリドール盤面"></canvas>
      </div>

      <aside class="side">
        <div class="panel score">
          <div class="badge">あなたの壁<span id="playerWalls">10</span></div>
          <div class="badge">CPUの壁<span id="cpuWalls">10</span></div>
        </div>

        <div class="panel">
          <h2>操作</h2>
          <div class="mode">
            <button id="moveMode" class="active">駒を動かす</button>
            <button id="wallMode">壁を置く</button>
          </div>
        </div>

        <div class="panel">
          <h2>壁の向き</h2>
          <div class="controls">
            <button id="hWall" class="secondary">横向き</button>
            <button id="vWall" class="ghost">縦向き</button>
          </div>
        </div>

        <div class="panel">
          <h2>ゲーム</h2>
          <div class="controls">
            <button id="newGame">最初から</button>
            <button id="hint" class="ghost">候補を表示</button>
          </div>
        </div>

        <div class="panel log" id="log">
          青い駒を最下段まで進めると勝利。壁は相手の道を完全には塞げません。
        </div>
      </aside>
    </section>
  </main>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const playerWallsEl = document.getElementById('playerWalls');
  const cpuWallsEl = document.getElementById('cpuWalls');
  const moveModeBtn = document.getElementById('moveMode');
  const wallModeBtn = document.getElementById('wallMode');
  const hWallBtn = document.getElementById('hWall');
  const vWallBtn = document.getElementById('vWall');
  const newGameBtn = document.getElementById('newGame');
  const hintBtn = document.getElementById('hint');

  const N = 9;
  const margin = 56;
  const cell = 60;
  const gap = 12;
  const boardStart = margin;
  const boardSize = cell * N + gap * (N - 1);
  const players = {
    human: { r: 0, c: 4, goal: 8, walls: 10, color: '#2563eb' },
    cpu: { r: 8, c: 4, goal: 0, walls: 10, color: '#dc2626' }
  };
  let hWalls = new Set();
  let vWalls = new Set();
  let turn = 'human';
  let mode = 'move';
  let wallOrientation = 'h';
  let gameOver = false;
  let showHints = false;

  function key(r, c) { return `${r},${c}`; }
  function setStatus(text, sub = '') {
    statusEl.innerHTML = `${text}<small>${sub}</small>`;
  }
  function log(text) { logEl.textContent = text; }

  function reset() {
    players.human.r = 0; players.human.c = 4; players.human.walls = 10;
    players.cpu.r = 8; players.cpu.c = 4; players.cpu.walls = 10;
    hWalls = new Set();
    vWalls = new Set();
    turn = 'human';
    gameOver = false;
    showHints = false;
    updateHud();
    setStatus('あなたの番です', '駒を動かすか、壁を置いてください');
    log('青い駒を最下段まで進めると勝利。壁は相手の道を完全には塞げません。');
    draw();
  }

  function updateHud() {
    playerWallsEl.textContent = players.human.walls;
    cpuWallsEl.textContent = players.cpu.walls;
    moveModeBtn.classList.toggle('active', mode === 'move');
    wallModeBtn.classList.toggle('active', mode === 'wall');
    hWallBtn.className = wallOrientation === 'h' ? 'secondary' : 'ghost';
    vWallBtn.className = wallOrientation === 'v' ? 'secondary' : 'ghost';
  }

  function cellCenter(r, c) {
    return {
      x: boardStart + c * (cell + gap) + cell / 2,
      y: boardStart + r * (cell + gap) + cell / 2
    };
  }

  function blocksBetween(r1, c1, r2, c2) {
    if (r1 === r2) {
      const c = Math.min(c1, c2);
      return vWalls.has(key(r1, c)) || vWalls.has(key(r1 - 1, c));
    }
    if (c1 === c2) {
      const r = Math.min(r1, r2);
      return hWalls.has(key(r, c1)) || hWalls.has(key(r, c1 - 1));
    }
    return true;
  }

  function inBoard(r, c) {
    return r >= 0 && r < N && c >= 0 && c < N;
  }

  function basicNeighbors(pawn) {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    return dirs
      .map(([dr, dc]) => ({ r: pawn.r + dr, c: pawn.c + dc }))
      .filter(pos => inBoard(pos.r, pos.c) && !blocksBetween(pawn.r, pawn.c, pos.r, pos.c));
  }

  function legalMoves(who) {
    const pawn = players[who];
    const other = who === 'human' ? players.cpu : players.human;
    const result = [];
    for (const step of basicNeighbors(pawn)) {
      if (step.r !== other.r || step.c !== other.c) {
        result.push(step);
        continue;
      }
      const dr = other.r - pawn.r;
      const dc = other.c - pawn.c;
      const jump = { r: other.r + dr, c: other.c + dc };
      if (inBoard(jump.r, jump.c) && !blocksBetween(other.r, other.c, jump.r, jump.c)) {
        result.push(jump);
      } else {
        for (const side of [[dc, dr], [-dc, -dr]]) {
          const diag = { r: other.r + side[0], c: other.c + side[1] };
          if (inBoard(diag.r, diag.c) && !blocksBetween(other.r, other.c, diag.r, diag.c)) {
            result.push(diag);
          }
        }
      }
    }
    const unique = new Map(result.map(pos => [key(pos.r, pos.c), pos]));
    return [...unique.values()];
  }

  function hasPath(who) {
    const start = players[who];
    const goal = start.goal;
    const seen = new Set([key(start.r, start.c)]);
    const queue = [{ r: start.r, c: start.c }];
    while (queue.length) {
      const cur = queue.shift();
      if (cur.r === goal) return true;
      for (const next of basicNeighbors(cur)) {
        const k = key(next.r, next.c);
        if (!seen.has(k)) {
          seen.add(k);
          queue.push(next);
        }
      }
    }
    return false;
  }

  function shortestPath(who) {
    const start = players[who];
    const goal = start.goal;
    const seen = new Set([key(start.r, start.c)]);
    const queue = [{ r: start.r, c: start.c, d: 0 }];
    while (queue.length) {
      const cur = queue.shift();
      if (cur.r === goal) return cur.d;
      for (const next of basicNeighbors(cur)) {
        const k = key(next.r, next.c);
        if (!seen.has(k)) {
          seen.add(k);
          queue.push({ ...next, d: cur.d + 1 });
        }
      }
    }
    return 99;
  }

  function canPlaceWall(r, c, orientation) {
    if (r < 0 || c < 0 || r >= N - 1 || c >= N - 1) return false;
    const target = orientation === 'h' ? hWalls : vWalls;
    if (target.has(key(r, c))) return false;
    if (orientation === 'h' && vWalls.has(key(r, c))) return false;
    if (orientation === 'v' && hWalls.has(key(r, c))) return false;
    target.add(key(r, c));
    const ok = hasPath('human') && hasPath('cpu');
    target.delete(key(r, c));
    return ok;
  }

  function placeWall(r, c, orientation, who) {
    if (players[who].walls <= 0 || !canPlaceWall(r, c, orientation)) return false;
    (orientation === 'h' ? hWalls : vWalls).add(key(r, c));
    players[who].walls--;
    return true;
  }

  function movePawn(who, r, c) {
    const ok = legalMoves(who).some(pos => pos.r === r && pos.c === c);
    if (!ok) return false;
    players[who].r = r;
    players[who].c = c;
    if (players[who].r === players[who].goal) {
      gameOver = true;
      setStatus(who === 'human' ? 'あなたの勝ちです' : 'CPUの勝ちです', '最初からボタンで再戦できます');
      log(who === 'human' ? '見事な突破です。壁の圧力を読み切りました。' : 'CPUがゴールしました。もう一度挑戦しましょう。');
    }
    return true;
  }

  function endHumanTurn(message) {
    if (gameOver) { draw(); return; }
    turn = 'cpu';
    setStatus('CPU思考中...', message);
    updateHud();
    draw();
    setTimeout(cpuTurn, 420);
  }

  function cpuTurn() {
    if (gameOver) return;
    const beforeHuman = shortestPath('human');
    const beforeCpu = shortestPath('cpu');
    let placed = false;

    if (players.cpu.walls > 0 && beforeHuman <= beforeCpu + 1) {
      const candidates = [];
      for (let r = 0; r < N - 1; r++) {
        for (let c = 0; c < N - 1; c++) {
          for (const o of ['h', 'v']) {
            if (!canPlaceWall(r, c, o)) continue;
            (o === 'h' ? hWalls : vWalls).add(key(r, c));
            const score = shortestPath('human') - shortestPath('cpu');
            (o === 'h' ? hWalls : vWalls).delete(key(r, c));
            candidates.push({ r, c, o, score });
          }
        }
      }
      candidates.sort((a, b) => b.score - a.score);
      const best = candidates[0];
      if (best && best.score > beforeHuman - beforeCpu) {
        placed = placeWall(best.r, best.c, best.o, 'cpu');
        if (placed) log(`CPUが${best.o === 'h' ? '横' : '縦'}壁を置きました。`);
      }
    }

    if (!placed) {
      const moves = legalMoves('cpu');
      moves.sort((a, b) => Math.abs(a.r - players.cpu.goal) - Math.abs(b.r - players.cpu.goal));
      const next = moves[0];
      movePawn('cpu', next.r, next.c);
      if (!gameOver) log('CPUが駒を進めました。');
    }

    if (!gameOver) {
      turn = 'human';
      setStatus('あなたの番です', '駒を動かすか、壁を置いてください');
    }
    updateHud();
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#6b4428';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const x = boardStart + c * (cell + gap);
        const y = boardStart + r * (cell + gap);
        ctx.fillStyle = '#d89f5a';
        ctx.fillRect(x, y, cell, cell);
        ctx.fillStyle = 'rgba(255,255,255,0.14)';
        ctx.fillRect(x + 4, y + 4, cell - 8, 8);
      }
    }

    ctx.fillStyle = '#273033';
    for (const wall of hWalls) {
      const [r, c] = wall.split(',').map(Number);
      ctx.fillRect(boardStart + c * (cell + gap), boardStart + r * (cell + gap) + cell, cell * 2 + gap, gap);
    }
    for (const wall of vWalls) {
      const [r, c] = wall.split(',').map(Number);
      ctx.fillRect(boardStart + c * (cell + gap) + cell, boardStart + r * (cell + gap), gap, cell * 2 + gap);
    }

    if (showHints && turn === 'human') {
      ctx.fillStyle = 'rgba(37, 99, 235, 0.24)';
      for (const pos of legalMoves('human')) {
        const p = cellCenter(pos.r, pos.c);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    drawPawn(players.human);
    drawPawn(players.cpu);
  }

  function drawPawn(pawn) {
    const p = cellCenter(pawn.r, pawn.c);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 16, 20, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = pawn.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff8ea';
    ctx.lineWidth = 5;
    ctx.stroke();
  }

  function pointerToBoard(event) {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    return {
      x: (event.clientX - rect.left) * scale,
      y: (event.clientY - rect.top) * scale
    };
  }

  canvas.addEventListener('click', event => {
    if (turn !== 'human' || gameOver) return;
    const p = pointerToBoard(event);
    if (mode === 'move') {
      const c = Math.floor((p.x - boardStart) / (cell + gap));
      const r = Math.floor((p.y - boardStart) / (cell + gap));
      if (movePawn('human', r, c)) {
        endHumanTurn('CPUへ交代します');
      } else {
        log('そこへは移動できません。壁や相手駒を確認してください。');
      }
    } else {
      const c = Math.floor((p.x - boardStart) / (cell + gap));
      const r = Math.floor((p.y - boardStart) / (cell + gap));
      if (placeWall(r, c, wallOrientation, 'human')) {
        endHumanTurn('壁を置きました');
      } else {
        log('その壁は置けません。重なり、範囲、経路封鎖を確認してください。');
      }
    }
    updateHud();
    draw();
  });

  moveModeBtn.addEventListener('click', () => { mode = 'move'; updateHud(); });
  wallModeBtn.addEventListener('click', () => { mode = 'wall'; updateHud(); });
  hWallBtn.addEventListener('click', () => { wallOrientation = 'h'; updateHud(); });
  vWallBtn.addEventListener('click', () => { wallOrientation = 'v'; updateHud(); });
  newGameBtn.addEventListener('click', reset);
  hintBtn.addEventListener('click', () => { showHints = !showHints; draw(); });

  reset();
})();
</script>
</body>
</html>
