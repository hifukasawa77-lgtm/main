<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gen Agent | Next-Gen Creation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-title">
                <div class="agent-avatar">V</div>
                <h1>Video Gen Agent</h1>
                <span class="status-badge">Powered by Gemma 4</span>
            </div>
            <div class="header-actions">
                <!-- Additional controls can go here -->
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="message agent">
                <div class="agent-avatar">V</div>
                <div class="agent-bubble">
                    こんにちは！動画生成エージェントです。どのような動画を作成したいですか？<br>
                    例：「雨の降るサイバーパンクな街並み」「宇宙を漂う宇宙飛行士」など。
                </div>
            </div>
        </main>

        <footer class="input-area">
            <form class="input-container" id="chatForm">
                <input type="text" id="userInput" placeholder="動画のイメージを入力してください..." autocomplete="off">
                <button type="submit" class="send-btn">Generate</button>
            </form>
        </footer>
    </div>

    <script src="script.js?v=1.2"></script>
</body>

</html>
