<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム仕様書生成エージェント | hide portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-card: rgba(255,255,255,0.05);
    --cyan: #00d4ff;
    --purple: #9b59b6;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: rgba(0,212,255,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Fira Code', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }
  a.back {
    display: inline-block;
    color: var(--cyan);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 32px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  a.back:hover { opacity: 1; }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p { color: var(--text-dim); font-size: 0.9rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    backdrop-filter: blur(10px);
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--cyan);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  textarea, input[type="password"] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="password"]:focus { border-color: var(--cyan); }
  textarea { height: 120px; margin-bottom: 16px; }
  input[type="password"] { height: 40px; margin-bottom: 16px; }
  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .chip {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'Fira Code', monospace;
    width: auto;
  }
  .chip:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.1); }
  .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .col-main { flex: 1; min-width: 260px; }
  .col-ctrl { width: 240px; min-width: 200px; }
  button.primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 8px;
  }
  button.primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.secondary {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.secondary:hover { background: rgba(0,212,255,0.1); }
  .spinner {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--cyan);
    font-size: 0.9rem;
  }
  .spinner.active { display: block; }
  .spinner::before {
    content: '';
    display: block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0,212,255,0.2);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; }
  .result.active { display: block; }
  .md-body {
    line-height: 1.7;
    font-family: 'Fira Code', monospace;
    font-size: 0.87rem;
  }
  .md-body h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    color: var(--cyan);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .md-body h2 {
    font-size: 1rem;
    color: var(--purple);
    margin: 24px 0 10px;
    font-family: 'Orbitron', sans-serif;
  }
  .md-body h3 { font-size: 0.9rem; color: var(--cyan); margin: 16px 0 8px; }
  .md-body p { margin-bottom: 10px; color: var(--text); }
  .md-body li { margin-left: 20px; margin-bottom: 4px; color: var(--text); }
  .md-body pre {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
  }
  .md-body code {
    font-family: 'Fira Code', monospace;
    font-size: 0.82rem;
    color: #a8d8a8;
  }
  .md-body p code {
    background: rgba(0,212,255,0.1);
    color: var(--cyan);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .copy-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .error-msg {
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 8px;
    padding: 16px;
    color: #e74c3c;
    font-size: 0.85rem;
    display: none;
    margin-bottom: 16px;
  }
  .error-msg.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← portfolio へ戻る</a>
  <header>
    <h1>ゲーム仕様書生成エージェント</h1>
    <p>ゲームのアイデアを入力するだけで、要件定義・設計書・Canvas APIコードを自動生成します</p>
  </header>

  <div class="card">
    <div class="row">
      <div class="col-main">
        <label>ゲームアイデア</label>
        <textarea id="idea" placeholder="例: 障害物を避けながら上昇する縦スクロールシューティングゲーム。パワーアップアイテムあり。"></textarea>
        <div style="margin-bottom:8px;">
          <label style="margin-bottom:4px;">アイデア例</label>
          <div class="examples">
            <button class="chip" onclick="setIdea(this)">横スクロールアクション</button>
            <button class="chip" onclick="setIdea(this)">タワーディフェンス</button>
            <button class="chip" onclick="setIdea(this)">パズルゲーム（重力ブロック）</button>
            <button class="chip" onclick="setIdea(this)">リズムゲーム</button>
          </div>
        </div>
      </div>
      <div class="col-ctrl">
        <label>Anthropic API キー</label>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
        <button class="primary" id="submitBtn" onclick="generate()">仕様書を生成する</button>
        <p style="font-size:0.72rem;color:var(--text-dim);line-height:1.5;">
          キーはリクエスト時のみ使用。<br>保存・記録されません。
        </p>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="spinner" id="spinner">AIが仕様書を設計中...</div>

  <div class="result card" id="result">
    <div class="copy-bar">
      <button class="secondary" style="width:auto;padding:6px 16px;" onclick="copySpec()">仕様書をコピー</button>
    </div>
    <div class="md-body" id="mdBody"></div>
  </div>
</div>

<script>
let rawSpec = '';

function setIdea(btn) {
  document.getElementById('idea').value = btn.textContent;
}

function copySpec() {
  navigator.clipboard.writeText(rawSpec).then(() => {
    const btn = event.target;
    btn.textContent = 'コピーしました!';
    setTimeout(() => btn.textContent = '仕様書をコピー', 2000);
  });
}

async function generate() {
  const idea = document.getElementById('idea').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const result = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');

  if (!idea) { alert('ゲームアイデアを入力してください'); return; }
  if (!apiKey) { alert('APIキーを入力してください'); return; }

  btn.disabled = true;
  spinner.classList.add('active');
  result.classList.remove('active');
  errorMsg.classList.remove('active');

  try {
    const res = await fetch('http://localhost:3001/api/agent/spec', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey
      },
      body: JSON.stringify({ idea })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    rawSpec = data.content?.[0]?.text || '';
    document.getElementById('mdBody').innerHTML = marked.parse(rawSpec);
    result.classList.add('active');
  } catch (err) {
    errorMsg.textContent = 'エラー: ' + err.message;
    errorMsg.classList.add('active');
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}
</script>
</body>
</html>
