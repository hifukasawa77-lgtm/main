openapi: 3.0.3
info:
  title: Teams Meeting Minutes API
  version: 0.1.0
paths:
  /api/meetings:
    post:
      summary: Register a meeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meetingId, title, startedAt]
              properties:
                meetingId: { type: string }
                title: { type: string }
                startedAt: { type: string, format: date-time }
      responses:
        '201':
          description: Created
  /api/meetings/{meetingId}/transcripts:
    post:
      summary: Upload transcript segments
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language, segments]
              properties:
                language: { type: string }
                segments:
                  type: array
                  items:
                    type: object
                    required: [speaker, text, timestamp]
                    properties:
                      speaker: { type: string }
                      text: { type: string }
                      timestamp: { type: string, format: date-time }
      responses:
        '202':
          description: Accepted
  /api/meetings/{meetingId}/summarize:
    post:
      summary: Create summary
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: string }
      requestBody:
        required: false
      responses:
        '202':
          description: Accepted
  /api/meetings/{meetingId}/summary:
    get:
      summary: Get summary result
      parameters:
        - in: path
          name: meetingId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
