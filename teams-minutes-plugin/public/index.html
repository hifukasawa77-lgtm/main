<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams Meeting Summary MVP</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>
  <main class="app-shell">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">Teams Plugin MVP / 議事録要約</p>
        <h1 id="page-title">Meeting Summary Console</h1>
        <p class="lead">Teams 会議の文字起こしを投入し、決定事項・TODO・懸念点をローカルで要約します。</p>
      </div>
      <div class="status-pill" id="api-status">API checking...</div>
    </section>

    <section class="workspace" aria-label="Meeting summary workspace">
      <form class="panel" id="meeting-form">
        <div class="panel-header">
          <h2>Input / 入力</h2>
          <button type="button" class="ghost-button" id="load-sample">Sample</button>
        </div>

        <label>
          Meeting ID
          <input id="meeting-id" name="meetingId" value="demo-meeting-001" required>
        </label>

        <label>
          Title / 会議名
          <input id="meeting-title" name="title" value="Teams 議事録プラグイン定例" required>
        </label>

        <label>
          Transcript / 文字起こし
          <textarea id="transcript" name="transcript" rows="12" required></textarea>
        </label>

        <div class="form-grid">
          <label>
            Language
            <select id="language" name="language">
              <option value="ja-JP">日本語</option>
              <option value="en-US">English</option>
            </select>
          </label>
          <label>
            Max bullets
            <input id="max-bullets" name="maxBullets" type="number" min="1" max="12" value="8">
          </label>
        </div>

        <label class="checkbox-row">
          <input id="include-actions" name="includeActionItems" type="checkbox" checked>
          TODO / Action items を抽出
        </label>

        <button class="primary-button" type="submit">Summarize / 要約生成</button>
      </form>

      <section class="panel result-panel" aria-labelledby="result-title">
        <div class="panel-header">
          <h2 id="result-title">Summary / 要約</h2>
          <button type="button" class="ghost-button" id="copy-card">Copy card JSON</button>
        </div>
        <div id="summary-empty" class="empty-state">文字起こしを入力して要約を生成してください。</div>
        <article id="summary" class="summary" hidden></article>
      </section>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
