  <script>
    fetch('./shogi_rpg_enhanced.jsx')
      .then(function(res) {
        if (!res.ok) throw new Error('繝輔ぃ繧､繝ｫ縺ｮ隱ｭ縺ｿ霎ｼ縺ｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆ (HTTP ' + res.status + ')');
        return res.text();
      })
      .then(function(code) {
        // import譁�繧帝勁蜴ｻ�ｼ�React 縺ｯ繧ｰ繝ｭ繝ｼ繝舌Ν縺ｧ蛻ｩ逕ｨ蜿ｯ閭ｽ�ｼ�
        code = code.replace(/^import\s+React\s*,?\s*(\{[^}]*\})?\s*(from\s+['"]react['"])?\s*;?\s*\n?/gm, '');

        // 繧ｰ繝ｭ繝ｼ繝舌ΝReact縺九ｉHooks繧壇estructuring�ｼ医☆縺ｧ縺ｫ縺ゅｋ蝣ｴ蜷医�ｯ驥崎､�縺励↑縺�繧医≧蜈磯�ｭ縺ｫ謖ｿ蜈･�ｼ�
        var prelude =
          'const { useState, useEffect, useRef, useCallback, useMemo, useReducer } = React;\n';

        var renderCode =
          '\n;(function(){\n' +
          '  var loading = document.getElementById("loading");\n' +
          '  if (loading) loading.style.display = "none";\n' +
          '  var root = ReactDOM.createRoot(document.getElementById("root"));\n' +
          '  root.render(React.createElement(ShogiRPG));\n' +
          '})();\n';

        var full = prelude + code + renderCode;

        var result = Babel.transform(full, { presets: ['react'] });
        var script = document.createElement('script');
        script.textContent = result.code;
        document.body.appendChild(script);
      })
      .catch(function(err) {
        console.error(err);
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
        var errEl = document.getElementById('error-msg');
        errEl.style.display = 'block';
        errEl.innerHTML =
          '<h2 style="margin-bottom:12px">隱ｭ縺ｿ霎ｼ縺ｿ繧ｨ繝ｩ繝ｼ</h2>' +
          '<p>' + err.message.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>' +
          '<p style="font-size:0.85rem;color:#9ca3af;margin-top:16px">' +
          '繝ｭ繝ｼ繧ｫ繝ｫ繝輔ぃ繧､繝ｫ縺ｧ髢九￥蝣ｴ蜷医�ｯ繝ｭ繝ｼ繧ｫ繝ｫ繧ｵ繝ｼ繝舌�ｼ縺悟ｿ�隕√〒縺吶�<br><br>' +

          '<code>npx serve .</code><br>' +
          '縺昴�ｮ蠕� <code>http://localhost:3000/game.html</code> 繧帝幕縺�</p>';
      });
