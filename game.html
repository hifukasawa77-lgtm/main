<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>将棋RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap">
  <style>
    body { margin: 0; background: #1a1a2e; }
    #root { min-height: 100vh; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #a78bfa;
      font-family: 'Noto Serif JP', serif;
      font-size: 1.2rem;
      gap: 20px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      display: none;
      color: #f87171;
      font-family: sans-serif;
      padding: 40px 20px;
      text-align: center;
      line-height: 1.7;
    }
    #error-msg code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <span>読み込み中...</span>
    </div>
    <div id="error-msg"></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    fetch('./shogi_rpg_enhanced.jsx')
      .then(function(res) {
        if (!res.ok) throw new Error('ファイルの読み込みに失敗しました (HTTP ' + res.status + ')');
        return res.text();
      })
      .then(function(code) {
        // import文を除去（React はグローバルで利用可能）
        code = code.replace(/^import\s+React\s*,?\s*(\{[^}]*\})?\s*(from\s+['"]react['"])?\s*;?\s*\n?/gm, '');

        // グローバルReactからHooksをdestructuring（すでにある場合は重複しないよう先頭に挿入）
        var prelude =
          'const { useState, useEffect, useRef, useCallback, useMemo, useReducer } = React;\n';

        var renderCode =
          '\n;(function(){\n' +
          '  var loading = document.getElementById("loading");\n' +
          '  if (loading) loading.style.display = "none";\n' +
          '  var root = ReactDOM.createRoot(document.getElementById("root"));\n' +
          '  root.render(React.createElement(ShogiRPG));\n' +
          '})();\n';

        var full = prelude + code + renderCode;

        var result = Babel.transform(full, { presets: ['react'] });
        var script = document.createElement('script');
        script.textContent = result.code;
        document.body.appendChild(script);
      })
      .catch(function(err) {
        console.error(err);
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
        var errEl = document.getElementById('error-msg');
        errEl.style.display = 'block';
        errEl.innerHTML =
          '<h2 style="margin-bottom:12px">読み込みエラー</h2>' +
          '<p>' + err.message + '</p>' +
          '<p style="font-size:0.85rem;color:#9ca3af;margin-top:16px">' +
          'ローカルファイルで開く場合はローカルサーバーが必要です。<br><br>' +
          'ターミナルで以下を実行してください:<br>' +
          '<code>npx serve .</code><br>' +
          'その後 <code>http://localhost:3000/game.html</code> を開く</p>';
      });
  </script>
</body>
</html>
