function createEnemy(type, x, y) {
  const e = { x, y, vx:0, vy:0, dir:0, type, alive:true, timer:0, hitTimer:0, attackTimer:0 };
  if (type === 'slime') { e.hp = 2; e.maxHp = 2; e.speed = 0.6; e.size = 20; e.color='#55dd55'; e.dmg=1; }
  else if (type === 'bat') { e.hp = 1; e.maxHp = 1; e.speed = 1.5; e.size = 16; e.color='#aa66ff'; e.dmg=1; }
  else if (type === 'boss') { e.hp = 8; e.maxHp = 8; e.speed = 1.2; e.size = 40; e.color='#cc2222'; e.dmg=2; }
  return e;
}

function initRoom(r) {
  room = r;
  enemies = [];
  const defs = [
    [ {type:'slime',x:200,y:200}, {type:'slime',x:300,y:300}, {type:'bat',x:400,y:150} ],
    [ {type:'slime',x:150,y:250}, {type:'bat',x:350,y:100}, {type:'bat',x:400,y:350} ],
    [ {type:'boss',x:256,y:200} ],
  ];
  if (r < defs.length) defs[r].forEach(d => enemies.push(createEnemy(d.type, d.x, d.y)));
  items = [];
  const mapData = ROOMS[r];
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const t = mapData[row][col];
      if (t === T.KEY) items.push({type:'key', x: col*TW+TW/2, y: row*TH+TH/2, collected:false, row, col});
      if (t === T.CHEST) items.push({type:'chest', x: col*TW+TW/2, y: row*TH+TH/2, collected:false, row, col});
    }
  }
}
function initPlayer() {
  player = { x: 80, y: 7*TH + TH/2, dir: 0, hp: 6, maxHp: 6, keys: 0, speed: 3, size: 20, attacking: false, attackTimer: 0, hitTimer: 0, swordDmg: 1, score: 0 };
}
function getTile(r, px, py) {
  const col = Math.floor(px / TW), row = Math.floor(py / TH);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return T.WALL;
  return ROOMS[r][row][col];
}
function isSolid(tile) { return tile === T.WALL || tile === T.WATER || tile === T.DOOR_LOCKED; }
function isPassable(r, px, py, size) {
  const half = size / 2;
  return ![
    [px-half+2, py-half+2],[px+half-2, py-half+2],
    [px-half+2, py+half-2],[px+half-2, py+half-2]
  ].some(([cx,cy]) => isSolid(getTile(r,cx,cy)));
}
function getSwordBox(p) {
  const len=30,w=20;
  if(p.dir===0) return{x:p.x+p.size/2,y:p.y-w/2,w:len,h:w};
  if(p.dir===1) return{x:p.x-p.size/2-len,y:p.y-w/2,w:len,h:w};
  if(p.dir===2) return{x:p.x-w/2,y:p.y+p.size/2,w:w,h:len};
  return{x:p.x-w/2,y:p.y-p.size/2-len,w:w,h:len};
}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return(cx-nx)**2+(cy-ny)**2<cr*cr;
}
function drawTile(t,x,y){
  ctx.fillStyle=COLORS[t]||'#888'; ctx.fillRect(x,y,TW,TH);
  if(t===T.WALL){ctx.fillStyle='#2a1f14';ctx.fillRect(x+1,y+1,TW-2,4);ctx.fillStyle='#6b4e37';ctx.fillRect(x+1,y+TH-5,TW-2,4);}
  if(t===T.DOOR_LOCKED){ctx.fillStyle='#ffd700';ctx.fillRect(x+TW/2-3,y+2,6,TH-4);ctx.fillStyle='#b8860b';ctx.fillRect(x+TW/2-2,y+TH/2-3,4,6);}
  if(t===T.KEY){ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(x+TW/2,y+TH/2-4,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#b8860b';ctx.fillRect(x+TW/2-2,y+TH/2+3,4,8);ctx.fillRect(x+TW/2,y+TH/2+7,5,3);}
  if(t===T.CHEST){ctx.fillStyle='#8b4513';ctx.fillRect(x+4,y+8,TW-8,TH-12);ctx.fillStyle='#d4a017';ctx.fillRect(x+4,y+8,TW-8,6);ctx.fillStyle='#ffd700';ctx.fillRect(x+TW/2-3,y+10,6,4);}
  if(t===T.STAIRS){ctx.fillStyle='#006400';for(let i=0;i<4;i++)ctx.fillRect(x+4+i*4,y+TH-8-i*4,TW-8-i*8,4);}
  if(t===T.WATER){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(x+2,y+8,TW-4,4);ctx.fillRect(x+4,y+18,TW-8,4);}
  if(t===T.GRASS){ctx.fillStyle='#2d5a1b';ctx.fillRect(x+6,y+4,4,8);ctx.fillRect(x+16,y+6,4,8);ctx.fillRect(x+22,y+3,4,8);}
}
function drawMap(r){const m=ROOMS[r];for(let row=0;row<ROWS;row++)for(let col=0;col<COLS;col++)drawTile(m[row][col],col*TW,row*TH);}
function drawPlayer(p){
  if(p.hitTimer>0&&Math.floor(p.hitTimer/4)%2===0)return;
  const half=p.size/2;
  ctx.fillStyle='#22aa22';ctx.fillRect(p.x-half+2,p.y-half,p.size-4,p.size);
  ctx.fillStyle='#f4c88e';ctx.fillRect(p.x-half+4,p.y-half-8,p.size-8,10);
  ctx.fillStyle='#118811';ctx.fillRect(p.x-half+2,p.y-half-14,p.size-4,8);ctx.fillRect(p.x-half,p.y-half-10,p.size,4);
  ctx.fillStyle='#000';
  if(p.dir===0)ctx.fillRect(p.x+2,p.y-half-5,3,3);
  else if(p.dir===1)ctx.fillRect(p.x-6,p.y-half-5,3,3);
  else if(p.dir===2){ctx.fillRect(p.x-4,p.y-half-5,3,3);ctx.fillRect(p.x+2,p.y-half-5,3,3);}
  if(p.attacking){
    ctx.fillStyle='#c0c0c0';const sb=getSwordBox(p);ctx.fillRect(sb.x,sb.y,sb.w,sb.h);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    if(p.dir===0||p.dir===1)ctx.fillRect(sb.x,sb.y,sb.w,3);else ctx.fillRect(sb.x,sb.y,3,sb.h);
  } else {
    ctx.fillStyle='#888';
    if(p.dir===0)ctx.fillRect(p.x+half-2,p.y-2,4,8);
    else if(p.dir===1)ctx.fillRect(p.x-half-2,p.y-2,4,8);
  }
}
function drawEnemy(e){
  if(!e.alive)return;
  const flash=e.hitTimer>0&&Math.floor(e.hitTimer/3)%2===0;
  const half=e.size/2;
  ctx.fillStyle=flash?'#fff':e.color;
  if(e.type==='slime'){
    ctx.beginPath();ctx.ellipse(e.x,e.y+4,half,half*0.7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.fillRect(e.x-6,e.y-2,4,4);ctx.fillRect(e.x+2,e.y-2,4,4);
  }else if(e.type==='bat'){
    ctx.beginPath();ctx.ellipse(e.x,e.y,half*0.7,half*0.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=flash?'#fff':'#8844cc';
    const wing=Math.sin(frameCount*0.2)*5;
    ctx.fillRect(e.x-half-2,e.y-4+wing,half,8);ctx.fillRect(e.x+2,e.y-4-wing,half,8);
    ctx.fillStyle='#f00';ctx.fillRect(e.x-4,e.y-3,3,3);ctx.fillRect(e.x+2,e.y-3,3,3);
  }else if(e.type==='boss'){
    ctx.fillStyle=flash?'#fff':'#cc2222';ctx.fillRect(e.x-half,e.y-half,e.size,e.size);
    ctx.fillStyle=flash?'#fff':'#ff4444';ctx.fillRect(e.x-half+4,e.y-half+4,e.size-8,e.size-8);
    ctx.fillStyle=flash?'#fff':'#880000';ctx.fillRect(e.x-half,e.y-half-12,8,16);ctx.fillRect(e.x+half-8,e.y-half-12,8,16);
    ctx.fillStyle='#ff0';ctx.fillRect(e.x-12,e.y-6,8,8);ctx.fillRect(e.x+4,e.y-6,8,8);
    ctx.fillStyle='#000';ctx.fillRect(e.x-10,e.y-4,4,4);ctx.fillRect(e.x+6,e.y-4,4,4);ctx.fillRect(e.x-10,e.y+8,20,4);
    ctx.fillStyle='#333';ctx.fillRect(e.x-half,e.y-half-22,e.size,6);
    ctx.fillStyle='#f00';ctx.fillRect(e.x-half,e.y-half-22,e.size*(e.hp/e.maxHp),6);
  }
}
function drawHUD(){
  const p=player;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,canvas.width,36);
  const hs=20;
  for(let i=0;i<p.maxHp/2;i++){
    const hx=8+i*(hs+4),hy=8;
    const full=p.hp>=(i+1)*2,half2=!full&&p.hp>=i*2+1;
    ctx.fillStyle=full?'#ff3333':half2?'#ff8888':'#442222';
    ctx.beginPath();ctx.moveTo(hx+hs/2,hy+hs-3);
    ctx.bezierCurveTo(hx,hy+hs/2,hx,hy+4,hx+hs/2,hy+4);
    ctx.bezierCurveTo(hx+hs,hy+4,hx+hs,hy+hs/2,hx+hs/2,hy+hs-3);ctx.fill();
  }
  ctx.fillStyle='#ffd700';ctx.font='bold 16px monospace';ctx.fillText('KEY:'+p.keys,canvas.width/2-30,24);
  ctx.fillStyle='#aaa';ctx.font='12px monospace';ctx.fillText('エリア'+(room+1)+'/3',canvas.width-80,24);
  ctx.fillStyle='rgba(255,215,0,0.55)';ctx.font='10px monospace';ctx.fillText('[M]MAP',canvas.width-52,canvas.height-6);
  ctx.fillStyle='#fff';ctx.fillText('スコア:'+p.score,canvas.width/2+40,24);
}

  ctx.font='bold 40px monospace';ctx.fillText('CONGRATULATIONS!',canvas.width/2,160);

  ctx.textAlign='left';
}
let transition={active:false,alpha:0,dir:1,nextRoom:0,nextX:0,nextY:0};
function startTransition(nextRoom,px,py){transition={active:true,alpha:0,dir:1,nextRoom,nextX:px,nextY:py};}
function update(){
  frameCount++;
  if(state!=='play')return;
  if(transition.active){
    transition.alpha+=transition.dir*0.08;
    if(transition.alpha>=1&&transition.dir===1){initRoom(transition.nextRoom);player.x=transition.nextX;player.y=transition.nextY;transition.dir=-1;}
    if(transition.alpha<=0&&transition.dir===-1)transition.active=false;
    return;
  }
  const p=player;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-p.speed;p.dir=1;}
  if(keys['ArrowRight']||keys['d']||keys['D']){dx=p.speed;p.dir=0;}
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-p.speed;p.dir=3;}
  if(keys['ArrowDown']||keys['s']||keys['S']){dy=p.speed;p.dir=2;}
  if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
  const nx=p.x+dx,ny=p.y+dy;
  if(isPassable(room,nx,p.y,p.size))p.x=nx;
  if(isPassable(room,p.x,ny,p.size))p.y=ny;
  p.x=Math.max(p.size/2,Math.min(canvas.width-p.size/2,p.x));
  p.y=Math.max(p.size/2+36,Math.min(canvas.height-p.size/2,p.y));
  if((keys['z']||keys['Z']||keys[' '])&&!p.attacking){p.attacking=true;p.attackTimer=18;}
  if(p.attackTimer>0){p.attackTimer--;if(p.attackTimer===0)p.attacking=false;}
  if(p.hitTimer>0)p.hitTimer--;
  if(p.attacking){
    const sb=getSwordBox(p);
    enemies.forEach(e=>{
      if(!e.alive||e.hitTimer>0)return;
      if(circleRect(e.x,e.y,e.size/2,sb.x,sb.y,sb.w,sb.h)){
        e.hp-=p.swordDmg;e.hitTimer=15;
        if(e.hp<=0){e.alive=false;p.score+=e.type==='boss'?500:50;}
        const kx=e.x-p.x,ky=e.y-p.y,kd=Math.sqrt(kx*kx+ky*ky)||1;
        e.x+=kx/kd*20;e.y+=ky/kd*20;
      }
    });
  }
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.hitTimer>0)e.hitTimer--;
    const edx=p.x-e.x,edy=p.y-e.y,dist=Math.sqrt(edx*edx+edy*edy);
    if(e.type==='slime'){e.timer++;if(e.timer%60<30&&dist<300){const nd=dist||1;const nx2=e.x+edx/nd*e.speed,ny2=e.y+edy/nd*e.speed;if(isPassable(room,nx2,e.y,e.size))e.x=nx2;if(isPassable(room,e.x,ny2,e.size))e.y=ny2;}}
    else if(e.type==='bat'){const angle=Math.atan2(edy,edx)+Math.sin(frameCount*0.05)*0.5;const nx2=e.x+Math.cos(angle)*e.speed,ny2=e.y+Math.sin(angle)*e.speed;if(isPassable(room,nx2,e.y,e.size))e.x=nx2;if(isPassable(room,e.x,ny2,e.size))e.y=ny2;}
    else if(e.type==='boss'){const nd=dist||1;const nx2=e.x+edx/nd*e.speed,ny2=e.y+edy/nd*e.speed;if(isPassable(room,nx2,e.y,e.size))e.x=nx2;if(isPassable(room,e.x,ny2,e.size))e.y=ny2;}
    e.x=Math.max(e.size/2+TW,Math.min(canvas.width-e.size/2-TW,e.x));
    e.y=Math.max(e.size/2+TW+36,Math.min(canvas.height-e.size/2-TW,e.y));
    if(dist<(p.size+e.size)/2+8&&p.hitTimer===0){p.hp-=e.dmg;p.hitTimer=60;const kd=dist||1;p.x-=edx/kd*15;p.y-=edy/kd*15;if(p.hp<=0)state='gameover';}
  });
  items.forEach(it=>{
    if(it.collected)return;
    const dx2=p.x-it.x,dy2=p.y-it.y;
    if(Math.sqrt(dx2*dx2+dy2*dy2)<p.size/2+12){
      it.collected=true;const r=ROOMS[room];
      if(it.type==='key'){p.keys++;p.score+=100;r[it.row][it.col]=T.FLOOR;}
      else if(it.type==='chest'){p.hp=Math.min(p.maxHp,p.hp+2);p.score+=200;r[it.row][it.col]=T.FLOOR;}
    }
  });
  const exits=ROOM_EXITS[room];
  if(exits.right!==undefined&&p.x>canvas.width-p.size/2-2){
    const tile=ROOMS[room][7][COLS-1];
    if(tile===T.DOOR_OPEN||tile===T.FLOOR)startTransition(exits.right,p.size/2+TW+4,p.y);
    else if(tile===T.DOOR_LOCKED){if(p.keys>0){p.keys--;ROOMS[room][7][COLS-1]=T.DOOR_OPEN;}else p.x=canvas.width-p.size/2-3;}
  }
  if(exits.left!==undefined&&p.x<p.size/2+2)startTransition(exits.left,canvas.width-p.size/2-TW-4,p.y);
  if(getTile(room,p.x,p.y)===T.STAIRS&&enemies.filter(e=>e.type==='boss').every(e=>!e.alive))state='clear';
}
function drawWorldMap(){
  ctx.fillStyle='rgba(0,0,0,0.92)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center';
  ctx.fillStyle='#ffd700';
  ctx.font='bold 15px monospace';
  ctx.fillText('[ WORLD MAP ]',canvas.width/2,20);
  const pad=6, top=28, imgH=canvas.height-44;
  if(worldMapImg.complete&&worldMapImg.naturalWidth>0){
    ctx.drawImage(worldMapImg,pad,top,canvas.width-pad*2,imgH);
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
    ctx.strokeRect(pad,top,canvas.width-pad*2,imgH);
  } else {
    ctx.fillStyle='#555';ctx.fillRect(pad,top,canvas.width-pad*2,imgH);
    ctx.fillStyle='#888';ctx.font='14px monospace';
    ctx.fillText('Loading...',canvas.width/2,top+imgH/2);
  }
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,canvas.height-14,canvas.width,14);
  ctx.fillStyle='#aaa';ctx.font='10px monospace';
  ctx.fillText('[M] または [Esc] で閉じる',canvas.width/2,canvas.height-3);
  ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(state==='title'){drawTitle();return;}
  if(state==='gameover'){drawGameOver();return;}
  if(state==='clear'){drawClear();return;}
  drawMap(room);enemies.forEach(e=>drawEnemy(e));drawPlayer(player);drawHUD();
  if(transition.active&&transition.alpha>0){ctx.fillStyle=`rgba(0,0,0,${transition.alpha})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(player.hitTimer>50){ctx.fillStyle=`rgba(255,0,0,${(player.hitTimer-50)/10*0.3})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(showWorldMap)drawWorldMap();
}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){
    if(state==='title'){initPlayer();resetMapState();initRoom(0);state='play';}
    else if(state==='gameover'){initPlayer();resetMapState();initRoom(0);state='play';}
    else if(state==='clear')state='title';
  }
  if(e.key==='m'||e.key==='M'){if(state==='play'){showWorldMap=!showWorldMap;}e.preventDefault();}
  if(e.key==='Escape'){showWorldMap=false;}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function resetMapState(){
  ROOMS[0][5][7]=T.KEY;ROOMS[1][11][7]=T.CHEST;
  ROOMS[0][7][15]=T.DOOR_OPEN;ROOMS[1][7][0]=T.DOOR_OPEN;
  ROOMS[1][7][15]=T.DOOR_LOCKED;ROOMS[2][7][15]=T.DOOR_LOCKED;
}
function loop(){update();render();requestAnimationFrame(loop);}
resetMapState();loop();
</script>
