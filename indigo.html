<html lang="ja">

<style>
:root{
  --bg:#0d0d1a;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(99,102,241,0.2);
  --ink:#e2e8f0;
  --muted:#94a3b8;
  --cyan:#06b6d4;
  --cyan-dim:rgba(6,182,212,0.15);
  --purple:#a855f7;
  --purple-dim:rgba(168,85,247,0.15);
  --r:12px;
  --shadow:0 20px 60px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:
    radial-gradient(ellipse at 20% 0%,rgba(99,102,241,0.14),transparent 48%),
    radial-gradient(ellipse at 80% 100%,rgba(168,85,247,0.11),transparent 48%),
    var(--bg);
  color:var(--ink);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
header{
  padding:16px 24px;
  display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--border);
  background:rgba(13,13,26,0.8);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:10;
}
.logo{font-weight:700;font-size:1.1rem;color:var(--cyan);letter-spacing:.04em}
.back-link{font-size:.85rem;color:var(--muted);margin-left:auto}

/* Main layout */
main{flex:1;padding:24px 16px 48px;max-width:1100px;margin:0 auto;width:100%}

.hero{text-align:center;margin-bottom:28px}
.hero h1{font-size:1.9rem;font-weight:800;letter-spacing:.04em;margin-bottom:6px}
.hero h1 span{color:var(--cyan)}
.hero p{color:var(--muted);font-size:.9rem;max-width:520px;margin:0 auto}

/* Score strip */
.score-strip{
  display:flex;gap:16px;justify-content:center;margin:16px 0 0;
}
.score-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:10px 20px;
  min-width:110px;
  text-align:center;
}
.score-name{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.score-val{font-size:2rem;font-weight:800;line-height:1.1}
.score-box.p0 .score-val{color:var(--cyan)}
.score-box.p1 .score-val{color:var(--purple)}

/* Game shell */
.game-shell{
  display:flex;gap:20px;align-items:flex-start;
  flex-wrap:wrap;
}
.board-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:12px;
  flex:0 0 auto;
}
canvas#gc{display:block;cursor:pointer}

/* Side panel */
.side-panel{
  flex:1 1 200px;
  min-width:180px;
  display:flex;flex-direction:column;gap:14px;
}
.panel-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
}
.panel-card h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

#statusText{
  font-size:.92rem;font-weight:600;line-height:1.4;
  color:var(--ink);
}
.status-turn-p0{color:var(--cyan)}
.status-turn-p1{color:var(--purple)}

/* Tile preview */
canvas#pc{display:block;margin:0 auto}

/* Controls */
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
button{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--ink);
  font-size:.82rem;
  padding:6px 12px;
  cursor:pointer;
  transition:background .15s,border-color .15s;
}
button:hover{background:var(--cyan-dim);border-color:var(--cyan)}
button.primary{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);font-weight:600}
button.primary:hover{background:rgba(6,182,212,0.25)}

select{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--ink);
  font-size:.82rem;
  padding:6px 10px;
  cursor:pointer;
  outline:none;
}

/* Legend */
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.82rem;color:var(--muted)}
.gem-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* Game over overlay */
#overlay{
  display:none;
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
#overlay.show{display:flex}
.overlay-card{
  background:rgba(13,13,26,0.95);
  border:1px solid var(--border);
  border-radius:16px;
  padding:36px 40px;
  text-align:center;
  max-width:360px;width:90%;
  box-shadow:0 0 60px rgba(99,102,241,0.2);
}
.overlay-card h2{font-size:1.6rem;margin-bottom:12px}
.overlay-card p{color:var(--muted);margin-bottom:20px;font-size:.95rem}
.winner-highlight{color:var(--cyan);font-weight:800;font-size:1.1em}

/* Footer */
footer{
  padding:20px;text-align:center;
  border-top:1px solid var(--border);
  font-size:.82rem;color:var(--muted);
}

@media(max-width:700px){
  .game-shell{flex-direction:column;align-items:center}
  canvas#gc{max-width:100%}
}
</style>

<script>
// ─── Constants ───────────────────────────────────────────────
const BOARD_RADIUS = 4;
const HEX_SIZE = 36;

// Axial neighbor directions indexed 0-5 clockwise:
// 0=NE(dq+1,dr-1), 1=E(dq+1,dr0), 2=SE(dq0,dr+1),
// 3=SW(dq-1,dr+1), 4=W(dq-1,dr0), 5=NW(dq0,dr-1)
const HEX_DIRS = [
  {dq:1,dr:-1},{dq:1,dr:0},{dq:0,dr:1},
  {dq:-1,dr:1},{dq:-1,dr:0},{dq:0,dr:-1}
];

// 6 tile types: each is 3 pairs of edge indices (0-5)
// Every edge appears exactly once per tile
const TILE_BASE = [
  [[0,3],[1,4],[2,5]],  // straight through
  [[0,1],[2,5],[3,4]],  // adjacent pair top-NE/E, then two others
  [[0,5],[1,2],[3,4]],  // adjacent pair top-NE/NW
  [[0,1],[2,3],[4,5]],  // three adjacent pairs
  [[0,2],[1,5],[3,4]],  // skip-one pair
  [[0,4],[1,2],[3,5]],  // skip-two/mixed
];

// Gateway definitions: one per board side
// Each gateway is at a border hex + outward edge
// 2P mode: player 0 owns gateways 0,2,4; player 1 owns 1,3,5
const GW_DEFS = [
  {id:0, q: 2, r:-4, edge:0},  // top-NE side midpoint
  {id:1, q: 4, r:-2, edge:1},  // right side midpoint
  {id:2, q: 2, r: 2, edge:2},  // lower-right diagonal midpoint
  {id:3, q:-2, r: 4, edge:3},  // bottom-SW side midpoint
  {id:4, q:-4, r: 2, edge:4},  // left side midpoint
  {id:5, q:-2, r:-2, edge:5},  // upper-left diagonal midpoint
];

const PLAYER_COLORS = ['#06b6d4','#a855f7'];
const PLAYER_GATEWAYS = [[0,2,4],[1,3,5]];

const GEM_CONFIG = {
  ruby:   {points:1, color:'#ef4444', glow:'rgba(239,68,68,0.55)'},
  emerald:{points:2, color:'#10b981', glow:'rgba(16,185,129,0.55)'},
  amber:  {points:3, color:'#f59e0b', glow:'rgba(245,158,11,0.55)'},
};

// Initial gem positions (center + ring-1 + ring-2)
const GEM_START = [
  {type:'amber',   q: 0, r: 0},
  {type:'ruby',    q: 1, r:-1},
  {type:'ruby',    q: 1, r: 0},
  {type:'ruby',    q: 0, r: 1},
  {type:'ruby',    q:-1, r: 1},
  {type:'ruby',    q:-1, r: 0},
  {type:'ruby',    q: 0, r:-1},
  {type:'emerald', q: 2, r:-2},
  {type:'emerald', q:-2, r: 2},
];

// ─── Coordinate helpers ───────────────────────────────────────
function hexToPixel(q, r, size, ox, oy) {
  return {
    x: size * Math.sqrt(3) * (q + r / 2) + ox,
    y: size * 1.5 * r + oy
  };
}

function pixelToHex(px, py, size, ox, oy) {
  const x = (px - ox) / size;
  const y = (py - oy) / size;
  const q = (Math.sqrt(3)/3 * x - y/3);
  const r = y * 2/3;
  return hexRound(q, r);
}

function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr-rs;
  else if (dr > ds) rr = -rq-rs;
  return {q:rq, r:rr};
}

function isOnBoard(q, r) {
  return Math.abs(q) <= BOARD_RADIUS
      && Math.abs(r) <= BOARD_RADIUS
      && Math.abs(q+r) <= BOARD_RADIUS;
}

function hexNeighbor(q, r, edge) {
  const d = HEX_DIRS[edge];
  return {q: q+d.dq, r: r+d.dr};
}

function oppEdge(e) { return (e+3)%6; }

// Edge midpoint pixel coords (outward from hex center)
function edgePt(cx, cy, edge, dist) {
  const a = -Math.PI/3 + edge * Math.PI/3;
  return {x: cx + dist * Math.cos(a), y: cy + dist * Math.sin(a)};
}

// ─── Tile helpers ─────────────────────────────────────────────
function rotatePaths(paths, rot) {
  return paths.map(([a,b]) => [(a+rot)%6, (b+rot)%6]);
}

function getExitEdge(paths, entryEdge) {
  for (const [a,b] of paths) {
    if (a === entryEdge) return b;
    if (b === entryEdge) return a;
  }
  return null;
}

function makeTile(type, rot) {
  return {type, rot, paths: rotatePaths(TILE_BASE[type], rot)};
}

function buildDeck() {
  const deck = [];
  // ~10 of each type for a reasonable game length
  for (let t = 0; t < 6; t++)
    for (let k = 0; k < 9; k++) deck.push(t);
  // shuffle
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]] = [deck[j],deck[i]];
  }
  return deck;
}

// ─── Game state ───────────────────────────────────────────────
let G;

function resetGame() {
  const diff = document.getElementById('diffSel').value;
  G = {
    phase: 'PLAYING',
    players: [
      {id:0, score:0, isAI:false},
      {id:1, score:0, isAI:true},
    ],
    diff,
    currentPlayer: 0,
    grid: new Map(),
    gems: [],
    tileDeck: buildDeck(),
    currentTile: null,
    hoverHex: null,
    aiThinking: false,
  };
  initGrid();
  placeStartGems();
  G.currentTile = drawTile();
  updateScoreUI();
  setStatus(0);
  hideOverlay();
  draw();
  drawPreview();
}

function initGrid() {
  for (let q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
    for (let r = -BOARD_RADIUS; r <= BOARD_RADIUS; r++) {
      if (isOnBoard(q,r)) G.grid.set(`${q},${r}`, {q,r,tile:null});
    }
  }
}

function placeStartGems() {
  GEM_START.forEach((def, i) => {
    G.gems.push({
      id: i,
      type: def.type,
      points: GEM_CONFIG[def.type].points,
      q: def.q,
      r: def.r,
      entryEdge: null,
    });
  });
}

function drawTile() {
  if (G.tileDeck.length === 0) return null;
  const type = G.tileDeck.pop();
  return makeTile(type, 0);
}

// ─── Gateway lookup ──────────────────────────────────────────
function findGateway(q, r, exitEdge) {
  for (const gw of GW_DEFS) {
    if (gw.q === q && gw.r === r && gw.edge === exitEdge) return gw;
  }
  return null;
}

function gatewayOwners(gw) {
  return PLAYER_GATEWAYS.reduce((acc, gates, pid) => {
    if (gates.includes(gw.id)) acc.push(pid);
    return acc;
  }, []);
}

// ─── Game logic ───────────────────────────────────────────────
function placeTile(q, r, tile) {
  const cell = G.grid.get(`${q},${r}`);
  if (!cell || cell.tile) return false;
  cell.tile = tile;

  // Activate resting gems on this hex
  G.gems.forEach(gem => {
    if (gem.q === q && gem.r === r && gem.entryEdge === null) {
      gem.entryEdge = tile.paths[0][0];
    }
  });

  const animSteps = collectPropagateSteps();
  propagateGems();

  if (animSteps.length > 0) {
    startGemAnimation(animSteps, () => { G.aiThinking = false; endTurn(); });
  } else {
    G.aiThinking = false;
    endTurn();
  }
  return true;
}

function propagateGems() {
  const visited = new Set();
  const queue = G.gems.filter(g => g.entryEdge !== null);

  let head = 0;
  while (head < queue.length) {
    const gem = queue[head++];
    if (!G.gems.includes(gem)) continue;

    const cell = G.grid.get(`${gem.q},${gem.r}`);
    if (!cell || !cell.tile) continue;

    const key = `${gem.id},${gem.q},${gem.r},${gem.entryEdge}`;
    if (visited.has(key)) continue;
    visited.add(key);

    const exitEdge = getExitEdge(cell.tile.paths, gem.entryEdge);
    if (exitEdge === null) continue;

    const nb = hexNeighbor(gem.q, gem.r, exitEdge);
    if (!isOnBoard(nb.q, nb.r)) {
      // Off-board: check gateway
      const gw = findGateway(gem.q, gem.r, exitEdge);
      if (gw) {
        scoreGem(gem, gw);
      } else {
        // Remove gem (no gateway on this edge)
        G.gems = G.gems.filter(g => g !== gem);
      }
      continue;
    }

    const nbCell = G.grid.get(`${nb.q},${nb.r}`);
    if (nbCell && nbCell.tile) {
      gem.q = nb.q;
      gem.r = nb.r;
      gem.entryEdge = oppEdge(exitEdge);
      queue.push(gem);
    } else {
      // Move gem to empty neighbor hex, wait
      gem.q = nb.q;
      gem.r = nb.r;
      gem.entryEdge = oppEdge(exitEdge);
    }
  }
}

// ─── Gem animation ───────────────────────────────────────────
const ANIM = { active: false, perGem: {}, onDone: null };

function collectPropagateSteps() {
  const steps = [];
  const visited = new Set();
  const gemsCopy = G.gems.map(g => ({...g}));
  const queue = gemsCopy.filter(g => g.entryEdge !== null);
  let head = 0;
  while (head < queue.length) {
    const gem = queue[head++];
    if (!gemsCopy.includes(gem)) continue;
    const cell = G.grid.get(`${gem.q},${gem.r}`);
    if (!cell || !cell.tile) continue;
    const key = `${gem.id},${gem.q},${gem.r},${gem.entryEdge}`;
    if (visited.has(key)) continue;
    visited.add(key);
    const exitEdge = getExitEdge(cell.tile.paths, gem.entryEdge);
    if (exitEdge === null) continue;
    const nb = hexNeighbor(gem.q, gem.r, exitEdge);
    if (!isOnBoard(nb.q, nb.r)) {
      const gw = findGateway(gem.q, gem.r, exitEdge);
      steps.push({ gemId: gem.id, gemType: gem.type, gemPoints: gem.points,
        fromQ: gem.q, fromR: gem.r, entryEdge: gem.entryEdge, exitEdge,
        scored: !!gw, removed: !gw });
      gemsCopy.splice(gemsCopy.indexOf(gem), 1);
      continue;
    }
    steps.push({ gemId: gem.id, gemType: gem.type, gemPoints: gem.points,
      fromQ: gem.q, fromR: gem.r, entryEdge: gem.entryEdge, exitEdge,
      scored: false, removed: false });
    gem.q = nb.q; gem.r = nb.r; gem.entryEdge = oppEdge(exitEdge);
    const nbCell = G.grid.get(`${nb.q},${nb.r}`);
    if (nbCell && nbCell.tile) queue.push(gem);
  }
  return steps;
}

function startGemAnimation(steps, onDone) {
  ANIM.active = true;
  ANIM.onDone = onDone;
  ANIM.perGem = {};
  for (const s of steps) {
    if (!ANIM.perGem[s.gemId]) {
      ANIM.perGem[s.gemId] = { type: s.gemType, points: s.gemPoints,
        steps: [], stepIdx: 0, t: 0, pos: null, visible: true, done: false };
    }
    ANIM.perGem[s.gemId].steps.push(s);
  }
  const dist = HEX_SIZE * 0.82;
  for (const ga of Object.values(ANIM.perGem)) {
    const s0 = ga.steps[0];
    const {x, y} = hexToPixel(s0.fromQ, s0.fromR, HEX_SIZE, ox(), oy());
    ga.pos = edgePt(x, y, s0.entryEdge, dist);
  }
  const STEP_MS = 300;
  let lastTs = null;
  function frame(ts) {
    if (!ANIM.active) return;
    const dt = lastTs === null ? 16 : Math.min(ts - lastTs, 60);
    lastTs = ts;
    let anyActive = false;
    for (const ga of Object.values(ANIM.perGem)) {
      if (ga.done) continue;
      anyActive = true;
      const step = ga.steps[ga.stepIdx];
      const {x, y} = hexToPixel(step.fromQ, step.fromR, HEX_SIZE, ox(), oy());
      const p1 = edgePt(x, y, step.entryEdge, dist);
      const p2 = edgePt(x, y, step.exitEdge, dist);
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const tb = 0.35;
      const cp = { x: x*tb + mx*(1-tb), y: y*tb + my*(1-tb) };
      ga.t += dt / STEP_MS;
      const t = Math.min(ga.t, 1), u = 1 - t;
      ga.pos = {
        x: u*u*p1.x + 2*u*t*cp.x + t*t*p2.x,
        y: u*u*p1.y + 2*u*t*cp.y + t*t*p2.y,
      };
      if (ga.t >= 1) {
        ga.stepIdx++;
        ga.t = 0;
        if (ga.stepIdx >= ga.steps.length) {
          const last = ga.steps[ga.steps.length - 1];
          if (last.scored || last.removed) ga.visible = false;
          ga.done = true;
        }
      }
    }
    draw();
    if (!anyActive) { ANIM.active = false; ANIM.onDone(); return; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function scoreGem(gem, gw) {
  const owners = gatewayOwners(gw);
  owners.forEach(pid => {
    G.players[pid].score += gem.points;
  });
  G.gems = G.gems.filter(g => g !== gem);
  updateScoreUI();
}

function checkGameOver() {
  if (G.tileDeck.length === 0 && !G.currentTile) return true;
  if (G.gems.length === 0) return true;
  // Check if any empty hex exists
  for (const [, cell] of G.grid) {
    if (!cell.tile) return false;
  }
  return true;
}

function endTurn() {
  G.currentTile = drawTile();
  if (checkGameOver()) {
    G.phase = 'GAMEOVER';
    showGameOver();
    return;
  }
  G.currentPlayer = 1 - G.currentPlayer;
  setStatus(G.currentPlayer);
  draw();
  drawPreview();

  if (G.players[G.currentPlayer].isAI && G.phase === 'PLAYING') {
    G.aiThinking = true;
    const delay = G.diff === 'hard' ? 600 : G.diff === 'normal' ? 400 : 200;
    setTimeout(aiTurn, delay);
  }
}

// ─── AI ───────────────────────────────────────────────────────
function aiTurn() {
  if (G.phase !== 'PLAYING') { G.aiThinking = false; return; }
  const move = aiPickMove();
  if (move) {
    G.currentTile = makeTile(G.currentTile.type, move.rot);
    placeTile(move.q, move.r, G.currentTile);
    // endTurn called by placeTile via animation callback
  } else {
    G.aiThinking = false;
    endTurn();
  }
}

function aiPickMove() {
  const aiPid = G.currentPlayer;
  const humanPid = 1 - aiPid;
  const empty = [];
  for (const [, cell] of G.grid) {
    if (!cell.tile) empty.push({q: cell.q, r: cell.r});
  }
  if (empty.length === 0 || !G.currentTile) return null;

  let best = null, bestScore = -Infinity;

  for (const {q, r} of empty) {
    for (let rot = 0; rot < 6; rot++) {
      const tile = makeTile(G.currentTile.type, rot);
      const score = evalMove(q, r, tile, aiPid, humanPid);
      // Add small randomness for easy mode
      const rand = G.diff === 'easy' ? Math.random()*2 - 1 : Math.random()*0.3;
      if (score + rand > bestScore) {
        bestScore = score + rand;
        best = {q, r, rot};
      }
    }
  }
  return best;
}

function evalMove(q, r, tile, aiPid, humanPid) {
  // Simulate tile placement and gem propagation on a lightweight clone
  const savedTile = G.grid.get(`${q},${r}`).tile;
  const gemSnap = G.gems.map(g => ({...g}));
  const scoreSnap = G.players.map(p => p.score);

  G.grid.get(`${q},${r}`).tile = tile;
  // activate resting gems
  G.gems.forEach(gem => {
    if (gem.q === q && gem.r === r && gem.entryEdge === null) {
      gem.entryEdge = tile.paths[0][0];
    }
  });
  propagateGems();

  const aiDelta = G.players[aiPid].score - scoreSnap[aiPid];
  const humanDelta = G.players[humanPid].score - scoreSnap[humanPid];

  // Hard mode: consider gem-adjacent potential
  let potential = 0;
  if (G.diff === 'hard') {
    G.gems.forEach(gem => {
      const cell = G.grid.get(`${gem.q},${gem.r}`);
      if (!cell || !cell.tile || gem.entryEdge === null) return;
      const exitEdge = getExitEdge(cell.tile.paths, gem.entryEdge);
      if (exitEdge === null) return;
      const nb = hexNeighbor(gem.q, gem.r, exitEdge);
      if (!isOnBoard(nb.q, nb.r)) {
        const gw = findGateway(gem.q, gem.r, exitEdge);
        if (gw) {
          const owners = gatewayOwners(gw);
          if (owners.includes(aiPid)) potential += gem.points * 0.3;
          if (owners.includes(humanPid)) potential -= gem.points * 0.2;
        }
      }
    });
  }

  // Restore state
  G.grid.get(`${q},${r}`).tile = savedTile;
  G.gems = gemSnap;
  G.players.forEach((p, i) => { p.score = scoreSnap[i]; });

  return aiDelta * 10 - humanDelta * 8 + potential;
}

// ─── UI helpers ───────────────────────────────────────────────
function updateScoreUI() {
  document.getElementById('s0').textContent = G.players[0].score;
  document.getElementById('s1').textContent = G.players[1].score;
}

function setStatus(pid) {
  const el = document.getElementById('statusText');
  if (pid === 0) {
    el.innerHTML = '<span class="status-turn-p0">あなたのターン</span><br><small style="color:var(--muted)">タイルをクリックして配置</small>';
  } else {
    el.innerHTML = '<span class="status-turn-p1">AIが考えています…</span>';
  }
}

function showGameOver() {
  const s0 = G.players[0].score, s1 = G.players[1].score;
  const title = document.getElementById('overlayTitle');
  const msg = document.getElementById('overlayMsg');
  if (s0 > s1) {
    title.textContent = 'あなたの勝利！🎉';
    title.style.color = '#06b6d4';
  } else if (s1 > s0) {
    title.textContent = 'AIの勝利…';
    title.style.color = '#a855f7';
  } else {
    title.textContent = '引き分け！';
    title.style.color = '#e2e8f0';
  }
  msg.textContent = `最終スコア — あなた: ${s0}点 / AI: ${s1}点`;
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ─── Canvas drawing ───────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

// Compute canvas size from board
const ORIGIN_X = canvas.width / 2;
const ORIGIN_Y = canvas.height / 2;

function setupCanvas() {
  const boardPx = (BOARD_RADIUS * 2 + 1) * HEX_SIZE * Math.sqrt(3) + HEX_SIZE * 2.5;
  canvas.width  = Math.ceil(boardPx);
  canvas.height = Math.ceil(boardPx);
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg();
  drawCells();
  drawGateways();
  drawGems();
  if (G.hoverHex && !G.aiThinking && !ANIM.active && G.phase === 'PLAYING' && !G.players[G.currentPlayer].isAI) {
    drawHover();
  }
}

function drawBg() {
  ctx.fillStyle = '#06061a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

const ox = () => canvas.width / 2;
const oy = () => canvas.height / 2;

function drawCells() {
  for (const [, cell] of G.grid) {
    const {x, y} = hexToPixel(cell.q, cell.r, HEX_SIZE, ox(), oy());
    // Hex background
    ctx.beginPath();
    hexPath(ctx, x, y, HEX_SIZE * 0.95);
    ctx.fillStyle = 'rgba(28,32,68,0.92)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(130,145,220,0.65)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    if (cell.tile) drawTilePaths(x, y, cell.tile, 1);
  }
}

function hexPath(ctx, cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI/2 + i * Math.PI/3;
    const vx = cx + size * Math.cos(a);
    const vy = cy + size * Math.sin(a);
    if (i === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
  }
  ctx.closePath();
}

function drawTilePaths(cx, cy, tile, alpha) {
  const dist = HEX_SIZE * 0.82;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';

  tile.paths.forEach(([e1, e2]) => {
    const p1 = edgePt(cx, cy, e1, dist);
    const p2 = edgePt(cx, cy, e2, dist);
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    const t = 0.35;
    const cpx = cx * t + mx * (1-t);
    const cpy = cy * t + my * (1-t);

    // Outer glow
    ctx.strokeStyle = 'rgba(6,182,212,0.45)';
    ctx.lineWidth = 9;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(cpx, cpy, p2.x, p2.y);
    ctx.stroke();

    // Main path
    ctx.strokeStyle = '#06b6d4';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.quadraticCurveTo(cpx, cpy, p2.x, p2.y);
    ctx.stroke();
  });
  ctx.restore();
}

function drawGateways() {
  GW_DEFS.forEach(gw => {
    const {x, y} = hexToPixel(gw.q, gw.r, HEX_SIZE, ox(), oy());
    const a = -Math.PI/3 + gw.edge * Math.PI/3;
    const gx = x + HEX_SIZE * 1.28 * Math.cos(a);
    const gy = y + HEX_SIZE * 1.28 * Math.sin(a);

    const owners = gatewayOwners(gw);
    const r = 9;

    if (owners.length === 1) {
      ctx.beginPath();
      ctx.arc(gx, gy, r, 0, Math.PI*2);
      ctx.fillStyle = PLAYER_COLORS[owners[0]];
      ctx.fill();
    } else {
      // Split circle
      owners.forEach((pid, i) => {
        ctx.beginPath();
        ctx.arc(gx, gy, r, Math.PI * i, Math.PI * (i+1));
        ctx.lineTo(gx, gy);
        ctx.closePath();
        ctx.fillStyle = PLAYER_COLORS[pid];
        ctx.fill();
      });
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(gx, gy, r, 0, Math.PI*2);
    ctx.stroke();
  });
}

function drawGemAt(x, y, type, points) {
  const cfg = GEM_CONFIG[type];
  const grad = ctx.createRadialGradient(x, y, 0, x, y, 18);
  grad.addColorStop(0, cfg.glow);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI*2);
  ctx.fill();
  const s = 9;
  ctx.beginPath();
  ctx.moveTo(x, y-s);
  ctx.lineTo(x+s*0.8, y);
  ctx.lineTo(x, y+s);
  ctx.lineTo(x-s*0.8, y);
  ctx.closePath();
  ctx.fillStyle = cfg.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(points, x, y);
}

function drawGems() {
  if (ANIM.active) {
    for (const [id, ga] of Object.entries(ANIM.perGem)) {
      if (!ga.visible || !ga.pos) continue;
      drawGemAt(ga.pos.x, ga.pos.y, ga.type, ga.points);
    }
    G.gems.forEach(gem => {
      if (ANIM.perGem[gem.id]) return;
      const {x, y} = hexToPixel(gem.q, gem.r, HEX_SIZE, ox(), oy());
      drawGemAt(x, y, gem.type, gem.points);
    });
    return;
  }
  G.gems.forEach(gem => {
    const {x, y} = hexToPixel(gem.q, gem.r, HEX_SIZE, ox(), oy());
    drawGemAt(x, y, gem.type, gem.points);
  });
}

function drawHover() {
  const {q, r} = G.hoverHex;
  const cell = G.grid.get(`${q},${r}`);
  if (!cell || cell.tile || !G.currentTile) return;

  const {x, y} = hexToPixel(q, r, HEX_SIZE, ox(), oy());
  ctx.save();
  ctx.globalAlpha = 0.45;
  hexPath(ctx, x, y, HEX_SIZE * 0.95);
  ctx.fillStyle = 'rgba(6,182,212,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  drawTilePaths(x, y, G.currentTile, 0.6);
}

// ─── Tile preview canvas ──────────────────────────────────────
const pc = document.getElementById('pc');
const pctx = pc.getContext('2d');

function drawPreview() {
  pctx.clearRect(0,0,pc.width,pc.height);
  pctx.fillStyle = '#0a0a18';
  pctx.fillRect(0,0,pc.width,pc.height);

  if (!G.currentTile) {
    pctx.fillStyle = '#475569';
    pctx.font = '13px sans-serif';
    pctx.textAlign = 'center';
    pctx.textBaseline = 'middle';
    pctx.fillText('タイルなし', 60, 60);
    return;
  }
  const cx = 60, cy = 60, sz = 40;
  // Hex bg
  hexPathOn(pctx, cx, cy, sz*0.95);
  pctx.fillStyle = 'rgba(28,32,68,0.92)';
  pctx.fill();
  pctx.strokeStyle = 'rgba(130,145,220,0.65)';
  pctx.lineWidth = 1.5;
  pctx.stroke();

  // Paths
  const dist = sz * 0.82;
  pctx.lineWidth = 4;
  pctx.lineCap = 'round';
  G.currentTile.paths.forEach(([e1, e2]) => {
    const p1 = edgePt(cx, cy, e1, dist);
    const p2 = edgePt(cx, cy, e2, dist);
    const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
    const cpx = cx*0.35 + mx*0.65;
    const cpy = cy*0.35 + my*0.65;

    pctx.strokeStyle = 'rgba(6,182,212,0.3)';
    pctx.lineWidth = 8;
    pctx.beginPath();
    pctx.moveTo(p1.x,p1.y);
    pctx.quadraticCurveTo(cpx,cpy,p2.x,p2.y);
    pctx.stroke();

    pctx.strokeStyle = '#06b6d4';
    pctx.lineWidth = 3;
    pctx.beginPath();
    pctx.moveTo(p1.x,p1.y);
    pctx.quadraticCurveTo(cpx,cpy,p2.x,p2.y);
    pctx.stroke();
  });
}

function hexPathOn(c, cx, cy, size) {
  c.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI/2 + i * Math.PI/3;
    const vx = cx + size * Math.cos(a);
    const vy = cy + size * Math.sin(a);
    if (i === 0) c.moveTo(vx, vy); else c.lineTo(vx, vy);
  }
  c.closePath();
}

// ─── Input ────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  if (G.phase !== 'PLAYING' || G.aiThinking || ANIM.active) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * sx;
  const py = (e.clientY - rect.top) * sy;
  const h = pixelToHex(px, py, HEX_SIZE, ox(), oy());
  if (isOnBoard(h.q, h.r)) {
    G.hoverHex = h;
  } else {
    G.hoverHex = null;
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  G.hoverHex = null;
  draw();
});

canvas.addEventListener('click', e => {
  if (G.phase !== 'PLAYING' || G.aiThinking || ANIM.active || G.players[G.currentPlayer].isAI) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * sx;
  const py = (e.clientY - rect.top) * sy;
  const h = pixelToHex(px, py, HEX_SIZE, ox(), oy());
  if (!isOnBoard(h.q, h.r)) return;
  const cell = G.grid.get(`${h.q},${h.r}`);
  if (!cell || cell.tile || !G.currentTile) return;

  placeTile(h.q, h.r, G.currentTile);
});

canvas.addEventListener('wheel', e => {
  if (G.phase !== 'PLAYING' || G.aiThinking) return;
  e.preventDefault();
  rotTile(e.deltaY > 0 ? 1 : -1);
}, {passive:false});

function rotTile(dir) {
  if (!G.currentTile) return;
  const newRot = ((G.currentTile.rot + dir) % 6 + 6) % 6;
  G.currentTile = makeTile(G.currentTile.type, newRot);
  draw();
  drawPreview();
}

document.getElementById('rotL').addEventListener('click', () => rotTile(-1));
document.getElementById('rotR').addEventListener('click', () => rotTile(1));
document.getElementById('newGame').addEventListener('click', resetGame);
document.getElementById('diffSel').addEventListener('change', () => {
  if (G) G.diff = document.getElementById('diffSel').value;
});

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') rotTile(1);
  if (e.key === 'e' || e.key === 'E') rotTile(-1);
});

// Touch support: tap to place
canvas.addEventListener('touchend', e => {
  if (G.phase !== 'PLAYING' || G.aiThinking || ANIM.active || G.players[G.currentPlayer].isAI) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const px = (t.clientX - rect.left) * sx;
  const py = (t.clientY - rect.top) * sy;
  const h = pixelToHex(px, py, HEX_SIZE, ox(), oy());
  if (!isOnBoard(h.q, h.r)) return;
  const cell = G.grid.get(`${h.q},${h.r}`);
  if (!cell || cell.tile || !G.currentTile) return;
  placeTile(h.q, h.r, G.currentTile);
}, {passive:false});

// ─── Bootstrap ────────────────────────────────────────────────
setupCanvas();
resetGame();
</script>
