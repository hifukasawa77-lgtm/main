name: Garmin Data Sync

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分
  workflow_dispatch:       # 手動トリガー

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install garmin-connect
        run: npm install garmin-connect

      - name: Fetch Garmin data
        run: node scripts/fetch-garmin.js
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}

      - name: Commit garmin-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin-data.json
          if git diff --cached --quiet; then
            echo "データに変化なし。スキップ。"
          else
            git commit -m "chore: Garmin データ更新 $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
