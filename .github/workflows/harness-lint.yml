name: ハーネス整合性チェック

# .claude/（エージェント定義・スキル・フック・settings.json）に変更が入ったら
# harness-lint.sh を自動実行し、ドリフト/死蔵/同期ズレを機械的に検出する。
# 再帰的自己改善ループの「強制」段: 手作業監査に頼らず、CIで恒久的にガードする。
on:
  push:
    paths:
      - '.claude/**'
      - '.github/workflows/harness-lint.yml'
  pull_request:
    paths:
      - '.claude/**'
      - '.github/workflows/harness-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: harness-lint を実行
        run: bash .claude/skills/self-improve/harness-lint.sh
