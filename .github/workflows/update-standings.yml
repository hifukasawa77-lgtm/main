name: Jリーグ順位表を更新

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 0:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Jリーグ順位表をESPN APIから取得
        run: |
          mkdir -p data

          fetch_standings() {
            local slug=$1
            curl -s --max-time 15 \
              -H "Accept: application/json" \
              "https://site.api.espn.com/apis/site/v2/sports/soccer/${slug}/standings"
          }

          J1=$(fetch_standings "jpn.1")
          J2=$(fetch_standings "jpn.2")
          J3=$(fetch_standings "jpn.3")

          parse_entries() {
            echo "$1" | jq -c '
              ( .standings.entries //
                (.children[0].standings.entries) //
                (.children[0].children[0].standings.entries) //
                [] )
              | map({
                  intRank: ((.stats // []) | map(select(.name=="rank")) | first | .displayValue // "0"),
                  strTeam: (.team.displayName // ""),
                  intPlayed: ((.stats // []) | map(select(.name=="gamesPlayed")) | first | .displayValue // "0"),
                  intWin:   ((.stats // []) | map(select(.name=="wins"))        | first | .displayValue // "0"),
                  intLoss:  ((.stats // []) | map(select(.name=="losses"))      | first | .displayValue // "0"),
                  intDraw:  ((.stats // []) | map(select(.name=="ties"))        | first | .displayValue // "0"),
                  intPoints:((.stats // []) | map(select(.name=="points"))      | first | .displayValue // "0"),
                  strTeamBadge: (.team.logos[0].href // "")
                })'
          }

          J1_ROWS=$(parse_entries "$J1")
          J2_ROWS=$(parse_entries "$J2")
          J3_ROWS=$(parse_entries "$J3")

          jq -n \
            --argjson j1 "$J1_ROWS" \
            --argjson j2 "$J2_ROWS" \
            --argjson j3 "$J3_ROWS" \
            --arg updated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{j1: $j1, j2: $j2, j3: $j3, updated: $updated}' \
            > data/standings.json

          echo "J1: $(echo $J1_ROWS | jq length) teams"
          echo "J2: $(echo $J2_ROWS | jq length) teams"
          echo "J3: $(echo $J3_ROWS | jq length) teams"

      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "Jリーグ順位表を更新 [skip ci]"
            git push
          fi
