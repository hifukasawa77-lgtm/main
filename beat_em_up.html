<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BLACK FANG: Streets of New York</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f4f0dd;
      --gold: #f6c21a;
      --red: #e84122;
      --blue: #2e8bff;
      --panel: #10131b;
      --line: #6d5a38;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050507;
      color: var(--ink);
      font-family: "Yu Gothic", "Meiryo", "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(8px, 2vw, 20px);
    }

    .shell {
      width: min(100%, 1180px);
      display: grid;
      gap: 10px;
    }

    .marquee {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 0 4px;
      letter-spacing: 0;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand strong {
      color: var(--gold);
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(24px, 4vw, 48px);
      letter-spacing: 0;
      text-shadow: 3px 3px 0 #4b160c;
      white-space: nowrap;
    }

    .brand span {
      color: #d9d2bf;
      font-size: clamp(12px, 1.6vw, 16px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .coins {
      color: #f3f3ef;
      font-family: "Courier New", monospace;
      font-weight: 800;
      font-size: clamp(12px, 1.8vw, 18px);
      text-align: right;
      white-space: nowrap;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 86px);
      border: 2px solid var(--line);
      background: #020204;
      box-shadow: 0 0 0 4px #111, 0 18px 80px rgba(0, 0, 0, 0.72);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      background: #07070a;
    }

    .character-select,
    .game-over,
    .pause {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(4, 6, 10, 0.74), rgba(4, 6, 10, 0.92)),
        radial-gradient(circle at 50% 45%, rgba(232, 65, 34, 0.18), transparent 42%);
      padding: clamp(14px, 3vw, 32px);
    }

    .pause {
      display: none;
      background: rgba(0, 0, 0, 0.54);
    }

    .pause.is-visible {
      display: grid;
    }

    .select-panel,
    .result-panel,
    .pause-panel {
      width: min(100%, 940px);
      border: 2px solid var(--line);
      background: rgba(12, 14, 20, 0.96);
      padding: clamp(14px, 2.5vw, 26px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
    }

    .select-heading {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(246, 194, 26, 0.36);
      padding-bottom: 10px;
    }

    .select-heading h1 {
      margin: 0;
      color: var(--gold);
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(30px, 6vw, 70px);
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: 4px 4px 0 #52170c;
    }

    .select-heading p {
      margin: 0;
      color: #fbfbf7;
      font-weight: 800;
      text-align: right;
      font-size: clamp(13px, 1.8vw, 18px);
    }

    .fighters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .fighter {
      appearance: none;
      border: 2px solid #36352f;
      border-radius: 6px;
      background: linear-gradient(180deg, #171b25, #080a0f);
      color: var(--ink);
      min-height: 220px;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-rows: 94px auto auto;
      gap: 8px;
      transition: transform 120ms ease, border-color 120ms ease, filter 120ms ease;
    }

    .fighter:hover,
    .fighter:focus-visible {
      transform: translateY(-2px);
      border-color: var(--gold);
      outline: none;
      filter: brightness(1.12);
    }

    .portrait {
      position: relative;
      width: 92px;
      height: 92px;
      margin: 0 auto;
      background-image: url("assets/black-fang/actors.png");
      background-repeat: no-repeat;
      background-size: 400% 200%;
      filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.36));
    }

    .portrait::before,
    .portrait::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: var(--skin);
      box-shadow: inset -7px 0 rgba(0, 0, 0, 0.24);
      display: none;
    }

    .portrait::before {
      top: 6px;
      width: 34px;
      height: 38px;
      border-radius: 45% 45% 38% 38%;
    }

    .portrait::after {
      top: 44px;
      width: 70px;
      height: 46px;
      border-radius: 20px 20px 6px 6px;
      background: var(--coat);
    }

    .portrait .hair {
      position: absolute;
      left: 24px;
      top: 0;
      width: 44px;
      height: 20px;
      border-radius: 50% 50% 18% 18%;
      background: var(--hair);
      z-index: 2;
      display: none;
    }

    .portrait .arm {
      position: absolute;
      width: 18px;
      height: 52px;
      border-radius: 12px;
      background: var(--skin);
      top: 44px;
      z-index: 3;
      display: none;
    }

    .portrait .arm.left {
      left: 7px;
      transform: rotate(22deg);
    }

    .portrait .arm.right {
      right: 7px;
      transform: rotate(-22deg);
    }

    .fighter[data-hero="jack"] .portrait {
      background-position: 0% 0%;
    }

    .fighter[data-hero="kotaro"] .portrait {
      background-position: 33.333% 0%;
    }

    .fighter[data-hero="mike"] .portrait {
      background-position: 66.666% 0%;
    }

    .fighter h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(18px, 2.2vw, 28px);
      letter-spacing: 0;
    }

    .fighter p {
      margin: 0;
      color: #d8d2c3;
      font-size: clamp(12px, 1.5vw, 15px);
      line-height: 1.45;
    }

    .fighter small {
      color: #8bc1ff;
      font-weight: 800;
      font-size: 12px;
    }

    .hud-note {
      display: flex;
      gap: 10px;
      justify-content: center;
      color: #cabf9e;
      font-family: "Courier New", monospace;
      font-weight: 700;
      font-size: 12px;
      min-height: 16px;
    }

    .game-over {
      display: none;
    }

    .game-over.is-visible {
      display: grid;
    }

    .result-panel,
    .pause-panel {
      width: min(100%, 520px);
      text-align: center;
    }

    .result-panel h2,
    .pause-panel h2 {
      color: var(--gold);
      margin: 0 0 10px;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(36px, 7vw, 70px);
      letter-spacing: 0;
      text-shadow: 3px 3px 0 #50160d;
    }

    .result-panel p,
    .pause-panel p {
      margin: 0 0 18px;
      line-height: 1.6;
      color: #e8e0ca;
    }

    .arcade-button {
      appearance: none;
      border: 2px solid #8f6d19;
      border-radius: 6px;
      background: #161922;
      color: var(--gold);
      padding: 12px 18px;
      min-width: 160px;
      font-weight: 900;
      cursor: pointer;
    }

    .touch-pad {
      position: absolute;
      inset: auto 12px 12px 12px;
      display: none;
      justify-content: space-between;
      align-items: end;
      pointer-events: none;
    }

    .touch-cluster {
      display: grid;
      grid-template-columns: repeat(3, 42px);
      grid-template-rows: repeat(3, 42px);
      gap: 5px;
      pointer-events: auto;
    }

    .touch-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .touch-btn {
      width: 46px;
      height: 46px;
      border: 2px solid rgba(246, 194, 26, 0.7);
      border-radius: 50%;
      background: rgba(15, 17, 24, 0.72);
      color: var(--gold);
      font-weight: 900;
      display: grid;
      place-items: center;
      user-select: none;
      touch-action: none;
    }

    .touch-btn[data-key="ArrowUp"] { grid-column: 2; grid-row: 1; }
    .touch-btn[data-key="ArrowLeft"] { grid-column: 1; grid-row: 2; }
    .touch-btn[data-key="ArrowRight"] { grid-column: 3; grid-row: 2; }
    .touch-btn[data-key="ArrowDown"] { grid-column: 2; grid-row: 3; }

    @media (max-width: 720px), (pointer: coarse) {
      body {
        padding: 6px;
      }

      .marquee {
        min-height: 34px;
      }

      .brand span,
      .coins {
        display: none;
      }

      .stage {
        max-height: calc(100vh - 46px);
      }

      .fighters {
        grid-template-columns: 1fr;
        max-height: min(72vh, 620px);
        overflow: auto;
      }

      .fighter {
        min-height: 142px;
        grid-template-columns: 94px 1fr;
        grid-template-rows: auto auto auto;
      }

      .portrait {
        grid-row: 1 / 4;
      }

      .touch-pad {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="marquee" aria-label="game marquee">
      <div class="brand">
        <strong>BLACK FANG</strong>
        <span>STREETS OF NEW YORK</span>
      </div>
      <div class="coins">INSERT COIN</div>
    </header>

    <section class="stage">
      <canvas id="game" width="960" height="540"></canvas>

      <div id="select" class="character-select">
        <div class="select-panel">
          <div class="select-heading">
            <h1>BLACK FANG</h1>
            <p>ニューヨーク奪還作戦</p>
          </div>
          <div class="fighters">
            <button class="fighter" data-hero="jack" style="--skin:#d58a54;--coat:#246cc2;--hair:#7d3b18">
              <span class="portrait"><span class="hair"></span><span class="arm left"></span><span class="arm right"></span></span>
              <h2>ジャック・ターナー</h2>
              <p>熱血刑事。警棒コンビネーションで群れを押し返す。</p>
              <small>バランス型 / 近距離連打</small>
            </button>
            <button class="fighter" data-hero="kotaro" style="--skin:#c98456;--coat:#1e335d;--hair:#14110f">
              <span class="portrait"><span class="hair"></span><span class="arm left"></span><span class="arm right"></span></span>
              <h2>コタロウ</h2>
              <p>古武術の達人。素早い踏み込みと居合抜きで斬り込む。</p>
              <small>スピード型 / 広いリーチ</small>
            </button>
            <button class="fighter" data-hero="mike" style="--skin:#c57f4a;--coat:#566237;--hair:#d99218">
              <span class="portrait"><span class="hair"></span><span class="arm left"></span><span class="arm right"></span></span>
              <h2>マイク・サンダース</h2>
              <p>元海兵隊員。重い一撃と投げ技で正面突破する。</p>
              <small>パワー型 / 高耐久</small>
            </button>
          </div>
        </div>
      </div>

      <div id="pause" class="pause">
        <div class="pause-panel">
          <h2>PAUSE</h2>
          <p>ブラック・ファングの制圧作戦は一時停止中。</p>
          <button class="arcade-button" id="resume">RESUME</button>
        </div>
      </div>

      <div id="gameOver" class="game-over">
        <div class="result-panel">
          <h2 id="resultTitle">GAME OVER</h2>
          <p id="resultCopy">ブラック・ファングはまだ街に潜んでいる。</p>
          <button class="arcade-button" id="restart">RESTART</button>
        </div>
      </div>

      <div class="touch-pad" aria-hidden="true">
        <div class="touch-cluster">
          <div class="touch-btn" data-key="ArrowUp">▲</div>
          <div class="touch-btn" data-key="ArrowLeft">◀</div>
          <div class="touch-btn" data-key="ArrowRight">▶</div>
          <div class="touch-btn" data-key="ArrowDown">▼</div>
        </div>
        <div class="touch-actions">
          <div class="touch-btn" data-key="j">A</div>
          <div class="touch-btn" data-key="k">J</div>
          <div class="touch-btn" data-key="l">S</div>
        </div>
      </div>
    </section>
    <div class="hud-note">© 1987-STYLE ARCADE PROTOTYPE</div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const select = document.getElementById("select");
    const gameOver = document.getElementById("gameOver");
    const resultTitle = document.getElementById("resultTitle");
    const resultCopy = document.getElementById("resultCopy");
    const pauseLayer = document.getElementById("pause");
    const resumeButton = document.getElementById("resume");
    const restartButton = document.getElementById("restart");

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Map();
    const laneTop = 318;
    const laneBottom = 456;
    const gravity = 0.72;
    const rand = (a, b) => a + Math.random() * (b - a);
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const now = () => performance.now();

    function loadImage(src) {
      const img = new Image();
      img.src = src;
      return img;
    }

    const assets = {
      bgBronx: loadImage("assets/black-fang/bg-bronx.png"),

    const stages = [
      {
        id: "bronx",
        title: "STAGE 1  ブロンクス・スラム街",
        story: "商店街襲撃事件。スパイクの群れを突破せよ。",
        width: 2480,
        sky: ["#110a24", "#090910"],
        floor: "#343448",
        accent: "#e84122",
        bossName: "スパイク",
        waves: [
          { x: 260, enemies: [["spike", 420], ["spike", 540], ["spike", 660]] },
          { x: 760, enemies: [["viper", 940], ["spike", 1020], ["knife", 1110]] },
          { x: 1360, enemies: [["spike", 1510], ["knife", 1610], ["viper", 1710]] },

        ],

        ],

      },
      {

        sky: ["#06152c", "#05070c"],

        accent: "#2e8bff",
        bossName: "ブルドッグ",
        waves: [

          { x: 860, enemies: [["madDog", 1070], ["spike", 1180], ["viper", 1300]] },
          { x: 1560, enemies: [["bulldog", 1760], ["spike", 1680], ["knife", 1880]] },

    const enemyDefs = {

    };

    let state = makeInitialState();
    let lastFrame = now();

    function makeInitialState(heroKey = "jack") {
      return {
        mode: "select",
        paused: false,
        heroKey,
        heroDef: heroDefs[heroKey],
        stageIndex: 0,
        camera: 0,
        score: 0,
        lives: 3,
        time: 85,
        timeTick: 0,
        message: "",
        messageUntil: 0,
        transition: 0,
        player: null,
        enemies: [],
        props: [],
        projectiles: [],
        sparks: [],
        activeWave: 0,
        stageClearDelay: 0
      };
    }

    function bootHero(heroKey) {
      const def = heroDefs[heroKey];
      state = makeInitialState(heroKey);
      state.mode = "play";
      state.player = {
        kind: "player",
        x: 140,
        y: 408,
        z: 0,
        vz: 0,
        w: 44,
        h: 76,
        facing: 1,
        hp: def.hp,
        maxHp: def.hp,
        invuln: 0,
        attacking: 0,
        attackType: "",
        attackHit: false,
        combo: 0,
        comboUntil: 0,
        specialCooldown: 0,
        jumpAttack: 0,
        hurt: 0
      };
      loadStage(0);
      showMessage(state.heroDef.quote, 2100);
      select.style.display = "none";
      gameOver.classList.remove("is-visible");
      pauseLayer.classList.remove("is-visible");
    }

    function loadStage(index) {
      const stage = stages[index];
      state.stageIndex = index;
      state.camera = 0;
      state.activeWave = 0;
      state.stageClearDelay = 0;
      state.time = 85;
      state.enemies = [];
      state.projectiles = [];
      state.sparks = [];
      state.props = stage.props.map(([type, x, y], i) => ({
        id: `${type}-${i}`,
        type,
        x,
        y,
        hp: type === "container" ? 42 : type === "forklift" ? 36 : type === "crane" ? 999 : 24,
        broken: false
      }));
      state.player.x = 120;
      state.player.y = 408;
      showMessage(stage.story, 2500);
    }

    function showMessage(text, ms) {
      state.message = text;
      state.messageUntil = now() + ms;
    }

    function spawnWave() {
      const stage = stages[state.stageIndex];
      const wave = stage.waves[state.activeWave];
      if (!wave) return;
      for (const [type, x] of wave.enemies) {
        const def = enemyDefs[type];
        state.enemies.push({
          kind: "enemy",
          type,
          label: def.label,
          x,
          y: rand(laneTop + 30, laneBottom - 8),
          z: 0,
          vz: 0,
          w: def.big ? 62 : 42,
          h: def.big ? 92 : 70,
          facing: -1,
          hp: def.hp,
          maxHp: def.hp,
          attackCooldown: rand(220, 760),
          attacking: 0,
          attackHit: false,
          hurt: 0,
          invuln: 0,
          dead: false,
          death: 0,
          aiSeed: rand(0, 10),
          bikeCharge: def.bike ? rand(900, 1400) : 0
        });
      }
      state.activeWave += 1;
    }

    function update(dt) {
      if (state.mode !== "play" || state.paused) return;
      const player = state.player;
      const stage = stages[state.stageIndex];
      state.timeTick += dt;
      if (state.timeTick >= 1000) {
        state.timeTick -= 1000;
        state.time = Math.max(0, state.time - 1);
        if (state.time === 0) damagePlayer(999, 0);
      }

      const nextWave = stage.waves[state.activeWave];
      if (nextWave && player.x > nextWave.x && state.enemies.filter(e => !e.dead).length < 5) {
        spawnWave();
      }

      updatePlayer(player, dt, stage);
      updateEnemies(dt);
      updateProjectiles(dt);
      updateProps(dt);
      updateSparks(dt);
      updateCamera(stage);
      checkStageClear(dt, stage);
    }

    function updatePlayer(player, dt, stage) {
      let mx = 0;
      let my = 0;
      if (pressed("ArrowLeft") || pressed("a")) mx -= 1;
      if (pressed("ArrowRight") || pressed("d")) mx += 1;
      if (pressed("ArrowUp") || pressed("w")) my -= 1;
      if (pressed("ArrowDown") || pressed("s")) my += 1;
      player.moving = mx !== 0 || my !== 0;
      player.dashing = player.moving && (pressed("Shift") || pressed("ShiftLeft") || pressed("ShiftRight"));
      const speed = state.heroDef.speed * (player.attacking ? 0.42 : 1) * (player.dashing ? 1.45 : 1);
      if (mx !== 0 || my !== 0) {
        const len = Math.hypot(mx, my) || 1;
        mx /= len;
        my /= len;
        player.facing = mx < 0 ? -1 : mx > 0 ? 1 : player.facing;
      }
      player.x = clamp(player.x + mx * speed, 20, stage.width - 80);
      player.y = clamp(player.y + my * speed * 0.78, laneTop + 22, laneBottom);
      if (player.z > 0 || player.vz > 0) {
        player.z += player.vz;
        player.vz -= gravity;
        if (player.z <= 0) {
          player.z = 0;
          player.vz = 0;
          player.jumpAttack = 0;
        }
      }
      player.attacking = Math.max(0, player.attacking - dt);
      player.specialCooldown = Math.max(0, player.specialCooldown - dt);
      player.invuln = Math.max(0, player.invuln - dt);
      player.hurt = Math.max(0, player.hurt - dt);
      player.comboUntil = Math.max(0, player.comboUntil - dt);
      if (player.comboUntil === 0) player.combo = 0;
      if ((pressed("k") || pressed(" ")) && player.z === 0 && player.attacking === 0) {
        player.z = 2;
        player.vz = 11;
        player.jumpAttack = 1;
        player.attacking = 440;
        player.attackType = "jump";
        player.attackHit = false;
      }
      if (pressedTap("j") && player.attacking === 0) {
        player.combo = player.comboUntil > 0 ? (player.combo + 1) % 3 : 0;
        player.comboUntil = 700;
        player.attacking = player.combo === 2 ? 360 : 250;
        player.attackType = player.combo === 2 ? "combo" : "punch";
        player.attackHit = false;
      }
      if (pressedTap("l") && player.specialCooldown === 0 && player.attacking === 0) {
        player.attacking = 560;
        player.attackType = "special";
        player.attackHit = false;
        player.specialCooldown = 1450;
      }
      if (player.attacking > 0 && !player.attackHit && player.attacking < attackActiveWindow(player.attackType)) {
        resolvePlayerAttack(player);
        player.attackHit = true;
      }
    }

    function attackActiveWindow(type) {
      if (type === "special") return 420;
      if (type === "jump") return 330;
      if (type === "combo") return 250;
      return 180;
    }

    function resolvePlayerAttack(player) {
      const def = state.heroDef;
      const reach = def.reach + (player.attackType === "special" ? 36 : 0) + (player.attackType === "jump" ? 28 : 0);
      const damage = def.attack + (player.attackType === "special" ? 14 : 0) + (player.attackType === "jump" ? 6 : 0) + (player.attackType === "combo" ? 7 : 0);
      const arc = {
        x: player.x + player.facing * reach * 0.55,
        y: player.y,
        w: reach,
        h: 48
      };
      let landed = false;
      for (const enemy of state.enemies) {
        if (enemy.dead || enemy.invuln > 0) continue;
        if (Math.abs(enemy.y - player.y) < 44 && Math.abs(enemy.x - arc.x) < (arc.w * 0.62 + enemy.w * 0.45)) {
          damageEnemy(enemy, damage, player.facing, player.attackType);
          landed = true;
        }
      }
      for (const prop of state.props) {
        if (prop.broken || prop.hp > 900) continue;
        if (Math.abs(prop.y - player.y) < 72 && Math.abs(prop.x - arc.x) < arc.w * 0.62 + 32) {
          prop.hp -= damage;
          addSpark(prop.x, prop.y - 40, "#f6c21a", 8);
          if (prop.hp <= 0) breakProp(prop);
          landed = true;
        }
      }
      if (landed) {
        state.score += 10;
      }
    }

    function damageEnemy(enemy, amount, dir, type) {
      const def = enemyDefs[enemy.type];
      enemy.hp -= amount;
      enemy.hurt = 220;
      enemy.invuln = 120;
      enemy.x += dir * (type === "special" ? 26 : 12);
      addSpark(enemy.x, enemy.y - enemy.h * 0.7, type === "special" ? "#7ed9ff" : "#ffe18b", 12);
      if (enemy.hp <= 0) {
        enemy.dead = true;
        enemy.death = 760;
        enemy.vz = 7;
        enemy.z = 1;
        state.score += def.score;
        showMessage(`${enemy.label} 撃破`, 900);
      }
    }

    function updateEnemies(dt) {
      const player = state.player;
      for (const enemy of state.enemies) {
        const def = enemyDefs[enemy.type];
        if (enemy.dead) {
          enemy.death -= dt;
          enemy.z += enemy.vz;
          enemy.vz -= gravity;
          if (enemy.z < 0) enemy.z = 0;
          continue;
        }
        enemy.attackCooldown = Math.max(0, enemy.attackCooldown - dt);
        enemy.attacking = Math.max(0, enemy.attacking - dt);
        enemy.invuln = Math.max(0, enemy.invuln - dt);
        enemy.hurt = Math.max(0, enemy.hurt - dt);
        enemy.facing = player.x < enemy.x ? -1 : 1;
        if (enemy.hurt > 0) continue;

        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (def.bike) {
          enemy.bikeCharge -= dt;
          if (enemy.bikeCharge <= 0 && absDx < 540) {
            enemy.attacking = 760;
            enemy.attackHit = false;
            enemy.bikeCharge = rand(1800, 2600);
          }
        }

        if (def.projectile && enemy.attackCooldown === 0 && absDx > 140 && absDx < 520 && absDy < 52) {
          state.projectiles.push({
            x: enemy.x + enemy.facing * 28,
            y: enemy.y - 42,
            vx: enemy.facing * 5.2,
            vy: rand(-0.25, 0.25),
            life: 1500,
            damage: def.attack + 3,
            owner: "enemy"
          });
          enemy.attackCooldown = def.cooldown + rand(0, 500);
          enemy.attacking = 260;
          continue;
        }

        if (enemy.attacking > 0) {
          if (!enemy.attackHit && enemy.attacking < (def.bike ? 560 : 300)) {
            if (absDx < def.range + (def.bike ? 42 : 0) && absDy < 42) {
              damagePlayer(def.attack + (def.bike ? 5 : 0), enemy.facing);
              enemy.attackHit = true;
            }
          }
          if (def.bike) {
            enemy.x += enemy.facing * 5.8;
            enemy.y = clamp(enemy.y + Math.sin((now() + enemy.aiSeed) / 90) * 0.65, laneTop + 24, laneBottom);
          }
          continue;
        }

        if (absDx < def.range && absDy < 36 && enemy.attackCooldown === 0) {
          enemy.attacking = def.slide ? 420 : def.big ? 520 : 360;
          enemy.attackHit = false;
          enemy.attackCooldown = def.cooldown + rand(0, 460);
        } else {
          const targetY = player.y + Math.sin((now() / 420) + enemy.aiSeed) * 28;
          let mx = Math.sign(dx) * def.speed;
          let my = Math.sign(targetY - enemy.y) * def.speed * 0.42;
          if (absDx < def.range * 0.8) mx = 0;
          enemy.x = clamp(enemy.x + mx, 10, stages[state.stageIndex].width - 50);
          enemy.y = clamp(enemy.y + my, laneTop + 24, laneBottom);
        }
      }
      state.enemies = state.enemies.filter(enemy => !enemy.dead || enemy.death > 0);
    }

    function damagePlayer(amount, dir) {
      const player = state.player;
      if (player.invuln > 0) return;
      player.hp -= amount;
      player.invuln = 620;
      player.hurt = 300;
      player.x += dir * 18;
      addSpark(player.x, player.y - 56, "#ff5a2e", 16);
      if (player.hp <= 0) {
        state.lives -= 1;
        if (state.lives > 0) {
          player.hp = player.maxHp;
          player.x = Math.max(80, player.x - 120);
          player.invuln = 1600;
          showMessage("STAND UP!", 1100);
        } else {
          endGame(false);
        }
      }
    }

    function updateProjectiles(dt) {
      const player = state.player;
      for (const p of state.projectiles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= dt;
        if (p.owner === "enemy" && Math.abs(p.x - player.x) < 28 && Math.abs((p.y + 38) - player.y) < 44) {
          damagePlayer(p.damage, Math.sign(p.vx));
          p.life = 0;
        }
      }
      state.projectiles = state.projectiles.filter(p => p.life > 0);
    }

    function updateProps() {
      for (const prop of state.props) {
        if (prop.broken) continue;
        const player = state.player;
        if (prop.type !== "crane" && Math.abs(prop.x - player.x) < 32 && Math.abs(prop.y - player.y) < 48) {
          player.x -= player.facing * 1.2;
        }
      }
    }

    function breakProp(prop) {
      prop.broken = true;
      addSpark(prop.x, prop.y - 36, "#d09145", 22);
      if (Math.random() < 0.45) {
        state.projectiles.push({
          x: prop.x,
          y: prop.y - 56,
          vx: rand(-1.2, 1.2),
          vy: -3,
          life: 1800,
          damage: -18,
          owner: "food"
        });
      }
    }

    function updateSparks(dt) {
      for (const s of state.sparks) {
        s.x += s.vx;
        s.y += s.vy;
        s.life -= dt;
        s.vy += 0.08;
      }
      state.sparks = state.sparks.filter(s => s.life > 0);
      for (const item of state.projectiles) {
        if (item.owner !== "food") continue;
        item.vy += 0.15;
        if (item.y > 430) {
          item.y = 430;
          item.vx *= 0.82;
          item.vy *= -0.2;
        }
        const p = state.player;
        if (Math.abs(item.x - p.x) < 34 && Math.abs(item.y - p.y + 34) < 52) {
          p.hp = Math.min(p.maxHp, p.hp + 20);
          showMessage("HOT DOG +20", 900);
          item.life = 0;
        }
      }
    }

    function addSpark(x, y, color, count) {
      for (let i = 0; i < count; i += 1) {
        state.sparks.push({
          x,
          y,
          vx: rand(-3.4, 3.4),
          vy: rand(-4.2, 1.2),
          color,
          life: rand(160, 420)
        });
      }
    }

    function updateCamera(stage) {
      const target = state.player.x - W * 0.42;
      state.camera += (clamp(target, 0, stage.width - W) - state.camera) * 0.12;
    }

    function checkStageClear(dt, stage) {
      const live = state.enemies.some(e => !e.dead);
      const allWavesDone = state.activeWave >= stage.waves.length;
      if (allWavesDone && !live) {
        state.stageClearDelay += dt;
        if (state.stageClearDelay === dt) {
          showMessage(`${stage.bossName} 制圧`, 1200);
        }
        if (state.stageClearDelay > 1600) {
          if (state.stageIndex + 1 < stages.length) {
            loadStage(state.stageIndex + 1);
          } else {
            endGame(true);
          }
        }
      }
    }

    function endGame(clear) {
      state.mode = "result";
      gameOver.classList.add("is-visible");
      if (clear) {
        resultTitle.textContent = "MISSION CLEAR";
        resultCopy.textContent = `ブラック・ファング港湾ルート壊滅。SCORE ${state.score}`;
      } else {
        resultTitle.textContent = "GAME OVER";
        resultCopy.textContent = "ブラック・ファングはまだ街に潜んでいる。";
      }
    }

    function draw() {
      const stage = stages[state.stageIndex] || stages[0];
      drawBackground(stage);
      if (state.mode === "select") {
        drawAttract();
      } else {
        drawWorld(stage);
        drawHud(stage);
      }
    }

    function drawBackground(stage) {
      const img = stage.id === "port" ? assets.bgPort : assets.bgBronx;
      if (!img.complete || !img.naturalWidth) {
        ctx.fillStyle = stage.sky[1];
        ctx.fillRect(0, 0, W, H);
        return;
      }
      const targetAspect = W / H;
      let sw = img.naturalWidth;
      let sh = sw / targetAspect;
      if (sh > img.naturalHeight) {
        sh = img.naturalHeight;
        sw = sh * targetAspect;
      }
      const maxScroll = Math.max(1, stage.width - W);
      const progress = clamp(state.camera / maxScroll, 0, 1);
      const sx = (img.naturalWidth - sw) * progress;
      const sy = (img.naturalHeight - sh) * 0.5;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0, 0, W, H);
    }

    function drawWorld(stage) {
      const cam = state.camera;
      ctx.save();
      ctx.translate(-cam, 0);

      const drawables = [
        ...state.props.filter(p => !p.broken),
        ...state.projectiles,
        ...state.enemies,
        state.player
      ].sort((a, b) => (a.y || 0) - (b.y || 0));

      for (const item of drawables) {
        if (item.kind === "player") drawPlayer(item);
        else if (item.kind === "enemy") drawEnemy(item);
        else if (item.owner) drawProjectile(item);
        else drawProp(item);
      }
      drawSparks();
      ctx.restore();
    }

    function drawFloor(stage) {
      ctx.fillStyle = stage.floor;
      ctx.fillRect(0, 300, stage.width, 190);
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = 1;
      for (let y = 316; y < 490; y += 24) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(stage.width, y + 16);
        ctx.stroke();
      }
      for (let x = 0; x < stage.width; x += 82) {
        ctx.beginPath();
        ctx.moveTo(x, 302);
        ctx.lineTo(x - 120, 488);
        ctx.stroke();
      }
      ctx.fillStyle = "rgba(0,0,0,0.36)";
      ctx.fillRect(0, 490, stage.width, 50);
    }

    function drawStageDressing(stage) {
      const cam = state.camera;
      for (let i = 0; i < stage.signs.length; i += 1) {
        const x = 260 + i * 520;
        ctx.save();
        ctx.translate(x, 270);
        ctx.rotate(-0.08 + (i % 2) * 0.12);
        ctx.fillStyle = i % 2 ? "#2d251c" : "#271f25";
        ctx.fillRect(-44, -44, 88, 50);
        ctx.strokeStyle = "#5e4b30";
        ctx.strokeRect(-44, -44, 88, 50);
        ctx.fillStyle = i % 2 ? "#f6c21a" : "#e84122";
        ctx.font = "bold 15px Courier New";
        ctx.textAlign = "center";
        ctx.fillText(stage.signs[i], 0, -15);
        ctx.restore();
      }
      if (stage.id === "port") {
        ctx.fillStyle = "#071c32";
        ctx.fillRect(cam + 720, 470, 410, 36);
        ctx.fillStyle = "rgba(75, 158, 255, 0.42)";
        for (let i = 0; i < 8; i += 1) {
          ctx.fillRect(cam + 730 + i * 46, 478 + Math.sin(now() / 200 + i) * 4, 28, 4);
        }
      }
    }

    function drawAtlasCell(img, cols, rows, cell, x, y, w, h, options = {}) {
      if (!img.complete || !img.naturalWidth) return false;
      const cw = img.naturalWidth / cols;
      const ch = img.naturalHeight / rows;
      const sx = cell[0] * cw;
      const sy = cell[1] * ch;
      ctx.save();
      ctx.translate(x, y);
      if (options.alpha !== undefined) ctx.globalAlpha = options.alpha;
      if (options.rotation) ctx.rotate(options.rotation);
      if (options.flip) ctx.scale(-1, 1);
      ctx.drawImage(img, sx, sy, cw, ch, -w / 2, -h, w, h);
      ctx.restore();
      return true;
    }

    function drawProp(prop) {
      const sizes = {
        barrel: [72, 78],
        crate: [86, 78],
        container: [184, 104],
        forklift: [144, 104],
        crane: [104, 176],
        pole: [72, 78]
      };
      const cell = propCells[prop.type] || propCells.barrel;
      const size = sizes[prop.type] || sizes.barrel;
      drawAtlasCell(assets.props, 4, 2, cell, prop.x, prop.y, size[0], size[1]);
    }

    function drawPlayer(p) {
      const flash = p.invuln > 0 && Math.floor(now() / 80) % 2 === 0;
      drawShadow(p.x, p.y, p.w, p.z);
      const actionAtlas = state.heroKey === "jack" ? assets.jackActions : state.heroKey === "kotaro" ? assets.kotaroActions : null;
      if (actionAtlas) {
        const action = playerActionKey(p);
        const size = state.heroKey === "kotaro" ? 154 : 148;
        drawAtlasCell(actionAtlas, 5, 2, heroActionCells[action], p.x, p.y - p.z + 4, size, size, {
          flip: p.facing < 0,
          alpha: flash ? 0.46 : 1,
          rotation: p.hurt > 0 ? -0.08 * p.facing : 0
        });
        return;
      }
      const size = 148;
      drawAtlasCell(assets.actors, 4, 2, actorCells[state.heroKey], p.x, p.y - p.z + 4, size, size, {
        flip: p.facing < 0,
        alpha: flash ? 0.46 : 1,
        rotation: p.hurt > 0 ? -0.08 * p.facing : 0
      });
      if (p.attacking > 0) {
        const effectSize = p.attackType === "special" ? 118 : 82;
        drawAtlasCell(assets.props, 4, 2, propCells.impact, p.x + p.facing * 58, p.y - p.z - 26, effectSize, effectSize, {
          flip: p.facing < 0,
          alpha: 0.88
        });
      }
    }

    function playerActionKey(p) {
      if (p.attackType === "jump" && p.attacking > 0) return "jumpAttack";
      if (p.z > 0) return "jump";
      if (p.attackType === "special" && p.attacking > 0) return state.heroKey === "kotaro" ? "weapon" : "special";
      if (p.attackType === "combo" && p.attacking > 0) return "combo";
      if (p.attackType === "punch" && p.attacking > 0) return "punch";
      if (p.dashing) return "dash";
      if (p.moving) return "walk";
      return "idle";
    }

    function drawEnemy(e) {
      const def = enemyDefs[e.type];
      const cell = actorCells[e.type] || actorCells.spike;
      const size = def.big ? (def.boss ? 178 : 154) : def.boss ? 146 : 126;
      drawShadow(e.x, e.y, e.w, e.z);
      drawAtlasCell(assets.actors, 4, 2, cell, e.x, e.y - e.z + 4, size, size, {
        flip: e.facing < 0,
        alpha: e.hurt > 0 && Math.floor(now() / 60) % 2 === 0 ? 0.72 : 1,
        rotation: e.dead ? -Math.PI / 2.8 : e.hurt > 0 ? 0.08 * e.facing : 0
      });
      if (e.attacking > 0) {
        drawAtlasCell(assets.props, 4, 2, propCells.impact, e.x + e.facing * 42, e.y - e.z - 26, 70, 70, {
          flip: e.facing < 0,
          alpha: 0.72
        });
      }
      if (def.boss || e.hp < e.maxHp) {
        ctx.save();
        ctx.translate(e.x, e.y - e.z);
        drawEnemyHp(e, def);
        ctx.restore();
      }
    }

    function drawBody(o) {
      const w = o.w;
      const h = o.h;
      const hurtLean = o.hurt > 0 ? -0.12 : 0;
      ctx.save();
      ctx.rotate(hurtLean);
      ctx.fillStyle = o.skin;
      ctx.fillRect(-w * 0.25, -h - 18, w * 0.5, 25);
      ctx.fillStyle = o.hair;
      ctx.fillRect(-w * 0.28, -h - 23, w * 0.56, 12);
      ctx.fillStyle = o.coat;
      ctx.fillRect(-w * 0.42, -h + 2, w * 0.84, h * 0.52);
      ctx.fillStyle = o.trim;
      ctx.fillRect(-4, -h + 4, 8, h * 0.5);
      ctx.fillStyle = o.skin;
      const punch = o.attacking > 0 && (o.attackType === "punch" || o.attackType === "combo" || o.attackType === "special" || o.attackType === "heavy");
      ctx.fillRect(punch ? 8 : -w * 0.55, -h + 10, punch ? w * 0.88 : 17, 16);
      ctx.fillRect(-w * 0.56, -h + 32, 18, 16);
      ctx.fillStyle = "#1b1c24";
      const legKick = o.attacking > 0 && (o.attackType === "jump" || o.attackType === "bike");
      ctx.fillRect(-w * 0.34, -h * 0.46, 18, h * 0.45);
      ctx.fillRect(legKick ? 6 : w * 0.12, -h * 0.46, legKick ? w * 0.78 : 18, 18);
      ctx.fillStyle = "#0c0e13";
      ctx.fillRect(-w * 0.42, -6, 26, 8);
      ctx.fillRect(legKick ? w * 0.76 : w * 0.08, -6, 28, 8);
      if (o.big) {
        ctx.strokeStyle = "rgba(255,255,255,0.22)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-w * 0.34, -h + 18);
        ctx.lineTo(w * 0.32, -h + 18);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawNightstick(p) {
      ctx.strokeStyle = "#d4dae1";
      ctx.lineWidth = 5;
      ctx.beginPath();
      if (p.attacking > 0) {
        ctx.moveTo(18, -60);
        ctx.lineTo(76, -48);
      } else {
        ctx.moveTo(22, -48);
        ctx.lineTo(44, -24);
      }
      ctx.stroke();
      if (p.attackType === "special" && p.attacking > 0) drawSwingArc(38, -48, "#ffffff");
    }

    function drawBo(p) {
      ctx.strokeStyle = "#c79043";
      ctx.lineWidth = 6;
      ctx.beginPath();
      if (p.attacking > 0) {
        ctx.moveTo(-24, -52);
        ctx.lineTo(92, -48);
      } else {
        ctx.moveTo(-12, -68);
        ctx.lineTo(40, -14);
      }
      ctx.stroke();
      if (p.attackType === "special" && p.attacking > 0) drawSwingArc(50, -50, "#73d6ff");
    }

    function drawKnife(e) {
      ctx.strokeStyle = "#e9edf2";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(16, -54);
      ctx.lineTo(44, -52);
      ctx.stroke();
    }

    function drawBike(e) {
      if (e.attacking <= 0) return;
      ctx.fillStyle = "#15191f";
      ctx.fillRect(-38, -18, 76, 18);
      ctx.strokeStyle = "#a6b8c7";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(-34, 0, 14, 0, Math.PI * 2);
      ctx.arc(38, 0, 14, 0, Math.PI * 2);
      ctx.moveTo(-16, -20);
      ctx.lineTo(28, -38);
      ctx.stroke();
    }

    function drawSwingArc(x, y, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(x, y, 42, -0.9, 0.72);
      ctx.stroke();
    }

    function drawEnemyHp(e, def) {
      ctx.save();
      ctx.scale(e.facing, 1);
      const width = def.boss ? 88 : 52;
      ctx.fillStyle = "#191919";
      ctx.fillRect(-width / 2, -e.h - 38, width, 6);
      ctx.fillStyle = def.boss ? "#e84122" : "#f6c21a";
      ctx.fillRect(-width / 2, -e.h - 38, width * Math.max(0, e.hp / e.maxHp), 6);
      ctx.restore();
    }

    function drawProjectile(p) {
      if (p.owner === "food") {
        drawAtlasCell(assets.props, 4, 2, propCells.food, p.x, p.y + 16, 48, 48);
      } else {
        drawAtlasCell(assets.props, 4, 2, propCells.knife, p.x, p.y + 14, 42, 42, {
          flip: p.vx < 0,
          rotation: p.vx < 0 ? -0.18 : 0.18
        });
      }
    }

    function drawSparks() {
      for (const s of state.sparks) {
        drawAtlasCell(assets.props, 4, 2, propCells.impact, s.x, s.y + 10, 22, 22, {
          alpha: Math.max(0, s.life / 420),
          rotation: (s.vx + s.vy) * 0.18
        });
      }
    }

    function drawShadow(x, y, w, z) {
      ctx.fillStyle = `rgba(0,0,0,${Math.max(0.18, 0.44 - z / 80)})`;
      ctx.beginPath();
      ctx.ellipse(x, y + 6, w * 0.62, 11, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawHud(stage) {
      const p = state.player;
      ctx.fillStyle = "rgba(0,0,0,0.66)";
      ctx.fillRect(14, 14, 930, 54);
      ctx.strokeStyle = "#5b4627";
      ctx.strokeRect(14, 14, 930, 54);
      ctx.fillStyle = "#f6c21a";
      ctx.font = "bold 18px Courier New";
      ctx.fillText("1P", 26, 36);
      ctx.fillStyle = "#fbfbf7";
      ctx.fillText(state.heroDef.name, 62, 36);
      drawBar(150, 23, 220, 14, p.hp / p.maxHp, "#2e8bff");
      ctx.fillStyle = "#f6c21a";
      ctx.font = "bold 28px Courier New";
      ctx.fillText(String(state.time).padStart(2, "0"), 462, 43);
      ctx.font = "bold 18px Courier New";
      ctx.fillStyle = "#fbfbf7";
      ctx.fillText(`x${state.lives}`, 386, 36);
      ctx.fillText(String(state.score).padStart(7, "0"), 556, 36);
      ctx.fillStyle = "#e84122";
      ctx.fillText("BLACK FANG", 760, 36);

      ctx.fillStyle = "#f4f0dd";
      ctx.font = "bold 18px Meiryo";
      ctx.fillText(stage.title, 28, 92);
      if (state.message && now() < state.messageUntil) {
        ctx.fillStyle = "rgba(0,0,0,0.68)";
        ctx.fillRect(220, 78, 520, 38);
        ctx.strokeStyle = "#725a2a";
        ctx.strokeRect(220, 78, 520, 38);
        ctx.fillStyle = "#f6c21a";
        ctx.textAlign = "center";
        ctx.fillText(state.message, 480, 104);
        ctx.textAlign = "left";
      }
      const stageProgress = state.player.x / stage.width;
      drawBar(720, 84, 210, 7, stageProgress, stage.accent);
      const boss = state.enemies.find(e => enemyDefs[e.type].boss && !e.dead);
      if (boss) {
        ctx.fillStyle = "rgba(0,0,0,0.66)";
        ctx.fillRect(230, 488, 500, 24);
        ctx.fillStyle = "#f4f0dd";
        ctx.font = "bold 14px Meiryo";
        ctx.fillText(boss.label, 244, 505);
        drawBar(360, 495, 360, 8, boss.hp / boss.maxHp, "#e84122");
      }
    }

    function drawBar(x, y, w, h, pct, color) {
      ctx.fillStyle = "#171717";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w * clamp(pct, 0, 1), h);
      ctx.strokeStyle = "#f2f2e6";
      ctx.strokeRect(x, y, w, h);
    }

    function drawAttract() {
      ctx.save();
      ctx.translate(0, 0);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 8; i += 1) {
        const x = 120 + i * 115;
        const y = 350 + Math.sin(now() / 450 + i) * 16;
        drawShadow(x, y, 44, 0);
      }
      ctx.restore();
    }

    function pressed(key) {
      return keys.get(key)?.down;
    }

    function pressedTap(key) {
      const entry = keys.get(key);
      if (!entry || !entry.down || entry.used) return false;
      entry.used = true;
      return true;
    }

    function setKey(key, down) {
      const normalized = key.length === 1 ? key.toLowerCase() : key;
      const entry = keys.get(normalized) || { down: false, used: false };
      if (down && !entry.down) entry.used = false;
      entry.down = down;
      if (!down) entry.used = false;
      keys.set(normalized, entry);
    }

    function gameLoop(t) {
      const dt = Math.min(34, t - lastFrame);
      lastFrame = t;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.querySelectorAll(".fighter").forEach(button => {
      button.addEventListener("click", () => bootHero(button.dataset.hero));
    });

    restartButton.addEventListener("click", () => {
      select.style.display = "grid";
      gameOver.classList.remove("is-visible");
      state = makeInitialState();
    });

    resumeButton.addEventListener("click", () => togglePause(false));

    function togglePause(force) {
      if (state.mode !== "play") return;
      state.paused = typeof force === "boolean" ? force : !state.paused;
      pauseLayer.classList.toggle("is-visible", state.paused);
    }

    window.addEventListener("keydown", event => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "j", "k", "l", "p", "a", "s", "d", "w"].includes(event.key.toLowerCase()) || event.key.startsWith("Arrow")) {
        event.preventDefault();
      }
      if (event.key.toLowerCase() === "p") {
        togglePause();
      } else {
        setKey(event.key, true);
      }
    });

    window.addEventListener("keyup", event => setKey(event.key, false));

    document.querySelectorAll(".touch-btn").forEach(button => {
      const key = button.dataset.key;
      const down = event => {
        event.preventDefault();
        setKey(key, true);
      };
      const up = event => {
        event.preventDefault();
        setKey(key, false);
      };
      button.addEventListener("pointerdown", down);
      button.addEventListener("pointerup", up);
      button.addEventListener("pointercancel", up);
      button.addEventListener("pointerleave", up);
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
