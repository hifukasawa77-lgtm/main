// ============================================================
//  Web Audio API — audio.js の内容を直接埋め込み
// ============================================================

function playTone(audioCtx, freq, type, duration, vol, startTime, attack, release) {
    if (!audioCtx) return;
    const atk = (attack  !== undefined) ? attack  : 0.02;
    const rel = (release !== undefined) ? release : 0.03;
    const end = startTime + duration;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + atk);
    gain.gain.setValueAtTime(vol, Math.max(startTime + atk, end - rel));
    gain.gain.linearRampToValueAtTime(0, end);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(end);
}

function playSlide(audioCtx, freqFrom, freqTo, type, duration, vol, startTime) {
    if (!audioCtx) return;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freqFrom, startTime);
    osc.frequency.linearRampToValueAtTime(freqTo, startTime + duration);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.01);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function playNoise(audioCtx, duration, vol, startTime, lowpass) {
    if (!audioCtx) return;
    const bufSize = Math.ceil(audioCtx.sampleRate * duration);
    const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src   = audioCtx.createBufferSource();
    const gain  = audioCtx.createGain();
    const filt  = audioCtx.createBiquadFilter();
    src.buffer = buf;
    filt.type = 'lowpass';
    filt.frequency.value = lowpass || 800;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    src.connect(filt);
    filt.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(startTime);
    src.stop(startTime + duration);
}

function initAudio(audioState) {
    if (audioState.ctx) return;
    try {
        audioState.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioState.ctx.state === 'suspended') audioState.ctx.resume();
        const t = audioState.ctx.currentTime + 0.1;
        audioState.melodyTime  = t;
        audioState.bassTime    = t;
        audioState.melody2Time = t;
        audioState.melodyIdx   = 0;
        audioState.bassIdx     = 0;
        audioState.melody2Idx  = 0;
    } catch (e) {
        console.error('[audio] Web Audio API not supported:', e);
    }
}

function playSE(audioCtx, type) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    switch (type) {
        case 'punch_hit':
            playNoise(audioCtx, 0.08, 0.6, t, 600);
            playTone(audioCtx, 120, 'sawtooth', 0.07, 0.10, t,      0.005, 0.05);
            playTone(audioCtx,  90, 'sawtooth', 0.10, 0.08, t+0.03, 0.005, 0.07);
            break;
        case 'kick_hit':
            playNoise(audioCtx, 0.06, 0.5, t, 1200);
            playTone(audioCtx, 200, 'sawtooth', 0.06, 0.10, t,      0.005, 0.04);
            playSlide(audioCtx, 280, 140, 'square', 0.08, 0.07, t + 0.01);
            break;
        case 'player_hurt':
            playSlide(audioCtx, 440, 220, 'sawtooth', 0.20, 0.12, t);
            playNoise(audioCtx, 0.12, 0.35, t, 900);
            playTone(audioCtx, 180, 'square', 0.15, 0.07, t + 0.05, 0.01, 0.10);
            break;
        case 'enemy_down':
            playNoise(audioCtx, 0.18, 0.7, t, 500);
            playSlide(audioCtx, 160, 60, 'sawtooth', 0.20, 0.12, t);
            playTone(audioCtx, 55, 'sine', 0.22, 0.10, t + 0.03, 0.01, 0.15);
            break;
        case 'jump':
            playSlide(audioCtx, 300, 600, 'square', 0.12, 0.06, t);
            playTone(audioCtx, 600, 'triangle', 0.08, 0.04, t + 0.10, 0.01, 0.06);
            break;
        case 'special':
            playSlide(audioCtx, 200, 900, 'sawtooth', 0.18, 0.08, t);
            playSlide(audioCtx, 200, 900, 'square',   0.18, 0.06, t + 0.02);
            playNoise(audioCtx, 0.25, 0.8, t + 0.18, 1500);
            playTone(audioCtx, 80, 'sawtooth', 0.28, 0.15, t + 0.18, 0.01, 0.20);
            playSlide(audioCtx, 500, 100, 'sawtooth', 0.30, 0.10, t + 0.20);
            playTone(audioCtx, 440, 'square', 0.10, 0.04, t + 0.40, 0.02, 0.08);
            playTone(audioCtx, 550, 'square', 0.10, 0.04, t + 0.48, 0.02, 0.08);
            break;
        case 'knife_throw':
            playSlide(audioCtx, 1800, 900, 'sawtooth', 0.10, 0.05, t);
            playTone(audioCtx, 1400, 'square', 0.06, 0.03, t + 0.02, 0.005, 0.05);
            break;
        case 'ki_ball':
            playSlide(audioCtx, 160, 320, 'sawtooth', 0.15, 0.07, t);
            playSlide(audioCtx, 160, 320, 'square',   0.15, 0.05, t + 0.03);
            playSlide(audioCtx, 640, 1280, 'sawtooth', 0.20, 0.09, t + 0.15);
            playSlide(audioCtx, 640, 1280, 'square',   0.20, 0.07, t + 0.17);
            playTone(audioCtx, 1280, 'triangle', 0.12, 0.05, t + 0.30, 0.01, 0.10);
            break;
        case 'stage_clear': {
            const fanfare = [523, 659, 784, 1047];
            fanfare.forEach((f, i) => {
                playTone(audioCtx, f,   'square',   0.18, 0.08, t + i * 0.15, 0.02, 0.06);
                playTone(audioCtx, f/2, 'triangle', 0.18, 0.05, t + i * 0.15, 0.02, 0.06);
            });
            playTone(audioCtx, 1047, 'square',   0.45, 0.10, t + 0.60, 0.02, 0.30);
            playTone(audioCtx,  523, 'triangle', 0.45, 0.06, t + 0.60, 0.02, 0.30);
            break;
        }
        case 'game_over':
            playSlide(audioCtx, 440, 220, 'sawtooth', 0.35, 0.10, t);
            playSlide(audioCtx, 330, 165, 'sawtooth', 0.35, 0.08, t + 0.30);
            playSlide(audioCtx, 220, 110, 'sawtooth', 0.45, 0.10, t + 0.60);
            playSlide(audioCtx, 165,  55, 'sawtooth', 0.55, 0.12, t + 0.90);
            playTone(audioCtx, 55, 'sine', 0.80, 0.08, t + 1.20, 0.05, 0.60);
            break;
        default:
            break;
    }
}

    },
};

function scheduleBGM(audioCtx, bgmKey, state) {
    if (!audioCtx || !bgmKey) return;
    const bgm = BGM[bgmKey];
    if (!bgm) return;
    const LOOKAHEAD = 0.5;
    const lookahead = audioCtx.currentTime + LOOKAHEAD;
    const bl = beatLen(bgm.bpmKey);
    while (state.melodyTime < lookahead) {
        const note = bgm.melody[state.melodyIdx];
        if (note[0] !== N.R) {
            playTone(audioCtx, note[0], bgm.melodyType, note[1]*bl*0.82, bgm.melodyVol, state.melodyTime, 0.01, 0.04);
        }
        state.melodyTime += note[1] * bl;
        state.melodyIdx = (state.melodyIdx + 1) % bgm.melody.length;
    }
    while (state.bassTime < lookahead) {
        const note = bgm.bass[state.bassIdx];
        if (note[0] !== N.R) {
            playTone(audioCtx, note[0], bgm.bassType, note[1]*bl*0.88, bgm.bassVol, state.bassTime, 0.01, 0.05);
        }
        state.bassTime += note[1] * bl;
        state.bassIdx = (state.bassIdx + 1) % bgm.bass.length;
    }
    if (bgm.melody2) {
        while (state.melody2Time < lookahead) {
            const note = bgm.melody2[state.melody2Idx];
            if (note[0] !== N.R) {
                playTone(audioCtx, note[0], bgm.melody2Type, note[1]*bl*0.80, bgm.melody2Vol, state.melody2Time, 0.01, 0.04);
            }
            state.melody2Time += note[1] * bl;
            state.melody2Idx = (state.melody2Idx + 1) % bgm.melody2.length;
        }
    }
}

function startBGM(audioState, bgmKey) {
    if (!audioState.ctx) return;
    if (audioState.timer) { clearInterval(audioState.timer); audioState.timer = null; }
    const t = audioState.ctx.currentTime + 0.05;
    audioState.bgmKey     = bgmKey;
    audioState.melodyIdx  = 0;
    audioState.bassIdx    = 0;
    audioState.melody2Idx = 0;
    audioState.melodyTime  = t;
    audioState.bassTime    = t;
    audioState.melody2Time = t;
    audioState.timer = setInterval(() => {
        scheduleBGM(audioState.ctx, audioState.bgmKey, audioState);
    }, 100);
    scheduleBGM(audioState.ctx, audioState.bgmKey, audioState);
}

function stopBGM(audioState) {
    if (audioState.timer) { clearInterval(audioState.timer); audioState.timer = null; }
    audioState.bgmKey = null;
}

const sprites = {};
function buildSprites() {
    for (const [key, data] of Object.entries(rawSprites)) {
        const oc = new OffscreenCanvas(8, 16);
        const octx = oc.getContext('2d');
        for (let i = 0; i < 128; i++) {
            const ci = parseInt(data[i], 10);
            if (ci === 0) continue;
            octx.fillStyle = palette[ci];
            octx.fillRect(i % 8, Math.floor(i / 8), 1, 1);
        }
        sprites[key] = oc;
    }
}

// ============================================================
//  Enemy クラス
// ============================================================
const ENEMY_DATA = {
    thug:   { hp:3,  speed:1.2, behavior:'chaser',        dmg:1, attackRange:18, size:8 },
    crusher: { hp:12, speed:0.4, behavior:'slow_tank',     dmg:3, attackRange:28, size:12 },
    joe:     { hp:4,  speed:1.8, behavior:'shooter_melee', dmg:1, attackRange:100,size:8 },
    viper:   { hp:3,  speed:2.2, behavior:'speedster',     dmg:1, attackRange:20, size:8 },
    maddog:  { hp:6,  speed:2.5, behavior:'biker',         dmg:2, attackRange:35, size:10 },
};

class Enemy {
    constructor(type, x, y) {
        const d = ENEMY_DATA[type] || ENEMY_DATA.thug;
        this.type = type;
        this.x = x; this.y = y;
        this.hp = d.hp; this.maxHp = d.hp;
        this.speed = d.speed;
        this.behavior = d.behavior;
        this.dmg = d.dmg;
        this.attackRange = d.attackRange;
        this.size = d.size;
        this.state = 'walk';
        this.facing = -1;
        this.timer = Math.floor(Math.random() * 60);
        this.hurtTimer = 0;
        this.attackBox = null;
        this.vx = 0;
        this.isBoss = false;
        this.animFrame = 0;
        this.animTimer = 0;
    }
    update(players) {
        if (this.state === 'dead') return;
        this.animTimer++;
        if (this.animTimer > 10) { this.animFrame ^= 1; this.animTimer = 0; }
        if (this.hurtTimer > 0) { this.hurtTimer--; return; }
        if (this.state === 'down') {
            this.timer--;
            if (this.timer <= 0) this.state = 'dead';
            return;
        }
        const alive = players.filter(p => p.hp > 0 && p.state !== 'dead');
        if (alive.length === 0) return;
        const target = alive.reduce((a, b) =>
            Math.hypot(a.x-this.x, a.y-this.y) < Math.hypot(b.x-this.x, b.y-this.y) ? a : b);
        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const dist = Math.hypot(dx, dy) || 1;
        this.facing = dx > 0 ? 1 : -1;
        this.timer--;
        switch(this.behavior) {
            case 'chaser':
                if (dist > this.attackRange) {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed * 0.5;
                    this.state = 'walk';
                } else if (this.timer <= 0) {
                    this.doAttack(target);
                    this.timer = 50;
                }
                break;
            case 'slow_tank':
                if (dist > this.attackRange) {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed * 0.4;
                    this.state = 'walk';
                } else if (this.timer <= 0) {
                    this.doAttack(target);
                    this.timer = 80;
                }
                break;
            case 'shooter_melee':
                if (dist > this.attackRange) {
                    this.x += (dx/dist) * this.speed * 0.7;
                    this.y += (dy/dist) * this.speed * 0.3;
                    this.state = 'walk';
                } else if (dist > 40 && this.timer <= 0) {
                    projectiles.push(new Projectile(this.x, this.y, this.facing * 4, 0, this.dmg, 'enemy', 'knife'));
                    playSE(audioState.ctx, 'knife_throw');
                    this.timer = 90;
                } else if (dist <= 40 && this.timer <= 0) {
                    this.doAttack(target);
                    this.timer = 40;
                }
                break;
            case 'speedster':
                if (dist > this.attackRange) {
                    this.x += (dx/dist) * this.speed;
                    this.y += (dy/dist) * this.speed * 0.5;
                    this.state = 'walk';
                } else if (this.timer <= 0) {
                    this.doAttack(target);
                    this.timer = 30;
                    if (Math.random() < 0.3) this.x -= this.facing * 40;
                }
                break;
            case 'biker':
                if (Math.abs(dy) > 20) {
                    this.y += (dy > 0 ? 1 : -1) * this.speed * 0.3;
                    this.state = 'walk';
                } else {
                    this.x += this.facing * this.speed * 2;
                    this.state = 'walk';
                    if (dist < this.attackRange) {
                        this.doAttack(target);
                    }
                }
                break;
        }
        this.y = Math.max(GROUND_Y_MIN, Math.min(GROUND_Y_MAX, this.y));
    }
    doAttack(target) {
        this.state = 'attack';
        this.attackBox = { x: this.x + this.facing * 12, y: this.y - 8, w: 20, h: 16, dmg: this.dmg };
        if (!target.invincible) target.takeDamage(this.dmg, this.facing);
        setTimeout(() => { if (this.state !== 'dead' && this.state !== 'down') { this.state = 'walk'; this.attackBox = null; } }, 300);
    }
    takeDamage(dmg, kbDir) {
        this.hp -= dmg;
        this.hurtTimer = 15;
        if (kbDir) this.x += kbDir * 8;
        if (this.hp <= 0) {
            this.state = 'down';
            this.timer = 60;
            playSE(audioState.ctx, 'enemy_down');
        } else {
            this.state = 'hurt';
            playSE(audioState.ctx, 'punch_hit');
        }
    }
    draw(ctx, cameraX) {
        if (this.state === 'dead') return;
        const sx = Math.round(this.x - cameraX - this.size / 2);
        const sy = Math.round(this.y - this.size);
        const sprKey = this.getSpriteKey();
        if (sprites[sprKey]) {
            ctx.save();
            if (this.facing === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(sprites[sprKey], -sx - 8, sy - 8, 8, 16);
            } else {
                ctx.drawImage(sprites[sprKey], sx, sy - 8, 8, 16);
            }
            ctx.restore();
        } else {
            // フォールバック
            ctx.fillStyle = '#f00';
            ctx.fillRect(sx, sy - 8, 8, 16);
        }
        // HPバー（ボス以外）
        if (!this.isBoss) {
            ctx.fillStyle = '#600'; ctx.fillRect(sx, sy - 12, 16, 2);
            ctx.fillStyle = '#f00'; ctx.fillRect(sx, sy - 12, Math.round(16 * Math.max(0, this.hp) / this.maxHp), 2);
        }
    }
    getSpriteKey() {
        switch(this.state) {
            case 'attack': return (`${this.type}_punch` in sprites || `${this.type}_attack` in sprites)
                ? (`${this.type}_attack` in sprites ? `${this.type}_attack` : `${this.type}_punch`)
                : `${this.type}_idle`;
            case 'hurt': return `${this.type}_hurt`;
            case 'down': return `${this.type}_down`;
            default:     return `${this.type}_idle`;
        }
    }
}

// ============================================================
//  Projectile クラス
// ============================================================
class Projectile {
    constructor(x, y, vx, vy, dmg, owner, type) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.dmg = dmg;
        this.owner = owner;
        this.type = type;
        this.active = true;
    }
    update(players, enemies) {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < -100 || this.x > 20000) { this.active = false; return; }
        if (this.owner === 'enemy') {
            for (const p of players) {
                if (p.hp > 0 && !p.invincible &&
                    Math.abs(this.x - p.x) < 12 && Math.abs(this.y - p.y) < 16) {
                    p.takeDamage(this.dmg, Math.sign(this.vx));
                    this.active = false;
                    return;
                }
            }
        }
    }
    draw(ctx, cameraX) {
        if (!this.active) return;
        const sx = Math.round(this.x - cameraX);
        const sy = Math.round(this.y);
        ctx.fillStyle = this.type === 'knife' ? '#aaa' : '#4ff';
        ctx.fillRect(sx - 3, sy - 2, 6, 4);
    }
}

// ============================================================
//  Player クラス
// ============================================================
class Player {
    constructor(charType, pIdx) {
        this.char = charType;
        this.pIdx = pIdx;
        this.x = pIdx === 0 ? 80 : 120;
        this.y = 260;
        this.vx = 0; this.vy = 0;
        this.jumpOffset = 0;    // 実際の描画高さオフセット（ジャンプ表現用）
        this.jumpVy = 0;        // ジャンプの垂直速度（jumpOffset系）
        this.isAirborne = false;
        this.facing = 1;
        this.hp = 6; this.maxHp = 6;
        this.lives = 3;
        this.score = 0;
        this.state = 'idle';
        this.stateTimer = 0;
        this.animFrame = 0;
        this.animTimer = 0;
        this.comboCount = 0;
        this.comboTimer = 0;
        this.attackBox = null;
        this.hurtTimer = 0;
        this.invincible = false;
        this.specialGauge = 0;
        this.grabTarget = null;
        this.keyMap = pIdx === 0
            ? {up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD',punch:'KeyZ',kick:'KeyX',jump:'KeyC'}
            : {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',punch:'KeyK',kick:'KeyL',jump:'KeyM'};
    }
    update(keys, prevKeys, enemies, cameraX) {
        if (this.state === 'dead') return;
        const up    = keys[this.keyMap.up];
        const down  = keys[this.keyMap.down];
        const left  = keys[this.keyMap.left];
        const right = keys[this.keyMap.right];
        const punch = keys[this.keyMap.punch] && !prevKeys[this.keyMap.punch];
        const kick  = keys[this.keyMap.kick]  && !prevKeys[this.keyMap.kick];
        const jump  = keys[this.keyMap.jump]  && !prevKeys[this.keyMap.jump];
        if (this.state === 'hurt' || this.state === 'down') {
            this.stateTimer--;
            if (this.stateTimer <= 0) this.state = 'idle';
            this.applyPhysics();
            return;
        }
        const canMove = (this.state !== 'punch' && this.state !== 'kick');
        if (canMove) {
            this.vx = 0;
            if (left)  { this.vx = -PLAYER_SPEED; this.facing = -1; }
            if (right) { this.vx =  PLAYER_SPEED; this.facing =  1; }
            if (!this.isAirborne) {
                if (up)   this.y -= PLAYER_SPEED * 0.6;
                if (down) this.y += PLAYER_SPEED * 0.6;
                this.y = Math.max(GROUND_Y_MIN, Math.min(GROUND_Y_MAX, this.y));
            }
            // 移動状態の反映
            if ((left || right) && !this.isAirborne) this.state = 'walk';
            else if (!this.isAirborne && this.state === 'walk') this.state = 'idle';
        }
        // ジャンプ
        if (jump && !this.isAirborne && canMove) {
            this.jumpVy = -9;
            this.isAirborne = true;
            this.state = 'jump';
            playSE(audioState.ctx, 'jump');
        }
        // 地上攻撃
        if (punch && !this.isAirborne) this.doAttack('punch');
        if (kick  && !this.isAirborne) this.doAttack('kick');
        // 空中攻撃
        if (punch && this.isAirborne) this.doAttack('jump_punch');
        // 攻撃タイマー
        if (this.attackBox) {
            this.stateTimer--;
            if (this.stateTimer <= 0) {
                this.attackBox = null;
                this.state = this.isAirborne ? 'jump' : 'idle';
            }
        }
        // コンボタイマー
        if (this.comboTimer > 0) this.comboTimer--;
        else this.comboCount = 0;
        // 物理
        this.applyPhysics();
        // x移動（カメラ範囲内）
        this.x += this.vx;
        this.x = Math.max(cameraX + 16, Math.min(cameraX + W - 16, this.x));
        // アニメ
        this.animTimer++;
        if (this.animTimer > 8) { this.animFrame ^= 1; this.animTimer = 0; }
        // 無敵タイマー
        if (this.hurtTimer > 0) { this.hurtTimer--; this.invincible = true; }
        else this.invincible = false;
    }
    applyPhysics() {
        if (this.isAirborne) {
            this.jumpVy += GRAVITY;
            this.jumpOffset -= this.jumpVy;  // jumpOffset が正 = 上に浮いている
            if (this.jumpOffset <= 0) {
                this.jumpOffset = 0;
                this.jumpVy = 0;
                this.isAirborne = false;
                if (this.state === 'jump') this.state = 'idle';
            }
        }
    }
    doAttack(type) {
        if (type === 'punch') {
            if (this.comboTimer > 0) this.comboCount = Math.min(this.comboCount + 1, 3);
            else this.comboCount = 1;
            this.comboTimer = 25;
            const dmg = this.comboCount === 3 ? 2 : 1;
            const kb  = this.comboCount === 3;
            this.attackBox = { x: this.x + this.facing * 16, y: this.y - 12, w: 20, h: 16, dmg, knockback: kb };
            this.state = 'punch';
            this.stateTimer = 12;
            playSE(audioState.ctx, 'punch_hit');
        } else if (type === 'kick') {
            this.attackBox = { x: this.x + this.facing * 20, y: this.y - 8, w: 24, h: 14, dmg: 2, knockback: true };
            this.state = 'kick';
            this.stateTimer = 14;
            this.comboCount = 0;
            playSE(audioState.ctx, 'kick_hit');
        } else if (type === 'jump_punch') {
            this.attackBox = { x: this.x + this.facing * 16, y: this.y - 10, w: 20, h: 14, dmg: 2, knockback: true };
            this.state = 'punch';
            this.stateTimer = 10;
            playSE(audioState.ctx, 'kick_hit');
        }
    }
    takeDamage(dmg, kbDir) {
        if (this.invincible) return;
        this.hp -= dmg;
        this.hurtTimer = 60;
        if (this.hp <= 0) {
            this.hp = 0;
            this.state = 'down';
            this.stateTimer = 90;
            this.lives--;
            if (this.lives > 0) {
                setTimeout(() => {
                    if (this.state !== 'dead') {
                        this.hp = this.maxHp;
                        this.state = 'idle';
                        this.hurtTimer = 120;
                    }
                }, 2000);
            } else {
                setTimeout(() => { this.state = 'dead'; }, 2000);
            }
        } else {
            this.state = 'hurt';
            this.stateTimer = 30;
        }
        if (kbDir) this.vx = kbDir * 3;
        playSE(audioState.ctx, 'player_hurt');
    }
    draw(ctx, cameraX) {
        const sx = Math.round(this.x - cameraX - 8);
        const sy = Math.round(this.y - 16 - this.jumpOffset);
        if (this.hurtTimer > 0 && Math.floor(this.hurtTimer / 4) % 2 === 0) return;
        const sprKey = this.getSpriteKey();
        if (sprites[sprKey]) {
            ctx.save();
            if (this.facing === -1) {
                ctx.scale(-1, 1);
                ctx.drawImage(sprites[sprKey], -sx - 8, sy, 8, 16);
            } else {
                ctx.drawImage(sprites[sprKey], sx, sy, 8, 16);
            }
            ctx.restore();
        } else {
            // フォールバック
            ctx.fillStyle = this.pIdx === 0 ? '#3af' : '#a3f';
            ctx.fillRect(sx, sy, 8, 16);
        }
        // HPバー（頭上）
        ctx.fillStyle = '#600'; ctx.fillRect(sx, sy - 4, 16, 2);
        ctx.fillStyle = '#0f0'; ctx.fillRect(sx, sy - 4, Math.round(16 * Math.max(0,this.hp) / this.maxHp), 2);
    }
    getSpriteKey() {
        const c = this.char;
        switch(this.state) {
            case 'walk':  return `${c}_walk_${this.animFrame + 1}`;
            case 'punch': return `${c}_punch`;
            case 'kick':  return `${c}_kick`;
            case 'jump':  return `${c}_jump`;
            case 'hurt':  return `${c}_hurt`;
            case 'down':  return `${c}_down`;
            default:      return `${c}_idle`;
        }
    }
}

// ============================================================
//  ステージ管理
// ============================================================
function initStage(stageIdx) {
    currentStageIdx = stageIdx;
    currentWaveIdx = -1;
    waveCleared = true;
    cameraX = 0;
    enemies = [];
    projectiles = [];
    effects = [];
    const bgmMap = { 0:'stage1', 1:'stage2_3', 2:'stage2_3', 3:'stage4_5', 4:'stage4_5' };
    startBGM(audioState, bgmMap[stageIdx] || 'stage1');
}

function triggerNextWave() {
    const stage = STAGES[currentStageIdx];
    currentWaveIdx++;
    if (currentWaveIdx >= stage.waves.length) {
        if (stage.boss) spawnBoss(stage.boss.type, stage.boss.x, stage.boss.y);
        return;
    }
    const wave = stage.waves[currentWaveIdx];
    for (const e of wave.enemies) {
        enemies.push(new Enemy(e.type, e.x, e.y));
    }
    scrollLocked = true;
    waveCleared = false;
}

function spawnBoss(type, x, y) {
    const boss = new Enemy(type, x, y);
    boss.hp = boss.maxHp = 30;
    boss.speed *= 1.3;
    boss.isBoss = true;
    boss.dmg *= 2;
    enemies.push(boss);
    scrollLocked = true;
    startBGM(audioState, 'boss');
}

function checkWaveTrigger() {
    if (!waveCleared) return;
    const stage = STAGES[currentStageIdx];
    const nextIdx = currentWaveIdx + 1;
    if (nextIdx < stage.waves.length && cameraX >= stage.waves[nextIdx].triggerX) {
        triggerNextWave();
        return;
    }
    if (currentWaveIdx >= stage.waves.length - 1 && !stage.boss && enemies.every(e => e.state === 'dead')) {
        stageClear();
    }
}

function stageClear() {
    stopBGM(audioState);
    playSE(audioState.ctx, 'stage_clear');
    gameState = 'stage_clear';
    setTimeout(() => {
        if (currentStageIdx + 1 < STAGES.length) {
            gameState = 'playing';
            initStage(currentStageIdx + 1);
            triggerNextWave();
        } else {
            gameState = 'ending';
        }
    }, 3000);
}

function updateCamera() {
    const stage = STAGES[currentStageIdx];
    const leadX = players.reduce((mx, p) => p.hp > 0 ? Math.max(mx, p.x) : mx, 0);
    const targetX = Math.max(cameraX, leadX - 200);
    if (!scrollLocked) {
        cameraX = Math.min(targetX, stage.width - W);
        cameraX = Math.max(0, cameraX);
    }
    checkWaveTrigger();
    if (scrollLocked && enemies.every(e => e.state === 'dead' || e.state === 'down')) {
        // ダウン中の敵が全員いなければアンロック
        if (enemies.every(e => e.state === 'dead')) {
            scrollLocked = false;
            waveCleared = true;
        }
    }
}

function checkHits() {
    for (const p of players) {
        if (!p.attackBox) continue;
        const ab = p.attackBox;
        for (const e of enemies) {
            if (e.state === 'dead' || e.state === 'down') continue;
            if (Math.abs(p.y - e.y) > 30) continue;
            if (ab.x < e.x + e.size && ab.x + ab.w > e.x - e.size &&
                ab.y < e.y + 4    && ab.y + ab.h > e.y - e.size * 2) {
                e.takeDamage(ab.dmg, p.facing);
                if (ab.knockback) e.x += p.facing * 20;
                p.score += 100;
                effects.push({ x: e.x, y: e.y - 12, timer: 15, type: 'hit' });
                p.attackBox = null;
                break;
            }
        }
    }
}

// ============================================================
//  背景描画
// ============================================================
function drawBackground(bgTheme) {
    const themes = {
        city:       { skyTop:'#0a0a1a', skyBot:'#1a1a2a', groundTop:'#2a2a3a', groundBot:'#1a1a2a' },
        dock:       { skyTop:'#050e20', skyBot:'#0a1830', groundTop:'#2a2818', groundBot:'#1a1810' },
        factory:    { skyTop:'#120808', skyBot:'#1a0a0a', groundTop:'#2a1a10', groundBot:'#1a1008' },
        ninja_fort: { skyTop:'#030310', skyBot:'#080820', groundTop:'#141428', groundBot:'#0a0a1a' },
        fortress:   { skyTop:'#0a0000', skyBot:'#160000', groundTop:'#1a0808', groundBot:'#0a0404' },
    };
    const t = themes[bgTheme] || themes.city;
    const grad = ctx.createLinearGradient(0, 0, 0, 280);
    grad.addColorStop(0, t.skyTop);
    grad.addColorStop(1, t.skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 280);
    const grad2 = ctx.createLinearGradient(0, 280, 0, H);
    grad2.addColorStop(0, t.groundTop);
    grad2.addColorStop(1, t.groundBot);
    ctx.fillStyle = grad2;
    ctx.fillRect(0, 280, W, H - 280);
    drawBgElements(bgTheme);
}

function drawBgElements(bgTheme) {
    const px = (Math.round(-cameraX * 0.3)) % 640;
    const bgColor = bgTheme === 'city' ? '#1a1a3a'
        : bgTheme === 'dock'           ? '#1a2010'
        : bgTheme === 'factory'        ? '#1a1010'
        : bgTheme === 'ninja_fort'     ? '#0a0a28'
        : '#1a0808';
    ctx.fillStyle = bgColor;
    for (let i = -1; i <= 2; i++) {
        const bx = ((px + i * 640) % 640 + 640) % 640;
        // 建物シルエット
        ctx.fillRect(bx,        80,  120, 200);
        ctx.fillRect(bx + 160, 120,   80, 160);
        ctx.fillRect(bx + 300,  60,  100, 220);
        ctx.fillRect(bx + 450, 100,  140, 180);
    }
    // 地面ライン
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y_MIN); ctx.lineTo(W, GROUND_Y_MIN); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y_MAX); ctx.lineTo(W, GROUND_Y_MAX); ctx.stroke();
}

// ============================================================
//  HUD
// ============================================================
function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 20);
    ctx.fillRect(0, H - 20, W, 20);
    for (let pi = 0; pi < players.length; pi++) {
        const p = players[pi];
        const ox = pi === 0 ? 4 : W - 120;
        ctx.fillStyle = '#fff'; ctx.font = '8px monospace';
        ctx.fillText(pi === 0 ? '1P JACK' : '2P KOTARO', ox, 12);
        for (let i = 0; i < p.lives; i++) {
            ctx.fillStyle = '#f44'; ctx.fillText('♥', ox + 60 + i * 10, 12);
        }
        ctx.fillStyle = '#600'; ctx.fillRect(ox, 14, 80, 4);
        ctx.fillStyle = '#0f4'; ctx.fillRect(ox, 14, Math.round(80 * Math.max(0,p.hp) / p.maxHp), 4);
        ctx.fillStyle = '#ff0'; ctx.fillText(String(p.score).padStart(8,'0'), ox, H - 8);
    }
    ctx.fillStyle = '#aaa'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(STAGES[currentStageIdx].name, W/2, 12);
    ctx.textAlign = 'left';
    const boss = enemies.find(e => e.isBoss && e.state !== 'dead');
    if (boss) {
        ctx.fillStyle = '#000'; ctx.fillRect(W/4, H - 18, W/2, 8);
        ctx.fillStyle = '#f00'; ctx.fillRect(W/4, H - 18, Math.round((W/2) * Math.max(0,boss.hp) / boss.maxHp), 8);
        ctx.fillStyle = '#fff'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
        ctx.fillText('BOSS', W/2, H - 12);
        ctx.textAlign = 'left';
    }
}

// ============================================================
//  エフェクト
// ============================================================
function drawEffects() {
    for (let i = effects.length - 1; i >= 0; i--) {
        const ef = effects[i];
        const sx = Math.round(ef.x - cameraX);
        ctx.fillStyle = `rgba(255,255,100,${ef.timer/15})`;
        ctx.font = '10px monospace';
        ctx.fillText('★', sx, ef.y - (15 - ef.timer));
        ef.timer--;
        if (ef.timer <= 0) effects.splice(i, 1);
    }
}

// ============================================================
//  画面描画
// ============================================================
function drawTitle() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff4'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
    ctx.fillText('JACK & KOTARO', W/2, 100);
    ctx.fillStyle = '#fa0'; ctx.font = '14px monospace';
    ctx.fillText('ジャック＆コタロウ', W/2, 124);
    ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
    ctx.fillText('熱血刑事×古武術 vs キング・ドラゴン', W/2, 148);
    if (Math.floor(frameCount / 30) % 2 === 0) {
        ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
        ctx.fillText('PRESS SPACE OR Z TO START', W/2, 200);
    }
    ctx.fillStyle = '#666'; ctx.font = '9px monospace';
    ctx.fillText('1P: WASD+ZXC  /  2P: ARROW+KLM', W/2, 228);
    ctx.fillText('PUNCH:Z/K  KICK:X/L  JUMP:C/M', W/2, 244);
    ctx.textAlign = 'left';
}

function drawCharSelect() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff4'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SELECT CHARACTER / キャラ選択', W/2, 36);
    // ジャック
    ctx.strokeStyle = charSelectP1 === 'jack' ? '#3af' : '#555';
    ctx.lineWidth = 2;
    ctx.strokeRect(59, 55, 202, 230);
    ctx.fillStyle = '#111'; ctx.fillRect(60, 56, 200, 228);
    ctx.fillStyle = '#3af'; ctx.font = 'bold 14px monospace';
    ctx.fillText('JACK', 160, 82);
    ctx.fillStyle = '#fff'; ctx.font = '9px monospace';
    ctx.fillText('ジャック', 160, 98);
    ctx.fillText('熱血刑事', 160, 114);
    ctx.fillText('バランス型', 160, 130);
    ctx.fillText('3連コンボパンチ', 160, 150);
    ctx.fillText('パワーキック', 160, 166);
    // スプライトプレビュー（2倍）
    if (sprites['jack_idle']) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(sprites['jack_idle'], 144, 180, 32, 64);
    }
    ctx.fillStyle = charSelectP1 === 'jack' ? '#3af' : '#555';
    ctx.font = '9px monospace';
    ctx.fillText('1P: Z で選択', 160, 260);
    // コタロウ
    ctx.strokeStyle = charSelectP1 === 'kotaro' ? '#a3f' : '#555';
    ctx.strokeRect(379, 55, 202, 230);
    ctx.fillStyle = '#111'; ctx.fillRect(380, 56, 200, 228);
    ctx.fillStyle = '#a3f'; ctx.font = 'bold 14px monospace';
    ctx.fillText('KOTARO', 480, 82);
    ctx.fillStyle = '#fff'; ctx.font = '9px monospace';
    ctx.fillText('コタロウ', 480, 98);
    ctx.fillText('古武術の使い手', 480, 114);
    ctx.fillText('スピード型', 480, 130);
    ctx.fillText('回し蹴りコンボ', 480, 150);
    ctx.fillText('居合斬り', 480, 166);
    if (sprites['kotaro_idle']) {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(sprites['kotaro_idle'], 464, 180, 32, 64);
    }
    ctx.fillStyle = charSelectP1 === 'kotaro' ? '#a3f' : '#555';
    ctx.font = '9px monospace';
    ctx.fillText('1P: X で選択', 480, 260);
    // 下部説明
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
    ctx.fillText('選択後 SPACE でスタート', W/2, 310);
    ctx.fillStyle = '#666'; ctx.font = '9px monospace';
    ctx.fillText('2P参加: K=JACK  L=KOTARO', W/2, 330);
    ctx.textAlign = 'left';
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#f00'; ctx.font = 'bold 40px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    if (Math.floor(frameCount/30)%2===0) {
        ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
        ctx.fillText('PRESS SPACE TO RETRY', W/2, H/2 + 30);
    }
    ctx.textAlign = 'left';
}

function drawEnding() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
    ctx.fillText('MISSION COMPLETE!', W/2, 100);
    ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
    ctx.fillText('キング・ドラゴンを倒した！', W/2, 140);
    ctx.fillText('街に平和が戻った...', W/2, 164);
    const totalScore = players.reduce((s,p) => s+p.score, 0);
    ctx.fillStyle = '#ff0'; ctx.font = '14px monospace';
    ctx.fillText(`TOTAL SCORE: ${totalScore}`, W/2, 210);
    if (Math.floor(frameCount/30)%2===0) {
        ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
        ctx.fillText('PRESS SPACE TO TITLE', W/2, 280);
    }
    ctx.textAlign = 'left';
}

// ============================================================
//  メインループ
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let charSelectP1 = null, charSelectP2 = null;

function update() {
    frameCount++;
    switch(gameState) {
        case 'title':
            if (keys['Space'] || keys['KeyZ']) {
                initAudio(audioState);
                startBGM(audioState, 'title');
                gameState = 'char_select';
                charSelectP1 = null; charSelectP2 = null;
            }
            break;
        case 'char_select':
            if (!prevKeys['KeyZ'] && keys['KeyZ']) charSelectP1 = 'jack';
            if (!prevKeys['KeyX'] && keys['KeyX']) charSelectP1 = 'kotaro';
            if (!prevKeys['KeyK'] && keys['KeyK']) charSelectP2 = 'jack';
            if (!prevKeys['KeyL'] && keys['KeyL']) charSelectP2 = 'kotaro';
            if (charSelectP1 && !prevKeys['Space'] && keys['Space']) {
                startGame();
            }
            if (charSelectP1 && charSelectP2) {
                startGame();
            }
            break;
        case 'playing':
            for (const p of players) p.update(keys, prevKeys, enemies, cameraX);
            for (const e of enemies) e.update(players);
            for (let i = projectiles.length - 1; i >= 0; i--) {
                projectiles[i].update(players, enemies);
                if (!projectiles[i].active) projectiles.splice(i, 1);
            }
            checkHits();
            updateCamera();
            if (players.every(p => p.state === 'dead')) {
                stopBGM(audioState);
                playSE(audioState.ctx, 'game_over');
                gameState = 'gameover';
            }
            break;
        case 'gameover':
            if (!prevKeys['Space'] && keys['Space']) startGame();
            break;
        case 'ending':
            if (!prevKeys['Space'] && keys['Space']) {
                gameState = 'title';
                startBGM(audioState, 'title');
            }
            break;
        case 'stage_clear':
            // タイムアウトで自動遷移（stageClear内のsetTimeoutが制御）
            break;
    }
    prevKeys = { ...keys };
}

function startGame() {
    players = [];
    players.push(new Player(charSelectP1 || 'jack', 0));
    if (charSelectP2) players.push(new Player(charSelectP2, 1));
    stopBGM(audioState);
    initStage(0);
    triggerNextWave();
    gameState = 'playing';
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    switch(gameState) {
        case 'title':       drawTitle();      break;
        case 'char_select': drawCharSelect(); break;
        case 'gameover':    drawGameOver();   break;
        case 'ending':      drawEnding();     break;
        case 'stage_clear':
            drawBackground(STAGES[currentStageIdx].bgTheme);
            ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle = '#ff0'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
            ctx.fillText('STAGE CLEAR!', W/2, H/2 - 10);
            ctx.fillStyle = '#fff'; ctx.font = '12px monospace';
            ctx.fillText('ステージクリア！', W/2, H/2 + 20);
            ctx.textAlign = 'left';
            break;
        case 'playing':
        case 'boss_intro': {
            drawBackground(STAGES[currentStageIdx].bgTheme);
            // y座標でソートして奥行き表現
            const drawables = [...players, ...enemies].sort((a, b) => a.y - b.y);
            for (const obj of drawables) {
                obj.draw(ctx, cameraX);
            }
            for (const pr of projectiles) pr.draw(ctx, cameraX);
            drawEffects();
            drawHUD();
            break;
        }
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ============================================================
//  入力処理
// ============================================================
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    // スペース・矢印のスクロール抑止
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
        e.preventDefault();
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
//  タッチ操作（1P用）
// ============================================================
function bindTouch(id, code) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; initAudio(audioState); }, { passive: false });
    btn.addEventListener('touchend',   e => { e.preventDefault(); keys[code] = false; }, { passive: false });
    btn.addEventListener('mousedown',  e => { keys[code] = true; initAudio(audioState); });
    btn.addEventListener('mouseup',    e => { keys[code] = false; });
}
bindTouch('tb-up',    'KeyW');
bindTouch('tb-down',  'KeyS');
bindTouch('tb-left',  'KeyA');
bindTouch('tb-right', 'KeyD');
bindTouch('tb-punch', 'KeyZ');
bindTouch('tb-kick',  'KeyX');
bindTouch('tb-jump',  'KeyC');

// ============================================================
//  初期化
// ============================================================
buildSprites();
loop();
</script>
