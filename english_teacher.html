<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語先生（音声会話）— hide portfolio</title>
  <meta name="description" content="ブラウザの音声合成・音声認識で、ネイティブ英語の先生と声で会話・発音練習・リスニングができる無料の英語学習ツール。">
  <style>
    :root {
      --bg: #070711;
      --panel: rgba(14, 18, 38, 0.78);
      --panel-strong: rgba(18, 24, 48, 0.92);
      --line: rgba(119, 224, 255, 0.2);
      --text: #f5f7fb;
      --muted: #aeb7cc;
      --cyan: #22d3ee;
      --magenta: #f472b6;
      --purple: #a78bfa;
      --gold: #f8d36f;
      --danger: #fb7185;
      --good: #34d399;
      --radius: 14px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.52);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(34, 211, 238, 0.15), transparent 28%),
        radial-gradient(circle at 85% 8%, rgba(167, 139, 250, 0.13), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(52, 211, 153, 0.07), transparent 34%),
        linear-gradient(160deg, #050510 0%, #0e0a1c 46%, #07101e 100%);
      overflow-x: hidden;
    }

    /* パーティクル背景 */
    #bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ヘッダー */
    header {
      position: relative;
      z-index: 10;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 16px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .logo {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.06em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(34, 211, 238, 0.36);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(167, 139, 250, 0.15));
      font-size: 1.1rem;
    }
    .logo b { color: var(--purple); }

    .back-link {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(15, 23, 42, 0.55);
      border-radius: 999px;
      padding: 8px 16px;
      text-decoration: none;
      font-size: 0.86rem;
      transition: border-color 0.16s ease, background 0.16s ease;
    }
    .back-link:hover {
      border-color: rgba(34, 211, 238, 0.55);
      background: rgba(34, 211, 238, 0.12);
    }

    main {
      position: relative;
      z-index: 5;
      width: min(760px, calc(100% - 28px));
      margin: 0 auto;
      padding: 8px 0 64px;
    }

    /* 画面制御 */
    .screen { display: none; }
    .screen.active { display: block; animation: fade 0.28s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .glass {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    /* ===================== スタート画面 ===================== */
    .hero { text-align: center; margin: 28px 0 22px; }
    .hero h1 {
      font-size: clamp(1.9rem, 6vw, 2.8rem);
      letter-spacing: 0.02em;
      line-height: 1.2;
      background: linear-gradient(100deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero .sub { color: var(--muted); margin-top: 8px; font-size: 0.98rem; }
    .hero .teacher-avatar {
      font-size: 3rem;
      display: inline-grid;
      place-items: center;
      width: 84px; height: 84px;
      border-radius: 24px;
      margin-bottom: 12px;
      border: 1px solid rgba(167, 139, 250, 0.3);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.14), rgba(167, 139, 250, 0.16));
    }

    .section-label {
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--cyan);
      margin: 22px 4px 10px;
      font-weight: 700;
    }

    /* レベル選択 */
    .level-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px; }
    .level-chip {
      flex: 1 1 auto;
      min-width: 84px;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.4);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      font-size: 0.86rem;
      transition: all 0.15s ease;
    }
    .level-chip small { display: block; color: var(--muted); font-size: 0.72rem; margin-top: 2px; }
    .level-chip[aria-pressed="true"] {
      border-color: var(--cyan);
      background: rgba(34, 211, 238, 0.14);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.3) inset;
    }

    /* モードカード */
    .mode-grid { display: grid; gap: 12px; }
    .mode-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      color: var(--text);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .mode-card:hover { transform: translateY(-2px); border-color: rgba(34, 211, 238, 0.5); }
    .mode-card .ico {
      font-size: 1.8rem;
      width: 54px; height: 54px;
      flex: 0 0 auto;
      display: grid; place-items: center;
      border-radius: 14px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid var(--line);
    }
    .mode-card h3 { font-size: 1.05rem; }
    .mode-card p { color: var(--muted); font-size: 0.84rem; margin-top: 3px; }
    .mode-card .en { color: var(--purple); font-size: 0.78rem; letter-spacing: 0.04em; }

    /* サポート状況バナー */
    .support-note {
      margin-top: 18px;
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--muted);
      border-radius: 10px;
      border: 1px dashed var(--line);
      background: rgba(15, 23, 42, 0.35);
    }
    .support-note b { color: var(--text); }
    .support-note.warn { border-color: rgba(251, 113, 133, 0.5); color: #ffd7de; }

    /* ===================== レッスン一覧 ===================== */
    .crumb {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: none; color: var(--cyan);
      cursor: pointer; font-size: 0.9rem; padding: 6px 2px; margin-bottom: 6px;
    }
    .lesson-list { display: grid; gap: 10px; }
    .lesson-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; cursor: pointer; width: 100%;
      text-align: left; color: var(--text);
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .lesson-item:hover { transform: translateY(-2px); border-color: rgba(167, 139, 250, 0.5); }
    .lesson-item .num {
      width: 30px; height: 30px; flex: 0 0 auto;
      display: grid; place-items: center; border-radius: 8px;
      background: rgba(167, 139, 250, 0.16); color: var(--purple); font-weight: 700; font-size: 0.9rem;
    }
    .lesson-item .lvl { margin-left: auto; font-size: 0.72rem; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }
    .lesson-item h4 { font-size: 0.98rem; }
    .lesson-item small { color: var(--muted); }

    /* ===================== セッション画面 ===================== */
    .session-top {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px;
    }
    .progress-pill { font-size: 0.78rem; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; }

    .chat { display: flex; flex-direction: column; gap: 12px; padding: 16px; min-height: 320px; }

    .bubble { max-width: 88%; padding: 12px 14px; border-radius: 14px; line-height: 1.5; animation: fade 0.25s ease; }
    .bubble .en-line { font-size: 1.05rem; }
    .bubble .ja-line { color: var(--muted); font-size: 0.84rem; margin-top: 5px; }
    .bubble .row { display: flex; align-items: center; gap: 8px; }

    .bubble.teacher {
      align-self: flex-start;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.28);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      align-self: flex-end;
      background: rgba(167, 139, 250, 0.14);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-bottom-right-radius: 4px;
    }
    .bubble.feedback {
      align-self: flex-start; max-width: 96%;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--line);
    }
    .bubble.feedback .good { color: var(--good); font-size: 0.9rem; }
    .bubble.feedback .fix { color: var(--gold); font-size: 0.9rem; margin-top: 6px; }
    .bubble.feedback .model { margin-top: 8px; }
    .bubble.feedback .why { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }

    .speaker-btn {
      flex: 0 0 auto;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--line); background: rgba(15, 23, 42, 0.5);
      color: var(--cyan); cursor: pointer; font-size: 0.9rem;
      display: grid; place-items: center;
      transition: background 0.15s ease;
    }
    .speaker-btn:hover { background: rgba(34, 211, 238, 0.16); }

    /* 発音・クイズ補助 */
    .hint-chip { display: inline-block; margin: 4px 6px 0 0; font-size: 0.8rem; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 3px 8px; }
    .hint-chip b { color: var(--cyan); }
    .choice-grid { display: grid; gap: 8px; margin-top: 4px; }
    .choice-btn {
      text-align: left; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--line); background: rgba(15, 23, 42, 0.4);
      color: var(--text); cursor: pointer; font-size: 0.94rem;
      transition: all 0.15s ease;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--cyan); background: rgba(34, 211, 238, 0.1); }
    .choice-btn.correct { border-color: var(--good); background: rgba(52, 211, 153, 0.16); }
    .choice-btn.wrong { border-color: var(--danger); background: rgba(251, 113, 133, 0.16); }
    .choice-btn:disabled { cursor: default; }

    /* 入力コントロール */
    .controls { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; margin-top: 14px; }
    .mic-row { display: flex; align-items: center; gap: 12px; }
    .mic-btn {
      flex: 0 0 auto;
      width: 66px; height: 66px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 1.7rem;
      display: grid; place-items: center;
      color: #06121a;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      box-shadow: 0 8px 26px rgba(34, 211, 238, 0.34);
      transition: transform 0.12s ease, box-shadow 0.2s ease;
    }
    .mic-btn:active { transform: scale(0.94); }
    .mic-btn.listening { animation: pulse 1.1s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.5); }
      70% { box-shadow: 0 0 0 16px rgba(34, 211, 238, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
    }
    .mic-status { color: var(--muted); font-size: 0.86rem; }
    .mic-status b { color: var(--cyan); }

    .text-fallback { display: flex; gap: 8px; }
    .text-fallback input {
      flex: 1; padding: 11px 14px; border-radius: 10px;
      border: 1px solid var(--line); background: rgba(6, 10, 22, 0.6);
      color: var(--text); font-size: 0.95rem; font-family: inherit;
    }
    .text-fallback input:focus { outline: none; border-color: var(--cyan); }

    .btn {
      border: 1px solid var(--line); background: rgba(15, 23, 42, 0.5);
      color: var(--text); border-radius: 10px; padding: 11px 16px;
      cursor: pointer; font-size: 0.9rem; font-family: inherit;
      transition: all 0.15s ease;
    }
    .btn:hover { border-color: var(--cyan); background: rgba(34, 211, 238, 0.1); }
    .btn.primary {
      border: none; color: #06121a; font-weight: 700;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
    }
    .btn.ghost { background: none; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-row .spacer { flex: 1; }

    /* サマリー */
    .summary { padding: 22px; text-align: center; }
    .summary .score { font-size: 2.4rem; font-weight: 800; color: var(--cyan); }
    .summary ul { text-align: left; margin: 16px auto 0; max-width: 480px; color: var(--muted); line-height: 1.7; padding-left: 20px; }
    .summary ul b { color: var(--text); }

    @media (max-width: 560px) {
      .mode-card .ico { width: 46px; height: 46px; font-size: 1.5rem; }
      .hero .teacher-avatar { width: 72px; height: 72px; font-size: 2.6rem; }
    }
    .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <header>
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">🎙️</span>
      <span>English <b>Teacher</b></span>
    </a>
    <a class="back-link" href="index.html">← ポートフォリオへ / Portfolio</a>
  </header>

  <main>
    <!-- ========== スタート画面 ========== -->
    <section id="screen-start" class="screen active" role="main">
      <div class="hero">
        <div class="teacher-avatar" aria-hidden="true">👩‍🏫</div>
        <h1>Talk with your English Teacher</h1>
        <p class="sub">声で会話するAI英語の先生。マイクで話して、発音・会話・リスニングを練習しよう。<br>Speak out loud — your teacher talks back with voice.</p>
      </div>

      <div class="section-label">レベル / Level (CEFR)</div>
      <div class="level-row glass" id="level-row" role="group" aria-label="CEFR level">
        <button class="level-chip" data-level="A1">A1–A2<small>初級 / Beginner</small></button>
        <button class="level-chip" aria-pressed="true" data-level="B1">B1–B2<small>中級 / Intermediate</small></button>
        <button class="level-chip" data-level="C1">C1–C2<small>上級 / Advanced</small></button>
      </div>

      <div class="section-label">練習モード / Mode</div>
      <div class="mode-grid" id="mode-grid"></div>

      <div class="support-note" id="support-note"></div>
    </section>

    <!-- ========== レッスン一覧 ========== -->
    <section id="screen-lessons" class="screen">
      <button class="crumb" id="lessons-back">← モード選択へ / Back</button>
      <div class="section-label" id="lessons-title"></div>
      <div class="lesson-list" id="lesson-list"></div>
    </section>

    <!-- ========== セッション ========== -->
    <section id="screen-session" class="screen">
      <div class="session-top">
        <button class="crumb" id="session-back">← やめる / Quit</button>
        <span class="progress-pill" id="progress-pill">1 / 1</span>
      </div>

      <div class="chat glass" id="chat" aria-live="polite"></div>

      <div class="controls glass" id="controls">
        <div class="mic-row" id="mic-row">
          <button class="mic-btn" id="mic-btn" aria-label="Push to talk">🎤</button>
          <div class="mic-status" id="mic-status">🎤 ボタンを押して英語で話してください / Tap the mic and speak</div>
        </div>
        <div class="text-fallback">
          <input type="text" id="text-input" placeholder="またはここに英語で入力 / or type your English…" autocomplete="off" autocapitalize="off">
          <button class="btn primary" id="text-send">送信 / Send</button>
        </div>
        <div class="btn-row">
          <button class="btn ghost" id="btn-replay">🔊 もう一度きく / Replay</button>
          <span class="spacer"></span>
          <button class="btn" id="btn-skip">スキップ / Skip →</button>
        </div>
      </div>
    </section>

    <!-- ========== サマリー ========== -->
    <section id="screen-summary" class="screen">
      <div class="summary glass">
        <div class="score" id="summary-score">🎉</div>
        <h2 id="summary-title">Great work!</h2>
        <ul id="summary-points"></ul>
        <div class="btn-row" style="justify-content:center; margin-top:20px;">
          <button class="btn primary" id="summary-again">もう一度 / Again</button>
          <button class="btn" id="summary-home">モード選択へ / Modes</button>
        </div>
      </div>
    </section>
  </main>

  <script>
  "use strict";
  (function () {
    // =====================================================================
    // パーティクル背景（サイト共通パターン）
    // =====================================================================
    (function initParticles() {
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas.getContext("2d");
      let W, H;
      const particles = [];
      const COUNT = 30;
      const COLORS = ["rgba(34,211,238,", "rgba(167,139,250,", "rgba(52,211,153,"];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function make() {
        return {
          x: Math.random() * (W || 800), y: Math.random() * (H || 600),
          r: 1.5 + Math.random() * 2.5,
          vx: (Math.random() - 0.5) * 0.3, vy: -0.1 - Math.random() * 0.25,
          alpha: 0.08 + Math.random() * 0.17,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
        };
      }
      resize();
      for (let i = 0; i < COUNT; i++) { const p = make(); particles.push(p); }
      function animate() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color + p.alpha + ")";
          ctx.fill();
          p.x += p.vx; p.y += p.vy;
          if (p.y < -10 || p.x < -10 || p.x > W + 10) { Object.assign(p, make()); p.y = H + 5; p.x = Math.random() * W; }
        }
        requestAnimationFrame(animate);
      }
      animate();
      window.addEventListener("resize", resize);
    })();

    // =====================================================================
    // 音声エンジン（TTS: speechSynthesis / STT: SpeechRecognition）
    // =====================================================================
    const TTS = {
      supported: "speechSynthesis" in window,
      voice: null,
      pickVoice() {
        if (!this.supported) return;
        const voices = speechSynthesis.getVoices();
        if (!voices.length) return;
        this.voice =
          voices.find(v => /en[-_]US/i.test(v.lang) && /female|samantha|zira|google/i.test(v.name)) ||
          voices.find(v => /en[-_]US/i.test(v.lang)) ||
          voices.find(v => /en[-_]GB/i.test(v.lang)) ||
          voices.find(v => /^en/i.test(v.lang)) || null;
      },
      speak(text, rate, onend) {
        if (!this.supported) { if (onend) setTimeout(onend, 300); return; }
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        u.rate = rate || 0.95;
        u.pitch = 1.0;
        if (this.voice) u.voice = this.voice;
        if (onend) u.onend = onend;
        speechSynthesis.speak(u);
      },
      cancel() { if (this.supported) speechSynthesis.cancel(); },
    };
    if (TTS.supported) {
      TTS.pickVoice();
      speechSynthesis.onvoiceschanged = () => TTS.pickVoice();
    }

    const SR_Class = window.SpeechRecognition || window.webkitSpeechRecognition || null;
    const STT = {
      supported: !!SR_Class,
      rec: null,
      listening: false,
      init() {
        if (!this.supported) return;
        this.rec = new SR_Class();
        this.rec.lang = "en-US";
        this.rec.interimResults = true;
        this.rec.continuous = false;
        this.rec.maxAlternatives = 1;
      },
      start(onInterim, onFinal, onErr) {
        if (!this.supported || this.listening) return;
        let finalText = "";
        this.rec.onresult = (e) => {
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) finalText += t; else interim += t;
          }
          if (interim && onInterim) onInterim(interim);
        };
        this.rec.onerror = (e) => { this.listening = false; if (onErr) onErr(e.error); };
        this.rec.onend = () => { this.listening = false; if (onFinal) onFinal(finalText.trim()); };
        try { this.rec.start(); this.listening = true; }
        catch (err) { this.listening = false; if (onErr) onErr("start-failed"); }
      },
      stop() { if (this.supported && this.listening) { try { this.rec.stop(); } catch (e) {} } },
    };
    STT.init();

    // =====================================================================
    // レッスンデータ（台本ベース・LLM不使用）
    // =====================================================================
    const MODES = [
      { id: "roleplay", icon: "💬", title: "英会話ロールプレイ", en: "Conversation Roleplay",
        desc: "先生と役になりきって会話。マイクで応答すると会話が進みます。" },
      { id: "repeat", icon: "🗣️", title: "発音練習（リピート）", en: "Pronunciation — Listen & Repeat",
        desc: "先生の英語を聞いて、同じように声に出して発音チェック。" },
      { id: "listening", icon: "👂", title: "リスニング・クイズ", en: "Listening Quiz",

    // roleplay: steps[].teacher(EN読み上げ) / ja(和訳) / accept(受理語) / model(自然な言い回し)

    // listening: steps[].audio(EN) / q(和訳質問) / choices[] / answer(index)

      repeat: [
        { id: "lr", title: "L と R の聞き分け", sub: "L / R minimal pairs", level: "A1–A2",
          steps: [

              tip: "R は舌をどこにもつけない。L は舌先を上前歯の裏につける。" },
            { target: "The light is right there.", ipa: "/ðə laɪt ɪz raɪt ðɛr/", kana: "ザ ライト イズ ライト ゼア",
              tip: "light(L) は舌先を歯茎に、right(R) は舌を丸めて浮かせる。" },
            { target: "Please collect the letters.", ipa: "/pliːz kəˈlɛkt ðə ˈlɛtərz/", kana: "プリーズ コレクト ザ レターズ",
              tip: "L が続く単語で舌先の接触を意識。" },
          ] },
        { id: "th", title: "TH の発音", sub: "The TH sounds", level: "A2–B1",
          steps: [

              tip: "舌先を軽く歯の間に。thank は息だけ(無声)、these は声を出す(有声)。" },
            { target: "I think this is the third one.", ipa: "/aɪ θɪŋk ðɪs ɪz ðə θɜːrd wʌn/", kana: "アイ シンク ディス イズ ザ サード ワン",
              tip: "think/third は無声、this/the は有声の TH。" },

          steps: [

              tip: "Could you は「クッジュー」とつながる(リンキング)。" },
            { target: "I'm not sure I follow you.", ipa: "/aɪm nɑt ʃʊr aɪ ˈfɑloʊ juː/", kana: "アイム ノット シュア アイ フォロー ユー",
              tip: "follow you は「フォロ ユー」と滑らかに。" },
            { target: "Let me get back to you on that.", ipa: "/lɛt mi ɡɛt bæk tə juː ɑn ðæt/", kana: "レッミー ゲッバック トゥ ユー オン ザット",
              tip: "Let me→レッミー、get back→ゲッバック と t が消える/つながる。" },

      listening: [
        { id: "daily", title: "日常会話を聞き取る", sub: "Everyday comprehension", level: "A2–B1",
          steps: [
            { audio: "I'll take the train because the bus is too slow.", q: "話し手はどうやって行く？",
              choices: ["電車で行く", "バスで行く", "歩いて行く"], answer: 0 },
            { audio: "Let's meet at half past seven in front of the station.", q: "待ち合わせは何時？",
              choices: ["7時", "7時半", "8時"], answer: 1 },
            { audio: "Sorry, I can't make it today. Can we reschedule for Friday?", q: "話し手の意図は？",
              choices: ["今日会いたい", "金曜に変更したい", "キャンセルしたい"], answer: 1 },
          ] },
        { id: "numbers", title: "数字・時間・値段", sub: "Numbers, time & prices", level: "A1–A2",
          steps: [
            { audio: "It costs thirteen dollars, not thirty.", q: "値段はいくら？",
              choices: ["13ドル", "30ドル", "33ドル"], answer: 0 },
            { audio: "The meeting is on the fifteenth, at nine a.m.", q: "会議はいつ？",
              choices: ["5日 9時", "15日 9時", "15日 5時"], answer: 1 },
            { audio: "There are about two hundred and fifty people here.", q: "何人くらいいる？",
              choices: ["215人", "250人", "1250人"], answer: 1 },
          ] },
      ],
    };

    // =====================================================================
    // 状態
    // =====================================================================
    const state = { level: "B1", mode: null, lesson: null, stepIndex: 0, correct: 0, total: 0, tries: 0, answered: false };
    const rateForLevel = () => ({ A1: 0.8, B1: 0.95, C1: 1.05 }[state.level] || 0.95);

    // =====================================================================
    // DOM ヘルパ
    // =====================================================================
    const $ = (id) => document.getElementById(id);
    const screens = ["screen-start", "screen-lessons", "screen-session", "screen-summary"];
    function show(id) {
      screens.forEach(s => $(s).classList.toggle("active", s === id));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text != null) e.textContent = text;
      return e;
    }
    function speakerButton(text, rate) {
      const b = el("button", "speaker-btn", "🔊");
      b.setAttribute("aria-label", "Play audio");
      b.addEventListener("click", () => TTS.speak(text, rate || rateForLevel()));
      return b;
    }
    // 正規化：小文字化・記号除去・空白圧縮
    function normalize(s) {
      return (s || "").toLowerCase().replace(/[^a-z0-9\s']/g, " ").replace(/\s+/g, " ").trim();
    }

    // =====================================================================
    // スタート画面
    // =====================================================================
    function buildStart() {
      // レベル選択
      $("level-row").querySelectorAll(".level-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          state.level = chip.dataset.level;
          $("level-row").querySelectorAll(".level-chip").forEach(c => c.setAttribute("aria-pressed", String(c === chip)));
        });
      });
      // モードカード
      const grid = $("mode-grid");
      MODES.forEach(m => {
        const card = el("button", "mode-card glass");
        const ico = el("div", "ico", m.icon);
        const body = el("div");
        body.appendChild(el("div", "en", m.en));
        body.appendChild(el("h3", null, m.title));
        body.appendChild(el("p", null, m.desc));
        card.appendChild(ico); card.appendChild(body);
        card.addEventListener("click", () => openLessons(m.id));
        grid.appendChild(card);
      });
      // サポート状況
      const note = $("support-note");
      if (!TTS.supported && !STT.supported) {
        note.classList.add("warn");
        note.innerHTML = "";
        note.appendChild(document.createTextNode("⚠️ このブラウザは音声合成・音声認識に対応していません。テキストで練習できます。（Chrome 推奨）"));
      } else if (!STT.supported) {
        note.innerHTML = "";
        const b = el("b", null, "🎤 このブラウザは音声認識（マイク入力）に未対応です。");
        note.appendChild(b);
        note.appendChild(document.createTextNode(" 先生の音声は再生され、応答はテキスト入力でできます。マイクを使うには Google Chrome を推奨します。"));
      } else {
        note.innerHTML = "";
        const b = el("b", null, "🎧 ヘッドホン推奨。");
        note.appendChild(b);
        note.appendChild(document.createTextNode(" マイクの使用許可を求められたら「許可」を選んでください。声はブラウザ内で処理され、どこにも送信されません。"));
      }
    }

    // =====================================================================
    // レッスン一覧
    // =====================================================================
    function openLessons(modeId) {
      state.mode = modeId;
      const mode = MODES.find(m => m.id === modeId);
      $("lessons-title").textContent = mode.icon + " " + mode.title + " / " + mode.en;
      const list = $("lesson-list");
      list.innerHTML = "";
      LESSONS[modeId].forEach((lesson, i) => {
        const item = el("button", "lesson-item glass");
        item.appendChild(el("div", "num", String(i + 1)));
        const body = el("div");
        body.appendChild(el("h4", null, lesson.title));
        body.appendChild(el("small", null, lesson.sub));
        item.appendChild(body);
        item.appendChild(el("span", "lvl", lesson.level));
        item.addEventListener("click", () => startSession(lesson));
        list.appendChild(item);
      });
      show("screen-lessons");
    }

    // =====================================================================
    // セッション
    // =====================================================================
    function startSession(lesson) {
      state.lesson = lesson;
      state.stepIndex = 0;
      state.correct = 0;
      state.total = lesson.steps.length;
      $("chat").innerHTML = "";
      show("screen-session");
      renderStep();
    }

    function updateProgress() {
      $("progress-pill").textContent = (state.stepIndex + 1) + " / " + state.total;
    }

    function scrollChat() {
      const chat = $("chat");
      chat.scrollTop = chat.scrollHeight;
    }

    function renderStep() {
      state.tries = 0;
      state.answered = false;
      updateProgress();
      const step = state.lesson.steps[state.stepIndex];
      const controls = $("controls");

      if (state.mode === "listening") {
        controls.style.display = "none";
        renderListeningStep(step);
      } else if (state.mode === "repeat") {
        controls.style.display = "flex";
        renderRepeatStep(step);
      } else {
        controls.style.display = "flex";
        renderRoleplayStep(step);
      }
    }

    // ----- ロールプレイ -----
    function renderRoleplayStep(step) {
      const bubble = el("div", "bubble teacher");
      const row = el("div", "row");
      row.appendChild(el("span", "en-line", step.teacher));
      row.appendChild(speakerButton(step.teacher));
      bubble.appendChild(row);
      bubble.appendChild(el("div", "ja-line", step.ja));
      $("chat").appendChild(bubble);
      scrollChat();
      TTS.speak(step.teacher, rateForLevel());
      setMicStatus("🎤 マイクを押して答えてください / Tap the mic to reply");
    }

    function handleRoleplayAnswer(text) {
      if (state.answered) return;
      addUserBubble(text);
      const step = state.lesson.steps[state.stepIndex];
      const norm = normalize(text);
      const hit = step.accept.some(k => norm.includes(normalize(k)));
      state.answered = true;

      const fb = el("div", "bubble feedback");
      if (hit) {
        state.correct++;
        fb.appendChild(el("div", "good", "✅ Nice! よく伝わっています。"));
      } else {
        fb.appendChild(el("div", "good", "👍 チャレンジ OK! 通じる言い方を見てみましょう。"));
      }
      const modelWrap = el("div", "model");
      const mrow = el("div", "row");
      mrow.appendChild(el("span", "en-line", "💡 " + step.model));
      mrow.appendChild(speakerButton(step.model));
      modelWrap.appendChild(mrow);
      modelWrap.appendChild(el("div", "ja-line", "More natural / モデル表現"));
      fb.appendChild(modelWrap);
      $("chat").appendChild(fb);
      scrollChat();
      showNextButton();
    }

    // ----- 発音リピート -----
    function renderRepeatStep(step) {
      const bubble = el("div", "bubble teacher");
      const row = el("div", "row");
      row.appendChild(el("span", "en-line", step.target));
      row.appendChild(speakerButton(step.target));
      bubble.appendChild(row);
      const hints = el("div");
      if (step.ipa) { const c = el("span", "hint-chip"); c.appendChild(el("b", null, "IPA ")); c.appendChild(document.createTextNode(step.ipa)); hints.appendChild(c); }
      if (step.kana) { const c = el("span", "hint-chip"); c.appendChild(el("b", null, "カナ ")); c.appendChild(document.createTextNode(step.kana)); hints.appendChild(c); }
      bubble.appendChild(hints);
      if (step.tip) bubble.appendChild(el("div", "ja-line", "💬 " + step.tip));
      $("chat").appendChild(bubble);
      scrollChat();
      TTS.speak(step.target, rateForLevel());
      setMicStatus("🗣️ 同じように声に出してみましょう / Repeat it aloud");
    }

    function handleRepeatAnswer(text) {
      if (state.answered) return;
      addUserBubble(text);
      const step = state.lesson.steps[state.stepIndex];
      const targetWords = normalize(step.target).split(" ").filter(Boolean);
      const saidWords = new Set(normalize(text).split(" ").filter(Boolean));
      const matched = targetWords.filter(w => saidWords.has(w)).length;
      const ratio = targetWords.length ? matched / targetWords.length : 0;
      state.tries++;

      const fb = el("div", "bubble feedback");
      if (ratio >= 0.6) {
        state.correct++;
        state.answered = true;
        fb.appendChild(el("div", "good", "✅ Great pronunciation! (" + Math.round(ratio * 100) + "% match)"));
        fb.appendChild(el("div", "why", "しっかり伝わる発音です。次に進みましょう。"));
        $("chat").appendChild(fb);
        scrollChat();
        showNextButton();
      } else if (state.tries >= 2) {
        state.answered = true;
        fb.appendChild(el("div", "fix", "🔁 惜しい！(" + Math.round(ratio * 100) + "%) もう一度お手本を聞いてみましょう。"));
        const mrow = el("div", "row");
        mrow.appendChild(el("span", "en-line", step.target));
        mrow.appendChild(speakerButton(step.target));
        fb.appendChild(mrow);
        $("chat").appendChild(fb);
        scrollChat();
        showNextButton();
      } else {
        fb.appendChild(el("div", "fix", "🙌 もう一回チャレンジ！(" + Math.round(ratio * 100) + "% match) ゆっくり、はっきり。"));
        fb.appendChild(el("div", "why", "🔊 のボタンでお手本をもう一度聞けます。"));
        $("chat").appendChild(fb);
        scrollChat();
      }
    }

    // ----- リスニングクイズ -----
    function renderListeningStep(step) {
      const bubble = el("div", "bubble teacher");
      const row = el("div", "row");
      row.appendChild(el("span", "en-line", "🔊 Listen…"));
      row.appendChild(speakerButton(step.audio));
      bubble.appendChild(row);
      bubble.appendChild(el("div", "ja-line", "❓ " + step.q));

      const grid = el("div", "choice-grid");
      step.choices.forEach((choice, idx) => {
        const btn = el("button", "choice-btn", choice);
        btn.addEventListener("click", () => {
          if (state.answered) return;
          state.answered = true;
          const correct = idx === step.answer;
          if (correct) { state.correct++; btn.classList.add("correct"); }
          else {
            btn.classList.add("wrong");
            grid.children[step.answer].classList.add("correct");
          }
          Array.from(grid.children).forEach(b => (b.disabled = true));
          const fb = el("div", "bubble feedback");
          fb.appendChild(el("div", correct ? "good" : "fix", correct ? "✅ Correct! 正解です。" : "❌ 惜しい！正解は「" + step.choices[step.answer] + "」"));
          const mrow = el("div", "row");
          mrow.appendChild(el("span", "en-line", "“" + step.audio + "”"));
          mrow.appendChild(speakerButton(step.audio));
          fb.appendChild(mrow);
          $("chat").appendChild(fb);
          scrollChat();
          showNextButton();
        });
        grid.appendChild(btn);
      });
      bubble.appendChild(grid);
      $("chat").appendChild(bubble);
      scrollChat();
      TTS.speak(step.audio, rateForLevel());
    }

    // ----- 共通 -----
    function addUserBubble(text) {
      const b = el("div", "bubble user");
      b.appendChild(el("span", "en-line", text)); // textContent 経由でXSS安全
      $("chat").appendChild(b);
      scrollChat();
    }

    let nextBtn = null;
    function showNextButton() {
      removeNextButton();
      nextBtn = el("button", "btn primary", state.stepIndex + 1 >= state.total ? "結果をみる / See results →" : "次へ / Next →");
      nextBtn.style.width = "100%";
      nextBtn.style.marginTop = "8px";
      nextBtn.addEventListener("click", advance);
      $("chat").appendChild(nextBtn);
      scrollChat();
    }
    function removeNextButton() { if (nextBtn && nextBtn.parentNode) nextBtn.parentNode.removeChild(nextBtn); nextBtn = null; }

    function advance() {
      removeNextButton();
      TTS.cancel();
      state.stepIndex++;
      if (state.stepIndex >= state.total) { finish(); return; }
      renderStep();
    }

    function setMicStatus(msg) {
      const s = $("mic-status");
      s.textContent = "";
      s.appendChild(document.createTextNode(msg));
    }

    // =====================================================================
    // マイク／テキスト入力
    // =====================================================================
    function dispatchAnswer(text) {
      if (!text || !text.trim()) return;
      if (state.mode === "repeat") handleRepeatAnswer(text.trim());
      else handleRoleplayAnswer(text.trim());
    }

    function onMic() {
      if (!STT.supported) { setMicStatus("⚠️ 音声認識に未対応。下のテキスト欄を使ってください。"); return; }
      if (state.answered) return;
      const btn = $("mic-btn");
      if (STT.listening) { STT.stop(); return; }
      TTS.cancel();
      btn.classList.add("listening");
      setMicStatus("🎧 聞き取り中… / Listening…");
      STT.start(
        (interim) => setMicStatus("… " + interim),
        (finalText) => {
          btn.classList.remove("listening");
          if (finalText) { setMicStatus("🎤 マイクを押して答える / Tap the mic"); dispatchAnswer(finalText); }
          else setMicStatus("🤔 うまく聞き取れませんでした。もう一度どうぞ。");
        },
        (err) => {
          btn.classList.remove("listening");
          if (err === "not-allowed" || err === "service-not-allowed")
            setMicStatus("🚫 マイクが許可されていません。ブラウザの設定で許可するか、テキスト欄をご利用ください。");
          else setMicStatus("⚠️ 認識エラー（" + err + "）。テキスト欄も使えます。");
        }
      );
    }

    // =====================================================================
    // 終了・サマリー
    // =====================================================================
    function finish() {
      TTS.cancel();
      const pct = state.total ? Math.round((state.correct / state.total) * 100) : 0;
      $("summary-score").textContent = pct >= 80 ? "🏆 " + pct + "%" : pct >= 50 ? "👍 " + pct + "%" : "💪 " + pct + "%";
      $("summary-title").textContent = pct >= 80 ? "Excellent!" : pct >= 50 ? "Good job!" : "Keep going!";
      const pts = $("summary-points");
      pts.innerHTML = "";
      const items = [
        ["今日の練習", state.lesson.title + "（" + state.total + "問）"],
        ["結果", state.correct + " / " + state.total + " クリア"],
        ["ポイント", state.mode === "repeat" ? "ゆっくり・はっきりを意識すると通じやすくなります。"
          : state.mode === "listening" ? "数字や時間は弱く速く読まれるので、繰り返し聞くのがコツ。"
          : "「モデル表現」を声に出して覚えると、次から自然に出てきます。"],
      ];
      items.forEach(([k, v]) => {
        const li = document.createElement("li");
        li.appendChild(el("b", null, k + "： "));
        li.appendChild(document.createTextNode(v));
        pts.appendChild(li);
      });
      show("screen-summary");
    }

    // =====================================================================
    // イベント配線
    // =====================================================================
    $("mic-btn").addEventListener("click", onMic);
    $("text-send").addEventListener("click", () => { const i = $("text-input"); dispatchAnswer(i.value); i.value = ""; });
    $("text-input").addEventListener("keydown", (e) => { if (e.key === "Enter") { dispatchAnswer(e.target.value); e.target.value = ""; } });
    $("btn-replay").addEventListener("click", () => {
      const step = state.lesson.steps[state.stepIndex];
      const t = state.mode === "listening" ? step.audio : state.mode === "repeat" ? step.target : step.teacher;
      TTS.speak(t, rateForLevel());
    });
    $("btn-skip").addEventListener("click", () => { if (!state.answered) { state.answered = true; } advance(); });
    $("lessons-back").addEventListener("click", () => { TTS.cancel(); show("screen-start"); });
    $("session-back").addEventListener("click", () => { TTS.cancel(); STT.stop(); openLessons(state.mode); });
    $("summary-again").addEventListener("click", () => startSession(state.lesson));
    $("summary-home").addEventListener("click", () => { show("screen-start"); });

    // ページ離脱時に音声を止める（メモリ/音声リーク防止）
    window.addEventListener("pagehide", () => { TTS.cancel(); STT.stop(); });

    buildStart();
  })();
  </script>
</body>
</html>
