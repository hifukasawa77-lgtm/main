# Android Game Bot — シナリオ定義サンプル
# このファイルをコピーしてゲームに合わせて編集してください。
#
# 使い方:
#   agb run scenarios/example_scenario.yaml --dry-run   # 動作確認（実際にタップしない）
#   agb run scenarios/example_scenario.yaml             # 実行

name: "auto_battle"
description: "RPGのバトル画面を自動で周回するサンプル"

# テンプレート画像のディレクトリ（このYAMLファイルからの相対パス）
templates_dir: "../templates"

# ループ間隔（秒）
interval_seconds: 1.5

# 最大繰り返し回数（null = 無制限）
max_iterations: 500

# ────────────────────────────────────────────────────────────────────
# ルール定義
# ────────────────────────────────────────────────────────────────────
# ・ルールは priority 降順で評価し、条件を満たした最初のルールのみ実行
# ・condition_mode: all → 全条件AND / any → いずれか1つOR
# ・action.type 一覧: tap / tap_match / swipe / key_event / wait / log
#
rules:

  # ローディング中は待機（優先度高）
  - name: "wait_loading"
    priority: 10
    condition_mode: "all"
    conditions:
      - type: template_found
        template: "loading_spinner"
        threshold: 0.80
    actions:
      - type: log
        message: "ローディング中…"
      - type: wait
        seconds: 2.0

  # リザルト画面の「OK」または「閉じる」をタップ
  - name: "dismiss_result"
    priority: 8
    condition_mode: "any"
    conditions:
      - type: template_found
        template: "ok_button"
      - type: template_found
        template: "close_button"
    actions:
      - type: tap_match          # マッチした場所をタップ
        template: "ok_button"
      - type: wait
        seconds: 0.8

  # バトル開始ボタンをタップ
  - name: "start_battle"
    priority: 5
    condition_mode: "all"
    conditions:
      - type: template_found
        template: "battle_start_button"
        threshold: 0.85
    actions:
      - type: tap_match
        template: "battle_start_button"
      - type: wait
        seconds: 0.5

  # スワイプが必要な画面
  - name: "swipe_down"
    priority: 3
    condition_mode: "all"
    conditions:
      - type: template_found
        template: "swipe_hint"
    actions:
      - type: swipe
        x: 540
        y: 1200
        x2: 540
        y2: 400
        duration_ms: 400
      - type: wait
        seconds: 0.5

  # 何もマッチしない場合は戻るキーを送信
  - name: "fallback_back"
    priority: 1
    condition_mode: "all"
    conditions:
      - type: template_not_found
        template: "battle_start_button"
      - type: template_not_found
        template: "ok_button"
      - type: template_not_found
        template: "loading_spinner"
    actions:
      - type: key_event
        keycode: 4             # KEYCODE_BACK
      - type: wait
        seconds: 0.8

  # 定期ログ（10イテレーションごと）
  - name: "periodic_log"
    priority: 0
    condition_mode: "all"
    conditions:
      - type: iteration_mod
        modulo: 10
    actions:
      - type: log
        message: "自動周回継続中…"

# ────────────────────────────────────────────────────────────────────
# 停止条件
# ────────────────────────────────────────────────────────────────────
stop_conditions:
  # 勝利画面が出たら停止
  - type: template_found
    template: "victory_screen"

  # 最大イテレーション数に達したら停止
  - type: max_iterations
    max_iterations: 500

  # 1時間経過したら停止
  - type: elapsed_seconds
    elapsed_seconds: 3600
