<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 対局途中の盤面: 4×4ドット, 3×3ボックス -->
  <!-- 完成ボックス: 青(0,0) / 赤(0,2) / 青(2,1) -->
  <rect x="25" y="25" width="50" height="50" fill="rgba(59,130,246,0.28)" rx="3"/>
  <rect x="125" y="25" width="50" height="50" fill="rgba(239,68,68,0.26)" rx="3"/>
  <rect x="75" y="125" width="50" height="50" fill="rgba(59,130,246,0.24)" rx="3"/>

  <!-- 青ライン: box(0,0) -->
  <line x1="25" y1="25" x2="75" y2="25" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="25" y2="75" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="75" y2="75" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="25" y1="75" x2="75" y2="75" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>

  <!-- 赤ライン: box(0,2) -->
  <line x1="125" y1="25" x2="175" y2="25" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="25" x2="125" y2="75" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="175" y1="25" x2="175" y2="75" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="75" x2="175" y2="75" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>

  <!-- 青ライン: box(2,1) -->
  <line x1="75" y1="125" x2="125" y2="125" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="125" x2="75" y2="175" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="125" x2="125" y2="175" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="175" x2="125" y2="175" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>

  <!-- 赤ライン: box(0,1) の3辺（残り1辺で完成できる状態） -->
  <line x1="75" y1="25" x2="125" y2="25" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="75" y2="75" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="25" x2="125" y2="75" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>

  <!-- 未完成の散在ライン（中間色: 土） -->
  <line x1="25"  y1="75"  x2="25"  y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>
  <line x1="175" y1="75"  x2="175" y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>
  <line x1="25"  y1="125" x2="75"  y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>
  <line x1="125" y1="125" x2="175" y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>
  <line x1="75"  y1="75"  x2="75"  y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.68"/>
  <line x1="125" y1="75"  x2="125" y2="125" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.68"/>
  <line x1="25"  y1="175" x2="75"  y2="175" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="125" y1="175" x2="175" y2="175" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="175" y1="125" x2="175" y2="175" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="25"  y1="125" x2="25"  y2="175" stroke="#b8956a" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>

  <!-- ドット: 4×4グリッド -->
  <circle cx="25"  cy="25"  r="5.5" fill="#2d1a0a"/>
  <circle cx="75"  cy="25"  r="5.5" fill="#2d1a0a"/>
  <circle cx="125" cy="25"  r="5.5" fill="#2d1a0a"/>
  <circle cx="175" cy="25"  r="5.5" fill="#2d1a0a"/>
  <circle cx="25"  cy="75"  r="5.5" fill="#2d1a0a"/>
  <circle cx="75"  cy="75"  r="5.5" fill="#2d1a0a"/>
  <circle cx="125" cy="75"  r="5.5" fill="#2d1a0a"/>
  <circle cx="175" cy="75"  r="5.5" fill="#2d1a0a"/>
  <circle cx="25"  cy="125" r="5.5" fill="#2d1a0a"/>
  <circle cx="75"  cy="125" r="5.5" fill="#2d1a0a"/>
  <circle cx="125" cy="125" r="5.5" fill="#2d1a0a"/>
  <circle cx="175" cy="125" r="5.5" fill="#2d1a0a"/>
  <circle cx="25"  cy="175" r="5.5" fill="#2d1a0a"/>
  <circle cx="75"  cy="175" r="5.5" fill="#2d1a0a"/>
  <circle cx="125" cy="175" r="5.5" fill="#2d1a0a"/>
  <circle cx="175" cy="175" r="5.5" fill="#2d1a0a"/>
</svg>
