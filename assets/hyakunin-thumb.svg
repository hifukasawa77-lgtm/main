<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1630;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0e2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5ead8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8d5b0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0e2c0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#922b21;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- autumn maple leaf pattern -->
    <pattern id="leaves" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M10,2 C10,2 14,6 13,10 C12,14 8,15 10,18 C12,15 16,16 17,12 C18,8 14,4 10,2Z" fill="#c0392b" opacity="0.3" transform="rotate(20,10,10)"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="200" height="140" fill="url(#bg)" rx="4"/>

  <!-- back card (yomifuda / reading card) - rotated slightly -->
  <g transform="rotate(-6, 70, 70)" filter="url(#shadow)">
    <rect x="30" y="10" width="70" height="118" rx="4" fill="url(#card1bg)"/>
    <!-- double border outer -->
    <rect x="32" y="12" width="66" height="114" rx="3" fill="none" stroke="#8B0000" stroke-width="1.2"/>
    <!-- double border inner -->
    <rect x="35" y="15" width="60" height="108" rx="2" fill="none" stroke="#8B0000" stroke-width="0.6"/>
    <!-- header bar -->
    <rect x="32" y="12" width="66" height="18" rx="3" fill="url(#headerGrad)"/>
    <rect x="32" y="24" width="66" height="6" rx="0" fill="url(#headerGrad)"/>
    <!-- header label -->
    <text x="65" y="24" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="7" fill="#f8d36f" font-weight="bold" letter-spacing="1">読み札</text>
    <!-- poem upper verse vertical text -->
    <text x="78" y="40" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="8.5" fill="#2c1810" writing-mode="tb-rl" text-anchor="start">秋の田の</text>
    <text x="67" y="40" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="8.5" fill="#2c1810" writing-mode="tb-rl" text-anchor="start">かりほの庵の</text>
    <text x="56" y="40" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="8.5" fill="#2c1810" writing-mode="tb-rl" text-anchor="start">苫をあらみ</text>
    <!-- poet name -->
    <text x="37" y="113" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="6" fill="#5a3a1a" writing-mode="tb-rl" text-anchor="start">天智天皇</text>
    <!-- decorative gold lines bottom -->
    <line x1="40" y1="106" x2="86" y2="106" stroke="#b8860b" stroke-width="0.5" opacity="0.7"/>
    <line x1="40" y1="108" x2="86" y2="108" stroke="#b8860b" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- front card (torifuda / taking card) -->
  <g transform="rotate(5, 118, 70)" filter="url(#shadow)">
    <rect x="100" y="14" width="68" height="112" rx="4" fill="url(#card2bg)"/>
    <!-- double border outer -->
    <rect x="102" y="16" width="64" height="108" rx="3" fill="none" stroke="#1a4a8a" stroke-width="1.2"/>
    <!-- double border inner -->
    <rect x="105" y="19" width="58" height="102" rx="2" fill="none" stroke="#1a4a8a" stroke-width="0.6"/>
    <!-- header bar -->
    <rect x="102" y="16" width="64" height="18" rx="3" fill="#1a3a7a"/>
    <rect x="102" y="28" width="64" height="6" fill="#1a3a7a"/>
    <!-- header label -->
    <text x="134" y="27" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="7" fill="#22d3ee" font-weight="bold" letter-spacing="1">取り札</text>
    <!-- poem lower verse vertical text -->
    <text x="151" y="43" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="9" fill="#1a2a4a" writing-mode="tb-rl" text-anchor="start">わが衣手は</text>
    <text x="140" y="43" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="9" fill="#1a2a4a" writing-mode="tb-rl" text-anchor="start">露にぬれつつ</text>
    <!-- decorative gold lines bottom -->
    <line x1="110" y1="106" x2="157" y2="106" stroke="#b8860b" stroke-width="0.5" opacity="0.7"/>
    <line x1="110" y1="108" x2="157" y2="108" stroke="#b8860b" stroke-width="0.3" opacity="0.5"/>
    <!-- poem number circle -->
    <circle cx="119" cy="115" r="7" fill="#1a3a7a" stroke="#22d3ee" stroke-width="0.8"/>
    <text x="119" y="118" text-anchor="middle" font-family="serif" font-size="8" fill="#f8d36f" font-weight="bold">一</text>
  </g>

  <!-- decorative autumn leaf accents top right -->
  <g opacity="0.5">
    <path d="M183,8 C183,8 190,15 188,22 C186,29 180,30 183,36 C186,30 192,32 194,26 C196,20 190,12 183,8Z" fill="#c0392b" transform="rotate(30,183,22)"/>
    <path d="M175,4 C175,4 180,9 179,14 C178,19 174,20 176,24 C178,20 182,21 183,17 C184,13 180,8 175,4Z" fill="#e74c3c" opacity="0.6" transform="rotate(-15,175,14)"/>
    <path d="M190,4 C190,4 195,8 194,13 C193,17 189,18 191,22 C193,18 197,19 198,15 C199,11 195,7 190,4Z" fill="#c0392b" opacity="0.4" transform="rotate(10,190,13)"/>
  </g>
  <!-- small leaf bottom left -->
  <path d="M8,130 C8,130 13,135 12,138 C11,141 8,142 9,144 C10,142 13,143 14,140 C15,137 11,133 8,130Z" fill="#c0392b" opacity="0.35" transform="rotate(-20,8,137)"/>

  <!-- gold shimmer line at top -->
  <line x1="0" y1="1.5" x2="200" y2="1.5" stroke="#f8d36f" stroke-width="1" opacity="0.4"/>
</svg>
