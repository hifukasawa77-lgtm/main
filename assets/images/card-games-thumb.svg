<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1a2e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow-c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <!-- Card back design -->
    <pattern id="card-back-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#1a2a6c"/>
      <circle cx="3" cy="3" r="1.2" fill="#2a3a8c" opacity="0.8"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="280" fill="url(#bg)"/>
  <!-- Subtle grid overlay -->
  <rect width="600" height="280" fill="none" stroke="#00f5ff" stroke-width="0.3" opacity="0.05"/>

  <!-- Green felt table surface -->
  <ellipse cx="300" cy="300" rx="340" ry="120" fill="#0a2a0a" opacity="0.7"/>
  <ellipse cx="300" cy="300" rx="280" ry="90" fill="#0d3a0d" opacity="0.5"/>

  <!-- === Card 1: Back card (leftmost, rotated -30deg) === -->
  <g transform="translate(130,140) rotate(-30)" filter="url(#card-shadow)">
    <rect x="-35" y="-50" width="70" height="100" rx="5" ry="5" fill="url(#card-back-pattern)" stroke="#4a5aac" stroke-width="1.5"/>
    <rect x="-28" y="-43" width="56" height="86" rx="3" ry="3" fill="none" stroke="#6a7acc" stroke-width="0.8" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="22" fill="#8a9adc" opacity="0.6">♦</text>
  </g>

  <!-- === Card 2: Heart 7 (rotated -15deg) === -->
  <g transform="translate(195,135) rotate(-15)" filter="url(#card-shadow)">
    <rect x="-35" y="-50" width="70" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#cccccc" stroke-width="1"/>
    <text x="-28" y="-34" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#cc1111" dominant-baseline="middle" text-anchor="start">7</text>
    <text x="-28" y="-18" font-family="Arial, sans-serif" font-size="11" fill="#cc1111" dominant-baseline="middle" text-anchor="start">♥</text>
    <text x="0" y="8" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="28" fill="#cc1111">♥</text>
  </g>

  <!-- === Card 3: Spade Ace (center, upright) === -->
  <g transform="translate(270,130) rotate(0)" filter="url(#card-shadow)">
    <rect x="-38" y="-55" width="76" height="110" rx="6" ry="6" fill="#f8f8f8" stroke="#cccccc" stroke-width="1.2"/>
    <text x="-30" y="-37" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#111111" dominant-baseline="middle" text-anchor="start">A</text>
    <text x="-30" y="-18" font-family="Arial, sans-serif" font-size="13" fill="#111111" dominant-baseline="middle" text-anchor="start">♠</text>
    <text x="0" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="40" fill="#111111">♠</text>
  </g>

  <!-- === Card 4: Diamond Ace (rotated +15deg) === -->
  <g transform="translate(350,135) rotate(15)" filter="url(#card-shadow)">
    <rect x="-35" y="-50" width="70" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#cccccc" stroke-width="1"/>
    <text x="-28" y="-34" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#cc1111" dominant-baseline="middle" text-anchor="start">A</text>
    <text x="-28" y="-18" font-family="Arial, sans-serif" font-size="11" fill="#cc1111" dominant-baseline="middle" text-anchor="start">♦</text>
    <text x="0" y="8" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="32" fill="#cc1111">♦</text>
  </g>

  <!-- === Card 5: Joker (rotated +30deg, rightmost) === -->
  <g transform="translate(420,140) rotate(30)" filter="url(#card-shadow)">
    <rect x="-35" y="-50" width="70" height="100" rx="5" ry="5" fill="#f8f8f8" stroke="#cccccc" stroke-width="1"/>
    <text x="0" y="-20" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="9" fill="#6633aa" font-weight="bold">JOKER</text>
    <text x="0" y="8" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="30" fill="#6633aa">🃏</text>
  </g>

  <!-- Neon glow accent lines -->
  <line x1="0" y1="275" x2="600" y2="275" stroke="#00f5ff" stroke-width="1" opacity="0.3"/>
  <rect x="0" y="260" width="600" height="20" fill="url(#glow-c)"/>

  <!-- Title text -->
  <text x="300" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#00f5ff" letter-spacing="4" opacity="0.85" filter="url(#glow)">CARD GAMES COLLECTION</text>

  <!-- Corner suit decorations -->
  <text x="18" y="32" font-family="Arial" font-size="22" fill="#ff2d9e" opacity="0.4" filter="url(#glow)">♠</text>
  <text x="562" y="32" font-family="Arial" font-size="22" fill="#00f5ff" opacity="0.4" filter="url(#glow)">♥</text>
  <text x="18" y="262" font-family="Arial" font-size="22" fill="#00f5ff" opacity="0.4">♣</text>
  <text x="562" y="262" font-family="Arial" font-size="22" fill="#ff2d9e" opacity="0.4">♦</text>
</svg>
