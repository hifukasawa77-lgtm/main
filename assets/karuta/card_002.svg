    <text x="124" y="178" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="9" fill="#8b3a1a" opacity="0.7" letter-spacing="3">上 の 句</text>

    <!-- 上の句（縦書き） -->
<text x="214" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">春</text><text x="214" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">過</text><text x="214" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">ぎ</text><text x="214" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">て</text><text x="214" y="168" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">夏</text><text x="196" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">来</text><text x="196" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">に</text><text x="196" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">け</text><text x="196" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">ら</text><text x="178" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">し</text><text x="178" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">白</text><text x="178" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">妙</text><text x="178" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">の</text>

    <!-- 作者名（縦書き） -->
<text x="20" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">持</text><text x="20" y="114" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">統</text><text x="20" y="128" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">天</text><text x="20" y="142" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">皇</text>

    <!-- 金線区切り -->
    <line x1="20" y1="295" x2="228" y2="295" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="297" x2="228" y2="297" stroke="#b8860b" stroke-width="0.4" opacity="0.4"/>

    <!-- 下の句マスクエリア -->
    <rect x="8" y="299" width="232" height="73" rx="2" fill="url(#mask2)"/>

    <!-- マスク斜め格子 -->
    <g opacity="0.15">
      <line x1="8" y1="299" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="315" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="331" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="347" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="30" y1="299" x2="8" y2="320" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="60" y1="299" x2="8" y2="352" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="90" y1="299" x2="8" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="120" y1="299" x2="45" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="150" y1="299" x2="76" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="180" y1="299" x2="106" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="210" y1="299" x2="136" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="240" y1="299" x2="166" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="240" y1="323" x2="226" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
    </g>

    <!-- 下の句マスクラベル -->
    <text x="124" y="332" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="11" fill="#f8d36f" opacity="0.85" letter-spacing="2">下の句は取り札で</text>
    <text x="124" y="350" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="9" fill="#d4b870" opacity="0.7">— find the matching card —</text>

    <!-- 下部金線 -->
    <line x1="20" y1="369" x2="228" y2="369" stroke="#b8860b" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>