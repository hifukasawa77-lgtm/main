<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 380" width="248" height="380">
  <defs>
    <linearGradient id="paper25" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6e3"/>
      <stop offset="50%" style="stop-color:#f9eed0"/>
      <stop offset="100%" style="stop-color:#f0e0b8"/>
    </linearGradient>
    <linearGradient id="hdr25" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="100%" style="stop-color:#600000"/>
    </linearGradient>
    <linearGradient id="mask25" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a2d0c;stop-opacity:0.92"/>
      <stop offset="100%" style="stop-color:#3a1a06;stop-opacity:0.96"/>
    </linearGradient>
    <filter id="aged25">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="cardClip25">
      <rect x="0" y="0" width="248" height="380" rx="6"/>
    </clipPath>
  </defs>

  <!-- 本体 -->
  <g clip-path="url(#cardClip25)">
    <!-- 和紙背景 -->
    <rect width="248" height="380" fill="url(#paper25)"/>

    <!-- 経年テクスチャ（薄く重ねる）-->
    <rect width="248" height="380" fill="#c8a870" opacity="0.06"/>

    <!-- 外枠 -->
    <rect x="4" y="4" width="240" height="372" rx="4" fill="none" stroke="#8b3a1a" stroke-width="2"/>
    <!-- 内枠 -->
    <rect x="8" y="8" width="232" height="364" rx="3" fill="none" stroke="#8b3a1a" stroke-width="0.8"/>

    <!-- ヘッダー（歌番号エリア）-->
    <rect x="4" y="4" width="240" height="50" rx="4" fill="url(#hdr25)"/>
    <rect x="4" y="42" width="240" height="12" fill="url(#hdr25)"/>

    <!-- 歌番号 -->
    <text x="124" y="36" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="20" fill="#f8d36f" font-weight="bold" letter-spacing="2">第25首</text>

    <!-- 金線装飾 ヘッダー下 -->
    <line x1="20" y1="54" x2="228" y2="54" stroke="#b8860b" stroke-width="1.2" opacity="0.7"/>
    <line x1="20" y1="56" x2="228" y2="56" stroke="#b8860b" stroke-width="0.5" opacity="0.5"/>

    <!-- イラスト装飾エリア（中央上部）-->
    
  <g opacity="0.8" transform="translate(140,90)">
    <!-- 月 大 -->
    <circle cx="0" cy="-15" r="30" fill="#f8e8a0" opacity="0.7"/>
    <circle cx="8" cy="-20" r="24" fill="#f0d880" opacity="0.15"/>
    <!-- 月の模様 -->
    <circle cx="-8" cy="-20" r="5" fill="#e0c870" opacity="0.2"/>
    <circle cx="5" cy="-5" r="3" fill="#e0c870" opacity="0.15"/>
    <circle cx="-2" cy="-30" r="4" fill="#e0c870" opacity="0.2"/>
    <!-- 星 -->
    <circle cx="45" cy="-45" r="2" fill="#f8f0c0" opacity="0.8"/>
    <circle cx="-42" cy="-38" r="1.5" fill="#f8f0c0" opacity="0.7"/>
    <circle cx="50" cy="-15" r="1.5" fill="#f8f0c0" opacity="0.6"/>
    <circle cx="-50" cy="-10" r="2" fill="#f8f0c0" opacity="0.7"/>
    <circle cx="30" cy="-52" r="1.5" fill="#f8f0c0" opacity="0.6"/>
    <!-- 薄雲 -->
    <path d="M-65,-30 Q-40,-40 -20,-32 Q0,-24 20,-35 Q40,-46 65,-30" fill="none" stroke="#d0c8a8" stroke-width="1.5" opacity="0.4"/>
    <!-- 霞 -->
    <path d="M-65,30 Q-30,20 0,25 Q30,30 65,22" fill="#d0e8f0" opacity="0.2"/>
    <path d="M-65,42 Q-30,34 0,38 Q30,42 65,35" fill="#d0e8f0" opacity="0.25"/>
  </g>

    <!-- イラスト区切り線 -->
    <line x1="20" y1="160" x2="228" y2="160" stroke="#8b3a1a" stroke-width="0.8" opacity="0.5"/>

    <!-- 上の句エリア ラベル -->
    <text x="124" y="178" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="9" fill="#8b3a1a" opacity="0.7" letter-spacing="3">上 の 句</text>

    <!-- 上の句（縦書き）-->
    <text x="214" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">名</text><text x="214" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">に</text><text x="214" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">し</text><text x="214" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">負</text><text x="214" y="168" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">は</text><text x="214" y="185" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">ば</text><text x="196" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">逢</text><text x="196" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">坂</text><text x="196" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">山</text><text x="196" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">の</text><text x="178" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">さ</text><text x="178" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">ね</text><text x="178" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">か</text><text x="178" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">づ</text><text x="178" y="168" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">ら</text>

    <!-- 作者名（縦書き）-->
    <text x="20" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">三</text><text x="20" y="114" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">条</text><text x="20" y="128" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">右</text><text x="20" y="142" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">大</text><text x="20" y="156" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">臣</text>

    <!-- 金線区切り -->
    <line x1="20" y1="295" x2="228" y2="295" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="297" x2="228" y2="297" stroke="#b8860b" stroke-width="0.4" opacity="0.4"/>

    <!-- 下の句マスクエリア -->
    <rect x="8" y="299" width="232" height="73" rx="2" fill="url(#mask25)"/>

    <!-- マスク装飾：斜め格子 -->
    <g opacity="0.15">
      <line x1="8" y1="299" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="315" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="331" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="347" x2="240" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="363" x2="96" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="8" y1="299" x2="8" y2="299" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="30" y1="299" x2="8" y2="320" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="60" y1="299" x2="8" y2="352" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="90" y1="299" x2="8" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="120" y1="299" x2="45" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="150" y1="299" x2="76" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="180" y1="299" x2="106" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="210" y1="299" x2="136" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="240" y1="299" x2="166" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="240" y1="306" x2="196" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
      <line x1="240" y1="323" x2="226" y2="372" stroke="#f8d36f" stroke-width="0.8"/>
    </g>

    <!-- マスクラベル（下の句は取り札で）-->
    <text x="124" y="332" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif"
      font-size="11" fill="#f8d36f" opacity="0.85" letter-spacing="2">下の句は取り札で</text>
    <text x="124" y="350" text-anchor="middle"
      font-family="'Hiragino Mincho ProN','Yu Mincho',sans-serif"
      font-size="9" fill="#d4b870" opacity="0.7">— find the matching card —</text>

    <!-- 下部金線 -->
    <line x1="20" y1="369" x2="228" y2="369" stroke="#b8860b" stroke-width="0.8" opacity="0.5"/>
  </g>
</svg>