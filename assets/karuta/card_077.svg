<text x="20" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">崇</text><text x="20" y="114" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">徳</text><text x="20" y="128" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="11" fill="#3a1a00" text-anchor="middle">院</text>

