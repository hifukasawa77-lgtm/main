    <!-- 上の句（縦書き） -->
<text x="214" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">瀬</text><text x="214" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">を</text><text x="214" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">早</text><text x="214" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">み</text><text x="214" y="168" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">岩</text><text x="196" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">に</text><text x="196" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">せ</text><text x="196" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">か</text><text x="196" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">る</text><text x="178" y="100" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">る</text><text x="178" y="117" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">滝</text><text x="178" y="134" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">川</text><text x="178" y="151" font-family="'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif" font-size="14" fill="#1a0a00" text-anchor="middle">の</text>

