<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <!-- ポーカーテーブル（フェルト） -->
  <rect width="200" height="140" fill="#1a4a28"/>
  <ellipse cx="100" cy="70" rx="88" ry="56" fill="#1e5430" stroke="#2d7a46" stroke-width="3"/>

  <!-- カード5: 右端（後ろ） -->
  <g transform="rotate(22,100,100)">
    <rect x="108" y="28" width="38" height="54" rx="5" fill="#f8f4ee" stroke="#888" stroke-width="1.2"/>
    <text x="113" y="42" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">♦</text>
    <text x="113" y="53" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">Q</text>
  </g>

  <!-- カード4 -->
  <g transform="rotate(11,100,100)">
    <rect x="92" y="24" width="38" height="54" rx="5" fill="#f8f4ee" stroke="#888" stroke-width="1.2"/>
    <text x="97" y="38" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a">♠</text>
    <text x="97" y="49" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a">A</text>
  </g>

  <!-- カード3（中央） -->
  <g transform="rotate(0,100,100)">
    <rect x="76" y="22" width="38" height="54" rx="5" fill="#f8f4ee" stroke="#555" stroke-width="1.4"/>
    <text x="81" y="36" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">♥</text>
    <text x="81" y="47" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">A</text>
    <text x="100" y="58" font-family="serif" font-size="18" text-anchor="middle" fill="#c0392b">♥</text>
  </g>

  <!-- カード2 -->
  <g transform="rotate(-11,100,100)">
    <rect x="60" y="24" width="38" height="54" rx="5" fill="#f8f4ee" stroke="#888" stroke-width="1.2"/>
    <text x="65" y="38" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a">♠</text>
    <text x="65" y="49" font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a">K</text>
  </g>

  <!-- カード1: 左端（後ろ） -->
  <g transform="rotate(-22,100,100)">
    <rect x="44" y="28" width="38" height="54" rx="5" fill="#f8f4ee" stroke="#888" stroke-width="1.2"/>
    <text x="49" y="42" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">♦</text>
    <text x="49" y="53" font-family="serif" font-size="11" font-weight="bold" fill="#c0392b">K</text>
  </g>

  <!-- グリッドのドット（陣取り要素を示す） -->
  <circle cx="30"  cy="118" r="3" fill="rgba(59,130,246,0.8)"/>
  <circle cx="44"  cy="118" r="3" fill="rgba(239,68,68,0.8)"/>
  <circle cx="58"  cy="118" r="3" fill="rgba(59,130,246,0.8)"/>
  <circle cx="30"  cy="130" r="3" fill="rgba(239,68,68,0.8)"/>
  <circle cx="44"  cy="130" r="3" fill="rgba(59,130,246,0.8)"/>
  <circle cx="58"  cy="130" r="3" fill="rgba(239,68,68,0.8)"/>
  <text x="72" y="130" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.55)">no luck</text>
</svg>
