<svg xmlns="http://www.w3.org/2000/svg" width="256" height="112" viewBox="0 0 256 112">
  <defs>
    <!-- Body gradient: silver/white -->
    <linearGradient id="fuselageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="40%" stop-color="#c8d4e8"/>
      <stop offset="100%" stop-color="#8090b0"/>
    </linearGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0daf0"/>
      <stop offset="100%" stop-color="#6070a0"/>
    </linearGradient>
    <!-- Cockpit gradient -->
    <linearGradient id="cockpitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80d4ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <!-- Engine glow gradient -->
    <radialGradient id="engineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <!-- Neon cyan glow filter -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Engine thrust glow -->
    <radialGradient id="thrustGrad" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0044ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue accent -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0044ff"/>
    </linearGradient>
  </defs>

  <!-- Engine thrust glow (behind ship) -->
  <ellipse cx="18" cy="52" rx="22" ry="10" fill="url(#thrustGrad)" opacity="0.8" filter="url(#cyanGlow)"/>
  <ellipse cx="14" cy="44" rx="16" ry="7" fill="url(#thrustGrad)" opacity="0.7"/>
  <ellipse cx="14" cy="60" rx="16" ry="7" fill="url(#thrustGrad)" opacity="0.7"/>

  <!-- Lower swept wing -->
  <polygon points="60,56 200,80 220,90 60,90" fill="url(#wingGrad)" stroke="#b0c0d8" stroke-width="1"/>
  <!-- Upper swept wing -->
  <polygon points="60,56 200,32 220,22 60,22" fill="url(#wingGrad)" stroke="#b0c0d8" stroke-width="1"/>

  <!-- Wing blue accent stripes -->
  <polygon points="80,56 180,76 190,80 80,80" fill="url(#accentGrad)" opacity="0.5"/>
  <polygon points="80,56 180,36 190,32 80,32" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Engine pods on wings -->
  <!-- Upper engine pod -->
  <rect x="30" y="28" width="70" height="16" rx="8" fill="url(#fuselageGrad)" stroke="#90a0c0" stroke-width="1"/>
  <!-- Lower engine pod -->
  <rect x="30" y="68" width="70" height="16" rx="8" fill="url(#fuselageGrad)" stroke="#90a0c0" stroke-width="1"/>

  <!-- Engine pod exhausts (upper) -->
  <ellipse cx="32" cy="36" rx="10" ry="7" fill="url(#engineGlow)" opacity="0.9"/>
  <!-- Engine pod exhausts (lower) -->
  <ellipse cx="32" cy="76" rx="10" ry="7" fill="url(#engineGlow)" opacity="0.9"/>

  <!-- Main fuselage body -->
  <polygon points="20,52 60,38 200,44 240,52 200,60 60,66" fill="url(#fuselageGrad)" stroke="#c0ccdd" stroke-width="1.5"/>

  <!-- Fuselage underside shading -->
  <polygon points="20,52 60,52 200,56 240,52 200,60 60,66" fill="#7080a0" opacity="0.3"/>

  <!-- Nose cone -->
  <polygon points="200,44 240,52 200,60 230,52" fill="#d8e4f0" stroke="#a0b0cc" stroke-width="1"/>
  <polygon points="230,52 240,52 235,54 235,50" fill="#e8f0ff"/>

  <!-- Cockpit dome -->
  <ellipse cx="180" cy="52" rx="28" ry="14" fill="url(#cockpitGrad)" stroke="#00aaff" stroke-width="1.5" opacity="0.9"/>
  <!-- Cockpit highlight -->
  <ellipse cx="185" cy="48" rx="12" ry="6" fill="#c0eeff" opacity="0.5"/>

  <!-- Blue accent stripe along fuselage -->
  <rect x="60" y="50" width="180" height="4" rx="2" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Engine pod detail lines (upper) -->
  <line x1="50" y1="36" x2="90" y2="36" stroke="#00aaff" stroke-width="1" opacity="0.6"/>
  <!-- Engine pod detail lines (lower) -->
  <line x1="50" y1="76" x2="90" y2="76" stroke="#00aaff" stroke-width="1" opacity="0.6"/>

  <!-- Neon cyan glow outline (drop-shadow equiv via rect trick) -->
  <polygon points="20,52 60,38 200,44 240,52 200,60 60,66" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6" filter="url(#cyanGlow)"/>

  <!-- Wing tip lights -->
  <circle cx="220" cy="22" r="4" fill="#00ffff" opacity="0.9" filter="url(#cyanGlow)"/>
  <circle cx="220" cy="90" r="4" fill="#00ffff" opacity="0.9" filter="url(#cyanGlow)"/>
</svg>
