<svg xmlns="http://www.w3.org/2000/svg" width="88" height="88" viewBox="0 0 88 88">
  <defs>
    <!-- Base gradient: dark green/gunmetal -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a5040"/>
      <stop offset="50%" stop-color="#283530"/>
      <stop offset="100%" stop-color="#182020"/>
    </linearGradient>
    <!-- Turret dome gradient -->
    <linearGradient id="domeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#506860"/>
      <stop offset="100%" stop-color="#1a2a28"/>
    </linearGradient>
    <!-- Barrel gradient -->
    <linearGradient id="barrelGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#304038"/>
      <stop offset="100%" stop-color="#1a2820"/>
    </linearGradient>
    <!-- Muzzle glow gradient -->
    <radialGradient id="muzzleGlow" cx="100%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#ffdd00"/>
      <stop offset="60%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <!-- Yellow glow filter -->
    <filter id="yellowGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Base shadow -->
    <radialGradient id="baseShadow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground base / mounting pad -->
  <rect x="18" y="66" width="52" height="14" rx="4" fill="url(#baseGrad)" stroke="#405040" stroke-width="1.5"/>
  <!-- Base bolts -->
  <circle cx="26" cy="73" r="3" fill="#202820" stroke="#507060" stroke-width="1"/>
  <circle cx="62" cy="73" r="3" fill="#202820" stroke="#507060" stroke-width="1"/>

  <!-- Base column -->
  <rect x="30" y="50" width="28" height="20" rx="2" fill="#2a3830" stroke="#405040" stroke-width="1"/>
  <!-- Column detail lines -->
  <line x1="36" y1="52" x2="36" y2="68" stroke="#405040" stroke-width="1" opacity="0.7"/>
  <line x1="52" y1="52" x2="52" y2="68" stroke="#405040" stroke-width="1" opacity="0.7"/>

  <!-- Turret rotation ring -->
  <circle cx="44" cy="46" r="20" fill="url(#domeGrad)" stroke="#506858" stroke-width="2"/>
  <!-- Ring detail -->
  <circle cx="44" cy="46" r="17" fill="none" stroke="#304840" stroke-width="1" opacity="0.6"/>
  <!-- Dome top -->
  <ellipse cx="44" cy="40" rx="16" ry="10" fill="#3a5048" stroke="#506860" stroke-width="1"/>

  <!-- Barrel arm (pointing LEFT) -->
  <!-- Barrel support -->
  <rect x="10" y="40" width="36" height="12" rx="3" fill="url(#barrelGrad)" stroke="#405040" stroke-width="1.5"/>
  <!-- Barrel main tube -->
  <rect x="4" y="42" width="30" height="8" rx="4" fill="#283830" stroke="#405040" stroke-width="1"/>
  <!-- Barrel reinforcement rings -->
  <rect x="14" y="41" width="4" height="10" rx="1" fill="#1a2820" stroke="#405048" stroke-width="0.5"/>
  <rect x="24" y="41" width="4" height="10" rx="1" fill="#1a2820" stroke="#405048" stroke-width="0.5"/>

  <!-- Muzzle flash / glow -->
  <ellipse cx="6" cy="46" rx="12" ry="8" fill="url(#muzzleGlow)" opacity="0.85" filter="url(#yellowGlow)"/>
  <!-- Muzzle tip -->
  <rect x="0" y="43" width="8" height="6" rx="3" fill="#ff8800" opacity="0.7" filter="url(#yellowGlow)"/>

  <!-- Targeting sensor -->
  <circle cx="44" cy="30" r="5" fill="#102018" stroke="#60a070" stroke-width="1.5"/>
  <circle cx="44" cy="30" r="2.5" fill="#40ff80" opacity="0.7"/>

  <!-- Armor plating detail -->
  <polygon points="28,36 60,36 58,50 30,50" fill="#304038" stroke="#405040" stroke-width="0.8" opacity="0.6"/>

  <!-- Rivet details on base -->
  <circle cx="26" cy="54" r="2" fill="#405040" stroke="#607060" stroke-width="0.5"/>
  <circle cx="62" cy="54" r="2" fill="#405040" stroke="#607060" stroke-width="0.5"/>
  <circle cx="44" cy="52" r="2" fill="#405040" stroke="#607060" stroke-width="0.5"/>
</svg>
