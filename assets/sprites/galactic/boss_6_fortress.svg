<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320">
  <defs>
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="50%" stop-color="#161c28"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="50%" stop-color="#243040"/>
      <stop offset="100%" stop-color="#1a2030"/>
    </linearGradient>
    <radialGradient id="reactorRad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#88ffff"/>
      <stop offset="40%" stop-color="#00ccee"/>
      <stop offset="100%" stop-color="#003355"/>
    </radialGradient>
    <radialGradient id="engineRad" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#aaffff"/>
      <stop offset="30%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0033aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="reactorGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rear engine pods (left side exhaust) -->
  <ellipse cx="12" cy="120" rx="28" ry="14" fill="url(#engineRad)" opacity="0.9"/>
  <ellipse cx="12" cy="200" rx="28" ry="14" fill="url(#engineRad)" opacity="0.9"/>

  <!-- Main hull body -->
  <polygon points="40,60 500,40 540,80 545,160 540,240 500,280 40,260 20,220 15,160 20,100"
           fill="url(#hullGrad)" stroke="#445566" stroke-width="2.5"/>

  <!-- Hull panel lines -->
  <line x1="40" y1="160" x2="500" y2="160" stroke="#445566" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="40" x2="200" y2="280" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="350" y1="40" x2="350" y2="280" stroke="#334455" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="50" x2="100" y2="270" stroke="#334455" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="42" x2="450" y2="278" stroke="#334455" stroke-width="1" opacity="0.3"/>

  <!-- Armor plating sections -->
  <rect x="60" y="75" width="130" height="60" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="210" y="68" width="130" height="65" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="360" y="70" width="120" height="62" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="60" y="185" width="130" height="60" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="210" y="187" width="130" height="62" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>
  <rect x="360" y="186" width="120" height="60" rx="4" fill="url(#panelGrad)" stroke="#556677" stroke-width="1"/>

  <!-- Cyan energy lines across hull -->
  <line x1="40" y1="158" x2="500" y2="158" stroke="#00ccff" stroke-width="2" opacity="0.5" filter="url(#cyanGlow)"/>
  <line x1="40" y1="162" x2="500" y2="162" stroke="#00ccff" stroke-width="1" opacity="0.3"/>

  <!-- Gun turrets (top row) -->
  <!-- Turret 1 -->
  <rect x="85" y="55" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="88" y="42" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="95" y="30" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <!-- Turret 2 -->
  <rect x="225" y="48" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="228" y="34" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="235" y="22" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <!-- Turret 3 -->
  <rect x="375" y="50" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="378" y="36" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="385" y="24" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <!-- Gun turrets (bottom row) -->
  <rect x="85" y="245" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="88" y="264" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="95" y="278" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <rect x="225" y="252" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="228" y="270" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="235" y="284" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <rect x="375" y="250" width="30" height="20" rx="3" fill="#1a2535" stroke="#00aaff" stroke-width="1.5"/>
  <rect x="378" y="268" width="24" height="16" rx="2" fill="#243040" stroke="#00ccff" stroke-width="1"/>
  <rect x="385" y="282" width="10" height="14" rx="1" fill="#00aaff" opacity="0.7"/>

  <!-- Central reactor core -->
  <circle cx="280" cy="160" r="45" fill="#050c14" stroke="#0088cc" stroke-width="2.5"/>
  <circle cx="280" cy="160" r="35" fill="url(#reactorRad)" filter="url(#reactorGlow)"/>
  <circle cx="280" cy="160" r="20" fill="#aaffff" opacity="0.7" filter="url(#reactorGlow)"/>
  <circle cx="278" cy="157" r="8" fill="#ffffff" opacity="0.9"/>
  <!-- Reactor ring -->
  <circle cx="280" cy="160" r="42" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6" stroke-dasharray="8,4"/>

  <!-- Front section (right) -->
  <polygon points="500,40 545,80 545,240 500,280 520,160" fill="#0d1420" stroke="#445566" stroke-width="1.5"/>
  <!-- Front gun array -->
  <rect x="518" y="100" width="14" height="8" rx="2" fill="#00aaff" opacity="0.8"/>
  <rect x="520" y="115" width="12" height="8" rx="2" fill="#00aaff" opacity="0.8"/>
  <rect x="518" y="130" width="14" height="8" rx="2" fill="#00aaff" opacity="0.8"/>
  <rect x="518" y="185" width="14" height="8" rx="2" fill="#00aaff" opacity="0.8"/>
  <rect x="520" y="200" width="12" height="8" rx="2" fill="#00aaff" opacity="0.8"/>
  <rect x="518" y="215" width="14" height="8" rx="2" fill="#00aaff" opacity="0.8"/>

  <!-- Engine exhaust ports -->
  <ellipse cx="38" cy="120" rx="18" ry="10" fill="#00aaff" opacity="0.4" stroke="#00ccff" stroke-width="1"/>
  <ellipse cx="38" cy="200" rx="18" ry="10" fill="#00aaff" opacity="0.4" stroke="#00ccff" stroke-width="1"/>

  <!-- Warning lights -->
  <circle cx="120" cy="60" r="4" fill="#ff4400" opacity="0.8"/>
  <circle cx="440" cy="58" r="4" fill="#ff4400" opacity="0.8"/>
  <circle cx="120" cy="260" r="4" fill="#ff4400" opacity="0.8"/>
  <circle cx="440" cy="262" r="4" fill="#ff4400" opacity="0.8"/>

  <!-- Hull outer glow -->
  <polygon points="40,60 500,40 540,80 545,160 540,240 500,280 40,260 20,220 15,160 20,100"
           fill="none" stroke="#0066aa" stroke-width="3" opacity="0.3" filter="url(#cyanGlow)"/>
</svg>
