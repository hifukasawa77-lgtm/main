<svg xmlns="http://www.w3.org/2000/svg" width="440" height="320" viewBox="0 0 440 320">
  <defs>
    <radialGradient id="bodyRad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4a2266"/>
      <stop offset="50%" stop-color="#2a1144"/>
      <stop offset="100%" stop-color="#0d0022"/>
    </radialGradient>
    <radialGradient id="eyeRad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#aaffaa"/>
      <stop offset="40%" stop-color="#00cc44"/>
      <stop offset="100%" stop-color="#003311"/>
    </radialGradient>
    <radialGradient id="coreRad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffaaff"/>
      <stop offset="50%" stop-color="#aa00ff"/>
      <stop offset="100%" stop-color="#330066"/>
    </radialGradient>
    <linearGradient id="tentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a1155"/>
      <stop offset="100%" stop-color="#1a0033"/>
    </linearGradient>
    <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tentacle appendages (back layer) -->
  <!-- Upper-left tentacle -->
  <path d="M 180,140 C 120,100 80,60 40,40 C 20,30 10,50 30,60" fill="none" stroke="#3a1155" stroke-width="18" stroke-linecap="round"/>
  <path d="M 180,140 C 120,100 80,60 40,40 C 20,30 10,50 30,60" fill="none" stroke="#6622aa" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Upper-right tentacle -->
  <path d="M 260,140 C 320,100 360,60 400,40 C 420,30 430,50 410,60" fill="none" stroke="#3a1155" stroke-width="18" stroke-linecap="round"/>
  <path d="M 260,140 C 320,100 360,60 400,40 C 420,30 430,50 410,60" fill="none" stroke="#6622aa" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <!-- Lower-left tentacle -->
  <path d="M 170,220 C 100,250 60,280 20,290 C 5,294 5,310 20,308" fill="none" stroke="#3a1155" stroke-width="16" stroke-linecap="round"/>
  <path d="M 170,220 C 100,250 60,280 20,290 C 5,294 5,310 20,308" fill="none" stroke="#6622aa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Lower-right tentacle -->
  <path d="M 270,220 C 340,250 380,280 420,290 C 435,294 435,310 420,308" fill="none" stroke="#3a1155" stroke-width="16" stroke-linecap="round"/>
  <path d="M 270,220 C 340,250 380,280 420,290 C 435,294 435,310 420,308" fill="none" stroke="#6622aa" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <!-- Side appendages -->
  <path d="M 155,175 C 90,165 40,155 15,145" fill="none" stroke="#2a1144" stroke-width="22" stroke-linecap="round"/>
  <path d="M 155,175 C 90,165 40,155 15,145" fill="none" stroke="#551188" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  <path d="M 285,175 C 350,165 400,155 425,145" fill="none" stroke="#2a1144" stroke-width="22" stroke-linecap="round"/>
  <path d="M 285,175 C 350,165 400,155 425,145" fill="none" stroke="#551188" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

  <!-- Main body -->
  <ellipse cx="220" cy="175" rx="100" ry="115" fill="url(#bodyRad)" stroke="#6622aa" stroke-width="2.5"/>

  <!-- Body markings / bioluminescent lines -->
  <path d="M 175,120 Q 220,110 265,120" fill="none" stroke="#8844cc" stroke-width="1.5" opacity="0.5"/>
  <path d="M 155,155 Q 220,140 285,155" fill="none" stroke="#8844cc" stroke-width="1.5" opacity="0.5"/>
  <path d="M 145,185 Q 220,168 295,185" fill="none" stroke="#8844cc" stroke-width="1.5" opacity="0.5"/>
  <path d="M 150,215 Q 220,200 290,215" fill="none" stroke="#8844cc" stroke-width="1.5" opacity="0.4"/>

  <!-- Technology ports / emitters on sides -->
  <circle cx="140" cy="175" r="10" fill="#330044" stroke="#aa44ff" stroke-width="2"/>
  <circle cx="140" cy="175" r="5" fill="url(#coreRad)" opacity="0.8"/>
  <circle cx="300" cy="175" r="10" fill="#330044" stroke="#aa44ff" stroke-width="2"/>
  <circle cx="300" cy="175" r="5" fill="url(#coreRad)" opacity="0.8"/>

  <!-- Head / cranium bulge -->
  <ellipse cx="220" cy="105" rx="75" ry="65" fill="url(#bodyRad)" stroke="#7733bb" stroke-width="2"/>
  <!-- Cranial veins -->
  <path d="M 180,70 Q 200,60 220,68 Q 240,60 260,70" fill="none" stroke="#551188" stroke-width="2" opacity="0.5"/>
  <path d="M 170,90 Q 195,78 220,86 Q 245,78 270,90" fill="none" stroke="#551188" stroke-width="1.5" opacity="0.4"/>

  <!-- Six compound eyes in two rows -->
  <!-- Top row (3 eyes) -->
  <ellipse cx="178" cy="90" rx="16" ry="12" fill="#001100"/>
  <ellipse cx="178" cy="90" rx="10" ry="7" fill="url(#eyeRad)" filter="url(#greenGlow)"/>
  <ellipse cx="175" cy="87" rx="3" ry="2" fill="#aaffaa" opacity="0.7"/>

  <ellipse cx="220" cy="82" rx="18" ry="13" fill="#001100"/>
  <ellipse cx="220" cy="82" rx="11" ry="8" fill="url(#eyeRad)" filter="url(#greenGlow)"/>
  <ellipse cx="217" cy="79" rx="4" ry="2.5" fill="#aaffaa" opacity="0.7"/>

  <ellipse cx="262" cy="90" rx="16" ry="12" fill="#001100"/>
  <ellipse cx="262" cy="90" rx="10" ry="7" fill="url(#eyeRad)" filter="url(#greenGlow)"/>
  <ellipse cx="259" cy="87" rx="3" ry="2" fill="#aaffaa" opacity="0.7"/>

  <!-- Bottom row (3 smaller eyes) -->
  <ellipse cx="191" cy="115" rx="12" ry="9" fill="#001100"/>
  <ellipse cx="191" cy="115" rx="7" ry="5" fill="url(#eyeRad)" filter="url(#greenGlow)"/>

  <ellipse cx="220" cy="120" rx="13" ry="10" fill="#001100"/>
  <ellipse cx="220" cy="120" rx="8" ry="6" fill="url(#eyeRad)" filter="url(#greenGlow)"/>

  <ellipse cx="249" cy="115" rx="12" ry="9" fill="#001100"/>
  <ellipse cx="249" cy="115" rx="7" ry="5" fill="url(#eyeRad)" filter="url(#greenGlow)"/>

  <!-- Mandibles / mouth -->
  <path d="M 190,150 Q 220,160 250,150" fill="none" stroke="#551100" stroke-width="3"/>
  <!-- Inner mouth -->
  <path d="M 195,155 Q 220,168 245,155" fill="#330022" stroke="#441100" stroke-width="1"/>

  <!-- Central energy core in torso -->
  <circle cx="220" cy="195" r="28" fill="#0d0022" stroke="#aa00ff" stroke-width="2"/>
  <circle cx="220" cy="195" r="18" fill="url(#coreRad)" filter="url(#purpleGlow)"/>
  <circle cx="220" cy="195" r="8" fill="#ffaaff" opacity="0.8"/>

  <!-- Body glow outline -->
  <ellipse cx="220" cy="175" rx="100" ry="115" fill="none" stroke="#7733bb" stroke-width="2" opacity="0.4" filter="url(#purpleGlow)"/>
</svg>
