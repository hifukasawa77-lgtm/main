<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe080"/>
      <stop offset="40%" stop-color="#cc8800"/>
      <stop offset="100%" stop-color="#885500"/>
    </linearGradient>
    <linearGradient id="goldSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bb7700"/>
      <stop offset="50%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#bb7700"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeaa0"/>
      <stop offset="60%" stop-color="#ddaa44"/>
      <stop offset="100%" stop-color="#aa7722"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="60%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#003366"/>
    </radialGradient>
    <radialGradient id="gemRad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff44ff"/>
      <stop offset="100%" stop-color="#880088"/>
    </radialGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === HEADDRESS (Nemes) === -->
  <!-- Left side cloth -->
  <polygon points="200,20 100,80 90,180 140,200 160,100 200,80"
           fill="url(#goldSide)" stroke="#cc9900" stroke-width="1.5"/>
  <!-- Headdress stripes left -->
  <line x1="150" y1="85" x2="105" y2="120" stroke="#885500" stroke-width="3" opacity="0.5"/>
  <line x1="148" y1="105" x2="103" y2="140" stroke="#885500" stroke-width="3" opacity="0.5"/>
  <line x1="145" y1="125" x2="100" y2="160" stroke="#885500" stroke-width="3" opacity="0.4"/>

  <!-- Right side cloth -->
  <polygon points="200,20 300,80 310,180 260,200 240,100 200,80"
           fill="url(#goldSide)" stroke="#cc9900" stroke-width="1.5"/>
  <!-- Headdress stripes right -->
  <line x1="250" y1="85" x2="295" y2="120" stroke="#885500" stroke-width="3" opacity="0.5"/>
  <line x1="252" y1="105" x2="297" y2="140" stroke="#885500" stroke-width="3" opacity="0.5"/>
  <line x1="255" y1="125" x2="300" y2="160" stroke="#885500" stroke-width="3" opacity="0.4"/>

  <!-- Crown top -->
  <polygon points="170,0 230,0 240,30 200,20 160,30" fill="url(#goldGrad)" stroke="#ffcc44" stroke-width="2"/>
  <!-- Crown detail -->
  <rect x="185" y="2" width="30" height="20" rx="2" fill="#ffee88" opacity="0.5"/>

  <!-- Cobra (Uraeus) on forehead -->
  <path d="M 200,22 C 200,10 210,8 215,14 C 218,18 215,26 210,28 C 205,30 200,26 200,22"
        fill="#cc0000" stroke="#ff4400" stroke-width="1"/>
  <circle cx="215" cy="12" r="4" fill="#ff2200"/>
  <!-- Cobra hood -->
  <ellipse cx="212" cy="16" rx="7" ry="5" fill="#ff4400" opacity="0.8"/>

  <!-- === FACE === -->
  <!-- Face mask main shape -->
  <polygon points="155,30 245,30 265,80 265,200 250,240 200,260 150,240 135,200 135,80"
           fill="url(#headGrad)" stroke="#ffcc44" stroke-width="2"/>
  <!-- Forehead band -->
  <rect x="155" y="58" width="90" height="14" rx="3" fill="#cc8800" stroke="#ffcc44" stroke-width="1"/>
  <!-- Forehead band gems -->
  <circle cx="178" cy="65" r="5" fill="url(#gemRad)"/>
  <circle cx="200" cy="65" r="5" fill="url(#gemRad)"/>
  <circle cx="222" cy="65" r="5" fill="url(#gemRad)"/>

  <!-- Brow ridge / kohl -->
  <polygon points="148,90 252,90 256,102 144,102" fill="#333300" opacity="0.8"/>
  <!-- Eye kohl lines -->
  <line x1="148" y1="96" x2="165" y2="96" stroke="#000" stroke-width="2"/>
  <line x1="252" y1="96" x2="235" y2="96" stroke="#000" stroke-width="2"/>

  <!-- Eye sockets -->
  <ellipse cx="178" cy="125" rx="22" ry="14" fill="#222200"/>
  <ellipse cx="222" cy="125" rx="22" ry="14" fill="#222200"/>
  <!-- Glowing cyan eyes -->
  <ellipse cx="178" cy="125" rx="15" ry="9" fill="url(#eyeGlow)" filter="url(#goldGlow)"/>
  <ellipse cx="222" cy="125" rx="15" ry="9" fill="url(#eyeGlow)" filter="url(#goldGlow)"/>
  <!-- Eye highlight -->
  <ellipse cx="175" cy="122" rx="5" ry="3" fill="#aaffff" opacity="0.7"/>
  <ellipse cx="219" cy="122" rx="5" ry="3" fill="#aaffff" opacity="0.7"/>

  <!-- Nose -->
  <polygon points="192,145 208,145 212,172 200,178 188,172" fill="#cc8800"/>
  <!-- Nose shadow -->
  <polygon points="200,145 208,145 212,172 200,178" fill="#885500" opacity="0.5"/>

  <!-- Lips -->
  <polygon points="175,190 225,190 222,200 200,205 178,200" fill="#cc7700"/>
  <line x1="175" y1="193" x2="225" y2="193" stroke="#aa5500" stroke-width="1.5"/>

  <!-- Chin -->
  <polygon points="160,240 240,240 235,258 200,265 165,258" fill="#cc8800"/>
  <!-- Beard (pharaoh's false beard) -->
  <polygon points="185,258 215,258 210,300 200,310 190,300" fill="url(#goldGrad)" stroke="#ffcc44" stroke-width="1"/>
  <!-- Beard stripes -->
  <line x1="190" y1="265" x2="210" y2="265" stroke="#885500" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="275" x2="210" y2="275" stroke="#885500" stroke-width="1.5" opacity="0.5"/>
  <line x1="191" y1="285" x2="209" y2="285" stroke="#885500" stroke-width="1.5" opacity="0.5"/>

  <!-- Face markings / hieroglyphs -->
  <line x1="140" y1="150" x2="155" y2="150" stroke="#cc9900" stroke-width="1" opacity="0.5"/>
  <line x1="140" y1="158" x2="150" y2="158" stroke="#cc9900" stroke-width="1" opacity="0.4"/>
  <line x1="245" y1="150" x2="260" y2="150" stroke="#cc9900" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="158" x2="260" y2="158" stroke="#cc9900" stroke-width="1" opacity="0.4"/>

  <!-- Gold glow outline -->
  <polygon points="155,30 245,30 265,80 265,200 250,240 200,260 150,240 135,200 135,80"
           fill="none" stroke="#ffcc44" stroke-width="2" opacity="0.5" filter="url(#goldGlow)"/>
</svg>
