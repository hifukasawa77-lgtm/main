<svg xmlns="http://www.w3.org/2000/svg" width="96" height="64" viewBox="0 0 96 64">
  <defs>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d0d8f0"/>
      <stop offset="100%" stop-color="#a0a8c0"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#8800ff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="transparent"/>
      <stop offset="75%" stop-color="#ff00ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="pulseGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="labelGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer aura pulse -->
  <ellipse cx="48" cy="32" rx="46" ry="30" fill="url(#auraGrad)" filter="url(#pulseGlow)"/>

  <!-- Capsule outer shell (pill shape) -->
  <!-- Left cap -->
  <ellipse cx="22" cy="32" rx="20" ry="26" fill="url(#shellGrad)" stroke="#c0c8e0" stroke-width="1.5"/>
  <!-- Right cap -->
  <ellipse cx="74" cy="32" rx="20" ry="26" fill="url(#shellGrad)" stroke="#c0c8e0" stroke-width="1.5"/>
  <!-- Center body -->
  <rect x="22" y="6" width="52" height="52" fill="url(#shellGrad)"/>
  <!-- Shell highlight -->
  <rect x="22" y="6" width="52" height="20" fill="#ffffff" opacity="0.2"/>

  <!-- Inner glowing fill -->
  <!-- Left cap inner -->
  <ellipse cx="22" cy="32" rx="15" ry="21" fill="url(#innerGrad)" opacity="0.85"/>
  <!-- Right cap inner -->
  <ellipse cx="74" cy="32" rx="15" ry="21" fill="url(#innerGrad)" opacity="0.85"/>
  <!-- Center inner -->
  <rect x="22" y="11" width="52" height="42" fill="url(#innerGrad)" opacity="0.85"/>

  <!-- Inner glow filter on fill -->
  <ellipse cx="22" cy="32" rx="15" ry="21" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5" filter="url(#pulseGlow)"/>
  <ellipse cx="74" cy="32" rx="15" ry="21" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.5" filter="url(#pulseGlow)"/>

  <!-- Shell border lines -->
  <line x1="22" y1="6" x2="74" y2="6" stroke="#e0e8ff" stroke-width="1.5"/>
  <line x1="22" y1="58" x2="74" y2="58" stroke="#e0e8ff" stroke-width="1.5"/>

  <!-- Dividing band (half-and-half pill look) -->
  <rect x="44" y="6" width="4" height="52" fill="#ffffff" opacity="0.4"/>

  <!-- "P" label -->
  <circle cx="48" cy="32" r="16" fill="#000000" opacity="0.7"/>
  <text x="48" y="39"
        font-family="Arial, sans-serif"
        font-size="22"
        font-weight="bold"
        text-anchor="middle"
        fill="#ffffff"
        filter="url(#labelGlow)">P</text>

  <!-- Capsule outer glow outline -->
  <ellipse cx="22" cy="32" rx="20" ry="26" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.6" filter="url(#pulseGlow)"/>
  <ellipse cx="74" cy="32" rx="20" ry="26" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.6" filter="url(#pulseGlow)"/>
  <rect x="22" y="6" width="52" height="52" fill="none" stroke="#8800ff" stroke-width="1" opacity="0.4"/>

  <!-- Shell surface highlight streak -->
  <ellipse cx="32" cy="20" rx="8" ry="5" fill="#ffffff" opacity="0.25" transform="rotate(-20, 32, 20)"/>
  <ellipse cx="66" cy="20" rx="8" ry="5" fill="#ffffff" opacity="0.25" transform="rotate(20, 66, 20)"/>
</svg>
