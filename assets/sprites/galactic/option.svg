<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <!-- Cyan glowing core -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.8"/>
    </radialGradient>
    <!-- Magenta outer ring gradient -->
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="80%" stop-color="#ff00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="coreGlowFilter" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Hex body gradient -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a004a"/>
      <stop offset="100%" stop-color="#110022"/>
    </linearGradient>
  </defs>

  <!-- Outer glow ring (magenta) -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.7" filter="url(#glowFilter)"/>

  <!-- Hexagonal body (6-sided) -->
  <!-- Hex points: center 40,40 radius 32 -->
  <polygon points="40,8 67.7,24 67.7,56 40,72 12.3,56 12.3,24"
           fill="url(#hexGrad)" stroke="#ff00ff" stroke-width="2" opacity="0.95"/>

  <!-- Inner hex structure lines -->
  <polygon points="40,18 59.4,29 59.4,51 40,62 20.6,51 20.6,29"
           fill="none" stroke="#cc00cc" stroke-width="1" opacity="0.5"/>

  <!-- Geometric inner lines from corners to center -->
  <line x1="40" y1="8" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="67.7" y1="24" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="67.7" y1="56" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="72" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="12.3" y1="56" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>
  <line x1="12.3" y1="24" x2="40" y2="40" stroke="#ff00ff" stroke-width="0.8" opacity="0.4"/>

  <!-- Magenta outer ring circle -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#ff00ff" stroke-width="2.5" opacity="0.8" filter="url(#glowFilter)"/>

  <!-- Cyan core circle -->
  <circle cx="40" cy="40" r="16" fill="url(#coreGrad)" filter="url(#coreGlowFilter)"/>

  <!-- Core inner highlight -->
  <circle cx="40" cy="40" r="10" fill="#00ffff" opacity="0.6"/>
  <circle cx="40" cy="40" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Neon magenta hex outline glow -->
  <polygon points="40,8 67.7,24 67.7,56 40,72 12.3,56 12.3,24"
           fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.5" filter="url(#glowFilter)"/>
</svg>
