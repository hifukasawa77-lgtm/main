<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6680aa"/>
      <stop offset="50%" stop-color="#445577"/>
      <stop offset="100%" stop-color="#223355"/>
    </linearGradient>
    <linearGradient id="stoneDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334466"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#88ffff"/>
      <stop offset="50%" stop-color="#00cccc"/>
      <stop offset="100%" stop-color="#006699"/>
    </radialGradient>
    <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="stoneGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === CENTER MOAI (largest, front) === -->
  <!-- Head shape -->
  <polygon points="170,30 230,30 255,80 255,200 245,240 200,260 155,240 145,200 145,80"
           fill="url(#stoneGrad)" stroke="#88aacc" stroke-width="2"/>
  <!-- Hat/topknot platform -->
  <rect x="165" y="10" width="70" height="30" rx="4" fill="url(#stoneDark)" stroke="#667799" stroke-width="1.5"/>
  <!-- Forehead line -->
  <line x1="170" y1="80" x2="230" y2="80" stroke="#334466" stroke-width="2" opacity="0.6"/>
  <!-- Brow ridge -->
  <polygon points="155,100 245,100 250,115 150,115" fill="#334466" opacity="0.7"/>
  <!-- Eye sockets (hollow, dark) -->
  <ellipse cx="185" cy="135" rx="22" ry="14" fill="#111" opacity="0.9"/>
  <ellipse cx="215" cy="135" rx="22" ry="14" fill="#111" opacity="0.9"/>
  <!-- Glowing eyes -->
  <ellipse cx="185" cy="135" rx="14" ry="9" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <ellipse cx="215" cy="135" rx="14" ry="9" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <!-- Eye highlights -->
  <ellipse cx="182" cy="132" rx="5" ry="3" fill="#ccffff" opacity="0.6"/>
  <ellipse cx="212" cy="132" rx="5" ry="3" fill="#ccffff" opacity="0.6"/>
  <!-- Nose block -->
  <polygon points="190,155 210,155 215,185 200,190 185,185" fill="#334466"/>
  <!-- Lips/mouth line -->
  <line x1="175" y1="205" x2="225" y2="205" stroke="#223355" stroke-width="4"/>
  <!-- Chin -->
  <polygon points="155,220 245,220 240,250 200,260 160,250" fill="url(#stoneDark)"/>
  <!-- Ancient rune markings on face -->
  <line x1="160" y1="160" x2="178" y2="160" stroke="#88aacc" stroke-width="1" opacity="0.4"/>
  <line x1="222" y1="160" x2="240" y2="160" stroke="#88aacc" stroke-width="1" opacity="0.4"/>
  <path d="M 162,175 L 170,168 L 178,175" fill="none" stroke="#88aacc" stroke-width="1" opacity="0.3"/>

  <!-- === LEFT MOAI (smaller, behind-left) === -->
  <polygon points="60,60 110,60 125,100 125,190 118,215 90,228 62,215 55,190 55,100"
           fill="url(#stoneDark)" stroke="#667799" stroke-width="1.5" opacity="0.85"/>
  <rect x="62" y="44" width="46" height="22" rx="3" fill="#1a2a3a" stroke="#445566" stroke-width="1"/>
  <polygon points="55,110 125,110 128,122 52,122" fill="#223355" opacity="0.7"/>
  <!-- Left moai eyes -->
  <ellipse cx="78" cy="140" rx="13" ry="8" fill="#111"/>
  <ellipse cx="102" cy="140" rx="13" ry="8" fill="#111"/>
  <ellipse cx="78" cy="140" rx="8" ry="5" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <ellipse cx="102" cy="140" rx="8" ry="5" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <line x1="62" y1="200" x2="118" y2="200" stroke="#223355" stroke-width="3"/>

  <!-- === RIGHT MOAI (smaller, behind-right) === -->
  <polygon points="290,60 340,60 345,100 345,190 338,215 310,228 282,215 275,190 275,100"
           fill="url(#stoneDark)" stroke="#667799" stroke-width="1.5" opacity="0.85"/>
  <rect x="292" y="44" width="46" height="22" rx="3" fill="#1a2a3a" stroke="#445566" stroke-width="1"/>
  <polygon points="275,110 345,110 348,122 272,122" fill="#223355" opacity="0.7"/>
  <!-- Right moai eyes -->
  <ellipse cx="298" cy="140" rx="13" ry="8" fill="#111"/>
  <ellipse cx="322" cy="140" rx="13" ry="8" fill="#111"/>
  <ellipse cx="298" cy="140" rx="8" ry="5" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <ellipse cx="322" cy="140" rx="8" ry="5" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <line x1="282" y1="200" x2="338" y2="200" stroke="#223355" stroke-width="3"/>

  <!-- Glow outline on center moai -->
  <polygon points="170,30 230,30 255,80 255,200 245,240 200,260 155,240 145,200 145,80"
           fill="none" stroke="#88aacc" stroke-width="2" opacity="0.4" filter="url(#stoneGlow)"/>

  <!-- Stone platform base -->
  <rect x="0" y="270" width="400" height="50" rx="8" fill="#1a2a3a" stroke="#445577" stroke-width="1.5"/>
  <line x1="0" y1="278" x2="400" y2="278" stroke="#667799" stroke-width="1" opacity="0.5"/>
</svg>
