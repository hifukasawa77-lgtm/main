<svg xmlns="http://www.w3.org/2000/svg" width="112" height="72" viewBox="0 0 112 72">
  <defs>
    <!-- Enemy body gradient: red/orange -->
    <linearGradient id="bodyGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="50%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#661100"/>
    </linearGradient>
    <!-- Orange glow filter -->
    <filter id="orangeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Engine exhaust gradient (right side — facing left so exhaust on right) -->
    <radialGradient id="exhaustGrad" cx="100%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <!-- Cockpit -->
    <radialGradient id="cockpitGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8844"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
  </defs>

  <!-- Engine exhaust (right side, ship faces left) -->
  <ellipse cx="100" cy="36" rx="18" ry="8" fill="url(#exhaustGrad)" opacity="0.85"/>

  <!-- Upper swept wing -->
  <polygon points="56,30 20,10 10,6 56,36" fill="url(#wingGrad)" stroke="#ff4400" stroke-width="1"/>
  <!-- Lower swept wing -->
  <polygon points="56,42 20,62 10,66 56,36" fill="url(#wingGrad)" stroke="#ff4400" stroke-width="1"/>

  <!-- Wing edge accent -->
  <line x1="20" y1="10" x2="10" y2="6" stroke="#ff8800" stroke-width="2" opacity="0.8"/>
  <line x1="20" y1="62" x2="10" y2="66" stroke="#ff8800" stroke-width="2" opacity="0.8"/>

  <!-- Main body -->
  <polygon points="100,36 56,24 18,30 6,36 18,42 56,48" fill="url(#bodyGrad)" stroke="#ff4400" stroke-width="1.5"/>

  <!-- Pointed nose (left-facing) -->
  <polygon points="18,30 6,36 18,42 10,36" fill="#ff2200" stroke="#ff6600" stroke-width="1"/>

  <!-- Cockpit canopy -->
  <ellipse cx="65" cy="36" rx="18" ry="10" fill="url(#cockpitGrad)" stroke="#ff6600" stroke-width="1" opacity="0.9"/>
  <!-- Cockpit highlight -->
  <ellipse cx="68" cy="32" rx="7" ry="4" fill="#ffaa66" opacity="0.4"/>

  <!-- Fuselage detail line -->
  <line x1="20" y1="36" x2="90" y2="36" stroke="#ff8800" stroke-width="1" opacity="0.6"/>

  <!-- Weapon hardpoints under wings -->
  <rect x="22" y="18" width="18" height="5" rx="2" fill="#cc2200" stroke="#ff4400" stroke-width="0.5"/>
  <rect x="22" y="49" width="18" height="5" rx="2" fill="#cc2200" stroke="#ff4400" stroke-width="0.5"/>

  <!-- Orange glow outline -->
  <polygon points="100,36 56,24 18,30 6,36 18,42 56,48" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.6" filter="url(#orangeGlow)"/>

  <!-- Engine pod (right side) -->
  <rect x="74" y="28" width="28" height="16" rx="8" fill="#aa2200" stroke="#ff4400" stroke-width="1"/>
</svg>
