<svg xmlns="http://www.w3.org/2000/svg" width="480" height="256" viewBox="0 0 480 256">
  <defs>
    <linearGradient id="dragonBodyGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="40%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#660000" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#aa1100"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </radialGradient>
    <radialGradient id="fireGrad" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ffdd00"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="fireGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bodyGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===================== WINGS ===================== -->
  <!-- Left dragon upper wing -->
  <polygon points="160,60 60,8 20,30 80,80 160,100"
           fill="url(#wingGrad)" stroke="#ff4400" stroke-width="2" opacity="0.85"/>
  <!-- Wing membrane lines -->
  <line x1="160" y1="60" x2="60" y2="8" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="60" x2="40" y2="20" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="60" x2="25" y2="40" stroke="#ff6600" stroke-width="1" opacity="0.3"/>

  <!-- Right dragon upper wing -->
  <polygon points="320,60 420,8 460,30 400,80 320,100"
           fill="url(#wingGrad)" stroke="#ff4400" stroke-width="2" opacity="0.85"/>
  <line x1="320" y1="60" x2="420" y2="8" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="60" x2="440" y2="20" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="60" x2="455" y2="40" stroke="#ff6600" stroke-width="1" opacity="0.3"/>

  <!-- ===================== NECKS ===================== -->
  <!-- Left dragon neck -->
  <path d="M 160,110 C 140,140 120,150 100,160 C 80,170 60,175 50,195"
        fill="none" stroke="#cc2200" stroke-width="28" stroke-linecap="round"/>
  <path d="M 160,110 C 140,140 120,150 100,160 C 80,170 60,175 50,195"
        fill="none" stroke="#ff4400" stroke-width="22" stroke-linecap="round"/>
  <!-- Neck scale lines (left) -->
  <path d="M 155,120 C 135,148 115,158 95,168" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
  <path d="M 150,130 C 132,156 112,166 92,176" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.4"/>

  <!-- Right dragon neck -->
  <path d="M 320,110 C 340,140 360,150 380,160 C 400,170 420,175 430,195"
        fill="none" stroke="#cc2200" stroke-width="28" stroke-linecap="round"/>
  <path d="M 320,110 C 340,140 360,150 380,160 C 400,170 420,175 430,195"
        fill="none" stroke="#ff4400" stroke-width="22" stroke-linecap="round"/>
  <!-- Neck scale lines (right) -->
  <path d="M 325,120 C 345,148 365,158 385,168" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
  <path d="M 330,130 C 348,156 368,166 388,176" fill="none" stroke="#ff6600" stroke-width="1.5" opacity="0.4"/>

  <!-- ===================== BODY CENTER ===================== -->
  <!-- Main body torso -->
  <ellipse cx="240" cy="148" rx="90" ry="60" fill="url(#dragonBodyGrad)" stroke="#ff4400" stroke-width="2"/>
  <!-- Body scale pattern -->
  <ellipse cx="240" cy="148" rx="70" ry="42" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4"/>
  <ellipse cx="240" cy="148" rx="50" ry="28" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.3"/>
  <!-- Body detail -->
  <path d="M 160,140 Q 200,120 240,135 Q 280,120 320,140" fill="none" stroke="#ff8800" stroke-width="2" opacity="0.5"/>
  <path d="M 160,155 Q 200,170 240,160 Q 280,170 320,155" fill="none" stroke="#ff8800" stroke-width="2" opacity="0.5"/>

  <!-- Belly/chest lighter area -->
  <ellipse cx="240" cy="155" rx="55" ry="35" fill="#ff6600" opacity="0.3"/>

  <!-- ===================== LEFT HEAD ===================== -->
  <!-- Left head main shape -->
  <polygon points="50,195 18,205 10,220 20,240 45,248 70,240 80,220 70,205"
           fill="url(#dragonBodyGrad)" stroke="#ff4400" stroke-width="2.5"/>
  <!-- Left head top ridges -->
  <polygon points="20,200 45,190 70,200 65,210 45,208 25,210" fill="#ff4400" opacity="0.6"/>
  <!-- Left head horns -->
  <polygon points="28,196 18,170 35,195" fill="#cc1100"/>
  <polygon points="55,190 52,164 65,192" fill="#cc1100"/>
  <!-- Left fangs -->
  <polygon points="20,240 14,256 26,248" fill="#e8e0d0"/>
  <polygon points="35,244 32,260 44,250" fill="#e8e0d0"/>
  <polygon points="55,244 55,260 64,250" fill="#e8e0d0"/>
  <polygon points="70,240 72,256 60,248" fill="#e8e0d0"/>
  <!-- Left eye -->
  <circle cx="38" cy="220" r="10" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <circle cx="38" cy="220" r="5" fill="#ff2200" opacity="0.8"/>
  <circle cx="38" cy="220" r="2" fill="#ffffff" opacity="0.7"/>
  <!-- Left eye glow outline -->
  <circle cx="38" cy="220" r="10" fill="none" stroke="#ff8800" stroke-width="2" opacity="0.8" filter="url(#eyeGlow)"/>
  <!-- Nostril -->
  <ellipse cx="18" cy="228" rx="4" ry="3" fill="#660000"/>
  <!-- Scales on head -->
  <path d="M 25,210 Q 45,205 68,210" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <path d="M 22,218 Q 44,213 67,218" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4"/>

  <!-- Fire breath from left dragon -->
  <ellipse cx="4" cy="228" rx="20" ry="10" fill="url(#fireGrad)" filter="url(#fireGlow)" opacity="0.9"/>

  <!-- ===================== RIGHT HEAD ===================== -->
  <!-- Right head main shape -->
  <polygon points="430,195 462,205 470,220 460,240 435,248 410,240 400,220 410,205"
           fill="url(#dragonBodyGrad)" stroke="#ff4400" stroke-width="2.5"/>
  <!-- Right head top ridges -->
  <polygon points="460,200 435,190 410,200 415,210 435,208 455,210" fill="#ff4400" opacity="0.6"/>
  <!-- Right head horns -->
  <polygon points="452,196 462,170 445,195" fill="#cc1100"/>
  <polygon points="425,190 428,164 415,192" fill="#cc1100"/>
  <!-- Right fangs -->
  <polygon points="460,240 466,256 454,248" fill="#e8e0d0"/>
  <polygon points="445,244 448,260 436,250" fill="#e8e0d0"/>
  <polygon points="425,244 425,260 416,250" fill="#e8e0d0"/>
  <polygon points="410,240 408,256 420,248" fill="#e8e0d0"/>
  <!-- Right eye -->
  <circle cx="442" cy="220" r="10" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  <circle cx="442" cy="220" r="5" fill="#ff2200" opacity="0.8"/>
  <circle cx="442" cy="220" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="442" cy="220" r="10" fill="none" stroke="#ff8800" stroke-width="2" opacity="0.8" filter="url(#eyeGlow)"/>
  <!-- Right nostril -->
  <ellipse cx="462" cy="228" rx="4" ry="3" fill="#660000"/>
  <!-- Scales -->
  <path d="M 455,210 Q 435,205 412,210" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.5"/>
  <path d="M 458,218 Q 436,213 413,218" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.4"/>

  <!-- Fire breath from right dragon -->
  <ellipse cx="476" cy="228" rx="20" ry="10" fill="url(#fireGrad)" filter="url(#fireGlow)" opacity="0.9"/>

  <!-- ===================== BODY GLOW OUTLINE ===================== -->
  <ellipse cx="240" cy="148" rx="90" ry="60" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.5" filter="url(#bodyGlow)"/>
</svg>
