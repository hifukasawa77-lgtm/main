<svg xmlns="http://www.w3.org/2000/svg" width="480" height="400" viewBox="0 0 480 400">
  <defs>
    <radialGradient id="cytoGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff88cc" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#cc0077" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#660044" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="nucleusRad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff44ff"/>
      <stop offset="50%" stop-color="#aa00aa"/>
      <stop offset="100%" stop-color="#440055"/>
    </radialGradient>
    <radialGradient id="innerRad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#ffccff"/>
      <stop offset="60%" stop-color="#cc44cc"/>
      <stop offset="100%" stop-color="#660066"/>
    </radialGradient>
    <filter id="blobGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="coreGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer pseudopods (extensions) -->
  <ellipse cx="100" cy="100" rx="48" ry="30" fill="#cc0077" opacity="0.35" transform="rotate(-30,100,100)"/>
  <ellipse cx="380" cy="90" rx="42" ry="28" fill="#cc0077" opacity="0.35" transform="rotate(25,380,90)"/>
  <ellipse cx="60" cy="250" rx="45" ry="25" fill="#cc0077" opacity="0.3" transform="rotate(15,60,250)"/>
  <ellipse cx="420" cy="260" rx="42" ry="26" fill="#cc0077" opacity="0.3" transform="rotate(-20,420,260)"/>
  <ellipse cx="200" cy="60" rx="38" ry="22" fill="#cc0077" opacity="0.3" transform="rotate(10,200,60)"/>
  <ellipse cx="310" cy="55" rx="35" ry="20" fill="#cc0077" opacity="0.3" transform="rotate(-5,310,55)"/>
  <ellipse cx="140" cy="340" rx="40" ry="22" fill="#cc0077" opacity="0.25" transform="rotate(20,140,340)"/>
  <ellipse cx="340" cy="335" rx="38" ry="21" fill="#cc0077" opacity="0.25" transform="rotate(-15,340,335)"/>

  <!-- Main amoeba blob (outer layer, semi-transparent) -->
  <path d="M 240,30 C 310,20 380,60 410,120 C 450,195 440,275 400,330 C 360,385 290,400 230,395 C 165,390 90,360 55,295 C 20,230 30,145 70,90 C 110,35 170,40 240,30 Z"
        fill="url(#cytoGrad)" stroke="#ff44cc" stroke-width="3" filter="url(#blobGlow)"/>

  <!-- Inner cytoplasm layer -->
  <path d="M 240,65 C 300,55 355,90 380,145 C 410,210 400,280 365,320 C 330,360 270,370 215,363 C 155,355 100,325 75,270 C 50,215 60,145 96,105 C 132,65 180,75 240,65 Z"
        fill="#cc0077" opacity="0.3"/>

  <!-- Vacuoles (cellular organelles) -->
  <circle cx="165" cy="155" r="25" fill="none" stroke="#ff88cc" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="140" r="20" fill="none" stroke="#ff88cc" stroke-width="1.5" opacity="0.5"/>
  <circle cx="145" cy="270" r="18" fill="none" stroke="#ff88cc" stroke-width="1.5" opacity="0.4"/>
  <circle cx="330" cy="280" r="22" fill="none" stroke="#ff88cc" stroke-width="1.5" opacity="0.4"/>
  <circle cx="240" cy="310" r="16" fill="none" stroke="#ff88cc" stroke-width="1.5" opacity="0.4"/>

  <!-- Nucleus (central) -->
  <ellipse cx="238" cy="205" rx="85" ry="80" fill="url(#nucleusRad)" stroke="#ff00ff" stroke-width="3" filter="url(#coreGlow)"/>

  <!-- Inner nucleus -->
  <ellipse cx="235" cy="200" rx="55" ry="52" fill="url(#innerRad)" stroke="#ffaaff" stroke-width="2" opacity="0.9"/>

  <!-- Nucleolus (nucleus core) -->
  <ellipse cx="232" cy="197" rx="28" ry="26" fill="#ff00ff" opacity="0.6" filter="url(#coreGlow)"/>
  <ellipse cx="230" cy="194" rx="14" ry="12" fill="#ffccff" opacity="0.8"/>

  <!-- DNA/chromatin strands inside nucleus -->
  <path d="M 190,185 Q 220,175 238,185 Q 256,195 238,205 Q 220,215 200,205" fill="none" stroke="#ff44ff" stroke-width="2" opacity="0.5"/>
  <path d="M 195,205 Q 225,195 242,205 Q 259,215 240,225 Q 220,235 200,225" fill="none" stroke="#ff44ff" stroke-width="2" opacity="0.4"/>

  <!-- Bioluminescent spots on body -->
  <circle cx="130" cy="200" r="6" fill="#ff88ff" opacity="0.6" filter="url(#blobGlow)"/>
  <circle cx="355" cy="195" r="5" fill="#ff88ff" opacity="0.6" filter="url(#blobGlow)"/>
  <circle cx="185" cy="120" r="5" fill="#ff88ff" opacity="0.5"/>
  <circle cx="298" cy="310" r="5" fill="#ff88ff" opacity="0.5"/>
  <circle cx="175" cy="310" r="4" fill="#ff88ff" opacity="0.5"/>
  <circle cx="310" cy="125" r="4" fill="#ff88ff" opacity="0.5"/>

  <!-- Outer glow edge -->
  <path d="M 240,30 C 310,20 380,60 410,120 C 450,195 440,275 400,330 C 360,385 290,400 230,395 C 165,390 90,360 55,295 C 20,230 30,145 70,90 C 110,35 170,40 240,30 Z"
        fill="none" stroke="#ff00cc" stroke-width="4" opacity="0.3" filter="url(#blobGlow)"/>
</svg>
