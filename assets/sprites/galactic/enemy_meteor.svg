<svg xmlns="http://www.w3.org/2000/svg" width="176" height="176" viewBox="0 0 176 176">
  <defs>
    <!-- Rocky surface gradient -->
    <radialGradient id="rockGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a08060"/>
      <stop offset="40%" stop-color="#706050"/>
      <stop offset="70%" stop-color="#504040"/>
      <stop offset="100%" stop-color="#302020"/>
    </radialGradient>
    <!-- Orange-red glow rim -->
    <radialGradient id="glowRim" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="80%" stop-color="#ff4400" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="rimGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Dark crater gradient -->
    <radialGradient id="craterGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#201010" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#402020" stop-opacity="0.4"/>
    </radialGradient>
    <!-- Shadow -->
    <radialGradient id="shadowGrad" cx="60%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#181010" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#181010" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow rim -->
  <circle cx="88" cy="88" r="82" fill="none" stroke="#ff4400" stroke-width="4" opacity="0.5" filter="url(#rimGlow)"/>

  <!-- Main rocky body - irregular polygon -->
  <polygon points="88,14 116,20 138,36 152,60 154,88 144,116 126,138 100,150 72,150 48,136 30,112 22,86 26,58 44,36 68,20"
           fill="url(#rockGrad)"/>

  <!-- Surface shadow (depth) -->
  <ellipse cx="100" cy="100" rx="55" ry="50" fill="url(#shadowGrad)"/>

  <!-- Rock texture patches - irregular surface detail -->
  <polygon points="60,50 74,44 78,58 64,60" fill="#604030" opacity="0.6"/>
  <polygon points="100,38 112,40 108,54 96,50" fill="#604030" opacity="0.5"/>
  <polygon points="130,68 140,76 132,88 122,78" fill="#503828" opacity="0.6"/>
  <polygon points="44,80 54,72 60,84 48,90" fill="#503828" opacity="0.5"/>
  <polygon points="80,110 96,108 100,124 82,122" fill="#403020" opacity="0.6"/>
  <polygon points="114,100 128,104 124,118 110,112" fill="#403020" opacity="0.5"/>
  <polygon points="50,112 62,118 56,130 44,124" fill="#352515" opacity="0.6"/>

  <!-- Craters -->
  <!-- Large crater top-left area -->
  <ellipse cx="70" cy="68" rx="18" ry="16" fill="url(#craterGrad)"/>
  <ellipse cx="70" cy="68" rx="18" ry="16" fill="none" stroke="#604030" stroke-width="2" opacity="0.6"/>
  <!-- Crater rim highlight -->
  <ellipse cx="66" cy="64" rx="10" ry="8" fill="none" stroke="#907060" stroke-width="1" opacity="0.5"/>

  <!-- Medium crater right -->
  <ellipse cx="122" cy="80" rx="14" ry="12" fill="url(#craterGrad)"/>
  <ellipse cx="122" cy="80" rx="14" ry="12" fill="none" stroke="#604030" stroke-width="1.5" opacity="0.6"/>

  <!-- Small crater bottom-center -->
  <ellipse cx="90" cy="120" rx="10" ry="9" fill="url(#craterGrad)"/>
  <ellipse cx="90" cy="120" rx="10" ry="9" fill="none" stroke="#604030" stroke-width="1" opacity="0.5"/>

  <!-- Tiny craters -->
  <circle cx="108" cy="52" r="5" fill="#302010" opacity="0.7"/>
  <circle cx="108" cy="52" r="5" fill="none" stroke="#705040" stroke-width="1"/>
  <circle cx="50" cy="96" r="4" fill="#302010" opacity="0.7"/>
  <circle cx="50" cy="96" r="4" fill="none" stroke="#705040" stroke-width="1"/>
  <circle cx="136" cy="110" r="6" fill="#302010" opacity="0.7"/>
  <circle cx="136" cy="110" r="6" fill="none" stroke="#705040" stroke-width="1"/>

  <!-- Rock outline -->
  <polygon points="88,14 116,20 138,36 152,60 154,88 144,116 126,138 100,150 72,150 48,136 30,112 22,86 26,58 44,36 68,20"
           fill="none" stroke="#704030" stroke-width="2"/>

  <!-- Orange-red rim glow overlay -->
  <polygon points="88,14 116,20 138,36 152,60 154,88 144,116 126,138 100,150 72,150 48,136 30,112 22,86 26,58 44,36 68,20"
           fill="none" stroke="#ff4400" stroke-width="3" opacity="0.5" filter="url(#rimGlow)"/>
</svg>
