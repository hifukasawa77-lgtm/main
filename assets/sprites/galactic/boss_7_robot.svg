<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="armorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="50%" stop-color="#22222e"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="armorSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a25"/>
      <stop offset="50%" stop-color="#2e2e40"/>
      <stop offset="100%" stop-color="#1a1a25"/>
    </linearGradient>
    <linearGradient id="shoulderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#442233"/>
      <stop offset="60%" stop-color="#2a1020"/>
      <stop offset="100%" stop-color="#180810"/>
    </linearGradient>
    <radialGradient id="eyeRad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8888"/>
      <stop offset="40%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <radialGradient id="coreRad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffaaaa"/>
      <stop offset="50%" stop-color="#ff2200"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === LEGS === -->
  <!-- Left leg upper -->
  <rect x="148" y="320" width="65" height="80" rx="6" fill="url(#armorGrad)" stroke="#553344" stroke-width="2"/>
  <rect x="152" y="325" width="57" height="35" rx="4" fill="url(#armorSide)"/>
  <!-- Left leg lower -->
  <rect x="144" y="395" width="72" height="65" rx="5" fill="#1a1a25" stroke="#442233" stroke-width="1.5"/>
  <!-- Left foot -->
  <polygon points="138,455 218,455 225,480 132,480" fill="#0e0e18" stroke="#442233" stroke-width="1.5"/>

  <!-- Right leg upper -->
  <rect x="267" y="320" width="65" height="80" rx="6" fill="url(#armorGrad)" stroke="#553344" stroke-width="2"/>
  <rect x="271" y="325" width="57" height="35" rx="4" fill="url(#armorSide)"/>
  <!-- Right leg lower -->
  <rect x="264" y="395" width="72" height="65" rx="5" fill="#1a1a25" stroke="#442233" stroke-width="1.5"/>
  <!-- Right foot -->
  <polygon points="258,455 338,455 348,480 250,480" fill="#0e0e18" stroke="#442233" stroke-width="1.5"/>

  <!-- Knee joints -->
  <circle cx="180" cy="395" r="14" fill="#2a2a38" stroke="#ff4400" stroke-width="2"/>
  <circle cx="180" cy="395" r="7" fill="#ff2200" opacity="0.6"/>
  <circle cx="300" cy="395" r="14" fill="#2a2a38" stroke="#ff4400" stroke-width="2"/>
  <circle cx="300" cy="395" r="7" fill="#ff2200" opacity="0.6"/>

  <!-- === TORSO === -->
  <polygon points="120,190 360,190 380,250 375,320 240,335 105,320 100,250"
           fill="url(#armorGrad)" stroke="#553344" stroke-width="2.5"/>
  <!-- Torso armor panels -->
  <rect x="130" y="205" width="90" height="75" rx="5" fill="url(#armorSide)" stroke="#664455" stroke-width="1"/>
  <rect x="260" y="205" width="90" height="75" rx="5" fill="url(#armorSide)" stroke="#664455" stroke-width="1"/>
  <!-- Torso center panel -->
  <rect x="180" y="200" width="120" height="130" rx="8" fill="#0e0e18" stroke="#ff3300" stroke-width="2"/>

  <!-- Energy core in chest -->
  <circle cx="240" cy="265" r="40" fill="#080808" stroke="#ff2200" stroke-width="2.5"/>
  <circle cx="240" cy="265" r="30" fill="url(#coreRad)" filter="url(#redGlow)"/>
  <circle cx="240" cy="265" r="16" fill="#ff6644" opacity="0.8" filter="url(#redGlow)"/>
  <circle cx="238" cy="262" r="7" fill="#ffcccc" opacity="0.9"/>
  <!-- Core ring -->
  <circle cx="240" cy="265" r="38" fill="none" stroke="#ff4400" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,3"/>

  <!-- Vent lines on torso sides -->
  <line x1="135" y1="240" x2="215" y2="240" stroke="#ff4400" stroke-width="1.5" opacity="0.4"/>
  <line x1="135" y1="252" x2="215" y2="252" stroke="#ff4400" stroke-width="1.5" opacity="0.4"/>
  <line x1="135" y1="264" x2="215" y2="264" stroke="#ff4400" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="240" x2="345" y2="240" stroke="#ff4400" stroke-width="1.5" opacity="0.4"/>
  <line x1="265" y1="252" x2="345" y2="252" stroke="#ff4400" stroke-width="1.5" opacity="0.4"/>
  <line x1="265" y1="264" x2="345" y2="264" stroke="#ff4400" stroke-width="1" opacity="0.3"/>

  <!-- Hip joint area -->
  <rect x="110" y="310" width="260" height="20" rx="4" fill="#1a1520" stroke="#553344" stroke-width="1.5"/>

  <!-- === SHOULDER CANNONS === -->
  <!-- Left shoulder cannon -->
  <rect x="42" y="140" width="90" height="55" rx="8" fill="url(#shoulderGrad)" stroke="#ff4400" stroke-width="2"/>
  <rect x="38" y="150" width="20" height="35" rx="4" fill="#ff2200" opacity="0.4" filter="url(#redGlow)"/>
  <!-- Cannon barrel left -->
  <rect x="22" y="158" width="50" height="12" rx="3" fill="#1a1520" stroke="#ff4400" stroke-width="1.5"/>
  <rect x="10" y="160" width="30" height="8" rx="2" fill="#ff2200" opacity="0.5"/>
  <rect x="22" y="175" width="50" height="12" rx="3" fill="#1a1520" stroke="#ff4400" stroke-width="1.5"/>
  <rect x="10" y="177" width="30" height="8" rx="2" fill="#ff2200" opacity="0.5"/>

  <!-- Right shoulder cannon -->
  <rect x="348" y="140" width="90" height="55" rx="8" fill="url(#shoulderGrad)" stroke="#ff4400" stroke-width="2"/>
  <rect x="422" y="150" width="20" height="35" rx="4" fill="#ff2200" opacity="0.4" filter="url(#redGlow)"/>
  <!-- Cannon barrel right -->
  <rect x="408" y="158" width="50" height="12" rx="3" fill="#1a1520" stroke="#ff4400" stroke-width="1.5"/>
  <rect x="440" y="160" width="30" height="8" rx="2" fill="#ff2200" opacity="0.5"/>
  <rect x="408" y="175" width="50" height="12" rx="3" fill="#1a1520" stroke="#ff4400" stroke-width="1.5"/>
  <rect x="440" y="177" width="30" height="8" rx="2" fill="#ff2200" opacity="0.5"/>

  <!-- Shoulder joint rings -->
  <circle cx="120" cy="192" r="18" fill="#2a2030" stroke="#ff4400" stroke-width="2"/>
  <circle cx="120" cy="192" r="9" fill="#ff2200" opacity="0.5"/>
  <circle cx="360" cy="192" r="18" fill="#2a2030" stroke="#ff4400" stroke-width="2"/>
  <circle cx="360" cy="192" r="9" fill="#ff2200" opacity="0.5"/>

  <!-- === HEAD === -->
  <!-- Neck -->
  <rect x="200" y="110" width="80" height="30" rx="5" fill="#1a1520" stroke="#442233" stroke-width="1.5"/>
  <!-- Neck joints -->
  <circle cx="215" cy="125" r="8" fill="#2a2030" stroke="#ff4400" stroke-width="1.5"/>
  <circle cx="265" cy="125" r="8" fill="#2a2030" stroke="#ff4400" stroke-width="1.5"/>

  <!-- Head main -->
  <rect x="155" y="25" width="170" height="90" rx="12" fill="url(#armorGrad)" stroke="#553344" stroke-width="2.5"/>
  <!-- Head top detail -->
  <rect x="175" y="15" width="130" height="18" rx="5" fill="#1a1520" stroke="#442233" stroke-width="1.5"/>
  <!-- Antenna -->
  <line x1="240" y1="6" x2="240" y2="15" stroke="#ff4400" stroke-width="3"/>
  <circle cx="240" cy="5" r="4" fill="#ff2200" filter="url(#redGlow)"/>

  <!-- Visor slot -->
  <rect x="165" y="50" width="150" height="35" rx="6" fill="#050505" stroke="#ff2200" stroke-width="2"/>
  <!-- Optical sensors (eyes) -->
  <ellipse cx="200" cy="67" rx="24" ry="14" fill="#0a0000" stroke="#ff0000" stroke-width="1"/>
  <ellipse cx="200" cy="67" rx="16" ry="9" fill="url(#eyeRad)" filter="url(#redGlow)"/>
  <ellipse cx="197" cy="64" rx="6" ry="3.5" fill="#ffaaaa" opacity="0.7"/>

  <ellipse cx="280" cy="67" rx="24" ry="14" fill="#0a0000" stroke="#ff0000" stroke-width="1"/>
  <ellipse cx="280" cy="67" rx="16" ry="9" fill="url(#eyeRad)" filter="url(#redGlow)"/>
  <ellipse cx="277" cy="64" rx="6" ry="3.5" fill="#ffaaaa" opacity="0.7"/>

  <!-- Head side details -->
  <rect x="158" y="65" width="12" height="20" rx="2" fill="#ff2200" opacity="0.4"/>
  <rect x="310" y="65" width="12" height="20" rx="2" fill="#ff2200" opacity="0.4"/>

  <!-- Mouth/speaker grille -->
  <rect x="185" y="95" width="110" height="15" rx="4" fill="#0a0a10" stroke="#442233" stroke-width="1"/>
  <line x1="193" y1="102" x2="288" y2="102" stroke="#ff4400" stroke-width="1" opacity="0.5"/>
  <line x1="193" y1="106" x2="288" y2="106" stroke="#ff4400" stroke-width="1" opacity="0.3"/>

  <!-- Battle damage marks -->
  <line x1="172" y1="35" x2="185" y2="48" stroke="#ff4400" stroke-width="2" opacity="0.4"/>
  <line x1="295" y1="38" x2="308" y2="52" stroke="#ff4400" stroke-width="2" opacity="0.4"/>
  <line x1="148" y1="220" x2="162" y2="238" stroke="#ff4400" stroke-width="1.5" opacity="0.3"/>

  <!-- Overall body glow outline -->
  <polygon points="120,190 360,190 380,250 375,320 240,335 105,320 100,250"
           fill="none" stroke="#ff3300" stroke-width="2" opacity="0.3" filter="url(#softGlow)"/>
</svg>
