  <line x1="26" y1="20" x2="30" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="24" y="45" width="8" height="14" rx="3" ry="3" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <line x1="26" y1="52" x2="30" y2="52" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
</svg>