<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <!-- 3D side shadow -->
  <rect x="4" y="4" width="56" height="76" rx="5" ry="5" fill="#5a3a10"/>
  <!-- Main tile face -->
  <rect x="0" y="0" width="56" height="76" rx="5" ry="5" fill="#f5f0e8" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Sheen gradient highlight -->
  <rect x="1" y="1" width="54" height="20" rx="4" ry="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="50" height="70" rx="4" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <!-- 季節4 (竹) -->
  <!-- Left stalk -->
  <rect x="20" y="8" width="6" height="50" rx="3" ry="3" fill="#27ae60" stroke="#1e8449" stroke-width="0.8"/>
  <line x1="20" y1="20" x2="26" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="20" y1="33" x2="26" y2="33" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="20" y1="46" x2="26" y2="46" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Right stalk -->
  <rect x="30" y="14" width="6" height="44" rx="3" ry="3" fill="#27ae60" stroke="#1e8449" stroke-width="0.8"/>
  <line x1="30" y1="26" x2="36" y2="26" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="30" y1="39" x2="36" y2="39" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="30" y1="52" x2="36" y2="52" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Leaves -->
  <ellipse cx="18" cy="14" rx="3" ry="8" fill="#2ecc71" opacity="0.8" transform="rotate(-30,18,14)"/>
  <ellipse cx="38" cy="19" rx="3" ry="8" fill="#2ecc71" opacity="0.8" transform="rotate(30,38,19)"/>
  <text x="28" y="69" font-family="serif" font-size="14" font-weight="bold" fill="#27ae60" text-anchor="middle" dominant-baseline="middle">竹</text>
</svg>