<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" width="60" height="80">
  <!-- 3D side shadow -->
  <rect x="4" y="4" width="56" height="76" rx="5" ry="5" fill="#5a3a10"/>
  <!-- Main tile face -->
  <rect x="0" y="0" width="56" height="76" rx="5" ry="5" fill="#f5f0e8" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Sheen gradient highlight -->
  <rect x="1" y="1" width="54" height="20" rx="4" ry="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Inner border -->
  <rect x="3" y="3" width="50" height="70" rx="4" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <!-- 1索 (bird) -->
  <!-- Bird body -->
  <ellipse cx="28" cy="28" rx="11" ry="14" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <!-- Belly -->
  <ellipse cx="28" cy="36" rx="7" ry="8" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
  <!-- Head highlight -->
  <ellipse cx="28" cy="17" rx="7" ry="6" fill="#2ecc71" stroke="#1e8449" stroke-width="0.8"/>
  <!-- Wing detail -->
  <path d="M18,30 Q24,25 28,28 Q24,32 18,30 Z" fill="#1e8449"/>
  <!-- Eye -->
  <circle cx="32" cy="22" r="3.5" fill="white" stroke="#bdc3c7" stroke-width="0.5"/>
  <circle cx="33" cy="22" r="1.5" fill="#2c3e50"/>
  <!-- Eye shine -->
  <circle cx="33.5" cy="21.5" r="0.6" fill="white"/>
  <!-- Label -->
  <text x="28" y="68" font-family="serif" font-size="11" fill="#1e8449" text-anchor="middle" font-weight="bold">一索</text>
</svg>