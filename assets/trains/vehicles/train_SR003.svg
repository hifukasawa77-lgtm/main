<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- N700系のぞみ SR003 400×120 透過 -->
  <defs>
    <linearGradient id="bodySR003" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2560C8"/>
      <stop offset="50%" stop-color="#1B4F9F"/>
      <stop offset="100%" stop-color="#0D2E6A"/>
    </linearGradient>
    <linearGradient id="windowSR003" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#AADDFF"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/><rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/><rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/><rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/><rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/><rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体 -->
  <rect x="22" y="43" width="366" height="56" rx="8" fill="url(#bodySR003)"/>

  <!-- N700系 先頭（Duck-bill型の特徴的な形） -->
  <path d="M 22,43 Q 10,50 5,59 Q 10,67 22,72 L 22,43 Z" fill="#1545A0"/>
  <!-- くちばし下部 -->
  <path d="M 5,63 Q 2,65 5,72 L 22,72" fill="#0D2E6A"/>
  <path d="M 5,55 Q 3,57 2,59 Q 3,62 5,64" fill="#143590"/>

  <!-- 前灯 -->
  <circle cx="6" cy="50" r="4" fill="#FFFDE0" stroke="#0D2E6A" stroke-width="1.5"/>
  <circle cx="6" cy="68" r="4" fill="#FF3300" stroke="#0D2E6A" stroke-width="1.5" opacity="0.9"/>

  <!-- 白ライン（のぞみ） -->
  <rect x="2" y="55" width="387" height="4" fill="#FFFFFF" opacity="0.7"/>
  <rect x="2" y="61" width="387" height="2" fill="#FFFFFF" opacity="0.4"/>

  <!-- 運転台窓 -->
  <rect x="10" y="45" width="16" height="10" rx="3" fill="url(#windowSR003)" stroke="#0D2E6A" stroke-width="1.5"/>

  <!-- 客室窓 -->
  <g fill="url(#windowSR003)" stroke="#0D2E6A" stroke-width="1">
    <rect x="30" y="47" width="18" height="9" rx="3"/>
    <rect x="52" y="47" width="18" height="9" rx="3"/>
    <rect x="74" y="47" width="18" height="9" rx="3"/>
    <rect x="96" y="47" width="18" height="9" rx="3"/>
    <rect x="118" y="47" width="18" height="9" rx="3"/>
    <rect x="140" y="47" width="18" height="9" rx="3"/>
    <rect x="162" y="47" width="18" height="9" rx="3"/>
    <rect x="184" y="47" width="18" height="9" rx="3"/>
    <rect x="206" y="47" width="18" height="9" rx="3"/>
    <rect x="228" y="47" width="18" height="9" rx="3"/>
    <rect x="250" y="47" width="18" height="9" rx="3"/>
    <rect x="272" y="47" width="18" height="9" rx="3"/>
    <rect x="294" y="47" width="18" height="9" rx="3"/>
    <rect x="316" y="47" width="18" height="9" rx="3"/>
    <rect x="338" y="47" width="18" height="9" rx="3"/>
    <rect x="362" y="47" width="18" height="9" rx="3"/>
  </g>

  <!-- ドア -->
  <g fill="#144898" stroke="#0D2E6A" stroke-width="1">
    <rect x="64" y="43" width="4" height="56"/><rect x="160" y="43" width="4" height="56"/>
    <rect x="256" y="43" width="4" height="56"/><rect x="352" y="43" width="4" height="56"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="200" y1="43" x2="196" y2="24" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="196" y1="24" x2="214" y2="24" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="214" y1="24" x2="210" y2="43" stroke="#AAAAAA" stroke-width="2"/>
  <rect x="194" y="22" width="22" height="4" rx="2" fill="#888"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="50" cy="100" r="12"/><circle cx="100" cy="100" r="12"/>
    <circle cx="185" cy="100" r="12"/><circle cx="235" cy="100" r="12"/>
    <circle cx="315" cy="100" r="12"/><circle cx="365" cy="100" r="12"/>
  </g>
  <g fill="#888888">
    <circle cx="50" cy="100" r="5"/><circle cx="100" cy="100" r="5"/>
    <circle cx="185" cy="100" r="5"/><circle cx="235" cy="100" r="5"/>
    <circle cx="315" cy="100" r="5"/><circle cx="365" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="22" y="43" width="366" height="10" rx="5" fill="#FFFFFF" opacity="0.2"/>

  <!-- ラベル -->
  <text x="205" y="68" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#FFFFFF" font-weight="bold" opacity="0.65">N700 Nozomi</text>
</svg>
