<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- 800系つばめ（九州）SR005 400×120 透過 -->
  <defs>
    <linearGradient id="bodySR005" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0E080"/>
      <stop offset="40%" stop-color="#C5A028"/>
      <stop offset="100%" stop-color="#956000"/>
    </linearGradient>
    <linearGradient id="windowSR005" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#AADDFF"/>
    </linearGradient>
    <linearGradient id="whiteBodySR005" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/><rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/><rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/><rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/><rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/><rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体（白ベース） -->
  <rect x="22" y="42" width="366" height="58" rx="9" fill="url(#whiteBodySR005)"/>

  <!-- 金帯（つばめ特徴） -->
  <rect x="22" y="60" width="366" height="12" fill="url(#bodySR005)"/>
  <rect x="22" y="57" width="366" height="4" fill="#D4A020" opacity="0.7"/>

  <!-- 先頭（なめらかな曲線） -->
  <path d="M 22,42 Q 10,50 6,59 Q 10,68 22,72 L 22,42 Z" fill="#F5F5F5"/>
  <!-- 先頭の金ライン -->
  <path d="M 6,60 Q 10,62 22,63 L 22,67 Q 10,66 6,64" fill="url(#bodySR005)"/>
  <path d="M 6,56 Q 3,58 2,60 Q 3,62 6,64" fill="#EEEEEE"/>

  <!-- 前灯 -->
  <circle cx="5" cy="50" r="5" fill="#FFFDE0" stroke="#AAAAAA" stroke-width="1.5"/>
  <circle cx="5" cy="70" r="4" fill="#FF6600" stroke="#AAAAAA" stroke-width="1.5" opacity="0.9"/>

  <!-- 運転台窓 -->
  <rect x="10" y="44" width="18" height="11" rx="4" fill="url(#windowSR005)" stroke="#888888" stroke-width="1.5"/>

  <!-- 客室窓 -->
  <g fill="url(#windowSR005)" stroke="#888888" stroke-width="1">
    <rect x="30" y="46" width="20" height="10" rx="4"/>
    <rect x="55" y="46" width="20" height="10" rx="4"/>
    <rect x="80" y="46" width="20" height="10" rx="4"/>
    <rect x="105" y="46" width="20" height="10" rx="4"/>
    <rect x="130" y="46" width="20" height="10" rx="4"/>
    <rect x="155" y="46" width="20" height="10" rx="4"/>
    <rect x="180" y="46" width="20" height="10" rx="4"/>
    <rect x="205" y="46" width="20" height="10" rx="4"/>
    <rect x="230" y="46" width="20" height="10" rx="4"/>
    <rect x="255" y="46" width="20" height="10" rx="4"/>
    <rect x="280" y="46" width="20" height="10" rx="4"/>
    <rect x="305" y="46" width="20" height="10" rx="4"/>
    <rect x="330" y="46" width="20" height="10" rx="4"/>
    <rect x="355" y="46" width="20" height="10" rx="4"/>
    <rect x="374" y="46" width="10" height="10" rx="4"/>
  </g>

  <!-- ドア -->
  <g fill="#EEEEEE" stroke="#CCCCCC" stroke-width="1">
    <rect x="70" y="42" width="4" height="58"/><rect x="160" y="42" width="4" height="58"/>
    <rect x="250" y="42" width="4" height="58"/><rect x="340" y="42" width="4" height="58"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="200" y1="42" x2="196" y2="22" stroke="#888888" stroke-width="2"/>
  <line x1="196" y1="22" x2="214" y2="22" stroke="#888888" stroke-width="2"/>
  <line x1="214" y1="22" x2="210" y2="42" stroke="#888888" stroke-width="2"/>
  <rect x="194" y="20" width="22" height="4" rx="2" fill="#666"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="52" cy="100" r="12"/><circle cx="102" cy="100" r="12"/>
    <circle cx="185" cy="100" r="12"/><circle cx="235" cy="100" r="12"/>
    <circle cx="318" cy="100" r="12"/><circle cx="368" cy="100" r="12"/>
  </g>
  <g fill="#888888">
    <circle cx="52" cy="100" r="5"/><circle cx="102" cy="100" r="5"/>
    <circle cx="185" cy="100" r="5"/><circle cx="235" cy="100" r="5"/>
    <circle cx="318" cy="100" r="5"/><circle cx="368" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="22" y="42" width="366" height="8" rx="5" fill="#FFFFFF" opacity="0.5"/>

  <!-- ラベル -->
  <text x="205" y="57" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#555555" font-weight="bold" opacity="0.7">800 Tsubame (Kyushu)</text>
</svg>
