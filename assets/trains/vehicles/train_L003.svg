<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- リニアモーターカー L0系 Legend L003 400×120 透過 -->
  <defs>
    <linearGradient id="bodyL003" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#E0E8F5"/>
    </linearGradient>
    <linearGradient id="windowL003" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#99CCEE"/>
    </linearGradient>
    <filter id="linaGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 磁気浮上エフェクト（地面との隙間） -->
  <rect x="15" y="100" width="370" height="4" rx="2" fill="#7EC8F0" opacity="0.5"/>
  <!-- ガイドレール -->
  <rect x="0" y="104" width="400" height="6" rx="2" fill="#8899BB"/>
  <rect x="0" y="107" width="400" height="3" rx="1" fill="#6677AA"/>

  <!-- 浮上エフェクトライン -->
  <rect x="20" y="97" width="360" height="3" rx="1" fill="#AADDFF" opacity="0.6" filter="url(#linaGlow)"/>

  <!-- 車体メイン（非常に細長い流線型） -->
  <rect x="30" y="42" width="360" height="55" rx="6" fill="url(#bodyL003)"/>

  <!-- 特徴的な鋭い先頭 -->
  <path d="M 30,42 Q 12,50 5,59 Q 12,68 30,75 L 30,42 Z" fill="#F0F4FF"/>
  <path d="M 5,55 Q 2,57 2,59 Q 2,61 5,63" fill="#E0E8FF"/>

  <!-- 前灯 -->
  <circle cx="5" cy="52" r="4" fill="#E8F8FF" stroke="#003366" stroke-width="1.5"/>
  <circle cx="5" cy="66" r="4" fill="#E8F8FF" stroke="#003366" stroke-width="1.5"/>

  <!-- 青ライン（L0系の特徴） -->
  <rect x="2" y="55" width="388" height="5" fill="#003366"/>
  <rect x="2" y="62" width="388" height="3" fill="#003366" opacity="0.5"/>

  <!-- 運転台窓（横長） -->
  <rect x="12" y="44" width="20" height="10" rx="3" fill="url(#windowL003)" stroke="#003366" stroke-width="1.5"/>

  <!-- 客室窓（非常に横長スリット - L0系特徴） -->
  <g fill="url(#windowL003)" stroke="#003366" stroke-width="1">
    <rect x="38" y="46" width="30" height="8" rx="3"/>
    <rect x="72" y="46" width="30" height="8" rx="3"/>
    <rect x="106" y="46" width="30" height="8" rx="3"/>
    <rect x="140" y="46" width="30" height="8" rx="3"/>
    <rect x="174" y="46" width="30" height="8" rx="3"/>
    <rect x="208" y="46" width="30" height="8" rx="3"/>
    <rect x="242" y="46" width="30" height="8" rx="3"/>
    <rect x="276" y="46" width="30" height="8" rx="3"/>
    <rect x="310" y="46" width="30" height="8" rx="3"/>
    <rect x="344" y="46" width="30" height="8" rx="3"/>
  </g>

  <!-- 底部のリアクションレール（磁気浮上部） -->
  <rect x="30" y="90" width="360" height="8" rx="4" fill="#003366" opacity="0.8"/>
  <rect x="30" y="92" width="360" height="4" rx="2" fill="#0055BB" opacity="0.6"/>

  <!-- スピード感エフェクト線 -->
  <g stroke="#AACCFF" stroke-width="1" opacity="0.4">
    <line x1="0" y1="48" x2="30" y2="48"/>
    <line x1="0" y1="52" x2="30" y2="52"/>
    <line x1="0" y1="56" x2="30" y2="56"/>
    <line x1="0" y1="68" x2="30" y2="68"/>
    <line x1="0" y1="72" x2="30" y2="72"/>
  </g>

  <!-- ハイライト -->
  <rect x="30" y="42" width="360" height="10" rx="4" fill="#FFFFFF" opacity="0.6"/>

  <!-- ラベル -->
  <text x="205" y="73" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#003366" font-weight="bold" opacity="0.7">L0 Series Maglev</text>
</svg>
