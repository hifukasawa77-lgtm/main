<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- E5系はやぶさ SR001 400×120 透過 -->
  <defs>
    <linearGradient id="bodySR001" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00844A"/>
      <stop offset="50%" stop-color="#006341"/>
      <stop offset="100%" stop-color="#004D30"/>
    </linearGradient>
    <linearGradient id="windowSR001" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D0EEFF"/>
      <stop offset="100%" stop-color="#88CCEE"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/><rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/><rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/><rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/><rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/><rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体 -->
  <rect x="28" y="44" width="358" height="54" rx="7" fill="url(#bodySR001)"/>

  <!-- E5系の長い鼻（特徴的な先端） -->
  <path d="M 28,44 Q 14,50 6,59 Q 14,68 28,72 L 28,44 Z" fill="#005535"/>
  <path d="M 6,55 Q 2,57 2,60 Q 2,62 6,65" fill="#004428"/>

  <!-- 前灯 -->
  <circle cx="5" cy="53" r="4" fill="#FFFDE0" stroke="#004428" stroke-width="1.5"/>
  <circle cx="5" cy="65" r="4" fill="#FF4400" stroke="#004428" stroke-width="1.5" opacity="0.9"/>

  <!-- 金ライン（はやぶさ特徴） -->
  <rect x="2" y="56" width="385" height="5" fill="#C5A028"/>
  <rect x="2" y="63" width="385" height="2" fill="#C5A028" opacity="0.6"/>

  <!-- 白ライン -->
  <rect x="2" y="61" width="385" height="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- 運転台窓 -->
  <rect x="12" y="46" width="16" height="9" rx="3" fill="url(#windowSR001)" stroke="#004D30" stroke-width="1.5"/>

  <!-- 客室窓 -->
  <g fill="url(#windowSR001)" stroke="#004D30" stroke-width="1">
    <rect x="36" y="48" width="18" height="8" rx="3"/>
    <rect x="60" y="48" width="18" height="8" rx="3"/>
    <rect x="84" y="48" width="18" height="8" rx="3"/>
    <rect x="108" y="48" width="18" height="8" rx="3"/>
    <rect x="132" y="48" width="18" height="8" rx="3"/>
    <rect x="156" y="48" width="18" height="8" rx="3"/>
    <rect x="180" y="48" width="18" height="8" rx="3"/>
    <rect x="204" y="48" width="18" height="8" rx="3"/>
    <rect x="228" y="48" width="18" height="8" rx="3"/>
    <rect x="252" y="48" width="18" height="8" rx="3"/>
    <rect x="276" y="48" width="18" height="8" rx="3"/>
    <rect x="300" y="48" width="18" height="8" rx="3"/>
    <rect x="324" y="48" width="18" height="8" rx="3"/>
    <rect x="348" y="48" width="18" height="8" rx="3"/>
    <rect x="372" y="48" width="12" height="8" rx="3"/>
  </g>

  <!-- ドア -->
  <g fill="#005535" stroke="#004428" stroke-width="1">
    <rect x="72" y="44" width="4" height="54"/><rect x="160" y="44" width="4" height="54"/>
    <rect x="248" y="44" width="4" height="54"/><rect x="336" y="44" width="4" height="54"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="190" y1="44" x2="186" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="186" y1="24" x2="204" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="204" y1="24" x2="200" y2="44" stroke="#888888" stroke-width="2"/>
  <rect x="184" y="22" width="22" height="4" rx="2" fill="#666"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="55" cy="100" r="12"/><circle cx="105" cy="100" r="12"/>
    <circle cx="185" cy="100" r="12"/><circle cx="235" cy="100" r="12"/>
    <circle cx="315" cy="100" r="12"/><circle cx="365" cy="100" r="12"/>
  </g>
  <g fill="#777777">
    <circle cx="55" cy="100" r="5"/><circle cx="105" cy="100" r="5"/>
    <circle cx="185" cy="100" r="5"/><circle cx="235" cy="100" r="5"/>
    <circle cx="315" cy="100" r="5"/><circle cx="365" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="28" y="44" width="358" height="10" rx="5" fill="#FFFFFF" opacity="0.2"/>

  <!-- ラベル -->
  <text x="205" y="73" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="11" fill="#FFFFFF" font-weight="bold" opacity="0.6">E5 Hayabusa</text>
</svg>
