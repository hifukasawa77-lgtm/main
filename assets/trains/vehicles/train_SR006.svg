<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- SLやまぐち号（C57形蒸気機関車）SR006 400×120 透過 -->
  <defs>
    <linearGradient id="bodyC57" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="copperC57" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4884A"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <radialGradient id="wheelC57" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <filter id="slshadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- 地面・レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#885522">
    <rect x="15" y="103" width="10" height="8"/><rect x="50" y="103" width="10" height="8"/>
    <rect x="85" y="103" width="10" height="8"/><rect x="120" y="103" width="10" height="8"/>
    <rect x="155" y="103" width="10" height="8"/><rect x="190" y="103" width="10" height="8"/>
    <rect x="225" y="103" width="10" height="8"/><rect x="260" y="103" width="10" height="8"/>
    <rect x="295" y="103" width="10" height="8"/><rect x="330" y="103" width="10" height="8"/>
    <rect x="365" y="103" width="10" height="8"/>
  </g>

  <!-- テンダー（石炭車） -->
  <rect x="290" y="60" width="100" height="38" rx="4" fill="url(#bodyC57)" filter="url(#slshadow)"/>
  <rect x="290" y="55" width="100" height="10" rx="3" fill="#2A2A2A"/>
  <!-- テンダー石炭 -->
  <rect x="294" y="56" width="92" height="7" rx="2" fill="#1A0A00" opacity="0.8"/>
  <!-- テンダー車輪 -->
  <g fill="url(#wheelC57)" stroke="#B87333" stroke-width="2">
    <circle cx="310" cy="98" r="11"/>
    <circle cx="340" cy="98" r="11"/>
    <circle cx="370" cy="98" r="11"/>
  </g>
  <g fill="#B87333" stroke="#AA6622" stroke-width="1">
    <circle cx="310" cy="98" r="4"/>
    <circle cx="340" cy="98" r="4"/>
    <circle cx="370" cy="98" r="4"/>
  </g>

  <!-- 連結部 -->
  <rect x="278" y="76" width="18" height="8" rx="3" fill="#444444"/>
  <rect x="282" y="72" width="10" height="4" rx="2" fill="#333333"/>

  <!-- ボイラー（機関車本体） -->
  <!-- キャブ（運転台）-->
  <rect x="185" y="52" width="88" height="46" rx="4" fill="url(#bodyC57)" filter="url(#slshadow)"/>
  <!-- キャブ窓 -->
  <rect x="198" y="58" width="22" height="16" rx="4" fill="#334455" stroke="#B87333" stroke-width="1.5"/>
  <rect x="240" y="58" width="22" height="16" rx="4" fill="#334455" stroke="#B87333" stroke-width="1.5"/>
  <!-- キャブ屋根 -->
  <rect x="180" y="48" width="100" height="10" rx="3" fill="#222222"/>

  <!-- ボイラー本体（長い円柱） -->
  <rect x="50" y="56" width="148" height="40" rx="6" fill="url(#bodyC57)" filter="url(#slshadow)"/>
  <!-- ボイラーバンド（銅リング） -->
  <g fill="url(#copperC57)" opacity="0.8">
    <rect x="78" y="56" width="5" height="40" rx="1"/>
    <rect x="108" y="56" width="5" height="40" rx="1"/>
    <rect x="138" y="56" width="5" height="40" rx="1"/>
    <rect x="168" y="56" width="5" height="40" rx="1"/>
  </g>
  <!-- ボイラーハイライト -->
  <rect x="52" y="56" width="146" height="12" rx="5" fill="#555555" opacity="0.6"/>

  <!-- 煙室（前端） -->
  <rect x="22" y="52" width="40" height="46" rx="4" fill="#2A2A2A" filter="url(#slshadow)"/>
  <!-- 煙室前蓋（丸い） -->
  <ellipse cx="22" cy="75" rx="14" ry="22" fill="#1A1A1A" stroke="#B87333" stroke-width="1.5"/>
  <!-- ハンドル -->
  <circle cx="22" cy="75" r="6" fill="#333333" stroke="#B87333" stroke-width="2"/>
  <circle cx="22" cy="75" r="2" fill="#B87333"/>

  <!-- 煙突（前から3番目位置） -->
  <rect x="42" y="34" width="16" height="24" rx="3" fill="#1A1A1A"/>
  <rect x="38" y="32" width="24" height="6" rx="3" fill="#222222"/>
  <!-- 煙突上部フレア -->
  <rect x="35" y="28" width="30" height="8" rx="4" fill="#1A1A1A"/>

  <!-- ドーム（蒸気ドーム） -->
  <ellipse cx="120" cy="54" rx="16" ry="12" fill="#2A2A2A" stroke="#B87333" stroke-width="1.5"/>
  <!-- 砂箱 -->
  <ellipse cx="155" cy="54" rx="10" ry="9" fill="#2A2A2A" stroke="#B87333" stroke-width="1.5"/>

  <!-- 安全弁 -->
  <rect x="117" y="40" width="4" height="14" rx="2" fill="url(#copperC57)"/>
  <rect x="114" y="38" width="10" height="4" rx="2" fill="url(#copperC57)"/>

  <!-- 前照灯 -->
  <ellipse cx="15" cy="62" rx="8" ry="6" fill="#FFFDE0" stroke="#B87333" stroke-width="1.5"/>
  <ellipse cx="15" cy="62" rx="4" ry="3" fill="#FFFFFF"/>

  <!-- ナンバープレート -->
  <rect x="26" y="72" width="18" height="8" rx="2" fill="#B87333"/>
  <text x="35" y="79" text-anchor="middle" font-family="Arial" font-size="5" fill="#1A1A1A" font-weight="bold">C57</text>

  <!-- 動輪（大きな主動輪）- C57特徴 -->
  <!-- 前の小輪（先従輪） -->
  <circle cx="35" cy="98" r="9" fill="url(#wheelC57)" stroke="#B87333" stroke-width="2"/>
  <circle cx="35" cy="98" r="3.5" fill="#B87333"/>

  <!-- 主動輪（大きい）×3 -->
  <g fill="url(#wheelC57)" stroke="#B87333" stroke-width="2.5">
    <circle cx="80" cy="95" r="16"/>
    <circle cx="120" cy="95" r="16"/>
    <circle cx="160" cy="95" r="16"/>
  </g>
  <!-- 車輪スポーク -->
  <g stroke="#444444" stroke-width="1.5" fill="none">
    <line x1="80" y1="79" x2="80" y2="111"/>
    <line x1="64" y1="95" x2="96" y2="95"/>
    <line x1="68" y1="83" x2="92" y2="107"/>
    <line x1="92" y1="83" x2="68" y2="107"/>
    <!-- 2番目 -->
    <line x1="120" y1="79" x2="120" y2="111"/>
    <line x1="104" y1="95" x2="136" y2="95"/>
    <line x1="108" y1="83" x2="132" y2="107"/>
    <line x1="132" y1="83" x2="108" y2="107"/>
    <!-- 3番目 -->
    <line x1="160" y1="79" x2="160" y2="111"/>
    <line x1="144" y1="95" x2="176" y2="95"/>
    <line x1="148" y1="83" x2="172" y2="107"/>
    <line x1="172" y1="83" x2="148" y2="107"/>
  </g>
  <g fill="#B87333">
    <circle cx="80" cy="95" r="5"/>
    <circle cx="120" cy="95" r="5"/>
    <circle cx="160" cy="95" r="5"/>
  </g>

  <!-- コネクティングロッド（動輪の連結棒） -->
  <rect x="78" y="93" width="86" height="4" rx="2" fill="url(#copperC57)" opacity="0.9"/>
  <rect x="73" y="91" width="8" height="8" rx="2" fill="#B87333"/>
  <rect x="155" y="91" width="8" height="8" rx="2" fill="#B87333"/>

  <!-- 後ろの小輪（従輪） -->
  <circle cx="192" cy="98" r="9" fill="url(#wheelC57)" stroke="#B87333" stroke-width="2"/>
  <circle cx="192" cy="98" r="3.5" fill="#B87333"/>

  <!-- 煙のエフェクト -->
  <g opacity="0.5">
    <ellipse cx="42" cy="24" rx="12" ry="8" fill="#888888"/>
    <ellipse cx="50" cy="16" rx="10" ry="7" fill="#AAAAAA"/>
    <ellipse cx="40" cy="10" rx="8" ry="6" fill="#CCCCCC"/>
    <ellipse cx="55" cy="8" rx="7" ry="5" fill="#BBBBBB"/>
    <ellipse cx="32" cy="6" rx="6" ry="5" fill="#AAAAAA"/>
  </g>

  <!-- ラベル -->
  <text x="220" y="42" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#B87333" font-weight="bold" opacity="0.8">SL Yamaguchi C57</text>
</svg>
