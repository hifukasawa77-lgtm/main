<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- ドクターイエロー（923形） Legend L001 400×120 透過 -->
  <defs>
    <linearGradient id="bodyL001" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="40%" stop-color="#F5E642"/>
      <stop offset="100%" stop-color="#E0C800"/>
    </linearGradient>
    <linearGradient id="windowL001" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8E4FF"/>
      <stop offset="100%" stop-color="#7EC8F0"/>
    </linearGradient>
    <filter id="trainShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000045"/>
    </filter>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <!-- 枕木 -->
  <rect x="20" y="103" width="8" height="8" fill="#996633"/>
  <rect x="55" y="103" width="8" height="8" fill="#996633"/>
  <rect x="90" y="103" width="8" height="8" fill="#996633"/>
  <rect x="125" y="103" width="8" height="8" fill="#996633"/>
  <rect x="160" y="103" width="8" height="8" fill="#996633"/>
  <rect x="195" y="103" width="8" height="8" fill="#996633"/>
  <rect x="230" y="103" width="8" height="8" fill="#996633"/>
  <rect x="265" y="103" width="8" height="8" fill="#996633"/>
  <rect x="300" y="103" width="8" height="8" fill="#996633"/>
  <rect x="335" y="103" width="8" height="8" fill="#996633"/>
  <rect x="370" y="103" width="8" height="8" fill="#996633"/>

  <!-- 車体メイン -->
  <rect x="22" y="42" width="360" height="58" rx="6" fill="url(#bodyL001)" filter="url(#trainShadow)"/>

  <!-- 先頭部（ずんぐりした鼻 - ドクターイエロー特有） -->
  <path d="M 22,42 Q 8,45 5,60 Q 8,75 22,80 L 22,42 Z" fill="#E8D400"/>
  <path d="M 5,58 Q 3,60 5,62" stroke="#1A1A1A" stroke-width="1.5" fill="none"/>

  <!-- 前灯 -->
  <circle cx="8" cy="52" r="4" fill="#FFFDE0" stroke="#CCAA00" stroke-width="1.5"/>
  <circle cx="8" cy="52" r="2" fill="#FFFFF0"/>

  <!-- 運転台窓（先頭） -->
  <rect x="12" y="46" width="16" height="12" rx="3" fill="url(#windowL001)" stroke="#888800" stroke-width="1.5"/>

  <!-- ドアライン -->
  <rect x="56" y="42" width="4" height="58" fill="#D4C800" opacity="0.6"/>
  <rect x="130" y="42" width="4" height="58" fill="#D4C800" opacity="0.6"/>
  <rect x="204" y="42" width="4" height="58" fill="#D4C800" opacity="0.6"/>
  <rect x="278" y="42" width="4" height="58" fill="#D4C800" opacity="0.6"/>
  <rect x="352" y="42" width="4" height="58" fill="#D4C800" opacity="0.6"/>

  <!-- 計測窓（ドクターイエロー特有の小窓多め） -->
  <g fill="url(#windowL001)" stroke="#888800" stroke-width="1">
    <rect x="30" y="50" width="20" height="10" rx="3"/>
    <rect x="62" y="50" width="14" height="10" rx="2"/>
    <rect x="78" y="50" width="14" height="10" rx="2"/>
    <rect x="94" y="50" width="14" height="10" rx="2"/>
    <rect x="110" y="50" width="14" height="10" rx="2"/>
    <rect x="136" y="50" width="14" height="10" rx="2"/>
    <rect x="152" y="50" width="14" height="10" rx="2"/>
    <rect x="168" y="50" width="14" height="10" rx="2"/>
    <rect x="184" y="50" width="14" height="10" rx="2"/>
    <rect x="210" y="50" width="14" height="10" rx="2"/>
    <rect x="226" y="50" width="14" height="10" rx="2"/>
    <rect x="242" y="50" width="14" height="10" rx="2"/>
    <rect x="258" y="50" width="14" height="10" rx="2"/>
    <rect x="284" y="50" width="14" height="10" rx="2"/>
    <rect x="300" y="50" width="14" height="10" rx="2"/>
    <rect x="316" y="50" width="14" height="10" rx="2"/>
    <rect x="332" y="50" width="14" height="10" rx="2"/>
    <rect x="358" y="50" width="16" height="10" rx="2"/>
  </g>

  <!-- 黒ライン（腰部） -->
  <rect x="5" y="77" width="377" height="6" fill="#1A1A1A" opacity="0.85"/>

  <!-- パンタグラフ -->
  <line x1="180" y1="42" x2="175" y2="22" stroke="#888888" stroke-width="2"/>
  <line x1="175" y1="22" x2="195" y2="22" stroke="#888888" stroke-width="2"/>
  <line x1="195" y1="22" x2="190" y2="42" stroke="#888888" stroke-width="2"/>
  <rect x="173" y="20" width="24" height="4" rx="2" fill="#666"/>

  <!-- 架線 -->
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="55" cy="100" r="12"/>
    <circle cx="105" cy="100" r="12"/>
    <circle cx="185" cy="100" r="12"/>
    <circle cx="235" cy="100" r="12"/>
    <circle cx="315" cy="100" r="12"/>
    <circle cx="365" cy="100" r="12"/>
  </g>
  <g fill="#888888">
    <circle cx="55" cy="100" r="5"/>
    <circle cx="105" cy="100" r="5"/>
    <circle cx="185" cy="100" r="5"/>
    <circle cx="235" cy="100" r="5"/>
    <circle cx="315" cy="100" r="5"/>
    <circle cx="365" cy="100" r="5"/>
  </g>

  <!-- 車体上部ハイライト -->
  <rect x="22" y="42" width="360" height="10" rx="3" fill="#FFFFFF" opacity="0.3"/>

  <!-- ラベル -->
  <text x="200" y="72" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="11" fill="#4A3A00" font-weight="bold" opacity="0.7">Doctor Yellow 923</text>
</svg>
