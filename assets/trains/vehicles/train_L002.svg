<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- 500系新幹線 Legend L002 400×120 透過 -->
  <defs>
    <linearGradient id="bodyL002" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <linearGradient id="windowL002" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCE8FF"/>
      <stop offset="100%" stop-color="#88BBEE"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/>
    <rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/>
    <rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/>
    <rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/>
    <rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/>
    <rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体メイン（細長い円筒形） -->
  <rect x="35" y="45" width="350" height="52" rx="8" fill="url(#bodyL002)"/>

  <!-- 500系 特徴的な細長い流線型先頭 -->
  <path d="M 35,45 Q 20,52 10,60 Q 20,68 35,71 L 35,45 Z" fill="#DDDDDD"/>
  <path d="M 10,56 Q 4,58 3,60 Q 4,62 10,64" fill="#CCCCCC" stroke="none"/>

  <!-- 黒ライン（500系の格好いい特徴） -->
  <rect x="3" y="57" width="382" height="7" fill="#2C2C2C"/>

  <!-- 前灯 -->
  <circle cx="7" cy="53" r="4" fill="#FFFDE0" stroke="#AAAAAA" stroke-width="1"/>

  <!-- 運転台窓 -->
  <rect x="14" y="47" width="18" height="10" rx="3" fill="url(#windowL002)" stroke="#555555" stroke-width="1.5"/>

  <!-- 客室窓（細長いスリット） -->
  <g fill="url(#windowL002)" stroke="#777777" stroke-width="1">
    <rect x="42" y="49" width="22" height="7" rx="2"/>
    <rect x="68" y="49" width="22" height="7" rx="2"/>
    <rect x="94" y="49" width="22" height="7" rx="2"/>
    <rect x="120" y="49" width="22" height="7" rx="2"/>
    <rect x="146" y="49" width="22" height="7" rx="2"/>
    <rect x="172" y="49" width="22" height="7" rx="2"/>
    <rect x="198" y="49" width="22" height="7" rx="2"/>
    <rect x="224" y="49" width="22" height="7" rx="2"/>
    <rect x="250" y="49" width="22" height="7" rx="2"/>
    <rect x="276" y="49" width="22" height="7" rx="2"/>
    <rect x="302" y="49" width="22" height="7" rx="2"/>
    <rect x="328" y="49" width="22" height="7" rx="2"/>
    <rect x="354" y="49" width="22" height="7" rx="2"/>
  </g>

  <!-- ドア -->
  <g fill="#D0D0D0" stroke="#BBBBBB" stroke-width="1">
    <rect x="80" y="45" width="5" height="52"/>
    <rect x="175" y="45" width="5" height="52"/>
    <rect x="270" y="45" width="5" height="52"/>
    <rect x="365" y="45" width="5" height="52"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="200" y1="45" x2="196" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="196" y1="24" x2="214" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="214" y1="24" x2="210" y2="45" stroke="#888888" stroke-width="2"/>
  <rect x="194" y="22" width="22" height="4" rx="2" fill="#666"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#2C2C2C" stroke="#888888" stroke-width="2">
    <circle cx="60" cy="100" r="12"/>
    <circle cx="110" cy="100" r="12"/>
    <circle cx="190" cy="100" r="12"/>
    <circle cx="240" cy="100" r="12"/>
    <circle cx="320" cy="100" r="12"/>
    <circle cx="370" cy="100" r="12"/>
  </g>
  <g fill="#888888">
    <circle cx="60" cy="100" r="5"/>
    <circle cx="110" cy="100" r="5"/>
    <circle cx="190" cy="100" r="5"/>
    <circle cx="240" cy="100" r="5"/>
    <circle cx="320" cy="100" r="5"/>
    <circle cx="370" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="35" y="45" width="350" height="8" rx="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- ラベル -->
  <text x="200" y="71" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#444444" font-weight="bold" opacity="0.65">500 Series Shinkansen</text>
</svg>
