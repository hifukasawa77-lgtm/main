<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- E7系かがやき SR002 400×120 透過 -->
  <defs>
    <linearGradient id="bodySR002" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A6AB0"/>
      <stop offset="45%" stop-color="#1C4E8A"/>
      <stop offset="100%" stop-color="#0A2E5A"/>
    </linearGradient>
    <linearGradient id="windowSR002" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8F0FF"/>
      <stop offset="100%" stop-color="#88CCEE"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/><rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/><rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/><rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/><rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/><rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体 -->
  <rect x="25" y="44" width="362" height="54" rx="7" fill="url(#bodySR002)"/>

  <!-- 先頭（なだらかな流線型） -->
  <path d="M 25,44 Q 12,52 7,60 Q 12,68 25,72 L 25,44 Z" fill="#1A4278"/>
  <path d="M 7,57 Q 4,59 4,60 Q 4,61 7,63" fill="#122E58"/>

  <!-- 前灯 -->
  <circle cx="6" cy="52" r="5" fill="#FFFDE0" stroke="#0A2E5A" stroke-width="1.5"/>

  <!-- オレンジアクセントライン（かがやき特徴） -->
  <rect x="4" y="70" width="384" height="6" fill="#F5A623"/>
  <rect x="4" y="66" width="384" height="3" fill="#E8921A" opacity="0.7"/>

  <!-- 白ライン -->
  <rect x="4" y="58" width="384" height="3" fill="#FFFFFF" opacity="0.6"/>

  <!-- 運転台窓 -->
  <rect x="10" y="46" width="18" height="10" rx="3" fill="url(#windowSR002)" stroke="#0A2E5A" stroke-width="1.5"/>

  <!-- 客室窓 -->
  <g fill="url(#windowSR002)" stroke="#0A2E5A" stroke-width="1">
    <rect x="33" y="48" width="20" height="9" rx="3"/>
    <rect x="57" y="48" width="20" height="9" rx="3"/>
    <rect x="81" y="48" width="20" height="9" rx="3"/>
    <rect x="105" y="48" width="20" height="9" rx="3"/>
    <rect x="129" y="48" width="20" height="9" rx="3"/>
    <rect x="153" y="48" width="20" height="9" rx="3"/>
    <rect x="177" y="48" width="20" height="9" rx="3"/>
    <rect x="201" y="48" width="20" height="9" rx="3"/>
    <rect x="225" y="48" width="20" height="9" rx="3"/>
    <rect x="249" y="48" width="20" height="9" rx="3"/>
    <rect x="273" y="48" width="20" height="9" rx="3"/>
    <rect x="297" y="48" width="20" height="9" rx="3"/>
    <rect x="321" y="48" width="20" height="9" rx="3"/>
    <rect x="345" y="48" width="20" height="9" rx="3"/>
    <rect x="370" y="48" width="12" height="9" rx="3"/>
  </g>

  <!-- ドア -->
  <g fill="#16427A" stroke="#0A2E5A" stroke-width="1">
    <rect x="68" y="44" width="4" height="54"/><rect x="160" y="44" width="4" height="54"/>
    <rect x="252" y="44" width="4" height="54"/><rect x="344" y="44" width="4" height="54"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="195" y1="44" x2="191" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="191" y1="24" x2="209" y2="24" stroke="#888888" stroke-width="2"/>
  <line x1="209" y1="24" x2="205" y2="44" stroke="#888888" stroke-width="2"/>
  <rect x="189" y="22" width="22" height="4" rx="2" fill="#666"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="52" cy="100" r="12"/><circle cx="102" cy="100" r="12"/>
    <circle cx="182" cy="100" r="12"/><circle cx="232" cy="100" r="12"/>
    <circle cx="312" cy="100" r="12"/><circle cx="362" cy="100" r="12"/>
  </g>
  <g fill="#777777">
    <circle cx="52" cy="100" r="5"/><circle cx="102" cy="100" r="5"/>
    <circle cx="182" cy="100" r="5"/><circle cx="232" cy="100" r="5"/>
    <circle cx="312" cy="100" r="5"/><circle cx="362" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="25" y="44" width="362" height="10" rx="5" fill="#FFFFFF" opacity="0.2"/>

  <!-- ラベル -->
  <text x="205" y="67" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#FFFFFF" font-weight="bold" opacity="0.65">E7 Kagayaki</text>
</svg>
