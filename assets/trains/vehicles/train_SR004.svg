<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- E6系こまち SR004 400×120 透過 -->
  <defs>
    <linearGradient id="bodySR004" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF2255"/>
      <stop offset="50%" stop-color="#E8003D"/>
      <stop offset="100%" stop-color="#AA0028"/>
    </linearGradient>
    <linearGradient id="windowSR004" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8EEFF"/>
      <stop offset="100%" stop-color="#99CCEE"/>
    </linearGradient>
  </defs>

  <!-- レール -->
  <rect x="0" y="103" width="400" height="5" rx="2" fill="#888888"/>
  <rect x="0" y="106" width="400" height="3" rx="1" fill="#666666"/>
  <g fill="#996633">
    <rect x="20" y="103" width="8" height="8"/><rect x="55" y="103" width="8" height="8"/>
    <rect x="90" y="103" width="8" height="8"/><rect x="125" y="103" width="8" height="8"/>
    <rect x="160" y="103" width="8" height="8"/><rect x="195" y="103" width="8" height="8"/>
    <rect x="230" y="103" width="8" height="8"/><rect x="265" y="103" width="8" height="8"/>
    <rect x="300" y="103" width="8" height="8"/><rect x="335" y="103" width="8" height="8"/>
    <rect x="370" y="103" width="8" height="8"/>
  </g>

  <!-- 車体 -->
  <rect x="30" y="45" width="358" height="52" rx="6" fill="url(#bodySR004)"/>

  <!-- E6系の非常に長い鼻（特徴） -->
  <path d="M 30,45 Q 14,52 6,60 Q 14,68 30,70 L 30,45 Z" fill="#CC0030"/>
  <!-- 先端 -->
  <path d="M 6,56 Q 2,58 2,60 Q 2,62 6,64" fill="#AA0025"/>

  <!-- 前灯 -->
  <circle cx="5" cy="52" r="4" fill="#FFFDE0" stroke="#880020" stroke-width="1.5"/>
  <circle cx="5" cy="68" r="3.5" fill="#FF8800" stroke="#880020" stroke-width="1.5" opacity="0.9"/>

  <!-- シルバーライン（こまち特徴） -->
  <rect x="2" y="57" width="387" height="5" fill="#C0C0C0"/>
  <rect x="2" y="62" width="387" height="2" fill="#AAAAAA" opacity="0.6"/>

  <!-- 運転台窓 -->
  <rect x="12" y="47" width="16" height="9" rx="3" fill="url(#windowSR004)" stroke="#880020" stroke-width="1.5"/>

  <!-- 客室窓（こまちは細長い窓） -->
  <g fill="url(#windowSR004)" stroke="#AA0028" stroke-width="1">
    <rect x="38" y="49" width="16" height="7" rx="2"/>
    <rect x="58" y="49" width="16" height="7" rx="2"/>
    <rect x="78" y="49" width="16" height="7" rx="2"/>
    <rect x="98" y="49" width="16" height="7" rx="2"/>
    <rect x="118" y="49" width="16" height="7" rx="2"/>
    <rect x="138" y="49" width="16" height="7" rx="2"/>
    <rect x="158" y="49" width="16" height="7" rx="2"/>
    <rect x="178" y="49" width="16" height="7" rx="2"/>
    <rect x="198" y="49" width="16" height="7" rx="2"/>
    <rect x="218" y="49" width="16" height="7" rx="2"/>
    <rect x="238" y="49" width="16" height="7" rx="2"/>
    <rect x="258" y="49" width="16" height="7" rx="2"/>
    <rect x="278" y="49" width="16" height="7" rx="2"/>
    <rect x="298" y="49" width="16" height="7" rx="2"/>
    <rect x="318" y="49" width="16" height="7" rx="2"/>
    <rect x="338" y="49" width="16" height="7" rx="2"/>
    <rect x="358" y="49" width="16" height="7" rx="2"/>
    <rect x="378" y="49" width="10" height="7" rx="2"/>
  </g>

  <!-- ドア -->
  <g fill="#CC0030" stroke="#AA0028" stroke-width="1">
    <rect x="65" y="45" width="3" height="52"/><rect x="155" y="45" width="3" height="52"/>
    <rect x="245" y="45" width="3" height="52"/><rect x="335" y="45" width="3" height="52"/>
  </g>

  <!-- パンタグラフ -->
  <line x1="190" y1="45" x2="186" y2="25" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="186" y1="25" x2="204" y2="25" stroke="#AAAAAA" stroke-width="2"/>
  <line x1="204" y1="25" x2="200" y2="45" stroke="#AAAAAA" stroke-width="2"/>
  <rect x="184" y="23" width="22" height="4" rx="2" fill="#888"/>
  <line x1="0" y1="18" x2="400" y2="18" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="15,5"/>

  <!-- 車輪 -->
  <g fill="#1A1A1A" stroke="#888888" stroke-width="2">
    <circle cx="55" cy="100" r="12"/><circle cx="105" cy="100" r="12"/>
    <circle cx="185" cy="100" r="12"/><circle cx="235" cy="100" r="12"/>
    <circle cx="315" cy="100" r="12"/><circle cx="365" cy="100" r="12"/>
  </g>
  <g fill="#C0C0C0">
    <circle cx="55" cy="100" r="5"/><circle cx="105" cy="100" r="5"/>
    <circle cx="185" cy="100" r="5"/><circle cx="235" cy="100" r="5"/>
    <circle cx="315" cy="100" r="5"/><circle cx="365" cy="100" r="5"/>
  </g>

  <!-- ハイライト -->
  <rect x="30" y="45" width="358" height="10" rx="5" fill="#FFFFFF" opacity="0.25"/>

  <!-- ラベル -->
  <text x="205" y="70" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#FFFFFF" font-weight="bold" opacity="0.7">E6 Komachi</text>
</svg>
