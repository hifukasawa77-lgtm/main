<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- スタンプ（未取得）80×80 - グレー点線枠 -->

  <!-- 外枠（点線円） -->
  <circle cx="40" cy="40" r="36" fill="#F0F0F0" stroke="#BBBBBB" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="40" cy="40" r="30" fill="none" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 新幹線シルエット（薄いグレー） -->
  <!-- 車体 -->
  <rect x="15" y="35" width="50" height="14" rx="6" fill="#CCCCCC"/>
  <!-- 先頭（左） -->
  <polygon points="15,35 24,35 24,49 15,49 9,42" fill="#BBBBBB"/>
  <polygon points="9,39 15,35 15,49 9,45" fill="#AAAAAA"/>
  <!-- 窓（さらに薄く） -->
  <rect x="26" y="38" width="7" height="5" rx="2" fill="#DDDDDD"/>
  <rect x="35" y="38" width="6" height="5" rx="2" fill="#DDDDDD"/>
  <rect x="43" y="38" width="6" height="5" rx="2" fill="#DDDDDD"/>
  <rect x="51" y="38" width="6" height="5" rx="2" fill="#DDDDDD"/>
  <!-- 車輪 -->
  <circle cx="22" cy="49" r="5" fill="#CCCCCC"/>
  <circle cx="22" cy="49" r="2.5" fill="#DDDDDD"/>
  <circle cx="55" cy="49" r="5" fill="#CCCCCC"/>
  <circle cx="55" cy="49" r="2.5" fill="#DDDDDD"/>
  <!-- パンタグラフ -->
  <line x1="40" y1="35" x2="38" y2="28" stroke="#CCCCCC" stroke-width="1.5"/>
  <line x1="38" y1="28" x2="44" y2="28" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- ？マーク（未取得感） -->
  <text x="40" y="22" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="13" fill="#BBBBBB" font-weight="bold">?</text>

  <!-- 上下装飾テキスト（薄い） -->
  <path id="topArcE" d="M 12,40 A 28,28 0 0,1 68,40" fill="none"/>
  <text font-family="Arial Rounded MT Bold, Arial" font-size="7.5" fill="#CCCCCC">
    <textPath href="#topArcE" startOffset="18%">- - - - - - - - - -</textPath>
  </text>
  <path id="botArcE" d="M 12,40 A 28,28 0 0,0 68,40" fill="none"/>
  <text font-family="Arial Rounded MT Bold, Arial" font-size="7" fill="#CCCCCC">
    <textPath href="#botArcE" startOffset="22%">まだ　みつかっていない</textPath>
  </text>
</svg>
