<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <!-- 日本地図 子ども向けイラスト 800×900 -->
  <defs>
    <radialGradient id="seaGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#B8E4F7"/>
      <stop offset="100%" stop-color="#7EC8E8"/>
    </radialGradient>
    <filter id="mapshadow">
      <feDropShadow dx="3" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
    <!-- 陸地テクスチャ -->
    <pattern id="landPat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#C8E6A0"/>
      <circle cx="10" cy="10" r="2" fill="#B8DC8C" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- 海背景 -->
  <rect width="800" height="900" fill="url(#seaGrad)"/>

  <!-- 海の波模様（装飾） -->
  <g opacity="0.25" stroke="#5BA8D0" stroke-width="1.5" fill="none">
    <path d="M20,50 Q60,40 100,50 Q140,60 180,50"/>
    <path d="M20,80 Q60,70 100,80 Q140,90 180,80"/>
    <path d="M600,200 Q640,190 680,200 Q720,210 760,200"/>
    <path d="M580,240 Q620,230 660,240 Q700,250 740,240"/>
    <path d="M50,750 Q90,740 130,750 Q170,760 210,750"/>
    <path d="M30,780 Q70,770 110,780 Q150,790 190,780"/>
    <path d="M600,800 Q640,790 680,800 Q720,810 760,800"/>
    <path d="M620,840 Q660,830 700,840 Q740,850 780,840"/>
  </g>

  <!-- ======= 陸地（日本列島）======= -->
  <!-- 北海道 -->
  <g filter="url(#mapshadow)">
    <path d="M 380,40 L 430,45 L 480,55 L 520,70 L 550,90 L 560,115 L 545,135
             L 520,145 L 490,150 L 460,148 L 435,160 L 415,170 L 395,165
             L 370,155 L 355,140 L 350,120 L 360,100 L 370,75 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2" stroke-linejoin="round"/>
    <!-- 道東半島 -->
    <path d="M 550,90 L 580,85 L 610,90 L 630,110 L 620,130 L 600,140 L 575,135 L 560,115 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2" stroke-linejoin="round"/>
    <!-- 道南部（函館方面） -->
    <path d="M 355,140 L 375,155 L 370,170 L 355,175 L 340,168 L 338,152 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2"/>
  </g>

  <!-- 本州 -->
  <g filter="url(#mapshadow)">
    <!-- 東北・関東・中部・近畿・中国地方 -->
    <path d="M 340,175 L 360,178 L 380,185 L 400,200 L 415,220 L 420,245
             L 430,265 L 445,280 L 455,300 L 460,325 L 458,350 L 450,375
             L 440,395 L 435,415 L 440,435 L 448,452 L 445,470
             L 435,485 L 425,495 L 408,500 L 390,495 L 372,485
             L 358,470 L 348,452 L 340,432 L 330,412 L 318,395
             L 308,375 L 302,355 L 300,332 L 305,310 L 315,290
             L 320,268 L 315,248 L 308,228 L 300,208 L 295,190
             L 305,178 L 322,172 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 房総半島 -->
    <path d="M 460,325 L 490,320 L 510,335 L 505,355 L 485,362 L 465,352 L 458,338 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 伊豆半島 -->
    <path d="M 445,395 L 465,398 L 470,415 L 458,425 L 445,418 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 紀伊半島 -->
    <path d="M 372,485 L 390,490 L 400,508 L 395,528 L 378,535 L 362,525 L 355,508 L 358,490 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 中国地方延伸 -->
    <path d="M 300,430 L 320,425 L 330,412 L 318,395 L 302,395 L 288,410 L 285,430 L 292,442 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 山陰側海岸線補足 -->
    <path d="M 285,408 L 265,415 L 248,428 L 240,448 L 252,462 L 270,465 L 288,458 L 292,442 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 鳥取・島根あたり -->
    <path d="M 240,448 L 225,450 L 215,462 L 220,476 L 238,480 L 252,472 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
  </g>

  <!-- 四国 -->
  <g filter="url(#mapshadow)">
    <path d="M 300,510 L 330,505 L 358,510 L 375,520 L 378,538 L 365,552
             L 342,558 L 318,555 L 300,545 L 290,530 L 292,515 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2" stroke-linejoin="round"/>
    <!-- 足摺岬 -->
    <path d="M 330,558 L 338,572 L 328,580 L 315,572 L 318,558 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
  </g>

  <!-- 九州 -->
  <g filter="url(#mapshadow)">
    <path d="M 200,480 L 230,475 L 255,485 L 268,502 L 272,522 L 265,545
             L 252,562 L 235,572 L 215,572 L 196,562 L 182,545 L 178,522
             L 182,500 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2" stroke-linejoin="round"/>
    <!-- 薩摩半島 -->
    <path d="M 215,572 L 222,590 L 215,605 L 203,605 L 196,590 L 196,572 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 大隅半島 -->
    <path d="M 235,572 L 248,588 L 245,605 L 232,608 L 222,596 L 222,578 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
  </g>

  <!-- 対馬・五島列島（小島） -->
  <g fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5">
    <ellipse cx="155" cy="490" rx="12" ry="20"/>
    <ellipse cx="140" cy="512" rx="10" ry="16"/>
    <ellipse cx="128" cy="490" rx="8" ry="14"/>
    <ellipse cx="120" cy="530" rx="12" ry="10"/>
  </g>

  <!-- 沖縄（簡略） -->
  <g filter="url(#mapshadow)">
    <path d="M 148,740 L 175,735 L 198,742 L 200,758 L 188,768 L 165,770 L 145,762 Z"
          fill="url(#landPat)" stroke="#88BB66" stroke-width="2"/>
    <!-- 宮古島 -->
    <ellipse cx="120" cy="790" rx="18" ry="10" fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 石垣島 -->
    <ellipse cx="88" cy="818" rx="20" ry="11" fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
    <!-- 与那国 -->
    <ellipse cx="60" cy="828" rx="10" ry="7" fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>
  </g>

  <!-- 佐渡島 -->
  <ellipse cx="415" cy="258" rx="20" ry="10" fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>

  <!-- 淡路島 -->
  <path d="M 332,490 L 342,488 L 348,498 L 344,512 L 334,514 L 326,504 Z"
        fill="url(#landPat)" stroke="#88BB66" stroke-width="1.5"/>

  <!-- ===地名ラベル（子ども向けひらがな）=== -->
  <g font-family="Arial Rounded MT Bold, 游ゴシック, 'Hiragino Maru Gothic Pro', Arial" font-weight="bold">
    <text x="475" y="110" font-size="16" fill="#2D6A2D" text-anchor="middle">ほっかいどう</text>
    <text x="390" y="280" font-size="13" fill="#2D6A2D" text-anchor="middle">とうほく</text>
    <text x="442" y="340" font-size="13" fill="#2D6A2D" text-anchor="middle">かんとう</text>
    <text x="418" y="420" font-size="12" fill="#2D6A2D" text-anchor="middle">ちゅうぶ</text>
    <text x="355" y="450" font-size="11" fill="#2D6A2D" text-anchor="middle">きんき</text>
    <text x="268" y="440" font-size="11" fill="#2D6A2D" text-anchor="middle">ちゅうごく</text>
    <text x="335" y="535" font-size="11" fill="#2D6A2D" text-anchor="middle">しこく</text>
    <text x="222" y="525" font-size="12" fill="#2D6A2D" text-anchor="middle">きゅうしゅう</text>
    <text x="172" y="752" font-size="11" fill="#2D6A2D" text-anchor="middle">おきなわ</text>
  </g>

  <!-- 電車アイコン（装飾） -->
  <g opacity="0.7">
    <!-- 新幹線アイコン（東北方面） -->
    <rect x="375" y="272" width="36" height="11" rx="5" fill="#006341"/>
    <polygon points="375,272 381,272 381,283 375,283 371,277" fill="#004D30"/>
    <rect x="382" y="274" width="5" height="5" rx="2" fill="#AAFFCC"/>
    <rect x="389" y="274" width="4" height="5" rx="2" fill="#AAFFCC"/>

    <!-- 新幹線アイコン（九州方面） -->
    <rect x="198" y="520" width="32" height="10" rx="5" fill="#E8003D"/>
    <polygon points="198,520 204,520 204,530 198,530 194,525" fill="#CC0030"/>
    <rect x="205" y="522" width="4" height="5" rx="2" fill="#FFAACC"/>
    <rect x="211" y="522" width="4" height="5" rx="2" fill="#FFAACC"/>
  </g>

  <!-- タイトル装飾帯 -->
  <rect x="0" y="850" width="800" height="50" fill="#7EC8E8" opacity="0.4"/>
  <text x="400" y="882" text-anchor="middle" font-family="Arial Rounded MT Bold, 游ゴシック, Arial" font-size="20" fill="#1A5C8A" font-weight="bold">にほん　てつどう　マップ</text>

  <!-- 方位記号 -->
  <g transform="translate(740,80)">
    <circle r="22" fill="#FFFFFF" opacity="0.8"/>
    <polygon points="0,-18 5,0 0,4 -5,0" fill="#E44"/>
    <polygon points="0,18 5,0 0,-4 -5,0" fill="#888"/>
    <text x="0" y="-8" text-anchor="middle" font-size="9" fill="#CC2222" font-weight="bold">N</text>
  </g>

  <!-- スケール（装飾） -->
  <g transform="translate(40,858)">
    <rect y="-6" width="80" height="6" fill="#1A5C8A" opacity="0.6"/>
    <rect x="80" y="-6" width="80" height="6" fill="#FFFFFF" opacity="0.8" stroke="#1A5C8A" stroke-width="1"/>
    <text x="0" y="8" font-size="9" fill="#1A5C8A">0</text>
    <text x="75" y="8" font-size="9" fill="#1A5C8A">200km</text>
  </g>
</svg>
