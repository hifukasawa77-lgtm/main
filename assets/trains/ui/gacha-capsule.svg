<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- ガシャポン カプセル 透過PNG相当 -->
  <defs>
    <radialGradient id="capTop" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FFE4E4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF9999" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="capBot" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#E4F0FF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#88AAFF" stop-opacity="0.45"/>
    </radialGradient>
    <filter id="cshadow">
      <feDropShadow dx="2" dy="3" stdDeviation="6" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- カプセル下半球（青み） -->
  <ellipse cx="100" cy="115" rx="72" ry="72" fill="url(#capBot)" stroke="#AABBFF" stroke-width="3" filter="url(#cshadow)"/>
  <!-- カプセル上半球（ピンク） -->
  <ellipse cx="100" cy="88" rx="72" ry="72" fill="url(#capTop)" stroke="#FFAAAA" stroke-width="3"/>

  <!-- 中央の継ぎ目ライン -->
  <rect x="28" y="98" width="144" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
  <rect x="28" y="100" width="144" height="4" rx="2" fill="#DDDDFF" opacity="0.5"/>

  <!-- 内部 電車シルエット -->
  <g opacity="0.65">
    <!-- 車体 -->
    <rect x="55" y="93" width="90" height="28" rx="9" fill="#4477CC"/>
    <!-- 先頭（左） -->
    <rect x="55" y="93" width="22" height="28" rx="9" fill="#2255BB"/>
    <!-- 窓 -->
    <rect x="63" y="98" width="12" height="8" rx="3" fill="#AADDFF"/>
    <rect x="82" y="98" width="10" height="8" rx="2" fill="#AADDFF"/>
    <rect x="97" y="98" width="10" height="8" rx="2" fill="#AADDFF"/>
    <rect x="112" y="98" width="10" height="8" rx="2" fill="#AADDFF"/>
    <!-- 車輪 -->
    <circle cx="72" cy="121" r="7" fill="#222255" opacity="0.8"/>
    <circle cx="120" cy="121" r="7" fill="#222255" opacity="0.8"/>
    <circle cx="72" cy="121" r="3" fill="#7799CC"/>
    <circle cx="120" cy="121" r="3" fill="#7799CC"/>
  </g>

  <!-- 光沢ハイライト（上部） -->
  <ellipse cx="78" cy="72" rx="28" ry="18" fill="#FFFFFF" opacity="0.55"/>
  <ellipse cx="83" cy="68" rx="12" ry="8" fill="#FFFFFF" opacity="0.7"/>

  <!-- 継ぎ目ハイライト -->
  <ellipse cx="100" cy="102" rx="65" ry="4" fill="#FFFFFF" opacity="0.3"/>
</svg>
