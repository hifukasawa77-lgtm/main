<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <!-- でんしゃずかんワールド タイトルロゴ 600×200 透過 -->
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="35%" stop-color="#FF4444"/>
      <stop offset="70%" stop-color="#CC2288"/>
      <stop offset="100%" stop-color="#7722CC"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#006341"/>
      <stop offset="100%" stop-color="#004428"/>
    </linearGradient>
    <filter id="logoShadow">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#00000050"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000060"/>
    </filter>
    <!-- 星のフィルター -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景レール（装飾） -->
  <rect x="0" y="158" width="600" height="6" rx="3" fill="#DDDDDD" opacity="0.4"/>
  <rect x="0" y="162" width="600" height="3" rx="1" fill="#BBBBBB" opacity="0.4"/>
  <!-- 枕木（装飾） -->
  <g fill="#CCAA88" opacity="0.3">
    <rect x="10" y="158" width="8" height="8"/><rect x="40" y="158" width="8" height="8"/>
    <rect x="70" y="158" width="8" height="8"/><rect x="100" y="158" width="8" height="8"/>
    <rect x="130" y="158" width="8" height="8"/><rect x="160" y="158" width="8" height="8"/>
    <rect x="190" y="158" width="8" height="8"/><rect x="220" y="158" width="8" height="8"/>
    <rect x="250" y="158" width="8" height="8"/><rect x="280" y="158" width="8" height="8"/>
    <rect x="310" y="158" width="8" height="8"/><rect x="340" y="158" width="8" height="8"/>
    <rect x="370" y="158" width="8" height="8"/><rect x="400" y="158" width="8" height="8"/>
    <rect x="430" y="158" width="8" height="8"/><rect x="460" y="158" width="8" height="8"/>
    <rect x="490" y="158" width="8" height="8"/><rect x="520" y="158" width="8" height="8"/>
    <rect x="550" y="158" width="8" height="8"/><rect x="580" y="158" width="8" height="8"/>
  </g>

  <!-- 星デコ（背景） -->
  <g filter="url(#starGlow)" opacity="0.8">
    <text x="18" y="45" font-size="20" fill="#FFD700">★</text>
    <text x="568" y="45" font-size="20" fill="#FFD700">★</text>
    <text x="8" y="130" font-size="14" fill="#FF9933">★</text>
    <text x="580" y="130" font-size="14" fill="#FF9933">★</text>
    <text x="40" y="18" font-size="12" fill="#FFCC00">✦</text>
    <text x="550" y="18" font-size="12" fill="#FFCC00">✦</text>
    <text x="555" y="80" font-size="10" fill="#FF6688">✦</text>
    <text x="25" y="80" font-size="10" fill="#FF6688">✦</text>
  </g>

  <!-- メインテキスト背景（丸い帯） -->
  <rect x="30" y="50" width="540" height="100" rx="30" fill="url(#titleGrad)" filter="url(#logoShadow)" opacity="0.95"/>
  <!-- 内側ハイライト -->
  <rect x="34" y="54" width="532" height="44" rx="26" fill="#FFFFFF" opacity="0.15"/>

  <!-- ふりがな -->
  <text x="300" y="72" text-anchor="middle"
        font-family="'Hiragino Maru Gothic Pro', 'Yu Gothic', 'Arial Rounded MT Bold', Arial"
        font-size="16" fill="#FFFFFF" opacity="0.9" letter-spacing="2">
    でんしゃずかんワールド
  </text>

  <!-- メインタイトル（漢字・かな混じり） -->
  <text x="300" y="112" text-anchor="middle"
        font-family="'Hiragino Maru Gothic Pro', 'Yu Gothic', 'Arial Rounded MT Bold', Arial"
        font-size="36" fill="#FFFFFF" font-weight="bold" filter="url(#textShadow)"
        letter-spacing="1">
    電車図鑑ワールド
  </text>

  <!-- サブタイトル -->
  <text x="300" y="140" text-anchor="middle"
        font-family="'Arial Rounded MT Bold', Arial"
        font-size="13" fill="#FFE066" font-weight="bold" letter-spacing="3">
    DENSHA ZUKAN WORLD
  </text>

  <!-- 小さな電車アイコン（文字の左右に走っているイメージ） -->
  <!-- 左の電車（小） -->
  <g transform="translate(48,118)" filter="url(#logoShadow)">
    <rect x="0" y="-10" width="38" height="14" rx="5" fill="url(#trainGrad)"/>
    <polygon points="0,-10 7,-10 7,4 0,4 -5,-3" fill="#004D30"/>
    <rect x="8" y="-8" width="5" height="6" rx="2" fill="#AAFFCC"/>
    <rect x="15" y="-8" width="5" height="6" rx="2" fill="#AAFFCC"/>
    <rect x="22" y="-8" width="5" height="6" rx="2" fill="#AAFFCC"/>
    <!-- 金ライン -->
    <rect x="-5" y="-1" width="43" height="2.5" fill="#C5A028"/>
    <!-- 車輪 -->
    <circle cx="6" cy="6" r="5" fill="#1A1A1A" stroke="#666" stroke-width="1.5"/>
    <circle cx="24" cy="6" r="5" fill="#1A1A1A" stroke="#666" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2" fill="#666"/>
    <circle cx="24" cy="6" r="2" fill="#666"/>
    <!-- 煙 -->
    <ellipse cx="-8" cy="-15" rx="7" ry="5" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="-14" cy="-22" rx="5" ry="4" fill="#FFFFFF" opacity="0.35"/>
  </g>

  <!-- 右の電車（小・黄色ドクターイエロー） -->
  <g transform="translate(510,118) scale(-1,1)" filter="url(#logoShadow)">
    <rect x="0" y="-10" width="38" height="14" rx="5" fill="#F5E642"/>
    <polygon points="0,-10 7,-10 7,4 0,4 -5,-3" fill="#E0C800"/>
    <rect x="8" y="-8" width="5" height="6" rx="2" fill="#AADDFF"/>
    <rect x="15" y="-8" width="5" height="6" rx="2" fill="#AADDFF"/>
    <rect x="22" y="-8" width="5" height="6" rx="2" fill="#AADDFF"/>
    <!-- 黒ライン -->
    <rect x="-5" y="-1" width="43" height="2.5" fill="#1A1A1A"/>
    <!-- 車輪 -->
    <circle cx="6" cy="6" r="5" fill="#1A1A1A" stroke="#666" stroke-width="1.5"/>
    <circle cx="24" cy="6" r="5" fill="#1A1A1A" stroke="#666" stroke-width="1.5"/>
    <circle cx="6" cy="6" r="2" fill="#888"/>
    <circle cx="24" cy="6" r="2" fill="#888"/>
  </g>

  <!-- バッジ（右下） -->
  <circle cx="555" cy="170" r="24" fill="#FFDD44" stroke="#FF9933" stroke-width="3" filter="url(#logoShadow)"/>
  <text x="555" y="166" text-anchor="middle" font-family="'Arial Rounded MT Bold', Arial" font-size="9" fill="#CC6600" font-weight="bold">全国の</text>
  <text x="555" y="178" text-anchor="middle" font-family="'Arial Rounded MT Bold', Arial" font-size="9" fill="#CC6600" font-weight="bold">電車を集めよう！</text>

  <!-- バッジ（左下） -->
  <circle cx="45" cy="170" r="24" fill="#66DDFF" stroke="#2299CC" stroke-width="3" filter="url(#logoShadow)"/>
  <text x="45" y="167" text-anchor="middle" font-family="'Arial Rounded MT Bold', Arial" font-size="9" fill="#004466" font-weight="bold">3才から</text>
  <text x="45" y="179" text-anchor="middle" font-family="'Arial Rounded MT Bold', Arial" font-size="9" fill="#004466" font-weight="bold">たのしめる！</text>
</svg>
