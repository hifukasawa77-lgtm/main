<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <!-- ガシャポン筐体 - 子ども向け明るい配色 -->
  <defs>
    <radialGradient id="domeGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#D6EEFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A8D4F0" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#CC2222"/>
    </radialGradient>
    <radialGradient id="baseGrad" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFDD44"/>
      <stop offset="100%" stop-color="#E6A800"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#00000040"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 本体フレーム（赤） -->
  <rect x="60" y="280" width="280" height="250" rx="20" ry="20" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- 胴体装飾ライン -->
  <rect x="60" y="330" width="280" height="12" fill="#FF9933"/>
  <rect x="60" y="350" width="280" height="6" fill="#FFCC00"/>

  <!-- ベース（黄色） -->
  <rect x="40" y="490" width="320" height="90" rx="15" ry="15" fill="url(#baseGrad)" filter="url(#shadow)"/>
  <!-- ベース脚 -->
  <rect x="80" y="565" width="50" height="30" rx="8" fill="#E6A800"/>
  <rect x="270" y="565" width="50" height="30" rx="8" fill="#E6A800"/>

  <!-- ドームの台座（首）部分 -->
  <ellipse cx="200" cy="287" rx="120" ry="18" fill="#DD1111"/>
  <rect x="80" y="270" width="240" height="25" rx="12" fill="#EE2222"/>

  <!-- 透明ドーム -->
  <ellipse cx="200" cy="175" rx="140" ry="140" fill="url(#domeGrad)" stroke="#AADDFF" stroke-width="4" filter="url(#shadow)"/>
  <!-- ドーム光沢ハイライト -->
  <ellipse cx="155" cy="110" rx="50" ry="35" fill="#FFFFFF" opacity="0.45"/>
  <ellipse cx="168" cy="102" rx="20" ry="14" fill="#FFFFFF" opacity="0.6"/>

  <!-- ドーム内のカプセルシルエット -->
  <ellipse cx="200" cy="185" rx="70" ry="70" fill="#FFE566" opacity="0.3" stroke="#FFD700" stroke-width="2" stroke-dasharray="8,4"/>
  <ellipse cx="200" cy="185" rx="55" ry="55" fill="#FFFDE0" opacity="0.5"/>
  <!-- カプセル内電車シルエット -->
  <rect x="165" y="175" width="70" height="22" rx="8" fill="#4488CC" opacity="0.6"/>
  <rect x="165" y="175" width="18" height="22" rx="6" fill="#2255AA" opacity="0.7"/>
  <circle cx="175" cy="197" r="6" fill="#222" opacity="0.5"/>
  <circle cx="225" cy="197" r="6" fill="#222" opacity="0.5"/>

  <!-- コインスロット -->
  <rect x="155" y="360" width="90" height="30" rx="8" fill="#CC1111"/>
  <rect x="165" y="368" width="70" height="8" rx="4" fill="#880000"/>
  <!-- コインスロットラベル -->
  <rect x="145" y="395" width="110" height="22" rx="6" fill="#FFCC00"/>
  <text x="200" y="411" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="11" fill="#333" font-weight="bold">COIN</text>

  <!-- 取り出し口 -->
  <rect x="130" y="430" width="140" height="50" rx="12" fill="#AA0000"/>
  <rect x="140" y="440" width="120" height="32" rx="8" fill="#880000"/>
  <!-- フラップ -->
  <rect x="143" y="452" width="114" height="16" rx="6" fill="#CC2222"/>
  <!-- 取り出し口ラベル -->
  <text x="200" y="500" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="10" fill="#FFDD44" font-weight="bold">GET!</text>

  <!-- 筐体サイドの星デコ -->
  <text x="85" y="420" font-size="22" fill="#FFEE44" opacity="0.9">★</text>
  <text x="295" y="420" font-size="22" fill="#FFEE44" opacity="0.9">★</text>
  <text x="90" y="460" font-size="14" fill="#FFCC44" opacity="0.7">★</text>
  <text x="292" y="460" font-size="14" fill="#FFCC44" opacity="0.7">★</text>

  <!-- ベースのロゴテキスト -->
  <text x="200" y="527" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="15" fill="#AA6600" font-weight="bold">でんしゃガチャ</text>
  <text x="200" y="547" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial" font-size="11" fill="#CC8800">TRAIN GACHA</text>
</svg>
