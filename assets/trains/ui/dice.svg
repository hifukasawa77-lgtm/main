<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- サイコロ 120×120 透過PNG相当 -->
  <defs>
    <linearGradient id="diceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F0F0F8"/>
      <stop offset="100%" stop-color="#D8D8E8"/>
    </linearGradient>
    <filter id="diceshadow">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#00000050"/>
    </filter>
  </defs>

  <!-- サイコロ本体（丸角の正方形） -->
  <rect x="8" y="8" width="104" height="104" rx="22" ry="22"
        fill="url(#diceGrad)" stroke="#CCCCDD" stroke-width="3" filter="url(#diceshadow)"/>

  <!-- 上面のハイライト -->
  <rect x="12" y="12" width="96" height="50" rx="18" fill="#FFFFFF" opacity="0.45"/>

  <!-- 3の目のドット配置 -->
  <!-- 左上 -->
  <circle cx="35" cy="38" r="10" fill="#2A2A3E"/>
  <circle cx="35" cy="38" r="4" fill="#4A4A6E" opacity="0.5"/>
  <!-- 中央 -->
  <circle cx="60" cy="60" r="10" fill="#2A2A3E"/>
  <circle cx="60" cy="60" r="4" fill="#4A4A6E" opacity="0.5"/>
  <!-- 右下 -->
  <circle cx="85" cy="82" r="10" fill="#2A2A3E"/>
  <circle cx="85" cy="82" r="4" fill="#4A4A6E" opacity="0.5"/>

  <!-- ドットのハイライト（立体感） -->
  <circle cx="32" cy="35" r="3" fill="#7777AA" opacity="0.6"/>
  <circle cx="57" cy="57" r="3" fill="#7777AA" opacity="0.6"/>
  <circle cx="82" cy="79" r="3" fill="#7777AA" opacity="0.6"/>

  <!-- 外枠の影ライン（立体感） -->
  <rect x="8" y="95" width="104" height="17" rx="22" fill="#CCCCDD" opacity="0.4"/>
</svg>
