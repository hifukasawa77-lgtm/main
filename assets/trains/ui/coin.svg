<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- コインアイコン 64×64 透過 -->
  <defs>
    <radialGradient id="coinGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="45%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F57F00"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFEE88"/>
      <stop offset="100%" stop-color="#E6A800"/>
    </radialGradient>
    <filter id="coinshadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- コイン本体 -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGrad)" filter="url(#coinshadow)"/>
  <!-- コインのリム -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#E6A800" stroke-width="3"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#FFF176" stroke-width="1.5" opacity="0.7"/>

  <!-- 内側の円 -->
  <circle cx="32" cy="32" r="22" fill="url(#innerGrad)"/>

  <!-- 中央: 電車マーク（新幹線シルエット） -->
  <!-- 車体 -->
  <rect x="14" y="28" width="36" height="11" rx="5" fill="#CC6600"/>
  <!-- 先頭（左・とがった形） -->
  <polygon points="14,28 21,28 21,39 14,39 10,33.5" fill="#AA4400"/>
  <!-- 先端 -->
  <polygon points="10,31 14,28 14,39 10,36" fill="#883300"/>
  <!-- 窓 -->
  <rect x="23" y="30" width="6" height="5" rx="2" fill="#FFE066" opacity="0.9"/>
  <rect x="31" y="30" width="5" height="5" rx="2" fill="#FFE066" opacity="0.9"/>
  <rect x="38" y="30" width="5" height="5" rx="2" fill="#FFE066" opacity="0.9"/>
  <!-- 車輪 -->
  <circle cx="20" cy="39" r="4" fill="#662200"/>
  <circle cx="42" cy="39" r="4" fill="#662200"/>
  <circle cx="20" cy="39" r="2" fill="#FFCC44"/>
  <circle cx="42" cy="39" r="2" fill="#FFCC44"/>
  <!-- レール -->
  <line x1="8" y1="43" x2="56" y2="43" stroke="#CC6600" stroke-width="2" stroke-linecap="round"/>

  <!-- 光沢 -->
  <ellipse cx="22" cy="18" rx="10" ry="6" fill="#FFFFFF" opacity="0.4"/>
</svg>
