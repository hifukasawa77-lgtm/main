<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- スタンプ（取得済み）80×80 -->
  <defs>
    <filter id="stampBlur">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- スタンプのにじみ効果 -->
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- スタンプ外枠（二重円） -->
  <circle cx="40" cy="40" r="37" fill="#E8001A" opacity="0.88" filter="url(#ink)"/>
  <circle cx="40" cy="40" r="37" fill="none" stroke="#CC0015" stroke-width="3.5" opacity="0.7"/>
  <circle cx="40" cy="40" r="31" fill="none" stroke="#CC0015" stroke-width="2" opacity="0.6"/>

  <!-- 新幹線シルエット（白抜き） -->
  <!-- 車体 -->
  <rect x="15" y="35" width="50" height="14" rx="6" fill="#FFFFFF" filter="url(#stampBlur)"/>
  <!-- 先頭（左・流線型） -->
  <polygon points="15,35 24,35 24,49 15,49 9,42" fill="#FFFFFF" filter="url(#stampBlur)"/>
  <!-- 鼻先 -->
  <polygon points="9,39 15,35 15,49 9,45" fill="#FFFFFF"/>
  <!-- 窓 -->
  <rect x="26" y="38" width="7" height="5" rx="2" fill="#E8001A" opacity="0.85"/>
  <rect x="35" y="38" width="6" height="5" rx="2" fill="#E8001A" opacity="0.85"/>
  <rect x="43" y="38" width="6" height="5" rx="2" fill="#E8001A" opacity="0.85"/>
  <rect x="51" y="38" width="6" height="5" rx="2" fill="#E8001A" opacity="0.85"/>
  <!-- 車輪 -->
  <circle cx="22" cy="49" r="5" fill="#FFFFFF"/>
  <circle cx="22" cy="49" r="2.5" fill="#E8001A" opacity="0.8"/>
  <circle cx="55" cy="49" r="5" fill="#FFFFFF"/>
  <circle cx="55" cy="49" r="2.5" fill="#E8001A" opacity="0.8"/>
  <!-- パンタグラフ -->
  <line x1="40" y1="35" x2="38" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
  <line x1="38" y1="28" x2="44" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>

  <!-- 上下の装飾テキスト -->
  <path id="topArc" d="M 12,40 A 28,28 0 0,1 68,40" fill="none"/>
  <text font-family="Arial Rounded MT Bold, Arial" font-size="8" fill="#FFFFFF" font-weight="bold" opacity="0.9">
    <textPath href="#topArc" startOffset="15%">★ コレクション ★</textPath>
  </text>
  <path id="botArc" d="M 12,40 A 28,28 0 0,0 68,40" fill="none"/>
  <text font-family="Arial Rounded MT Bold, Arial" font-size="7.5" fill="#FFFFFF" font-weight="bold" opacity="0.9">
    <textPath href="#botArc" startOffset="18%">COLLECTION GET!</textPath>
  </text>
</svg>
