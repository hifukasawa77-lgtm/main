<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 96">
  <rect width="112" height="96" fill="#0d1117"/>
  <!-- faint triangular grid lines -->
  <g fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.7">
    <polygon points="56,6 6,92 106,92"/>
    <polygon points="6,6 106,6 56,92"/>
    <polygon points="31,6 81,6 56,49"/>
    <polygon points="31,49 81,49 56,92"/>
    <polygon points="6,49 56,49 31,92"/>
    <polygon points="56,49 106,49 81,92"/>
  </g>
  <!-- Cyan P1 – top-left cluster (3 triangles) -->
  <polygon points="14,6 4,23 24,23"  fill="#06b6d4" opacity="0.95"/>
  <polygon points="30,6 20,23 40,23" fill="#06b6d4" opacity="0.95"/>
  <polygon points="4,23 24,23 14,40" fill="#06b6d4" opacity="0.75"/>
  <!-- Red P2 – top-right cluster (3 triangles) -->
  <polygon points="82,6 72,23 92,23"  fill="#f87171" opacity="0.95"/>
  <polygon points="98,6 88,23 108,23" fill="#f87171" opacity="0.95"/>
  <polygon points="88,23 108,23 98,40" fill="#f87171" opacity="0.75"/>
  <!-- Yellow P3 – bottom-left cluster (3 triangles) -->
  <polygon points="14,56 4,73 24,73"  fill="#fbbf24" opacity="0.95"/>
  <polygon points="30,56 20,73 40,73" fill="#fbbf24" opacity="0.95"/>
  <polygon points="20,73 40,73 30,90" fill="#fbbf24" opacity="0.75"/>
  <!-- Purple P4 – bottom-right cluster (3 triangles) -->
  <polygon points="82,56 72,73 92,73"  fill="#a78bfa" opacity="0.95"/>
  <polygon points="98,56 88,73 108,73" fill="#a78bfa" opacity="0.95"/>
  <polygon points="72,73 92,73 82,90" fill="#a78bfa" opacity="0.75"/>
  <!-- center neutral -->
  <polygon points="56,40 48,54 64,54" fill="rgba(255,255,255,0.07)"/>
  <polygon points="48,54 64,54 56,68" fill="rgba(255,255,255,0.04)"/>
</svg>
