<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280" role="img" aria-label="麻雀牌のサムネイル">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.55" stop-color="#061a24"/>
      <stop offset="1" stop-color="#06121e"/>
    </linearGradient>
    <radialGradient id="glow" cx="24%" cy="18%" r="70%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="84%" cy="22%" r="70%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3b2d"/>
      <stop offset="1" stop-color="#0b513a"/>
    </linearGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 9 H18 M9 0 V18" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
      <circle cx="9" cy="9" r="1.6" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="600" height="280" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="280" fill="url(#glow)"/>
  <rect x="0" y="0" width="600" height="280" fill="url(#glow2)"/>

  <!-- felt area -->
  <g filter="url(#shadow)">
    <rect x="30" y="30" width="540" height="220" rx="22" fill="url(#felt)" stroke="rgba(148,163,184,0.18)"/>
    <rect x="30" y="30" width="540" height="220" rx="22" fill="url(#grid)" opacity="0.9"/>
  </g>

  <!-- tiles -->
  <g filter="url(#shadow)">
    <!-- tile helper: white rounded rect with inset -->
    <g transform="translate(140 72)">
      <rect x="0" y="0" width="110" height="150" rx="18" fill="url(#tile)" stroke="rgba(15,23,42,0.35)" stroke-width="2"/>
      <rect x="14" y="14" width="82" height="122" rx="12" fill="rgba(248,250,252,0.92)" stroke="rgba(15,23,42,0.10)"/>
      <text x="55" y="98" text-anchor="middle" font-size="74" font-weight="900" fill="#ef4444" font-family="system-ui, -apple-system, Segoe UI, sans-serif">中</text>
      <text x="22" y="36" font-size="14" font-weight="800" fill="rgba(15,23,42,0.50)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">中</text>
    </g>

    <g transform="translate(255 58)">
      <rect x="0" y="0" width="110" height="150" rx="18" fill="url(#tile)" stroke="rgba(15,23,42,0.35)" stroke-width="2"/>
      <rect x="14" y="14" width="82" height="122" rx="12" fill="rgba(248,250,252,0.92)" stroke="rgba(15,23,42,0.10)"/>
      <!-- 5筒 -->
      <g transform="translate(55 82)">
        <circle cx="-22" cy="-18" r="10" fill="#ef4444" stroke="rgba(15,23,42,0.22)" stroke-width="2"/>
        <circle cx="22" cy="-18" r="10" fill="#22c55e" stroke="rgba(15,23,42,0.22)" stroke-width="2"/>
        <circle cx="0" cy="0" r="10" fill="#2563eb" stroke="rgba(15,23,42,0.22)" stroke-width="2"/>
        <circle cx="-22" cy="18" r="10" fill="#22c55e" stroke="rgba(15,23,42,0.22)" stroke-width="2"/>
        <circle cx="22" cy="18" r="10" fill="#ef4444" stroke="rgba(15,23,42,0.22)" stroke-width="2"/>
      </g>
      <text x="22" y="36" font-size="14" font-weight="800" fill="rgba(15,23,42,0.50)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">5筒</text>
    </g>

    <g transform="translate(370 78)">
      <rect x="0" y="0" width="110" height="150" rx="18" fill="url(#tile)" stroke="rgba(15,23,42,0.35)" stroke-width="2"/>
      <rect x="14" y="14" width="82" height="122" rx="12" fill="rgba(248,250,252,0.92)" stroke="rgba(15,23,42,0.10)"/>
      <!-- 6索 -->
      <g transform="translate(55 106)">
        <g fill="#22c55e" stroke="rgba(15,23,42,0.22)" stroke-width="1.6">
          <rect x="-36" y="-34" width="8" height="28" rx="4"/><circle cx="-32" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
          <rect x="-22" y="-34" width="8" height="28" rx="4"/><circle cx="-18" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
          <rect x="-8" y="-34" width="8" height="28" rx="4"/><circle cx="-4" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
          <rect x="6" y="-34" width="8" height="28" rx="4"/><circle cx="10" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
          <rect x="20" y="-34" width="8" height="28" rx="4"/><circle cx="24" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
          <rect x="34" y="-34" width="8" height="28" rx="4"/><circle cx="38" cy="-34" r="6" fill="#34d399" stroke="rgba(15,23,42,0.16)"/>
        </g>
      </g>
      <text x="22" y="36" font-size="14" font-weight="800" fill="rgba(15,23,42,0.50)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">6索</text>
    </g>
  </g>

  <!-- title -->
  <g>
    <text x="54" y="82" font-size="28" font-weight="900" fill="rgba(226,232,240,0.94)" font-family="system-ui, -apple-system, Segoe UI, sans-serif" letter-spacing="2">AI 麻雀</text>
    <text x="54" y="110" font-size="13" fill="rgba(148,163,184,0.92)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Play in your browser • Simplified rules • AI discard</text>
  </g>
</svg>

