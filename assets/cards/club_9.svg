    <text x="4" y="14" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#111111" dominant-baseline="text-before-edge" text-anchor="start">9</text>
    <text x="4" y="27" font-family="Arial, sans-serif" font-size="11" fill="#111111" dominant-baseline="text-before-edge" text-anchor="start">♣</text>
