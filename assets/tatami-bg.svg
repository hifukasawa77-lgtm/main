<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- 畳の藺草（いぐさ）横織り目 -->
    <pattern id="straw" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#c0b05e"/>
      <rect y="0"   width="4" height="1.2" fill="#a89844" opacity="0.6"/>
      <rect y="2.2" width="4" height="1.0" fill="#d4c870" opacity="0.45"/>
      <rect y="3.4" width="4" height="0.6" fill="#a89844" opacity="0.4"/>
    </pattern>
    <!-- 畳の縦すじ（軽い陰影） -->
    <pattern id="stripes" x="0" y="0" width="20" height="4" patternUnits="userSpaceOnUse">
      <rect width="20" height="4" fill="transparent"/>
      <rect x="0"  y="0" width="1"  height="4" fill="rgba(0,0,0,0.06)"/>
      <rect x="10" y="0" width="1"  height="4" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- 床（フローリング） -->
  <rect width="400" height="400" fill="#4a3418"/>

  <!-- 畳 mat 1: 左上 -->
  <rect x="9"   y="9"   width="181" height="181" fill="url(#straw)"/>
  <rect x="9"   y="9"   width="181" height="181" fill="url(#stripes)"/>
  <rect x="9"   y="9"   width="181" height="181" fill="none" stroke="#2a1808" stroke-width="8"/>
  <rect x="15"  y="15"  width="169" height="169" fill="none" stroke="#5a3e1a" stroke-width="1.5"/>

  <!-- 畳 mat 2: 右上 -->
  <rect x="210" y="9"   width="181" height="181" fill="url(#straw)"/>
  <rect x="210" y="9"   width="181" height="181" fill="url(#stripes)"/>
  <rect x="210" y="9"   width="181" height="181" fill="none" stroke="#2a1808" stroke-width="8"/>
  <rect x="216" y="15"  width="169" height="169" fill="none" stroke="#5a3e1a" stroke-width="1.5"/>

  <!-- 畳 mat 3: 左下 -->
  <rect x="9"   y="210" width="181" height="181" fill="url(#straw)"/>
  <rect x="9"   y="210" width="181" height="181" fill="url(#stripes)"/>
  <rect x="9"   y="210" width="181" height="181" fill="none" stroke="#2a1808" stroke-width="8"/>
  <rect x="15"  y="216" width="169" height="169" fill="none" stroke="#5a3e1a" stroke-width="1.5"/>

  <!-- 畳 mat 4: 右下 -->
  <rect x="210" y="210" width="181" height="181" fill="url(#straw)"/>
  <rect x="210" y="210" width="181" height="181" fill="url(#stripes)"/>
  <rect x="210" y="210" width="181" height="181" fill="none" stroke="#2a1808" stroke-width="8"/>
  <rect x="216" y="216" width="169" height="169" fill="none" stroke="#5a3e1a" stroke-width="1.5"/>
</svg>
