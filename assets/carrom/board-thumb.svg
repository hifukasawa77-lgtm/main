<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 外枠（濃い茶色） -->
  <rect x="0" y="0" width="120" height="120" rx="8" fill="#7a4500"/>
  <!-- ボード面（木製ボード色） -->
  <rect x="6" y="6" width="108" height="108" rx="6" fill="#c8a45a"/>
  <!-- 内枠線 -->
  <rect x="12" y="12" width="96" height="96" rx="2" fill="none" stroke="#8b6914" stroke-width="2"/>
  <!-- ポケット左上 -->
  <circle cx="12" cy="12" r="9" fill="#111"/>
  <!-- ポケット右上 -->
  <circle cx="108" cy="12" r="9" fill="#111"/>
  <!-- ポケット左下 -->
  <circle cx="12" cy="108" r="9" fill="#111"/>
  <!-- ポケット右下 -->
  <circle cx="108" cy="108" r="9" fill="#111"/>
  <!-- センターサークル外 -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#8b6914" stroke-width="2"/>
  <!-- センターサークル内（赤クイーン） -->
  <circle cx="60" cy="60" r="4" fill="#e53e3e"/>
  <!-- キャロムメン（白）左上 -->
  <circle cx="48" cy="52" r="7" fill="#f0ead6" stroke="#8b6914" stroke-width="1.5"/>
  <!-- キャロムメン（白）右上 -->
  <circle cx="72" cy="52" r="7" fill="#f0ead6" stroke="#8b6914" stroke-width="1.5"/>
  <!-- キャロムメン（黒）左下 -->
  <circle cx="48" cy="68" r="7" fill="#1a1a2e" stroke="#444" stroke-width="1.5"/>
  <!-- キャロムメン（黒）右下 -->
  <circle cx="72" cy="68" r="7" fill="#1a1a2e" stroke="#444" stroke-width="1.5"/>
</svg>
