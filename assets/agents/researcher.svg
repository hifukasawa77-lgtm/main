<path d="M52,155 Q46,165 48,175 Q50,183 46,190" stroke="#8b4e28" stroke-width="3" fill="none" stroke-linecap="round"/>
<path d="M148,155 Q154,165 152,175 Q150,183 154,190" stroke="#8b4e28" stroke-width="3" fill="none" stroke-linecap="round"/>

