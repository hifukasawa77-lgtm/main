<!-- Book stack -->
<rect x="36" y="238" width="30" height="8" rx="2" fill="#2563eb"/>
<rect x="36" y="247" width="30" height="8" rx="2" fill="#f59e0b"/>
<rect x="36" y="256" width="30" height="8" rx="2" fill="#7c3aed"/>
<rect x="36" y="265" width="30" height="8" rx="2" fill="#059669"/>
