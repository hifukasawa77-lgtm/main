<ellipse cx="142" cy="150" rx="8" ry="11" fill="#FDDCB5"/>
<ellipse cx="58" cy="150" rx="4" ry="7" fill="#e8a87c" opacity="0.55"/>
<ellipse cx="142" cy="150" rx="4" ry="7" fill="#e8a87c" opacity="0.55"/>
<!-- Small earring -->
<circle cx="54" cy="157" r="3.5" fill="#f59e0b"/>

<!-- Face -->
<ellipse cx="100" cy="150" rx="42" ry="50" fill="#FDDCB5"/>

<!-- Wavy bangs (asymmetric, natural) -->
<path d="M62,118 Q65,95 100,86 Q130,93 138,115" stroke="#6b3a1e" stroke-width="12" fill="none" stroke-linecap="round"/>
<path d="M60,152 Q58,130 62,118 L70,124 Q63,140 62,152 Z" fill="#6b3a1e"/>
<path d="M140,152 Q142,128 138,115 L130,122 Q138,140 138,152 Z" fill="#6b3a1e"/>
<!-- A few stray wisps -->
<path d="M68,92 Q65,82 70,78" stroke="#6b3a1e" stroke-width="4" fill="none" stroke-linecap="round"/>
<path d="M100,86 Q105,74 112,72" stroke="#6b3a1e" stroke-width="4" fill="none" stroke-linecap="round"/>

<!-- Eyes: amber, warm and curious -->
<ellipse cx="80" cy="144" rx="11.5" ry="9.5" fill="#faf4e8"/>
<ellipse cx="80" cy="145" rx="7" ry="7" fill="#c77a00"/>
<ellipse cx="80" cy="145" rx="3.8" ry="3.8" fill="#0d0d0d"/>
<ellipse cx="83" cy="141.5" rx="2.5" ry="2" fill="white" opacity="0.9"/>
<ellipse cx="120" cy="144" rx="11.5" ry="9.5" fill="#faf4e8"/>
<ellipse cx="120" cy="145" rx="7" ry="7" fill="#c77a00"/>
<ellipse cx="120" cy="145" rx="3.8" ry="3.8" fill="#0d0d0d"/>
<ellipse cx="123" cy="141.5" rx="2.5" ry="2" fill="white" opacity="0.9"/>

