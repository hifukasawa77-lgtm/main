<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#120b12"/>
      <stop offset="1" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c1b12"/>
      <stop offset="0.5" stop-color="#3a2418"/>
      <stop offset="1" stop-color="#23150f"/>
    </linearGradient>
    <radialGradient id="lantern" cx="72%" cy="26%" r="28%">
      <stop offset="0" stop-color="#ffd8a6" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#ff9b4a" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff9b4a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Tatami floor -->
  <rect x="0" y="650" width="1920" height="430" fill="#0a0a0f"/>
  <path d="M0 680 H1920" stroke="#1b1a22" stroke-width="6" opacity="0.65"/>
  <path d="M0 760 H1920" stroke="#141320" stroke-width="3" opacity="0.7"/>
  <path d="M0 840 H1920" stroke="#141320" stroke-width="3" opacity="0.6"/>
  <path d="M0 920 H1920" stroke="#141320" stroke-width="3" opacity="0.55"/>

  <!-- Wooden walls -->
  <g opacity="0.95">
    <rect x="0" y="0" width="1920" height="720" fill="url(#wood)"/>
    <g opacity="0.35">
      <!-- Planks -->
      <rect x="0" y="50" width="1920" height="36" fill="#000" opacity="0.35"/>
      <rect x="0" y="120" width="1920" height="30" fill="#000" opacity="0.25"/>
      <rect x="0" y="190" width="1920" height="34" fill="#000" opacity="0.3"/>
      <rect x="0" y="265" width="1920" height="28" fill="#000" opacity="0.22"/>
      <rect x="0" y="335" width="1920" height="34" fill="#000" opacity="0.28"/>
      <rect x="0" y="410" width="1920" height="30" fill="#000" opacity="0.22"/>
      <rect x="0" y="480" width="1920" height="36" fill="#000" opacity="0.3"/>
      <rect x="0" y="560" width="1920" height="28" fill="#000" opacity="0.18"/>
    </g>
  </g>

  <!-- Shoji window -->
  <g transform="translate(1240,120)" opacity="0.95">
    <rect x="0" y="0" width="540" height="640" rx="10" fill="#0a0a12" opacity="0.85"/>
    <rect x="18" y="18" width="504" height="604" rx="8" fill="#0e0a10" stroke="#3a2a1a" stroke-width="6" opacity="0.95"/>
    <rect x="30" y="30" width="480" height="580" fill="#ffe9c9" opacity="0.08"/>
    <g stroke="#3a2a1a" stroke-width="4" opacity="0.5">
      <path d="M120 30 V610"/>
      <path d="M240 30 V610"/>
      <path d="M360 30 V610"/>
      <path d="M30 145 H510"/>
      <path d="M30 290 H510"/>
      <path d="M30 435 H510"/>
      <path d="M30 540 H510"/>
    </g>
  </g>

  <!-- Lantern glow -->
  <rect width="1920" height="1080" fill="url(#lantern)"/>

  <!-- Vignette -->
  <radialGradient id="v" cx="50%" cy="45%" r="75%">
    <stop offset="0" stop-color="#000" stop-opacity="0"/>
    <stop offset="0.7" stop-color="#000" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.75"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#v)"/>
</svg>

