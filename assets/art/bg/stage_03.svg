<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1026"/>
      <stop offset="0.6" stop-color="#070a14"/>
      <stop offset="1" stop-color="#04050a"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a7e3ff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#a7e3ff" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#a7e3ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a7e3ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Far ridge -->
  <path d="M0 560 C220 510 360 540 520 500 C730 450 860 520 1040 470 C1240 420 1440 520 1620 490 C1760 468 1860 475 1920 460 V1080 H0 Z" fill="#0b0f1a" opacity="0.85"/>

  <!-- Mid mountains -->
  <g fill="#0a0c14" opacity="0.95">
    <path d="M0 760 L250 560 L420 690 L610 520 L780 650 L980 480 L1200 700 L1430 520 L1650 680 L1920 540 V1080 H0 Z"/>
  </g>

  <!-- Near silhouette -->
  <path d="M0 900 C220 840 350 900 540 850 C750 795 920 920 1130 860 C1330 810 1500 900 1700 850 C1820 823 1900 835 1920 820 V1080 H0 Z" fill="#05060c" opacity="0.98"/>

  <!-- Mist bands -->
  <rect x="0" y="610" width="1920" height="90" fill="url(#mist)" opacity="0.9"/>
  <rect x="0" y="690" width="1920" height="110" fill="url(#mist)" opacity="0.6"/>
  <rect x="0" y="780" width="1920" height="140" fill="url(#mist)" opacity="0.35"/>

  <!-- Vignette -->
  <radialGradient id="v" cx="50%" cy="45%" r="75%">
    <stop offset="0" stop-color="#000" stop-opacity="0"/>
    <stop offset="0.7" stop-color="#000" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.75"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#v)"/>
</svg>

