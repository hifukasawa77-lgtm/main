<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#071425"/>
      <stop offset="0.55" stop-color="#06101b"/>
      <stop offset="1" stop-color="#03060c"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3d52" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#06222f" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#04121a" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="moon" cx="18%" cy="20%" r="18%">
      <stop offset="0" stop-color="#c8f1ff" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#76e4ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#76e4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#moon)"/>

  <!-- Far trees -->
  <g opacity="0.45" fill="#061018">
    <path d="M0 520 C150 470 280 490 430 455 C620 410 760 440 930 410 C1120 372 1300 430 1500 402 C1680 376 1820 410 1920 390 V1080 H0 Z"/>
  </g>

  <!-- River -->
  <rect x="0" y="520" width="1920" height="560" fill="url(#water)"/>
  <g opacity="0.18" stroke="#72e7ff" stroke-width="4">
    <path d="M-50 700 C300 640 520 780 860 720 C1200 660 1420 820 1970 730" fill="none"/>
    <path d="M-80 820 C280 760 560 900 900 850 C1240 800 1500 950 1990 870" fill="none"/>
    <path d="M-60 940 C320 880 600 1020 960 980 C1320 940 1560 1070 1980 1005" fill="none"/>
  </g>

  <!-- Rocks -->
  <g fill="#141a22" opacity="0.95">
    <path d="M210 865 C280 820 390 835 460 900 C510 955 470 1025 380 1040 C285 1056 200 990 210 865 Z"/>
    <path d="M1460 780 C1540 725 1670 740 1750 815 C1820 880 1775 980 1660 995 C1540 1012 1450 930 1460 780 Z"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="v" cx="50%" cy="45%" r="75%">
    <stop offset="0" stop-color="#000" stop-opacity="0"/>
    <stop offset="0.72" stop-color="#000" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.75"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#v)"/>
</svg>

