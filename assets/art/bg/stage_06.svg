  <path d="M0 720 L180 600 L340 690 L520 540 L700 690 L860 520 L1040 700 L1220 560 L1420 700 L1620 590 L1820 700 L1920 650 V1080 H0 Z" fill="#06101a" opacity="0.95"/>
