<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070a18"/>
      <stop offset="0.6" stop-color="#050611"/>
      <stop offset="1" stop-color="#02030a"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="40%" r="40%">
      <stop offset="0" stop-color="#8cf4ff" stop-opacity="0.35"/>
      <stop offset="0.35" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Forest silhouette -->
  <path d="M0 620 C180 580 280 600 420 575 C600 545 740 585 900 555 C1100 520 1280 590 1500 560 C1680 535 1840 548 1920 535 V1080 H0 Z" fill="#04050b" opacity="0.95"/>

  <!-- Torii (center) -->
  <g transform="translate(740,150)" opacity="0.38">
    <rect x="90" y="120" width="20" height="610" fill="#c43b3b"/>
    <rect x="400" y="120" width="20" height="610" fill="#c43b3b"/>
    <rect x="40" y="145" width="430" height="34" rx="10" fill="#c43b3b"/>
    <rect x="60" y="205" width="390" height="26" rx="8" fill="#c43b3b"/>
    <rect x="85" y="740" width="60" height="18" rx="6" fill="#7f1d1d"/>
    <rect x="375" y="740" width="60" height="18" rx="6" fill="#7f1d1d"/>
  </g>

  <!-- Foxfire glows -->
  <g opacity="0.9">
    <circle cx="420" cy="560" r="14" fill="#8cf4ff" opacity="0.65"/>
    <circle cx="420" cy="560" r="46" fill="#8cf4ff" opacity="0.10"/>
    <circle cx="1520" cy="640" r="16" fill="#a78bfa" opacity="0.55"/>
    <circle cx="1520" cy="640" r="52" fill="#a78bfa" opacity="0.10"/>
    <circle cx="1650" cy="520" r="10" fill="#8cf4ff" opacity="0.55"/>
    <circle cx="1650" cy="520" r="34" fill="#8cf4ff" opacity="0.10"/>
  </g>

  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Vignette -->
  <radialGradient id="v" cx="50%" cy="45%" r="75%">
    <stop offset="0" stop-color="#000" stop-opacity="0"/>
    <stop offset="0.7" stop-color="#000" stop-opacity="0.35"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.78"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#v)"/>
</svg>

