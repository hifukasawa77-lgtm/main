<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280" role="img" aria-label="チェス盤とチェスの駒のサムネイル">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0f1b33"/>
      <stop offset="1" stop-color="#0a1227"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="25%" r="70%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="30%" r="70%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boardFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1e6cf"/>
      <stop offset="1" stop-color="#b08a66"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="pieceW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="pieceB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="600" height="280" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="280" fill="url(#glow)"/>
  <rect x="0" y="0" width="600" height="280" fill="url(#glow2)"/>

  <!-- board -->
  <g filter="url(#shadow)">
    <rect x="22" y="20" width="240" height="240" rx="18" fill="url(#boardFrame)" opacity="0.95"/>
    <rect x="34" y="32" width="216" height="216" rx="14" fill="#0b1220" opacity="0.25"/>
    <g transform="translate(34 32)">
      <!-- 8x8 squares, 27px each -->
      <!-- light: #f3e6cf, dark: #b28b67 -->
      <!-- rows -->
      <g>
        <!-- r0 -->
        <rect x="0" y="0" width="27" height="27" fill="#f3e6cf"/><rect x="27" y="0" width="27" height="27" fill="#b28b67"/>
        <rect x="54" y="0" width="27" height="27" fill="#f3e6cf"/><rect x="81" y="0" width="27" height="27" fill="#b28b67"/>
        <rect x="108" y="0" width="27" height="27" fill="#f3e6cf"/><rect x="135" y="0" width="27" height="27" fill="#b28b67"/>
        <rect x="162" y="0" width="27" height="27" fill="#f3e6cf"/><rect x="189" y="0" width="27" height="27" fill="#b28b67"/>
        <!-- r1 -->
        <rect x="0" y="27" width="27" height="27" fill="#b28b67"/><rect x="27" y="27" width="27" height="27" fill="#f3e6cf"/>
        <rect x="54" y="27" width="27" height="27" fill="#b28b67"/><rect x="81" y="27" width="27" height="27" fill="#f3e6cf"/>
        <rect x="108" y="27" width="27" height="27" fill="#b28b67"/><rect x="135" y="27" width="27" height="27" fill="#f3e6cf"/>
        <rect x="162" y="27" width="27" height="27" fill="#b28b67"/><rect x="189" y="27" width="27" height="27" fill="#f3e6cf"/>
        <!-- r2 -->
        <rect x="0" y="54" width="27" height="27" fill="#f3e6cf"/><rect x="27" y="54" width="27" height="27" fill="#b28b67"/>
        <rect x="54" y="54" width="27" height="27" fill="#f3e6cf"/><rect x="81" y="54" width="27" height="27" fill="#b28b67"/>
        <rect x="108" y="54" width="27" height="27" fill="#f3e6cf"/><rect x="135" y="54" width="27" height="27" fill="#b28b67"/>
        <rect x="162" y="54" width="27" height="27" fill="#f3e6cf"/><rect x="189" y="54" width="27" height="27" fill="#b28b67"/>
        <!-- r3 -->
        <rect x="0" y="81" width="27" height="27" fill="#b28b67"/><rect x="27" y="81" width="27" height="27" fill="#f3e6cf"/>
        <rect x="54" y="81" width="27" height="27" fill="#b28b67"/><rect x="81" y="81" width="27" height="27" fill="#f3e6cf"/>
        <rect x="108" y="81" width="27" height="27" fill="#b28b67"/><rect x="135" y="81" width="27" height="27" fill="#f3e6cf"/>
        <rect x="162" y="81" width="27" height="27" fill="#b28b67"/><rect x="189" y="81" width="27" height="27" fill="#f3e6cf"/>
        <!-- r4 -->
        <rect x="0" y="108" width="27" height="27" fill="#f3e6cf"/><rect x="27" y="108" width="27" height="27" fill="#b28b67"/>
        <rect x="54" y="108" width="27" height="27" fill="#f3e6cf"/><rect x="81" y="108" width="27" height="27" fill="#b28b67"/>
        <rect x="108" y="108" width="27" height="27" fill="#f3e6cf"/><rect x="135" y="108" width="27" height="27" fill="#b28b67"/>
        <rect x="162" y="108" width="27" height="27" fill="#f3e6cf"/><rect x="189" y="108" width="27" height="27" fill="#b28b67"/>
        <!-- r5 -->
        <rect x="0" y="135" width="27" height="27" fill="#b28b67"/><rect x="27" y="135" width="27" height="27" fill="#f3e6cf"/>
        <rect x="54" y="135" width="27" height="27" fill="#b28b67"/><rect x="81" y="135" width="27" height="27" fill="#f3e6cf"/>
        <rect x="108" y="135" width="27" height="27" fill="#b28b67"/><rect x="135" y="135" width="27" height="27" fill="#f3e6cf"/>
        <rect x="162" y="135" width="27" height="27" fill="#b28b67"/><rect x="189" y="135" width="27" height="27" fill="#f3e6cf"/>
        <!-- r6 -->
        <rect x="0" y="162" width="27" height="27" fill="#f3e6cf"/><rect x="27" y="162" width="27" height="27" fill="#b28b67"/>
        <rect x="54" y="162" width="27" height="27" fill="#f3e6cf"/><rect x="81" y="162" width="27" height="27" fill="#b28b67"/>
        <rect x="108" y="162" width="27" height="27" fill="#f3e6cf"/><rect x="135" y="162" width="27" height="27" fill="#b28b67"/>
        <rect x="162" y="162" width="27" height="27" fill="#f3e6cf"/><rect x="189" y="162" width="27" height="27" fill="#b28b67"/>
        <!-- r7 -->
        <rect x="0" y="189" width="27" height="27" fill="#b28b67"/><rect x="27" y="189" width="27" height="27" fill="#f3e6cf"/>
        <rect x="54" y="189" width="27" height="27" fill="#b28b67"/><rect x="81" y="189" width="27" height="27" fill="#f3e6cf"/>
        <rect x="108" y="189" width="27" height="27" fill="#b28b67"/><rect x="135" y="189" width="27" height="27" fill="#f3e6cf"/>
        <rect x="162" y="189" width="27" height="27" fill="#b28b67"/><rect x="189" y="189" width="27" height="27" fill="#f3e6cf"/>
      </g>
      <!-- subtle inner border -->
      <rect x="0" y="0" width="216" height="216" fill="none" stroke="rgba(15,23,42,0.28)" stroke-width="2"/>
    </g>
  </g>

  <!-- pieces -->
  <g transform="translate(64 64)" filter="url(#shadow)">
    <!-- white pawn -->
    <g transform="translate(80 108)">
      <circle cx="0" cy="-26" r="18" fill="url(#pieceW)"/>
      <path d="M-22,-6 C-18,-20 -8,-28 0,-28 C8,-28 18,-20 22,-6 C22,18 10,28 0,32 C-10,28 -22,18 -22,-6Z" fill="url(#pieceW)"/>
      <rect x="-30" y="30" width="60" height="14" rx="7" fill="url(#pieceW)"/>
      <rect x="-42" y="42" width="84" height="18" rx="9" fill="url(#pieceW)"/>
      <path d="M-34,44 H34" stroke="rgba(15,23,42,0.2)" stroke-width="2"/>
    </g>
    <!-- black knight (stylized) -->
    <g transform="translate(130 20)">
      <path d="M36,8
               C26,3 14,6 8,16
               C2,26 6,40 16,46
               C8,54 6,68 14,78
               C18,84 26,88 36,88
               L64,88
               C74,88 82,84 86,78
               C94,68 90,54 78,48
               C92,38 92,20 76,12
               C64,6 50,5 36,8Z"
            fill="url(#pieceB)"/>
      <circle cx="62" cy="28" r="4" fill="rgba(248,250,252,0.85)"/>
      <path d="M18,88 C18,104 34,116 50,116 C66,116 82,104 82,88Z" fill="url(#pieceB)"/>
      <rect x="12" y="116" width="88" height="18" rx="9" fill="url(#pieceB)"/>
      <rect x="0" y="132" width="112" height="22" rx="11" fill="url(#pieceB)"/>
      <path d="M10,136 H102" stroke="rgba(148,163,184,0.18)" stroke-width="2"/>
    </g>
  </g>

  <!-- right-side title bar -->
  <g>
    <rect x="288" y="42" width="292" height="196" rx="18" fill="rgba(2,6,23,0.45)" stroke="rgba(148,163,184,0.18)"/>
    <path d="M304 84 C336 60, 384 56, 424 80 C468 108, 522 108, 560 82"
          fill="none" stroke="rgba(56,189,248,0.45)" stroke-width="4" stroke-linecap="round"/>
    <path d="M304 182 C342 206, 396 214, 448 190 C498 166, 528 166, 560 188"
          fill="none" stroke="rgba(52,211,153,0.38)" stroke-width="4" stroke-linecap="round"/>
    <text x="306" y="132" font-size="26" font-weight="800" fill="rgba(226,232,240,0.94)" font-family="system-ui, -apple-system, Segoe UI, sans-serif" letter-spacing="2">CHESS AI</text>
    <text x="306" y="160" font-size="13" fill="rgba(148,163,184,0.92)" font-family="system-ui, -apple-system, Segoe UI, sans-serif">Play in your browser • Castling • En passant • Promotion</text>
  </g>
</svg>

