<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a2740"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="280" fill="url(#bg)"/>

  <!-- subtle grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="600" height="280" fill="url(#grid)"/>

  <!-- card 1 (back left, clubs) -->
  <g transform="rotate(-18, 200, 140)" filter="url(#shadow)">
    <rect x="118" y="40" width="110" height="165" rx="10" ry="10" fill="white"/>
    <rect x="118" y="40" width="110" height="165" rx="10" ry="10" fill="none" stroke="#ddd" stroke-width="1"/>
    <!-- clubs symbol -->
    <text x="173" y="140" text-anchor="middle" font-size="62" fill="#111">♣</text>
    <text x="130" y="65" text-anchor="middle" font-size="16" fill="#111">♣</text>
    <text x="216" y="196" text-anchor="middle" font-size="16" fill="#111" transform="rotate(180, 216, 196)">♣</text>
  </g>

  <!-- card 2 (back, spades) -->
  <g transform="rotate(-8, 210, 140)" filter="url(#shadow)">
    <rect x="158" y="38" width="110" height="165" rx="10" ry="10" fill="white"/>
    <rect x="158" y="38" width="110" height="165" rx="10" ry="10" fill="none" stroke="#ddd" stroke-width="1"/>
    <!-- spades symbol -->
    <text x="213" y="138" text-anchor="middle" font-size="62" fill="#111">♠</text>
    <text x="170" y="63" text-anchor="middle" font-size="16" fill="#111">♠</text>
    <text x="256" y="194" text-anchor="middle" font-size="16" fill="#111" transform="rotate(180, 256, 194)">♠</text>
  </g>

  <!-- card 3 (center, hearts - featured) -->
  <g filter="url(#shadow)">
    <rect x="215" y="28" width="120" height="180" rx="10" ry="10" fill="white"/>
    <rect x="215" y="28" width="120" height="180" rx="10" ry="10" fill="none" stroke="#eee" stroke-width="1"/>
    <!-- hearts symbol large -->
    <text x="275" y="140" text-anchor="middle" font-size="70" fill="#e63946">♥</text>
    <text x="228" y="54" text-anchor="middle" font-size="18" fill="#e63946" font-weight="bold">A</text>
    <text x="322" y="198" text-anchor="middle" font-size="18" fill="#e63946" font-weight="bold" transform="rotate(180, 322, 198)">A</text>
  </g>

  <!-- card 4 (right, diamonds) -->
  <g transform="rotate(8, 310, 140)" filter="url(#shadow2)">
    <rect x="330" y="38" width="110" height="165" rx="10" ry="10" fill="white"/>
    <rect x="330" y="38" width="110" height="165" rx="10" ry="10" fill="none" stroke="#ddd" stroke-width="1"/>
    <!-- diamonds symbol -->
    <text x="385" y="138" text-anchor="middle" font-size="62" fill="#e63946">♦</text>
    <text x="343" y="63" text-anchor="middle" font-size="16" fill="#e63946">♦</text>
    <text x="427" y="194" text-anchor="middle" font-size="16" fill="#e63946" transform="rotate(180, 427, 194)">♦</text>
  </g>

  <!-- card 5 (far right) -->
  <g transform="rotate(18, 310, 140)" filter="url(#shadow2)">
    <rect x="372" y="40" width="110" height="165" rx="10" ry="10" fill="white"/>
    <rect x="372" y="40" width="110" height="165" rx="10" ry="10" fill="none" stroke="#ddd" stroke-width="1"/>
    <text x="427" y="140" text-anchor="middle" font-size="62" fill="#e63946">♦</text>
    <text x="384" y="65" text-anchor="middle" font-size="16" fill="#e63946">K</text>
    <text x="469" y="196" text-anchor="middle" font-size="16" fill="#e63946" transform="rotate(180, 469, 196)">K</text>
  </g>

  <!-- bottom label -->
  <rect x="0" y="242" width="600" height="38" fill="rgba(0,0,0,0.45)"/>
  <text x="300" y="268" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.85)" letter-spacing="3">7 CARD GAMES</text>
</svg>
