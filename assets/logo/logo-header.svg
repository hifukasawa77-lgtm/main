<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 40"
  role="img"
  aria-labelledby="logo-title">

  <title id="logo-title">Hide の部屋 ロゴ</title>

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#9b59ff"/>
    </linearGradient>
  </defs>

  <!-- 正六角形フレーム（中心 20,20 外径r=18） -->
  <polygon
    points="20,2 35.56,11 35.56,29 20,38 4.44,29 4.44,11"
    fill="none"
    stroke="#00f5ff"
    stroke-width="1.5"
    filter="url(#glow)"/>

  <!-- 内部「H」モノグラム -->
  <text
    x="20" y="25"
    font-family="'Fira Code', monospace"
    font-size="14"
    font-weight="700"
    fill="#00f5ff"
    text-anchor="middle"
    filter="url(#glow)">H</text>

  <!-- 縦セパレーターライン -->
  <line
    x1="38" y1="8" x2="38" y2="32"
    stroke="#9b59ff"
    stroke-width="0.5"
    opacity="0.5"/>

  <!-- メインテキスト「Hide」 -->
  <text
    x="45" y="24"
    font-family="'Fira Code', monospace"
    font-size="18"
    font-weight="700"
    fill="url(#logo-grad)"
    dominant-baseline="auto">Hide</text>

  <!-- サブテキスト「ROOM」 -->
  <text
    x="46" y="35"
    font-family="'Orbitron', monospace"
    font-size="7"
    font-weight="400"
    fill="#9b59ff"
    letter-spacing="3">ROOM</text>

</svg>
