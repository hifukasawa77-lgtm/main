<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ブログ — hide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #f97316; --orange-soft: rgba(249,115,22,.1);
    --blue: #0ea5e9;   --blue-soft: rgba(14,165,233,.1);
    --green: #22c55e;  --green-soft: rgba(34,197,94,.1);
    --purple: #a855f7; --purple-soft: rgba(168,85,247,.1);
    --pink: #f472b6;   --pink-soft: rgba(244,114,182,.1);
    --bg: #fffbf5; --surface: #fff;
    --text: #1c1917; --muted: #78716c;
    --line: #e7e5e4;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ─ Header ─ */
  header {
    background: var(--surface); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 50;
    padding: 0 clamp(16px, 5vw, 48px); height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .logo { font-size: 1.15rem; font-weight: 900; color: var(--orange); text-decoration: none; letter-spacing: 0.05em; }
  .back-link { font-size: 0.82rem; color: var(--muted); text-decoration: none; border: 1px solid var(--line); border-radius: 20px; padding: 5px 14px; transition: background 0.15s; }
  .back-link:hover { background: var(--line); }

  /* ─ Hero ─ */
  .hero { padding: 56px clamp(16px, 5vw, 48px) 40px; text-align: center; }
  .hero-label { display: inline-block; background: var(--orange-soft); color: var(--orange); border-radius: 20px; padding: 4px 14px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; }
  .hero h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900; color: var(--text); margin-bottom: 10px; }
  .hero p { color: var(--muted); font-size: 0.95rem; max-width: 480px; margin: 0 auto; line-height: 1.7; }

  /* ─ Grid ─ */
  main { max-width: 1080px; margin: 0 auto; padding: 0 clamp(16px, 5vw, 40px) 60px; }
  .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .blog-grid { grid-template-columns: 1fr; } }

  /* ─ Card ─ */
  .blog-card {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
    cursor: pointer;
  }
  .blog-card:hover { transform: translateY(-4px); box-shadow: 0 10px 36px rgba(0,0,0,0.1); border-color: var(--orange); }
  .blog-card-cover { height: 5px; width: 100%; flex-shrink: 0; }
  .cover-orange { background: linear-gradient(90deg, #f97316, #fb923c, #f59e0b); }
  .cover-blue   { background: linear-gradient(90deg, #0ea5e9, #38bdf8, #0284c7); }
  .cover-green  { background: linear-gradient(90deg, #22c55e, #4ade80, #16a34a); }
  .cover-purple { background: linear-gradient(90deg, #a855f7, #7c3aed, #c026d3); }
  .cover-pink   { background: linear-gradient(90deg, #f472b6, #fb7185, #ec4899); }
  .blog-card-body { padding: 20px 22px 22px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .blog-card-date { font-size: 0.7rem; color: var(--muted); }
  .blog-card h3 { font-size: 0.98rem; font-weight: 700; line-height: 1.5; color: var(--text); flex: 1; }
  .blog-card-link { font-size: 0.78rem; color: var(--orange); font-weight: 600; margin-top: 4px; }

  /* ─ Empty ─ */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty p { font-size: 0.9rem; }

  /* ─ Footer ─ */
  footer { border-top: 1px solid var(--line); padding: 24px; text-align: center; font-size: 0.78rem; color: var(--muted); }

  /* ─ 絞り込み ─ */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--line); background: transparent; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .filter-btn.active, .filter-btn:hover { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* ─ 最新バッジ ─ */
  .badge-new { display: inline-block; background: var(--orange); color: #fff; font-size: 0.62rem; font-weight: 700; border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">hide.</a>
  <a class="back-link" href="index.html">← ポートフォリオへ</a>
</header>

<div class="hero">
  <div class="hero-label">Blog</div>
  <h1>✏️ My ブログ</h1>
  <p>日々の気づき・開発メモ・失敗談などを書いています。</p>
</div>

<main>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all" onclick="filterBlog('all',this)">すべて</button>
  </div>
  <div class="blog-grid" id="blogGrid"></div>
</main>

<footer>© 2025 hide — All rights reserved.</footer>

<script>
const COVER_CLASSES = ['cover-orange','cover-blue','cover-green','cover-purple','cover-pink'];

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function isNew(iso) {
  return (Date.now() - new Date(iso).getTime()) < 7 * 24 * 60 * 60 * 1000;
}

let allBlogs = [];

async function loadBlogs() {
  try {
    const resp = await fetch('./blogs.json?_=' + Date.now());
    if (resp.ok) {
      allBlogs = (await resp.json()).sort((a, b) => b.updated_at > a.updated_at ? 1 : -1);
      renderGrid(allBlogs);
      return;
    }
  } catch {}
  allBlogs = JSON.parse(localStorage.getItem('admin_blogs') || '[]')
    .sort((a, b) => b.updated_at > a.updated_at ? 1 : -1);
  renderGrid(allBlogs);
}

function renderGrid(blogs) {
  const grid = document.getElementById('blogGrid');
  if (!blogs.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="icon">📭</div>
      <p>まだ記事が作成されていません。<br>管理者画面からブログを作成してください。</p>
    </div>`;
    return;
  }
  grid.innerHTML = blogs.map((b, i) => {
    const cover = COVER_CLASSES[i % COVER_CLASSES.length];
    const newBadge = isNew(b.updated_at) ? '<span class="badge-new">NEW</span>' : '';
    return `<a class="blog-card" href="blog-post.html?id=${b.id}">
      <div class="blog-card-cover ${cover}"></div>
      <div class="blog-card-body">
        <div class="blog-card-date">${formatDate(b.updated_at)}</div>
        <h3>${escHtml(b.title)}${newBadge}</h3>
        <span class="blog-card-link">続きを読む →</span>
      </div>
    </a>`;
  }).join('');
}

function filterBlog(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tag === 'all') renderGrid(allBlogs);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadBlogs();
</script>
</body>
</html>
