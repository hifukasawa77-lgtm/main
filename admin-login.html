<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https: http://localhost:*; frame-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ログイン — hide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0f9ff 50%, #fdf4ff 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff; border-radius: 20px;
      padding: 48px 44px; width: 380px;
      box-shadow: 0 8px 40px rgba(99,102,241,0.13);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #0ea5e9);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 12px;
    }
    .logo h1 { font-size: 1.1rem; font-weight: 800; color: #1e293b; letter-spacing: 2px; }
    .logo p  { font-size: 0.78rem; color: #94a3b8; margin-top: 4px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 6px; letter-spacing: 1px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 0.92rem; color: #1e293b; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #6366f1, #0ea5e9);
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
      letter-spacing: 1px; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .msg { font-size: 0.8rem; color: #ef4444; text-align: center; margin-top: 12px; min-height: 1.2em; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔑</div>
    <h1>ADMIN LOGIN</h1>
    <p>hide portfolio 管理者画面</p>
  </div>
  <div class="field">
    <label>ユーザー名</label>
    <input type="text" id="username" placeholder="ユーザー名" autocomplete="username" />
  </div>
  <div class="field">
    <label>パスワード</label>
    <input type="password" id="password" placeholder="パスワード" autocomplete="current-password" />
  </div>
  <button class="btn" onclick="login()">ログイン</button>
  <div class="msg" id="msg"></div>
  <div style="text-align:center;margin-top:20px;">
    <a href="index.html" style="font-size:0.78rem;color:#94a3b8;text-decoration:none;">← ホームページに戻る</a>
  </div>
</div>
<script>
const API_BASE = 'http://localhost:3001';
const DEFAULT_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8'; // "password"
const DEFAULT_USERNAME = 'admin';

if (sessionStorage.getItem('admin_token') || sessionStorage.getItem('admin_session') === '1') {
  location.href = 'admin.html';
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = document.querySelector('.btn');
  if (!username || !password) { msg.textContent = 'IDとパスワードを入力してください'; return; }

  btn.disabled = true;
  msg.textContent = '';

  // バックエンドAPI を試みる
  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      signal: AbortSignal.timeout(3000)
    });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || 'ログインに失敗しました';
      btn.disabled = false;
      return;
    }
    sessionStorage.setItem('admin_token', data.token);
    sessionStorage.setItem('admin_username', data.username);
    location.href = 'admin.html';
    return;
  } catch (e) {
    // バックエンド未起動 → localStorageフォールバック
  }

  // フォールバック: localStorage認証（GitHub Pages等、バックエンドなし環境）
  const storedUsername = localStorage.getItem('admin_username') || DEFAULT_USERNAME;
  const storedHash    = localStorage.getItem('admin_password_hash') || DEFAULT_HASH;
  if (username !== storedUsername) {
    addLoginLogLocal(username, false);
    msg.textContent = 'IDまたはパスワードが正しくありません';
    btn.disabled = false;
    return;
  }
  const inputHash = await sha256(password);
  if (inputHash !== storedHash) {
    addLoginLogLocal(username, false);
    msg.textContent = 'IDまたはパスワードが正しくありません';
    btn.disabled = false;
    return;
  }
  addLoginLogLocal(username, true);
  sessionStorage.setItem('admin_session', '1');
  sessionStorage.setItem('admin_username', username);
  location.href = 'admin.html';
}

function addLoginLogLocal(username, success) {
  const logs = JSON.parse(localStorage.getItem('admin_login_history') || '[]');
  logs.unshift({ username, success, logged_at: new Date().toISOString() });
  localStorage.setItem('admin_login_history', JSON.stringify(logs.slice(0, 50)));
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
