<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADMIN LOGIN — hide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00e5ff;
      --magenta: #ff2d78;
      --purple:  #9b59ff;
      --bg:      #050510;
      --card:    rgba(255,255,255,0.04);
      --border:  rgba(0,229,255,0.25);
    }

    body {
      background: var(--bg);
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* パーティクル背景 */
    canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .login-box {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 40px rgba(0,229,255,0.1), 0 0 80px rgba(155,89,255,0.05);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,229,255,0.6);
    }
    .logo p {
      font-size: 0.75rem;
      color: rgba(0,229,255,0.5);
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: rgba(0,229,255,0.7);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0,229,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 12px rgba(0,229,255,0.25);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.4; cursor: default; }

    .error-msg {
      margin-top: 14px;
      color: var(--magenta);
      font-size: 0.82rem;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="login-box">
    <div class="logo">
      <h1>ADMIN</h1>
      <p>HIDE PORTFOLIO</p>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="username">USER ID</label>
        <input id="username" type="text" autocomplete="username" placeholder="admin" required />
      </div>
      <div class="field">
        <label for="password">PASSWORD</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="btn-login" type="submit" id="loginBtn">LOG IN</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <script>
    const API = 'http://localhost:3001';

    // すでにログイン済みなら管理画面へ
    if (localStorage.getItem('admin_token')) {
      fetch(`${API}/api/auth/me`, {
        headers: { Authorization: `Bearer ${localStorage.getItem('admin_token')}` }
      }).then(r => { if (r.ok) location.href = 'admin.html'; });
    }

    // ログインフォーム送信
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      btn.disabled = true;
      errorMsg.textContent = '';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'ログインに失敗しました';
          btn.disabled = false;
          return;
        }

        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_username', data.username);
        location.href = 'admin.html';
      } catch {
        errorMsg.textContent = 'サーバーに接続できません。バックエンドを起動してください。';
        btn.disabled = false;
      }
    });

    // パーティクル背景
    (function() {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      const particles = [];

      function resize() {
        canvas.width  = innerWidth;
        canvas.height = innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * innerWidth,
          y: Math.random() * innerHeight,
          r: Math.random() * 1.5 + 0.3,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          a: Math.random()
        });
      }

      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0,229,255,${p.a * 0.6})`;
          ctx.fill();
        }
        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
</html>
