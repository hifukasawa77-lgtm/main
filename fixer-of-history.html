<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="影の権力者（Fixer of History）。偉人を裏から動かし、恩義と悪名を管理して歴史の勝ち馬を操るブラウザ戦略ボードゲーム。">
  <title>影の権力者 | Fixer of History</title>
  <style>
    :root {
      --bg: #08070b;
      --surface: rgba(20, 18, 28, 0.78);
      --surface-strong: rgba(32, 28, 42, 0.92);
      --surface-soft: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.13);
      --text: #f7f0df;
      --muted: #b7ad9b;
      --cyan: #22d3ee;
      --purple: #a78bfa;
      --gold: #f4d58d;
      --red: #ef4444;
      --green: #22c55e;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.6;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 8%, rgba(34, 211, 238, 0.12), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(167, 139, 250, 0.12), transparent 26%),
        linear-gradient(180deg, #08070b 0%, #121016 48%, #08070b 100%);
    }

    button, select {
      font: inherit;
    }

    button {
      border: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.56;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 0 20px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 3px 0 0;
      font-size: clamp(1.6rem, 5vw, 3rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s, background 0.18s, border-color 0.18s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(244, 213, 141, 0.54);
      background: rgba(244, 213, 141, 0.14);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.92), rgba(167, 139, 250, 0.92));
      color: #06050a;
      border-color: transparent;
      font-weight: 900;
    }

    .game-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 18px;
      align-items: start;
    }

    .board-section,
    .panel,
    .log-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .board-section {
      overflow: hidden;
    }

    .turn-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: rgba(255, 255, 255, 0.08);
      border-bottom: 1px solid var(--line);
    }

    .turn-stat {
      min-height: 66px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.18);
    }

    .turn-stat b {
      display: block;
      color: var(--gold);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .turn-stat span {
      display: block;
      margin-top: 2px;
      font-weight: 800;
    }

    .board-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      min-height: 430px;
    }

    #game-board {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.025) 1px, transparent 1px),
        radial-gradient(circle at 50% 45%, rgba(244, 213, 141, 0.08), transparent 52%);
      background-size: 34px 34px, 34px 34px, auto;
    }

    .selection-readout {
      position: absolute;
      left: 14px;
      bottom: 14px;
      max-width: min(560px, calc(100% - 28px));
      padding: 10px 12px;
      border: 1px solid rgba(244, 213, 141, 0.25);
      border-radius: 8px;
      background: rgba(8, 7, 11, 0.76);
      color: var(--text);
      font-size: 0.86rem;
      backdrop-filter: blur(12px);
    }

    .side-panel {
      display: grid;
      gap: 12px;
    }

    .panel {
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 0.94rem;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .player-grid,
    .hero-list {
      display: grid;
      gap: 8px;
    }

    .fixer-row,
    .hero-row,
    .card-row {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.045);
    }

    .fixer-row.is-player {
      border-color: rgba(34, 211, 238, 0.42);
      background: rgba(34, 211, 238, 0.08);
    }

    .fixer-row.is-purged,
    .hero-row.is-dead {
      opacity: 0.55;
      filter: grayscale(0.35);
    }

    .row-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .row-title {
      font-weight: 800;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .row-meta {
      color: var(--muted);
      font-size: 0.78rem;
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      color: var(--text);
      font-size: 0.74rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.warn {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.38);
      background: rgba(239, 68, 68, 0.1);
    }

    .pill.good {
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.36);
      background: rgba(34, 197, 94, 0.1);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 8px;
    }

    .select-row {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8, 7, 11, 0.92);
      color: var(--text);
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mini-note {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .cards-grid {
      display: grid;
      gap: 8px;
    }

    .card-row {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
    }

    .card-copy {
      min-width: 0;
    }

    .card-title {
      font-weight: 900;
      color: var(--gold);
    }

    .log-panel {
      grid-column: 1 / -1;
      padding: 14px;
    }

    .log-list {
      display: grid;
      gap: 6px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-item {
      padding: 8px 10px;
      border-left: 3px solid rgba(244, 213, 141, 0.44);
      border-radius: 6px;
      background: rgba(255,255,255,0.045);
      color: var(--muted);
      font-size: 0.86rem;
    }

    .result-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.68);
    }

    .result-backdrop.is-open {
      display: grid;
    }

    .result-card {
      width: min(740px, 100%);
      max-height: min(760px, calc(100vh - 40px));
      overflow: auto;
      padding: 22px;
      border: 1px solid rgba(244, 213, 141, 0.28);
      border-radius: 12px;
      background: rgba(20, 18, 28, 0.96);
      box-shadow: var(--shadow);
    }

    .result-card h2 {
      margin: 0 0 8px;
      color: var(--gold);
    }

    .rank-list {
      display: grid;
      gap: 8px;
      margin: 16px 0;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
    }

    @media (max-width: 980px) {
      .game-shell {
        grid-template-columns: 1fr;
      }

      .side-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 20px, 1440px);
        padding-top: 10px;
      }

      .game-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .turn-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .board-wrap {
        min-height: 360px;
        aspect-ratio: 1 / 1;
      }

      .side-panel {
        grid-template-columns: 1fr;
      }

      .control-grid,
      .action-row,
      .card-row,
      .rank-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="page">
    <header class="game-header">
      <div class="brand">
        <div class="eyebrow" data-i18n="eyebrow">歴史の影に潜む戦略ボードゲーム</div>
        <h1 data-i18n="title">影の権力者</h1>
      </div>
      <div class="header-actions">
        <a class="btn" href="index.html#works" data-i18n="backHome">ゲーム一覧へ</a>
        <button class="btn" id="lang-btn" type="button">English</button>
        <button class="btn btn-primary" id="restart-btn" type="button" data-i18n="restart">最初から</button>
      </div>
    </header>

    <main class="game-shell">
      <section class="board-section" aria-label="Game board">
        <div class="turn-strip" id="turn-strip"></div>
        <div class="board-wrap">
          <canvas id="game-board"></canvas>
          <div class="selection-readout" id="selection-readout"></div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel">
          <h2 data-i18n="fixers">フィクサー</h2>
          <div class="player-grid" id="player-panel"></div>
        </section>

        <section class="panel">
          <h2 data-i18n="actions">策謀</h2>
          <div class="controls" id="action-panel"></div>
        </section>

        <section class="panel">
          <h2 data-i18n="letters">密書</h2>
          <div class="cards-grid" id="cards-panel"></div>
        </section>

        <section class="panel">
          <h2 data-i18n="heroes">偉人</h2>
          <div class="hero-list" id="heroes-panel"></div>
        </section>
      </aside>

      <section class="log-panel">
        <h2 data-i18n="logTitle">密談記録</h2>
        <div class="log-list" id="log-list"></div>
      </section>
    </main>
  </div>

  <div class="result-backdrop" id="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div class="result-card">
      <h2 id="result-title"></h2>
      <p id="result-copy"></p>
      <div class="rank-list" id="rank-list"></div>
      <button class="btn btn-primary" type="button" id="result-restart"></button>
    </div>
  </div>

  <script>
    const MAX_TURNS = 10;
    const ACTIONS_PER_TURN = 2;
    const INITIAL_MONEY = 10;
    const INITIAL_HAND_SIZE = 3;
    const PURGE_INFAMY = 12;

    const I18N = {
      ja: {
        eyebrow: '歴史の影に潜む戦略ボードゲーム',
        title: '影の権力者',
        backHome: 'ゲーム一覧へ',
        restart: '最初から',
        fixers: 'フィクサー',
        actions: '策謀',
        letters: '密書',
        heroes: '偉人',
        logTitle: '密談記録',
        turn: 'ターン',
        phase: 'フェイズ',
        actionsLeft: '残り策謀',
        leader: '暫定首位',
        planning: '策謀',
        upheaval: '激動',
        harvest: '収穫',
        cleanup: '帳尻合わせ',
        gameOver: '終局',
        money: '資金',
        infamy: '悪名',
        favor: '恩義',
        purged: '粛清',
        dead: '死亡',
        alive: '生存',
        selected: '選択',
        noSelection: '偉人または拠点を選ぶと、ここに状況が表示されます。',
        targetHero: '対象の偉人',
        targetLocation: '移動先',
        amount: '投資額',
        invest: '投資',
        accuseTarget: '告発対象',
        accuse: '流言飛語',
        rest: '休息',
        restHint: '休息すると資金を1金得て、策謀を1回消費します。',
        use: '使う',
        noCards: '密書はありません。',
        finalTitle: '歴史の帳が下りた',
        finalCopy: '表の英雄たちが名を残し、影の手だけが勝敗を知っている。',
        winner: '勝者',
        score: '影響力',
        restartResult: 'もう一度遊ぶ',
        cover: '隠蔽',
        noMove: '隣接拠点なし',
        invalid: 'その策謀は実行できません。',
        wait: '自動処理中です。',
        humanName: 'あなた',
        cpu1: '茶屋の主',
        cpu2: '黒田の参謀',
        cpu3: '尼子の密使'
      },
      en: {
        eyebrow: 'A strategy board game from the shadows of history',
        title: 'Fixer of History',
        backHome: 'Back to Games',
        restart: 'Restart',
        fixers: 'Fixers',
        actions: 'Schemes',
        letters: 'Secret Letters',
        heroes: 'Heroes',
        logTitle: 'Whisper Log',
        turn: 'Turn',
        phase: 'Phase',
        actionsLeft: 'Schemes Left',
        leader: 'Current Leader',
        planning: 'Planning',
        upheaval: 'Upheaval',
        harvest: 'Harvest',
        cleanup: 'Balance',
        gameOver: 'Game Over',
        money: 'Money',
        infamy: 'Infamy',
        favor: 'Favor',
        purged: 'Purged',
        dead: 'Dead',
        alive: 'Alive',
        selected: 'Selected',
        noSelection: 'Select a hero or stronghold to inspect the situation.',
        targetHero: 'Target Hero',
        targetLocation: 'Destination',
        amount: 'Investment',
        invest: 'Invest',
        accuseTarget: 'Accuse Fixer',
        accuse: 'Rumor',
        rest: 'Rest',
        restHint: 'Resting gives 1 coin and spends 1 scheme.',
        use: 'Use',
        noCards: 'No secret letters.',
        finalTitle: 'The Curtain Falls',
        finalCopy: 'The heroes kept the records, but the shadows decided the result.',
        winner: 'Winner',
        score: 'Influence',
        restartResult: 'Play Again',
        cover: 'Cover-Up',
        noMove: 'No adjacent stronghold',
        invalid: 'That scheme cannot be performed.',
        wait: 'Resolving automatic phases.',
        humanName: 'You',
        cpu1: 'Chaya Patron',
        cpu2: 'Kuroda Strategist',
        cpu3: 'Amago Envoy'
      }
    };

    const LOCATION_DEFS = [
      { id: 'owari', nameJa: '尾張', nameEn: 'Owari', x: 0.55, y: 0.58, value: 4, neighbors: ['kyoto', 'omi', 'kai'] },
      { id: 'kyoto', nameJa: '京', nameEn: 'Kyoto', x: 0.45, y: 0.49, value: 6, neighbors: ['owari', 'omi', 'settsu'] },
      { id: 'omi', nameJa: '近江', nameEn: 'Omi', x: 0.50, y: 0.51, value: 3, neighbors: ['kyoto', 'owari', 'echigo'] },
      { id: 'kai', nameJa: '甲斐', nameEn: 'Kai', x: 0.66, y: 0.50, value: 4, neighbors: ['owari', 'edo', 'echigo'] },
      { id: 'echigo', nameJa: '越後', nameEn: 'Echigo', x: 0.66, y: 0.31, value: 4, neighbors: ['kai', 'edo', 'omi'] },
      { id: 'aki', nameJa: '安芸', nameEn: 'Aki', x: 0.23, y: 0.58, value: 4, neighbors: ['settsu'] },
      { id: 'settsu', nameJa: '摂津', nameEn: 'Settsu', x: 0.38, y: 0.56, value: 5, neighbors: ['kyoto', 'aki'] },
      { id: 'edo', nameJa: '江戸', nameEn: 'Edo', x: 0.78, y: 0.55, value: 5, neighbors: ['kai', 'echigo'] }
    ];

    const HERO_DEFS = [
      { id: 'nobunaga', nameJa: '織田信長', nameEn: 'Oda Nobunaga', ambition: 5, locationId: 'owari', color: '#ef4444' },
      { id: 'hideyoshi', nameJa: '豊臣秀吉', nameEn: 'Toyotomi Hideyoshi', ambition: 4, locationId: 'settsu', color: '#f59e0b' },
      { id: 'ieyasu', nameJa: '徳川家康', nameEn: 'Tokugawa Ieyasu', ambition: 4, locationId: 'edo', color: '#22c55e' },
      { id: 'shingen', nameJa: '武田信玄', nameEn: 'Takeda Shingen', ambition: 5, locationId: 'kai', color: '#dc2626' },
      { id: 'kenshin', nameJa: '上杉謙信', nameEn: 'Uesugi Kenshin', ambition: 5, locationId: 'echigo', color: '#38bdf8' },
      { id: 'motonari', nameJa: '毛利元就', nameEn: 'Mori Motonari', ambition: 3, locationId: 'aki', color: '#a78bfa' }
    ];

    const CARD_DEFS = [
      { id: 'march', type: 'move', nameJa: '進軍命令', nameEn: 'March Order', descJa: '偉人を隣接拠点へ動かす。', descEn: 'Move a hero to an adjacent stronghold.' },
      { id: 'raid', type: 'attack', nameJa: '密命襲撃', nameEn: 'Covert Raid', descJa: '隣接する敵へ進軍し合戦する。', descEn: 'March into an adjacent enemy and fight.' },
      { id: 'bribe', type: 'favor', nameJa: '賄賂', nameEn: 'Bribe', descJa: '対象偉人への自分の恩義を2増やす。', descEn: 'Gain 2 favor with the target hero.' },
      { id: 'disrupt', type: 'debuff', nameJa: '攪乱', nameEn: 'Disruption', descJa: '対象偉人の次の合戦値を2下げる。', descEn: 'Give the target hero -2 in the next battle.' },
      { id: 'cover', type: 'cover', nameJa: '隠蔽', nameEn: 'Cover-Up', descJa: '自分の悪名を1下げる。', descEn: 'Reduce your infamy by 1.' }
    ];

    const state = {
      lang: localStorage.getItem('fixer-lang') || 'ja',
      turn: 1,
      phase: 'planning',
      actionsLeft: ACTIONS_PER_TURN,
      selectedHeroId: null,
      selectedLocationId: null,
      fixers: [],
      heroes: [],
      locations: [],
      deck: [],
      discard: [],
      log: [],
      gameOver: false,
      busy: false
    };

    const els = {
      bg: document.getElementById('bg-canvas'),
      board: document.getElementById('game-board'),
      turnStrip: document.getElementById('turn-strip'),
      selection: document.getElementById('selection-readout'),
      players: document.getElementById('player-panel'),
      actions: document.getElementById('action-panel'),
      cards: document.getElementById('cards-panel'),
      heroes: document.getElementById('heroes-panel'),
      log: document.getElementById('log-list'),
      langBtn: document.getElementById('lang-btn'),
      restartBtn: document.getElementById('restart-btn'),
      resultModal: document.getElementById('result-modal'),
      resultTitle: document.getElementById('result-title'),
      resultCopy: document.getElementById('result-copy'),
      rankList: document.getElementById('rank-list'),
      resultRestart: document.getElementById('result-restart')
    };

    const ctx = els.board.getContext('2d');
    const bgCtx = els.bg.getContext('2d');
    let boardBounds = [];
    let bgParticles = [];

    function t(key) {
      return (I18N[state.lang] && I18N[state.lang][key]) || I18N.ja[key] || key;
    }

    function localName(item) {
      return state.lang === 'en' ? item.nameEn : item.nameJa;
    }

    function initGame() {
      state.turn = 1;
      state.phase = 'planning';
      state.actionsLeft = ACTIONS_PER_TURN;
      state.selectedHeroId = HERO_DEFS[0].id;
      state.selectedLocationId = HERO_DEFS[0].locationId;
      state.fixers = createFixers();
      state.heroes = HERO_DEFS.map(hero => ({ ...hero, alive: true, funds: 0, battleModifier: 0 }));
      state.locations = LOCATION_DEFS.map(location => ({ ...location, ownerHeroId: null }));
      state.heroes.forEach(hero => getLocation(hero.locationId).ownerHeroId = hero.id);
      state.deck = createDeck();
      state.discard = [];
      state.log = [];
      state.gameOver = false;
      state.busy = false;
      dealInitialHands();
      addLog(state.lang === 'en'
        ? 'The study doors close. A new history begins.'
        : '書斎の扉が閉じた。新しい歴史が始まる。');
      renderAll();
    }

    function createFixers() {
      return [
        { id: 'player', nameJa: I18N.ja.humanName, nameEn: I18N.en.humanName, isHuman: true, money: INITIAL_MONEY, infamy: 0, hand: [], favors: {}, purged: false },
        { id: 'cpu1', nameJa: I18N.ja.cpu1, nameEn: I18N.en.cpu1, isHuman: false, money: INITIAL_MONEY, infamy: 0, hand: [], favors: {}, purged: false },
        { id: 'cpu2', nameJa: I18N.ja.cpu2, nameEn: I18N.en.cpu2, isHuman: false, money: INITIAL_MONEY, infamy: 0, hand: [], favors: {}, purged: false },
        { id: 'cpu3', nameJa: I18N.ja.cpu3, nameEn: I18N.en.cpu3, isHuman: false, money: INITIAL_MONEY, infamy: 0, hand: [], favors: {}, purged: false }
      ];
    }

    function createDeck() {
      const deck = [];
      for (let copy = 0; copy < 5; copy += 1) {
        CARD_DEFS.forEach(card => deck.push({ ...card, uid: `${card.id}-${copy}-${Math.random().toString(36).slice(2)}` }));
      }
      return shuffle(deck);
    }

    function shuffle(items) {
      const list = [...items];
      for (let i = list.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    }

    function dealInitialHands() {
      state.fixers.forEach(fixer => {
        for (let i = 0; i < INITIAL_HAND_SIZE; i += 1) drawCard(fixer);
      });
    }

    function drawCard(fixer) {
      if (state.deck.length === 0) {
        state.deck = shuffle(state.discard);
        state.discard = [];
      }
      const card = state.deck.pop();
      if (card) fixer.hand.push(card);
    }

    function renderAll() {
      applyStaticText();
      resizeCanvases();
      renderBoard();
      renderTurnStrip();
      renderSelection();
      renderPlayers();
      renderActions();
      renderCards();
      renderHeroes();
      renderLog();
      renderResultIfNeeded();
    }

    function applyStaticText() {
      document.documentElement.lang = state.lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      els.langBtn.textContent = state.lang === 'ja' ? 'English' : '日本語';
    }

    function resizeCanvases() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const boardRect = els.board.getBoundingClientRect();
      if (boardRect.width && boardRect.height) {
        els.board.width = Math.floor(boardRect.width * dpr);
        els.board.height = Math.floor(boardRect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      const bgRect = els.bg.getBoundingClientRect();
      if (bgRect.width && bgRect.height) {
        els.bg.width = Math.floor(bgRect.width * dpr);
        els.bg.height = Math.floor(bgRect.height * dpr);
        bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
    }

    function renderTurnStrip() {
      const ranking = calculateScores().filter(row => !row.fixer.purged);
      const leader = ranking[0]?.fixer;
      const stats = [
        [t('turn'), `${state.turn} / ${MAX_TURNS}`],
        [t('phase'), t(state.phase)],
        [t('actionsLeft'), state.busy ? t('wait') : state.actionsLeft],
        [t('leader'), leader ? localName(leader) : '-']
      ];
      els.turnStrip.replaceChildren(...stats.map(([label, value]) => {
        const node = document.createElement('div');
        node.className = 'turn-stat';
        const b = document.createElement('b');
        b.textContent = label;
        const span = document.createElement('span');
        span.textContent = value;
        node.append(b, span);
        return node;
      }));
    }

    function renderBoard() {
      const rect = els.board.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);
      boardBounds = [];

      ctx.save();
      ctx.fillStyle = '#111018';
      ctx.fillRect(0, 0, w, h);
      drawMapShape(w, h);
      drawRoads(w, h);
      drawLocations(w, h);
      drawHeroes(w, h);
      ctx.restore();
    }

    function drawMapShape(w, h) {
      ctx.save();
      ctx.translate(w * 0.08, h * 0.08);
      ctx.fillStyle = 'rgba(244, 213, 141, 0.08)';
      ctx.strokeStyle = 'rgba(244, 213, 141, 0.2)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(w * 0.08, h * 0.48);
      ctx.bezierCurveTo(w * 0.25, h * 0.26, w * 0.44, h * 0.35, w * 0.58, h * 0.18);
      ctx.bezierCurveTo(w * 0.74, h * 0.02, w * 0.9, h * 0.28, w * 0.82, h * 0.5);
      ctx.bezierCurveTo(w * 0.7, h * 0.78, w * 0.46, h * 0.74, w * 0.28, h * 0.72);
      ctx.bezierCurveTo(w * 0.1, h * 0.7, w * -0.02, h * 0.62, w * 0.08, h * 0.48);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawRoads(w, h) {
      ctx.save();
      ctx.strokeStyle = 'rgba(244, 213, 141, 0.34)';
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 9]);
      state.locations.forEach(location => {
        location.neighbors.forEach(neighborId => {
          if (location.id > neighborId) return;
          const n = getLocation(neighborId);
          ctx.beginPath();
          ctx.moveTo(location.x * w, location.y * h);
          ctx.lineTo(n.x * w, n.y * h);
          ctx.stroke();
        });
      });
      ctx.restore();
    }

    function drawLocations(w, h) {
      state.locations.forEach(location => {
        const x = location.x * w;
        const y = location.y * h;
        const selected = state.selectedLocationId === location.id;
        const owner = getHero(location.ownerHeroId);
        boardBounds.push({ type: 'location', id: location.id, x, y, r: 28 });

        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, selected ? 27 : 23, 0, Math.PI * 2);
        ctx.fillStyle = selected ? 'rgba(244, 213, 141, 0.32)' : 'rgba(255, 250, 232, 0.12)';
        ctx.strokeStyle = owner ? owner.color : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = selected ? 4 : 2;
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#f7f0df';
        ctx.textAlign = 'center';
        ctx.font = '700 13px sans-serif';
        ctx.fillText(localName(location), x, y - 32);
        ctx.fillStyle = '#f4d58d';
        ctx.font = '800 12px sans-serif';
        ctx.fillText(`V${location.value}`, x, y + 5);
        ctx.restore();
      });
    }

    function drawHeroes(w, h) {
      const grouped = {};
      state.heroes.filter(hh => hh.alive).forEach(hero => {
        grouped[hero.locationId] = grouped[hero.locationId] || [];
        grouped[hero.locationId].push(hero);
      });

      Object.entries(grouped).forEach(([locationId, heroes]) => {
        const location = getLocation(locationId);
        heroes.forEach((hero, index) => {
          const angle = (Math.PI * 2 * index) / Math.max(1, heroes.length);
          const spread = heroes.length > 1 ? 21 : 0;
          const x = location.x * w + Math.cos(angle) * spread;
          const y = location.y * h + Math.sin(angle) * spread + 34;
          const selected = state.selectedHeroId === hero.id;
          boardBounds.push({ type: 'hero', id: hero.id, x, y, r: 18 });

          ctx.save();
          ctx.beginPath();
          ctx.arc(x, y, selected ? 18 : 15, 0, Math.PI * 2);
          ctx.fillStyle = hero.color;
          ctx.strokeStyle = selected ? '#f4d58d' : 'rgba(255,255,255,0.72)';
          ctx.lineWidth = selected ? 4 : 2;
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#08070b';
          ctx.font = '900 12px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(localName(hero).slice(0, 1), x, y);
          ctx.restore();
        });
      });
    }

    function renderSelection() {
      const hero = getHero(state.selectedHeroId);
      const location = getLocation(state.selectedLocationId);
      if (!hero && !location) {
        els.selection.textContent = t('noSelection');
        return;
      }
      const parts = [];
      if (hero) {
        parts.push(`${t('selected')}: ${localName(hero)} / ${t('favor')} ${getFixer('player').favors[hero.id] || 0} / ${t('money')} ${hero.funds} / ${hero.alive ? t('alive') : t('dead')}`);
      }
      if (location) {
        const owner = getHero(location.ownerHeroId);
        parts.push(`${localName(location)} V${location.value}${owner ? ` / ${localName(owner)}` : ''}`);
      }
      els.selection.textContent = parts.join('  |  ');
    }

    function renderPlayers() {
      els.players.replaceChildren(...state.fixers.map(fixer => {
        const row = document.createElement('div');
        row.className = `fixer-row${fixer.isHuman ? ' is-player' : ''}${fixer.purged ? ' is-purged' : ''}`;
        const totalFavor = Object.values(fixer.favors).reduce((sum, value) => sum + value, 0);
        row.innerHTML = `
          <div class="row-main">
            <div class="row-title"></div>
            <span class="pill ${fixer.purged ? 'warn' : 'good'}"></span>
          </div>
          <div class="row-meta"></div>
        `;
        row.querySelector('.row-title').textContent = localName(fixer);
        row.querySelector('.pill').textContent = fixer.purged ? t('purged') : `${t('score')} ${scoreFixer(fixer).score}`;
        row.querySelector('.row-meta').textContent = `${t('money')} ${fixer.money} / ${t('infamy')} ${fixer.infamy} / ${t('favor')} ${totalFavor}`;
        return row;
      }));
    }

    function renderActions() {
      const disabled = state.gameOver || state.busy || state.phase !== 'planning' || getFixer('player').purged;
      const aliveHeroes = state.heroes.filter(hero => hero.alive);
      const selectedHero = getHero(state.selectedHeroId) && getHero(state.selectedHeroId).alive ? getHero(state.selectedHeroId) : aliveHeroes[0];
      const targetLocations = selectedHero
        ? getLocation(selectedHero.locationId).neighbors.map(getLocation)
        : [];
      const cpuFixers = state.fixers.filter(fixer => !fixer.isHuman && !fixer.purged);

      els.actions.innerHTML = `
        <div class="control-grid">
          <div class="select-row">
            <label for="target-hero">${t('targetHero')}</label>
            <select id="target-hero" ${disabled ? 'disabled' : ''}></select>
          </div>
          <div class="select-row">
            <label for="invest-amount">${t('amount')}</label>
            <select id="invest-amount" ${disabled ? 'disabled' : ''}>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
        </div>
        <div class="select-row">
          <label for="target-location">${t('targetLocation')}</label>
          <select id="target-location" ${disabled ? 'disabled' : ''}></select>
        </div>
        <div class="select-row">
          <label for="accuse-fixer">${t('accuseTarget')}</label>
          <select id="accuse-fixer" ${disabled ? 'disabled' : ''}></select>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" type="button" data-action="invest" ${disabled ? 'disabled' : ''}>${t('invest')}</button>
          <button class="btn" type="button" data-action="accuse" ${disabled ? 'disabled' : ''}>${t('accuse')}</button>
          <button class="btn" type="button" data-action="rest" ${disabled ? 'disabled' : ''}>${t('rest')}</button>
        </div>
        <div class="mini-note">${t('restHint')}</div>
      `;

      const heroSelect = document.getElementById('target-hero');
      aliveHeroes.forEach(hero => heroSelect.add(new Option(localName(hero), hero.id, false, hero.id === selectedHero?.id)));
      heroSelect.addEventListener('change', event => {
        state.selectedHeroId = event.target.value;
        state.selectedLocationId = getHero(event.target.value)?.locationId || state.selectedLocationId;
        renderAll();
      });

      const locationSelect = document.getElementById('target-location');
      if (targetLocations.length === 0) {
        locationSelect.add(new Option(t('noMove'), ''));
      } else {
        targetLocations.forEach(location => locationSelect.add(new Option(`${localName(location)} V${location.value}`, location.id)));
      }

      const accuseSelect = document.getElementById('accuse-fixer');
      cpuFixers.forEach(fixer => accuseSelect.add(new Option(localName(fixer), fixer.id)));
      els.actions.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', handleActionClick));
    }

    function renderCards() {
      const player = getFixer('player');
      if (player.hand.length === 0) {
        els.cards.textContent = t('noCards');
        return;
      }
      els.cards.replaceChildren(...player.hand.map(card => {
        const row = document.createElement('div');
        row.className = 'card-row';
        const copy = document.createElement('div');
        copy.className = 'card-copy';
        const title = document.createElement('div');
        title.className = 'card-title';
        title.textContent = localName(card);
        const desc = document.createElement('div');
        desc.className = 'row-meta';
        desc.textContent = state.lang === 'en' ? card.descEn : card.descJa;
        copy.append(title, desc);
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.type = 'button';
        btn.textContent = t('use');
        btn.disabled = state.gameOver || state.busy || state.phase !== 'planning' || player.purged;
        btn.addEventListener('click', () => playHumanCard(card.uid));
        row.append(copy, btn);
        return row;
      }));
    }

    function renderHeroes() {
      els.heroes.replaceChildren(...state.heroes.map(hero => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = `hero-row${hero.alive ? '' : ' is-dead'}`;
        row.addEventListener('click', () => {
          state.selectedHeroId = hero.id;
          state.selectedLocationId = hero.locationId || state.selectedLocationId;
          renderAll();
        });
        const location = getLocation(hero.locationId);
        row.innerHTML = `
          <div class="row-main">
            <span class="row-title"></span>
            <span class="pill"></span>
          </div>
          <span class="row-meta"></span>
        `;
        row.querySelector('.row-title').textContent = localName(hero);
        row.querySelector('.pill').textContent = hero.alive ? `${t('money')} ${hero.funds}` : t('dead');
        row.querySelector('.row-meta').textContent = hero.alive
          ? `${localName(location)} / ${t('favor')} ${getTotalFavorForHero(hero.id)} / Amb ${hero.ambition}`
          : `${t('dead')} / ${t('favor')} ${getTotalFavorForHero(hero.id)}`;
        return row;
      }));
    }

    function renderLog() {
      els.log.replaceChildren(...state.log.slice(-30).reverse().map(entry => {
        const div = document.createElement('div');
        div.className = 'log-item';
        div.textContent = entry;
        return div;
      }));
    }

    function renderResultIfNeeded() {
      if (!state.gameOver) {
        els.resultModal.classList.remove('is-open');
        return;
      }
      const scores = calculateScores();
      const winner = scores.find(row => !row.fixer.purged);
      els.resultTitle.textContent = `${t('winner')}: ${winner ? localName(winner.fixer) : '-'}`;
      els.resultCopy.textContent = t('finalCopy');
      els.resultRestart.textContent = t('restartResult');
      els.rankList.replaceChildren(...scores.map((row, index) => {
        const div = document.createElement('div');
        div.className = 'rank-row';
        const rank = document.createElement('b');
        rank.textContent = row.fixer.purged ? '-' : `${index + 1}`;
        const name = document.createElement('div');
        name.textContent = `${localName(row.fixer)}${row.fixer.purged ? ` (${t('purged')})` : ''}`;
        const score = document.createElement('span');
        score.className = `pill ${row.fixer.purged ? 'warn' : 'good'}`;
        score.textContent = `${t('score')} ${row.score}`;
        div.append(rank, name, score);
        return div;
      }));
      els.resultModal.classList.add('is-open');
    }

    function handleActionClick(event) {
      if (state.busy || state.gameOver) return;
      const action = event.currentTarget.dataset.action;
      if (action === 'invest') {
        const heroId = document.getElementById('target-hero').value;
        const amount = Number(document.getElementById('invest-amount').value);
        if (!invest('player', heroId, amount)) addLog(t('invalid'));
      } else if (action === 'accuse') {
        const fixerId = document.getElementById('accuse-fixer').value;
        const heroId = document.getElementById('target-hero').value;
        if (!accuse('player', fixerId, heroId)) addLog(t('invalid'));
      } else if (action === 'rest') {
        const player = getFixer('player');
        player.money += 1;
        addLog(state.lang === 'en' ? 'You rest and secure 1 coin.' : 'あなたは休息し、1金を確保した。');
        consumeHumanAction();
      }
      renderAll();
    }

    function invest(fixerId, heroId, amount) {
      const fixer = getFixer(fixerId);
      const hero = getHero(heroId);
      if (!fixer || !hero || !hero.alive || fixer.purged || fixer.money < amount || amount < 1) return false;
      fixer.money -= amount;
      hero.funds += amount;
      fixer.favors[heroId] = (fixer.favors[heroId] || 0) + amount;
      addLog(formatLog('invest', { fixer, hero, amount }));
      if (fixer.isHuman) consumeHumanAction();
      return true;
    }

    function accuse(accuserId, targetId, heroId) {
      const accuser = getFixer(accuserId);
      const target = getFixer(targetId);
      const hero = getHero(heroId);
      if (!accuser || !target || !hero || accuser.purged || target.purged || accuser.id === target.id) return false;
      const targetFavor = target.favors[heroId] || 0;
      if (targetFavor >= 3) {
        target.infamy += 2;
        addLog(formatLog('accuseHit', { accuser, target, hero }));
      } else {
        accuser.infamy += 1;
        addLog(formatLog('accuseMiss', { accuser, target, hero }));
      }
      if (accuser.isHuman) consumeHumanAction();
      return true;
    }

    function playHumanCard(uid) {
      if (state.busy || state.gameOver) return;
      const heroId = document.getElementById('target-hero')?.value || state.selectedHeroId;
      const locationId = document.getElementById('target-location')?.value || null;
      if (!playCard('player', uid, { heroId, locationId })) addLog(t('invalid'));
      renderAll();
    }

    function playCard(fixerId, uid, target) {
      const fixer = getFixer(fixerId);
      const cardIndex = fixer.hand.findIndex(card => card.uid === uid);
      if (cardIndex < 0 || fixer.purged) return false;
      const card = fixer.hand[cardIndex];
      const hero = getHero(target.heroId);
      let ok = false;

      if (card.type === 'move') ok = applyMoveCard(hero, target.locationId);
      if (card.type === 'attack') ok = applyAttackCard(hero);
      if (card.type === 'favor') ok = applyFavorCard(fixer, hero);
      if (card.type === 'debuff') ok = applyDebuffCard(hero);
      if (card.type === 'cover') ok = applyCoverCard(fixer);

      if (!ok) return false;
      fixer.hand.splice(cardIndex, 1);
      state.discard.push(card);
      addLog(formatLog('card', { fixer, card, hero }));
      if (fixer.isHuman) consumeHumanAction();
      return true;
    }

    function applyMoveCard(hero, locationId) {
      if (!hero || !hero.alive || !locationId) return false;
      const current = getLocation(hero.locationId);
      if (!current.neighbors.includes(locationId)) return false;
      hero.locationId = locationId;
      getLocation(locationId).ownerHeroId = hero.id;
      resolveBattlesAt(locationId);
      return true;
    }

    function applyAttackCard(hero) {
      if (!hero || !hero.alive) return false;
      const current = getLocation(hero.locationId);
      const targetLocation = current.neighbors
        .map(getLocation)
        .find(location => getHeroesAt(location.id).some(other => other.id !== hero.id));
      if (!targetLocation) return false;
      hero.locationId = targetLocation.id;
      targetLocation.ownerHeroId = hero.id;
      resolveBattlesAt(targetLocation.id, hero.id);
      return true;
    }

    function applyFavorCard(fixer, hero) {
      if (!hero || !hero.alive) return false;
      fixer.favors[hero.id] = (fixer.favors[hero.id] || 0) + 2;
      hero.funds += 1;
      return true;
    }

    function applyDebuffCard(hero) {
      if (!hero || !hero.alive) return false;
      hero.battleModifier -= 2;
      return true;
    }

    function applyCoverCard(fixer) {
      fixer.infamy = Math.max(0, fixer.infamy - 1);
      return true;
    }

    function consumeHumanAction() {
      state.actionsLeft -= 1;
      if (state.actionsLeft <= 0 && !state.gameOver) {
        state.busy = true;
        renderAll();
        window.setTimeout(resolveAutomaticPhases, 420);
      }
    }

    function resolveAutomaticPhases() {
      runCpuPlanning();
      resolveUpheavalPhase();
      resolveHarvestPhase();
      resolveCleanupPhase();
      state.busy = false;
      renderAll();
    }

    function runCpuPlanning() {
      state.phase = 'planning';
      state.fixers.filter(fixer => !fixer.isHuman && !fixer.purged).forEach(fixer => {
        for (let i = 0; i < ACTIONS_PER_TURN; i += 1) runCpuAction(fixer);
      });
    }

    function runCpuAction(fixer) {
      if (fixer.infamy >= 8) {
        const cover = fixer.hand.find(card => card.type === 'cover');
        if (cover && playCard(fixer.id, cover.uid, { heroId: chooseBestHeroFor(fixer)?.id })) return;
      }
      if (Math.random() < 0.22) {
        const leader = calculateScores().find(row => row.fixer.id !== fixer.id && !row.fixer.purged);
        const hero = chooseMostFavoredLivingHero(leader?.fixer);
        if (leader && hero && accuse(fixer.id, leader.fixer.id, hero.id)) return;
      }
      const usefulCard = fixer.hand.find(card => card.type !== 'cover');
      const bestHero = chooseBestHeroFor(fixer);
      if (usefulCard && bestHero && Math.random() < 0.35) {
        const targetLocation = chooseHeroDestination(bestHero, getLocation(bestHero.locationId));
        if (playCard(fixer.id, usefulCard.uid, { heroId: bestHero.id, locationId: targetLocation?.id })) return;
      }
      const amount = Math.min(fixer.money, Math.ceil(Math.random() * 2));
      if (bestHero && amount > 0) invest(fixer.id, bestHero.id, amount);
    }

    function resolveUpheavalPhase() {
      state.phase = 'upheaval';
      addLog(state.lang === 'en' ? 'The heroes move by ambition and money.' : '偉人たちが野望と資金に従って動き出す。');
      const actingHeroes = [...state.heroes]
        .filter(hero => hero.alive)
        .sort((a, b) => b.funds - a.funds || b.ambition - a.ambition);
      actingHeroes.forEach(hero => {
        if (!hero.alive) return;
        const here = getHeroesAt(hero.locationId).filter(other => other.id !== hero.id);
        if (here.length === 0) {
          const next = chooseHeroDestination(hero, getLocation(hero.locationId));
          if (next) {
            hero.locationId = next.id;
            next.ownerHeroId = hero.id;
            addLog(formatLog('heroMove', { hero, location: next }));
          }
        }
        resolveBattlesAt(hero.locationId, hero.id);
      });
    }

    function chooseHeroDestination(hero, location) {
      const candidates = location.neighbors.map(getLocation);
      return candidates.sort((a, b) => {
        const aEnemy = getHeroesAt(a.id).some(other => other.id !== hero.id) ? 3 : 0;
        const bEnemy = getHeroesAt(b.id).some(other => other.id !== hero.id) ? 3 : 0;
        return (b.value + bEnemy) - (a.value + aEnemy);
      })[0];
    }

    function resolveBattlesAt(locationId, attackerId) {
      let heroes = getHeroesAt(locationId);
      while (heroes.length > 1) {
        const attacker = getHero(attackerId) && getHero(attackerId).alive && getHero(attackerId).locationId === locationId
          ? getHero(attackerId)
          : heroes[0];
        const defender = heroes.find(hero => hero.id !== attacker.id);
        resolveBattle(attacker, defender);
        heroes = getHeroesAt(locationId);
      }
      const survivor = heroes[0];
      if (survivor) getLocation(locationId).ownerHeroId = survivor.id;
    }

    function resolveBattle(attacker, defender) {
      const attackRoll = rollD6();
      const defendRoll = rollD6();
      const attackScore = attackRoll + attacker.ambition + attacker.funds + attacker.battleModifier;
      const defendScore = defendRoll + defender.ambition + defender.funds + defender.battleModifier;
      const winner = chooseBattleWinner(attacker, defender, attackScore, defendScore);
      const loser = winner.id === attacker.id ? defender : attacker;
      offerBetrayals(winner, loser);
      killHero(loser.id);
      attacker.battleModifier = 0;
      defender.battleModifier = 0;
      addLog(formatLog('battle', { winner, loser, attackScore, defendScore }));
    }

    function chooseBattleWinner(attacker, defender, attackScore, defendScore) {
      if (attackScore > defendScore) return attacker;
      if (defendScore > attackScore) return defender;
      if (attacker.ambition > defender.ambition) return attacker;
      if (defender.ambition > attacker.ambition) return defender;
      return attacker;
    }

    function offerBetrayals(winner, loser) {
      state.fixers.forEach(fixer => {
        const favor = fixer.favors[loser.id] || 0;
        if (favor <= 0 || fixer.purged) return;
        if (fixer.isHuman) {
          const shouldBetray = window.confirm(state.lang === 'en'
            ? `${localName(loser)} is losing. Betray them and move ${Math.floor(favor / 2)} favor to ${localName(winner)}? Infamy +3.`
            : `${localName(loser)}が敗れます。見捨てて${localName(winner)}へ恩義${Math.floor(favor / 2)}を移しますか？ 悪名+3。`);
          if (shouldBetray) betray(fixer.id, loser.id, winner.id);
        } else if (favor >= 3 && fixer.infamy < 9 && Math.random() < 0.58) {
          betray(fixer.id, loser.id, winner.id);
        }
      });
    }

    function betray(fixerId, loserHeroId, winnerHeroId) {
      const fixer = getFixer(fixerId);
      const oldFavor = fixer.favors[loserHeroId] || 0;
      const movedFavor = Math.floor(oldFavor / 2);
      fixer.favors[loserHeroId] = 0;
      fixer.favors[winnerHeroId] = (fixer.favors[winnerHeroId] || 0) + movedFavor;
      fixer.infamy += 3;
      addLog(formatLog('betray', { fixer, loser: getHero(loserHeroId), winner: getHero(winnerHeroId), movedFavor }));
    }

    function killHero(heroId) {
      const hero = getHero(heroId);
      if (!hero) return;
      hero.alive = false;
      hero.funds = 0;
      const location = getLocation(hero.locationId);
      if (location && location.ownerHeroId === hero.id) location.ownerHeroId = null;
      hero.locationId = null;
    }

    function resolveHarvestPhase() {
      state.phase = 'harvest';
      state.heroes.filter(hero => hero.alive).forEach(hero => {
        const location = getLocation(hero.locationId);
        const totalFavor = getTotalFavorForHero(hero.id);
        if (!location || totalFavor <= 0) return;
        state.fixers.forEach(fixer => {
          if (fixer.purged) return;
          const favor = fixer.favors[hero.id] || 0;
          const payout = Math.floor(location.value * favor / totalFavor);
          if (payout > 0) {
            fixer.money += payout;
            addLog(formatLog('harvest', { fixer, hero, payout }));
          }
        });
      });
    }

    function resolveCleanupPhase() {
      state.phase = 'cleanup';
      resolveParadoxEvent();
      state.fixers.forEach(fixer => {
        if (!fixer.purged && fixer.infamy >= PURGE_INFAMY) {
          fixer.purged = true;
          addLog(formatLog('purge', { fixer }));
        }
      });
      state.fixers.forEach(fixer => {
        if (!fixer.purged && fixer.hand.length < 4) drawCard(fixer);
      });
      if (state.turn >= MAX_TURNS || state.heroes.filter(hero => hero.alive).length <= 1 || state.fixers.every(fixer => fixer.purged || !fixer.isHuman)) {
        state.gameOver = true;
        state.phase = 'gameOver';
        addLog(state.lang === 'en' ? 'The final accounts are opened.' : '最後の帳簿が開かれた。');
        return;
      }
      state.turn += 1;
      state.actionsLeft = ACTIONS_PER_TURN;
      state.phase = 'planning';
    }

    function resolveParadoxEvent() {
      const ranking = calculateScores().filter(row => !row.fixer.purged);
      const leader = ranking[0];
      const runnerUp = ranking[1];
      if (!leader || !runnerUp) return;
      const gap = leader.score - runnerUp.score;
      const chance = gap >= 5 ? 0.45 : 0.12;
      if (Math.random() > chance) return;

      const roll = Math.floor(Math.random() * 4);
      const fixer = leader.fixer;
      if (roll === 0) {
        const richest = [...state.locations].sort((a, b) => b.value - a.value)[0];
        richest.ownerHeroId = null;
        addLog(state.lang === 'en' ? `Uprising erupts in ${localName(richest)}.` : `${localName(richest)}で一揆が起き、支配が揺らいだ。`);
      } else if (roll === 1) {
        const target = [...state.heroes].filter(hero => hero.alive).sort((a, b) => b.funds - a.funds)[0];
        if (target && Math.random() < 0.45) {
          killHero(target.id);
          addLog(state.lang === 'en' ? `${localName(target)} falls ill and exits history.` : `${localName(target)}が病に倒れ、歴史から退場した。`);
        } else if (target) {
          target.funds = Math.max(0, target.funds - 2);
          addLog(state.lang === 'en' ? `${localName(target)} survives illness but loses 2 funds.` : `${localName(target)}は病を逃れたが、資金を2失った。`);
        }
      } else if (roll === 2) {
        fixer.infamy += 2;
        addLog(state.lang === 'en' ? `${localName(fixer)} is exposed. Infamy +2.` : `${localName(fixer)}の暗躍が露見した。悪名+2。`);
      } else {
        const lost = fixer.hand.pop();
        if (lost) state.discard.push(lost);
        addLog(state.lang === 'en' ? `${localName(fixer)} loses a secret letter to backlash.` : `${localName(fixer)}は反動で密書を1枚失った。`);
      }
    }

    function calculateScores() {
      return state.fixers
        .map(fixer => scoreFixer(fixer))
        .sort((a, b) => {
          if (a.fixer.purged !== b.fixer.purged) return a.fixer.purged ? 1 : -1;
          return b.score - a.score;
        });
    }

    function scoreFixer(fixer) {
      let liveFavor = 0;
      let locationBonus = 0;
      state.heroes.filter(hero => hero.alive).forEach(hero => {
        const favor = fixer.favors[hero.id] || 0;
        liveFavor += favor;
        if (favor > 0) {
          const location = getLocation(hero.locationId);
          locationBonus += Math.floor((location?.value || 0) * Math.min(3, favor) / 3);
        }
      });
      const penalty = fixer.infamy >= 10 ? 12 : fixer.infamy >= 7 ? 7 : fixer.infamy >= 4 ? 3 : 0;
      return { fixer, score: fixer.purged ? -999 : liveFavor + locationBonus - penalty, liveFavor, locationBonus, penalty };
    }

    function chooseBestHeroFor(fixer) {
      const living = state.heroes.filter(hero => hero.alive);
      return living.sort((a, b) => {
        const aLoc = getLocation(a.locationId);
        const bLoc = getLocation(b.locationId);
        const aFavor = fixer.favors[a.id] || 0;
        const bFavor = fixer.favors[b.id] || 0;
        return (b.funds + b.ambition + bLoc.value + bFavor) - (a.funds + a.ambition + aLoc.value + aFavor);
      })[0];
    }

    function chooseMostFavoredLivingHero(fixer) {
      if (!fixer) return null;
      return state.heroes
        .filter(hero => hero.alive)
        .sort((a, b) => (fixer.favors[b.id] || 0) - (fixer.favors[a.id] || 0))[0];
    }

    function getFixer(id) {
      return state.fixers.find(fixer => fixer.id === id);
    }

    function getHero(id) {
      return state.heroes.find(hero => hero.id === id);
    }

    function getLocation(id) {
      return state.locations.find(location => location.id === id);
    }

    function getHeroesAt(locationId) {
      return state.heroes.filter(hero => hero.alive && hero.locationId === locationId);
    }

    function getTotalFavorForHero(heroId) {
      return state.fixers.reduce((sum, fixer) => sum + (fixer.favors[heroId] || 0), 0);
    }

    function rollD6() {
      return Math.floor(Math.random() * 6) + 1;
    }

    function addLog(message) {
      state.log.push(message);
      if (state.log.length > 80) state.log.shift();
    }

    function formatLog(type, data) {
      if (state.lang === 'en') {
        if (type === 'invest') return `${localName(data.fixer)} invests ${data.amount} in ${localName(data.hero)}.`;
        if (type === 'accuseHit') return `${localName(data.accuser)} exposes ${localName(data.target)}'s ties to ${localName(data.hero)}.`;
        if (type === 'accuseMiss') return `${localName(data.accuser)} fails to prove ${localName(data.target)}'s ties to ${localName(data.hero)}.`;
        if (type === 'card') return `${localName(data.fixer)} sends ${localName(data.card)}.`;
        if (type === 'heroMove') return `${localName(data.hero)} marches to ${localName(data.location)}.`;
        if (type === 'battle') return `${localName(data.winner)} defeats ${localName(data.loser)} (${data.attackScore}-${data.defendScore}).`;
        if (type === 'betray') return `${localName(data.fixer)} abandons ${localName(data.loser)} and courts ${localName(data.winner)}.`;
        if (type === 'harvest') return `${localName(data.fixer)} receives ${data.payout} from ${localName(data.hero)}.`;
        if (type === 'purge') return `${localName(data.fixer)} is purged from the victory race.`;
      }
      if (type === 'invest') return `${localName(data.fixer)}は${localName(data.hero)}へ${data.amount}金を投資した。`;
      if (type === 'accuseHit') return `${localName(data.accuser)}は${localName(data.target)}と${localName(data.hero)}の癒着を暴いた。`;
      if (type === 'accuseMiss') return `${localName(data.accuser)}の告発は空振りに終わった。`;
      if (type === 'card') return `${localName(data.fixer)}は密書「${localName(data.card)}」を送った。`;
      if (type === 'heroMove') return `${localName(data.hero)}は${localName(data.location)}へ進軍した。`;
      if (type === 'battle') return `${localName(data.winner)}が${localName(data.loser)}を破った（${data.attackScore}-${data.defendScore}）。`;
      if (type === 'betray') return `${localName(data.fixer)}は${localName(data.loser)}を見捨て、${localName(data.winner)}へ鞍替えした。`;
      if (type === 'harvest') return `${localName(data.fixer)}は${localName(data.hero)}から${data.payout}金の配当を得た。`;
      if (type === 'purge') return `${localName(data.fixer)}は悪名により粛清され、勝利判定から外れた。`;
      return type;
    }

    function handleBoardClick(event) {
      const rect = els.board.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const hit = [...boardBounds].reverse().find(item => Math.hypot(item.x - x, item.y - y) <= item.r);
      if (!hit) return;
      if (hit.type === 'hero') {
        const hero = getHero(hit.id);
        state.selectedHeroId = hero.id;
        state.selectedLocationId = hero.locationId || state.selectedLocationId;
      } else {
        state.selectedLocationId = hit.id;
      }
      renderAll();
    }

    function initBackground() {
      bgParticles = Array.from({ length: 64 }, () => ({
        x: Math.random(),
        y: Math.random(),
        r: 0.7 + Math.random() * 2.4,
        s: 0.00018 + Math.random() * 0.00042,
        a: 0.12 + Math.random() * 0.24
      }));
      requestAnimationFrame(drawBackground);
    }

    function drawBackground() {
      const rect = els.bg.getBoundingClientRect();
      bgCtx.clearRect(0, 0, rect.width, rect.height);
      bgParticles.forEach(p => {
        p.y += p.s;
        if (p.y > 1.06) p.y = -0.06;
        bgCtx.beginPath();
        bgCtx.arc(p.x * rect.width, p.y * rect.height, p.r, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(244,213,141,${p.a})`;
        bgCtx.fill();
      });
      requestAnimationFrame(drawBackground);
    }

    els.board.addEventListener('click', handleBoardClick);
    els.langBtn.addEventListener('click', () => {
      state.lang = state.lang === 'ja' ? 'en' : 'ja';
      localStorage.setItem('fixer-lang', state.lang);
      renderAll();
    });
    els.restartBtn.addEventListener('click', initGame);
    els.resultRestart.addEventListener('click', initGame);
    window.addEventListener('resize', renderAll);

    initBackground();
    initGame();
  </script>
</body>
</html>
