<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess AI</title>
  <meta name="description" content="ブラウザだけで遊べるAIチェス。手番選択・難易度・待った対応。" />
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#0f172a;
      --panel:#0b1b2f;
      --line:rgba(148,163,184,0.22);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#38bdf8;
      --danger:#fb7185;
      --good:#34d399;
      --sq-light:#f3e6cf;
      --sq-dark:#b28b67;
      --sq-light-2:#f8f0df;
      --sq-dark-2:#9f7755;
      --radius:14px;
      --shadow: 0 16px 48px rgba(0,0,0,0.45);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background: radial-gradient(1200px 600px at 20% 0%, rgba(56,189,248,0.12), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(52,211,153,0.10), transparent 55%),
                  linear-gradient(180deg,var(--bg0),var(--bg1));
      color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI Variable", "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    header{
      width:min(1100px, calc(100% - 40px));
      padding:16px 0 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .logo{
      font-weight:900;
      letter-spacing:0.08em;
      color:var(--accent);
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:1.12rem;
      user-select:none;
    }
    .logo .mark{
      width:36px;height:36px;border-radius:10px;
      display:grid;place-items:center;
      background: linear-gradient(135deg, rgba(56,189,248,0.25), rgba(52,211,153,0.18));
      border:1px solid rgba(56,189,248,0.22);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      color:#eaf7ff;
      font-size:1.2rem;
    }
    .back-link{
      font-size:0.82rem;
      color:rgba(226,232,240,0.88);
      text-decoration:none;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 12px;
      background:rgba(15,23,42,0.25);
      transition: transform 0.12s ease, background 0.12s ease;
      white-space:nowrap;
    }
    .back-link:hover{background:rgba(15,23,42,0.42); transform: translateY(-1px);}

    .wrap{
      width:min(1100px, calc(100% - 40px));
      display:flex;
      gap:18px;
      align-items:flex-start;
      padding:8px 0 32px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .board-shell{
      background: rgba(15,23,42,0.35);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
    }
    .board-top{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:var(--muted);
      font-size:0.82rem;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.40);
      color:rgba(226,232,240,0.9);
      user-select:none;
    }

    #board{
      width:min(520px, calc(100vw - 70px));
      aspect-ratio:1/1;
      display:grid;
      grid-template-columns:repeat(8,1fr);
      border-radius: 12px;
      overflow:hidden;
      border:1px solid rgba(148,163,184,0.25);
      background: rgba(0,0,0,0.2);
      touch-action:none;
    }
    .sq{
      position:relative;
      display:grid;
      place-items:center;
      user-select:none;
      cursor:pointer;
      font-size:clamp(28px, 5vw, 44px);
      line-height:1;
      font-variant-emoji:text;
    }
    .sq.light{ background: linear-gradient(135deg,var(--sq-light),var(--sq-light-2)); }
    .sq.dark{  background: linear-gradient(135deg,var(--sq-dark),var(--sq-dark-2)); }
    .sq::after{
      content:"";
      position:absolute;
      inset:0;
      box-shadow: inset 0 0 0 0 rgba(56,189,248,0);
      transition: box-shadow 0.08s ease;
      pointer-events:none;
    }
    .sq:hover::after{ box-shadow: inset 0 0 0 2px rgba(56,189,248,0.25); }
    .sq.sel::after{ box-shadow: inset 0 0 0 3px rgba(56,189,248,0.9); }
    .sq.last::after{ box-shadow: inset 0 0 0 3px rgba(52,211,153,0.75); }
    .sq.check::after{ box-shadow: inset 0 0 0 4px rgba(251,113,133,0.85); }

    .hint-dot{
      width:14px;height:14px;border-radius:50%;
      background: rgba(56,189,248,0.68);
      box-shadow: 0 0 0 6px rgba(56,189,248,0.12);
    }
    .hint-cap{
      position:absolute;
      inset:7px;
      border-radius:999px;
      border: 3px solid rgba(56,189,248,0.75);
      box-shadow: inset 0 0 0 999px rgba(56,189,248,0.06);
      pointer-events:none;
    }
    .coord{
      position:absolute;
      font-size:0.68rem;
      color: rgba(15,23,42,0.65);
      font-weight:700;
      letter-spacing:0.05em;
      user-select:none;
      pointer-events:none;
    }
    .coord.file{ bottom:6px; right:7px; }
    .coord.rank{ top:6px; left:7px; }
    .sq.dark .coord{ color: rgba(248,250,252,0.65); }

    .panel{
      width:min(380px, calc(100vw - 40px));
      background: rgba(15,23,42,0.35);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .panel h2{
      font-size:0.95rem;
      color:rgba(226,232,240,0.92);
      letter-spacing:0.08em;
      text-transform:uppercase;
    }
    .status{
      border:1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.40);
      border-radius: 12px;
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .status .main{
      font-weight:800;
      font-size:0.98rem;
    }
    .status .sub{
      color:var(--muted);
      font-size:0.82rem;
      line-height:1.5;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      border:1px solid rgba(148,163,184,0.22);
      background: rgba(15,23,42,0.55);
      color: rgba(226,232,240,0.92);
      border-radius: 12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      user-select:none;
    }
    .btn:hover{ background: rgba(15,23,42,0.72); transform: translateY(-1px); }
    .btn.primary{ border-color: rgba(56,189,248,0.35); background: rgba(56,189,248,0.16); }
    .btn.primary:hover{ background: rgba(56,189,248,0.22); }
    .btn.danger{ border-color: rgba(251,113,133,0.35); background: rgba(251,113,133,0.14); }
    .btn.danger:hover{ background: rgba(251,113,133,0.20); }
    .btn.small{ padding:8px 10px; border-radius: 10px; font-size:0.86rem; }
    .btn.active{ border-color: rgba(56,189,248,0.55); background: rgba(56,189,248,0.24); }

    .toggle{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.40);
      user-select:none;
    }
    .toggle input{ transform: scale(1.12); }
    .toggle label{ cursor:pointer; font-weight:700; color:rgba(226,232,240,0.9); }

    .moves{
      border:1px solid rgba(148,163,184,0.18);
      background: rgba(2,6,23,0.40);
      border-radius: 12px;
      padding:10px 12px;
      min-height: 120px;
      max-height: 240px;
      overflow:auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Fira Code", monospace;
      font-size:0.86rem;
      color: rgba(226,232,240,0.9);
      white-space:pre-wrap;
    }

    /* overlays */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(2,6,23,0.62);
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:200;
    }
    .card{
      width:min(680px, calc(100% - 20px));
      border-radius: 18px;
      border:1px solid rgba(148,163,184,0.22);
      background: linear-gradient(180deg, rgba(15,23,42,0.92), rgba(2,6,23,0.88));
      box-shadow: 0 30px 120px rgba(0,0,0,0.65);
      padding:18px 18px 16px;
    }
    .card h1{
      font-size:1.2rem;
      letter-spacing:0.08em;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .card p{
      color: rgba(226,232,240,0.84);
      font-size:0.9rem;
      line-height:1.65;
      margin-bottom:12px;
    }
    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    .group{
      border:1px solid rgba(148,163,184,0.18);
      border-radius: 14px;
      background: rgba(2,6,23,0.45);
      padding:12px;
    }
    .group .title{
      font-size:0.78rem;
      color: rgba(148,163,184,0.92);
      letter-spacing:0.12em;
      text-transform: uppercase;
      margin-bottom:8px;
    }
    .group .row{ gap:8px; }

    .promo{
      display:none;
    }
    .promo.show{ display:flex; }
    .promo .card{ width:min(520px, calc(100% - 20px)); }
    .promo .choices{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
    .promo .piece-btn{
      width:72px;height:72px;
      border-radius: 16px;
      border:1px solid rgba(148,163,184,0.22);
      background: rgba(15,23,42,0.55);
      color: rgba(226,232,240,0.92);
      cursor:pointer;
      font-size:2.2rem;
      display:grid;
      place-items:center;
      transition: transform 0.12s ease, background 0.12s ease;
      user-select:none;
    }
    .promo .piece-btn:hover{ transform: translateY(-2px); background: rgba(56,189,248,0.18); }

    @media (max-width: 820px){
      .panel{ width:min(520px, calc(100vw - 40px)); }
    }
    @media (max-width: 560px){
      header{ width: calc(100% - 26px); }
      .wrap{ width: calc(100% - 26px); }
      .grid2{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="#">
      <span class="mark">♟</span>
      <span>CHESS AI</span>
    </a>
    <a class="back-link" href="index.html">← ポートフォリオ</a>
  </header>

  <div class="wrap">
    <div class="board-shell">
      <div class="board-top">
        <div class="pill" id="turnPill">手番: -</div>
        <div class="pill" id="aiPill">AI: -</div>
      </div>
      <div id="board" aria-label="chess board"></div>
      <div class="board-top">
        <div class="pill" id="fenPill" title="FEN（クリックでコピー）" style="cursor:pointer">FEN: -</div>
        <div class="pill" id="msgPill">準備中…</div>
      </div>
    </div>

    <aside class="panel">
      <h2>Controls</h2>
      <div class="status">
        <div class="main" id="statusMain">開始してください</div>
        <div class="sub" id="statusSub">最初の画面で「自分の手番」と「難易度」を選べます。</div>
      </div>

      <div class="row">
        <button class="btn primary" id="btnNew">ニューゲーム</button>
        <button class="btn" id="btnUndo">待った</button>
        <button class="btn" id="btnFlip">盤面反転</button>
      </div>
      <div class="row">
        <button class="btn small" id="btnEasy">Easy</button>
        <button class="btn small active" id="btnNormal">Normal</button>
        <button class="btn small" id="btnHard">Hard</button>
        <button class="btn small danger" id="btnVsHuman" title="AIをオフにして2人対戦">2P</button>
      </div>
      <div class="toggle">
        <input type="checkbox" id="chkHints" checked />
        <label for="chkHints">合法手（ヒント）表示</label>
      </div>

      <h2>Moves</h2>
      <div class="moves" id="movesBox" aria-label="move list"></div>
    </aside>
  </div>

  <!-- Start Overlay -->
  <div class="overlay" id="startOverlay">
    <div class="card">
      <h1><span style="font-size:1.35rem">♟</span> Chess AI</h1>
      <p>クリックで駒を動かすチェスです。ルールは通常チェス（キャスリング・アンパッサン・昇格）対応。<br>まず「自分の手番」と「難易度」を選んで開始してください。</p>
      <div class="grid2">
        <div class="group">
          <div class="title">Play As</div>
          <div class="row">
            <button class="btn active" id="pickWhite">白（先手）</button>
            <button class="btn" id="pickBlack">黒（後手）</button>
            <button class="btn" id="pickHuman">2人対戦</button>
          </div>
        </div>
        <div class="group">
          <div class="title">Difficulty</div>
          <div class="row">
            <button class="btn small" id="pickEasy">Easy</button>
            <button class="btn small active" id="pickNormal">Normal</button>
            <button class="btn small" id="pickHard">Hard</button>
          </div>
        </div>
      </div>
      <div class="row" style="justify-content:flex-end;margin-top:14px">
        <button class="btn primary" id="btnStart">開始</button>
      </div>
    </div>
  </div>

  <!-- Promotion Overlay -->
  <div class="overlay promo" id="promoOverlay">
    <div class="card">
      <h1>昇格</h1>
      <p>どの駒に昇格しますか？</p>
      <div class="choices" id="promoChoices"></div>
    </div>
  </div>

  <script>
  const PIECE_TO_CHAR = {
    P:"♙", N:"♘", B:"♗", R:"♖", Q:"♕", K:"♔",
    p:"♟", n:"♞", b:"♝", r:"♜", q:"♛", k:"♚"
  };
  const PIECE_VALUE = { P:100, N:320, B:330, R:500, Q:900, K:0 };
  const MATE = 100000;

  // PST indices are a1..h8 (rank 1 -> 8). Values are small.
  const PST = {
    P:[
      0,  0,  0,  0,  0,  0,  0,  0,
      5, 10, 10,-20,-20, 10, 10,  5,
      5, -5,-10,  0,  0,-10, -5,  5,
      0,  0,  0, 20, 20,  0,  0,  0,
      5,  5, 10, 25, 25, 10,  5,  5,
     10, 10, 20, 30, 30, 20, 10, 10,
     50, 50, 50, 50, 50, 50, 50, 50,
      0,  0,  0,  0,  0,  0,  0,  0,
    ],
    N:[
     -50,-40,-30,-30,-30,-30,-40,-50,
     -40,-20,  0,  0,  0,  0,-20,-40,
     -30,  0, 10, 15, 15, 10,  0,-30,
     -30,  5, 15, 20, 20, 15,  5,-30,
     -30,  0, 15, 20, 20, 15,  0,-30,
     -30,  5, 10, 15, 15, 10,  5,-30,
     -40,-20,  0,  5,  5,  0,-20,-40,
     -50,-40,-30,-30,-30,-30,-40,-50,
    ],
    B:[
     -20,-10,-10,-10,-10,-10,-10,-20,
     -10,  0,  0,  0,  0,  0,  0,-10,
     -10,  0,  5, 10, 10,  5,  0,-10,
     -10,  5,  5, 10, 10,  5,  5,-10,
     -10,  0, 10, 10, 10, 10,  0,-10,
     -10, 10, 10, 10, 10, 10, 10,-10,
     -10,  5,  0,  0,  0,  0,  5,-10,
     -20,-10,-10,-10,-10,-10,-10,-20,
    ],
    R:[
       0,  0,  0,  5,  5,  0,  0,  0,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
      -5,  0,  0,  0,  0,  0,  0, -5,
       5, 10, 10, 10, 10, 10, 10,  5,
       0,  0,  0,  0,  0,  0,  0,  0,
    ],
    Q:[
     -20,-10,-10, -5, -5,-10,-10,-20,
     -10,  0,  0,  0,  0,  0,  0,-10,
     -10,  0,  5,  5,  5,  5,  0,-10,
      -5,  0,  5,  5,  5,  5,  0, -5,
       0,  0,  5,  5,  5,  5,  0, -5,
     -10,  5,  5,  5,  5,  5,  0,-10,
     -10,  0,  5,  0,  0,  0,  0,-10,
     -20,-10,-10, -5, -5,-10,-10,-20,
    ],
    K:[
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -30,-40,-40,-50,-50,-40,-40,-30,
     -20,-30,-30,-40,-40,-30,-30,-20,
     -10,-20,-20,-20,-20,-20,-20,-10,
      20, 20,  0,  0,  0,  0, 20, 20,
      20, 30, 10,  0,  0, 10, 30, 20,
    ],
  };

  const boardEl = document.getElementById("board");
  const startOverlay = document.getElementById("startOverlay");
  const promoOverlay = document.getElementById("promoOverlay");
  const promoChoices = document.getElementById("promoChoices");
  const movesBox = document.getElementById("movesBox");
  const statusMain = document.getElementById("statusMain");
  const statusSub = document.getElementById("statusSub");
  const turnPill = document.getElementById("turnPill");
  const aiPill = document.getElementById("aiPill");
  const fenPill = document.getElementById("fenPill");
  const msgPill = document.getElementById("msgPill");
  const chkHints = document.getElementById("chkHints");

  const btnNew = document.getElementById("btnNew");
  const btnUndo = document.getElementById("btnUndo");
  const btnFlip = document.getElementById("btnFlip");
  const btnEasy = document.getElementById("btnEasy");
  const btnNormal = document.getElementById("btnNormal");
  const btnHard = document.getElementById("btnHard");
  const btnVsHuman = document.getElementById("btnVsHuman");

  const pickWhite = document.getElementById("pickWhite");
  const pickBlack = document.getElementById("pickBlack");
  const pickHuman = document.getElementById("pickHuman");
  const pickEasy = document.getElementById("pickEasy");
  const pickNormal = document.getElementById("pickNormal");
  const pickHard = document.getElementById("pickHard");
  const btnStart = document.getElementById("btnStart");

  let flipped = false;
  let gameActive = false;
  let aiSide = "b";     // "w" or "b" or null
  let humanSide = "w";  // when aiSide is set
  let difficulty = "normal"; // easy/normal/hard
  let state = null;
  let history = [];
  let moveText = [];
  let selected = -1;
  let legalMovesCache = [];
  let lastMove = null;
  let pendingPromotion = null;
  let aiThinking = false;
  let tt = new Map();

  function opp(side){ return side === "w" ? "b" : "w"; }
  function isUpper(ch){ return ch && ch === ch.toUpperCase(); }
  function colorOf(piece){ return !piece ? null : (isUpper(piece) ? "w" : "b"); }
  function pieceType(piece){ return piece ? piece.toUpperCase() : null; }
  function rc(i){ return [Math.floor(i/8), i%8]; }
  function idx(r,c){ return r*8 + c; }
  function inBounds(r,c){ return r>=0 && r<8 && c>=0 && c<8; }
  function sqName(i){
    const [r,c] = rc(i);
    return String.fromCharCode(97+c) + (8-r);
  }
  function cloneState(s){
    return {
      board: s.board.slice(),
      side: s.side,
      castling: {...s.castling},
      ep: s.ep,
      halfmove: s.halfmove,
      fullmove: s.fullmove,
    };
  }
  function fenKey(s){
    // compact enough for a TT key
    let b = "";
    for (let r=0;r<8;r++){
      let empty = 0;
      for (let c=0;c<8;c++){
        const p = s.board[idx(r,c)];
        if (!p) empty++;
        else { if (empty){ b += empty; empty=0; } b += p; }
      }
      if (empty) b += empty;
      if (r!==7) b += "/";
    }
    const cst = (s.castling.K?"K":"")+(s.castling.Q?"Q":"")+(s.castling.k?"k":"")+(s.castling.q?"q":"") || "-";
    const ep = s.ep >= 0 ? sqName(s.ep) : "-";
    return `${b} ${s.side} ${cst} ${ep}`;
  }
  function parseFEN(fen){
    const parts = fen.trim().split(/\s+/);
    const [placement, side, castling, ep, halfmove, fullmove] = parts;
    const board = Array(64).fill(null);
    const rows = placement.split("/");
    for (let r=0;r<8;r++){
      let c = 0;
      for (const ch of rows[r]){
        if (/\d/.test(ch)) c += Number(ch);
        else { board[idx(r,c)] = ch; c++; }
      }
    }
    return {
      board,
      side,
      castling: {
        K: castling.includes("K"),
        Q: castling.includes("Q"),
        k: castling.includes("k"),
        q: castling.includes("q"),
      },
      ep: ep && ep !== "-" ? idx(8-Number(ep[1]), ep.charCodeAt(0)-97) : -1,
      halfmove: Number(halfmove || 0),
      fullmove: Number(fullmove || 1),
    };
  }
  function toFEN(s){
    let placement = "";
    for (let r=0;r<8;r++){
      let empty = 0;
      for (let c=0;c<8;c++){
        const p = s.board[idx(r,c)];
        if (!p) empty++;
        else {
          if (empty) { placement += empty; empty = 0; }
          placement += p;
        }
      }
      if (empty) placement += empty;
      if (r !== 7) placement += "/";
    }
    const cst = (s.castling.K?"K":"")+(s.castling.Q?"Q":"")+(s.castling.k?"k":"")+(s.castling.q?"q":"") || "-";
    const ep = s.ep >= 0 ? sqName(s.ep) : "-";
    return `${placement} ${s.side} ${cst} ${ep} ${s.halfmove} ${s.fullmove}`;
  }

  function pstVal(pt, squareIndex, pieceColor){
    const [r,c] = rc(squareIndex);
    const pstIdx = pieceColor === "w" ? (7-r)*8 + c : r*8 + c;
    return PST[pt][pstIdx] || 0;
  }

  function isSquareAttacked(s, squareIndex, bySide){
    const b = s.board;
    const [r,c] = rc(squareIndex);

    // pawns
    if (bySide === "w"){
      const rr = r+1;
      if (rr < 8){
        if (c-1 >= 0 && b[idx(rr,c-1)] === "P") return true;
        if (c+1 < 8 && b[idx(rr,c+1)] === "P") return true;
      }
    } else {
      const rr = r-1;
      if (rr >= 0){
        if (c-1 >= 0 && b[idx(rr,c-1)] === "p") return true;
        if (c+1 < 8 && b[idx(rr,c+1)] === "p") return true;
      }
    }

    // knights
    const kn = bySide === "w" ? "N" : "n";
    const knightD = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
    for (const [dr,dc] of knightD){
      const rr = r+dr, cc = c+dc;
      if (inBounds(rr,cc) && b[idx(rr,cc)] === kn) return true;
    }

    // bishops/queens (diagonals)
    const bishop = bySide === "w" ? "B" : "b";
    const queen  = bySide === "w" ? "Q" : "q";
    const rook   = bySide === "w" ? "R" : "r";
    const king   = bySide === "w" ? "K" : "k";
    const diag = [[-1,-1],[-1,1],[1,-1],[1,1]];
    for (const [dr,dc] of diag){
      let rr=r+dr, cc=c+dc;
      while (inBounds(rr,cc)){
        const p = b[idx(rr,cc)];
        if (p){
          if (p === bishop || p === queen) return true;
          break;
        }
        rr+=dr; cc+=dc;
      }
    }

    // rooks/queens (lines)
    const line = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr,dc] of line){
      let rr=r+dr, cc=c+dc;
      while (inBounds(rr,cc)){
        const p = b[idx(rr,cc)];
        if (p){
          if (p === rook || p === queen) return true;
          break;
        }
        rr+=dr; cc+=dc;
      }
    }

    // kings
    for (let dr=-1; dr<=1; dr++){
      for (let dc=-1; dc<=1; dc++){
        if (!dr && !dc) continue;
        const rr = r+dr, cc = c+dc;
        if (inBounds(rr,cc) && b[idx(rr,cc)] === king) return true;
      }
    }
    return false;
  }

  function kingSquare(s, side){
    const target = side === "w" ? "K" : "k";
    for (let i=0;i<64;i++) if (s.board[i] === target) return i;
    return -1;
  }
  function inCheck(s, side){
    const ksq = kingSquare(s, side);
    if (ksq < 0) return false;
    return isSquareAttacked(s, ksq, opp(side));
  }

  function genPseudoMoves(s){
    const moves = [];
    const b = s.board;
    const side = s.side;

    for (let from=0; from<64; from++){
      const piece = b[from];
      if (!piece) continue;
      if (colorOf(piece) !== side) continue;
      const pt = pieceType(piece);
      const [r,c] = rc(from);

      if (pt === "P"){
        const dir = side === "w" ? -1 : 1;
        const startRank = side === "w" ? 6 : 1;
        const promoRank = side === "w" ? 0 : 7;
        const oneR = r + dir;
        if (inBounds(oneR,c) && !b[idx(oneR,c)]){
          const to = idx(oneR,c);
          if (oneR === promoRank){
            for (const pr of ["Q","R","B","N"]){
              moves.push({from,to,piece, capture:null, promotion: pr, flags:{}});
            }
          } else {
            moves.push({from,to,piece, capture:null, promotion:null, flags:{}});
            if (r === startRank){
              const twoR = r + dir*2;
              if (inBounds(twoR,c) && !b[idx(twoR,c)]){
                moves.push({from,to:idx(twoR,c),piece, capture:null, promotion:null, flags:{p2:true}});
              }
            }
          }
        }
        for (const dc of [-1,1]){
          const cc = c+dc;
          const rr = r+dir;
          if (!inBounds(rr,cc)) continue;
          const to = idx(rr,cc);
          const target = b[to];
          if (target && colorOf(target) === opp(side)){
            if (rr === promoRank){
              for (const pr of ["Q","R","B","N"]){
                moves.push({from,to,piece, capture: target, promotion: pr, flags:{cap:true}});
              }
            } else {
              moves.push({from,to,piece, capture: target, promotion:null, flags:{cap:true}});
            }
          } else if (to === s.ep){
            moves.push({from,to,piece, capture: side === "w" ? "p" : "P", promotion:null, flags:{ep:true, cap:true}});
          }
        }
        continue;
      }

      if (pt === "N"){
        const D = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
        for (const [dr,dc] of D){
          const rr=r+dr, cc=c+dc;
          if (!inBounds(rr,cc)) continue;
          const to = idx(rr,cc);
          const target = b[to];
          if (!target || colorOf(target) === opp(side)){
            moves.push({from,to,piece, capture: target || null, promotion:null, flags: target?{cap:true}:{}} );
          }
        }
        continue;
      }

      if (pt === "B" || pt === "R" || pt === "Q"){
        const dirs = [];
        if (pt === "B" || pt === "Q") dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (pt === "R" || pt === "Q") dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr,dc] of dirs){
          let rr=r+dr, cc=c+dc;
          while (inBounds(rr,cc)){
            const to = idx(rr,cc);
            const target = b[to];
            if (!target){
              moves.push({from,to,piece, capture:null, promotion:null, flags:{}});
            } else {
              if (colorOf(target) === opp(side)){
                moves.push({from,to,piece, capture: target, promotion:null, flags:{cap:true}});
              }
              break;
            }
            rr+=dr; cc+=dc;
          }
        }
        continue;
      }

      if (pt === "K"){
        for (let dr=-1; dr<=1; dr++){
          for (let dc=-1; dc<=1; dc++){
            if (!dr && !dc) continue;
            const rr=r+dr, cc=c+dc;
            if (!inBounds(rr,cc)) continue;
            const to = idx(rr,cc);
            const target = b[to];
            if (!target || colorOf(target) === opp(side)){
              moves.push({from,to,piece, capture: target || null, promotion:null, flags: target?{cap:true}:{}} );
            }
          }
        }
        // castling (pseudo; check conditions later)
        if (side === "w" && from === idx(7,4)){
          if (s.castling.K && b[idx(7,5)] == null && b[idx(7,6)] == null && b[idx(7,7)] === "R"){
            moves.push({from,to:idx(7,6),piece, capture:null, promotion:null, flags:{castle:"K"}});
          }
          if (s.castling.Q && b[idx(7,3)] == null && b[idx(7,2)] == null && b[idx(7,1)] == null && b[idx(7,0)] === "R"){
            moves.push({from,to:idx(7,2),piece, capture:null, promotion:null, flags:{castle:"Q"}});
          }
        }
        if (side === "b" && from === idx(0,4)){
          if (s.castling.k && b[idx(0,5)] == null && b[idx(0,6)] == null && b[idx(0,7)] === "r"){
            moves.push({from,to:idx(0,6),piece, capture:null, promotion:null, flags:{castle:"k"}});
          }
          if (s.castling.q && b[idx(0,3)] == null && b[idx(0,2)] == null && b[idx(0,1)] == null && b[idx(0,0)] === "r"){
            moves.push({from,to:idx(0,2),piece, capture:null, promotion:null, flags:{castle:"q"}});
          }
        }
        continue;
      }
    }
    return moves;
  }

  function applyMove(s, m){
    const ns = cloneState(s);
    const b = ns.board;
    const side = s.side;
    const moving = m.piece;
    const pt = pieceType(moving);
    const from = m.from, to = m.to;
    const captured = m.flags.ep ? (side === "w" ? b[to+8] : b[to-8]) : b[to];

    // move piece
    b[from] = null;
    b[to] = moving;

    // en-passant capture
    if (m.flags.ep){
      const capSq = side === "w" ? to+8 : to-8;
      b[capSq] = null;
    }
    // castling rook move
    if (m.flags.castle){
      if (m.flags.castle === "K"){ b[idx(7,7)] = null; b[idx(7,5)] = "R"; }
      if (m.flags.castle === "Q"){ b[idx(7,0)] = null; b[idx(7,3)] = "R"; }
      if (m.flags.castle === "k"){ b[idx(0,7)] = null; b[idx(0,5)] = "r"; }
      if (m.flags.castle === "q"){ b[idx(0,0)] = null; b[idx(0,3)] = "r"; }
    }
    // promotion
    if (m.promotion){
      const prom = side === "w" ? m.promotion : m.promotion.toLowerCase();
      b[to] = prom;
    }

    // castling rights update (move)
    if (pt === "K"){
      if (side === "w"){ ns.castling.K = false; ns.castling.Q = false; }
      else { ns.castling.k = false; ns.castling.q = false; }
    }
    if (pt === "R"){
      if (from === idx(7,7)) ns.castling.K = false;
      if (from === idx(7,0)) ns.castling.Q = false;
      if (from === idx(0,7)) ns.castling.k = false;
      if (from === idx(0,0)) ns.castling.q = false;
    }
    // castling rights update (capture rook on its home square)
    if (captured){
      if (to === idx(7,7) && captured === "R") ns.castling.K = false;
      if (to === idx(7,0) && captured === "R") ns.castling.Q = false;
      if (to === idx(0,7) && captured === "r") ns.castling.k = false;
      if (to === idx(0,0) && captured === "r") ns.castling.q = false;
    }

    // en passant square update
    ns.ep = -1;
    if (pt === "P" && m.flags.p2){
      const [fr,fc] = rc(from);
      ns.ep = side === "w" ? idx(fr-1,fc) : idx(fr+1,fc);
    }

    // move clocks
    const isCapture = !!captured || !!m.flags.ep;
    if (pt === "P" || isCapture) ns.halfmove = 0;
    else ns.halfmove = (s.halfmove || 0) + 1;
    ns.fullmove = s.fullmove + (side === "b" ? 1 : 0);

    // change side
    ns.side = opp(side);
    return ns;
  }

  function isLegalMove(s, m){
    // special castle legality: cannot castle out of/through check
    if (m.flags.castle){
      if (inCheck(s, s.side)) return false;
      const from = m.from;
      const to = m.to;
      const passSquares = [];
      if (to === idx(7,6)) passSquares.push(idx(7,5), idx(7,6));
      if (to === idx(7,2)) passSquares.push(idx(7,3), idx(7,2));
      if (to === idx(0,6)) passSquares.push(idx(0,5), idx(0,6));
      if (to === idx(0,2)) passSquares.push(idx(0,3), idx(0,2));
      for (const sq of passSquares){
        if (isSquareAttacked(s, sq, opp(s.side))) return false;
      }
    }
    const ns = applyMove(s, m);
    return !inCheck(ns, opp(ns.side)); // ns.side already switched
  }

  function legalMoves(s){
    const pseudo = genPseudoMoves(s);
    const res = [];
    for (const m of pseudo){
      if (isLegalMove(s, m)) res.push(m);
    }
    return res;
  }

  function evalBase(s){
    let score = 0;
    for (let i=0;i<64;i++){
      const p = s.board[i];
      if (!p) continue;
      const col = colorOf(p);
      const pt = pieceType(p);
      const val = PIECE_VALUE[pt] + pstVal(pt, i, col);
      score += (col === "w") ? val : -val;
    }
    // small (cheap) mobility term: pseudo moves only (keeps search snappy)
    const tmp = s.side;
    const m1 = genPseudoMoves(s).length;
    const s2 = cloneState(s); s2.side = opp(tmp);
    const m2 = genPseudoMoves(s2).length;
    score += (m1 - m2);
    return score;
  }
  function evalForAI(s){
    const base = evalBase(s);
    return aiSide === "w" ? base : -base;
  }

  function terminalScoreFromMoves(s, moves, depthLeft){
    if (moves.length) return null;
    if (inCheck(s, s.side)){
      // side to move is checkmated
      const aiMated = s.side === aiSide;
      const v = aiMated ? -MATE : MATE;
      return v + (aiMated ? -depthLeft : depthLeft);
    }
    return 0; // stalemate
  }

  function moveOrderScore(s, m){
    let score = 0;
    if (m.promotion) score += 9000;
    if (m.flags.castle) score += 200;
    if (m.flags.cap){
      const cap = m.flags.ep ? (s.side === "w" ? "p" : "P") : (s.board[m.to] || m.capture);
      if (cap){
        score += 1000 + (PIECE_VALUE[pieceType(cap)] || 0) - (PIECE_VALUE[pieceType(m.piece)] || 0);
      } else score += 1000;
    }
    return score;
  }

  function minimax(s, depth, alpha, beta){
    const key = fenKey(s);
    const hit = tt.get(key);
    if (hit && hit.depth >= depth) return hit.score;

    const moves = legalMoves(s);
    const t = terminalScoreFromMoves(s, moves, depth);
    if (t !== null) return t;
    if (depth === 0) return evalForAI(s);
    moves.sort((a,b)=>moveOrderScore(s,b)-moveOrderScore(s,a));
    const maximizing = s.side === aiSide;

    let best = maximizing ? -Infinity : Infinity;
    for (const m of moves){
      const ns = applyMove(s, m);
      const val = minimax(ns, depth-1, alpha, beta);
      if (maximizing){
        if (val > best) best = val;
        if (best > alpha) alpha = best;
      } else {
        if (val < best) best = val;
        if (best < beta) beta = best;
      }
      if (beta <= alpha) break;
    }
    tt.set(key, {depth, score: best});
    return best;
  }

  function chooseAiMove(s){
    const moves = legalMoves(s);
    if (!moves.length) return null;
    if (difficulty === "easy"){
      return moves[Math.floor(Math.random() * moves.length)];
    }
    const depth = difficulty === "hard" ? 4 : 3;
    tt.clear();
    let bestMove = moves[0];
    let bestScore = -Infinity;
    moves.sort((a,b)=>moveOrderScore(s,b)-moveOrderScore(s,a));
    for (const m of moves){
      const ns = applyMove(s, m);
      const score = minimax(ns, depth-1, -Infinity, Infinity);
      if (score > bestScore){
        bestScore = score;
        bestMove = m;
      }
    }
    return bestMove;
  }

  function moveToText(s, m){
    if (m.flags.castle){
      const isLong = (m.to === idx(7,2) || m.to === idx(0,2));
      return isLong ? "O-O-O" : "O-O";
    }
    const cap = m.flags.cap ? "x" : "-";
    const prom = m.promotion ? "=" + m.promotion : "";
    return `${sqName(m.from)}${cap}${sqName(m.to)}${prom}`;
  }

  function setStatus(main, sub){
    statusMain.textContent = main;
    statusSub.textContent = sub || "";
  }
  function setPills(){
    turnPill.textContent = `手番: ${state ? (state.side === "w" ? "白" : "黒") : "-"}`;
    const aiText = aiSide ? (aiSide === "w" ? "白AI" : "黒AI") : "OFF（2P）";
    aiPill.textContent = `AI: ${aiText} / ${difficulty}`;
    const fen = state ? toFEN(state) : "-";
    fenPill.textContent = `FEN: ${fen}`;
  }

  function clearHints(){
    for (const el of boardEl.children){
      el.classList.remove("sel","last","check");
      const dot = el.querySelector(".hint-dot");
      if (dot) dot.remove();
      const cap = el.querySelector(".hint-cap");
      if (cap) cap.remove();
    }
  }

  function render(){
    if (!state) return;
    clearHints();

    // last move highlight
    if (lastMove){
      const a = cellByIndex(lastMove.from);
      const b = cellByIndex(lastMove.to);
      if (a) a.classList.add("last");
      if (b) b.classList.add("last");
    }
    // check highlight
    const ksq = kingSquare(state, state.side);
    if (ksq >= 0 && inCheck(state, state.side)){
      const kEl = cellByIndex(ksq);
      if (kEl) kEl.classList.add("check");
    }

    // piece placement
    for (let disp=0; disp<64; disp++){
      const sqEl = boardEl.children[disp];
      const realIndex = displayToIndex(disp);
      const p = state.board[realIndex];
      sqEl.firstChild.textContent = p ? PIECE_TO_CHAR[p] : "";
    }

    // selection + hints
    if (selected >= 0){
      const selEl = cellByIndex(selected);
      if (selEl) selEl.classList.add("sel");
      if (chkHints.checked){
        const fromMoves = legalMovesCache.filter(m=>m.from===selected);
        for (const m of fromMoves){
          const toEl = cellByIndex(m.to);
          if (!toEl) continue;
          if (m.flags.cap){
            const ring = document.createElement("div");
            ring.className = "hint-cap";
            toEl.appendChild(ring);
          } else {
            const dot = document.createElement("div");
            dot.className = "hint-dot";
            toEl.appendChild(dot);
          }
        }
      }
    }

    // status
    setPills();
    movesBox.textContent = moveText.join("\n");
  }

  function indexToDisplay(realIndex){
    const [r,c] = rc(realIndex);
    const rr = flipped ? 7-r : r;
    const cc = flipped ? 7-c : c;
    return rr*8 + cc;
  }
  function displayToIndex(displayIndex){
    const r = Math.floor(displayIndex/8);
    const c = displayIndex%8;
    const rr = flipped ? 7-r : r;
    const cc = flipped ? 7-c : c;
    return rr*8 + cc;
  }
  function cellByIndex(realIndex){
    const disp = indexToDisplay(realIndex);
    return boardEl.children[disp] || null;
  }

  function refreshLegalMoves(){
    legalMovesCache = state ? legalMoves(state) : [];
  }

  function isHumanTurn(){
    if (!gameActive || !state) return false;
    if (!aiSide) return true;
    return state.side === humanSide;
  }

  function maybeEndGame(){
    const moves = legalMoves(state);
    if (moves.length) return false;
    gameActive = false;
    if (inCheck(state, state.side)){
      setStatus("チェックメイト", `${state.side === "w" ? "白" : "黒"}の負けです。`);
      msgPill.textContent = "終局";
    } else {
      setStatus("ステイルメイト", "合法手がありません。引き分けです。");
      msgPill.textContent = "終局";
    }
    return true;
  }

  function doMove(m){
    history.push(cloneState(state));
    const before = state;
    state = applyMove(state, m);
    lastMove = {from: m.from, to: m.to};
    const plyText = moveToText(before, m);
    const prefix = before.side === "w" ? `${before.fullmove}.` : `${before.fullmove}...`;
    moveText.push(`${prefix} ${plyText}`);
    selected = -1;
    refreshLegalMoves();

    // turn message
    msgPill.textContent = aiThinking ? "AI思考中…" : "プレイ中";
    const who = state.side === "w" ? "白" : "黒";
    const check = inCheck(state, state.side) ? "（チェック）" : "";
    setStatus("対局中", `手番: ${who}${check}`);
    render();
    maybeEndGame();
  }

  function requestPromotionAndMove(m){
    pendingPromotion = m;
    promoChoices.innerHTML = "";
    const side = state.side;
    const isWhite = side === "w";
    const options = ["Q","R","B","N"];
    for (const pt of options){
      const btn = document.createElement("button");
      btn.className = "piece-btn";
      btn.textContent = PIECE_TO_CHAR[isWhite ? pt : pt.toLowerCase()];
      btn.addEventListener("click", () => {
        promoOverlay.classList.remove("show");
        const mm = {...pendingPromotion, promotion: pt};
        pendingPromotion = null;
        doMove(mm);
        scheduleAiIfNeeded();
      });
      promoChoices.appendChild(btn);
    }
    promoOverlay.classList.add("show");
  }

  function onSquareClick(realIndex){
    if (!gameActive || !state) return;
    if (!isHumanTurn()) return;
    if (aiThinking) return;
    if (pendingPromotion) return;

    const p = state.board[realIndex];
    const side = state.side;

    if (selected < 0){
      if (p && colorOf(p) === side){
        selected = realIndex;
        render();
      }
      return;
    }

    // selecting another own piece
    if (p && colorOf(p) === side){
      selected = realIndex;
      render();
      return;
    }

    const candidates = legalMovesCache.filter(m => m.from === selected && m.to === realIndex);
    if (!candidates.length){
      selected = -1;
      render();
      return;
    }
    // if promotion, ask
    let m = candidates[0];
    if (m.promotion){
      // candidates already include multiple promotions; choose later
      m = {...m, promotion:null};
      requestPromotionAndMove(m);
      return;
    }
    doMove(m);
    scheduleAiIfNeeded();
  }

  function scheduleAiIfNeeded(){
    if (!gameActive || !aiSide || !state) return;
    if (state.side !== aiSide) return;
    if (maybeEndGame()) return;

    aiThinking = true;
    msgPill.textContent = "AI思考中…";
    render();
    setTimeout(() => {
      try{
        const m = chooseAiMove(state);
        aiThinking = false;
        if (!m){
          msgPill.textContent = "パス？（合法手なし）";
          setStatus("対局中", "AI側に合法手がありません。");
          gameActive = false;
          render();
          return;
        }
        // force queen promotion for AI if needed
        if (m.promotion) m = {...m, promotion:"Q"};
        doMove(m);
      } finally {
        aiThinking = false;
        msgPill.textContent = gameActive ? "プレイ中" : "終局";
        render();
      }
    }, 40);
  }

  function newGame(){
    state = parseFEN("rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1");
    history = [];
    moveText = [];
    lastMove = null;
    selected = -1;
    pendingPromotion = null;
    gameActive = true;
    aiThinking = false;
    refreshLegalMoves();
    msgPill.textContent = "プレイ中";
    setStatus("対局中", "手番: 白");
    render();
    scheduleAiIfNeeded();
  }

  function undo(){
    if (!state) return;
    if (!history.length) return;
    if (aiThinking) return;
    if (pendingPromotion) return;

    // if vs AI: undo until it's human's turn again (so 1 or 2 plies)
    const targetSide = aiSide ? humanSide : null;
    let popped = 0;
    while (history.length){
      state = history.pop();
      popped++;
      if (!aiSide) break;
      if (state.side === targetSide) break;
    }
    moveText.splice(Math.max(0, moveText.length - popped), popped);
    lastMove = null;
    selected = -1;
    pendingPromotion = null;
    gameActive = true;
    refreshLegalMoves();
    msgPill.textContent = "プレイ中";
    setStatus("対局中", `手番: ${state.side === "w" ? "白" : "黒"}`);
    render();
  }

  function setDifficulty(d){
    difficulty = d;
    btnEasy.classList.toggle("active", d==="easy");
    btnNormal.classList.toggle("active", d==="normal");
    btnHard.classList.toggle("active", d==="hard");
    pickEasy.classList.toggle("active", d==="easy");
    pickNormal.classList.toggle("active", d==="normal");
    pickHard.classList.toggle("active", d==="hard");
    setPills();
  }

  function setSides(humanPick){ // "w" / "b" / "human"
    if (humanPick === "human"){
      aiSide = null;
      humanSide = "w";
    } else {
      humanSide = humanPick;
      aiSide = opp(humanSide);
    }
    pickWhite.classList.toggle("active", humanPick==="w");
    pickBlack.classList.toggle("active", humanPick==="b");
    pickHuman.classList.toggle("active", humanPick==="human");
    btnVsHuman.classList.toggle("active", !aiSide);
    setPills();
  }

  function buildBoard(){
    boardEl.innerHTML = "";
    for (let disp=0; disp<64; disp++){
      const real = displayToIndex(disp);
      const [r,c] = rc(real);
      const isDark = (r+c)%2===1;
      const dr = Math.floor(disp/8);
      const dc = disp%8;
      const sq = document.createElement("div");
      sq.className = `sq ${isDark ? "dark" : "light"}`;
      sq.dataset.disp = String(disp);
      const pieceSpan = document.createElement("span");
      sq.appendChild(pieceSpan);
      // coords: show only at edges for readability
      const showFile = dr === 7; // bottom rank in display
      const showRank = dc === 0; // left file in display
      if (showFile){
        const file = document.createElement("div");
        file.className = "coord file";
        file.textContent = String.fromCharCode(97+c);
        sq.appendChild(file);
      }
      if (showRank){
        const rank = document.createElement("div");
        rank.className = "coord rank";
        rank.textContent = String(8-r);
        sq.appendChild(rank);
      }
      sq.addEventListener("click", () => {
        const d = Number(sq.dataset.disp);
        const idxReal = displayToIndex(d);
        onSquareClick(idxReal);
      });
      boardEl.appendChild(sq);
    }
  }

  // wire controls
  btnNew.addEventListener("click", () => { startOverlay.style.display = "flex"; });
  btnUndo.addEventListener("click", undo);
  btnFlip.addEventListener("click", () => { flipped = !flipped; buildBoard(); render(); });
  btnEasy.addEventListener("click", () => setDifficulty("easy"));
  btnNormal.addEventListener("click", () => setDifficulty("normal"));
  btnHard.addEventListener("click", () => setDifficulty("hard"));
  btnVsHuman.addEventListener("click", () => setSides(aiSide ? "human" : humanSide));

  pickWhite.addEventListener("click", () => setSides("w"));
  pickBlack.addEventListener("click", () => setSides("b"));
  pickHuman.addEventListener("click", () => setSides("human"));
  pickEasy.addEventListener("click", () => setDifficulty("easy"));
  pickNormal.addEventListener("click", () => setDifficulty("normal"));
  pickHard.addEventListener("click", () => setDifficulty("hard"));

  btnStart.addEventListener("click", () => {
    startOverlay.style.display = "none";
    newGame();
  });

  chkHints.addEventListener("change", render);
  fenPill.addEventListener("click", async () => {
    if (!state) return;
    const fen = toFEN(state);
    try{
      await navigator.clipboard.writeText(fen);
      msgPill.textContent = "FENをコピーしました";
      setTimeout(()=>{ msgPill.textContent = gameActive ? (aiThinking ? "AI思考中…" : "プレイ中") : "終局"; }, 900);
    } catch {
      msgPill.textContent = "コピーできませんでした";
    }
  });

  // init overlay defaults
  setSides("w");
  setDifficulty("normal");
  buildBoard();
  setPills();
  msgPill.textContent = "準備中…";
  </script>
</body>
</html>
