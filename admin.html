<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | hide Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<style>
  :root {
    --primary: #00f0ff;
    --secondary: #ff00aa;
    --accent: #7700ff;
    --bg: #050510;
    --card-bg: rgba(255,255,255,0.04);
    --sidebar-w: 220px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: #e0e0ff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ─── LOGIN ─── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,240,255,0.06) 0%, transparent 60%);
  }
  .login-box {
    width: 380px; background: var(--card-bg);
    border: 1px solid rgba(0,240,255,0.15);
    border-radius: 24px; padding: 48px 40px;
    backdrop-filter: blur(20px);
  }
  .login-logo {
    text-align: center; font-size: 2rem; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .login-sub { text-align: center; color: #556; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 36px; }
  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 0.75rem; letter-spacing: 2px; color: var(--primary); margin-bottom: 8px; }
  .login-field input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    color: #e0e0ff; font-size: 0.95rem;
    transition: border-color .3s;
  }
  .login-field input:focus { outline: none; border-color: var(--primary); }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none; border-radius: 50px; color: #fff;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    margin-top: 8px; transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-btn:disabled { opacity: .4; cursor: not-allowed; }
  .login-error { color: #ff6688; font-size: 0.82rem; margin-top: 12px; text-align: center; min-height: 20px; }

  /* ─── ADMIN LAYOUT ─── */
  #admin-screen { display: none; }
  .admin-layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); background: rgba(0,0,0,0.4);
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; padding: 32px 0;
    position: fixed; top: 0; left: 0; height: 100vh;
    backdrop-filter: blur(20px);
  }
  .sidebar-logo {
    font-size: 1.2rem; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    padding: 0 24px; margin-bottom: 8px;
  }
  .sidebar-subtitle { font-size: 0.68rem; color: #445; letter-spacing: 2px; padding: 0 24px; margin-bottom: 32px; }
  .sidebar-nav { list-style: none; flex: 1; }
  .sidebar-nav li a {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; color: #778; text-decoration: none;
    font-size: 0.88rem; transition: color .2s, background .2s;
    cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-nav li a:hover { color: var(--primary); background: rgba(0,240,255,0.05); }
  .sidebar-nav li a.active { color: var(--primary); background: rgba(0,240,255,0.08); border-right: 2px solid var(--primary); }
  .sidebar-nav li a .nav-icon { font-size: 1.1rem; }
  .sidebar-logout {
    padding: 12px 24px; color: #556; font-size: 0.82rem;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: color .2s;
  }
  .sidebar-logout:hover { color: var(--secondary); }

  .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }
  .page-header { margin-bottom: 32px; }
  .page-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
  .page-sub { color: #556; font-size: 0.85rem; }

  /* ─── TABS ─── */
  .tab { display: none; }
  .tab.active { display: block; }

  /* ─── CARDS ─── */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 24px;
    backdrop-filter: blur(10px);
  }

  /* ─── TOOLBAR ─── */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .btn-primary {
    padding: 10px 24px; background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none; border-radius: 50px; color: #fff; font-size: 0.88rem;
    font-weight: 700; cursor: pointer; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-sm {
    padding: 6px 14px; border-radius: 20px; font-size: 0.78rem;
    font-weight: 600; cursor: pointer; border: none; transition: opacity .2s;
  }
  .btn-sm:hover { opacity: .8; }
  .btn-edit { background: rgba(0,240,255,0.15); color: var(--primary); }
  .btn-delete { background: rgba(255,0,100,0.15); color: #ff6688; }
  .btn-toggle { background: rgba(119,0,255,0.15); color: #bb88ff; }

  /* ─── TABLE ─── */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; font-size: 0.72rem; letter-spacing: 2px;
    text-transform: uppercase; color: #445; padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .data-table td {
    padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 0.88rem; vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }
  .badge {
    font-size: 0.68rem; padding: 3px 10px; border-radius: 50px;
    font-weight: 600; letter-spacing: 1px;
  }
  .badge-published { background: rgba(0,240,255,0.1); color: var(--primary); }
  .badge-draft { background: rgba(255,255,255,0.06); color: #556; }
  .badge-unread { background: rgba(255,0,170,0.1); color: var(--secondary); }
  .badge-read { background: rgba(255,255,255,0.06); color: #445; }
  .td-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .empty-state { text-align: center; color: #445; padding: 48px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: min(640px, 92vw); background: #0a0a1e;
    border: 1px solid rgba(0,240,255,0.2);
    border-radius: 20px; padding: 36px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform .3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
  .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
  .btn-cancel {
    padding: 10px 24px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
    color: #aab; cursor: pointer; font-size: 0.88rem;
  }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.3); }

  /* ─── FORM FIELDS ─── */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 0.75rem; letter-spacing: 2px; color: var(--primary); margin-bottom: 8px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    color: #e0e0ff; font-size: 0.9rem; font-family: inherit;
    transition: border-color .3s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--primary); }
  .field textarea { height: 140px; resize: vertical; }
  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }
  .field-check { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .field-check input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--primary); }
  .field-check span { font-size: 0.9rem; }

  /* ─── STATS ─── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-mini {
    background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 20px 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-mini-num {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-mini-label { font-size: 0.75rem; color: #556; letter-spacing: 1px; }
  .chart-placeholder {
    background: rgba(0,240,255,0.03); border: 1px dashed rgba(0,240,255,0.1);
    border-radius: 12px; height: 200px;
    display: flex; align-items: center; justify-content: center;
    color: #334; font-size: 0.85rem;
  }

  /* ─── MOBILE ─── */
  @media (max-width: 700px) {
    .sidebar { width: 100%; height: auto; position: static; flex-direction: row; padding: 12px 0; overflow-x: auto; }
    .sidebar-logo, .sidebar-subtitle, .sidebar-logout { display: none; }
    .sidebar-nav { display: flex; flex: none; }
    .sidebar-nav li a { padding: 8px 16px; border-right: none; border-bottom: 2px solid transparent; }
    .sidebar-nav li a.active { border-bottom: 2px solid var(--primary); border-right: none; }
    .admin-layout { flex-direction: column; }
    .main-content { margin-left: 0; padding: 20px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ADMIN</div>
    <div class="login-sub">hide portfolio 管理画面</div>
    <div class="login-field">
      <label>メールアドレス</label>
      <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="login-btn">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <div class="admin-layout">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-logo">hide</div>
      <div class="sidebar-subtitle">管理画面</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-link active" data-tab="posts"><span class="nav-icon">📝</span>記事管理</a></li>
        <li><a href="#" class="nav-link" data-tab="contacts"><span class="nav-icon">✉️</span>お問い合わせ</a></li>
        <li><a href="#" class="nav-link" data-tab="stats"><span class="nav-icon">📊</span>アクセス統計</a></li>
      </ul>
      <button class="sidebar-logout" id="logout-btn">🚪 ログアウト</button>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- POSTS TAB -->
      <div class="tab active" id="tab-posts">
        <div class="page-header">
          <h1 class="page-title">記事管理</h1>
          <p class="page-sub">ブログ記事の作成・編集・削除</p>
        </div>
        <div class="card">
          <div class="toolbar">
            <span id="posts-count" style="color:#556;font-size:0.85rem;"></span>
            <button class="btn-primary" id="btn-new-post">＋ 新規作成</button>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>タイトル</th>
                <th>タグ</th>
                <th>状態</th>
                <th>作成日</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="posts-tbody">
              <tr><td colspan="5" class="empty-state">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- CONTACTS TAB -->
      <div class="tab" id="tab-contacts">
        <div class="page-header">
          <h1 class="page-title">お問い合わせ</h1>
          <p class="page-sub">受信したメッセージ一覧</p>
        </div>
        <div class="card">
          <table class="data-table">
            <thead>
              <tr>
                <th>名前</th>
                <th>メール</th>
                <th>メッセージ</th>
                <th>受信日</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="contacts-tbody">
              <tr><td colspan="5" class="empty-state">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- STATS TAB -->
      <div class="tab" id="tab-stats">
        <div class="page-header">
          <h1 class="page-title">アクセス統計</h1>
          <p class="page-sub">訪問者数の推移</p>
        </div>
        <div class="stats-row" id="stats-row">
          <div class="stat-mini"><div class="stat-mini-num" id="s-total">—</div><div class="stat-mini-label">総アクセス数</div></div>
          <div class="stat-mini"><div class="stat-mini-num" id="s-today">—</div><div class="stat-mini-label">本日</div></div>
          <div class="stat-mini"><div class="stat-mini-num" id="s-week">—</div><div class="stat-mini-label">今週</div></div>
          <div class="stat-mini"><div class="stat-mini-num" id="s-contacts">—</div><div class="stat-mini-label">お問い合わせ数</div></div>
        </div>
        <div class="card">
          <div class="chart-placeholder" id="chart-area">Supabaseの接続設定後、訪問者グラフが表示されます</div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- POST EDIT MODAL -->
<div class="modal-overlay" id="post-modal">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">記事を作成</h2>
    <input type="hidden" id="edit-post-id">
    <div class="field">
      <label>タイトル</label>
      <input type="text" id="edit-title" placeholder="記事タイトル">
    </div>
    <div class="field-row">
      <div class="field">
        <label>絵文字</label>
        <input type="text" id="edit-emoji" placeholder="📝" maxlength="2">
      </div>
      <div class="field">
        <label>タグ（カンマ区切り）</label>
        <input type="text" id="edit-tags" placeholder="JavaScript, Game Dev">
      </div>
    </div>
    <div class="field">
      <label>概要（excerpt）</label>
      <textarea id="edit-excerpt" placeholder="記事の概要を入力してください..."></textarea>
    </div>
    <div class="field">
      <label>本文（content）</label>
      <textarea id="edit-content" style="height:200px;" placeholder="記事の本文（Markdown可）..."></textarea>
    </div>
    <label class="field-check">
      <input type="checkbox" id="edit-published">
      <span>公開する（チェックなしは下書き保存）</span>
    </label>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="btn-primary" id="modal-save">保存する</button>
    </div>
  </div>
</div>

<script src="js/blog-admin.js"></script>
<script>
// ─── AUTH ─────────────────────────────────────────────────────────────────────
const loginScreen = document.getElementById('login-screen');
const adminScreen = document.getElementById('admin-screen');

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showAdmin();
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true; errEl.textContent = '';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'ログインに失敗しました: ' + error.message;
    btn.disabled = false;
  } else {
    showAdmin();
  }
}

function showAdmin() {
  loginScreen.style.display = 'none';
  adminScreen.style.display = 'block';
  loadPosts();
}

document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.reload();
});

// ─── NAV TABS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    link.classList.add('active');
    const tab = document.getElementById('tab-' + link.dataset.tab);
    if (tab) tab.classList.add('active');
    if (link.dataset.tab === 'contacts') loadContacts();
    if (link.dataset.tab === 'stats') loadStats();
  });
});

// ─── STATS ────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);

    const [totalRes, todayRes, weekRes, cntRes] = await Promise.all([
      supabase.from('visits').select('id', { count: 'exact', head: true }),
      supabase.from('visits').select('id', { count: 'exact', head: true }).gte('visited_at', today),
      supabase.from('visits').select('id', { count: 'exact', head: true }).gte('visited_at', weekAgo),
      supabase.from('contacts').select('id', { count: 'exact', head: true }),
    ]);
    document.getElementById('s-total').textContent = (totalRes.count ?? 0).toLocaleString();
    document.getElementById('s-today').textContent = (todayRes.count ?? 0).toLocaleString();
    document.getElementById('s-week').textContent = (weekRes.count ?? 0).toLocaleString();
    document.getElementById('s-contacts').textContent = (cntRes.count ?? 0).toLocaleString();
  } catch (e) {
    document.getElementById('s-total').textContent = '—';
  }
}

// ─── CONTACTS ─────────────────────────────────────────────────────────────────
async function loadContacts() {
  const tbody = document.getElementById('contacts-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty-state">読み込み中...</td></tr>';
  try {
    const { data, error } = await supabase.from('contacts').select('*').order('created_at', { ascending: false }).limit(50);
    if (error) throw error;
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">まだお問い合わせはありません</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(c => `
      <tr>
        <td>${escHtml(c.name)}</td>
        <td style="color:var(--primary)">${escHtml(c.email)}</td>
        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(c.message)}</td>
        <td style="color:#556">${new Date(c.created_at).toLocaleDateString('ja-JP')}</td>
        <td><span class="badge ${c.read ? 'badge-read' : 'badge-unread'}" style="cursor:pointer" onclick="toggleRead('${c.id}', ${c.read})">${c.read ? '既読' : '未読'}</span></td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">読み込みに失敗しました</td></tr>';
  }
}

async function toggleRead(id, currentRead) {
  await supabase.from('contacts').update({ read: !currentRead }).eq('id', id);
  loadContacts();
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

checkSession();
</script>
</body>
</html>
