<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      background: #0d0d1a;
      color: #ccd;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,200,255,0.2);
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #7ee8ff;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .dot.active {
      background: #ff4444;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.5); }
      50% { box-shadow: 0 0 0 5px rgba(255,68,68,0); }
    }
    label {
      display: block;
      font-size: 11px;
      color: #889;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }
    input[type="password"], select {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 7px;
      color: #ccd;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: rgba(0,200,255,0.6);
    }
    select option { background: #1a1a2e; }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    #startBtn {
      border: 1px solid rgba(0,200,255,0.5);
      background: rgba(0,200,255,0.08);
      color: #7ee8ff;
    }
    #startBtn:hover:not(:disabled) {
      background: rgba(0,200,255,0.2);
    }
    #startBtn.recording {
      border-color: rgba(255,80,80,0.5);
      background: rgba(255,80,80,0.1);
      color: #ff9999;
    }
    #stopBtn {
      border: 1px solid rgba(255,100,100,0.35);
      background: transparent;
      color: #ff9999;
    }
    #stopBtn:hover:not(:disabled) {
      background: rgba(255,100,100,0.12);
    }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 11px;
      color: #889;
      text-align: center;
      min-height: 16px;
    }
    #status.error { color: #ff8888; }
    #status.ok { color: #7ee8ff; }
    .note {
      margin-top: 14px;
      padding: 8px 10px;
      background: rgba(255,200,0,0.06);
      border: 1px solid rgba(255,200,0,0.2);
      border-radius: 6px;
      font-size: 11px;
      color: #bba;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>Teams Transcriber</h1>
  </div>

  <label>OpenAI APIキー</label>
  <input type="password" id="apiKey" placeholder="sk-...">

  <label>文字起こし言語</label>
  <select id="language">
    <option value="ja">日本語</option>
    <option value="en">English</option>
    <option value="zh">中文</option>
    <option value="ko">한국어</option>
  </select>

  <div class="btn-row">
    <button id="startBtn">開始</button>
    <button id="stopBtn" disabled>停止</button>
  </div>

  <div id="status">Teams会議タブで開いて使用してください</div>

  <div class="note">
    約10秒ごとに音声をWhisper APIへ送信します。<br>
    「要約保存」ボタンでGPT-4o miniによる要約＋全文をテキストファイルに保存します。<br>
    APIキーはローカルにのみ保存されます。
  </div>

  <script src="popup.js"></script>
</body>
</html>
