<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Anti-Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6L12 2z" fill="currentColor"/>
        <path d="M10 12.5l2 2 4-4" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="app-name">Anti-Tracker</span>
    </header>

    <div class="current-site-card">
      <div class="site-label">現在のサイト</div>
      <div class="site-domain" id="domain">—</div>
      <button class="toggle-btn" id="toggleBtn" disabled>
        <span id="toggleText">読み込み中...</span>
      </button>
    </div>

    <div class="whitelist-section" id="whitelistSection" style="display:none">
      <div class="section-header">
        <span>許可リスト</span>
        <span class="badge" id="whitelistCount">0</span>
      </div>
      <ul class="whitelist-items" id="whitelistItems"></ul>
    </div>

    <div class="footer">
      <span id="statusText">保護中</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
