<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Anti-Tracker アイコン生成</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #111827; color: #e5e7eb; }
    h2 { margin-bottom: 16px; }
    .previews { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; }
    .preview-item { text-align: center; }
    .preview-item span { display: block; font-size: 11px; color: #9ca3af; margin-top: 6px; }
    button {
      padding: 10px 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #6d28d9; }
    p { color: #9ca3af; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>Anti-Tracker — アイコン生成</h2>
  <div class="previews" id="previews"></div>
  <button onclick="downloadAll()">3サイズを一括ダウンロード</button>
  <p>ダウンロードしたファイルを <code>tracker-blocker/icons/</code> フォルダに配置してください。</p>

  <script>
    const SIZES = [16, 48, 128];
    const BG = '#7c3aed';
    const SHIELD = '#e0d9ff';
    const CHECK = '#a78bfa';

    function drawShield(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = size / 24;

      ctx.fillStyle = BG;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();

      // Shield path scaled from viewBox 24x24
      ctx.fillStyle = SHIELD;
      ctx.beginPath();
      ctx.moveTo(12 * s, 2 * s);
      ctx.lineTo(3 * s, 6 * s);
      ctx.lineTo(3 * s, 12 * s);
      ctx.bezierCurveTo(3 * s, 17.25 * s, 6.75 * s, 22.15 * s, 12 * s, 23.25 * s);
      ctx.bezierCurveTo(17.25 * s, 22.15 * s, 21 * s, 17.25 * s, 21 * s, 12 * s);
      ctx.lineTo(21 * s, 6 * s);
      ctx.closePath();
      ctx.fill();

      // Checkmark
      if (size >= 16) {
        ctx.strokeStyle = CHECK;
        ctx.lineWidth = 1.6 * s;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(8.5 * s, 12 * s);
        ctx.lineTo(10.8 * s, 14.3 * s);
        ctx.lineTo(15.5 * s, 9.5 * s);
        ctx.stroke();
      }

      return canvas;
    }

    const previews = document.getElementById('previews');
    SIZES.forEach(size => {
      const canvas = drawShield(size);
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.appendChild(canvas);
      const label = document.createElement('span');
      label.textContent = `${size}×${size}`;
      item.appendChild(label);
      previews.appendChild(item);
    });

    function downloadAll() {
      SIZES.forEach(size => {
        const canvas = drawShield(size);
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `icon${size}.png`;
        a.click();
      });
    }
  </script>
</body>
</html>
