<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヘックス | Hex Board Game</title>
<meta name="description" content="六角形のマスをつないで自分の辺同士をつなげるボードゲーム、ヘックスをCPUと対戦できます。">
<style>
  :root {
    --bg: #f4efe5;
    --panel: rgba(255, 252, 244, 0.9);
    --ink: #263028;
    --muted: #6f756d;
    --line: #d4c4aa;
    --board: #e8d1a8;
    --cell: #fff8ea;
    --player: #426f8f;
    --cpu: #b46445;
    --accent: #7c8f58;
    --shadow: 0 18px 48px rgba(72, 52, 30, 0.18);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 10%, rgba(124, 143, 88, 0.18), transparent 30%),
      radial-gradient(circle at 88% 20%, rgba(180, 100, 69, 0.12), transparent 26%),
      linear-gradient(145deg, #fff8eb 0%, var(--bg) 58%, #e8dcc9 100%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  header {
    width: min(1120px, calc(100% - 28px));
    margin: 0 auto;
    padding: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    color: var(--ink);
    font-weight: 900;
    letter-spacing: 0.02em;
    text-decoration: none;
  }

  .back-link {
    color: var(--player);
    border: 1px solid rgba(66, 111, 143, 0.32);
    border-radius: 999px;
    padding: 7px 13px;
    background: rgba(255, 255, 255, 0.48);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 800;
  }

  main {
    width: min(1120px, calc(100% - 28px));
    margin: 0 auto;
    padding: 10px 0 34px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    margin-bottom: 16px;
  }

  .eyebrow {
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  h1 {
    font-size: clamp(1.9rem, 4vw, 3.35rem);
    line-height: 1.08;
    letter-spacing: 0;
  }

  .hero p {
    color: var(--muted);
    max-width: 700px;
    line-height: 1.75;
    margin-top: 10px;
  }

  .score-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(112px, 1fr));
    gap: 10px;
    min-width: 380px;
    width: 100%;
  }

  .score-box {
    background: var(--panel);
    border: 1px solid rgba(132, 104, 64, 0.22);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: 0 8px 20px rgba(72, 52, 30, 0.08);
  }

  .score-label {
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .score-value {
    font-size: 1.35rem;
    font-weight: 900;
  }

  .player-value { color: var(--player); }
  .cpu-value { color: var(--cpu); }

  .game-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 292px;
    gap: 18px;
    align-items: start;
  }

  .board-panel,
  .side-panel {
    min-width: 0;
    background: var(--panel);
    border: 1px solid rgba(132, 104, 64, 0.24);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .board-panel {
    padding: 18px;
    overflow: hidden;
  }

  #gameCanvas {
    width: 100%;
    max-width: 100%;
    aspect-ratio: 1 / 0.82;
    display: block;
    border-radius: var(--radius);
    background:
      linear-gradient(90deg, rgba(91, 67, 35, 0.07) 1px, transparent 1px),
      linear-gradient(0deg, rgba(91, 67, 35, 0.07) 1px, transparent 1px),
      #fff8e8;
    background-size: 32px 32px;
    cursor: pointer;
    touch-action: none;
  }

  .side-panel {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .status {
    min-height: 82px;
    border: 1px solid rgba(124, 143, 88, 0.28);
    border-radius: var(--radius);
    background: rgba(124, 143, 88, 0.10);
    padding: 13px 14px;
    line-height: 1.55;
    font-weight: 800;
  }

  .legend {
    display: grid;
    gap: 8px;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.84rem;
    font-weight: 800;
  }

  .swatch {
    width: 18px;
    height: 18px;
    clip-path: polygon(25% 6%, 75% 6%, 100% 50%, 75% 94%, 25% 94%, 0 50%);
  }

  .swatch.player { background: var(--player); }
  .swatch.cpu { background: var(--cpu); }

  .controls {
    display: grid;
    gap: 10px;
  }

  label {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 900;
  }

  select,
  button {
    width: 100%;
    border-radius: var(--radius);
    font: inherit;
  }

  select {
    border: 1px solid rgba(132, 104, 64, 0.30);
    background: #fffaf0;
    color: var(--ink);
    padding: 10px 12px;
    font-weight: 800;
  }

  .btn {
    border: 0;
    padding: 11px 14px;
    background: var(--player);
    color: #fff;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, filter 0.15s;
  }

  .btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn.secondary { background: #82623b; }

  .rules {
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.75;
  }

  .rules strong { color: var(--ink); }

  @media (max-width: 880px) {
    .hero,
    .game-shell {
      grid-template-columns: 1fr;
    }

    .hero > *,
    .game-shell > * {
      min-width: 0;
    }

    .score-strip {
      min-width: 0;
    }
  }

  @media (max-width: 520px) {
    header {
      align-items: flex-start;
      flex-direction: column;
    }

    .score-strip {
      grid-template-columns: 1fr 1fr;
    }

    .score-box:last-child {
      grid-column: 1 / -1;
    }

    .board-panel,
    .side-panel {
      padding: 12px;
    }

    #gameCanvas {
      width: calc(100vw - 54px);
    }
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html">hide の部屋</a>
  <a class="back-link" href="index.html#works">ゲーム一覧へ戻る / Back</a>
</header>

<main>
  <section class="hero">
    <div>
      <div class="eyebrow">Connection Board Game / Canvas API</div>
      <h1>ヘックス<br>Hex Board Game</h1>
      <p>六角形のマスを交互に埋めて、自分の担当する辺同士をつなげるボードゲームです。あなたは左と右、CPUは上と下をつなぐと勝利です。</p>
    </div>
    <div class="score-strip" aria-live="polite">
      <div class="score-box">
        <div class="score-label">あなた / You</div>
        <div class="score-value player-value" id="playerCount">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">CPU</div>
        <div class="score-value cpu-value" id="cpuCount">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">空き / Open</div>
        <div class="score-value" id="openCount">81</div>
      </div>
    </div>
  </section>

  <section class="game-shell">
    <div class="board-panel">
      <canvas id="gameCanvas" width="820" height="672" aria-label="ヘックスの盤面"></canvas>
    </div>

    <aside class="side-panel">
      <div class="status" id="statusText">あなたの番です。空いている六角形を選んでください。</div>
      <div class="legend" aria-label="色の説明">
        <span><i class="swatch player"></i>あなた: 左 ↔ 右</span>
        <span><i class="swatch cpu"></i>CPU: 上 ↕ 下</span>
      </div>
      <div class="controls">
        <label for="sizeSelect">盤面サイズ / Board Size</label>
        <select id="sizeSelect">
          <option value="7">7 x 7</option>
          <option value="9" selected>9 x 9</option>
          <option value="11">11 x 11</option>
        </select>
        <label for="difficultySelect">CPU難易度 / CPU Level</label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <button class="btn" id="newGameBtn">新しいゲーム / New Game</button>
        <button class="btn secondary" id="hintBtn">ヒント / Hint</button>
      </div>
      <p class="rules"><strong>ルール:</strong> ヘックスに引き分けはありません。相手の道を止めつつ、自分の辺同士を六角形の連なりでつなげましょう。</p>
    </aside>
  </section>
</main>

<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const playerCountEl = document.getElementById('playerCount');
const cpuCountEl = document.getElementById('cpuCount');
const openCountEl = document.getElementById('openCount');
const statusText = document.getElementById('statusText');
const sizeSelect = document.getElementById('sizeSelect');
const difficultySelect = document.getElementById('difficultySelect');
const newGameBtn = document.getElementById('newGameBtn');
const hintBtn = document.getElementById('hintBtn');

const EMPTY = 0;
const PLAYER = 1;
const CPU = 2;
const DIRS = [[1, 0], [-1, 0], [0, 1], [0, -1], [1, -1], [-1, 1]];
const COLORS = {
  empty: '#fff8ea',
  edge: '#9f8560',
  dot: '#6f5d42',
  player: '#426f8f',
  cpu: '#b46445',
  playerSoft: 'rgba(66, 111, 143, 0.18)',
  cpuSoft: 'rgba(180, 100, 69, 0.18)',
  hint: '#7c8f58',
  text: '#263028'
};

let size = 9;
let board = [];
let current = PLAYER;
let gameOver = false;
let cpuThinking = false;
let hintCell = null;

function newBoard(n) {
  return Array.from({ length: n }, () => Array.from({ length: n }, () => EMPTY));
}

function resetGame() {
  size = Number(sizeSelect.value);
  board = newBoard(size);
  current = PLAYER;
  gameOver = false;
  cpuThinking = false;
  hintCell = null;
  setStatus('あなたの番です。空いている六角形を選んでください。');
  updateCounts();
  draw();
}

function layout() {
  const w = canvas.width;
  const h = canvas.height;
  const rByW = w / (Math.sqrt(3) * (size + (size - 1) / 2) + 2.7);
  const rByH = h / (1.5 * (size - 1) + 2.7);
  const radius = Math.min(rByW, rByH);
  const hexW = Math.sqrt(3) * radius;
  const boardW = hexW * (size + (size - 1) / 2);
  const boardH = radius * (1.5 * (size - 1) + 2);
  const startX = (w - boardW) / 2 + hexW / 2;
  const startY = (h - boardH) / 2 + radius;
  return { radius, hexW, startX, startY };
}

function cellCenter(row, col) {
  const m = layout();
  return {
    x: m.startX + m.hexW * (col + row / 2),
    y: m.startY + m.radius * 1.5 * row
  };
}

function hexPath(x, y, radius) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const px = x + radius * Math.cos(angle);
    const py = y + radius * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff8e8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGoalBands();

  const m = layout();
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const center = cellCenter(r, c);
      const value = board[r][c];
      const isHint = hintCell && hintCell.r === r && hintCell.c === c && value === EMPTY;
      hexPath(center.x, center.y, m.radius * 0.92);
      ctx.fillStyle = value === PLAYER ? COLORS.player : value === CPU ? COLORS.cpu : isHint ? '#e9edda' : COLORS.empty;
      ctx.fill();
      ctx.lineWidth = isHint ? 4 : 2;
      ctx.strokeStyle = isHint ? COLORS.hint : COLORS.edge;
      ctx.stroke();

      if (value !== EMPTY) {
        ctx.fillStyle = 'rgba(255,255,255,0.82)';
        ctx.font = `900 ${Math.max(13, m.radius * 0.65)}px Segoe UI, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(value === PLAYER ? 'Y' : 'C', center.x, center.y + 1);
      }
    }
  }
}

function drawGoalBands() {
  const first = cellCenter(0, 0);
  const last = cellCenter(size - 1, size - 1);
  const m = layout();
  ctx.save();
  ctx.globalAlpha = 0.38;
  ctx.lineWidth = Math.max(10, m.radius * 0.48);
  ctx.lineCap = 'round';

  ctx.strokeStyle = COLORS.cpu;
  ctx.beginPath();
  ctx.moveTo(first.x - m.hexW * 0.65, first.y - m.radius * 1.1);
  ctx.lineTo(cellCenter(0, size - 1).x + m.hexW * 0.65, cellCenter(0, size - 1).y - m.radius * 1.1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cellCenter(size - 1, 0).x - m.hexW * 0.65, cellCenter(size - 1, 0).y + m.radius * 1.1);
  ctx.lineTo(last.x + m.hexW * 0.65, last.y + m.radius * 1.1);
  ctx.stroke();

  ctx.strokeStyle = COLORS.player;
  ctx.beginPath();
  ctx.moveTo(first.x - m.hexW * 0.9, first.y - m.radius * 0.45);
  ctx.lineTo(cellCenter(size - 1, 0).x - m.hexW * 0.9, cellCenter(size - 1, 0).y + m.radius * 0.45);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cellCenter(0, size - 1).x + m.hexW * 0.9, cellCenter(0, size - 1).y - m.radius * 0.45);
  ctx.lineTo(last.x + m.hexW * 0.9, last.y + m.radius * 0.45);
  ctx.stroke();
  ctx.restore();
}

function setStatus(text) {
  statusText.textContent = text;
}

function updateCounts() {
  let player = 0;
  let cpu = 0;
  let open = 0;
  for (const row of board) {
    for (const value of row) {
      if (value === PLAYER) player++;
      else if (value === CPU) cpu++;
      else open++;
    }
  }
  playerCountEl.textContent = player;
  cpuCountEl.textContent = cpu;
  openCountEl.textContent = open;
}

function neighbors(row, col) {
  const list = [];
  for (const [dr, dc] of DIRS) {
    const r = row + dr;
    const c = col + dc;
    if (r >= 0 && r < size && c >= 0 && c < size) list.push({ r, c });
  }
  return list;
}

function hasWon(player) {
  const queue = [];
  const seen = new Set();
  if (player === PLAYER) {
    for (let r = 0; r < size; r++) {
      if (board[r][0] === PLAYER) queue.push({ r, c: 0 });
    }
    while (queue.length) {
      const cell = queue.shift();
      const key = cell.r + ',' + cell.c;
      if (seen.has(key)) continue;
      seen.add(key);
      if (cell.c === size - 1) return true;
      for (const n of neighbors(cell.r, cell.c)) {
        if (board[n.r][n.c] === PLAYER) queue.push(n);
      }
    }
  } else {
    for (let c = 0; c < size; c++) {
      if (board[0][c] === CPU) queue.push({ r: 0, c });
    }
    while (queue.length) {
      const cell = queue.shift();
      const key = cell.r + ',' + cell.c;
      if (seen.has(key)) continue;
      seen.add(key);
      if (cell.r === size - 1) return true;
      for (const n of neighbors(cell.r, cell.c)) {
        if (board[n.r][n.c] === CPU) queue.push(n);
      }
    }
  }
  return false;
}

function availableCells() {
  const cells = [];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] === EMPTY) cells.push({ r, c });
    }
  }
  return cells;
}

function place(row, col, player) {
  if (gameOver || board[row][col] !== EMPTY) return false;
  hintCell = null;
  board[row][col] = player;
  updateCounts();
  draw();

  if (hasWon(player)) {
    gameOver = true;
    cpuThinking = false;
    setStatus(player === PLAYER ? 'あなたの勝ちです。左と右がつながりました。' : 'CPUの勝ちです。上と下がつながりました。');
    return true;
  }

  current = player === PLAYER ? CPU : PLAYER;
  setStatus(current === PLAYER ? 'あなたの番です。空いている六角形を選んでください。' : 'CPUが考えています...');
  if (current === CPU) scheduleCpu();
  return true;
}

function clickToCell(event) {
  const rect = canvas.getBoundingClientRect();
  const src = event.touches ? event.touches[0] : event;
  const x = (src.clientX - rect.left) * (canvas.width / rect.width);
  const y = (src.clientY - rect.top) * (canvas.height / rect.height);
  const m = layout();
  let best = null;
  let bestDist = Infinity;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] !== EMPTY) continue;
      const center = cellCenter(r, c);
      const dist = Math.hypot(x - center.x, y - center.y);
      if (dist < bestDist) {
        bestDist = dist;
        best = { r, c };
      }
    }
  }
  return bestDist <= m.radius * 0.95 ? best : null;
}

function chooseCpuMove() {
  const moves = availableCells();
  if (!moves.length) return null;

  const winNow = findWinningMove(CPU);
  if (winNow) return winNow;
  const block = findWinningMove(PLAYER);
  if (block && difficultySelect.value !== 'easy') return block;

  const level = difficultySelect.value;
  if (level === 'easy') return moves[Math.floor(Math.random() * moves.length)];

  const scored = moves.map(cell => ({ cell, score: scoreMove(cell, CPU) - scoreMove(cell, PLAYER) * (level === 'hard' ? 0.82 : 0.45) }));
  scored.sort((a, b) => b.score - a.score);
  const pickCount = level === 'hard' ? 2 : 5;
  const pool = scored.slice(0, Math.min(pickCount, scored.length));
  return pool[Math.floor(Math.random() * pool.length)].cell;
}

function findWinningMove(player) {
  for (const cell of availableCells()) {
    board[cell.r][cell.c] = player;
    const won = hasWon(player);
    board[cell.r][cell.c] = EMPTY;
    if (won) return cell;
  }
  return null;
}

function scoreMove(cell, player) {
  let score = 0;
  const center = (size - 1) / 2;
  const own = player;
  const enemy = player === PLAYER ? CPU : PLAYER;
  const axisDistance = player === CPU ? Math.abs(cell.c - center) : Math.abs(cell.r - center);
  score += (size - axisDistance) * 1.7;

  for (const n of neighbors(cell.r, cell.c)) {
    if (board[n.r][n.c] === own) score += 5.4;
    if (board[n.r][n.c] === enemy) score += 2.2;
  }

  if (player === CPU) {
    if (cell.r === 0 || cell.r === size - 1) score += 2.5;
    score += cell.r / Math.max(1, size - 1);
  } else {
    if (cell.c === 0 || cell.c === size - 1) score += 2.5;
    score += cell.c / Math.max(1, size - 1);
  }

  board[cell.r][cell.c] = player;
  score -= shortestPathCost(player) * (player === own ? 2.2 : 1);
  board[cell.r][cell.c] = EMPTY;
  score += Math.random() * 0.6;
  return score;
}

function shortestPathCost(player) {
  const dist = Array.from({ length: size }, () => Array.from({ length: size }, () => Infinity));
  const queue = [];
  const other = player === PLAYER ? CPU : PLAYER;

  function push(r, c, cost) {
    if (board[r][c] === other) return;
    const add = board[r][c] === player ? 0 : 1;
    const total = cost + add;
    if (total < dist[r][c]) {
      dist[r][c] = total;
      queue.push({ r, c, cost: total });
    }
  }

  if (player === PLAYER) {
    for (let r = 0; r < size; r++) push(r, 0, 0);
  } else {
    for (let c = 0; c < size; c++) push(0, c, 0);
  }

  while (queue.length) {
    queue.sort((a, b) => a.cost - b.cost);
    const cell = queue.shift();
    if (cell.cost !== dist[cell.r][cell.c]) continue;
    if ((player === PLAYER && cell.c === size - 1) || (player === CPU && cell.r === size - 1)) return cell.cost;
    for (const n of neighbors(cell.r, cell.c)) push(n.r, n.c, cell.cost);
  }
  return size * 2;
}

function scheduleCpu() {
  if (gameOver || cpuThinking) return;
  cpuThinking = true;
  window.setTimeout(() => {
    cpuThinking = false;
    if (gameOver || current !== CPU) return;
    const move = chooseCpuMove();
    if (move) place(move.r, move.c, CPU);
  }, 520);
}

function showHint() {
  if (gameOver || current !== PLAYER || cpuThinking) return;
  const win = findWinningMove(PLAYER);
  const block = findWinningMove(CPU);
  if (win) {
    hintCell = win;
    setStatus('ヒント: 勝ちにつながる一手があります。緑の枠のマスを狙いましょう。');
  } else if (block) {
    hintCell = block;
    setStatus('ヒント: CPUの完成を止めるマスがあります。緑の枠のマスでブロックできます。');
  } else {
    const moves = availableCells().map(cell => ({ cell, score: scoreMove(cell, PLAYER) - scoreMove(cell, CPU) * 0.55 }));
    moves.sort((a, b) => b.score - a.score);
    hintCell = moves[0]?.cell || null;
    setStatus('ヒント: 緑の枠のマスが、つながりを伸ばしやすい一手です。');
  }
  draw();
}

canvas.addEventListener('click', event => {
  if (gameOver || cpuThinking || current !== PLAYER) return;
  const cell = clickToCell(event);
  if (cell) place(cell.r, cell.c, PLAYER);
});

canvas.addEventListener('touchstart', event => {
  event.preventDefault();
  if (gameOver || cpuThinking || current !== PLAYER) return;
  const cell = clickToCell(event);
  if (cell) place(cell.r, cell.c, PLAYER);
}, { passive: false });

canvas.addEventListener('mousemove', event => {
  if (gameOver || cpuThinking || current !== PLAYER) {
    canvas.style.cursor = 'default';
    return;
  }
  canvas.style.cursor = clickToCell(event) ? 'pointer' : 'default';
});

newGameBtn.addEventListener('click', resetGame);
hintBtn.addEventListener('click', showHint);
sizeSelect.addEventListener('change', resetGame);
difficultySelect.addEventListener('change', resetGame);

resetGame();
</script>
</body>
</html>
