        function stopTitleBGM(){

        function startTitleBGM(){
          if(!audioCtx||titleBgmPlaying)return;
          stopTitleBGM();
          titleBgmPlaying=true;
          const beatDur=60/138;
          const now=audioCtx.currentTime;
          titleMelCur=now;titleBassCur=now;titleMelIdx=0;titleBassIdx=0;
          function schN(freq,st,dur,wave,vol){
            if(!freq)return;
            const osc=audioCtx.createOscillator();
            osc.type=wave;osc.frequency.value=freq;
            const g=audioCtx.createGain();g.gain.value=vol;
            osc.connect(g);g.connect(masterGain);
            osc.start(st);osc.stop(st+dur);
            titleBgmNodes.push(osc);
          }
          function titleScheduler(){
            if(!titleBgmPlaying)return;
            const n=audioCtx.currentTime;
            while(titleMelCur<n+LOOK){
              if(titleMelIdx>=TITLE_MEL.length)titleMelIdx=0;
              const[f,b]=TITLE_MEL[titleMelIdx];const d=beatDur*b;
              schN(f,titleMelCur,d*0.9,'square',0.14);
              titleMelCur+=d;titleMelIdx++;
            }
            while(titleBassCur<n+LOOK){
              if(titleBassIdx>=TITLE_BASS.length)titleBassIdx=0;
              const[f,b]=TITLE_BASS[titleBassIdx];const d=beatDur*b;
              schN(f,titleBassCur,d*0.95,'sawtooth',0.10);
              titleBassCur+=d;titleBassIdx++;
            }
          }
          titleScheduler();
          titleBgmTimer=setInterval(titleScheduler,TICK*1000);
        }

        function initAudio(){

        // ── SE（効果音）────────────────────────────────────────
        function playSE(type){
          if(!audioCtx) return;
          const now=audioCtx.currentTime;
          function tone(freq,endFreq,wave,dur,vol=0.18){
            const osc=audioCtx.createOscillator();
            const g=audioCtx.createGain();
            osc.type=wave;
            osc.frequency.setValueAtTime(freq,now);
            if(endFreq!==freq) osc.frequency.linearRampToValueAtTime(endFreq,now+dur);
            g.gain.setValueAtTime(vol,now);
            g.gain.exponentialRampToValueAtTime(0.001,now+dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now+dur);
          }
          function toneAt(freq,endFreq,wave,dur,at,vol=0.18){
            const osc=audioCtx.createOscillator();
            const g=audioCtx.createGain();
            osc.type=wave;
            osc.frequency.setValueAtTime(freq,at);
            if(endFreq!==freq) osc.frequency.linearRampToValueAtTime(endFreq,at+dur);
            g.gain.setValueAtTime(vol,at);
            g.gain.exponentialRampToValueAtTime(0.001,at+dur);
            osc.connect(g); g.connect(masterGain);
            osc.start(at); osc.stop(at+dur);
          }
          if(type==='shoot')       tone(880,440,'square',0.08,0.08);
          else if(type==='enemyHit') tone(440,220,'square',0.06,0.12);
          else if(type==='enemyDie'){ tone(300,80,'sawtooth',0.15,0.14); }
          else if(type==='bossHit')  tone(200,100,'sawtooth',0.10,0.18);
          else if(type==='damage'){  tone(150,50,'sawtooth',0.25,0.22); }
          else if(type==='powerUp'){
            toneAt(440,440,'sine',0.1,now,0.18);
            toneAt(880,880,'sine',0.1,now+0.1,0.18);
            toneAt(1320,1320,'sine',0.12,now+0.2,0.18);
          }
          else if(type==='bossDead'){
            toneAt(800,800,'sawtooth',0.12,now,0.22);
            toneAt(600,600,'sawtooth',0.12,now+0.15,0.22);
            toneAt(400,400,'sawtooth',0.12,now+0.30,0.22);
            toneAt(200,200,'sawtooth',0.20,now+0.45,0.22);
          }
          else if(type==='bossWarn'){
            toneAt(220,220,'square',0.12,now,0.20);
            toneAt(220,220,'square',0.12,now+0.18,0.20);
            toneAt(220,220,'square',0.18,now+0.36,0.20);
          }
          else if(type==='continue'){
            toneAt(220,220,'sine',0.1,now,0.18);
            toneAt(330,330,'sine',0.1,now+0.12,0.18);
            toneAt(440,440,'sine',0.15,now+0.24,0.18);
          }
          else if(type==='gameOver'){
            toneAt(400,400,'sawtooth',0.15,now,0.20);
            toneAt(300,300,'sawtooth',0.15,now+0.20,0.20);
            toneAt(200,200,'sawtooth',0.15,now+0.40,0.20);
            toneAt(100,100,'sawtooth',0.25,now+0.60,0.20);
          }
          else if(type==='stageClr'){
            toneAt(523,523,'sine',0.1,now,0.18);
            toneAt(659,659,'sine',0.1,now+0.12,0.18);
            toneAt(784,784,'sine',0.1,now+0.24,0.18);
            toneAt(1047,1047,'sine',0.18,now+0.36,0.18);

          else if(type==='1up'){
            toneAt(523,523,'sine',0.08,now,0.18);
            toneAt(659,659,'sine',0.08,now+0.09,0.18);
            toneAt(784,784,'sine',0.08,now+0.18,0.18);
            toneAt(1047,1047,'sine',0.08,now+0.27,0.18);

        function loadHiScores(){

        function saveHiScore(s,st){

        function stopBGM(){
          bgmPlaying=false;
          if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; }
          bgmScheduled=[];
          bgmNodes.forEach(n=>{try{n.stop()}catch{}});
          bgmNodes=[];
        }
        function startBGM(stageId){
          if(!audioCtx) initAudio();
          stopBGM();
          bgmStage=stageId;
          const base=BGM_DATA[stageId-1];
          if(!base)return;
          const d=Object.assign({},base,BGM_STYLE[stageId-1]||{});
          const beatDur=60/d.bpm;
          let melIdx=0,bassIdx=0,drumFrame=0;
          const mSeq=d.mel, bSeq=d.bass, drumP=d.drum;
          const sw=d.swing||0;

          bgmPlaying=true;
          bgmScheduled=[];
          const now=audioCtx.currentTime;
          let mCur=now, bCur=now;

          function schNote(freq,dur,wave,trackGain){
            if(freq===0)return;
            const osc=audioCtx.createOscillator();
            osc.type=wave;
            osc.frequency.value=freq;
            const g=audioCtx.createGain();
            g.gain.value=trackGain;
            osc.connect(g);
            g.connect(masterGain);
            const st=mCur;
            osc.start(st);
            osc.stop(st+dur);
            bgmNodes.push(osc);
          }
          function schBass(freq,dur,wave,trackGain){
            if(freq===0)return;
            const osc=audioCtx.createOscillator();
            osc.type=wave;
            osc.frequency.value=freq;
            const g=audioCtx.createGain();
            g.gain.value=trackGain;
            osc.connect(g);
            g.connect(masterGain);
            const st=bCur;
            osc.start(st);
            osc.stop(st+dur);
            bgmNodes.push(osc);
          }
          function schDrum(pattern){
            const kickHit=[1,0,0,0,1,0,0,0];
            const snareHit=[0,0,1,0,0,0,1,0];
            const hihatHit=[1,0,1,0,1,0,1,0];
            const ride1=  [1,0,1,1,0,1,0,1];
            const ride2=  [1,1,0,1,0,1,1,0];
            const ride3=  [1,0,1,0,1,1,0,0];
            const ride4=  [1,1,1,0,1,0,1,1];
            let kick=kickHit,snare=snareHit,hat=hihatHit;
            if(pattern===1){kick=kickHit;snare=snareHit;hat=hihatHit;}
            else if(pattern===2){kick=kickHit;snare=snareHit;hat=ride1;}
            else if(pattern===3){kick=kickHit;snare=snareHit;hat=ride2;}
            else if(pattern===4){kick=kickHit;snare=snareHit;hat=ride3;}
            const step=beatDur/2;
            for(let i=0;i<8;i++){
              const t=mCur+i*step;
              if(kick[i]){
                const osc=audioCtx.createOscillator();
                osc.type='sine';
                osc.frequency.setValueAtTime(120,t);
                osc.frequency.exponentialRampToValueAtTime(40,t+0.1);
                const g=audioCtx.createGain();
                g.gain.setValueAtTime(0.25,t);
                g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
                osc.connect(g); g.connect(masterGain);
                osc.start(t); osc.stop(t+0.15);
                bgmNodes.push(osc);
              }
              if(snare[i]){
                const noise=audioCtx.createBufferSource();
                const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
                const data=buf.getChannelData(0);
                for(let j=0;j<data.length;j++)data[j]=Math.random()*2-1;
                noise.buffer=buf;
                const g=audioCtx.createGain();
                g.gain.setValueAtTime(0.14,t);
                g.gain.exponentialRampToValueAtTime(0.01,t+0.1);
                noise.connect(g); g.connect(masterGain);
                noise.start(t);
                bgmNodes.push(noise);
              }
              if(hat[i]){
                const noise=audioCtx.createBufferSource();
                const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
                const data=buf.getChannelData(0);
                for(let j=0;j<data.length;j++)data[j]=Math.random()*2-1;
                noise.buffer=buf;
                const filt=audioCtx.createBiquadFilter();
                filt.type='highpass';
                filt.frequency.value=7000;
                const g=audioCtx.createGain();
                g.gain.value=0.06;
                noise.connect(filt); filt.connect(g); g.connect(masterGain);
                noise.start(t);
                bgmNodes.push(noise);
              }
            }
          }

          function scheduler(){
            if(!bgmPlaying)return;
            const now=audioCtx.currentTime;
            while(mCur<now+LOOK){
              if(melIdx>=mSeq.length){ melIdx=0; }
              const [f,b]=mSeq[melIdx];
              const dur=beatDur*b*(1+sw*((melIdx%2)?0.1:-0.1));
              schNote(f,dur*0.9,d.melW,d.vol);
              schDrum(drumP);
              mCur+=dur;
              melIdx++;
            }
            while(bCur<now+LOOK){
              if(bassIdx>=bSeq.length)bassIdx=0;
              const [f,b]=bSeq[bassIdx];
              const dur=beatDur*b;
              schBass(f,dur*0.95,d.bassW,d.vol*0.7);
              bCur+=dur;
              bassIdx++;
            }
          }

          scheduler();
          bgmTimer=setInterval(scheduler,TICK*1000);
        }

  function pollGamepad(){
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    const gp=Array.from(gps).find(g=>g);
    if(!gp)return;
    const b=gp.buttons,ax=gp.axes,DZ=0.3;
    keys.up    = !!(b[12]?.pressed||ax[1]<-DZ);
    keys.down  = !!(b[13]?.pressed||ax[1]> DZ);
    keys.left  = !!(b[14]?.pressed||ax[0]<-DZ);
    keys.right = !!(b[15]?.pressed||ax[0]> DZ);
    keys.shot  = !!(b[0]?.pressed||b[2]?.pressed);
    keys.power = !!(b[1]?.pressed||b[3]?.pressed);
    if(b[9]?.pressed&&!_gpPrev[9]){
      if(gameState==='playing')gameState='paused';
      else if(gameState==='paused')gameState='playing';
    }
    _gpPrev=b.map(btn=>btn?.pressed);
  }

  function terrainProfile(){
    const profiles=[
      {top:62,bot:H-96,amp:30,fill:'#351408',shade:'#120603',line:'#ff5a18',detail:'#7a2a10',mode:'rock'},
      {top:54,bot:H-86,amp:22,fill:'#303848',shade:'#121824',line:'#90a9c4',detail:'#617089',mode:'stone'},
      {top:70,bot:H-92,amp:18,fill:'#4a300b',shade:'#1c1204',line:'#d49a32',detail:'#8a621c',mode:'block'},
      {top:64,bot:H-92,amp:24,fill:'#252838',shade:'#0f1018',line:'#7777bd',detail:'#505075',mode:'ruin'},
      {top:58,bot:H-90,amp:26,fill:'#3b0d4f',shade:'#14051d',line:'#d348ff',detail:'#6d2b78',mode:'organic'},
      {top:42,bot:H-70,amp:18,fill:'#111f3d',shade:'#050914',line:'#5fa3ff',detail:'#2d4f7a',mode:'asteroid'},
      {top:76,bot:H-104,amp:16,fill:'#24242d',shade:'#08080d',line:'#ff4d4d',detail:'#5b5b68',mode:'metal'}
    ];
    return profiles[stage-1]||profiles[0];
  }

  function makeTerrainPoint(x,i){
    const p=terrainProfile();
    const n1=Math.sin((i+stage*3)*0.85)*p.amp;
    const n2=(Math.random()-0.5)*p.amp*0.75;
    let top=p.top+n1+n2;
    let bot=p.bot-n1*0.7+(Math.random()-0.5)*p.amp;
    if(p.mode==='rock'){top+=Math.random()*24;bot-=Math.random()*30;}
    if(p.mode==='organic'){top+=Math.sin(i*1.7)*14;bot+=Math.cos(i*1.3)*14;}
    top=Math.max(30,Math.min(125,top));
    bot=Math.max(H-150,Math.min(H-56,bot));
    if(bot-top<250)bot=top+250;
    return {x,yTop:top,yBot:bot,seed:Math.random(),idx:i};
  }

  function initTerrain(){
    terrain=[];
    const spacing=32;
    for(let i=-1;i<=Math.ceil(W/spacing)+2;i++)terrain.push(makeTerrainPoint(i*spacing,i));
  }

  // ── HIT TEST ──
  function hitTest(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

  // ── DAMAGE ──
  function damagePlayer(){
    if(invincibleMode){
      player.invul=12;
      if(frame%3===0)particles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:18,color:'#ffff66',size:4});
      return;
    }
    if(barrierHp>0){barrierHp--;player.invul=30;playSE('damage');triggerShake(3,6);}
    else{
      player.hp--;player.invul=120;
      playSE('damage');triggerShake(5,10);
      if(player.hp<=0){
        lives--;
        if(lives>0){player.hp=1;player.x=80;player.y=H/2;player.invul=120;bullets=[];enemyBullets=[];powerItems=[];}
        else if(continues>0){gameState='continue';contTimer=CONT_TIME;stopBGM();}
        else{saveHiScore(score,stage);playSE('gameOver');gameState='gameover';stopBGM();}
      }
    }
  }

  // ── POWER UP ──
  function applyMaxPowerUps(){
    speedLevel=PU_MAX[0];
    missDownLv=PU_MAX[1];
    missUpLv=PU_MAX[2];
    laserLv=PU_MAX[3];
    barrierHp=PU_MAX[5];
    optionCount=PU_MAX[4];
    if(!options)options=[];
    while(options.length<PU_MAX[4])options.push({x:player?player.x:80,y:player?player.y:H/2});
    options.length=PU_MAX[4];
    for(const o of options){o.x=player?player.x:80;o.y=player?player.y:H/2;}
  }

  function activatePU(){
    if(puCursor===0)speedLevel=Math.min(PU_MAX[0],speedLevel+1);
    else if(puCursor===1)missDownLv=Math.min(PU_MAX[1],missDownLv+1);
    else if(puCursor===2)missUpLv=Math.min(PU_MAX[2],missUpLv+1);
    else if(puCursor===3)laserLv=Math.min(PU_MAX[3],laserLv+1);
    else if(puCursor===4&&optionCount<PU_MAX[4]){optionCount++;options.push({x:player.x,y:player.y});}
    else if(puCursor===5)barrierHp=Math.min(PU_MAX[5],barrierHp+1);
  }

  // ── UPDATE PLAYER ──
  function commandToken(k){
    if(k==='ArrowUp'||k==='w'||k==='W')return 'up';
    if(k==='ArrowDown'||k==='s'||k==='S')return 'down';
    if(k==='ArrowLeft'||k==='a'||k==='A')return 'left';
    if(k==='ArrowRight'||k==='d'||k==='D')return 'right';
    if(k==='x'||k==='X')return 'x';
    if(k==='b'||k==='B')return 'b';
    return null;
  }

  function handleCheatInput(k){
    const token=commandToken(k);
    if(!token)return;
    if(token===CHEAT_CODE[cheatIndex])cheatIndex++;
    else cheatIndex=token===CHEAT_CODE[0]?1:0;
    if(cheatIndex>=CHEAT_CODE.length){
      cheatIndex=0;
      allPowerCheat=true;
      applyMaxPowerUps();
      noticeText='FULL POWER ENABLED';
      cheatNotice=180;
    }
  }

  function togglePause(){
    if(gameState==='playing'){
      gameState='paused';
      stopBGM();
    }else if(gameState==='paused'){
      gameState='playing';
      if(audioInited)startBGM(stage);
    }
  }

  function toggleInvincibleMode(){
    invincibleMode=!invincibleMode;
    noticeText=invincibleMode?'INVINCIBLE MODE ON':'INVINCIBLE MODE OFF';
    cheatNotice=180;
  }

  function updatePlayer(){
    if(player.invul>0)player.invul--;
    const spd=2+speedLevel*0.5;
    if(keys.up)player.y-=spd;
    if(keys.down)player.y+=spd;
    if(keys.left)player.x-=spd;
    if(keys.right)player.x+=spd;
    player.x=Math.max(0,Math.min(W-player.w,player.x));
    player.y=Math.max(0,Math.min(H-player.h,player.y));
    if(shotCooldown>0)shotCooldown--;
    if(waveCooldown>0)waveCooldown--;
    if(keys.shot&&shotCooldown===0){
      playSE('shoot');
      shotCooldown=laserLv>=1?5:10;
      const px=player.x+player.w,py=player.y+player.h/2;
      if(laserLv===0){
        bullets.push({x:px,y:py,vx:8,vy:0,w:8,h:2,dmg:1,type:'normal'});
        if(missUpLv>0)bullets.push({x:px,y:py-6,vx:7.2,vy:-2.4,w:8,h:2,dmg:1,type:'double'});
      }
      else if(laserLv===1)bullets.push({x:px,y:py-2,vx:10,vy:0,w:46,h:4,dmg:3,type:'laser',pierce:3});
      else {
        bullets.push({x:px,y:py-6,vx:10,vy:0,w:42,h:4,dmg:3,type:'laser',pierce:3});
        bullets.push({x:px,y:py+4,vx:10,vy:0,w:42,h:4,dmg:3,type:'laser',pierce:3});
      }
      if(missDownLv>0)bullets.push({x:px-2,y:player.y+player.h+2,vx:5.6,vy:3.2,w:14,h:5,dmg:2+missDownLv,type:'mssl'}); // 'missile'→'mssl' でホーミング処理との type 不一致を修正
      for(const o of options)bullets.push({x:o.x+10,y:o.y+5,vx:8,vy:0,w:8,h:2,dmg:1,type:'normal'});
    }
    if(keys.shot&&laserLv>=1&&!waveCharging){waveCharge++;if(waveCharge>=60)waveCharging=true;}
    if((!keys.shot||laserLv===0)&&waveCharge>0){waveCharge=0;waveCharging=false;}
    if(waveCharging&&waveCooldown===0&&keys.shot){
      waveCharging=false;waveCharge=0;waveCooldown=90;
      for(let i=0;i<12;i++){
        const ang=-Math.PI/6+i*(Math.PI/3)/11;
        bullets.push({x:player.x+player.w,y:player.y+player.h/2,vx:Math.cos(ang)*9,vy:Math.sin(ang)*9,w:10,h:10,dmg:6,type:'wave'});
      }
    }
    if(keys.power&&!shotPressed){shotPressed=true;activatePU();}
    if(!keys.power)shotPressed=false;
    if(barrierHp>0&&frame%6===0)particles.push({x:player.x+Math.random()*player.w,y:player.y+Math.random()*player.h,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:20,color:'#4488ff',size:3});
  }

  // ── UPDATE BULLETS ──
  function updateBullets(){
    for(const b of bullets){
      if(b.type==='missile'){b.vy=Math.min(5.5,b.vy+0.05);}
      b.x+=b.vx;b.y+=b.vy;
      if(b.type==='mssl'&&!b.tgt){
        let best=null,minD=999;
        for(const e of enemies){if(e.isDead)continue;const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<minD){minD=d;best=e;}}
        if(best)b.tgt=best;
      }
      if(b.type==='mssl'&&b.tgt){
        const dx=b.tgt.x-b.x,dy=b.tgt.y-b.y,dist=Math.hypot(dx,dy);
        if(dist>0){const tx=dx/dist*7,ty=dy/dist*7;b.vx+=(tx-b.vx)*0.1;b.vy+=(ty-b.vy)*0.1;}
      }
    }
    bullets=bullets.filter(b=>!b.remove&&b.x<W+70&&b.x>-50&&b.y<H+70&&b.y>-50);
  }

  // ── UPDATE OPTIONS ──
  function updateOptions(){
    if(!optionCount)return;
    for(let i=0;i<options.length;i++){
      const o=options[i];
      o.x+=(player.x-(i+1)*18-o.x)*0.2;
      o.y+=(player.y-o.y)*0.2;
    }
  }

  function updateStageEnemy(e){
    e.timer++;
    e.x+=e.vx;e.y+=e.vy;
    if(['firebird','scarabDrone','spaceInterceptor','moaiBird','scarabBomber','ruinBatStatue','spaceSaucer'].includes(e.kind))e.y=e.baseY+Math.sin(e.timer*0.08)*22;
    else if(['amoeba','parasiteCell','whiteBloodCell','leechWorm','cometBeast'].includes(e.kind))e.y=e.baseY+Math.sin(e.timer*0.06)*18;
    else if(['droneSwarm','fortressDrone','sporeJellyfish','fortressBladeDrone'].includes(e.kind))e.y=e.baseY+Math.cos(e.timer*0.05)*24;
    else if(e.kind==='spaceMine'||e.kind==='rollingStoneDisk'){e.spin+=e.spinSpeed;if(Math.abs(player.y-e.y)<28&&e.timer%50===0)fireEnemyShot(e.x,e.y+e.h/2,-2.2,0,8,8,'minePulse');}
    if(e.fire&&e.timer%e.fire===0){
      if(e.kind==='crystalTurret')for(let i=-1;i<=1;i++)fireEnemyShot(e.x,e.y+e.h/2,-3,i*1.1,7,7,'crystal');
      else if(e.kind==='fortressLaserTurret')fireEnemyShot(e.x,e.y+e.h/2,-5,0,18,4,'redLaser');
      else if(e.kind==='laserGateEmitter')fireEnemyShot(e.x,e.y+e.h/2,-4.8,0,22,5,'redLaser');
      else if(e.kind==='armoredMissilePod')for(let i=-1;i<=1;i++)fireEnemyShot(e.x,e.y+e.h/2,-3.2,i*0.8,10,10,'missileEnemy');
      else if(e.kind==='satelliteGunner')for(let i=-1;i<=1;i++)fireEnemyShot(e.x,e.y+e.h/2,-3.3,i,7,7,'shot');
      else if(e.kind==='firebird')fireEnemyShot(e.x,e.y+e.h/2,-3.8,Math.sin(e.timer*0.06)*1.2,10,10,'lava');
      else if(e.kind==='scarabBomber')fireEnemyShot(e.x,e.y+e.h,-1.6,2.6,9,9,'shot');

      }

  }

        else{

          const spd=e.bossPhase===1?0.035:0.02, ivl=e.bossPhase===1?28:40, bspd=e.bossPhase===1?5.2:4;
          e.stateTimer++;
          if(e.stateTimer<100)e.y+=(90-e.y)*spd;
          else if(e.stateTimer<200)e.y+=(H-90-e.y)*spd;
          else e.stateTimer=0;
          if(e.stateTimer%ivl===0){
            enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-bspd,vy:0,w:10,h:10});
            if(e.bossPhase===1)enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-bspd+0.5,vy:1.5,w:8,h:8});
          }
        }
      }
      else if(e.type==='boss4'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;e.bossPhase=0;forceScrollActive=false;}}
        else{
          if(!e.bossPhase)e.bossPhase=0;
          if(e.bossPhase===0&&e.hp<e.maxHp*0.5){e.bossPhase=1;warnTimer=120;warnBossName='PHASE 2';triggerShake(6,12);triggerFlash('#ff0000',15);playSE('bossWarn');for(let i=0;i<15;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:40,color:'#ff4400',size:5});}
          const dirs=e.bossPhase===1?5:3, ivl=e.bossPhase===1?35:50, bspd=e.bossPhase===1?3.9:3;
          e.stateTimer++;e.y+=Math.sin(e.stateTimer*0.03)*1.5;
          if(e.stateTimer%ivl===0){
            for(let i=0;i<dirs;i++)enemyBullets.push({x:e.x,y:e.y+20+i*16,vx:-bspd-i*0.4,vy:0,w:7,h:7});
          }
        }
      }
      else if(e.type==='boss5'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;e.bossPhase=0;forceScrollActive=false;}}
        else{
          if(!e.bossPhase)e.bossPhase=0;
          if(e.bossPhase===0&&e.hp<e.maxHp*0.5){e.bossPhase=1;warnTimer=120;warnBossName='PHASE 2';triggerShake(6,12);triggerFlash('#ff0000',15);playSE('bossWarn');for(let i=0;i<15;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:40,color:'#ff4400',size:5});}
          const ivl=e.bossPhase===1?49:70, bspd=e.bossPhase===1?4.5:3.5;
          e.stateTimer++;e.y+=(H/2-e.y)*0.005;
          if(e.stateTimer%ivl===0){
            for(let i=-1;i<=1;i++)enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-bspd,vy:i*1.2*1.3,w:8,h:8});
            if(e.bossPhase===1){
              const dy=player.y-(e.y+e.h/2); const dist=Math.sqrt(bspd*bspd+dy*dy)||1;
              enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-bspd*bspd/dist,vy:dy*bspd/dist,w:9,h:9});
            }
          }
        }
      }
      else if(e.type==='boss6'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;e.bossPhase=0;forceScrollActive=false;}}
        else{
          if(!e.bossPhase)e.bossPhase=0;
          if(e.bossPhase===0&&e.hp<e.maxHp*0.5){e.bossPhase=1;warnTimer=120;warnBossName='PHASE 2';triggerShake(6,12);triggerFlash('#ff0000',15);playSE('bossWarn');for(let i=0;i<15;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:40,color:'#ff4400',size:5});}
          const dirs=e.bossPhase===1?16:10, ivl=e.bossPhase===1?32:45, bspd=e.bossPhase===1?3.9:3;
          e.stateTimer++;e.y+=Math.cos(e.stateTimer*0.02)*2;
          if(e.stateTimer%ivl===0){
            for(let i=0;i<dirs;i++){const ang=i*(Math.PI*2/dirs);enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*bspd,vy:Math.sin(ang)*bspd,w:6,h:6});}
            if(e.bossPhase===1&&e.stateTimer%(ivl*2)===0){
              for(let i=0;i<dirs;i++){const ang=i*(Math.PI*2/dirs)+Math.PI/dirs;enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*bspd*0.7,vy:Math.sin(ang)*bspd*0.7,w:5,h:5});}
            }
          }
        }
      }
      else if(e.type==='boss7'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;
          if(!e.attackPhase)e.attackPhase=0;
          if(e.attackPhase===0&&e.hp<534){e.attackPhase=1;for(let i=0;i<15;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:40,color:'#ff4400',size:5});}
          if(e.attackPhase===1&&e.hp<267){e.attackPhase=2;for(let i=0;i<20;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:50,color:'#ff2200',size:6});}
          const spd=e.attackPhase===0?1.5:e.attackPhase===1?2.5:4;
          if(e.stateTimer<150)e.y+=(80-e.y)*0.02*spd;
          else if(e.stateTimer<300)e.y+=(H-80-e.y)*0.02*spd;
          else e.stateTimer=0;
          const interval=e.attackPhase===0?60:e.attackPhase===1?40:30;
          const count=e.attackPhase===0?3:e.attackPhase===1?5:8;
          if(e.stateTimer%interval===0){
            for(let i=0;i<count;i++){
              const ang=count===8?i*Math.PI*2/8:(Math.PI*1.5-Math.PI/3)+i*(Math.PI*2/3)/Math.max(1,count-1);
              enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,w:8,h:8});
            }
          }
        }
      }

      for(const b of bullets){
        if(hitTest(b,e)){
          e.hp-=b.dmg;
          if(b.type==='laser'&&b.pierce>0)b.pierce--;
          else b.remove=true;
          particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15,color:'#ffaa00',size:4});
          if(e.type.startsWith('boss')) playSE('bossHit'); else playSE('enemyHit');
          if(e.hp<=0&&!e.isDead){
            e.isDead=true;e.deadTimer=0;score+=e.pts;
            if(e.type.startsWith('boss')){
              stageClear=true;bossAlive=false;
              clearBonus=5000+lives*1000; score+=clearBonus;
              playSE('bossDead'); triggerShake(8,20); triggerFlash('#ffff88',10);
              isClearAnim=true; clearScoreAnim=0;
              // 大爆発パーティクル
              for(let i=0;i<40;i++){
                const c=['#ff8800','#ff4400','#ffff00'][i%3];
                particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:40+Math.random()*20,color:c,size:4+Math.random()*4});
              }
            }
            else{
              killCount++;
              playSE('enemyDie');
              if(killCount%8===0){
                const t=Math.random()<0.1?'1up':0;
                powerItems.push({x:e.x,y:e.y,vx:-1,vy:0,w:20,h:12,type:t});
              }
            }
            for(let i=0;i<12;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:35,color:'#ff4400',size:3+Math.random()*3});
          }
        }
      }
      if(!e.isDead&&player.invul===0&&hitTest(player,e))damagePlayer();
    }
    enemies=enemies.filter(e=>!e.remove);
  }

  // ── UPDATE ENEMY BULLETS ──
  function updateEnemyBullets(){
    for(const b of enemyBullets){
      if(b.ay)b.vy+=b.ay;
      b.x+=b.vx;b.y+=b.vy;
      if(b.kind==='lava')b.ay=0.13;
      if(b.kind==='ring'&&b.w<46){b.w+=0.18;b.h+=0.18;}
      if(b.x<-70||b.x>W+70||b.y<-90||b.y>H+90)b.remove=true;
      if(player.invul===0&&hitTest(player,b)){b.remove=true;damagePlayer();}
    }
    enemyBullets=enemyBullets.filter(b=>!b.remove);
  }

  // ── UPDATE PARTICLES ──
  function updateParticles(){
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)p.remove=true;}
    particles=particles.filter(p=>!p.remove);
  }

  // ── UPDATE POWER ITEMS ──
  function updatePowerItems(){
      for(const p of powerItems){
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<-50)p.remove=true;
      if(hitTest(player,p)){
        p.remove=true;
        if(p.type==='1up'){ lives=Math.min(lives+1,5); playSE('1up'); }
        else{ puCursor=(puCursor+1)%PU_NAMES.length; playSE('powerUp'); }
      }
    }
    powerItems=powerItems.filter(p=>!p.remove);
  }

  // ── UPDATE TERRAIN ──
  function updateTerrain(){
    const spacing=32;
    for(const t of terrain){
      t.x-=1;
      if(t.x<-spacing*2){
        const maxX=terrain.reduce((max,v)=>Math.max(max,v.x),-Infinity); // spread演算子によるスタックオーバーフローリスクを回避
        const idx=(t.idx||0)+terrain.length;
        const next=makeTerrainPoint(maxX+spacing,idx);
        t.x=next.x;t.yTop=next.yTop;t.yBot=next.yBot;t.seed=next.seed;t.idx=idx;
      }
    }
  }

  // ── SPAWN ENEMIES ──
  function spawnEnemies(){
    if(stageClear)return;
    if(!bossSpawned&&stageFrame>BOSS_SPAWN_FRAME){
      forceScrollActive=true;bossSpawned=true;bossAlive=true;
      const st=STAGES[stage-1];
      const bossTypes=['boss1','boss2','boss3','boss4','boss5','boss6','boss7'];
      const bossW=[120,100,100,110,120,140,120];
      const bossH=[64,80,80,80,100,80,120];
      const bt=bossTypes[stage-1];
      enemies.push({type:bt,x:W,y:H/2-bossH[stage-1]/2,w:bossW[stage-1],h:bossH[stage-1],
                    hp:st.bossHp,maxHp:st.bossHp,vx:-1,pts:0,phase:0,stateTimer:0,attackPhase:0,bossPhase:0,isDead:false,deadTimer:0});
      bossEntryTimer=90; bossEntryName=st.bossName||bt.toUpperCase();
      playSE('bossWarn'); warnTimer=90; warnBossName=st.bossName||bt.toUpperCase();
    }
    if(bossSpawned)return;
    if(stage===1&&stageFrame%210===30)stageHazards.push({type:'volcano',x:W+40,y:H-122,w:92,h:92,speed:1,timer:0});
    if(stage===1&&stageFrame%260===80)stageHazards.push({type:'groundCannon',x:W+35,y:H-94,w:52,h:52,speed:1,timer:20});
    if(stage===1&&stageFrame%300===130)stageHazards.push({type:'ceilingCannon',x:W+35,y:30,w:52,h:52,speed:1,timer:40});
    if(stage===1&&stageFrame>2300&&stageFrame%460===120)stageHazards.push({type:'invertedVolcano',x:W+60,y:32,w:108,h:88,speed:1,timer:0});
    if(stage===2&&stageFrame%240===40)stageHazards.push({type:'moai',x:W+35,y:H-150,w:58,h:112,speed:1,timer:20});
    if(stageFrame%45===0)spawnStageEnemy();
    if(stageFrame%90===30)spawnStageEnemy();
    if(stageFrame%150===0&&stage>=2)enemies.push({type:'bigMeteor',x:W,y:Math.random()*H,w:40,h:40,vx:-1.5,vy:(Math.random()-0.5)*1.5,spin:0,spinSpeed:0.05,hp:8,pts:300,isDead:false,deadTimer:0});
  }

  // ── MAIN UPDATE ──
  function update(){
    frame++;
    if(cheatNotice>0)cheatNotice--;
    if(gameState==='title'){
      if(audioCtx&&!titleBgmPlaying)startTitleBGM();
      if(keys.shot&&!shotPressed){
        shotPressed=true;
        if(!audioInited){initAudio();audioInited=true;}
        stopTitleBGM();
        gameState='intro';resetStage(1);stageFrame=0;
      }
      if(!keys.shot)shotPressed=false;
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
    }
    else if(gameState==='intro'){
      stageFrame++;
      if(stageFrame>180){gameState='playing';stageFrame=0;}
    }
    else if(gameState==='playing'){
      stageFrame++;
      updatePlayer();updateBullets();updateOptions();updateStageHazards();updateEnemies();
      updateEnemyBullets();updateParticles();updatePowerItems();updateTerrain();
      spawnEnemies();
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
      if(stageClear){
        stageClearTimer++;
        if(stageClearTimer>120){
          if(stage<7){
            playSE('stageClr');
            isClearAnim=false;
            gameState='intro';resetStage(stage+1);stageFrame=0;
          } else {
            saveHiScore(score,7);playSE('stageClr');gameState='ending';stopBGM();
          }
        }
      }
    }
    else if(gameState==='paused'){
      // Keep the current frame frozen while the overlay is displayed.
    }
    else if(gameState==='continue'){
      contTimer--;frame++;
      if(contTimer<=0){saveHiScore(score,stage);playSE('gameOver');gameState='gameover';}
      if(keys.shot&&!shotPressed){
        shotPressed=true;continues--;lives=3;player.hp=1;player.x=80;player.y=H/2;
        player.invul=120;bullets=[];enemyBullets=[];powerItems=[];
        gameState='playing';playSE('continue');startBGM(stage);
      }
      if(!keys.shot)shotPressed=false;
    }
    else if(gameState==='gameover'||gameState==='ending'){
      if(keys.shot&&!shotPressed){shotPressed=true;gameState='title';initGame();}
      if(!keys.shot)shotPressed=false;
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
    }
  }
  // ── DRAW SPRITE ──
  function drawSprite(key,cx,cy,w,h,alpha,glowColor){
    ctx.save();
    if(alpha!=null)ctx.globalAlpha=alpha;
    if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=10;}
    const img=sprites[key];
    if(img)ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
    else{ctx.fillStyle=glowColor||'#ff00ff';ctx.fillRect(cx-w/2,cy-h/2,w,h);}
    ctx.restore();
  }

  function drawStageSprite(key,cx,cy,w,h,alpha,glowColor){
    ctx.save();
    if(alpha!=null)ctx.globalAlpha=alpha;
    if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=8;}
    const img=stageSprites[key];
    if(img)ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
    else{ctx.fillStyle=glowColor||'#ffaa00';ctx.fillRect(cx-w/2,cy-h/2,w,h);}
    ctx.restore();
  }

  function drawExtraSprite(key,cx,cy,w,h,alpha,glowColor){
    ctx.save();
    if(alpha!=null)ctx.globalAlpha=alpha;
    if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=8;}
    const img=extraSprites[key];
    if(img)ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
    else drawStageSprite(key,cx,cy,w,h,alpha,glowColor);
    ctx.restore();
  }

  function drawTerrain(){
    const terrainKey=['terrainVolcano','terrainMoai','terrainPyramid','terrainRuins','terrainAlienBody','terrainCosmos','terrainFortress'][stage-1];
    const terrainImg=terrainSprites[terrainKey];
    if(terrainImg){
      const heights=[92,96,90,104,100,98,88];
      const tileH=heights[stage-1]||92;
      const tileW=terrainImg.width*(tileH/terrainImg.height);
      const step=Math.max(1,tileW-96);
      const offset=-((stageFrame||frame)%step);
      ctx.save();
      for(let x=offset-step;x<W+tileW;x+=step){
        ctx.drawImage(terrainImg,x,0,tileW,tileH);
        ctx.save();
        ctx.translate(x,H);
        ctx.scale(1,-1);
        ctx.drawImage(terrainImg,0,0,tileW,tileH);
        ctx.restore();
      }
      ctx.restore();
      return;
    }
    const p=terrainProfile();
    const pts=[...terrain].sort((a,b)=>a.x-b.x);
    if(pts.length<2)return;
    ctx.save();
    const topGrad=ctx.createLinearGradient(0,0,0,130);
    topGrad.addColorStop(0,p.shade);topGrad.addColorStop(1,p.fill);
    ctx.fillStyle=topGrad;
    ctx.beginPath();ctx.moveTo(pts[0].x,0);
    for(const t of pts)ctx.lineTo(t.x,t.yTop);
    ctx.lineTo(pts[pts.length-1].x+32,0);ctx.closePath();ctx.fill();

    const botGrad=ctx.createLinearGradient(0,H-150,0,H);
    botGrad.addColorStop(0,p.fill);botGrad.addColorStop(1,p.shade);
    ctx.fillStyle=botGrad;
    ctx.beginPath();ctx.moveTo(pts[0].x,H);ctx.lineTo(pts[0].x,pts[0].yBot);
    for(const t of pts)ctx.lineTo(t.x,t.yBot);
    ctx.lineTo(pts[pts.length-1].x+32,H);ctx.closePath();ctx.fill();

    ctx.strokeStyle=p.line;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].yTop);
    for(const t of pts)ctx.lineTo(t.x,t.yTop);
    ctx.stroke();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].yBot);
    for(const t of pts)ctx.lineTo(t.x,t.yBot);
    ctx.stroke();

    ctx.globalAlpha=0.55;ctx.strokeStyle=p.detail;ctx.lineWidth=1;
    for(let i=1;i<pts.length-1;i+=2){
      const t=pts[i];
      if(p.mode==='rock'||p.mode==='asteroid'){
        ctx.beginPath();ctx.moveTo(t.x-18,t.yTop-8);ctx.lineTo(t.x+8,t.yTop+18);ctx.lineTo(t.x+28,t.yTop+6);ctx.stroke();
        ctx.beginPath();ctx.moveTo(t.x-22,t.yBot+8);ctx.lineTo(t.x+10,t.yBot-22);ctx.lineTo(t.x+30,t.yBot-8);ctx.stroke();
      }else if(p.mode==='block'||p.mode==='ruin'){
        ctx.strokeRect(t.x-20,4,44,Math.max(18,t.yTop-12));
        ctx.strokeRect(t.x-20,t.yBot+10,44,H-t.yBot-18);
      }else if(p.mode==='organic'){
        ctx.beginPath();ctx.ellipse(t.x,t.yTop-8,26,8,Math.sin(t.seed*6),0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.ellipse(t.x,t.yBot+10,28,9,Math.cos(t.seed*6),0,Math.PI*2);ctx.stroke();
      }else if(p.mode==='metal'){
        ctx.beginPath();ctx.moveTo(t.x-24,t.yTop-4);ctx.lineTo(t.x+24,t.yTop+10);ctx.stroke();
        ctx.beginPath();ctx.moveTo(t.x-24,t.yBot+10);ctx.lineTo(t.x+24,t.yBot-4);ctx.stroke();
        ctx.fillStyle=p.detail;ctx.fillRect(t.x-2,t.yTop-14,4,4);ctx.fillRect(t.x+10,t.yBot+12,4,4);
      }else{
        ctx.beginPath();ctx.moveTo(t.x-20,t.yTop+6);ctx.lineTo(t.x+24,t.yTop-10);ctx.stroke();
        ctx.beginPath();ctx.moveTo(t.x-20,t.yBot-8);ctx.lineTo(t.x+24,t.yBot+8);ctx.stroke();
      }
    }
    ctx.restore();
  }

        ctx.fillStyle=i===0?'#ffd700':i===1?'#cccccc':'#cd7f32';
        ctx.font='12px "Courier New",monospace';
        ctx.fillText((medals[i]||' ')+'  '+String(h.score).padStart(7,'0')+'  ST'+h.stage,W/2,H*0.72+18+i*18);
      });
    }
    ctx.fillStyle='#556677';ctx.font='11px "Courier New",monospace';
    ctx.fillText('© 2026 FUKASAWA',W/2,H-16);
    ctx.textAlign='left';
  }

  // ── RENDER INTRO ──
  function renderIntro(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    const st=STAGES[stage-1];
    ctx.fillStyle=st.accentColor;ctx.font='bold 42px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('STAGE '+stage,W/2,H/2-20);
    ctx.fillStyle='#ffffff';ctx.font='22px "Courier New",monospace';
    ctx.fillText(st.name,W/2,H/2+20);
    ctx.fillStyle='#aaaaaa';ctx.font='14px "Courier New",monospace';
    ctx.fillText('BOSS: '+st.bossName,W/2,H/2+52);
    ctx.textAlign='left';
  }

  // ── RENDER GAME OVER ──
  function renderGameOver(){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff2200';ctx.font='bold 44px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-50);
    ctx.fillStyle='#ffffff';ctx.font='14px "Courier New",monospace';
    ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,H/2-10);
    ctx.fillText('STAGE '+stage+' まで到達',W/2,H/2+14);
    if(isNewRecord&&frame%30<15){ctx.fillStyle='#ffd700';ctx.font='bold 16px "Courier New",monospace';ctx.fillText('★ NEW RECORD! ★',W/2,H/2+44);}
    if(hiScores.length>0){
      ctx.fillStyle='#aaaaff';ctx.font='12px "Courier New",monospace';
      ctx.fillText('─ HI-SCORE ─',W/2,H/2+70);
      const medals=['🥇','🥈','🥉'];
      hiScores.slice(0,3).forEach((h,i)=>{
        ctx.fillStyle=i===0?'#ffd700':i===1?'#cccccc':'#cd7f32';
        ctx.fillText((medals[i]||' ')+'  '+String(h.score).padStart(7,'0')+'  ST'+h.stage,W/2,H/2+88+i*18);
      });
    }
    ctx.fillStyle='#aaaaaa';ctx.font='12px "Courier New",monospace';
    ctx.fillText('PRESS Z TO RETURN TO TITLE',W/2,H/2+150);
    ctx.textAlign='left';
  }

  // ── RENDER ENDING ──
  function renderEnding(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    for(const s of stars){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(s.x,s.y,s.size,s.size);}
    // 紙吹雪
    for(let i=0;i<3;i++){particles.push({x:Math.random()*W,y:-10,vx:(Math.random()-0.5)*2,vy:1.5+Math.random()*2,life:120,color:['#ff4488','#44ffcc','#ffdd44','#aaaaff'][i%4],size:4});}
    const pulse=1+0.06*Math.sin(frame*0.08);
    ctx.save();ctx.translate(W/2,H/2-50);ctx.scale(pulse,pulse);
    ctx.fillStyle='#00ffff';ctx.font='bold 30px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('ALL STAGES CLEAR!',0,0);
    ctx.restore();
    ctx.fillStyle='#ffff00';ctx.font='18px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,H/2+10);
    ctx.fillStyle='#ffffff';ctx.font='15px "Courier New",monospace';
    ctx.fillText('CONGRATULATIONS!  おめでとう！',W/2,H/2+44);
    if(isNewRecord&&frame%30<15){ctx.fillStyle='#ffd700';ctx.font='bold 14px "Courier New",monospace';ctx.fillText('★ NEW RECORD! ★',W/2,H/2+68);}
    if(Math.floor(frame/30)%2===0){ctx.fillStyle='#aaaaaa';ctx.font='13px "Courier New",monospace';ctx.fillText('PRESS Z TO TITLE',W/2,H/2+92);}
    ctx.textAlign='left';
  }

  // ── RENDER CONTINUE ──
  function renderContinue(){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#00ffff';ctx.font='bold 38px "Courier New",monospace';
    ctx.fillText('CONTINUE?',W/2,H/2-50);
    const secs=Math.ceil(contTimer/60);
    ctx.fillStyle='#ffffff';ctx.font='bold 64px "Courier New",monospace';
    ctx.fillText(secs,W/2,H/2+20);
    ctx.fillStyle='#aaaaaa';ctx.font='13px "Courier New",monospace';
    ctx.fillText('残コンティニュー: '+continues,W/2,H/2+60);
    if(frame%30<15){ctx.fillStyle='#ffff00';ctx.font='14px "Courier New",monospace';ctx.fillText('PRESS Z TO CONTINUE',W/2,H/2+88);}
    ctx.textAlign='left';
  }

  // ── MAIN RENDER ──
  function render(){
    if(gameState==='title'){renderTitle();frame++;return;}
    if(gameState==='intro'){renderIntro();return;}
    if(gameState==='gameover'){renderGameOver();return;}
    if(gameState==='continue'){renderContinue();frame++;return;}
    if(gameState==='ending'){renderEnding();frame++;return;}

    // シェイク開始
    ctx.save();
    if(shakeFrames>0){
      ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);
      shakeFrames--;
    }

    const st=STAGES[stage-1];
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,st.bgTop);grad.addColorStop(1,st.bgBot);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

    for(const s of stars){ctx.fillStyle=`rgba(255,255,255,${0.3+s.size*0.15})`;ctx.fillRect(s.x,s.y,s.size,s.size);}

    drawTerrain();

    for(const h of stageHazards){
      if(h.type==='volcano')drawStageSprite('volcano',h.x+h.w/2,h.y+h.h/2,110,96,1,'#ff6600');
      else if(h.type==='groundCannon')drawExtraSprite('volcanoGroundCannon',h.x+h.w/2,h.y+h.h/2,58,58,1,'#ff6600');
      else if(h.type==='ceilingCannon')drawExtraSprite('volcanoCeilingCannon',h.x+h.w/2,h.y+h.h/2,58,50,1,'#ff6600');
      else if(h.type==='invertedVolcano')drawExtraSprite('invertedVolcano',h.x+h.w/2,h.y+h.h/2,116,96,1,'#ff6600');
      else if(h.type==='moai')drawStageSprite('moaiStatue',h.x+h.w/2,h.y+h.h/2,70,122,1,'#88aacc');
    }

    for(const p of particles){
      ctx.save();ctx.globalAlpha=Math.max(0,p.life/30);
      ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      ctx.restore();
    }

    for(const b of bullets){
      ctx.save();
      if(b.type==='normal'||b.type==='double'){ctx.shadowColor='#00ffff';ctx.shadowBlur=6;ctx.fillStyle='#00ffff';}
      else if(b.type==='laser'){ctx.shadowColor='#00ff88';ctx.shadowBlur=12;ctx.fillStyle='#00ff88';}
      else if(b.type==='mssl'){
        // ホーミングミサイル描画（矢印形）
        ctx.shadowColor='#ff8800';ctx.shadowBlur=8;ctx.fillStyle='#ff8800';
        ctx.beginPath();ctx.moveTo(b.x+b.w,b.y+b.h/2);ctx.lineTo(b.x,b.y);ctx.lineTo(b.x+2,b.y+b.h);ctx.closePath();ctx.fill();
        ctx.globalAlpha=0.35;ctx.fillRect(b.x-8,b.y+b.h/2-1,8,2);ctx.restore();continue;
      }
      else{ctx.shadowColor='#ff44ff';ctx.shadowBlur=10;ctx.fillStyle='#ff44ff';}
      ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.restore();
    }

    for(const e of enemies){
      if(e.isDead&&e.deadTimer>30)continue;
      const alpha=e.isDead?Math.max(0,1-e.deadTimer/30):1;
      if(e.type==='zako') drawSprite('fighter',e.x+e.w/2,e.y+e.h/2,28,18,alpha,'#ff4400');
      else if(e.type==='bigMeteor'){
        ctx.save();ctx.globalAlpha=alpha;
        ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.rotate(e.spin);
        if(sprites.meteor)ctx.drawImage(sprites.meteor,-22,-22,44,44);
        else{ctx.fillStyle='#886644';ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();}
        ctx.restore();
      }
      else if(e.type==='stageEnemy'){
        const drawW=e.kind==='securityRobot'?42:e.kind==='sarcophagusTurret'?38:e.kind==='organCannon'?52:e.kind==='spaceMine'?34:e.w*1.5;
        const drawH=e.kind==='securityRobot'?52:e.kind==='sarcophagusTurret'?54:e.kind==='organCannon'?30:e.kind==='spaceMine'?34:e.h*1.5;
        if(e.kind==='spaceMine'||e.kind==='rollingStoneDisk'){
          ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.rotate(e.spin);
          const img=stageSprites[e.sprite]||extraSprites[e.sprite];
          if(img)ctx.drawImage(img,-drawW/2,-drawH/2,drawW,drawH);
          else{ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();}
          ctx.restore();
        }else if(extraSprites[e.sprite]) drawExtraSprite(e.sprite,e.x+e.w/2,e.y+e.h/2,drawW,drawH,alpha,STAGES[stage-1].accentColor);
        else drawStageSprite(e.sprite,e.x+e.w/2,e.y+e.h/2,drawW,drawH,alpha,STAGES[stage-1].accentColor);
      }
      else if(e.type==='boss1') drawSprite('boss1',e.x+e.w/2,e.y+e.h/2,120,64,alpha,'#ff4400');
      else if(e.type==='boss2') drawSprite('boss2',e.x+e.w/2,e.y+e.h/2,100,80,alpha,'#88aacc');
      else if(e.type==='boss3') drawSprite('boss3',e.x+e.w/2,e.y+e.h/2,100,80,alpha,'#aa7700');
      else if(e.type==='boss4') drawSprite('boss4',e.x+e.w/2,e.y+e.h/2,110,80,alpha,'#cc00ff');
      else if(e.type==='boss5') drawSprite('boss5',e.x+e.w/2,e.y+e.h/2,120,100,alpha,'#ff00cc');
      else if(e.type==='boss6') drawSprite('boss6',e.x+e.w/2,e.y+e.h/2,140,80,alpha,'#4488ff');
      else if(e.type==='boss7') drawSprite('boss7',e.x+e.w/2,e.y+e.h/2,120,120,alpha,'#ff2200');

      if(e.type.startsWith('boss')&&!e.isDead){
        const st2=STAGES[stage-1];
        const maxHp=STAGES[stage-1].bossHp;
        const pct=Math.max(0,e.hp/maxHp);
        const bx=e.x,by=e.y-18,bw=e.w;
        ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,8);
        ctx.fillStyle=pct>0.5?'#00ff44':pct>0.25?'#ffaa00':'#ff2200';
        ctx.fillRect(bx,by,bw*pct,8);
        ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,8);
        ctx.fillStyle='#ffffff';ctx.font='10px "Courier New",monospace';
        ctx.fillText(st2.bossName,bx,by-3);
      }
    }

    for(const b of enemyBullets){
      ctx.save();
      if(b.kind==='lava'){
        ctx.shadowColor='#ff6600';ctx.shadowBlur=12;
        drawStageSprite('lavaFireball',b.x+b.w/2,b.y+b.h/2,34,24,1,'#ff6600');
      }else if(b.kind==='magmaRock'){
        ctx.shadowColor='#ff6600';ctx.shadowBlur=12;
        drawExtraSprite('magmaRock',b.x+b.w/2,b.y+b.h/2,34,30,1,'#ff6600');
      }else if(b.kind==='ring'){
        ctx.shadowColor='#bb66ff';ctx.shadowBlur=12;
        drawStageSprite('ringLaser',b.x+b.w/2,b.y+b.h/2,34,34,1,'#bb66ff');
      }else if(b.kind==='acid'){
        ctx.shadowColor='#80ff44';ctx.shadowBlur=8;ctx.fillStyle='#80ff44';
        ctx.beginPath();ctx.arc(b.x+b.w/2,b.y+b.h/2,b.w/2,0,Math.PI*2);ctx.fill();
      }else if(b.kind==='redLaser'){
        ctx.shadowColor='#ff2244';ctx.shadowBlur=10;ctx.fillStyle='#ff2244';ctx.fillRect(b.x,b.y,b.w,b.h);
      }else if(b.kind==='crystal'){
        ctx.shadowColor='#aa66ff';ctx.shadowBlur=8;ctx.fillStyle='#aa66ff';ctx.fillRect(b.x,b.y,b.w,b.h);
      }else{
        ctx.shadowColor='#ff2200';ctx.shadowBlur=6;ctx.fillStyle='#ff2200';ctx.fillRect(b.x,b.y,b.w,b.h);
      }
      ctx.restore();
    }

    for(const p of powerItems){
      drawExtraSprite('powerCapsuleRed',p.x+p.w/2,p.y+p.h/2,24,18,1,'#ff2222');
    }

    if(barrierHp>0){
      ctx.save();ctx.shadowColor='#4488ff';ctx.shadowBlur=12;
      ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(player.x+player.w/2,player.y+player.h/2,22,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    if(player.invul>0){
      ctx.save();
      ctx.globalAlpha=player.invul%6<3?0.25:1.0;
      drawSprite('player',player.x+player.w/2,player.y+player.h/2,64,28,1,'#00ffff');
      ctx.restore();
    } else {
      drawSprite('player',player.x+player.w/2,player.y+player.h/2,64,28,1,'#00ffff');
    }

    for(const o of options) drawSprite('option',o.x+5,o.y+5,20,20,0.9,'#00ffff');

    if(waveCharge>0||waveCharging){
      const pct=Math.min(1,waveCharge/60);
      ctx.fillStyle='rgba(255,68,255,0.25)';ctx.fillRect(10,H-50,200*pct,7);
      ctx.strokeStyle='#ff44ff';ctx.lineWidth=1;ctx.strokeRect(10,H-50,200,7);
      ctx.fillStyle='#ff44ff';ctx.font='9px "Courier New",monospace';
      ctx.fillText('WAVE CHARGE',215,H-44);
    }

    // ── TOP HUD ──
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,30);
    ctx.fillStyle='#00ffff';ctx.font='13px "Courier New",monospace';
    ctx.fillText('SCORE:'+String(score).padStart(7,'0'),6,20);
    ctx.textAlign='center';
    ctx.fillStyle=st.accentColor;ctx.fillText('ST'+stage+' '+st.name,W/2,20);
    if(invincibleMode){
      ctx.fillStyle='#ffff66';ctx.font='10px "Courier New",monospace';
      ctx.fillText('INV',W-44,20);
    }
    ctx.fillStyle='#ff4466';ctx.textAlign='right';
    ctx.fillText('♥'.repeat(lives),W-6,20);
    ctx.textAlign='left';

    // ── BOTTOM POWER UP BAR ──
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,H-40,W,40);
    let px=4;
    for(let i=0;i<PU_NAMES.length;i++){
      ctx.fillStyle=i===puCursor?'#ffff00':'#888';
      ctx.font='8px "Courier New",monospace';
      ctx.fillText(PU_NAMES[i],px,H-27);
      ctx.fillStyle='#222';ctx.fillRect(px,H-23,58,10);
      const lv=i===0?speedLevel:i===1?missDownLv:i===2?missUpLv:i===3?laserLv:i===4?optionCount:barrierHp;
      ctx.fillStyle=PU_COLORS[i];ctx.fillRect(px,H-23,(lv/PU_MAX[i])*58,10);
      ctx.strokeStyle=i===puCursor?'#ffff00':'#555';ctx.lineWidth=1;ctx.strokeRect(px,H-23,58,10);
      px+=78;
    }

    if(cheatNotice>0){
      ctx.save();
      ctx.textAlign='center';
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.fillRect(W/2-118,44,236,28);
      ctx.strokeStyle='#ffff66';
      ctx.strokeRect(W/2-118,44,236,28);
      ctx.fillStyle='#ffff66';
      ctx.font='bold 13px "Courier New",monospace';
      ctx.fillText(noticeText||'FULL POWER ENABLED',W/2,63);
      ctx.restore();
    }

    if(gameState==='paused'){
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.62)';
      ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.fillStyle='#ffffff';
      ctx.font='bold 38px "Courier New",monospace';
      ctx.fillText('PAUSE',W/2,H/2-8);
      ctx.fillStyle='#aaddff';
      ctx.font='13px "Courier New",monospace';
      ctx.fillText('PRESS ENTER TO RESUME',W/2,H/2+26);
      ctx.restore();
    }

    // ボス登場演出
    if(bossEntryTimer>0){
      ctx.save();
      ctx.fillStyle='rgba(180,0,0,0.32)';ctx.fillRect(0,0,W,H);
      if(bossEntryTimer%20<10){
        ctx.fillStyle='#ff0000';ctx.font='bold 28px "Courier New",monospace';
        ctx.textAlign='center';ctx.fillText('!! WARNING !!',W/2,H/2-18);
        ctx.fillStyle='#ffffff';ctx.font='16px "Courier New",monospace';
        ctx.fillText(bossEntryName,W/2,H/2+14);
      }
      ctx.restore();
      bossEntryTimer--;
    }

    // WARNING 点滅表示（フェーズ変化時）
    if(warnTimer>0&&bossEntryTimer<=0){
      ctx.save();
      if(warnTimer%24<12){
        ctx.fillStyle='#ff0000';ctx.font='bold 22px "Courier New",monospace';
        ctx.textAlign='center';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
        ctx.fillText('!! '+warnBossName+' !!',W/2,54);
      }
      ctx.restore();
      warnTimer--;
    }

    // フラッシュエフェクト
    if(flashFrames>0){
      ctx.save();
      ctx.globalAlpha=flashFrames/20*0.55;
      ctx.fillStyle=flashColor;ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;ctx.restore();
      flashFrames--;
    }

    // 自機点滅（無敵時間）
    // シェイク restore
    ctx.restore();
  }

  // ── TOUCH CONTROLS ──
  function setupTouch(){
    const dpad=document.getElementById('dpad');
    const shotBtn=document.getElementById('shotBtn');
    const powerBtn=document.getElementById('powerBtn');

    function getDir(touch,el){
      const r=el.getBoundingClientRect();
      const cx=r.left+r.width/2,cy=r.top+r.height/2;
      const dx=touch.clientX-cx,dy=touch.clientY-cy;
      const dist=Math.hypot(dx,dy);
      if(dist<18)return null;
      const ang=Math.atan2(dy,dx);
      if(ang>-Math.PI/4&&ang<Math.PI/4)return 'right';
      if(ang>Math.PI/4&&ang<3*Math.PI/4)return 'down';
      if(ang>3*Math.PI/4||ang<-3*Math.PI/4)return 'left';
      return 'up';
    }
    function clearDpad(){keys.up=keys.down=keys.left=keys.right=false;}
    dpad.addEventListener('touchstart',e=>{e.preventDefault();if(!audioInited){initAudio();audioInited=true;}const d=getDir(e.touches[0],dpad);clearDpad();if(d)keys[d]=true;},{passive:false});
    dpad.addEventListener('touchmove',e=>{e.preventDefault();const d=getDir(e.touches[0],dpad);clearDpad();if(d)keys[d]=true;},{passive:false});
    dpad.addEventListener('touchend',e=>{e.preventDefault();clearDpad();},{passive:false});
    dpad.addEventListener('touchcancel',e=>{e.preventDefault();clearDpad();},{passive:false});

    shotBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(!audioInited){initAudio();audioInited=true;}keys.shot=true;},{passive:false});
    shotBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();keys.shot=false;},{passive:false});
    shotBtn.addEventListener('touchcancel',e=>{e.preventDefault();e.stopPropagation();keys.shot=false;},{passive:false});
    shotBtn.addEventListener('mousedown',()=>keys.shot=true);
    shotBtn.addEventListener('mouseup',()=>keys.shot=false);
    shotBtn.addEventListener('mouseleave',()=>keys.shot=false);

    powerBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();activatePU();},{passive:false});
    powerBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();},{passive:false});
    powerBtn.addEventListener('mousedown',()=>activatePU());
  }

  // ── GAME LOOP ──
  function loop(){
    pollGamepad();
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ── START ──
  loadSprites().then(()=>{
    initGame();
    setupTouch();
    requestAnimationFrame(loop);
  });

  </script>
