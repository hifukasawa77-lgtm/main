<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>GALACTIC ASSAULT</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;display:flex;flex-direction:column;align-items:center;
         font-family:'Courier New',monospace;touch-action:none;user-select:none;overflow:hidden;}
    #c{display:block;image-rendering:pixelated;border:2px solid #1a1a2a;}
    #controls{width:480px;height:140px;background:rgba(0,0,0,0.88);border-top:1px solid #222;
              display:flex;align-items:center;justify-content:center;gap:60px;padding:8px 20px;flex-shrink:0;}
    #dpad{position:relative;width:150px;height:150px;border-radius:50%;flex-shrink:0;
          background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);
          touch-action:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .dpad-arrow{position:absolute;font-size:18px;color:rgba(255,255,255,0.5);pointer-events:none;user-select:none;line-height:1;}
    .btns{display:flex;flex-direction:row;gap:16px;align-items:center;flex-shrink:0;}
    .btn{display:flex;flex-direction:column;gap:4px;align-items:center;}
    #shotBtn{width:68px;height:68px;border-radius:50%;
             background:radial-gradient(circle at 35% 35%,#e03030,#900);
             border:3px solid #f66;display:flex;align-items:center;justify-content:center;
             font-size:20px;font-weight:bold;color:#fff;cursor:pointer;
             box-shadow:0 4px 0 #500,0 0 18px rgba(255,60,60,0.4);
             -webkit-tap-highlight-color:transparent;touch-action:none;}
    #powerBtn{width:56px;height:56px;border-radius:50%;
              background:radial-gradient(circle at 35% 35%,#30a0e0,#005090);
              border:3px solid #66ccff;display:flex;align-items:center;justify-content:center;
              font-size:17px;font-weight:bold;color:#fff;cursor:pointer;
              box-shadow:0 4px 0 #003060,0 0 14px rgba(60,160,255,0.4);
              -webkit-tap-highlight-color:transparent;touch-action:none;}
    .btn-label{font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:1px;}
  </style>
</head>
<body>
  <canvas id="c" width="480" height="540"></canvas>
  <div id="controls">
    <div id="dpad">
      <div class="dpad-arrow" style="top:6px;left:50%;transform:translateX(-50%)">▲</div>
      <div class="dpad-arrow" style="bottom:6px;left:50%;transform:translateX(-50%)">▼</div>
      <div class="dpad-arrow" style="left:6px;top:50%;transform:translateY(-50%)">◀</div>
      <div class="dpad-arrow" style="right:6px;top:50%;transform:translateY(-50%)">▶</div>
    </div>
    <div class="btns">
      <div class="btn"><div id="shotBtn">B</div><div class="btn-label">SHOT</div></div>
      <div class="btn"><div id="powerBtn">A</div><div class="btn-label">POWER</div></div>
    </div>
  </div>
  <script>

  const PU_MAX=[5,3,3,4,5,3];
  const STAGES=[
    {id:1,name:'VOLCANO',    bgTop:'#1a0800',bgBot:'#3d1000',groundColor:'#4a2000',accentColor:'#ff4400',bossHp:400,bossName:'TWIN DRAGON'},
    {id:2,name:'MOAI',       bgTop:'#001833',bgBot:'#002244',groundColor:'#334466',accentColor:'#88aacc',bossHp:500,bossName:'MOAI TRIPLE GOD'},

    {id:5,name:'ALIEN BODY', bgTop:'#0d001a',bgBot:'#1a0033',groundColor:'#3d0066',accentColor:'#cc00ff',bossHp:500,bossName:'LARGE AMOEBA'},
    {id:6,name:'COSMOS',     bgTop:'#000008',bgBot:'#000022',groundColor:'#000033',accentColor:'#4488ff',bossHp:800,bossName:'SPACE FORTRESS'},
    {id:7,name:'FORTRESS',   bgTop:'#050508',bgBot:'#0a0a14',groundColor:'#1a1a2a',accentColor:'#ff4444',bossHp:800,bossName:'MEGA ROBOT'},
  ];
  const SPRITE_KEYS=['player','option','fighter','meteor','turret','capsule',
                     'boss1','boss2','boss3','boss4','boss5','boss6','boss7'];
  const SPRITE_SRCS={
    player:'assets/sprites/galactic/player.svg',
    option:'assets/sprites/galactic/option.svg',
    fighter:'assets/sprites/galactic/enemy_fighter.svg',
    meteor:'assets/sprites/galactic/enemy_meteor.svg',
    turret:'assets/sprites/galactic/enemy_turret.svg',
    capsule:'assets/sprites/galactic/powerup_capsule.svg',
    boss1:'assets/sprites/galactic/boss_1_dragon.svg',
    boss2:'assets/sprites/galactic/boss_2_moai.svg',
    boss3:'assets/sprites/galactic/boss_3_pyramid.svg',

    boss6:'assets/sprites/galactic/boss_6_fortress.svg',
    boss7:'assets/sprites/galactic/boss_7_robot.svg',
  };
  const sprites={};
  function loadSprites(){
    return Promise.all(SPRITE_KEYS.map(k=>new Promise(res=>{
      const img=new Image();
      img.onload=()=>{sprites[k]=img;res();};
      img.onerror=()=>{sprites[k]=null;res();};
      img.src=SPRITE_SRCS[k];
    })));
  }
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  let audioInited=false;
        // BGM ENGINE (Web Audio API)
        // ─────────────────────────────────────────────────
        let audioCtx=null, masterGain=null;
        let bgmNodes=[], bgmTimer=null, bgmScheduled=[], bgmStage=0, bgmPlaying=false;
        const LOOK=0.15, TICK=0.05;

        // 音符・周波数テーブル
        const HZ={
          _:0,
          C2:65.41,D2:73.42,E2:82.41,F2:87.31,G2:98.00,Ab2:103.83,A2:110.00,Bb2:116.54,B2:123.47,
          C3:130.81,Cs3:138.59,D3:146.83,Eb3:155.56,E3:164.81,F3:174.61,Fs3:185.00,G3:196.00,Ab3:207.65,A3:220.00,Bb3:233.08,B3:246.94,
          C4:261.63,Cs4:277.18,D4:293.66,Eb4:311.13,E4:329.63,F4:349.23,Fs4:369.99,G4:392.00,Ab4:415.30,A4:440.00,Bb4:466.16,B4:493.88,
          C5:523.25,Cs5:554.37,D5:587.33,Eb5:622.25,E5:659.25,F5:698.46,Fs5:739.99,G5:783.99,Ab5:830.61,A5:880.00,Bb5:932.33,B5:987.77,
          C6:1046.50,D6:1174.66,E6:1318.51,G6:1567.98,
        };

        // 各ステージのBGMデータ
        const BGM_DATA=[
          { // ST1: 火山 — 激しい燃えるドライブ感
            bpm:168, swing:0,
            mel:[ [HZ.A4,1],[HZ.C5,0.5],[HZ.E5,0.5],[HZ.G5,1],[HZ.E5,0.5],[HZ.C5,0.5],
                  [HZ.A4,1],[HZ.G4,0.5],[HZ.E4,0.5],[HZ.A4,2],[HZ._,1],
                  [HZ.G4,1],[HZ.A4,0.5],[HZ.C5,0.5],[HZ.E5,1],[HZ.G5,0.5],[HZ.E5,0.5],
                  [HZ.D5,1],[HZ.C5,1],[HZ.A4,1],[HZ.G4,1],
                  [HZ.E5,1],[HZ.G5,0.5],[HZ.A5,0.5],[HZ.G5,1],[HZ.E5,0.5],[HZ.C5,0.5],
                  [HZ.A4,1],[HZ.B4,1],[HZ.C5,2],[HZ._,1],
                  [HZ.C5,1],[HZ.D5,1],[HZ.E5,2],[HZ.G5,1],[HZ.E5,1],

            bass:[ [HZ.A2,2],[HZ.A2,2],[HZ.C3,2],[HZ.G2,2],

          { // ST2: モアイ — 謎めいた島の古代リズム
            bpm:112, swing:0.05,
            mel:[ [HZ.D5,2],[HZ.F5,1],[HZ.G5,1],[HZ.A5,1.5],[HZ._,0.5],[HZ.G5,1],
                  [HZ.E5,1.5],[HZ.D5,0.5],[HZ.C5,1],[HZ.D5,1],[HZ.A4,2],

                  [HZ.A4,1],[HZ.C5,1],[HZ.D5,1],[HZ.F5,1],[HZ.E5,1],[HZ.D5,1],[HZ.C5,1],[HZ.A4,1],
                  [HZ.G4,4],[HZ.D5,4] ],
            bass:[ [HZ.D3,4],[HZ.G3,2],[HZ.A3,2],
                   [HZ.C4,4],[HZ.D3,4],
                   [HZ.G3,4],[HZ.A3,2],[HZ.D3,2],
                   [HZ.A3,4],[HZ.D3,4] ],
            drum:2, melW:'triangle', bassW:'sine', vol:0.14 },

          { // ST3: ピラミッド — エジプト風の勇壮なメロディ
            bpm:126, swing:0,
            mel:[ [HZ.E5,1.5],[HZ.F5,0.5],[HZ.E5,1],[HZ.Cs5,1],[HZ.B4,1],[HZ.A4,1],
                  [HZ.Ab4,2],[HZ.A4,1],[HZ.B4,1],[HZ.E4,2],
                  [HZ.B4,1],[HZ.Cs5,1],[HZ.E5,2],[HZ.F5,1],[HZ.E5,1],
                  [HZ.Cs5,1.5],[HZ.B4,0.5],[HZ.A4,1],[HZ.Ab4,1],[HZ.E4,2],
                  [HZ.G5,1],[HZ.Fs5,0.5],[HZ.E5,0.5],[HZ.Cs5,1],[HZ.B4,1],[HZ.A4,2],
                  [HZ.Ab4,1],[HZ.B4,1],[HZ.E5,4] ],
            bass:[ [HZ.E3,4],[HZ.Ab3,2],[HZ.E3,2],
                   [HZ.B3,4],[HZ.E3,4],
                   [HZ.A3,4],[HZ.E3,4],
                   [HZ.F3,2],[HZ.E3,6] ],
            drum:3, melW:'sawtooth', bassW:'sine', vol:0.15 },

          { // ST4: 遺跡 — 異星の工場地帯・機械的
            bpm:140, swing:0,
            mel:[ [HZ.A4,0.5],[HZ.C5,0.5],[HZ.Eb5,1],[HZ.C5,0.5],[HZ.A4,0.5],[HZ.G4,2],
                  [HZ.Eb5,1],[HZ.C5,0.5],[HZ.Bb4,0.5],[HZ.A4,1],[HZ._,1],[HZ.G4,1],[HZ.A4,1],
                  [HZ.F5,1],[HZ.Eb5,1],[HZ.C5,0.5],[HZ.Bb4,0.5],[HZ.G4,2],
                  [HZ.A4,0.5],[HZ.Eb5,0.5],[HZ.G5,1],[HZ.Eb5,0.5],[HZ.C5,0.5],[HZ.A4,2],
                  [HZ.Bb4,1],[HZ.C5,0.5],[HZ.Eb5,0.5],[HZ.F5,1],[HZ.Eb5,0.5],[HZ.C5,0.5],
                  [HZ.A4,1],[HZ.G4,1],[HZ.Eb4,2] ],
            bass:[ [HZ.A2,2],[HZ.Eb3,2],[HZ.G2,2],[HZ.A2,2],
                   [HZ.G2,2],[HZ.C3,2],[HZ.Eb3,2],[HZ.A2,2],
                   [HZ.A2,4],[HZ.Eb3,2],[HZ.G2,2],
                   [HZ.Bb2,2],[HZ.A2,6] ],
            drum:1, melW:'sawtooth', bassW:'sawtooth', vol:0.15 },

          { // ST5: 生体 — 有機的・ホラー・不気味さ
            bpm:96, swing:0.08,
            mel:[ [HZ.G4,2],[HZ.Ab4,1],[HZ.G4,1],[HZ.Eb4,2],[HZ.G4,2],
                  [HZ.Bb4,1],[HZ.Ab4,1],[HZ.G4,2],[HZ.Eb4,2],
                  [HZ.F4,2],[HZ.G4,1],[HZ.Ab4,1],[HZ.Bb4,2],[HZ.Ab4,2],
                  [HZ.G4,3],[HZ._,1],[HZ.Eb4,2],[HZ.F4,2],
                  [HZ.G4,1],[HZ.Ab4,0.5],[HZ.Bb4,0.5],[HZ.Ab4,1],[HZ.G4,1],[HZ.Eb4,2],
                  [HZ.G4,6],[HZ._,2] ],
            bass:[ [HZ.G2,4],[HZ.Eb3,4],[HZ.Bb2,4],[HZ.G2,4],
                   [HZ.Ab2,4],[HZ.G2,4],[HZ.Eb3,4],[HZ.G2,4] ],
            drum:2, melW:'triangle', bassW:'sine', vol:0.13 },

          { // ST6: 宇宙要塞 — 壮大・スペースオペラ
            bpm:132, swing:0,
            mel:[ [HZ.D5,2],[HZ.A5,2],[HZ.G5,1],[HZ.F5,1],[HZ.E5,2],
                  [HZ.C5,1],[HZ.D5,1],[HZ.E5,2],[HZ.F5,1],[HZ.G5,1],
                  [HZ.A5,2],[HZ.G5,1],[HZ.F5,1],[HZ.E5,2],[HZ.D5,2],
                  [HZ.C5,4],[HZ.A4,4],
                  [HZ.Bb4,2],[HZ.C5,1],[HZ.D5,1],[HZ.Eb5,2],[HZ.F5,2],
                  [HZ.G5,1],[HZ.F5,1],[HZ.E5,2],[HZ.D5,2],[HZ.C5,2],
                  [HZ.D5,3],[HZ.A4,1],[HZ.Bb4,1],[HZ.C5,1],[HZ.D5,2],
                  [HZ.A4,6],[HZ._,2] ],
            bass:[ [HZ.D3,2],[HZ.A3,2],[HZ.Bb3,2],[HZ.F3,2],
                   [HZ.C4,2],[HZ.G3,2],[HZ.A3,4],
                   [HZ.D3,2],[HZ.Bb3,2],[HZ.F3,2],[HZ.C4,2],
                   [HZ.G3,4],[HZ.D3,4] ],
            drum:4, melW:'square', bassW:'sawtooth', vol:0.16 },

          { // ST7: 要塞 — 最終決戦・燃焼のラッシュ
            bpm:180, swing:0,
            mel:[ [HZ.E5,0.5],[HZ.G5,0.5],[HZ.B5,1],[HZ.G5,0.5],[HZ.E5,0.5],[HZ.D5,1],[HZ.B4,1],
                  [HZ.C5,0.5],[HZ.E5,0.5],[HZ.G5,1],[HZ.E5,0.5],[HZ.C5,0.5],[HZ.B4,2],
                  [HZ.D5,0.5],[HZ.Fs5,0.5],[HZ.A5,1],[HZ.Fs5,0.5],[HZ.D5,0.5],[HZ.C5,1],[HZ.B4,1],
                  [HZ.E5,0.5],[HZ.B5,0.5],[HZ.G5,1],[HZ.E5,0.5],[HZ.G5,0.5],[HZ.B5,2],
                  [HZ.G5,0.5],[HZ.A5,0.5],[HZ.B5,1],[HZ.A5,0.5],[HZ.G5,0.5],[HZ.Fs5,1],[HZ.E5,1],
                  [HZ.D5,0.5],[HZ.E5,0.5],[HZ.Fs5,1],[HZ.G5,0.5],[HZ.A5,0.5],[HZ.B5,2],
                  [HZ.E6,1],[HZ.B5,0.5],[HZ.G5,0.5],[HZ.Fs5,1],[HZ.E5,1],[HZ.D5,1],[HZ.B4,1],
                  [HZ.E5,4] ],
            bass:[ [HZ.E3,2],[HZ.B3,2],[HZ.G3,2],[HZ.E3,2],
                   [HZ.A3,2],[HZ.E3,2],[HZ.B2,2],[HZ.E3,2],
                   [HZ.D3,2],[HZ.A3,2],[HZ.Fs3,2],[HZ.D3,2],
                   [HZ.G3,2],[HZ.E3,6] ],
            drum:1, melW:'square', bassW:'sawtooth', vol:0.17 },
        ];

        function initAudio(){
          if(audioCtx) return;
          audioCtx = new (window.AudioContext||window.webkitAudioContext)();
          masterGain = audioCtx.createGain();
          masterGain.connect(audioCtx.destination);
          masterGain.gain.value=0.2;
        }
        function stopBGM(){
          bgmPlaying=false;
          if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; }
          bgmScheduled=[];
          bgmNodes.forEach(n=>{try{n.stop()}catch{}});
          bgmNodes=[];
        }
        function startBGM(stageId){
          if(!audioCtx) initAudio();
          stopBGM();
          bgmStage=stageId;
          const d=BGM_DATA[stageId-1];
          if(!d)return;
          const beatDur=60/d.bpm;
          let melIdx=0,bassIdx=0,drumFrame=0;
          const mSeq=d.mel, bSeq=d.bass, drumP=d.drum;
          const sw=d.swing||0;

          bgmPlaying=true;
          bgmScheduled=[];
          const now=audioCtx.currentTime;
          let mCur=now, bCur=now;

          function schNote(freq,dur,wave,trackGain){
            if(freq===0)return;
            const osc=audioCtx.createOscillator();
            osc.type=wave;
            osc.frequency.value=freq;
            const g=audioCtx.createGain();
            g.gain.value=trackGain;
            osc.connect(g);
            g.connect(masterGain);
            const st=mCur;
            osc.start(st);
            osc.stop(st+dur);
            bgmNodes.push(osc);
          }
          function schBass(freq,dur,wave,trackGain){
            if(freq===0)return;
            const osc=audioCtx.createOscillator();
            osc.type=wave;
            osc.frequency.value=freq;
            const g=audioCtx.createGain();
            g.gain.value=trackGain;
            osc.connect(g);
            g.connect(masterGain);
            const st=bCur;
            osc.start(st);
            osc.stop(st+dur);
            bgmNodes.push(osc);
          }
          function schDrum(pattern){
            const kickHit=[1,0,0,0,1,0,0,0];
            const snareHit=[0,0,1,0,0,0,1,0];
            const hihatHit=[1,0,1,0,1,0,1,0];
            const ride1=  [1,0,1,1,0,1,0,1];
            const ride2=  [1,1,0,1,0,1,1,0];
            const ride3=  [1,0,1,0,1,1,0,0];
            const ride4=  [1,1,1,0,1,0,1,1];
            let kick=kickHit,snare=snareHit,hat=hihatHit;
            if(pattern===1){kick=kickHit;snare=snareHit;hat=hihatHit;}
            else if(pattern===2){kick=kickHit;snare=snareHit;hat=ride1;}
            else if(pattern===3){kick=kickHit;snare=snareHit;hat=ride2;}
            else if(pattern===4){kick=kickHit;snare=snareHit;hat=ride3;}
            const step=beatDur/2;
            for(let i=0;i<8;i++){
              const t=mCur+i*step;
              if(kick[i]){
                const osc=audioCtx.createOscillator();
                osc.type='sine';
                osc.frequency.setValueAtTime(120,t);
                osc.frequency.exponentialRampToValueAtTime(40,t+0.1);
                const g=audioCtx.createGain();
                g.gain.setValueAtTime(0.25,t);
                g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
                osc.connect(g); g.connect(masterGain);
                osc.start(t); osc.stop(t+0.15);
                bgmNodes.push(osc);
              }
              if(snare[i]){
                const noise=audioCtx.createBufferSource();
                const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
                const data=buf.getChannelData(0);
                for(let j=0;j<data.length;j++)data[j]=Math.random()*2-1;
                noise.buffer=buf;
                const g=audioCtx.createGain();
                g.gain.setValueAtTime(0.14,t);
                g.gain.exponentialRampToValueAtTime(0.01,t+0.1);
                noise.connect(g); g.connect(masterGain);
                noise.start(t);
                bgmNodes.push(noise);
              }
              if(hat[i]){
                const noise=audioCtx.createBufferSource();
                const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
                const data=buf.getChannelData(0);
                for(let j=0;j<data.length;j++)data[j]=Math.random()*2-1;
                noise.buffer=buf;
                const filt=audioCtx.createBiquadFilter();
                filt.type='highpass';
                filt.frequency.value=7000;
                const g=audioCtx.createGain();
                g.gain.value=0.06;
                noise.connect(filt); filt.connect(g); g.connect(masterGain);
                noise.start(t);
                bgmNodes.push(noise);
              }
            }
          }

          function scheduler(){
            if(!bgmPlaying)return;
            const now=audioCtx.currentTime;
            while(mCur<now+LOOK){
              if(melIdx>=mSeq.length){ melIdx=0; }
              const [f,b]=mSeq[melIdx];
              const dur=beatDur*b*(1+sw*((melIdx%2)?0.1:-0.1));
              schNote(f,dur*0.9,d.melW,d.vol);
              schDrum(drumP);
              mCur+=dur;
              melIdx++;
            }
            while(bCur<now+LOOK){
              if(bassIdx>=bSeq.length)bassIdx=0;
              const [f,b]=bSeq[bassIdx];
              const dur=beatDur*b;

              bassIdx++;
            }
          }

          scheduler();
          bgmTimer=setInterval(scheduler,TICK*1000);
        }
  // ── GAME VARIABLES ──
  let gameState='loading',frame=0,stageFrame=0;
  let score=0,lives=3,stage=1;
  let player,bullets,enemies,enemyBullets,particles,powerItems,options,stars,terrain;
  let shotCooldown=0,killCount=0,puCursor=0;
  let speedLevel=1,missDownLv=0,missUpLv=0,laserLv=0,optionCount=0,barrierHp=0;
  let waveCharge=0,waveCharging=false,waveCooldown=0;
  let stageFrame0=0,stageClear=false,stageClearTimer=0,bossSpawned=false,bossAlive=false;

  let shotPressed=false;
  const keys={up:false,down:false,left:false,right:false,shot:false,power:false};

  // ── INPUT ──
  window.addEventListener('keydown',e=>{

    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k))e.preventDefault();

  });
  window.addEventListener('keyup',e=>{
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W')keys.up=false;
    if(k==='ArrowDown'||k==='s'||k==='S')keys.down=false;
    if(k==='ArrowLeft'||k==='a'||k==='A')keys.left=false;
    if(k==='ArrowRight'||k==='d'||k==='D')keys.right=false;

  // ── INIT ──
  function initGame(){
    score=0;lives=3;gameState='title';frame=0;stageFrame=0;
    shotCooldown=0;killCount=0;puCursor=0;shotPressed=false;
    speedLevel=1;missDownLv=0;missUpLv=0;laserLv=0;optionCount=0;barrierHp=0;
    waveCharge=0;waveCharging=false;waveCooldown=0;
    stage=1;stageClear=false;stageClearTimer=0;bossSpawned=false;bossAlive=false;
    forceScrollActive=false;
    bullets=[];enemies=[];enemyBullets=[];particles=[];powerItems=[];options=[];
    stars=[];
    for(let i=0;i<100;i++)stars.push({x:Math.random()*W,y:Math.random()*H,speed:0.3+Math.random()*1.5,size:1+Math.random()*1.5});
    terrain=[];

  }

  function resetStage(n){
    stage=n;stageFrame=0;stageClear=false;stageClearTimer=0;
    bossSpawned=false;bossAlive=false;forceScrollActive=false;
    bullets=[];enemies=[];enemyBullets=[];particles=[];powerItems=[];
    for(let o of options){o.x=player.x;o.y=player.y;}
    player.x=80;player.y=H/2;player.invul=60;
    killCount=0;
    startBGM(n);
  }

  // ── HIT TEST ──
  function hitTest(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

  // ── DAMAGE ──
  function damagePlayer(){
    if(barrierHp>0){barrierHp--;player.invul=30;}
    else{
      player.hp--;player.invul=120;
      if(player.hp<=0){
        lives--;
        if(lives>0){player.hp=1;player.x=80;player.y=H/2;player.invul=120;bullets=[];enemyBullets=[];powerItems=[];}
        else{gameState='gameover';stopBGM();}
      }
    }
  }

  // ── POWER UP ──
  function activatePU(){
    if(puCursor===0)speedLevel=Math.min(PU_MAX[0],speedLevel+1);
    else if(puCursor===1)missDownLv=Math.min(PU_MAX[1],missDownLv+1);
    else if(puCursor===2)missUpLv=Math.min(PU_MAX[2],missUpLv+1);
    else if(puCursor===3)laserLv=Math.min(PU_MAX[3],laserLv+1);
    else if(puCursor===4&&optionCount<5){optionCount++;options.push({x:player.x,y:player.y});}
    else if(puCursor===5)barrierHp=Math.min(PU_MAX[5],barrierHp+1);
  }

  // ── UPDATE PLAYER ──
  function updatePlayer(){
    if(player.invul>0)player.invul--;
    const spd=2+speedLevel*0.5;
    if(keys.up)player.y-=spd;
    if(keys.down)player.y+=spd;
    if(keys.left)player.x-=spd;
    if(keys.right)player.x+=spd;
    player.x=Math.max(0,Math.min(W-player.w,player.x));
    player.y=Math.max(0,Math.min(H-player.h,player.y));
    if(shotCooldown>0)shotCooldown--;
    if(waveCooldown>0)waveCooldown--;
    if(keys.shot&&shotCooldown===0){
      shotCooldown=laserLv>=1?5:10;
      const px=player.x+player.w,py=player.y+player.h/2;
      if(laserLv===0)bullets.push({x:px,y:py,vx:8,vy:0,w:8,h:2,dmg:1,type:'normal'});
      else if(laserLv===1)bullets.push({x:px,y:py,vx:8,vy:0,w:14,h:3,dmg:2,type:'laser'});
      else if(laserLv===2)bullets.push({x:px,y:py-2,vx:8,vy:0,w:18,h:4,dmg:3,type:'laser'});
      else if(laserLv===3)bullets.push({x:px,y:py-3,vx:8,vy:0,w:24,h:5,dmg:4,type:'laser'});
      else bullets.push({x:px,y:py-4,vx:8,vy:0,w:32,h:6,dmg:5,type:'laser'});
      if(missDownLv>0)bullets.push({x:px,y:player.y+player.h,vx:6,vy:2,w:6,h:6,dmg:2,type:'mssl',tgt:null});
      if(missUpLv>0)bullets.push({x:px,y:player.y,vx:6,vy:-2,w:6,h:6,dmg:2,type:'mssl',tgt:null});
      for(const o of options)bullets.push({x:o.x+10,y:o.y+5,vx:8,vy:0,w:8,h:2,dmg:1,type:'normal'});
    }
    if(keys.shot&&laserLv>=1&&!waveCharging){waveCharge++;if(waveCharge>=60)waveCharging=true;}
    if((!keys.shot||laserLv===0)&&waveCharge>0){waveCharge=0;waveCharging=false;}
    if(waveCharging&&waveCooldown===0&&keys.shot){
      waveCharging=false;waveCharge=0;waveCooldown=90;
      for(let i=0;i<12;i++){
        const ang=-Math.PI/6+i*(Math.PI/3)/11;
        bullets.push({x:player.x+player.w,y:player.y+player.h/2,vx:Math.cos(ang)*9,vy:Math.sin(ang)*9,w:10,h:10,dmg:6,type:'wave'});
      }
    }
    if(keys.power&&!shotPressed){shotPressed=true;activatePU();}
    if(!keys.power)shotPressed=false;
    if(barrierHp>0&&frame%6===0)particles.push({x:player.x+Math.random()*player.w,y:player.y+Math.random()*player.h,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:20,color:'#4488ff',size:3});
  }

  // ── UPDATE BULLETS ──
  function updateBullets(){
    for(const b of bullets){
      b.x+=b.vx;b.y+=b.vy;
      if(b.type==='mssl'&&!b.tgt){
        let best=null,minD=999;
        for(const e of enemies){if(e.isDead)continue;const d=Math.hypot(e.x-b.x,e.y-b.y);if(d<minD){minD=d;best=e;}}
        if(best)b.tgt=best;
      }
      if(b.type==='mssl'&&b.tgt){
        const dx=b.tgt.x-b.x,dy=b.tgt.y-b.y,dist=Math.hypot(dx,dy);
        if(dist>0){const tx=dx/dist*7,ty=dy/dist*7;b.vx+=(tx-b.vx)*0.1;b.vy+=(ty-b.vy)*0.1;}
      }
    }
    bullets=bullets.filter(b=>b.x<W+50&&b.x>-50&&b.y<H+50&&b.y>-50);
  }

  // ── UPDATE OPTIONS ──
  function updateOptions(){
    if(!optionCount)return;
    for(let i=0;i<options.length;i++){
      const o=options[i];
      o.x+=(player.x-(i+1)*18-o.x)*0.2;
      o.y+=(player.y-o.y)*0.2;
    }
  }

  // ── UPDATE ENEMIES ──
  function updateEnemies(){
    for(const e of enemies){
      if(e.isDead){e.deadTimer++;if(e.deadTimer>30)e.remove=true;continue;}
      if(e.type==='zako'){e.x+=e.vx;e.y+=e.vy;if(e.x<-50)e.remove=true;}
      else if(e.type==='bigMeteor'){e.x+=e.vx;e.y+=e.vy;e.spin+=e.spinSpeed;if(e.x<-100)e.remove=true;}
      else if(e.type==='boss1'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;
          if(e.stateTimer<120)e.y+=(H/2-e.y)*0.01;
          else if(e.stateTimer<240){
            e.y+=Math.sin((e.stateTimer-120)*0.05)*2;
            if(e.stateTimer%60===0){
              enemyBullets.push({x:e.x,y:e.y+32,vx:-3,vy:0,w:8,h:8});
              enemyBullets.push({x:e.x,y:e.y+32,vx:-3,vy:1.2,w:8,h:8});
              enemyBullets.push({x:e.x,y:e.y+32,vx:-3,vy:-1.2,w:8,h:8});
            }
          }else e.stateTimer=0;
        }
      }
      else if(e.type==='boss2'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;
          if(e.stateTimer%80===0){
            for(let i=0;i<8;i++){const ang=i*Math.PI/4;enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:Math.cos(ang)*2.5,vy:Math.sin(ang)*2.5,w:6,h:6});}
          }
        }
      }
      else if(e.type==='boss3'){

        else{
          e.stateTimer++;
          if(e.stateTimer<100)e.y+=(90-e.y)*0.02;
          else if(e.stateTimer<200)e.y+=(H-90-e.y)*0.02;
          else e.stateTimer=0;
          if(e.stateTimer%40===0)enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-4,vy:0,w:10,h:10});
        }
      }
      else if(e.type==='boss4'){

        else{

          if(e.stateTimer%50===0){
            for(let i=0;i<3;i++)enemyBullets.push({x:e.x,y:e.y+20+i*20,vx:-3-i*0.5,vy:0,w:7,h:7});
          }
        }
      }
      else if(e.type==='boss5'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;e.y+=(H/2-e.y)*0.005;
          if(e.stateTimer%70===0){
            for(let i=-1;i<=1;i++)enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:-3.5,vy:i*1.2,w:8,h:8});
          }
        }
      }
      else if(e.type==='boss6'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;e.y+=Math.cos(e.stateTimer*0.02)*2;
          if(e.stateTimer%45===0){
            for(let i=0;i<10;i++){const ang=-Math.PI/2+i*(Math.PI/9);enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,w:6,h:6});}
          }
        }
      }
      else if(e.type==='boss7'){
        if(e.phase===0){e.x+=e.vx;if(e.x<=300){e.vx=0;e.phase=1;e.stateTimer=0;forceScrollActive=false;}}
        else{
          e.stateTimer++;
          if(!e.attackPhase)e.attackPhase=0;
          if(e.attackPhase===0&&e.hp<534){e.attackPhase=1;for(let i=0;i<15;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:40,color:'#ff4400',size:5});}
          if(e.attackPhase===1&&e.hp<267){e.attackPhase=2;for(let i=0;i<20;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,life:50,color:'#ff2200',size:6});}
          const spd=e.attackPhase===0?1.5:e.attackPhase===1?2.5:4;
          if(e.stateTimer<150)e.y+=(80-e.y)*0.02*spd;
          else if(e.stateTimer<300)e.y+=(H-80-e.y)*0.02*spd;
          else e.stateTimer=0;
          const interval=e.attackPhase===0?60:e.attackPhase===1?40:30;
          const count=e.attackPhase===0?3:e.attackPhase===1?5:8;
          if(e.stateTimer%interval===0){
            for(let i=0;i<count;i++){
              const ang=count===8?i*Math.PI*2/8:(Math.PI*1.5-Math.PI/3)+i*(Math.PI*2/3)/Math.max(1,count-1);
              enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,w:8,h:8});
            }
          }
        }
      }

      for(const b of bullets){
        if(hitTest(b,e)){
          e.hp-=b.dmg;b.remove=true;
          particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15,color:'#ffaa00',size:4});
          if(e.hp<=0&&!e.isDead){
            e.isDead=true;e.deadTimer=0;score+=e.pts;
            if(e.type.startsWith('boss')){stageClear=true;bossAlive=false;score+=5000;}
            else{killCount++;if(killCount%8===0){const r=Math.random();const pu=r<0.3?0:r<0.5?1:r<0.65?2:r<0.8?3:r<0.9?4:5;powerItems.push({x:e.x,y:e.y,vx:-1,vy:0,w:20,h:12,type:pu});}}
            for(let i=0;i<12;i++)particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:35,color:'#ff4400',size:3+Math.random()*3});
          }
        }
      }
      if(!e.isDead&&player.invul===0&&hitTest(player,e))damagePlayer();
    }
    enemies=enemies.filter(e=>!e.remove);
  }

  // ── UPDATE ENEMY BULLETS ──
  function updateEnemyBullets(){
    for(const b of enemyBullets){
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<-50||b.x>W+50||b.y<-50||b.y>H+50)b.remove=true;
      if(player.invul===0&&hitTest(player,b)){b.remove=true;damagePlayer();}
    }
    enemyBullets=enemyBullets.filter(b=>!b.remove);
  }

  // ── UPDATE PARTICLES ──
  function updateParticles(){
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)p.remove=true;}
    particles=particles.filter(p=>!p.remove);
  }

  // ── UPDATE POWER ITEMS ──
  function updatePowerItems(){
    for(const p of powerItems){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-50)p.remove=true;
      if(hitTest(player,p)){p.remove=true;puCursor=p.type;}
    }
    powerItems=powerItems.filter(p=>!p.remove);
  }

  // ── UPDATE TERRAIN ──
  function updateTerrain(){
    for(const t of terrain){
      t.x-=1;
      if(t.x<-30){t.x+=terrain.length*30;t.yTop=45+Math.random()*35;t.yBot=H-85-Math.random()*35;}
    }
  }

  // ── SPAWN ENEMIES ──
  function spawnEnemies(){
    if(stageClear)return;
    if(!bossSpawned&&stageFrame>600){
      forceScrollActive=true;bossSpawned=true;bossAlive=true;
      const st=STAGES[stage-1];
      const bossTypes=['boss1','boss2','boss3','boss4','boss5','boss6','boss7'];
      const bossW=[120,100,100,110,120,140,120];
      const bossH=[64,80,80,80,100,80,120];
      const bt=bossTypes[stage-1];
      enemies.push({type:bt,x:W,y:H/2-bossH[stage-1]/2,w:bossW[stage-1],h:bossH[stage-1],
                    hp:st.bossHp,vx:-1,pts:0,phase:0,stateTimer:0,attackPhase:0,isDead:false,deadTimer:0});
    }
    if(bossSpawned)return;
    if(stageFrame%90===0)enemies.push({type:'zako',x:W,y:50+Math.random()*(H-100),w:20,h:20,vx:-2,vy:0,hp:3,pts:100,isDead:false,deadTimer:0});
    if(stageFrame%150===0&&stage>=2)enemies.push({type:'bigMeteor',x:W,y:Math.random()*H,w:40,h:40,vx:-1.5,vy:(Math.random()-0.5)*1.5,spin:0,spinSpeed:0.05,hp:8,pts:300,isDead:false,deadTimer:0});
  }

  // ── MAIN UPDATE ──
  function update(){
    frame++;
    if(gameState==='title'){
      if(keys.shot&&!shotPressed){shotPressed=true;if(!audioInited){initAudio();audioInited=true;}gameState='intro';resetStage(1);stageFrame=0;}
      if(!keys.shot)shotPressed=false;
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
    }
    else if(gameState==='intro'){
      stageFrame++;
      if(stageFrame>180){gameState='playing';stageFrame=0;}
    }
    else if(gameState==='playing'){
      stageFrame++;
      updatePlayer();updateBullets();updateOptions();updateEnemies();
      updateEnemyBullets();updateParticles();updatePowerItems();updateTerrain();
      spawnEnemies();
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
      if(stageClear){
        stageClearTimer++;
        if(stageClearTimer>120){
          if(stage<7){gameState='intro';resetStage(stage+1);stageFrame=0;}
          else{gameState='ending';stopBGM();}
        }
      }
    }
    else if(gameState==='gameover'||gameState==='ending'){
      if(keys.shot&&!shotPressed){shotPressed=true;gameState='title';initGame();}
      if(!keys.shot)shotPressed=false;
      for(const s of stars){s.x-=s.speed;if(s.x<0)s.x+=W;}
    }
  }
  // ── DRAW SPRITE ──
  function drawSprite(key,cx,cy,w,h,alpha,glowColor){
    ctx.save();
    if(alpha!=null)ctx.globalAlpha=alpha;
    if(glowColor){ctx.shadowColor=glowColor;ctx.shadowBlur=10;}
    const img=sprites[key];
    if(img)ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
    else{ctx.fillStyle=glowColor||'#ff00ff';ctx.fillRect(cx-w/2,cy-h/2,w,h);}
    ctx.restore();
  }

  // ── RENDER TITLE ──
  function renderTitle(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    for(const s of stars){ctx.fillStyle=`rgba(255,255,255,${0.4+s.size*0.2})`;ctx.fillRect(s.x,s.y,s.size,s.size);}
    const grd=ctx.createLinearGradient(0,H/2-40,0,H/2+10);
    grd.addColorStop(0,'#00ffff');grd.addColorStop(1,'#0088ff');
    ctx.fillStyle=grd;ctx.font='bold 38px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('GALACTIC ASSAULT',W/2,H/2-10);
    ctx.fillStyle='rgba(0,255,255,0.4)';ctx.shadowColor='#00ffff';ctx.shadowBlur=20;
    ctx.fillText('GALACTIC ASSAULT',W/2,H/2-10);
    ctx.shadowBlur=0;
    ctx.fillStyle='#aaddff';ctx.font='13px "Courier New",monospace';
    ctx.fillText('ギャラクティック・アサルト',W/2,H/2+18);
    if(Math.floor(frame/30)%2===0){
      ctx.fillStyle='#ffffff';ctx.font='15px "Courier New",monospace';
      ctx.fillText('PRESS Z / SPACE TO START',W/2,H/2+60);
    }
    ctx.fillStyle='#556677';ctx.font='11px "Courier New",monospace';
    ctx.fillText('© 2026 FUKASAWA',W/2,H-20);
    ctx.textAlign='left';
  }

  // ── RENDER INTRO ──
  function renderIntro(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    const st=STAGES[stage-1];
    ctx.fillStyle=st.accentColor;ctx.font='bold 42px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('STAGE '+stage,W/2,H/2-20);
    ctx.fillStyle='#ffffff';ctx.font='22px "Courier New",monospace';
    ctx.fillText(st.name,W/2,H/2+20);
    ctx.fillStyle='#aaaaaa';ctx.font='14px "Courier New",monospace';
    ctx.fillText('BOSS: '+st.bossName,W/2,H/2+52);
    ctx.textAlign='left';
  }

  // ── RENDER GAME OVER ──
  function renderGameOver(){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff2200';ctx.font='bold 44px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-10);
    ctx.fillStyle='#ffffff';ctx.font='14px "Courier New",monospace';
    ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,H/2+30);
    ctx.fillStyle='#aaaaaa';ctx.fillText('PRESS Z TO RETURN TO TITLE',W/2,H/2+60);
    ctx.textAlign='left';
  }

  // ── RENDER ENDING ──
  function renderEnding(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    for(const s of stars){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(s.x,s.y,s.size,s.size);}
    ctx.fillStyle='#00ffff';ctx.font='bold 30px "Courier New",monospace';
    ctx.textAlign='center';ctx.fillText('ALL STAGES CLEAR!',W/2,H/2-30);
    ctx.fillStyle='#ffff00';ctx.font='18px "Courier New",monospace';
    ctx.fillText('SCORE: '+String(score).padStart(7,'0'),W/2,H/2+10);
    ctx.fillStyle='#ffffff';ctx.font='15px "Courier New",monospace';
    ctx.fillText('CONGRATULATIONS!  おめでとう！',W/2,H/2+44);
    if(Math.floor(frame/30)%2===0){ctx.fillStyle='#aaaaaa';ctx.font='13px "Courier New",monospace';ctx.fillText('PRESS Z TO TITLE',W/2,H/2+76);}
    ctx.textAlign='left';
  }

  // ── MAIN RENDER ──
  function render(){
    if(gameState==='title'){renderTitle();frame++;return;}
    if(gameState==='intro'){renderIntro();return;}
    if(gameState==='gameover'){renderGameOver();return;}
    if(gameState==='ending'){renderEnding();frame++;return;}

    const st=STAGES[stage-1];
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,st.bgTop);grad.addColorStop(1,st.bgBot);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

    for(const s of stars){ctx.fillStyle=`rgba(255,255,255,${0.3+s.size*0.15})`;ctx.fillRect(s.x,s.y,s.size,s.size);}

    for(const t of terrain){
      ctx.fillStyle=st.groundColor;
      ctx.fillRect(t.x,0,30,t.yTop);ctx.fillRect(t.x,t.yBot,30,H-t.yBot);
      ctx.strokeStyle=st.accentColor;ctx.lineWidth=1.5;
      ctx.strokeRect(t.x,0,30,t.yTop);ctx.strokeRect(t.x,t.yBot,30,H-t.yBot);
    }

    for(const p of particles){
      ctx.save();ctx.globalAlpha=Math.max(0,p.life/30);
      ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      ctx.restore();
    }

    for(const b of bullets){
      ctx.save();
      if(b.type==='normal'){ctx.shadowColor='#00ffff';ctx.shadowBlur=6;ctx.fillStyle='#00ffff';}
      else if(b.type==='laser'){ctx.shadowColor='#00ff88';ctx.shadowBlur=8;ctx.fillStyle='#00ff88';}
      else if(b.type==='mssl'){ctx.shadowColor='#ff8800';ctx.shadowBlur=6;ctx.fillStyle='#ff8800';}
      else{ctx.shadowColor='#ff44ff';ctx.shadowBlur=10;ctx.fillStyle='#ff44ff';}
      ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.restore();
    }

    for(const e of enemies){
      if(e.isDead&&e.deadTimer>30)continue;
      const alpha=e.isDead?Math.max(0,1-e.deadTimer/30):1;
      if(e.type==='zako') drawSprite('fighter',e.x+e.w/2,e.y+e.h/2,28,18,alpha,'#ff4400');
      else if(e.type==='bigMeteor'){
        ctx.save();ctx.globalAlpha=alpha;
        ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.rotate(e.spin);
        if(sprites.meteor)ctx.drawImage(sprites.meteor,-22,-22,44,44);
        else{ctx.fillStyle='#886644';ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();}
        ctx.restore();
      }
      else if(e.type==='boss1') drawSprite('boss1',e.x+e.w/2,e.y+e.h/2,120,64,alpha,'#ff4400');
      else if(e.type==='boss2') drawSprite('boss2',e.x+e.w/2,e.y+e.h/2,100,80,alpha,'#88aacc');
      else if(e.type==='boss3') drawSprite('boss3',e.x+e.w/2,e.y+e.h/2,100,80,alpha,'#aa7700');
      else if(e.type==='boss4') drawSprite('boss4',e.x+e.w/2,e.y+e.h/2,110,80,alpha,'#cc00ff');
      else if(e.type==='boss5') drawSprite('boss5',e.x+e.w/2,e.y+e.h/2,120,100,alpha,'#ff00cc');
      else if(e.type==='boss6') drawSprite('boss6',e.x+e.w/2,e.y+e.h/2,140,80,alpha,'#4488ff');
      else if(e.type==='boss7') drawSprite('boss7',e.x+e.w/2,e.y+e.h/2,120,120,alpha,'#ff2200');

      if(e.type.startsWith('boss')&&!e.isDead){
        const st2=STAGES[stage-1];
        const maxHp=STAGES[stage-1].bossHp;
        const pct=Math.max(0,e.hp/maxHp);
        const bx=e.x,by=e.y-18,bw=e.w;
        ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,8);
        ctx.fillStyle=pct>0.5?'#00ff44':pct>0.25?'#ffaa00':'#ff2200';
        ctx.fillRect(bx,by,bw*pct,8);
        ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,8);
        ctx.fillStyle='#ffffff';ctx.font='10px "Courier New",monospace';
        ctx.fillText(st2.bossName,bx,by-3);
      }
    }

    for(const b of enemyBullets){
      ctx.save();ctx.shadowColor='#ff2200';ctx.shadowBlur=6;
      ctx.fillStyle='#ff2200';ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.restore();
    }

    for(const p of powerItems){
      drawSprite('capsule',p.x+p.w/2,p.y+p.h/2,24,16,1,'#ffffff');
      ctx.fillStyle=PU_COLORS[p.type];ctx.font='bold 7px "Courier New",monospace';
      ctx.textAlign='center';ctx.fillText(PU_NAMES[p.type].slice(0,4),p.x+p.w/2,p.y+p.h/2+3);
      ctx.textAlign='left';
    }

    if(barrierHp>0){
      ctx.save();ctx.shadowColor='#4488ff';ctx.shadowBlur=12;
      ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(player.x+player.w/2,player.y+player.h/2,22,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    if(player.invul%4<2){
      drawSprite('player',player.x+player.w/2,player.y+player.h/2,64,28,1,'#00ffff');
    }

    for(const o of options) drawSprite('option',o.x+5,o.y+5,20,20,0.9,'#00ffff');

    if(waveCharge>0||waveCharging){
      const pct=Math.min(1,waveCharge/60);
      ctx.fillStyle='rgba(255,68,255,0.25)';ctx.fillRect(10,H-50,200*pct,7);
      ctx.strokeStyle='#ff44ff';ctx.lineWidth=1;ctx.strokeRect(10,H-50,200,7);
      ctx.fillStyle='#ff44ff';ctx.font='9px "Courier New",monospace';
      ctx.fillText('WAVE CHARGE',215,H-44);
    }

    // ── TOP HUD ──
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,30);
    ctx.fillStyle='#00ffff';ctx.font='13px "Courier New",monospace';
    ctx.fillText('SCORE:'+String(score).padStart(7,'0'),6,20);
    ctx.textAlign='center';
    ctx.fillStyle=st.accentColor;ctx.fillText('ST'+stage+' '+st.name,W/2,20);
    ctx.fillStyle='#ff4466';ctx.textAlign='right';
    ctx.fillText('♥'.repeat(lives),W-6,20);
    ctx.textAlign='left';

    // ── BOTTOM POWER UP BAR ──
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,H-40,W,40);
    let px=4;
    for(let i=0;i<PU_NAMES.length;i++){
      ctx.fillStyle=i===puCursor?'#ffff00':'#888';
      ctx.font='9px "Courier New",monospace';
      ctx.fillText(PU_NAMES[i],px,H-27);
      ctx.fillStyle='#222';ctx.fillRect(px,H-23,58,10);
      const lv=i===0?speedLevel:i===1?missDownLv:i===2?missUpLv:i===3?laserLv:i===4?optionCount:barrierHp;
      ctx.fillStyle=PU_COLORS[i];ctx.fillRect(px,H-23,(lv/PU_MAX[i])*58,10);
      ctx.strokeStyle=i===puCursor?'#ffff00':'#555';ctx.lineWidth=1;ctx.strokeRect(px,H-23,58,10);
      px+=80;
    }
  }

  // ── TOUCH CONTROLS ──
  function setupTouch(){
    const dpad=document.getElementById('dpad');
    const shotBtn=document.getElementById('shotBtn');
    const powerBtn=document.getElementById('powerBtn');

    function getDir(touch,el){
      const r=el.getBoundingClientRect();
      const cx=r.left+r.width/2,cy=r.top+r.height/2;
      const dx=touch.clientX-cx,dy=touch.clientY-cy;
      const dist=Math.hypot(dx,dy);
      if(dist<18)return null;
      const ang=Math.atan2(dy,dx);
      if(ang>-Math.PI/4&&ang<Math.PI/4)return 'right';
      if(ang>Math.PI/4&&ang<3*Math.PI/4)return 'down';
      if(ang>3*Math.PI/4||ang<-3*Math.PI/4)return 'left';
      return 'up';
    }
    function clearDpad(){keys.up=keys.down=keys.left=keys.right=false;}
    dpad.addEventListener('touchstart',e=>{e.preventDefault();if(!audioInited){initAudio();audioInited=true;}const d=getDir(e.touches[0],dpad);clearDpad();if(d)keys[d]=true;},{passive:false});
    dpad.addEventListener('touchmove',e=>{e.preventDefault();const d=getDir(e.touches[0],dpad);clearDpad();if(d)keys[d]=true;},{passive:false});
    dpad.addEventListener('touchend',e=>{e.preventDefault();clearDpad();},{passive:false});
    dpad.addEventListener('touchcancel',e=>{e.preventDefault();clearDpad();},{passive:false});

    shotBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(!audioInited){initAudio();audioInited=true;}keys.shot=true;},{passive:false});
    shotBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();keys.shot=false;},{passive:false});
    shotBtn.addEventListener('touchcancel',e=>{e.preventDefault();e.stopPropagation();keys.shot=false;},{passive:false});
    shotBtn.addEventListener('mousedown',()=>keys.shot=true);
    shotBtn.addEventListener('mouseup',()=>keys.shot=false);
    shotBtn.addEventListener('mouseleave',()=>keys.shot=false);

    powerBtn.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();activatePU();},{passive:false});
    powerBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();},{passive:false});
    powerBtn.addEventListener('mousedown',()=>activatePU());
  }

  // ── GAME LOOP ──
  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ── START ──
  loadSprites().then(()=>{
    initGame();
    setupTouch();
    requestAnimationFrame(loop);
  });

  </script>
</body>
</html>
