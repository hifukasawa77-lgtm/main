<script src="gamekit/gamekit.js"></script>
<script>
(function(){
'use strict';

/* ============================================================
   TURBO KART GRAND PRIX — GameKit edition
   - GameKit.Engine / Scene / Input / Sfx / UI が土台
   - グラフィックは GameKit.Gen のプロシージャル生成（背景ネビュラ・
     草地テクスチャ・アイテムボックス/スター/ドライバーのアイコン・
     シード付き乱数による小物配置）でゼロから描き起こし
   - オリジナルのキャラ/車両/アイテム（第三者IPは不使用）
   ============================================================ */

const { Engine, Scene, UI, Gen, MathX } = GameKit;
const clamp = MathX.clamp;

const W = 960, H = 600;
const canvas = document.getElementById('game');
const engine = new Engine(canvas, { width: W, height: H });
const ctx = engine.ctx;
const save = new GameKit.Save('turbo-kart');

const GPT_ASSET_DIR = 'assets/turbo-kart-gpt/';
function loadRasterAsset(file){
  const img = new Image();
  img.decoding = 'async';
  img.src = GPT_ASSET_DIR + file;
  return img;
}
const gptImages = {
  atlas: loadRasterAsset('asset-atlas-gpt-image-2.png'),
  track: loadRasterAsset('track-textures-gpt-image-2.png')
};
function imageReady(img){ return !!(img && img.complete && img.naturalWidth > 0); }
const atlasRects = {
  kartCyan:   {x:84,y:20,w:300,h:220},
  kartOrange: {x:480,y:20,w:300,h:220},
  kartPurple: {x:875,y:20,w:300,h:220},
  kartGreen:  {x:84,y:266,w:300,h:220},
  kartRed:    {x:480,y:266,w:300,h:220},
  kartYellow: {x:875,y:266,w:300,h:220},
  itemBox: {x:70,y:500,w:205,h:190},
  nitro: {x:340,y:505,w:165,h:165},
  oilCan: {x:555,y:505,w:170,h:170},
  star: {x:790,y:500,w:205,h:170},
  shield: {x:1040,y:500,w:170,h:170},
  oilPuddle: {x:80,y:710,w:280,h:108},
  boostFlame: {x:470,y:710,w:292,h:120},
  signArrow: {x:890,y:705,w:280,h:120},
  treeRound: {x:105,y:845,w:230,h:220},
  treePine: {x:450,y:820,w:205,h:260},
  finishBanner: {x:735,y:840,w:430,h:210},
  speedGauge: {x:65,y:1050,w:235,h:170},
  driftMeter: {x:340,y:1094,w:310,h:100},
  curbBlock: {x:18,y:1172,w:292,h:62},
  tireStack: {x:635,y:1152,w:180,h:78},
  guardRail: {x:950,y:1142,w:288,h:74}
};
const trackRects = {
  sky: {x:16,y:16,w:700,h:264},
  mountain: {x:16,y:290,w:700,h:50},
  neonRail: {x:16,y:356,w:700,h:50},
  asphalt: {x:16,y:424,w:372,h:390},
  asphaltCurve: {x:402,y:424,w:352,h:390},
  curb: {x:768,y:422,w:472,h:68},
  checker: {x:768,y:674,w:472,h:68},
  lane: {x:768,y:760,w:472,h:54},
  grass: {x:16,y:914,w:372,h:212},
  lightStreak: {x:768,y:830,w:472,h:68},
  dustStrip: {x:768,y:1014,w:472,h:102}
};
function drawAsset(c, img, r, x, y, w, h, alpha){
  if (!imageReady(img) || !r) return false;
  c.save();
  if (alpha != null) c.globalAlpha = alpha;
  c.drawImage(img, r.x, r.y, r.w, r.h, x, y, w, h);
  c.restore();
  return true;
}
function drawTexturedQuad(c, pts, img, r, alpha){
  if (!imageReady(img) || !r) return false;
  const minX = Math.min(pts[0].x, pts[1].x, pts[2].x, pts[3].x);
  const maxX = Math.max(pts[0].x, pts[1].x, pts[2].x, pts[3].x);
  const minY = Math.min(pts[0].y, pts[1].y, pts[2].y, pts[3].y);
  const maxY = Math.max(pts[0].y, pts[1].y, pts[2].y, pts[3].y);
  c.save();
  if (alpha != null) c.globalAlpha = alpha;
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  c.lineTo(pts[1].x, pts[1].y);
  c.lineTo(pts[2].x, pts[2].y);
  c.lineTo(pts[3].x, pts[3].y);
  c.closePath();
  c.clip();
  c.drawImage(img, r.x, r.y, r.w, r.h, minX, minY, Math.max(1,maxX-minX), Math.max(1,maxY-minY));
  c.restore();
  return true;
}

/* ---------------- Mobile D-pad (multi-touch DOM buttons) ---------------- */
// GameKit.Input は単一ポインタなので、同時押しが必要なD-padはDOMボタンで補う
const touch = { left:false, right:false, accel:false, brake:false, drift:false, itemJust:false };
function bindTouchBtn(id, prop, momentary){
  const el = document.getElementById(id);
  if (!el) return;
  const on = (e)=>{ e.preventDefault(); if (momentary) touch.itemJust = true; else touch[prop] = true; el.classList.add('active'); RaceAudio.unlock(); };
  const off = (e)=>{ if (e) e.preventDefault(); if (!momentary) touch[prop] = false; el.classList.remove('active'); };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindTouchBtn('btn-left','left');
bindTouchBtn('btn-right','right');
bindTouchBtn('btn-accel','accel');
bindTouchBtn('btn-brake','brake');
bindTouchBtn('btn-drift','drift');
bindTouchBtn('btn-item',null,true);

/* ---------------- Control reader (keyboard + D-pad merged) ---------------- */
function readControls(game){
  const k = game.input;
  const up    = k.isDown('ArrowUp')   || k.isDown('KeyW') || touch.accel;
  const down  = k.isDown('ArrowDown') || k.isDown('KeyS') || touch.brake;
  const left  = k.isDown('ArrowLeft') || k.isDown('KeyA') || touch.left;
  const right = k.isDown('ArrowRight')|| k.isDown('KeyD') || touch.right;
  return {
    throttle: up ? 1 : (down ? -0.6 : 0),
    steer: (right?1:0) - (left?1:0),
    drift: k.isDown('ShiftLeft') || k.isDown('ShiftRight') || touch.drift,
    itemJust: k.justPressed('Space') || touch.itemJust
  };
}

/* ---------------- Audio: GameKitのAudioContextを共有して拡張 ---------------- */
// SEは game.audio (GameKit.Sfx) を活用、エンジン音とチップチューンBGMは
// 同じ AudioContext 上に自前で構築する
const RaceAudio = (function(){
  let ac=null, master=null, engineOsc=null, engineGain=null, engineFilter=null, musicTimer=null, unlocked=false;
  function ensure(){
    if (ac) return;
    try{
      ac = engine.audio._ac();        // GameKit.Sfx と AudioContext を共有
      master = ac.createGain();
      master.gain.value = 0.5;
      master.connect(ac.destination);
    }catch(e){ ac=null; }
  }
  function blip(freq,dur,type,gain,when,slideTo){
    if (!ac) return;
    const t = ac.currentTime + (when||0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type||'square';
    o.frequency.setValueAtTime(freq,t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t+dur);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(gain==null?0.18:gain, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+0.02);
  }
  function noiseBurst(dur,gain,when){
    if (!ac) return;
    const t = ac.currentTime + (when||0);
    const n = Math.floor(ac.sampleRate*dur);
    const buf = ac.createBuffer(1,n,ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
    const src = ac.createBufferSource(); src.buffer = buf;
    const g = ac.createGain();
    g.gain.setValueAtTime(gain==null?0.22:gain,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(g); g.connect(master); src.start(t);
  }
  function startEngine(){
    if (!ac || engineOsc) return;
    engineOsc = ac.createOscillator();
    engineGain = ac.createGain();
    engineFilter = ac.createBiquadFilter();
    engineFilter.type='lowpass'; engineFilter.frequency.value=800;
    engineOsc.type='sawtooth'; engineOsc.frequency.value=60;
    engineGain.gain.value=0;
    engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(master);
    engineOsc.start();
  }
  const MUSIC_NOTES=[262,330,392,330, 294,370,440,370, 247,311,392,311, 220,277,330,277];
  let step=0;
  function startMusic(){
    if (musicTimer) return;
    const sd=0.165;
    musicTimer = setInterval(()=>{
      if (!ac) return;
      const n = MUSIC_NOTES[step%MUSIC_NOTES.length];
      blip(n, sd*0.9, 'triangle', 0.05, 0);
      if (step%4===0) blip(n/2, sd*1.6, 'square', 0.035, 0);
      step++;
    }, sd*1000);
  }
  return {
    unlock(){
      ensure();
      if (!ac) return;
      if (ac.state==='suspended') ac.resume();
      if (!unlocked){ unlocked=true; startEngine(); startMusic(); }
    },
    setEngine(ratio, running){
      if (!engineOsc) return;
      const t = ac.currentTime;
      engineOsc.frequency.setTargetAtTime(50 + Math.max(0,ratio)*220, t, 0.06);
      engineFilter.frequency.setTargetAtTime(400 + ratio*1400, t, 0.08);
      engineGain.gain.setTargetAtTime(running ? (0.05 + ratio*0.07) : 0, t, 0.12);
    },
    stopMusic(){ if (musicTimer){ clearInterval(musicTimer); musicTimer=null; } },
    sfxBoost(){ blip(220,0.35,'sawtooth',0.16,0,880); },
    sfxItem(){ blip(660,0.10,'square',0.14,0); blip(990,0.12,'square',0.12,0.08); },
    sfxHit(){ noiseBurst(0.18,0.22,0); blip(120,0.16,'square',0.12,0,60); },
    sfxLap(){ blip(523,0.12,'square',0.15,0); blip(659,0.12,'square',0.15,0.12); blip(784,0.18,'square',0.15,0.24); },
    sfxCountdown(go){ go ? blip(880,0.28,'square',0.2,0) : blip(440,0.16,'square',0.16,0); },
    sfxFinish(){ [523,659,784,1046].forEach((n,i)=>blip(n,0.22,'square',0.16,i*0.16)); }
  };
})();
window.addEventListener('pointerdown', ()=>RaceAudio.unlock());
window.addEventListener('keydown', ()=>RaceAudio.unlock());

/* ============================================================
   Track geometry — 閉ループ・サーキット（Catmull-Romで密な経路を生成）
   ============================================================ */
const TRACK_POINTS = [
  {x:980,y:180},{x:1320,y:155},{x:1700,y:245},{x:1980,y:455},
  {x:2040,y:720},{x:1880,y:930},{x:1540,y:985},{x:1280,y:835},
  {x:1100,y:650},{x:905,y:705},{x:820,y:985},{x:600,y:1225},
  {x:315,y:1265},{x:135,y:1055},{x:170,y:760},{x:430,y:610},
  {x:700,y:570},{x:780,y:405},{x:620,y:255},{x:345,y:260},
  {x:170,y:430},{x:120,y:650},{x:265,y:845},{x:565,y:820},
  {x:760,y:1010},{x:1035,y:1210},{x:1440,y:1190},{x:1775,y:1090},
  {x:2050,y:1220},{x:2235,y:1015},{x:2240,y:760},{x:2150,y:515},
  {x:1960,y:330},{x:1680,y:205},{x:1320,y:145},{x:980,y:180}
];
const ROAD_WIDTH = 132;
const WORLD_W = 2380, WORLD_H = 1380;
const SEG_PER = 24;
const START_IDX = 0;

function catmullRom(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return {
    x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}
const PATH = [];
{
  const pts = TRACK_POINTS.slice(0,-1), n = pts.length;
  for (let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    for (let s=0;s<SEG_PER;s++) PATH.push(catmullRom(p0,p1,p2,p3,s/SEG_PER));
  }
}
const PATH_LEN = PATH.length;
const PATH_DIST = new Array(PATH_LEN);
{
  let acc=0;
  for (let i=0;i<PATH_LEN;i++){
    const a=PATH[i],b=PATH[(i+1)%PATH_LEN];
    PATH_DIST[i]=acc; acc += Math.hypot(b.x-a.x,b.y-a.y);
  }
}
const TOTAL_DIST = PATH_DIST[PATH_LEN-1] + Math.hypot(PATH[0].x-PATH[PATH_LEN-1].x, PATH[0].y-PATH[PATH_LEN-1].y);

function nearestPathIndex(x,y,hint){
  let best=-1,bestD=Infinity;
  if (hint!=null){
    for (let d=-40;d<=40;d++){
      const i=((hint+d)%PATH_LEN+PATH_LEN)%PATH_LEN, p=PATH[i];
      const dist=(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y);
      if (dist<bestD){ bestD=dist; best=i; }
    }
    return best;
  }
  for (let i=0;i<PATH_LEN;i++){
    const p=PATH[i], dist=(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y);
    if (dist<bestD){ bestD=dist; best=i; }
  }
  return best;
}
function pathNormal(i){
  const a=PATH[(i-1+PATH_LEN)%PATH_LEN],b=PATH[(i+1)%PATH_LEN];
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
  return {x:-dy/len,y:dx/len};
}
function pathTangentAt(i){
  const a=PATH[(i-1+PATH_LEN)%PATH_LEN],b=PATH[(i+1)%PATH_LEN];
  return Math.atan2(b.y-a.y,b.x-a.x);
}
function distToTrack(x,y,hint){
  const i=nearestPathIndex(x,y,hint);
  const p=PATH[i];
  return {dist:Math.hypot(p.x-x,p.y-y), idx:i};
}

/* ============================================================
   GameKit.Gen — プロシージャルなアセット生成（起動時に一度だけベイク）
   ============================================================ */
function makeCanvas(w,h){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  return { c, x:c.getContext('2d') };
}

// 草地テクスチャ（タイル可能）— Gen.tilePattern の grain + dots を緑ベースに重ねる
const GRASS_PALETTE = ['#2e7d3a','#1f5a2b','#0c2a12'];
const grassTile = (function(){
  const size=96, {c,x}=makeCanvas(size,size);
  x.fillStyle='#0c2a12'; x.fillRect(0,0,size,size);
  Gen.tilePattern(x, size, { type:'grain', alpha:16, seed:7 });
  Gen.tilePattern(x, size, { type:'dots', palette:GRASS_PALETTE, scale:size/6, seed:7 });
  return c;
})();
const grassPattern = ctx.createPattern(grassTile, 'repeat');

// タイトル/リザルト用のネビュラ背景（Gen.nebulaBackground）
const nebulaBG = (function(){
  const {c,x}=makeCanvas(W,H);
  Gen.nebulaBackground(x, W, H, { seed:42, palette:Gen.palettes.cyanPurple, blobCount:6 });
  return c;
})();

// アイテムボックス（回転する発光ダイヤ + ?）— Gen.polygonBadge / orbIcon
const itemBoxSprite = (function(){
  const s=40, {c,x}=makeCanvas(s,s), cx=s/2, cy=s/2;
  const glow=x.createRadialGradient(cx,cy,2,cx,cy,s*0.55);
  glow.addColorStop(0,'rgba(250,204,21,0.55)'); glow.addColorStop(1,'rgba(250,204,21,0)');
  x.fillStyle=glow; x.fillRect(0,0,s,s);
  Gen.polygonBadge(x, cx, cy, 13, { sides:4, rotation:0, fill:'#facc15', stroke:'#a16207', lineWidth:2 });
  x.fillStyle='#7c5410'; x.font='bold 15px sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText('?', cx, cy+1);
  return c;
})();

// スターショット弾（Gen.polygonBadge の星形 + グロー）

  glow.addColorStop(0,'rgba(250,204,21,0.6)'); glow.addColorStop(1,'rgba(250,204,21,0)');

})();

/* ---------------- Karts & colours ---------------- */
const KART_COLORS = [
  {body:'#22d3ee', light:'#a5f3fc', dark:'#0e7490', name:'シアン号',  isPlayer:true},
  {body:'#f97316', light:'#fed7aa', dark:'#9a3412', name:'オレンジ号'},
  {body:'#a78bfa', light:'#ddd6fe', dark:'#6d28d9', name:'パープル号'},
  {body:'#22c55e', light:'#bbf7d0', dark:'#15803d', name:'グリーン号'},
  {body:'#f43f5e', light:'#fecdd3', dark:'#9f1239', name:'レッド号'},
  {body:'#facc15', light:'#fef08a', dark:'#a16207', name:'イエロー号'}
];
const NUM_KARTS = KART_COLORS.length;
const NUM_LAPS = 3;

// 各カートのスプライトをオフスクリーンにベイク（鼻先=+x方向）。
// ドライバーのヘルメットは Gen.orbIcon、ボディ装飾は Gen.rng でシード生成
const kartSprites = KART_COLORS.map((col, idx)=>{
  const sw=64, sh=48, {c,x}=makeCanvas(sw,sh);
  x.translate(sw/2, sh/2);
  const rng = Gen.rng(idx*131 + 7);
  // wheels
  x.fillStyle='#1f2937';
  x.fillRect(-12,-9,7,5); x.fillRect(-12,4,7,5); x.fillRect(7,-9,7,5); x.fillRect(7,4,7,5);
  // body
  const grad=x.createLinearGradient(-14,0,14,0);
  grad.addColorStop(0,col.dark); grad.addColorStop(1,col.body);
  x.fillStyle=grad; roundRectPath(x,-15,-8,30,16,5); x.fill();
  // seeded racing stripe
  x.fillStyle=col.light; x.globalAlpha=0.55;
  const sy=-6 + Math.floor(rng()*3)*4;
  x.fillRect(-13, sy, 26, 2); x.globalAlpha=1;
  // cockpit
  x.fillStyle='#0f172a'; roundRectPath(x,-3,-5.5,12,11,3); x.fill();
  // driver helmet dome via Gen.orbIcon
  Gen.orbIcon(x, 2, 0, 3.6, { palette:[col.light, col.body, col.dark], glow:false });
  // spoiler
  x.fillStyle=col.dark; x.fillRect(-17,-6,3,12);
  return c;
});

function roundRectPath(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

/* ---------------- Decoration props (seeded by Gen.rng) ---------------- */
const PROPS = (function(){
  const rng = Gen.rng(1234567), arr=[];
  for (let i=0;i<150;i++){
    const idx=Math.floor(rng()*PATH_LEN), p=PATH[idx], nrm=pathNormal(idx);
    const side=rng()<0.5?-1:1, off=ROAD_WIDTH*0.5+44+rng()*105;
    arr.push({ x:p.x+nrm.x*off*side, y:p.y+nrm.y*off*side, type:rng()<0.6?'tree':'sign', hue:95+rng()*40, scale:0.7+rng()*0.7 });
  }
  return arr;
})();

/* ---------------- Items ---------------- */
const ITEM_TYPES = [
  {id:'nitro',  label:'ニトロカプセル', short:'NITRO', color:'#22d3ee'},
  {id:'oil',    label:'オイル缶',       short:'OIL',   color:'#a3713a'},
  {id:'star',   label:'スターショット', short:'STAR',  color:'#facc15'},
  {id:'shield', label:'シールド',       short:'SHIELD',color:'#a78bfa'}
];
function randomItem(){ return ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)]; }

const ITEM_BOXES = (function(){
  const count=15, arr=[], spacing=Math.floor(PATH_LEN/count);
  for (let k=0;k<count;k++){
    const i=(k*spacing+12)%PATH_LEN, p=PATH[i], nrm=pathNormal(i), lane=((k%3)-1)*32;
    arr.push({ x:p.x+nrm.x*lane, y:p.y+nrm.y*lane, alive:true, respawnAt:0 });
  }
  return arr;
})();

/* ============================================================
   Physics constants
   ============================================================ */
const MAX_SPEED=3.55, ACCEL=3.6, BRAKE=6.5, FRICTION=1.7, OFFTRACK_MAXSPEED=1.5;
const TURN_RATE=2.55, BOOST_SPEED_MULT=1.55, BOOST_DURATION=1.05, DRIFT_TURN_BONUS=1.5, DRIFT_CHARGE_RATE=1.0;
const MOVE_SCALE=46;

/* ---------------- Pseudo-3D camera (behind the kart) ---------------- */
// ワールドの (x,y) を地面平面とみなし、カート背後・上方のカメラから
// 水平視のピンホール投影で「マリオカート風」三人称ビューを描く
const CAM_BACK=95, CAM_HEIGHT=94, FOCAL=420, HORIZON=Math.round(H*0.44), NEAR=12;
const PLAYER_SCALE=1.55;       // 画面下中央に固定描画するプレイヤーカートの大きさ
const CAM_TURN_SMOOTH=7;       // カメラ追従の補間係数（大きいほど機敏）
const CAM_TURN_MAX=3.6;        // カメラ角速度上限(rad/s) — スピン時の急回転を抑制

function angleLerp(a,b,t){ let d=((b-a+Math.PI*3)%(Math.PI*2))-Math.PI; return a+d*t; }
function angleDiff(a,b){ return ((b-a+Math.PI*3)%(Math.PI*2))-Math.PI; }

/* ============================================================
   RaceScene — カウントダウン + レース本体
   ============================================================ */
class RaceScene extends Scene {
  enter(){
    this.karts=[]; this.hazards=[]; this.projectiles=[];
    this.fxMessages=[]; this.boostFx=[];
    this.raceTime=0; this.raceFinishedCount=0; this.resultsOrder=[];
    for (let i=0;i<NUM_KARTS;i++) this.karts.push(this.makeKart(i));
    this.player = this.karts.find(k=>k.isPlayer);
    for (const b of ITEM_BOXES){ b.alive=true; b.respawnAt=0; }
    this.state='COUNTDOWN';
    this.countdownT=3.999;
    // pseudo-3D camera state
    this.camAngle = this.player.angle;
    this._ca=Math.cos(this.camAngle); this._sa=Math.sin(this.camAngle);
    this._camX=this.player.x; this._camY=this.player.y;
  }
  makeKart(i){
    const startP=PATH[START_IDX], tangent=pathTangentAt(START_IDX), nrm=pathNormal(START_IDX);
    const row=Math.floor(i/2), col=i%2, lateral=(col===0?-1:1)*24, back=row*46;
    return {
      idx:i, color:KART_COLORS[i], sprite:kartSprites[i], isPlayer:!!KART_COLORS[i].isPlayer,
      x:startP.x+nrm.x*lateral-Math.cos(tangent)*back,
      y:startP.y+nrm.y*lateral-Math.sin(tangent)*back,
      angle:tangent, speed:0, drift:false, driftDir:0, driftCharge:0,
      boostTime:0, shieldTime:0, spinTime:0, item:null,
      pathHint:START_IDX, progress:-back*0.001, lap:1, finished:false, finishTime:0, rank:i+1,
      aiSwerve:(Math.random()*2-1)*18, aiThrottle:0, aiSteer:0, aiDrift:false, aiUseItem:false,
      wobble:Math.random()*Math.PI*2, trail:[], _lapDist:null, lastSteer:0
    };
  }

  /* ---------------- update ---------------- */
  update(dt, game){
    if (this.state==='COUNTDOWN'){
      const prev=this.countdownT; this.countdownT-=dt;
      const prevN=Math.ceil(prev), curN=Math.ceil(this.countdownT);
      if (curN!==prevN && curN>=0) RaceAudio.sfxCountdown(curN===0);
      if (this.countdownT<=0) this.state='RACING';
      for (const k of this.karts) k.speed*=0.9;
      this.updateCamera(dt);
      this.updateEngineSound();
      touch.itemJust=false;
      return;
    }
    if (this.state!=='RACING'){ touch.itemJust=false; return; }

    this.raceTime+=dt;
    const ctrl = readControls(game);
    for (const k of this.karts) this.updateKart(k, dt, ctrl);
    this.updateHazardsAndProjectiles(dt);
    this.checkItemBoxes();
    this.resolveKartCollisions();
    this.updateRanks();
    this.updateCamera(dt);
    this.updateEngineSound();
    touch.itemJust=false;

    if (this.player.finished && this.raceFinishedCount>=1){
      if (this.raceTime-this.player.finishTime>1.6 || this.raceFinishedCount>=NUM_KARTS){
        this.showResults(game);
      }
    }
  }
  updateEngineSound(){
    const r = clamp(Math.abs(this.player.speed)/MAX_SPEED,0,1);
    RaceAudio.setEngine(r, this.state==='RACING'||this.state==='COUNTDOWN');
  }

  updateKart(k, dt, ctrl){
    if (k.finished){
      k.speed*=0.96; k.x+=Math.cos(k.angle)*k.speed; k.y+=Math.sin(k.angle)*k.speed; return;
    }
    if (k.boostTime>0) k.boostTime-=dt;
    if (k.shieldTime>0) k.shieldTime-=dt;
    if (k.spinTime>0){
      k.spinTime-=dt; k.angle+=dt*9; k.speed*=0.92; this.moveKart(k,dt); return;
    }
    const offtrack=this.isOffTrack(k);
    const topSpeed=(offtrack?OFFTRACK_MAXSPEED:MAX_SPEED)*(k.boostTime>0?BOOST_SPEED_MULT:1);

    let throttle=0, steerInput=0, wantDrift=false, useItem=false;
    if (k.isPlayer){
      throttle=ctrl.throttle; steerInput=ctrl.steer; wantDrift=ctrl.drift; useItem=ctrl.itemJust;
    } else {
      this.aiThink(k); throttle=k.aiThrottle; steerInput=k.aiSteer; wantDrift=k.aiDrift; useItem=k.aiUseItem; k.aiUseItem=false;
    }

    if (throttle>0) k.speed+=ACCEL*dt*throttle;
    else if (throttle<0){ if (k.speed>0.05) k.speed-=BRAKE*dt; else k.speed+=ACCEL*dt*throttle*0.6; }
    else { k.speed-=Math.sign(k.speed)*FRICTION*dt; if (Math.abs(k.speed)<0.02) k.speed=0; }
    k.speed=clamp(k.speed, -MAX_SPEED*0.5, topSpeed);

    const speedFactor=clamp(Math.abs(k.speed)/MAX_SPEED,0.18,1);
    let turnMul=1;
    if (wantDrift && Math.abs(steerInput)>0.1 && Math.abs(k.speed)>0.6){
      if (!k.drift){ k.drift=true; k.driftDir=Math.sign(steerInput); k.driftCharge=0; }
      k.driftCharge+=DRIFT_CHARGE_RATE*dt; turnMul=DRIFT_TURN_BONUS; steerInput=k.driftDir*1.0;
    } else if (k.drift){
      if (k.driftCharge>0.55){
        k.boostTime=BOOST_DURATION*clamp(k.driftCharge/1.4,0.6,1.4);
        if (k.isPlayer) RaceAudio.sfxBoost();
        this.spawnBoostFx(k);
      }
      k.drift=false; k.driftCharge=0;
    }
    k.angle += steerInput*TURN_RATE*turnMul*speedFactor*dt*Math.sign(k.speed||1);
    // 視覚用ステア量（カートのリーン/スキューに使用）を平滑化
    k.lastSteer += (steerInput - k.lastSteer)*Math.min(1, 10*dt);

    this.moveKart(k,dt);
    if (offtrack && k.speed>OFFTRACK_MAXSPEED) k.speed=Math.max(OFFTRACK_MAXSPEED, k.speed-4*dt);
    this.updateProgress(k);

    if (useItem && k.item) this.activateItem(k);

    if (k.drift && Math.abs(k.speed)>0.4) k.trail.push({x:k.x-Math.cos(k.angle)*14, y:k.y-Math.sin(k.angle)*14, life:0.5});
    for (let i=k.trail.length-1;i>=0;i--){ k.trail[i].life-=dt; if (k.trail[i].life<=0) k.trail.splice(i,1); }
    k.wobble+=dt*9*Math.min(1,Math.abs(k.speed));
  }
  moveKart(k,dt){ k.x+=Math.cos(k.angle)*k.speed*MOVE_SCALE*dt; k.y+=Math.sin(k.angle)*k.speed*MOVE_SCALE*dt; }
  isOffTrack(k){ const r=distToTrack(k.x,k.y,k.pathHint); k.pathHint=r.idx; return r.dist>ROAD_WIDTH*0.5+6; }

  updateProgress(k){
    const r=distToTrack(k.x,k.y,k.pathHint); k.pathHint=r.idx;
    const lapDist=PATH_DIST[r.idx];
    if (k._lapDist==null){ k._lapDist=lapDist; return; }
    let delta=lapDist-k._lapDist;
    if (delta>TOTAL_DIST*0.5) delta-=TOTAL_DIST; else if (delta<-TOTAL_DIST*0.5) delta+=TOTAL_DIST;
    delta=clamp(delta,-30,30); k._lapDist=lapDist; k.progress+=delta;
    if (!k.finished){
      const newLap=Math.floor(k.progress/TOTAL_DIST)+1;
      if (newLap>k.lap){
        k.lap=newLap;
        if (k.lap>NUM_LAPS){ k.lap=NUM_LAPS; this.finishKart(k); }
        else if (k.isPlayer){ RaceAudio.sfxLap(); this.flashMessage(`LAP ${k.lap} / ${NUM_LAPS}`); }
      }
    }
  }
  finishKart(k){
    if (k.finished) return;
    k.finished=true; k.finishTime=this.raceTime; this.raceFinishedCount++; this.resultsOrder.push(k);
    if (k.isPlayer) RaceAudio.sfxFinish();
  }
  updateRanks(){ this.karts.slice().sort((a,b)=>b.progress-a.progress).forEach((k,i)=>k.rank=i+1); }

  aiThink(k){
    const targetIdx=(k.pathHint+34)%PATH_LEN, tp=PATH[targetIdx], nrm=pathNormal(targetIdx);
    const tx=tp.x+nrm.x*k.aiSwerve, ty=tp.y+nrm.y*k.aiSwerve;
    const desired=Math.atan2(ty-k.y, tx-k.x), diff=angleDiff(k.angle,desired);
    k.aiSteer=clamp(diff*2.2,-1,1);
    const curve=Math.min(1,Math.abs(diff)*1.6);
    k.aiThrottle=Math.max(0.35, 1-curve*0.55);
    k.aiDrift=Math.abs(diff)>0.32 && Math.abs(k.speed)>1.0;
    const gap=this.player.progress-k.progress;
    if (gap>220) k.aiThrottle=Math.min(1.15,k.aiThrottle*1.18);
    else if (gap<-260) k.aiThrottle*=0.82;
    if (k.item && Math.random()<0.01) k.aiUseItem=true;
    if (Math.random()<0.01) k.aiSwerve=clamp(k.aiSwerve+(Math.random()*2-1)*14, -ROAD_WIDTH*0.4, ROAD_WIDTH*0.4);
  }

  checkItemBoxes(){
    for (const b of ITEM_BOXES){
      if (!b.alive){ if (this.raceTime>b.respawnAt) b.alive=true; continue; }
      for (const k of this.karts){
        if (k.finished) continue;
        if (Math.hypot(k.x-b.x,k.y-b.y)<26 && !k.item){
          k.item=randomItem(); b.alive=false; b.respawnAt=this.raceTime+6;
          if (k.isPlayer){ RaceAudio.sfxItem(); this.flashMessage(`GET: ${k.item.label}`); }
        }
      }
    }
  }
  activateItem(k){
    const it=k.item; k.item=null;
    switch(it.id){
      case 'nitro': k.boostTime=BOOST_DURATION*1.3; if (k.isPlayer) RaceAudio.sfxBoost(); this.spawnBoostFx(k); break;
      case 'oil':
        this.hazards.push({x:k.x-Math.cos(k.angle)*30, y:k.y-Math.sin(k.angle)*30, owner:k, life:14, type:'oil'});
        if (k.isPlayer){ RaceAudio.sfxItem(); this.flashMessage('オイル缶を設置！'); } break;
      case 'star': {
        let target=null,bestGap=Infinity;
        for (const o of this.karts){ if (o===k||o.finished) continue; const gap=o.progress-k.progress; if (gap>0&&gap<bestGap){ bestGap=gap; target=o; } }
        const ang=target?Math.atan2(target.y-k.y,target.x-k.x):k.angle;
        this.projectiles.push({x:k.x, y:k.y, vx:Math.cos(ang)*5.6, vy:Math.sin(ang)*5.6, owner:k, life:3.2, target});
        if (k.isPlayer){ RaceAudio.sfxItem(); this.flashMessage('スターショット発射！'); } break;
      }
      case 'shield': k.shieldTime=6; if (k.isPlayer){ RaceAudio.sfxItem(); this.flashMessage('シールド展開！'); } break;
    }
  }
  updateHazardsAndProjectiles(dt){
    for (let i=this.hazards.length-1;i>=0;i--){
      const h=this.hazards[i]; h.life-=dt;
      if (h.life<=0){ this.hazards.splice(i,1); continue; }
      for (const k of this.karts){
        if (k.finished || (k===h.owner && h.life>13.3)) continue;
        if (Math.hypot(k.x-h.x,k.y-h.y)<22 && k.spinTime<=0 && k.shieldTime<=0){
          k.spinTime=0.9; k.speed*=0.4; this.hazards.splice(i,1);
          if (k.isPlayer||h.owner.isPlayer) RaceAudio.sfxHit();
          if (k.isPlayer) this.flashMessage('オイル缶でスピン！');
          break;
        }
      }
    }
    for (let i=this.projectiles.length-1;i>=0;i--){
      const p=this.projectiles[i]; p.life-=dt;
      if (p.target && !p.target.finished){
        const desired=Math.atan2(p.target.y-p.y,p.target.x-p.x), cur=Math.atan2(p.vy,p.vx);
        const na=angleLerp(cur,desired,0.06), sp=Math.hypot(p.vx,p.vy);
        p.vx=Math.cos(na)*sp; p.vy=Math.sin(na)*sp;
      }
      p.x+=p.vx; p.y+=p.vy;
      if (p.life<=0){ this.projectiles.splice(i,1); continue; }
      for (const k of this.karts){
        if (k===p.owner||k.finished) continue;
        if (Math.hypot(k.x-p.x,k.y-p.y)<20){
          if (k.shieldTime<=0){
            k.spinTime=1.1; k.speed*=0.35;
            if (k.isPlayer||p.owner.isPlayer) RaceAudio.sfxHit();
            if (k.isPlayer) this.flashMessage('スターショットに被弾！');
          }
          this.projectiles.splice(i,1); break;
        }
      }
    }
  }
  resolveKartCollisions(){
    const ks=this.karts;
    for (let i=0;i<ks.length;i++) for (let j=i+1;j<ks.length;j++){
      const a=ks[i],b=ks[j];
      if (a.finished||b.finished) continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),minD=26;
      if (d<minD && d>0.001){
        const overlap=(minD-d)/2, nx=dx/d, ny=dy/d;
        a.x-=nx*overlap; a.y-=ny*overlap; b.x+=nx*overlap; b.y+=ny*overlap;
        const avg=(a.speed+b.speed)/2;
        a.speed=avg*0.85+a.speed*0.06; b.speed=avg*0.85+b.speed*0.06;
      }
    }
  }
  flashMessage(text){ this.fxMessages.push({text, life:1.6, t:0}); }
  spawnBoostFx(k){
    for (let i=0;i<10;i++) this.boostFx.push({
      x:k.x-Math.cos(k.angle)*16, y:k.y-Math.sin(k.angle)*16,
      vx:-Math.cos(k.angle)*(1+Math.random()*1.5)+(Math.random()-0.5),
      vy:-Math.sin(k.angle)*(1+Math.random()*1.5)+(Math.random()-0.5),
      life:0.5+Math.random()*0.4, hue:190+Math.random()*60
    });
  }

  showResults(game){
    RaceAudio.stopMusic();
    const finished=this.karts.filter(k=>k.finished).sort((a,b)=>a.finishTime-b.finishTime);
    const unfinished=this.karts.filter(k=>!k.finished).sort((a,b)=>b.progress-a.progress);
    const order=finished.concat(unfinished);
    const playerRank=order.findIndex(k=>k.isPlayer)+1;
    const best=save.get('bestRank',99);
    if (playerRank<best) save.set('bestRank',playerRank);
    game.changeScene(new ResultScene(order, playerRank));
  }

  /* ================= Pseudo-3D camera & projection ================= */
  updateCamera(dt){
    const p=this.player;
    // カメラ角はプレイヤー進行角へ平滑追従＋角速度クランプ（スピン時の酔い対策）
    let diff = angleDiff(this.camAngle, p.angle) * Math.min(1, CAM_TURN_SMOOTH*dt);
    diff = clamp(diff, -CAM_TURN_MAX*dt, CAM_TURN_MAX*dt);
    this.camAngle += diff;
    this._ca=Math.cos(this.camAngle); this._sa=Math.sin(this.camAngle);
    this._camX = p.x - this._ca*CAM_BACK;
    this._camY = p.y - this._sa*CAM_BACK;
  }
  // ワールド地面点(wx,wy,高さh)→画面座標。depth<=NEAR は不可視
  project(wx, wy, h){
    const dx=wx-this._camX, dy=wy-this._camY;
    const depth = dx*this._ca + dy*this._sa;
    if (depth<=NEAR) return {visible:false, depth};
    const lateral = -dx*this._sa + dy*this._ca;
    const scale = FOCAL/depth;
    return { visible:true, depth, scale, x:W/2 + lateral*scale, y:HORIZON + (CAM_HEIGHT-(h||0))*scale };
  }

  /* ---------------- draw ---------------- */
  draw(c){
    this.drawSky(c);
    this.drawGround(c);
    this.drawRoad(c);
    this.drawSprites(c);     // 他カート/木/標識/アイテム/オイル/弾/ブースト粒子（深度ソート）
    this.drawPlayerKart(c);  // プレイヤーは画面下中央に固定
    this.drawMinimap(c);
    this.drawSpeedGauge(c);
    this.drawDriftMeter(c);
    this.drawHUD(c);
    this.drawCountdown(c);
    this.drawFxMessages(c);
  }

  drawSky(c){
    if (imageReady(gptImages.track)){
      drawAsset(c, gptImages.track, trackRects.sky, 0, 0, W, HORIZON);
      drawAsset(c, gptImages.track, trackRects.mountain, 0, HORIZON-72, W, 52, 0.82);
      const railOff=(this.camAngle/(Math.PI*2))*W;
      drawAsset(c, gptImages.track, trackRects.neonRail, -((railOff%W)+W)%W, HORIZON-32, W, 34, 0.82);
      drawAsset(c, gptImages.track, trackRects.neonRail, W-((railOff%W)+W)%W, HORIZON-32, W, 34, 0.82);
      return;
    }
    const g=c.createLinearGradient(0,0,0,HORIZON);
    g.addColorStop(0,'#070b1c'); g.addColorStop(0.7,'#101a3a'); g.addColorStop(1,'#1b2750');
    c.fillStyle=g; c.fillRect(0,0,W,HORIZON);
    // 遠景の丘シルエット（カメラ角に応じて横パララックス）
    const off=(this.camAngle/(Math.PI*2))*W*3;
    c.fillStyle='#14223f';
    c.beginPath(); c.moveTo(0,HORIZON);
    for (let x=0;x<=W;x+=24){
      const y=HORIZON - 26 - Math.sin((x+off)*0.011)*16 - Math.sin((x+off)*0.027)*9;
      c.lineTo(x,y);
    }
    c.lineTo(W,HORIZON); c.closePath(); c.fill();
    // 地平の光のにじみ
    const hg=c.createLinearGradient(0,HORIZON-30,0,HORIZON);
    hg.addColorStop(0,'rgba(34,211,238,0)'); hg.addColorStop(1,'rgba(34,211,238,0.18)');
    c.fillStyle=hg; c.fillRect(0,HORIZON-30,W,30);
  }
  drawGround(c){
    if (imageReady(gptImages.track)){
      drawAsset(c, gptImages.track, trackRects.grass, 0, HORIZON, W, H-HORIZON);
      return;
    }
    const g=c.createLinearGradient(0,HORIZON,0,H);
    g.addColorStop(0,'#163f1f'); g.addColorStop(1,'#0a2410');
    c.fillStyle=g; c.fillRect(0,HORIZON,W,H-HORIZON);
  }

  /* ---------------- road ribbon (far -> near painter's order) ---------------- */
  drawRoad(c){
    const hint=this.player.pathHint;
    const FAR=150, BACK=22;
    for (let o=FAR; o>=-BACK; o--){
      const i=((hint+o)%PATH_LEN+PATH_LEN)%PATH_LEN;
      const j=((hint+o+1)%PATH_LEN+PATH_LEN)%PATH_LEN;
      this.drawRoadSeg(c, i, j);
    }
  }
  drawRoadSeg(c, i, j){
    const pi=PATH[i], pj=PATH[j], ni=pathNormal(i), nj=pathNormal(j);
    const hw=ROAD_WIDTH/2;
    const Lf=this.project(pj.x+nj.x*hw, pj.y+nj.y*hw, 0);
    const Rf=this.project(pj.x-nj.x*hw, pj.y-nj.y*hw, 0);
    const Ln=this.project(pi.x+ni.x*hw, pi.y+ni.y*hw, 0);
    const Rn=this.project(pi.x-ni.x*hw, pi.y-ni.y*hw, 0);
    if (!(Lf.visible&&Rf.visible&&Ln.visible&&Rn.visible)) return;
    const quad=(a,b,cc,d)=>{ c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.lineTo(cc.x,cc.y); c.lineTo(d.x,d.y); c.closePath(); c.fill(); };
    // road surface
    c.fillStyle = (i%2===0)?'#3a3f4d':'#363b48';
    quad(Lf,Rf,Rn,Ln);
    drawTexturedQuad(c, [Lf,Rf,Rn,Ln], gptImages.track, (i%3===0)?trackRects.asphaltCurve:trackRects.asphalt, 0.48);
    // curbs (alternating red/white) just outside both edges
    const co=10, curb=(i%2===0)?'#ef4444':'#e2e8f0';
    const Lfo=this.project(pj.x+nj.x*(hw+co), pj.y+nj.y*(hw+co),0), Lno=this.project(pi.x+ni.x*(hw+co), pi.y+ni.y*(hw+co),0);
    if (Lfo.visible&&Lno.visible){ c.fillStyle=curb; quad(Lfo,Lf,Ln,Lno); drawTexturedQuad(c, [Lfo,Lf,Ln,Lno], gptImages.track, trackRects.curb, 0.78); }
    const Rfo=this.project(pj.x-nj.x*(hw+co), pj.y-nj.y*(hw+co),0), Rno=this.project(pi.x-ni.x*(hw+co), pi.y-ni.y*(hw+co),0);
    if (Rfo.visible&&Rno.visible){ c.fillStyle=curb; quad(Rf,Rfo,Rno,Rn); drawTexturedQuad(c, [Rf,Rfo,Rno,Rn], gptImages.track, trackRects.curb, 0.78); }
    // start/finish checker band
    if (i===START_IDX){
      const cells=8;
      for (let ci=0;ci<cells;ci++){
        const x0=hw-(ci/cells)*ROAD_WIDTH, x1=hw-((ci+1)/cells)*ROAD_WIDTH;
        const a=this.project(pi.x+ni.x*x0, pi.y+ni.y*x0,0), b=this.project(pi.x+ni.x*x1, pi.y+ni.y*x1,0);
        const d=this.project(pj.x+nj.x*x0, pj.y+nj.y*x0,0), e=this.project(pj.x+nj.x*x1, pj.y+nj.y*x1,0);
        if (a.visible&&b.visible&&d.visible&&e.visible){ c.fillStyle=ci%2?'#111':'#fff'; quad(a,b,e,d); }
      }
      drawTexturedQuad(c, [Lf,Rf,Rn,Ln], gptImages.track, trackRects.checker, 0.76);
    } else if (i%2===0){
      // dashed centre line
      const cw=4;
      const a=this.project(pj.x+nj.x*cw, pj.y+nj.y*cw,0), b=this.project(pj.x-nj.x*cw, pj.y-nj.y*cw,0);
      const d=this.project(pi.x+ni.x*cw, pi.y+ni.y*cw,0), e=this.project(pi.x-ni.x*cw, pi.y-ni.y*cw,0);
      if (a.visible&&b.visible&&d.visible&&e.visible){ c.fillStyle='rgba(255,255,255,0.55)'; quad(a,b,e,d); }
    }
  }

  /* ---------------- billboarded sprites (depth sorted) ---------------- */
  drawSprites(c){
    const list=[];
    // advance + collect boost particles
    for (let i=this.boostFx.length-1;i>=0;i--){
      const f=this.boostFx[i]; f.x+=f.vx; f.y+=f.vy; f.life-=1/60;
      if (f.life<=0){ this.boostFx.splice(i,1); continue; }
      const pr=this.project(f.x,f.y,6); if (!pr.visible) continue;
      list.push({depth:pr.depth, fn:()=>{ c.save(); c.globalAlpha=clamp(f.life/0.6,0,1); c.fillStyle=`hsl(${f.hue},90%,65%)`;
        c.beginPath(); c.arc(pr.x,pr.y,Math.max(1,3*pr.scale),0,Math.PI*2); c.fill(); c.restore(); }});
    }
    // hazards (oil decals on the ground)
    for (const h of this.hazards){
      const pr=this.project(h.x,h.y,0); if (!pr.visible) continue;
      list.push({depth:pr.depth, fn:()=>this.drawOil3D(c,pr)});
    }
    // item boxes
    for (const b of ITEM_BOXES){
      if (!b.alive) continue;
      const pr=this.project(b.x,b.y,0); if (!pr.visible) continue;
      list.push({depth:pr.depth, fn:()=>{ const s=26*pr.scale; const hover=Math.sin(performance.now()/300+b.x)*3*pr.scale;
        if (!drawAsset(c, gptImages.atlas, atlasRects.itemBox, pr.x-s*0.62, pr.y-s*1.1+hover, s*1.24, s*1.1)){
          c.drawImage(itemBoxSprite, pr.x-s/2, pr.y-s*0.85+hover, s, s);
        } }});
    }
    // props (trees / signs)
    for (const pp of PROPS){
      const pr=this.project(pp.x,pp.y,0); if (!pr.visible) continue;
      list.push({depth:pr.depth, fn:()=>this.drawProp3D(c,pp,pr)});
    }
    // projectiles (star shots)
    for (const p of this.projectiles){
      const pr=this.project(p.x,p.y,8); if (!pr.visible) continue;
      list.push({depth:pr.depth, fn:()=>{ const s=30*pr.scale*(1+Math.sin(performance.now()/80)*0.12);
        if (!drawAsset(c, gptImages.atlas, atlasRects.star, pr.x-s/2, pr.y-s/2, s, s)){
          c.drawImage(starSprite, pr.x-s/2, pr.y-s/2, s, s);
        } }});
    }
    // rival karts (player drawn separately, fixed)
    for (const k of this.karts){
      if (k.isPlayer) continue;
      const pr=this.project(k.x,k.y,0); if (!pr.visible) continue;
      const turn=clamp(Math.sin(angleDiff(this.camAngle,k.angle))*0.9 + k.lastSteer*0.2, -1.3, 1.3);
      list.push({depth:pr.depth, fn:()=>this.drawKart3D(c, pr.x, pr.y, pr.scale, k.color, turn,
        {boostTime:k.boostTime, shieldTime:k.shieldTime, spinTime:k.spinTime, drift:k.drift, name:k.color.name, nameColor:'rgba(255,255,255,0.6)'})});
    }
    list.sort((a,b)=>b.depth-a.depth);
    for (const e of list) e.fn();
  }

  drawProp3D(c, pp, pr){
    const s=pr.scale, cx=pr.x, baseY=pr.y;
    if (pp.type==='tree'){
      const r = pp.hue > 118 ? atlasRects.treePine : atlasRects.treeRound;
      const h = 70*s*pp.scale, w = h*(r.w/r.h);
      if (drawAsset(c, gptImages.atlas, r, cx-w/2, baseY-h, w, h)) return;
      const th=30*s*pp.scale;
      c.fillStyle='#5a3a22'; c.fillRect(cx-2.5*s, baseY-th*0.45, 5*s, th*0.45);
      c.fillStyle=`hsl(${pp.hue},45%,36%)`; c.beginPath(); c.arc(cx, baseY-th*0.6, 13*s*pp.scale, 0, Math.PI*2); c.fill();
      c.fillStyle=`hsl(${pp.hue},45%,46%)`; c.beginPath(); c.arc(cx-4*s, baseY-th*0.72, 9*s*pp.scale, 0, Math.PI*2); c.fill();
    } else {
      const w=48*s*pp.scale, h=24*s*pp.scale;
      if (drawAsset(c, gptImages.atlas, atlasRects.signArrow, cx-w/2, baseY-h*1.35, w, h)) return;
      const ph=34*s*pp.scale;
      c.fillStyle='#9ca3af'; c.fillRect(cx-2*s, baseY-ph*0.5, 4*s, ph*0.5);
      c.fillStyle='#facc15'; c.fillRect(cx-11*s, baseY-ph, 22*s, ph*0.42);
      c.fillStyle='#1f2937'; c.font=`bold ${Math.max(6,13*s)}px sans-serif`; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('!', cx, baseY-ph*0.78);
    }
  }
  drawOil3D(c, pr){
    const s=pr.scale;
    if (drawAsset(c, gptImages.atlas, atlasRects.oilPuddle, pr.x-17*s, pr.y-8*s, 34*s, 16*s, 0.9)) return;
    c.save(); c.fillStyle='rgba(20,12,4,0.6)'; c.beginPath(); c.ellipse(pr.x, pr.y, 16*s, 6*s, 0,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(60,40,20,0.55)'; c.beginPath(); c.ellipse(pr.x, pr.y, 10*s, 3.6*s, 0,0,Math.PI*2); c.fill();
    c.fillStyle='#fbbf24'; c.font=`bold ${Math.max(6,9*s)}px sans-serif`; c.textAlign='center'; c.textBaseline='middle'; c.fillText('OIL', pr.x, pr.y);
    c.restore();
  }

  // 三人称（背後）視点のカートを (cx, baseY) に scale s で描く。turn でリーン/スキュー
  drawKart3D(c, cx, baseY, s, color, turn, opts){
    opts=opts||{};
    const bw=28*s, bh=15*s;
    // shadow (skew しない)
    c.save(); c.fillStyle='rgba(0,0,0,0.32)'; c.beginPath(); c.ellipse(cx, baseY, bw*0.62, bw*0.2, 0,0,Math.PI*2); c.fill(); c.restore();
    // shield
    if (opts.shieldTime>0){
      c.save(); c.globalAlpha=0.32+Math.sin(performance.now()/100)*0.1; c.strokeStyle='#a78bfa'; c.lineWidth=2.4*s;
      c.beginPath(); c.ellipse(cx, baseY-bh*0.9, bw*0.78, bh*1.5, 0,0,Math.PI*2); c.stroke();
      c.fillStyle='rgba(167,139,250,0.12)'; c.fill(); c.restore();
    }
    if (imageReady(gptImages.atlas)){
      const kartKeys=['kartCyan','kartOrange','kartPurple','kartGreen','kartRed','kartYellow'];
      const r=atlasRects[kartKeys[Math.max(0,KART_COLORS.indexOf(color))] || 'kartCyan'];
      c.save();
      c.translate(cx, baseY);
      c.transform(1,0, clamp(turn,-1.3,1.3)*0.16, 1, 0, 0);
      if (opts.boostTime>0){
        const fw=34*s, fh=25*s;
        drawAsset(c, gptImages.atlas, atlasRects.boostFlame, -fw/2, -2*s, fw, fh, 0.86);
      }
      const w=72*s, h=w*(r.h/r.w);
      drawAsset(c, gptImages.atlas, r, -w/2, -h+3*s, w, h);
      c.restore();
      if (opts.spinTime>0){
        c.save(); c.fillStyle='#facc15';
        for (let i=0;i<3;i++){ const a=performance.now()/120+i*2.1; drawStarShape(c, cx+Math.cos(a)*16*s, baseY-bh*2.2+Math.sin(a)*4*s, 5, 4*s, 2*s); }
        c.restore();
      }
      if (opts.name && s>0.5){
        c.save(); c.font=`${Math.max(8,9*s)}px sans-serif`; c.fillStyle=opts.nameColor||'rgba(255,255,255,0.6)';
        c.textAlign='center'; c.textBaseline='alphabetic'; c.fillText(opts.name, cx, baseY-bh*3.3); c.restore();
      }
      return;
    }
    c.save();
    c.translate(cx, baseY);
    c.transform(1,0, clamp(turn,-1.3,1.3)*0.2, 1, 0, 0); // turn lean (skew)
    // boost flames (behind/below)
    if (opts.boostTime>0){
      const fl=(10+Math.random()*8)*s, g=c.createLinearGradient(0,0,0,fl);
      g.addColorStop(0,'rgba(34,211,238,0.95)'); g.addColorStop(1,'rgba(34,211,238,0)');
      c.fillStyle=g; c.beginPath(); c.moveTo(-bw*0.3,0); c.lineTo(0,fl); c.lineTo(bw*0.3,0); c.closePath(); c.fill();
    }
    // rear wheels
    c.fillStyle='#1f2937';
    c.fillRect(-bw*0.58, -bh*0.55, bw*0.26, bh*0.8);
    c.fillRect(bw*0.32, -bh*0.55, bw*0.26, bh*0.8);
    // body (viewed from behind)
    const grad=c.createLinearGradient(0,-bh*1.7,0,0);
    grad.addColorStop(0, color.light); grad.addColorStop(0.5, color.body); grad.addColorStop(1, color.dark);
    c.fillStyle=grad; roundRectPath(c, -bw*0.5, -bh*1.7, bw, bh*1.7, 5*s); c.fill();
    // rear window / cockpit
    c.fillStyle='#0f172a'; roundRectPath(c, -bw*0.3, -bh*1.55, bw*0.6, bh*0.62, 3*s); c.fill();
    // driver helmet
    c.fillStyle=color.light; c.beginPath(); c.arc(0, -bh*1.42, bw*0.15, 0, Math.PI*2); c.fill();
    // spoiler
    c.fillStyle=color.dark; c.fillRect(-bw*0.52, -bh*1.92, bw*1.04, bh*0.2);
    c.restore();
    // spin stars
    if (opts.spinTime>0){
      c.save(); c.fillStyle='#facc15';
      for (let i=0;i<3;i++){ const a=performance.now()/120+i*2.1; drawStarShape(c, cx+Math.cos(a)*16*s, baseY-bh*2.2+Math.sin(a)*4*s, 5, 4*s, 2*s); }
      c.restore();
    }
    // name tag
    if (opts.name && s>0.5){
      c.save(); c.font=`${Math.max(8,9*s)}px sans-serif`; c.fillStyle=opts.nameColor||'rgba(255,255,255,0.6)';
      c.textAlign='center'; c.textBaseline='alphabetic'; c.fillText(opts.name, cx, baseY-bh*2.6); c.restore();
    }
  }

  drawPlayerKart(c){
    const p=this.player, s=PLAYER_SCALE;
    const cx=W/2, baseY=H*0.84 + Math.sin(p.wobble)*1.4;
    const turn=clamp(p.lastSteer*0.9 + (p.drift?p.driftDir*0.35:0), -1.3, 1.3);
    // drift dust
    if (p.drift && Math.abs(p.speed)>0.5){
      c.save(); c.fillStyle='rgba(200,210,225,0.4)';
      for (let i=0;i<3;i++){ const r=(6+Math.random()*8)*s; c.globalAlpha=0.18+Math.random()*0.2;
        c.beginPath(); c.arc(cx+(Math.random()-0.5)*40*s, baseY+(Math.random()*6)*s, r, 0, Math.PI*2); c.fill(); }
      c.restore();
    }
    this.drawKart3D(c, cx, baseY, s, p.color, turn,
      {boostTime:p.boostTime, shieldTime:p.shieldTime, spinTime:p.spinTime, drift:p.drift, name:'YOU', nameColor:'#22d3ee'});
  }
  drawMinimap(c){
    const mw=150,mh=96, ox=W-mw-16, oy=H-mh-16;
    UI.glassPanel(c, ox-8, oy-8, mw+16, mh+16, {radius:12, fill:'rgba(10,14,26,0.6)', stroke:'rgba(148,163,255,0.25)'});
    const sx=mw/WORLD_W, sy=mh/WORLD_H;
    c.save(); c.strokeStyle='rgba(255,255,255,0.4)'; c.lineWidth=3; c.beginPath();
    for (let i=0;i<=PATH_LEN;i+=2){ const p=PATH[i%PATH_LEN]; const x=ox+p.x*sx,y=oy+p.y*sy; i===0?c.moveTo(x,y):c.lineTo(x,y); }
    c.stroke();
    for (const k of this.karts){
      c.fillStyle=k.color.body; c.beginPath(); c.arc(ox+k.x*sx, oy+k.y*sy, k.isPlayer?3.4:2.4, 0, Math.PI*2); c.fill();
      if (k.isPlayer){ c.strokeStyle='#fff'; c.lineWidth=1; c.beginPath(); c.arc(ox+k.x*sx, oy+k.y*sy, 5, 0, Math.PI*2); c.stroke(); }
    }
    c.restore();
  }
  drawSpeedGauge(c){
    const cx=64, cy=H-56, r=38;
    c.save(); c.globalAlpha=0.9;
    drawAsset(c, gptImages.atlas, atlasRects.speedGauge, cx-50, cy-52, 100, 92, 0.42);
    c.beginPath(); c.arc(cx,cy,r+8,0.65*Math.PI,2.35*Math.PI); c.strokeStyle='rgba(148,163,255,0.18)'; c.lineWidth=10; c.stroke();
    const ratio=clamp(Math.abs(this.player.speed)/MAX_SPEED,0,1.4)/1.4;
    c.beginPath(); c.arc(cx,cy,r+8,0.65*Math.PI,(0.65+1.7*ratio)*Math.PI);
    c.strokeStyle=this.player.boostTime>0?'#22d3ee':'#a78bfa'; c.lineWidth=10; c.lineCap='round'; c.stroke();
    c.fillStyle='#fff'; c.font='bold 16px sans-serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText(Math.round(Math.abs(this.player.speed)*72)+'', cx, cy-2);
    c.font='9px sans-serif'; c.fillStyle='rgba(255,255,255,0.55)'; c.fillText('km/h', cx, cy+13);
    c.restore();
  }
  drawDriftMeter(c){
    if (!this.player.drift) return;
    const w=120,h=10,x=(W-w)/2,y=H-26;
    c.save();
    drawAsset(c, gptImages.atlas, atlasRects.driftMeter, x-18, y-42, w+36, 42, 0.36);
    c.fillStyle='rgba(10,14,26,0.55)'; roundRectPath(c,x-3,y-3,w+6,h+6,6); c.fill();
    const ratio=clamp(this.player.driftCharge/1.4,0,1);
    c.fillStyle=ratio>0.55?'#22d3ee':'#94a3b8'; roundRectPath(c,x,y,w*ratio,h,4); c.fill();
    c.strokeStyle='rgba(255,255,255,0.25)'; roundRectPath(c,x,y,w,h,4); c.stroke();
    c.fillStyle='#fff'; c.font='10px sans-serif'; c.textAlign='center'; c.fillText('MINI-TURBO', W/2, y-6);
    c.restore();
  }
  drawHUD(c){
    const p=this.player;
    UI.glassPanel(c, 10, 10, 168, 30, {radius:10, fill:'rgba(18,22,34,0.72)', stroke:'rgba(148,163,255,0.22)'});
    const suffix=p.rank===1?'st':p.rank===2?'nd':p.rank===3?'rd':'th';
    c.save(); c.font='13px sans-serif'; c.textAlign='left'; c.textBaseline='middle';
    c.fillStyle='#e7ecff'; c.fillText('LAP ', 22, 26);
    c.fillStyle='#22d3ee'; c.fillText(Math.min(p.lap,NUM_LAPS)+'', 50, 26);
    c.fillStyle='#e7ecff'; c.fillText(`/${NUM_LAPS}   `, 60, 26);
    c.fillStyle='#22d3ee'; c.fillText(p.rank+suffix, 100, 26);
    c.fillStyle='#e7ecff'; c.fillText(` / ${NUM_KARTS}`, 132, 26);
    c.restore();

    UI.glassPanel(c, W-178, 10, 168, 30, {radius:10, fill:'rgba(18,22,34,0.72)', stroke:'rgba(148,163,255,0.22)'});
    c.save(); c.font='13px sans-serif'; c.textAlign='left'; c.textBaseline='middle';
    if (p.item){
      const iconRect = p.item.id==='nitro' ? atlasRects.nitro : p.item.id==='oil' ? atlasRects.oilCan : p.item.id==='star' ? atlasRects.star : atlasRects.shield;
      drawAsset(c, gptImages.atlas, iconRect, W-48, 14, 22, 22);
    }
    c.fillStyle='#e7ecff'; c.fillText('ITEM: ', W-168, 26);
    c.fillStyle=p.item?p.item.color:'#8a93b8'; c.fillText(p.item?p.item.short:'--', W-128, 26);
    c.restore();
  }
  drawCountdown(c){
    if (this.state!=='COUNTDOWN') return;
    const n=Math.ceil(this.countdownT);
    c.save(); c.textAlign='center'; c.textBaseline='middle';
    c.font='bold 84px sans-serif'; c.fillStyle='rgba(34,211,238,0.92)';
    c.shadowColor='rgba(34,211,238,0.6)'; c.shadowBlur=24;
    c.fillText(n>0?String(n):'GO!', W/2, H/2-30);
    c.restore();
  }
  drawFxMessages(c){
    c.save(); c.textAlign='center';
    for (let i=this.fxMessages.length-1;i>=0;i--){
      const m=this.fxMessages[i]; m.t+=1/60; m.life-=1/60;
      if (m.life<=0){ this.fxMessages.splice(i,1); continue; }
      c.globalAlpha=clamp(m.life/1.6,0,1); c.font='bold 16px sans-serif'; c.fillStyle='#fff';
      c.shadowColor='rgba(34,211,238,0.6)'; c.shadowBlur=10;
      c.fillText(m.text, W/2, 64+i*22-m.t*14);
    }
    c.restore();
  }
}

function drawStarShape(c, cx, cy, spikes, outerR, innerR){
  let rot=Math.PI/2*3; const step=Math.PI/spikes;
  c.beginPath(); c.moveTo(cx, cy-outerR);
  for (let i=0;i<spikes;i++){
    c.lineTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR); rot+=step;
    c.lineTo(cx+Math.cos(rot)*innerR, cy+Math.sin(rot)*innerR); rot+=step;
  }
  c.closePath(); c.fill();
}

/* ============================================================
   TitleScene
   ============================================================ */
class TitleScene extends Scene {
  enter(){ this.particles=new GameKit.Particles(W,H,{count:70}); this.t=0; }
  update(dt, game){
    this.t+=dt; this.particles.update(dt);
    if (game.input.justPressed('Space') || game.input.pointer.justPressed || touch.itemJust){
      touch.itemJust=false;
      RaceAudio.unlock();
      game.audio.jingle([{f:523,d:0.1},{f:659,d:0.1},{f:784,d:0.18}]);
      game.changeScene(new RaceScene());
    }
  }
  draw(c){
    if (!drawAsset(c, gptImages.track, trackRects.sky, 0, 0, W, H)){
      c.drawImage(nebulaBG,0,0);
    }
    this.particles.draw(c);
    UI.glassPanel(c, W/2-330, H/2-150, 660, 300, {radius:18, fill:'rgba(10,14,26,0.55)'});
    UI.text(c, 'TURBO KART GRAND PRIX', W/2, H/2-128, {font:'bold 38px "Segoe UI", sans-serif', color:'#22d3ee'});
    UI.text(c, 'ターボカート・グランプリ', W/2, H/2-78, {color:'#a78bfa', font:'18px sans-serif'});
    UI.text(c, 'カート背後からの三人称ビュー（擬似3D）カートレース！', W/2, H/2-38, {color:'#c7cdec', font:'14px sans-serif'});
    UI.text(c, '矢印 / WASD で操作 ・ Shift でドリフト（曲がりながら離すとミニターボ）', W/2, H/2-12, {color:'#c7cdec', font:'13px sans-serif'});
    UI.text(c, 'Space でアイテム使用 ・ ライバル5台を抜いて3周を制せ！', W/2, H/2+12, {color:'#c7cdec', font:'13px sans-serif'});
    UI.text(c, 'スマホは画面下のボタンで操作', W/2, H/2+36, {color:'#8a93b8', font:'12px sans-serif'});
    const blink=Math.sin(this.t*4)>-0.3;
    if (blink) UI.text(c, '▶ クリック / Space / タップ でスタート — START', W/2, H/2+78, {color:'#fff', font:'bold 16px sans-serif'});

    if (best!=null) UI.text(c, 'ベスト順位 / BEST: '+best+'位', W/2, H/2+114, {color:'#94a3b8', font:'13px sans-serif'});

}

/* ============================================================
   ResultScene
   ============================================================ */
class ResultScene extends Scene {
  constructor(order, playerRank){ super(); this.order=order; this.playerRank=playerRank; }
  enter(){ this.particles=new GameKit.Particles(W,H,{count:50}); this.t=0; }
  update(dt, game){
    this.t+=dt; this.particles.update(dt);
    if (this.t>0.4 && (game.input.justPressed('Space') || game.input.pointer.justPressed || touch.itemJust)){
      touch.itemJust=false;
      game.audio.jingle([{f:784,d:0.1},{f:659,d:0.1},{f:523,d:0.2}]);
      game.changeScene(new RaceScene());
    }
  }
  draw(c){
    if (!drawAsset(c, gptImages.track, trackRects.sky, 0, 0, W, H)){
      c.drawImage(nebulaBG,0,0);
    }
    this.particles.draw(c);
    const headline=this.playerRank===1?'🏆 優勝！ VICTORY!':this.playerRank<=3?`${this.playerRank}位フィニッシュ！表彰台達成！`:`${this.playerRank}位でレース終了`;
    UI.glassPanel(c, W/2-260, H/2-200, 520, 400, {radius:18, fill:'rgba(10,14,26,0.6)'});
    UI.text(c, headline, W/2, H/2-176, {font:'bold 26px sans-serif', color:'#22d3ee'});
    UI.text(c, '3周のレースが終了しました', W/2, H/2-138, {color:'#c7cdec', font:'13px sans-serif'});
    // table
    c.save(); c.textBaseline='middle';
    this.order.forEach((k,i)=>{
      const y=H/2-96+i*34, you=k.isPlayer;
      c.font=you?'bold 15px sans-serif':'14px sans-serif';
      c.textAlign='left'; c.fillStyle=you?'#fff':'#c7cdec';
      c.fillStyle=you?'#a78bfa':'#22d3ee'; c.fillText((i+1)+'.', W/2-200, y);
      c.fillStyle=you?'#fff':'#c7cdec';
      c.fillText(k.color.name+(you?' (YOU)':''), W/2-160, y);
      c.textAlign='right';
      c.fillText(k.finished?k.finishTime.toFixed(2)+'s':'—', W/2+200, y);
    });
    c.restore();
    const blink=Math.sin(this.t*4)>-0.3;
    if (blink) UI.text(c, '▶ もう一度走る / RACE AGAIN', W/2, H/2+168, {color:'#fff', font:'bold 16px sans-serif'});
  }
}

engine.changeScene(new TitleScene());
engine.start();
