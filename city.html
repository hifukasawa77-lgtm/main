<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER CITY BUILDER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00ffff;
      user-select: none;
    }
    h1 {
      font-size: 20px;
      letter-spacing: 6px;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff44;
      margin-bottom: 6px;
      text-align: center;
    }
    #container { position: relative; }
    #status-bar {
      background: #060614;
      border: 1px solid #0a3a4a;
      border-bottom: none;
      padding: 6px 14px;
      display: flex;
      gap: 18px;
      align-items: center;
      font-size: 12px;
      letter-spacing: 1px;
      height: 32px;
    }
    #game-title {
      color: #00ffff;
      font-weight: bold;
      font-size: 13px;
      text-shadow: 0 0 8px #00ffff;
      margin-right: 4px;
    }
    .stat { color: #336677; }
    .stat-val { color: #00cccc; font-weight: bold; }
    #game-wrapper { position: relative; line-height: 0; }
    canvas { display: block; cursor: crosshair; border: 1px solid #0a3a4a; }
    #toolbar {
      background: #060614;
      border: 1px solid #0a3a4a;
      border-top: none;
      padding: 8px 12px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .tool-btn {
      background: #0c0c22;
      border: 1px solid #1a1a33;
      color: #556677;
      padding: 6px 11px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.12s;
    }
    .tool-btn:hover { color: #99aabb; border-color: #334455; }
    .tool-btn[data-tool="1"].active { border-color: #667788; color: #99aabb; background: #111128; }
    .tool-btn[data-tool="2"].active { border-color: #00cccc; color: #00ffff; background: #001c1c; box-shadow: 0 0 6px #00ffff33; }
    .tool-btn[data-tool="5"].active { border-color: #cc00cc; color: #ff00ff; background: #1c001c; box-shadow: 0 0 6px #ff00ff33; }
    .tool-btn[data-tool="8"].active { border-color: #cc5500; color: #ff6600; background: #1c0a00; box-shadow: 0 0 6px #ff660033; }
    .tool-btn[data-tool="0"].active { border-color: #cc2222; color: #ff3333; background: #1c0000; box-shadow: 0 0 6px #ff333333; }
    #hint { color: #223344; font-size: 10px; margin-left: 8px; letter-spacing: 0.5px; }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 640px; height: 512px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,8,0.82);
      pointer-events: none;
    }
    #overlay.show { display: flex; pointer-events: all; }
    #overlay-title {
      font-size: 38px;
      letter-spacing: 10px;
      text-shadow: 0 0 40px currentColor;
      font-weight: bold;
    }
    #overlay-sub {
      font-size: 13px;
      letter-spacing: 3px;
      margin-top: 10px;
      opacity: 0.75;
    }
    #overlay-btn {
      margin-top: 28px;
      background: transparent;
      border: 2px solid currentColor;
      color: inherit;
      padding: 10px 34px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #overlay-btn:hover { background: rgba(255,255,255,0.08); }
    #legend {
      margin-top: 6px;
      display: flex;
      gap: 16px;
      font-size: 10px;
      color: #334455;
      letter-spacing: 0.5px;
    }
    .leg { display: flex; align-items: center; gap: 4px; }
    .leg-dot { width: 8px; height: 8px; border-radius: 1px; }
  </style>
</head>
<body>
  <h1>▸ CYBER CITY BUILDER ◂</h1>
  <div id="container">
    <div id="status-bar">
      <span id="game-title">CYBER CITY</span>
      <span class="stat">資金: <span class="stat-val" id="stat-money">$5,000</span></span>
      <span class="stat">人口: <span class="stat-val" id="stat-pop">0</span></span>
      <span class="stat">幸福: <span class="stat-val" id="stat-happiness">100%</span></span>
      <span class="stat">収入: <span class="stat-val" id="stat-income">+$0</span></span>
      <span class="stat" style="margin-left:auto">年: <span class="stat-val" id="stat-year">1</span></span>
    </div>
    <div id="game-wrapper">
      <canvas id="canvas" width="640" height="512"></canvas>
      <div id="overlay">
        <div id="overlay-title"></div>
        <div id="overlay-sub"></div>
        <button id="overlay-btn">[ RESTART ]</button>
      </div>
    </div>
    <div id="toolbar">
      <button class="tool-btn active" data-tool="1">▬ 道路 $50</button>
      <button class="tool-btn" data-tool="2">⬛ 住宅 $200</button>
      <button class="tool-btn" data-tool="5">⬛ 商業 $300</button>
      <button class="tool-btn" data-tool="8">⬛ 工業 $250</button>
      <button class="tool-btn" data-tool="0">✕ 撤去</button>
      <span id="hint">クリック/ドラッグ: 配置 | 右クリック: 撤去</span>
    </div>
    <div id="legend">
      <span class="leg"><span class="leg-dot" style="background:#00cccc;box-shadow:0 0 4px #00ffff"></span>住宅 — 道路に接続で人口増加</span>
      <span class="leg"><span class="leg-dot" style="background:#cc00cc;box-shadow:0 0 4px #ff00ff"></span>商業 — 道路+住宅隣接で収入</span>
      <span class="leg"><span class="leg-dot" style="background:#cc5500;box-shadow:0 0 4px #ff6600"></span>工業 — 常に収入・汚染あり</span>
      <span class="leg"><span class="leg-dot" style="background:#444466"></span>道路 — 接続インフラ</span>
    </div>
  </div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const TS = 32; // tile size px
const COLS = 20;
const ROWS = 16;

const T = {
  EMPTY: 0, ROAD: 1,
  RES1: 2, RES2: 3, RES3: 4,
  COM1: 5, COM2: 6, COM3: 7,
  IND1: 8, IND2: 9, IND3: 10
};

const PLACE_COST = { [T.ROAD]: 50, [T.RES1]: 200, [T.COM1]: 300, [T.IND1]: 250 };
const MAINT     = { [T.ROAD]: 1, [T.RES1]: 2, [T.RES2]: 4, [T.RES3]: 8, [T.COM1]: 2, [T.COM2]: 4, [T.COM3]: 8, [T.IND1]: 3, [T.IND2]: 6, [T.IND3]: 12 };
const POP_GAIN  = { [T.RES1]: 2, [T.RES2]: 5, [T.RES3]: 10 };
const COM_INC   = { [T.COM1]: 10, [T.COM2]: 25, [T.COM3]: 50 };
const IND_INC   = { [T.IND1]: 20, [T.IND2]: 40, [T.IND3]: 80 };
const IND_POL   = { [T.IND1]: 8,  [T.IND2]: 18, [T.IND3]: 36 };
const XP_MAX    = { [T.RES1]: 30, [T.RES2]: 80, [T.COM1]: 40, [T.COM2]: 100, [T.IND1]: 50, [T.IND2]: 120 };
const NEXT_T    = { [T.RES1]: T.RES2, [T.RES2]: T.RES3, [T.COM1]: T.COM2, [T.COM2]: T.COM3, [T.IND1]: T.IND2, [T.IND2]: T.IND3 };

const RES     = new Set([T.RES1, T.RES2, T.RES3]);
const COM     = new Set([T.COM1, T.COM2, T.COM3]);
const IND     = new Set([T.IND1, T.IND2, T.IND3]);
const ROAD_S  = new Set([T.ROAD]);
const DIRS4   = [[-1,0],[1,0],[0,-1],[0,1]];

// ============================================================
// STATE
// ============================================================
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');

let grid, stats, selectedTool, gameOver, gameClear, frame, hover, dragging, particles, lastIncome;

function init() {
  grid = Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({ type: T.EMPTY, xp: 0, pol: 0 }))
  );
  stats        = { money: 5000, pop: 0, happiness: 100, year: 1 };
  selectedTool = T.ROAD;
  gameOver     = false;
  gameClear    = false;
  frame        = 0;
  hover        = null;
  dragging     = false;
  lastIncome   = 0;
  particles    = Array.from({length: 12}, makeParticle);
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}

// ============================================================
// PARTICLES (road glitter)
// ============================================================
function makeParticle() {
  return {
    x: Math.random() * COLS * TS,
    y: Math.random() * ROWS * TS,
    vx: (Math.random() - 0.5) * 0.7,
    vy: (Math.random() - 0.5) * 0.7,
    life: Math.random() * 180 + 60,
    color: Math.random() < 0.55 ? '#00ffff' : '#ff00ff'
  };
}

function updateParticles() {
  const roads = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c].type === T.ROAD) roads.push([r, c]);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const col = Math.floor(p.x / TS);
    const row = Math.floor(p.y / TS);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS && grid[row][col].type === T.ROAD) {
      p.x += p.vx;
      p.y += p.vy;
    } else if (roads.length) {
      const [r, c] = roads[Math.floor(Math.random() * roads.length)];
      p.x = (c + Math.random()) * TS;
      p.y = (r + Math.random()) * TS;
    }
    p.life--;
    if (p.life <= 0) particles[i] = makeParticle();
  }
}

// ============================================================
// ADJACENCY
// ============================================================
function adjNeighbors(r, c) {
  return DIRS4
    .map(([dr, dc]) => [r + dr, c + dc])
    .filter(([nr, nc]) => nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS)
    .map(([nr, nc]) => grid[nr][nc]);
}

function adjHas(r, c, typeSet) {
  return DIRS4.some(([dr, dc]) => {
    const nr = r + dr, nc = c + dc;
    return nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && typeSet.has(grid[nr][nc].type);
  });
}

// ============================================================
// PLACE / DEMOLISH
// ============================================================
function placeTile(r, c, toolType) {
  if (gameOver) return;
  const cell = grid[r][c];

  if (toolType === T.EMPTY) {
    if (cell.type === T.EMPTY) return;
    cell.type = T.EMPTY;
    cell.xp = 0;
    return;
  }
  if (cell.type !== T.EMPTY) return;
  const cost = PLACE_COST[toolType] || 0;
  if (stats.money < cost) return;
  stats.money -= cost;
  cell.type = toolType;
  cell.xp = 0;
  updateUI();
}

// ============================================================
// SIMULATION TICK
// ============================================================
function tick() {
  if (gameOver) return;

  // Pass 1: reset pollution + industrial
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      grid[r][c].pol = 0;

  let income = 0, maint = 0, popGain = 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      const t = cell.type;
      if (!IND.has(t)) continue;
      income += IND_INC[t];
      maint  += MAINT[t];
      const pol = IND_POL[t];
      cell.pol += pol;
      for (const nb of adjNeighbors(r, c)) nb.pol += Math.floor(pol * 0.5);
      if (NEXT_T[t]) { cell.xp++; if (cell.xp >= XP_MAX[t]) { cell.type = NEXT_T[t]; cell.xp = 0; } }
    }
  }

  // Pass 2: residential + commercial
  let totalPol = 0, zoneCount = 0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      const t = cell.type;

      if (t === T.ROAD) { maint += MAINT[T.ROAD]; continue; }

      if (RES.has(t)) {
        if (adjHas(r, c, ROAD_S)) {
          popGain += POP_GAIN[t];
          if (NEXT_T[t]) { cell.xp++; if (cell.xp >= XP_MAX[t]) { cell.type = NEXT_T[t]; cell.xp = 0; } }
        }
        maint += MAINT[t];
        zoneCount++;
        totalPol += cell.pol;
      }

      if (COM.has(t)) {
        if (adjHas(r, c, ROAD_S) && adjHas(r, c, RES)) {
          income += COM_INC[t];
          if (NEXT_T[t]) { cell.xp++; if (cell.xp >= XP_MAX[t]) { cell.type = NEXT_T[t]; cell.xp = 0; } }
        }
        maint += MAINT[t];
        zoneCount++;
        totalPol += cell.pol;
      }
    }
  }

  // Tax from population
  const tax = Math.floor(stats.pop * 0.1);
  income += tax;
  const net = income - maint;
  lastIncome = net;

  stats.money += net;
  stats.pop   += popGain;
  stats.year++;
  stats.happiness = zoneCount > 0
    ? Math.max(0, Math.min(100, Math.round(100 - (totalPol / zoneCount) * 0.6)))
    : 100;

  if (stats.money <= 0) {
    stats.money = 0;
    gameOver    = true;
    showOverlay('GAME OVER', '資金が底をつきました', '#ff3333', true);
  }
  if (!gameClear && stats.pop >= 500) {
    gameClear = true;
    showOverlay('CLEAR !', '人口500達成 — ゲームは続きます', '#00ffff', false);
  }
  updateUI();
}

function showOverlay(title, sub, color, showBtn) {
  const ov = document.getElementById('overlay');
  ov.style.color = color;
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
  const btn = document.getElementById('overlay-btn');
  btn.style.display = showBtn ? '' : 'none';
  ov.classList.add('show');
  if (!showBtn) setTimeout(() => ov.classList.remove('show'), 3000);
}

function updateUI() {
  document.getElementById('stat-money').textContent     = '$' + stats.money.toLocaleString();
  document.getElementById('stat-pop').textContent       = stats.pop.toLocaleString();
  document.getElementById('stat-happiness').textContent = stats.happiness + '%';
  document.getElementById('stat-year').textContent      = stats.year;
  const incEl = document.getElementById('stat-income');
  incEl.textContent = (lastIncome >= 0 ? '+' : '') + '$' + lastIncome;
  incEl.style.color = lastIncome >= 0 ? '#00cc88' : '#ff4444';
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Tiles
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      drawTile(r, c);

  // Grid lines
  ctx.strokeStyle = '#0d0d22';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * TS); ctx.lineTo(COLS * TS, r * TS); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * TS, 0); ctx.lineTo(c * TS, ROWS * TS); ctx.stroke();
  }

  // Particles
  ctx.save();
  for (const p of particles) {
    const alpha = Math.min(1, p.life / 40) * 0.75;
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = p.color;
    ctx.shadowBlur  = 8;
    ctx.shadowColor = p.color;
    ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
  }
  ctx.restore();

  // Hover
  if (hover) {
    ctx.fillStyle   = '#ffffff08';
    ctx.strokeStyle = '#ffffff33';
    ctx.lineWidth   = 1;
    ctx.fillRect(hover.c * TS, hover.r * TS, TS, TS);
    ctx.strokeRect(hover.c * TS + 0.5, hover.r * TS + 0.5, TS - 1, TS - 1);
  }
}

function drawTile(r, c) {
  const x  = c * TS;
  const y  = r * TS;
  const t  = grid[r][c].type;
  const pol = grid[r][c].pol;

  if (t === T.EMPTY) {
    if (pol > 0) {
      ctx.fillStyle = `rgba(70, 25, 0, ${Math.min(0.55, pol * 0.014)})`;
    } else {
      ctx.fillStyle = '#060616';
    }
    ctx.fillRect(x, y, TS, TS);
    return;
  }

  if (t === T.ROAD) { drawRoad(x, y); return; }

  if (RES.has(t)) { drawBuilding(x, y, t - T.RES1, 'res', r, c); return; }
  if (COM.has(t)) { drawBuilding(x, y, t - T.COM1, 'com', r, c); return; }
  if (IND.has(t)) { drawBuilding(x, y, t - T.IND1, 'ind', r, c); return; }
}

function drawRoad(x, y) {
  // Base
  ctx.fillStyle = '#131325';
  ctx.fillRect(x, y, TS, TS);
  // Border groove
  ctx.fillStyle = '#1e1e38';
  ctx.fillRect(x, y, TS, 2);
  ctx.fillRect(x, y + TS - 2, TS, 2);
  ctx.fillRect(x, y, 2, TS);
  ctx.fillRect(x + TS - 2, y, 2, TS);
  // Center dashes
  ctx.fillStyle = '#28284a';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(x + TS / 2 - 1, y + 2 + i * 10, 2, 6);
    ctx.fillRect(x + 2 + i * 10, y + TS / 2 - 1, 6, 2);
  }
}

const B_BASE = [
  ['#003030', '#004444', '#006060'], // res base (lv 0,1,2)
  ['#300030', '#440044', '#600060'], // com base
  ['#2a1200', '#3d1c00', '#553000']  // ind base
];
const B_GLOW = [
  ['#006666', '#00aaaa', '#00ffff'], // res glow
  ['#660066', '#aa00aa', '#ff00ff'], // com glow
  ['#885500', '#bb7700', '#ff6600']  // ind glow
];

function drawBuilding(x, y, lv, kind, r, c) {
  const ki    = kind === 'res' ? 0 : kind === 'com' ? 1 : 2;
  const base  = B_BASE[ki][lv];
  const glow  = B_GLOW[ki][lv];

  // Ground
  ctx.fillStyle = '#080818';
  ctx.fillRect(x, y, TS, TS);

  // Building size by level
  const bw = [20, 22, 26][lv];
  const bh = [13, 18, 26][lv];
  const bx = x + Math.floor((TS - bw) / 2);
  const by = y + TS - bh - 2;

  // Shadow
  ctx.fillStyle = '#000000aa';
  ctx.fillRect(bx + 2, by + 2, bw, bh);

  // Body
  ctx.fillStyle = base;
  ctx.fillRect(bx, by, bw, bh);

  // Glow outline
  ctx.shadowBlur  = lv === 2 ? 14 : lv === 1 ? 7 : 3;
  ctx.shadowColor = glow;
  ctx.strokeStyle = glow;
  ctx.lineWidth   = 1;
  ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
  ctx.shadowBlur  = 0;

  // Roof accent (lv2 only)
  if (lv === 2) {
    ctx.fillStyle = glow;
    ctx.fillRect(bx + Math.floor(bw * 0.3), by, Math.floor(bw * 0.4), 2);
  }

  // Windows
  const wCols   = [2, 3, 4][lv];
  const wRows   = [1, 2, 3][lv];
  const ww = 3, wh = 3;
  const padX    = Math.floor((bw - wCols * ww - (wCols - 1) * 2) / 2);
  const padY    = 3;
  const stepX   = ww + 2;
  const stepY   = wh + Math.floor((bh - padY * 2 - wRows * wh) / Math.max(1, wRows - 1) + wh) - wh;
  const usedH   = wRows * wh + Math.max(0, wRows - 1) * 2;
  const startY  = by + padY + Math.floor((bh - padY * 2 - usedH) / 2);

  for (let wr = 0; wr < wRows; wr++) {
    for (let wc = 0; wc < wCols; wc++) {
      const flicker = (frame + r * 13 + c * 7 + wr * 19 + wc * 11) % 80;
      const lit = flicker > 18;
      ctx.fillStyle = lit ? glow : (base + '66');
      ctx.fillRect(bx + padX + wc * stepX, startY + wr * (wh + 2), ww, wh);
    }
  }

  // Industrial smoke
  if (kind === 'ind') {
    const cx  = bx + Math.floor(bw / 2);
    const off = (frame % 40) < 20 ? 0 : 1;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#887766';
    ctx.beginPath(); ctx.arc(cx, by - 3 - off, 2 + lv, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, by - 6 - off, 1.5 + lv * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // XP progress bar
  const xp    = grid[r][c].xp;
  const xpMax = XP_MAX[grid[r][c].type];
  if (xpMax && xp > 0) {
    const barW   = bw - 4;
    const filled = Math.round(barW * xp / xpMax);
    ctx.fillStyle = '#111133';
    ctx.fillRect(bx + 2, by + bh - 3, barW, 2);
    ctx.fillStyle = glow;
    ctx.fillRect(bx + 2, by + bh - 3, filled, 2);
  }
}

// ============================================================
// INPUT
// ============================================================
function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / TS);
  const r = Math.floor((e.clientY - rect.top) / TS);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c };
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const cell = cellFromEvent(e);
  if (!cell) return;
  dragging = true;
  if (e.button === 2) placeTile(cell.r, cell.c, T.EMPTY);
  else                placeTile(cell.r, cell.c, selectedTool);
});

canvas.addEventListener('mousemove', e => {
  hover = cellFromEvent(e);
  if (!dragging || !hover) return;
  if (e.buttons & 1) placeTile(hover.r, hover.c, selectedTool);
  if (e.buttons & 2) placeTile(hover.r, hover.c, T.EMPTY);
});

canvas.addEventListener('mouseup',   () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { hover = null; dragging = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedTool = parseInt(btn.dataset.tool, 10);
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('overlay-btn').addEventListener('click', init);

// ============================================================
// GAME LOOP
// ============================================================
function loop() {
  frame++;
