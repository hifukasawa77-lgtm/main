<style>

<script>
// ============================================================
// ① CONSTANTS
// ============================================================
const TS    = 32;
const COLS  = 40;
const ROWS  = 32;
const VCOLS = 20;
const VROWS = 16;

const T = {
  EMPTY:0, ROAD:1,
  RES1:2, RES2:3, RES3:4,
  COM1:5, COM2:6, COM3:7,
  IND1:8, IND2:9, IND3:10,
  RAIL:11, STATION:12, AIRPORT:13,
  POWER:14, PLINE:15, WATER:16,
  GAS:17, NUCLEAR:18,
  PARK:19, POLICE:20, FIRE_ST:21,
  ROAD_BROKEN:22,
  BRIDGE:24,
};
const TR = { GRASS:0, HIGHLAND:1, RIVER:2, SEA:3, FOREST:4 };
const DIRS4 = [[-1,0],[1,0],[0,-1],[0,1]];

const BUILD_COST = {
  [T.ROAD]:100, [T.RES1]:300, [T.COM1]:400, [T.IND1]:350,
  [T.RAIL]:150, [T.STATION]:800, [T.AIRPORT]:3000, [T.BRIDGE]:400,
  [T.POWER]:1000, [T.PLINE]:80, [T.WATER]:60, [T.GAS]:70,
  [T.NUCLEAR]:5000, [T.PARK]:500, [T.POLICE]:1200, [T.FIRE_ST]:1000,
};
const MAINT = {
  [T.ROAD]:2, [T.BRIDGE]:3,
  [T.RES1]:1, [T.RES2]:2, [T.RES3]:4,
  [T.COM1]:1, [T.COM2]:2, [T.COM3]:4,
  [T.IND1]:2, [T.IND2]:4, [T.IND3]:8,
  [T.RAIL]:1, [T.STATION]:5, [T.AIRPORT]:25,
  [T.POWER]:10, [T.PLINE]:0, [T.WATER]:0,
  [T.NUCLEAR]:50, [T.PARK]:2, [T.POLICE]:12, [T.FIRE_ST]:10,
};
const POP_GAIN = { [T.RES1]:10, [T.RES2]:25, [T.RES3]:50 };
const COM_INC  = { [T.COM1]:8,  [T.COM2]:20, [T.COM3]:40, [T.AIRPORT]:200 };
const IND_INC  = { [T.IND1]:10, [T.IND2]:25, [T.IND3]:50 };
const IND_POL  = { [T.IND1]:10, [T.IND2]:22, [T.IND3]:44 };
const XP_MAX   = { [T.RES1]:30, [T.RES2]:80, [T.COM1]:40, [T.COM2]:100, [T.IND1]:50, [T.IND2]:120 };
const NEXT_T   = { [T.RES1]:T.RES2, [T.RES2]:T.RES3, [T.COM1]:T.COM2, [T.COM2]:T.COM3, [T.IND1]:T.IND2, [T.IND2]:T.IND3 };

const POWER_SRC  = new Set([T.POWER, T.NUCLEAR]);
const POWER_COND = new Set([T.POWER,T.NUCLEAR,T.PLINE,T.RES1,T.RES2,T.RES3,T.COM1,T.COM2,T.COM3,T.IND1,T.IND2,T.IND3,T.STATION,T.POLICE,T.FIRE_ST,T.AIRPORT]);
const WATER_COND = new Set([T.WATER,T.RES1,T.RES2,T.RES3,T.COM1,T.COM2,T.COM3]);
const RAIL_SET   = new Set([T.RAIL, T.STATION]);
const ROAD_SET   = new Set([T.ROAD, T.BRIDGE]);

const TILE_NAMES = {
  [T.EMPTY]:'空地/Empty', [T.ROAD]:'道路/Road', [T.ROAD_BROKEN]:'破損道路',
  [T.RES1]:'住宅Lv1', [T.RES2]:'住宅Lv2', [T.RES3]:'住宅Lv3',
  [T.COM1]:'商業Lv1', [T.COM2]:'商業Lv2', [T.COM3]:'商業Lv3',
  [T.IND1]:'工業Lv1', [T.IND2]:'工業Lv2', [T.IND3]:'工業Lv3',
  [T.RAIL]:'線路/Rail', [T.STATION]:'駅/Station', [T.AIRPORT]:'空港/Airport',
  [T.POWER]:'発電所/Power', [T.PLINE]:'送電線/Line', [T.WATER]:'水道管/Water',
  [T.NUCLEAR]:'原発/Nuclear', [T.PARK]:'公園/Park',
  [T.POLICE]:'警察署/Police', [T.FIRE_ST]:'消防署/Fire', [T.BRIDGE]:'橋/Bridge',
};
const TERRAIN_NAMES = ['草地/Grass','高台/Highland','川/River','海/Sea','森/Forest'];

const MM_BLDG = {
  [T.RES1]:'#1a4a6a', [T.RES2]:'#1e5c82', [T.RES3]:'#2272a0',
  [T.COM1]:'#4a1a5a', [T.COM2]:'#5c1e72', [T.COM3]:'#6e22a0',
  [T.IND1]:'#5a3000', [T.IND2]:'#6e3c00', [T.IND3]:'#824800',
  [T.ROAD]:'#344050', [T.BRIDGE]:'#3a4a5c', [T.RAIL]:'#2a2a2a',
  [T.STATION]:'#1a3a5a', [T.AIRPORT]:'#2a3a4a',
  [T.POWER]:'#4a3a00', [T.NUCLEAR]:'#2a3a2a', [T.PLINE]:'#333010',
  [T.WATER]:'#001a3a', [T.PARK]:'#0a2a0a',
  [T.POLICE]:'#0a0a2a', [T.FIRE_ST]:'#2a0a0a',
};
const MM_TERRAIN = {
  [TR.SEA]:'#1a3a5c', [TR.RIVER]:'#1e4d7b',
  [TR.HIGHLAND]:'#4a3f2f', [TR.FOREST]:'#1a3a1a', [TR.GRASS]:'#1a2a1a',
};

// ============================================================
// ② STATE
// ============================================================
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let viewX = 0, viewY = 0;

const state = {
  money:0, pop:0, happiness:100, crimeRate:0, pollution:0,
  year:1, lastIncome:0,
  gameOver:false, gameClear:false, paused:false, speed:1,
  frame:0, shakeTimer:0,
  selectedTool:T.ROAD, isDemolish:false,
  hoverR:-1, hoverC:-1,
  map:[], vehicles:[], events:[], particles:[],
};

function mkCell(type=T.EMPTY, terrain=TR.GRASS) {
  return { type, terrain, xp:0, pol:0, powered:false, watered:false, fireTimer:0 };
}

function init() {
  Object.assign(state, {
    money:10000, pop:0, happiness:100, crimeRate:0, pollution:0,
    year:1, lastIncome:0,
    gameOver:false, gameClear:false,
    frame:0, shakeTimer:0,
    selectedTool:T.ROAD, isDemolish:false,
    hoverR:-1, hoverC:-1,
    vehicles:[], events:[], particles:[],
  });
  state.map = Array.from({length:ROWS}, () =>
    Array.from({length:COLS}, () => mkCell())
  );
  viewX = Math.floor((COLS - VCOLS) / 2);
  viewY = Math.floor((ROWS - VROWS) / 2);
  generateTerrain();
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}

// ============================================================
// ③ TERRAIN GENERATION
// ============================================================
function hash2(x, y, s) {
  let n = Math.sin(x * 127.1 + y * 311.7 + s * 74.3) * 43758.5453;
  return n - Math.floor(n);
}
function octNoise(x, y, oct, seed) {
  let v=0, a=1, f=1, mx=0;
  for (let i=0; i<oct; i++) {
    const fx=x*f, fy=y*f;
    const ix=Math.floor(fx), iy=Math.floor(fy);
    const tx=fx-ix, ty=fy-iy;
    const ux=tx*tx*(3-2*tx), uy=ty*ty*(3-2*ty);
    const h = hash2(ix,iy,seed+i*13)*(1-ux)*(1-uy)
            + hash2(ix+1,iy,seed+i*13)*ux*(1-uy)
            + hash2(ix,iy+1,seed+i*13)*(1-ux)*uy
            + hash2(ix+1,iy+1,seed+i*13)*ux*uy;
    v+=h*a; mx+=a; a*=0.5; f*=2;
  }
  return v/mx;
}
function generateTerrain() {
  const s = Math.random()*1000;
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const h = octNoise(c/COLS*4, r/ROWS*4, 5, s);
      const m = octNoise(c/COLS*3, r/ROWS*3, 3, s+500);
      let t;
      if (h < 0.30)      t = TR.SEA;
      else if (h < 0.38) t = TR.RIVER;
      else if (h > 0.72) t = TR.HIGHLAND;
      else if (m > 0.65 && h > 0.42) t = TR.FOREST;
      else                t = TR.GRASS;
      state.map[r][c].terrain = t;
    }
  }
  // Rivers: random walk from highland to sea
  for (let ri=0; ri<3; ri++) {
    const starts=[];
    for (let r=0; r<ROWS; r++)
      for (let c=0; c<COLS; c++)
        if (state.map[r][c].terrain===TR.HIGHLAND) starts.push([r,c]);
    if (!starts.length) continue;
    let [r,c] = starts[Math.floor(Math.random()*starts.length)];
    for (let step=0; step<ROWS*2; step++) {
      state.map[r][c].terrain = TR.RIVER;
      const d = [[1,0],[0,1],[0,-1],[1,1],[1,-1]][Math.floor(Math.random()*5)];
      r = Math.max(0, Math.min(ROWS-1, r+d[0]));
      c = Math.max(0, Math.min(COLS-1, c+d[1]));
      if (state.map[r][c].terrain===TR.SEA) break;
    }
  }
  // Forests: random clusters
  for (let fi=0; fi<10; fi++) {
    const fr=Math.floor(Math.random()*ROWS), fc=Math.floor(Math.random()*COLS);
    const sz=2+Math.floor(Math.random()*4);
    for (let dr=-sz; dr<=sz; dr++)
      for (let dc=-sz; dc<=sz; dc++) {
        if (dr*dr+dc*dc>sz*sz) continue;
        const nr=fr+dr, nc=fc+dc;
        if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        if (state.map[nr][nc].terrain===TR.GRASS && Math.random()<0.7)
          state.map[nr][nc].terrain=TR.FOREST;
      }
  }
}

// ============================================================
// ④ INFRA NETWORK (BFS)
// ============================================================
function computePowerNet() {
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) state.map[r][c].powered=false;
  const q=[];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++)
    if (POWER_SRC.has(state.map[r][c].type)) { state.map[r][c].powered=true; q.push([r,c]); }
  while (q.length) {
    const [r,c]=q.shift();
    for (const [dr,dc] of DIRS4) {
      const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      const cell=state.map[nr][nc];
      if (!cell.powered && POWER_COND.has(cell.type)) { cell.powered=true; q.push([nr,nc]); }
    }
  }
}
function computeWaterNet() {
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) state.map[r][c].watered=false;
  const q=[];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    if (state.map[r][c].type!==T.WATER) continue;
    if (r===0||r===ROWS-1||c===0||c===COLS-1) { state.map[r][c].watered=true; q.push([r,c]); }
  }
  while (q.length) {
    const [r,c]=q.shift();
    for (const [dr,dc] of DIRS4) {
      const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      const cell=state.map[nr][nc];
      if (!cell.watered && WATER_COND.has(cell.type)) { cell.watered=true; q.push([nr,nc]); }
    }
  }
}
function computeNetwork() { computePowerNet(); computeWaterNet(); }

// ============================================================
// ⑤ HELPERS
// ============================================================
function adjHas(r, c, dr, dc, ...types) {
  const nr=r+dr, nc=c+dc;
  if (nr<0||nr>=ROWS||nc<0||nc>=COLS) return false;
  return types.includes(state.map[nr][nc].type);
}
function anyAdj(r, c, ...types) {
  return DIRS4.some(([dr,dc]) => adjHas(r,c,dr,dc,...types));
}
function hasFireSt(r, c) {
  for (let dr=-6; dr<=6; dr++) for (let dc=-6; dc<=6; dc++) {
    const nr=r+dr, nc=c+dc;
    if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
    const cell=state.map[nr][nc];
    if (cell.type===T.FIRE_ST && cell.powered) return true;
  }
  return false;
}
function hasRailStation(r, c) {
  const visited=new Set();
  const q=[[r,c]];
  visited.add(r+','+c);
  while (q.length) {
    const [cr,cc]=q.shift();
    for (const [dr,dc] of DIRS4) {
      const nr=cr+dr, nc=cc+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      const key=nr+','+nc;
      if (visited.has(key)) continue;
      visited.add(key);
      const t=state.map[nr][nc].type;
      if (t===T.STATION) return true;
      if (t===T.RAIL) q.push([nr,nc]);
    }
  }
  return false;
}

// ============================================================
// ⑥ PLACE / DEMOLISH
// ============================================================
function canBuild(r, c, tool) {
  if (r<0||r>=ROWS||c<0||c>=COLS) return false;
  const tr=state.map[r][c].terrain;
  if (tr===TR.SEA) return false;
  if (tr===TR.RIVER) return tool===T.BRIDGE;
  if (tr===TR.HIGHLAND) return [T.ROAD,T.PLINE,T.WATER,T.PARK,T.BRIDGE].includes(tool);
  return true;
}
function placeCost(r, c, tool) {
  const base=BUILD_COST[tool]||0;
  const highland=state.map[r][c].terrain===TR.HIGHLAND;
  const forest=state.map[r][c].terrain===TR.FOREST;
  return Math.ceil(base*(highland?1.5:1))+(forest?100:0);
}
function placeTile(r, c, tool) {
  if (state.gameOver) return;
  if (!canBuild(r,c,tool)) { setInfo('ここには建設できません / Cannot build here'); return; }
  const cost=placeCost(r,c,tool);
  if (state.money<cost) { setInfo('資金不足 / Insufficient funds ($'+cost+')'); return; }
  state.money-=cost;
  if (state.map[r][c].terrain===TR.FOREST) state.map[r][c].terrain=TR.GRASS;
  state.map[r][c].type=tool;
  state.map[r][c].xp=0;
  state.map[r][c].fireTimer=0;
  updateUI();
}
function demolish(r, c) {
  if (state.gameOver||r<0||r>=ROWS||c<0||c>=COLS) return;
  const cell=state.map[r][c];
  if (cell.type===T.EMPTY) return;
  if (state.money<10) { setInfo('資金不足'); return; }
  state.money-=10;
  cell.type=T.EMPTY; cell.xp=0; cell.fireTimer=0;
  updateUI();
}

// ============================================================
// ⑦ SIMULATION TICK
// ============================================================
function tick() {
  if (state.paused||state.gameOver) return;
  computeNetwork();

  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) state.map[r][c].pol=0;

  let income=0, maint=0, pop=0, hapBonus=0, crimeRed=0, totPol=0;

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell=state.map[r][c];
      const t=cell.type;
      if (t===T.EMPTY||t===T.ROAD_BROKEN) continue;

      maint += MAINT[t]||0;

      if (t===T.RES1||t===T.RES2||t===T.RES3) {
        if (anyAdj(r,c,T.ROAD,T.BRIDGE) && cell.powered && cell.watered && !cell.fireTimer) {
          pop += POP_GAIN[t]||0;
          cell.xp++;
          if (XP_MAX[t] && cell.xp>=XP_MAX[t] && NEXT_T[t]) { cell.type=NEXT_T[t]; cell.xp=0; }
        }
      }
      if (t===T.COM1||t===T.COM2||t===T.COM3) {
        if (anyAdj(r,c,T.ROAD,T.BRIDGE) && anyAdj(r,c,T.RES1,T.RES2,T.RES3) && cell.powered && !cell.fireTimer) {
          income += COM_INC[t]||0;
          cell.xp++;
          if (XP_MAX[t] && cell.xp>=XP_MAX[t] && NEXT_T[t]) { cell.type=NEXT_T[t]; cell.xp=0; }
        }
      }
      if (t===T.IND1||t===T.IND2||t===T.IND3) {
        if (cell.powered) {
          income += IND_INC[t]||0;
          const pol=IND_POL[t]||0; totPol+=pol;
          for (const [dr,dc] of DIRS4) {
            const nr=r+dr, nc=c+dc;
            if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) state.map[nr][nc].pol+=pol;
          }
          cell.xp++;
          if (XP_MAX[t] && cell.xp>=XP_MAX[t] && NEXT_T[t]) { cell.type=NEXT_T[t]; cell.xp=0; }
        }
      }
      if (t===T.STATION && cell.powered && hasRailStation(r,c)) {
        pop+=10; hapBonus+=5; income+=50;
      }
      if (t===T.AIRPORT && cell.powered) income+=200;
      if (t===T.PARK) { pop+=3; hapBonus+=8; }
      if (t===T.POLICE && cell.powered) crimeRed+=20;
    }
  }

  income += Math.floor(pop*0.5);
  const crimeRate = Math.max(0, Math.floor(pop/50)-crimeRed);
  const victims   = Math.floor(crimeRate*0.08);
  state.pop       = Math.max(0, pop-victims);
  state.crimeRate = crimeRate;
  state.pollution = totPol;
  state.happiness = Math.max(0, Math.min(100,
    100 - crimeRate*0.4 - totPol*0.01 + hapBonus*0.1
  ));
  state.lastIncome = income-maint;
  state.money     += state.lastIncome;
  state.year++;

  processEvents();
  spawnVehicles();

  if (state.money<0 && !state.gameOver) {
    state.gameOver=true;
    showOverlay('GAME OVER','資金が尽きました / Out of funds','#ef5350');
  }
  if (state.pop>=1000 && !state.gameClear) {
    state.gameClear=true;
    showOverlay('CITY COMPLETE!','人口1,000人達成 / 1,000 citizens!','#66bb6a');
  }
  updateUI();
}

// ============================================================
// ⑧ VEHICLES
// ============================================================
function findRailPath() {
  const stations=[];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++)
    if (state.map[r][c].type===T.STATION) stations.push([r,c]);
  if (stations.length<2) return null;
  const [sr,sc]=stations[0], [er,ec]=stations[stations.length-1];
  const visited=new Set(); const q=[[sr,sc,[{r:sr,c:sc}]]]; visited.add(sr+','+sc);
  while (q.length) {
    const [r,c,path]=q.shift();
    for (const [dr,dc] of DIRS4) {
      const nr=r+dr, nc=c+dc;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
      const key=nr+','+nc;
      if (visited.has(key)) continue;
      const t=state.map[nr][nc].type;
      if (t!==T.RAIL&&t!==T.STATION) continue;
      visited.add(key);
      const np=[...path,{r:nr,c:nc}];
      if (nr===er&&nc===ec) return np;
      q.push([nr,nc,np]);
    }
  }
  return null;
}

function spawnVehicles() {
  // Trains
  if (state.vehicles.filter(v=>v.type==='train').length<2) {
    const path=findRailPath();
    if (path&&path.length>=3)
      state.vehicles.push({type:'train',path,idx:0,progress:0,dir:1});
  }
  // Planes
  const hasAP=state.map.some(row=>row.some(c=>c.type===T.AIRPORT&&c.powered));
  if (hasAP && state.vehicles.filter(v=>v.type==='plane').length<2 && Math.random()<0.3) {
    const fromLeft=Math.random()<0.5;
    state.vehicles.push({
      type:'plane',
      x: fromLeft?-50:VCOLS*TS+50,
      y: Math.random()*VROWS*TS*0.8,
      dx: fromLeft?1.8:-1.8,
      dy: fromLeft?-0.25:0.25,
    });
  }
}

function updateVehicles() {
  if (state.paused) return;
  for (let i=state.vehicles.length-1; i>=0; i--) {
    const v=state.vehicles[i];
    if (v.type==='train') {
      v.progress+=0.022;
      if (v.progress>=1) {
        v.progress=0; v.idx+=v.dir;
        if (v.idx>=v.path.length-1) v.dir=-1;
        if (v.idx<=0) v.dir=1;
        const p=v.path[v.idx];
        if (!p) { state.vehicles.splice(i,1); continue; }
        const t=state.map[p.r][p.c].type;
        if (t!==T.RAIL&&t!==T.STATION) { state.vehicles.splice(i,1); continue; }
      }
    } else if (v.type==='plane') {
      v.x+=v.dx; v.y+=v.dy;
      if (v.x<-100||v.x>VCOLS*TS+100) { state.vehicles.splice(i,1); }
    }
  }
}

function drawVehicleOverlay() {
  for (const v of state.vehicles) {
    if (v.type==='train') {
      const p=v.path[v.idx];
      const pn=v.path[v.idx+v.dir]||p;
      const sx=(p.c-viewX+(pn.c-p.c)*v.progress)*TS+TS/2;
      const sy=(p.r-viewY+(pn.r-p.r)*v.progress)*TS+TS/2;
      if (sx<-20||sx>VCOLS*TS+20||sy<-20||sy>VROWS*TS+20) continue;
      const angle=Math.atan2(pn.r-p.r, pn.c-p.c);
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(angle);
      ctx.fillStyle='#4fc3f7'; ctx.fillRect(-13,-4,26,8);
      ctx.fillStyle='#0288d1'; ctx.fillRect(-15,-5,6,10);
      ctx.restore();
    } else if (v.type==='plane') {
      const angle=Math.atan2(v.dy, v.dx);
      ctx.save(); ctx.translate(v.x, v.y); ctx.rotate(angle);
      ctx.fillStyle='#e0e0e0';
      ctx.fillRect(-15,-3,30,6);
      ctx.fillStyle='#bdbdbd'; ctx.fillRect(-5,-10,10,20);
      ctx.restore();
    }
  }
}

// ============================================================
// ⑨ EVENTS
// ============================================================
function processEvents() {
  const comCells=[], resCells=[];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const t=state.map[r][c].type;
    if (t===T.COM1||t===T.COM2||t===T.COM3) comCells.push([r,c]);
    if (t===T.RES1||t===T.RES2||t===T.RES3) resCells.push([r,c]);
  }
  // Fire
  const candidates=[...resCells,...comCells,...comCells];
  if (Math.random()<0.06+comCells.length*0.004 && candidates.length) {
    const [fr,fc]=candidates[Math.floor(Math.random()*candidates.length)];
    state.map[fr][fc].fireTimer=300;
    state.events.push({type:'fire',r:fr,c:fc,timer:300});
    setInfo('🔥 火災発生! / Fire outbreak!');
  }
  // Earthquake (every 10 years)
  if (state.year%10===0 && Math.random()<0.03) {
    for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
      const cell=state.map[r][c];
      if (cell.type===T.ROAD&&Math.random()<0.25) cell.type=T.ROAD_BROKEN;
    }
    state.shakeTimer=60;
    state.pop=Math.max(0, state.pop-Math.floor(state.pop*0.05));
    state.events.push({type:'quake',r:-1,c:-1,timer:120});
    setInfo('🌍 地震発生! / Earthquake!');
  }
  // Meltdown
  const nukes=[];
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++)
    if (state.map[r][c].type===T.NUCLEAR) nukes.push([r,c]);
  if (nukes.length&&Math.random()<0.005) {
    const [nr,nc]=nukes[Math.floor(Math.random()*nukes.length)];
    for (let dr=-5; dr<=5; dr++) for (let dc=-5; dc<=5; dc++) {
      if (dr*dr+dc*dc>25) continue;
      const rr=nr+dr, cc=nc+dc;
      if (rr<0||rr>=ROWS||cc<0||cc>=COLS) continue;
      state.map[rr][cc].type=T.EMPTY;
    }
    state.pop=Math.max(0, state.pop-Math.floor(state.pop*0.4));
    state.events.push({type:'meltdown',r:nr,c:nc,timer:600});
    setInfo('☢ 原子炉メルトダウン! / Nuclear Meltdown!');
  }
}

function updateEvents() {
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const cell=state.map[r][c];
    if (cell.fireTimer>0) {
      cell.fireTimer=Math.max(0, cell.fireTimer-(hasFireSt(r,c)?3:1));
    }
  }
  if (state.shakeTimer>0) state.shakeTimer--;
  for (let i=state.events.length-1; i>=0; i--) {
    state.events[i].timer--;
    if (state.events[i].timer<=0) state.events.splice(i,1);
  }
}

function drawTerrainBg(x, y, terrain) {
  const colors={
    [TR.GRASS]:'#0d1f0d', [TR.HIGHLAND]:'#2a2218',
    [TR.RIVER]:'#0d2035', [TR.SEA]:'#071525', [TR.FOREST]:'#0a1a0a'
  };
  ctx.fillStyle=colors[terrain]||'#0d1f0d';
  ctx.fillRect(x,y,TS,TS);
  if (terrain===TR.RIVER) {
    const ph=(state.frame*0.04)%(Math.PI*2);
    ctx.strokeStyle='rgba(30,120,180,0.35)'; ctx.lineWidth=1;
    for (let i=0;i<3;i++) {
      const wy=y+8+i*9;
      ctx.beginPath();
      for (let px=0;px<=TS;px+=3) {
        const py=wy+Math.sin(ph+px*0.28+i*1.1)*1.5;
        if(px===0) ctx.moveTo(x+px,py); else ctx.lineTo(x+px,py);
      }
      ctx.stroke();
    }
  }
}

function drawRoad(x, y, r, c) {
  ctx.fillStyle='#1e2a36'; ctx.fillRect(x,y,TS,TS);
  const hasU=adjHas(r,c,-1,0,T.ROAD,T.BRIDGE,T.STATION);
  const hasD=adjHas(r,c, 1,0,T.ROAD,T.BRIDGE,T.STATION);
  const hasL=adjHas(r,c,0,-1,T.ROAD,T.BRIDGE,T.STATION);
  const hasR=adjHas(r,c,0, 1,T.ROAD,T.BRIDGE,T.STATION);
  ctx.setLineDash([3,4]); ctx.strokeStyle='#2a3a4a'; ctx.lineWidth=1;

  if (hasU||hasD)                  { ctx.beginPath(); ctx.moveTo(x+TS/2,y); ctx.lineTo(x+TS/2,y+TS); ctx.stroke(); }
  ctx.setLineDash([]);
  // Car animation (deterministic)
  const roadPop = state.pop>0;
  if (roadPop && state.frame%2===0) {
    const t=(state.frame*0.018+r*0.37+c*0.53)%1;
    const isH=(hasL||hasR)&&!((hasU||hasD)&&!hasL&&!hasR);
    const vx=isH?x+t*TS:x+TS/2-2, vy=isH?y+TS/2-2:y+t*TS;
    const colors=['#c0c0c0','#4fc3f7','#e0a0a0','#a0e0a0'];
    ctx.fillStyle=colors[(r*7+c*3+Math.floor(t*4))%colors.length];
    ctx.fillRect(vx, vy, 5, 3);
  }
}

  ctx.fillStyle='#071525'; ctx.fillRect(x,y,TS,TS);
  const hasU=adjHas(r,c,-1,0,T.WATER), hasD=adjHas(r,c,1,0,T.WATER);
  const hasL=adjHas(r,c,0,-1,T.WATER), hasR=adjHas(r,c,0,1,T.WATER);
  const cell=state.map[r][c];
  ctx.strokeStyle=cell.watered?'#4fc3f7':'#0288d1'; ctx.lineWidth=4;
  if(hasL||hasR||(!hasU&&!hasD)){ctx.beginPath();ctx.moveTo(x,y+TS/2);ctx.lineTo(x+TS,y+TS/2);ctx.stroke();}
  if(hasU||hasD){ctx.beginPath();ctx.moveTo(x+TS/2,y);ctx.lineTo(x+TS/2,y+TS);ctx.stroke();}
}
function drawPark(x, y) {
  ctx.fillStyle='#0a1a0a'; ctx.fillRect(x,y,TS,TS);
  ctx.fillStyle='#1b5e20'; ctx.fillRect(x+3,y+3,TS-6,TS-6);
  const pts=[[x+8,y+8],[x+22,y+8],[x+8,y+22],[x+22,y+22]];
  for (const [tx,ty] of pts) {
    ctx.fillStyle='#3d2b1f'; ctx.fillRect(tx-1,ty+3,2,5);
    ctx.fillStyle='#2e7d32'; ctx.beginPath(); ctx.arc(tx,ty,5,0,Math.PI*2); ctx.fill();
  }
}
function drawPolice(x, y) {
  ctx.fillStyle='#0d1a2a'; ctx.fillRect(x,y,TS,TS);
  ctx.fillStyle='#1565c0'; ctx.fillRect(x+4,y+8,TS-8,TS-10);
  ctx.fillStyle='#1e3a6e'; ctx.fillRect(x+2,y+5,TS-4,6);
  ctx.fillStyle='#bbdefb'; ctx.fillRect(x+7,y+13,5,5); ctx.fillRect(x+20,y+13,5,5);
  ctx.fillStyle='#42a5f5'; ctx.font='bold 8px Courier New'; ctx.textAlign='center'; ctx.fillText('🚔',x+TS/2,y+TS-3);
}
function drawFireStation(x, y) {
  ctx.fillStyle='#1a0a08'; ctx.fillRect(x,y,TS,TS);
  ctx.fillStyle='#c62828'; ctx.fillRect(x+4,y+8,TS-8,TS-10);
  ctx.fillStyle='#7f0000'; ctx.fillRect(x+2,y+5,TS-4,6);
  ctx.fillStyle='#ffccbc'; ctx.fillRect(x+7,y+18,6,8); ctx.fillRect(x+19,y+18,6,8);
  ctx.fillStyle='#ef5350'; ctx.font='bold 8px Courier New'; ctx.textAlign='center'; ctx.fillText('🚒',x+TS/2,y+TS-3);
}
function drawBuilding(x, y, kind, level, cell) {
  let base, hi, roof;
  if (kind==='res') { base=['#0d2a3a','#1a4a6a','#2a6a9a'][level]||'#0d2a3a'; hi='#4fc3f7'; roof='#1e88c9'; }
  else if (kind==='com') { base=['#1a0a2a','#3a1a5a','#5a2a8a'][level]||'#1a0a2a'; hi='#ab47bc'; roof='#7b1fa2'; }
  else { base=['#1a0d00','#3a1e00','#5a3000'][level]||'#1a0d00'; hi='#ff8f00'; roof='#e65100'; }
  if (!cell.powered) { base='#0e1218'; hi='#2a3040'; roof='#1a2030'; }
  const bh=10+level*7, bw=TS-6, bx=x+3, by=y+TS-bh-3;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx+3,by+3,bw,bh);
  ctx.fillStyle=base; ctx.fillRect(bx,by,bw,bh);
  if (cell.powered) {
    ctx.fillStyle=hi+'88';
    for (let wr=0; wr<1+level; wr++)
      for (let wc=0; wc<3; wc++)
        ctx.fillRect(bx+3+wc*6, by+4+wr*5, 4, 3);
  }
  ctx.fillStyle=roof; ctx.fillRect(bx,by,bw,3);
  if (!cell.powered) {
    ctx.fillStyle='#ffca28'; ctx.font='bold 8px Courier New'; ctx.textAlign='right';
    ctx.fillText('⚡?',x+TS-2,y+10);
  }
  if (cell.fireTimer>0) {
    const alpha=Math.min(1, cell.fireTimer/20);
    ctx.fillStyle=`rgba(255,80,20,${alpha*0.7})`;
    ctx.beginPath(); ctx.arc(x+TS/2,by,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,200,0,${alpha*0.5})`;
    ctx.beginPath(); ctx.arc(x+TS/2,by-2,3,0,Math.PI*2); ctx.fill();
  }
}
function drawTile(r, c, sx, sy) {
  const cell=state.map[r][c];
  const {type:t, terrain} = cell;
  drawTerrainBg(sx, sy, terrain);
  ctx.textAlign='center';
  switch(t) {
    case T.EMPTY:
      if (terrain===TR.FOREST)   drawForest(sx,sy);
      else if (terrain===TR.SEA) drawSea(sx,sy);
      else if (terrain===TR.HIGHLAND) drawHighland(sx,sy);
      break;
    case T.ROAD:         drawRoad(sx,sy,r,c); break;
    case T.ROAD_BROKEN:  drawRoadBroken(sx,sy,r,c); break;
    case T.RAIL:         drawRail(sx,sy,r,c); break;
    case T.STATION:      drawStation(sx,sy); break;
    case T.AIRPORT:      drawAirport(sx,sy); break;
    case T.BRIDGE:       drawBridge(sx,sy,r,c); break;
    case T.POWER:        drawPowerPlant(sx,sy,false); break;
    case T.NUCLEAR:      drawPowerPlant(sx,sy,true); break;
    case T.PLINE:        drawPowerLine(sx,sy,r,c); break;
    case T.WATER:        drawWaterPipe(sx,sy,r,c); break;
    case T.PARK:         drawPark(sx,sy); break;
    case T.POLICE:       drawPolice(sx,sy); break;
    case T.FIRE_ST:      drawFireStation(sx,sy); break;
    case T.RES1:case T.RES2:case T.RES3: drawBuilding(sx,sy,'res',t-T.RES1,cell); break;
    case T.COM1:case T.COM2:case T.COM3: drawBuilding(sx,sy,'com',t-T.COM1,cell); break;
    case T.IND1:case T.IND2:case T.IND3: drawBuilding(sx,sy,'ind',t-T.IND1,cell); break;
  }
}

function makeParticle() {
  const c=viewX+Math.floor(Math.random()*VCOLS);
  const r=viewY+Math.floor(Math.random()*VROWS);
  if (r<0||r>=ROWS||c<0||c>=COLS) return null;
  const cell=state.map[r][c];
  if (cell.type!==T.ROAD&&cell.type!==T.BRIDGE) return null;
  return {
    x:(c-viewX)*TS+Math.random()*TS, y:(r-viewY)*TS+Math.random()*TS,
    vx:(Math.random()-0.5)*0.5, vy:-Math.random()*0.6-0.2,
    life:50+Math.random()*40, maxLife:70,
    size:1+Math.random()*1.2,
    color:Math.random()>0.5?'#4fc3f7':'#ab47bc',
  };
}
function updateParticles() {
  if (Math.random()<0.15) { const p=makeParticle(); if(p) state.particles.push(p); }
  for (let i=state.particles.length-1; i>=0; i--) {
    const p=state.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if (p.life<=0) state.particles.splice(i,1);
  }
  if (state.particles.length>100) state.particles.splice(0, state.particles.length-100);
}
function drawParticles() {
  for (const p of state.particles) {
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.maxLife)*0.65;
    ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
function drawHover() {
  const {hoverR:r, hoverC:c}=state;
  if (r<viewY||r>=viewY+VROWS||c<viewX||c>=viewX+VCOLS) return;
  const sx=(c-viewX)*TS, sy=(r-viewY)*TS;
  ctx.save();
  ctx.strokeStyle=state.isDemolish?'#ef5350':'#4fc3f7';
  ctx.lineWidth=2; ctx.setLineDash([3,2]);
  ctx.strokeRect(sx+1,sy+1,TS-2,TS-2);
  ctx.setLineDash([]); ctx.restore();
  // Info popup
  if (r>=0&&c>=0) drawInfoPopup(sx,sy,r,c);
}
function drawInfoPopup(sx, sy, r, c) {
  const cell=state.map[r][c];
  if (cell.type===T.EMPTY&&cell.terrain===TR.GRASS) return;
  const lines=[
    '地形: '+TERRAIN_NAMES[cell.terrain],
    '種別: '+(TILE_NAMES[cell.type]||'Empty'),
  ];
  if (cell.type!==T.EMPTY) {
    lines.push('電力: '+(cell.powered?'✓ OK':'✗ 未接続'));
    lines.push('水道: '+(cell.watered?'✓ OK':'✗ 未接続'));
    if (cell.fireTimer>0) lines.push('🔥 火災中 timer:'+cell.fireTimer);
  }
  const pw=160, ph=lines.length*14+10;
  let px=sx+TS+2, py=sy;
  if (px+pw>canvas.width) px=sx-pw-2;
  if (py+ph>canvas.height) py=canvas.height-ph-2;
  if (py<0) py=0;
  ctx.save();
  ctx.globalAlpha=0.92;
  ctx.fillStyle='rgba(10,15,20,0.88)';
  ctx.beginPath();
  roundRect(ctx,px,py,pw,ph,4);
  ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=1;
  ctx.beginPath(); roundRect(ctx,px,py,pw,ph,4); ctx.stroke();
  ctx.fillStyle='#c9d1d9'; ctx.font='10px Courier New'; ctx.textAlign='left';
  lines.forEach((l,i)=>ctx.fillText(l,px+6,py+14+i*14));
  ctx.restore();
}
function drawMinimap() {
  const mw=120, mh=80;
  const mx=canvas.width-mw-4, my=canvas.height-mh-4;
  const tw=mw/COLS, th=mh/ROWS;
  ctx.save();
  ctx.fillStyle='rgba(10,15,20,0.85)';
  ctx.strokeStyle='#4fc3f755'; ctx.lineWidth=1;
  ctx.fillRect(mx-1,my-1,mw+2,mh+2);
  ctx.strokeRect(mx-1,my-1,mw+2,mh+2);
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const cell=state.map[r][c];
    ctx.fillStyle=(cell.type!==T.EMPTY&&MM_BLDG[cell.type])||MM_TERRAIN[cell.terrain]||'#1a2a1a';
    ctx.fillRect(mx+c*tw, my+r*th, Math.max(1,tw), Math.max(1,th));
  }
  ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=1.5;
  ctx.strokeRect(mx+viewX*tw, my+viewY*th, VCOLS*tw, VROWS*th);
  ctx.restore();
}
function drawEffects() {
  for (let r=viewY; r<viewY+VROWS; r++) {
    for (let c=viewX; c<viewX+VCOLS; c++) {
      if (r<0||r>=ROWS||c<0||c>=COLS) continue;
      const cell=state.map[r][c];
      if (!cell.fireTimer) continue;
      const sx=(c-viewX)*TS, sy=(r-viewY)*TS;
      const t2=state.frame*0.12;
      ctx.save(); ctx.globalAlpha=0.4+Math.sin(t2)*0.25;
      ctx.fillStyle='#ff5722';
      for (let fi=0;fi<3;fi++) {
        ctx.beginPath();
        ctx.arc(sx+6+fi*8+Math.sin(t2+fi)*2, sy+4+Math.cos(t2*1.3+fi)*2, 3+fi,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }
}
function draw() {
  ctx.save();
  if (state.shakeTimer>0) ctx.translate((Math.random()-0.5)*4,(Math.random()-0.5)*4);
  ctx.fillStyle='#0a0f14'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (let r=viewY; r<viewY+VROWS; r++) {
    for (let c=viewX; c<viewX+VCOLS; c++) {
      if (r<0||r>=ROWS||c<0||c>=COLS) continue;
      drawTile(r,c,(c-viewX)*TS,(r-viewY)*TS);
    }
  }
  // Grid lines
  ctx.strokeStyle='#1a2332'; ctx.lineWidth=0.5;
  for (let i=0;i<=VCOLS;i++){ctx.beginPath();ctx.moveTo(i*TS,0);ctx.lineTo(i*TS,VROWS*TS);ctx.stroke();}
  for (let i=0;i<=VROWS;i++){ctx.beginPath();ctx.moveTo(0,i*TS);ctx.lineTo(VCOLS*TS,i*TS);ctx.stroke();}
  drawVehicleOverlay();
  drawParticles();
  drawEffects();
  drawHover();
  drawMinimap();
  ctx.restore();
}

// ============================================================
// ⑪ INPUT
// ============================================================
function screenToTile(sx, sy) {
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  return {
    r: Math.floor((sy-rect.top)*scaleY/TS)+viewY,
    c: Math.floor((sx-rect.left)*scaleX/TS)+viewX,
  };
}
function scrollView(dx, dy) {
  viewX=Math.max(0,Math.min(COLS-VCOLS,viewX+dx));
  viewY=Math.max(0,Math.min(ROWS-VROWS,viewY+dy));
}

let mdown=false;
canvas.addEventListener('mousedown', e=>{
  if (e.button===0) {
    mdown=true;
    const {r,c}=screenToTile(e.clientX,e.clientY);
    if (state.isDemolish) demolish(r,c); else placeTile(r,c,state.selectedTool);
  }
  e.preventDefault();
});
canvas.addEventListener('mousemove', e=>{
  const {r,c}=screenToTile(e.clientX,e.clientY);
  state.hoverR=r; state.hoverC=c;
  if (mdown) { if (state.isDemolish) demolish(r,c); else placeTile(r,c,state.selectedTool); }
});
canvas.addEventListener('mouseup', e=>{ if(e.button===0) mdown=false; });
canvas.addEventListener('mouseleave', ()=>{ mdown=false; state.hoverR=-1; state.hoverC=-1; });
canvas.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const {r,c}=screenToTile(e.clientX,e.clientY);
  demolish(r,c);
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  scrollView(0, e.deltaY>0?1:-1);
},{passive:false});
window.addEventListener('keydown', e=>{
  switch(e.key){
    case 'ArrowLeft':  scrollView(-1,0); e.preventDefault(); break;
    case 'ArrowRight': scrollView( 1,0); e.preventDefault(); break;
    case 'ArrowUp':    scrollView(0,-1); e.preventDefault(); break;
    case 'ArrowDown':  scrollView(0, 1); e.preventDefault(); break;
  }
});
document.getElementById('sc-left').addEventListener('click',()=>scrollView(-3,0));
document.getElementById('sc-right').addEventListener('click',()=>scrollView(3,0));
document.getElementById('sc-up').addEventListener('click',()=>scrollView(0,-3));
document.getElementById('sc-down').addEventListener('click',()=>scrollView(0,3));

// ============================================================
// ⑫ UI
// ============================================================
function roundRect(ctx2, x, y, w, h, r2) {
  if (ctx2.roundRect) { ctx2.roundRect(x,y,w,h,r2); return; }
  ctx2.beginPath();
  ctx2.moveTo(x+r2,y); ctx2.lineTo(x+w-r2,y);
  ctx2.arcTo(x+w,y,x+w,y+r2,r2); ctx2.lineTo(x+w,y+h-r2);
  ctx2.arcTo(x+w,y+h,x+w-r2,y+h,r2); ctx2.lineTo(x+r2,y+h);
  ctx2.arcTo(x,y+h,x,y+h-r2,r2); ctx2.lineTo(x,y+r2);
  ctx2.arcTo(x,y,x+r2,y,r2); ctx2.closePath();
}
function setInfo(msg) {
  const el=document.getElementById('info-line');
  if (!el) return;
  el.textContent=msg;
  setTimeout(()=>{ if(el.textContent===msg) el.textContent='↑↓←→ キー / ボタンでスクロール | クリックして建設'; },3500);
}
function showOverlay(title, sub, color) {
  const ol=document.getElementById('overlay');
  ol.style.color=color;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-sub').textContent=sub;
  ol.classList.add('show');
}
function updateUI() {
  document.getElementById('sv-money').textContent='$'+state.money.toLocaleString();
  document.getElementById('sv-pop').textContent=state.pop.toLocaleString();
  document.getElementById('sv-happy').textContent=Math.round(state.happiness)+'%';
  document.getElementById('sv-crime').textContent=Math.round(state.crimeRate)+'%';
  const inc=state.lastIncome;
  document.getElementById('sv-income').textContent=(inc>=0?'+':'')+inc;
  document.getElementById('sv-year').textContent=state.year;
}
let tickInterval;
function setSpeed(spd) {
  clearInterval(tickInterval);
  state.speed=spd;
  tickInterval=setInterval(tick, Math.round(3000/spd));
}
function initToolbar() {
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tool-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const id='tab-'+btn.dataset.tab;
      const panel=document.getElementById(id);
      if (panel) panel.classList.add('active');
    });
  });
  // Tool selection
  document.querySelectorAll('.tool-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      if (btn.dataset.tool==='demolish') {
        state.isDemolish=true; state.selectedTool=T.EMPTY;
      } else {
        state.isDemolish=false; state.selectedTool=parseInt(btn.dataset.tool);
      }
    });
  });
  // Speed
  document.querySelectorAll('.c-btn[data-speed]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.c-btn[data-speed]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      setSpeed(parseInt(btn.dataset.speed));
    });
  });
  // Pause
  document.getElementById('btn-pause').addEventListener('click',()=>{
    state.paused=!state.paused;
    document.getElementById('btn-pause').textContent=state.paused?'▶ 再開':'⏸ 停止';
  });
  // Restart
  document.getElementById('ov-btn').addEventListener('click',()=>{ init(); setSpeed(state.speed); });
}

// ============================================================
// ⑬ GAME LOOP
// ============================================================
function gameLoop() {
  state.frame++;
  updateVehicles();
  updateEvents();
  updateParticles();
  draw();
  requestAnimationFrame(gameLoop);
}

init();
initToolbar();
setSpeed(1);
requestAnimationFrame(gameLoop);
</script>
