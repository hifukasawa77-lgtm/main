<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI将棋 | hide's works</title>
  <meta name="description" content="AI藤井颯太・AI羽生善治と対局できるブラウザ将棋。インストール不要、すぐ遊べます。">
  <link rel="canonical" href="https://hifukasawa77-lgtm.github.io/hide_0001_hon/shogi.html">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hifukasawa77-lgtm.github.io/hide_0001_hon/shogi.html">
  <meta property="og:title" content="将棋パズル | hide's works">
  <meta property="og:description" content="日本の伝統ゲーム・将棋をブラウザで遊べる形に再構成。ブラウザですぐ遊べます。">
  <meta property="og:image" content="https://hifukasawa77-lgtm.github.io/hide_0001_hon/assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="将棋パズル | hide's works">
  <meta name="twitter:description" content="日本の伝統ゲーム・将棋をブラウザで遊べる形に再構成。ブラウザですぐ遊べます。">
  <meta name="twitter:image" content="https://hifukasawa77-lgtm.github.io/hide_0001_hon/assets/og-image.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:linear-gradient(135deg,#1a0a00 0%,#3c1a08 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      font-family:'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif;
      color:#f0e0c8;padding:20px 10px;
    }
    h1{font-size:2.2rem;color:#d4a040;text-shadow:0 2px 8px rgba(0,0,0,0.7);margin-bottom:14px;letter-spacing:0.2em;}
    #controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    button{
      background:linear-gradient(180deg,#7a3010,#5a2008);color:#f0e0c8;
      border:2px solid #c09040;padding:8px 18px;border-radius:6px;
      cursor:pointer;font-size:0.9rem;font-family:inherit;
      transition:all 0.15s;box-shadow:0 2px 6px rgba(0,0,0,0.4);
    }
    button:hover{background:linear-gradient(180deg,#9a4020,#7a3010);}
    button.active{background:linear-gradient(180deg,#d4a040,#b08020);color:#1a0a00;}
    #ai-select{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
    #ai-select span{font-size:0.82rem;color:#a08060;}
    .ai-btn{padding:7px 14px;font-size:0.82rem;}
    .ai-btn.fuji.active{background:linear-gradient(180deg,#1a5fa0,#0d3d70);border-color:#5ab0ff;color:#e0f0ff;}
    .ai-btn.habu.active{background:linear-gradient(180deg,#6a1a8a,#420d60);border-color:#cc80ff;color:#f0e0ff;}
    #ai-profile{
      background:rgba(0,0,0,0.35);border:1px solid #8b6030;border-radius:8px;
      padding:10px 16px;margin-bottom:10px;max-width:580px;width:100%;
      display:none;text-align:center;
    }
    #ai-profile .ai-name{font-size:1.1rem;font-weight:bold;margin-bottom:4px;}
    #ai-profile .ai-desc{font-size:0.78rem;color:#c0a080;line-height:1.6;}
    #ai-comment{
      min-height:28px;font-size:0.85rem;color:#ffd080;font-style:italic;
      text-align:center;margin-bottom:4px;transition:opacity 0.3s;
    }
    #turn-display{
      font-size:1.05rem;background:rgba(0,0,0,0.4);
      padding:7px 16px;border-radius:6px;border:1px solid #8b6030;
      min-width:110px;text-align:center;
    }
    #game-area{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
    .captured-area{
      width:95px;background:rgba(0,0,0,0.25);
      border:2px solid #7a5030;border-radius:8px;
      padding:8px 6px;
    }
    .area-label{text-align:center;font-size:0.75rem;color:#a08060;margin-bottom:6px;border-bottom:1px solid #7a5030;padding-bottom:4px;}
    .cap-pieces{display:flex;flex-wrap:wrap;gap:4px;}
    .cap-piece{
      width:36px;height:36px;background:linear-gradient(180deg,#f0d890,#d4b060);
      border:1px solid #8b6030;border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;font-weight:bold;color:#1a0a00;
      cursor:pointer;position:relative;transition:transform 0.1s;
      user-select:none;box-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    .cap-piece:hover{transform:scale(1.12);}
    .cap-piece.p2-piece{transform:rotate(180deg);}
    .cap-piece.p2-piece:hover{transform:rotate(180deg) scale(1.12);}
    .cap-piece.sel-drop{outline:3px solid #4090ff;background:linear-gradient(180deg,#a0d8ff,#70a8e0);}
    .cap-badge{
      position:absolute;bottom:1px;right:2px;font-size:0.58rem;
      background:#5a2008;color:#ffd080;width:13px;height:13px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
    }
    #board-wrap{position:relative;}
    #board{
      display:grid;grid-template-columns:repeat(9,60px);
      grid-template-rows:repeat(9,60px);
      border:3px solid #7a5020;
      box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 0 0 1px #c09040;
      background:#8b6030;gap:1px;padding:1px;
    }
    .cell{
      background:linear-gradient(160deg,#d8a858,#c89040);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:background 0.1s;position:relative;
    }
    .cell:hover{background:linear-gradient(160deg,#e8b868,#d8a050);}
    .cell.sel{background:#70b0ff;}
    .cell.vmove{background:#78d878;}
    .cell.vcap{background:#f08070;}
    .cell.chk{
      background:#ff7060;
      animation: chkPulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes chkPulse {
      from { background: #ff7060; box-shadow: inset 0 0 0 rgba(255,80,60,0); }
      to   { background: #ff4040; box-shadow: inset 0 0 12px rgba(255,80,60,0.7); }
    }
    .piece{
      width:54px;height:54px;
      background:linear-gradient(160deg,#f8f0d0,#e8d880);
      border:1.5px solid #a08040;border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:bold;color:#1a0800;
      box-shadow:0 2px 5px rgba(0,0,0,0.35);
      user-select:none;position:relative;
    }
    .piece.p2{transform:rotate(180deg);background:linear-gradient(160deg,#e8e0c0,#d8c870);}
    .piece.prom{color:#cc2200;}
    .dot{width:14px;height:14px;background:rgba(40,180,40,0.7);border-radius:50%;}
    #message{
      margin-top:14px;font-size:1.3rem;font-weight:bold;
      color:#ffd060;text-shadow:0 2px 6px rgba(0,0,0,0.6);min-height:34px;text-align:center;
    }
    #promo-dlg{
      display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:linear-gradient(160deg,#3c2010,#2c1008);
      border:3px solid #d4a040;border-radius:14px;
      padding:28px 36px;z-index:200;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.8);
    }
    #promo-dlg h3{margin-bottom:18px;color:#d4a040;font-size:1.2rem;}
    #promo-dlg .btn-row{display:flex;gap:14px;justify-content:center;}
    .col-nums,.row-nums{
      position:absolute;font-size:0.65rem;color:#a08050;
      display:flex;pointer-events:none;
    }
    .col-nums{top:-17px;left:1px;width:calc(100% - 2px);}
    .col-nums span{width:61px;text-align:center;}
    .row-nums{right:-20px;top:1px;height:calc(100% - 2px);flex-direction:column;}
    .row-nums span{height:61px;display:flex;align-items:center;font-family:'Hiragino Mincho ProN',serif;}
    /* ─── コマ移動アニメーション ─────────────── */
    .piece-enter {
      animation: pieceEnter 0.18s ease-out forwards;
    }
    @keyframes pieceEnter {
      from { transform: scale(0.7); opacity: 0.3; }
      to   { transform: scale(1);   opacity: 1;   }
    }
    /* p2コマのpieceEnterは rotate(180deg) を維持 */
    .piece.p2.piece-enter {
      animation: pieceEnterP2 0.18s ease-out forwards;
    }
    @keyframes pieceEnterP2 {
      from { transform: rotate(180deg) scale(0.7); opacity: 0.3; }
      to   { transform: rotate(180deg) scale(1);   opacity: 1;   }
    }

    /* ─── 持ち駒獲得アニメーション ───────────── */
    .cap-enter {
      animation: capEnter 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes capEnter {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .cap-piece.p2-piece.cap-enter {
      animation: capEnterP2 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes capEnterP2 {
      from { transform: rotate(180deg) scale(0); opacity: 0; }
      to   { transform: rotate(180deg) scale(1); opacity: 1; }
    }

    @media(max-width:680px){
      #board{grid-template-columns:repeat(9,40px);grid-template-rows:repeat(9,40px);}
      .piece{width:36px;height:36px;font-size:0.75rem;}
      .cap-piece{width:30px;height:30px;font-size:0.8rem;}
      .captured-area{width:72px;}
      .col-nums span{width:41px;}
      .row-nums span{height:41px;}
    }

    /* ─── 武将駒モード ─────────────────────── */
    .piece.warlord{font-size:0.62rem;line-height:1.15;text-align:center;letter-spacing:0;}
    .cap-piece.warlord{font-size:0.62rem;line-height:1;}
    @media(max-width:680px){
      .piece.warlord{font-size:0.42rem;}
      .cap-piece.warlord{font-size:0.5rem;}
    }

    /* ─── 棋譜パネル ───────────────────────── */
    #kifu-panel{
      margin-top:16px;width:100%;max-width:620px;
      background:rgba(0,0,0,0.3);border:1px solid #7a5030;
      border-radius:8px;padding:10px 14px;
    }
    .kifu-title{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:8px;color:#d4a040;font-size:0.88rem;font-weight:bold;
      border-bottom:1px solid #7a5030;padding-bottom:6px;
    }
    .kifu-title-actions{display:flex;gap:6px;}
    #kifu-list{
      max-height:150px;overflow-y:auto;
      display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;
    }
    .kifu-entry{
      font-size:0.74rem;padding:2px 5px;border-radius:3px;
      background:rgba(255,255,255,0.04);white-space:nowrap;
      font-family:'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif;
    }
    .kifu-entry.k1{color:#f0d090;}
    .kifu-entry.k2{color:#90c8f0;}
    .kifu-entry.klast{outline:1px solid rgba(212,160,64,0.5);}
    #kifu-empty{font-size:0.78rem;color:#7a5030;padding:4px;}
    /* ===== バリアント選択 ===== */
    #variant-select{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
    #variant-select span{font-size:0.82rem;color:#a08060;}
    .var-btn{padding:7px 16px;font-size:0.85rem;}
    .var-btn.active{background:linear-gradient(180deg,#d4a040,#b08020);color:#1a0a00;}
    /* ===== はさみ将棋 駒数バー ===== */
    #hasami-info{display:none;gap:24px;justify-content:center;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
    .hasami-count{background:rgba(0,0,0,0.35);border:1px solid #8b6030;border-radius:8px;padding:8px 20px;text-align:center;}
    .hasami-count .hc-label{font-size:0.75rem;color:#a08060;margin-bottom:2px;}
    .hasami-count .hc-val{font-size:1.4rem;font-weight:bold;color:#f0d090;}
    /* ===== 将棋崩し エリア ===== */
    #kuzushi-area{display:none;flex-direction:column;align-items:center;gap:16px;margin-top:8px;}
    #kuzushi-info{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;}
    .kz-score{background:rgba(0,0,0,0.35);border:1px solid #8b6030;border-radius:8px;padding:8px 20px;text-align:center;}
    .kz-score .kzs-label{font-size:0.75rem;color:#a08060;margin-bottom:2px;}
    .kz-score .kzs-val{font-size:1.4rem;font-weight:bold;color:#f0d090;}
    .kz-score.kz-active{border-color:#d4a040;}
    #kz-turn{font-size:0.9rem;color:#a08060;margin-top:-8px;}
    #kuzushi-grid{
      display:grid;grid-template-columns:repeat(8,56px);grid-template-rows:repeat(5,56px);
      gap:3px;background:#8b6030;border:3px solid #7a5020;padding:3px;
      box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }
    .kz-cell{
      width:54px;height:54px;background:linear-gradient(160deg,#f8f0d0,#e8d880);
      border:1.5px solid #a08040;border-radius:4px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;position:relative;font-size:1rem;font-weight:bold;color:#1a0800;
      transition:transform 0.1s,opacity 0.3s;user-select:none;
    }
    .kz-cell:hover:not(.empty){transform:scale(1.08);background:linear-gradient(160deg,#fffce0,#f8e890);}
    .kz-cell.empty{background:transparent;border-color:transparent;cursor:default;}
    .kz-cell.stab-1{background:linear-gradient(160deg,#fff0c0,#ffd880);}
    .kz-cell.stab-0{background:linear-gradient(160deg,#ffe0d0,#ffb090);}
    .kz-stab{position:absolute;top:1px;right:3px;font-size:0.58rem;color:#8b4020;font-weight:bold;}
    .kz-cell.falling{animation:kzFall 0.35s ease-in forwards;}
    @keyframes kzFall{0%{transform:scale(1);opacity:1;}60%{transform:scale(1.1) rotate(8deg);opacity:0.7;}100%{transform:scale(0);opacity:0;}}
    .kz-cell.picked{animation:kzPick 0.2s ease-out forwards;}
    @keyframes kzPick{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.35);opacity:0;}}
    #kuzushi-note{font-size:0.75rem;color:#806040;}
    @media(max-width:540px){
      #kuzushi-grid{grid-template-columns:repeat(8,38px);grid-template-rows:repeat(5,38px);}
      .kz-cell{width:36px;height:36px;font-size:0.72rem;}
    }
  </style>
</head>
<body>
<h1>AI 将 棋</h1>
<div id="variant-select">
  <span>ゲーム：</span>
  <button class="var-btn active" id="btn-var-shogi"  onclick="setVariant('shogi')">♟ 将棋</button>
  <button class="var-btn"        id="btn-var-hasami" onclick="setVariant('hasami')">⚔ はさみ将棋</button>
  <button class="var-btn"        id="btn-var-kuzushi" onclick="setVariant('kuzushi')">🎲 将棋崩し</button>
</div>
<div id="ai-select">
  <span>対局相手：</span>
  <button class="ai-btn active" id="btn-human" onclick="setAI('none')">👤 対人</button>
  <button class="ai-btn fuji" id="btn-fuji" onclick="setAI('fuji')">⚡ AI藤井颯太</button>
  <button class="ai-btn habu" id="btn-habu" onclick="setAI('habu')">🔮 AI羽生善治</button>
</div>
<div id="ai-profile">
  <div class="ai-name" id="ai-profile-name"></div>
  <div class="ai-desc" id="ai-profile-desc"></div>
</div>
<div id="ai-comment"></div>
<div id="controls">
  <div id="turn-display">先手の番</div>
  <button onclick="newGame()">新規対局</button>
  <button id="btn-undo" onclick="undoMove()">待った</button>
  <button id="btn-warlords" onclick="toggleWarlords()" title="天童武将駒モード">⚔️ 武将駒</button>
</div>
<div id="hasami-info">
  <div class="hasami-count"><div class="hc-label">後手の残り駒</div><div class="hc-val" id="hc-v2">9</div></div>
  <div class="hasami-count"><div class="hc-label">先手の残り駒</div><div class="hc-val" id="hc-v1">9</div></div>
</div>
<div id="game-area">
  <div id="cap2" class="captured-area">
    <div class="area-label">後手の持ち駒</div>
    <div class="cap-pieces" id="cap2-pieces"></div>
  </div>
  <div id="board-wrap">
    <div class="col-nums" id="col-nums"></div>
    <div id="board"></div>
    <div class="row-nums" id="row-nums"></div>
  </div>
  <div id="cap1" class="captured-area">
    <div class="area-label">先手の持ち駒</div>
    <div class="cap-pieces" id="cap1-pieces"></div>
  </div>
</div>
<div id="kuzushi-area">
  <div id="kuzushi-info">
    <div class="kz-score" id="kz-s1"><div class="kzs-label">先手の駒数</div><div class="kzs-val" id="kz-v1">0</div></div>
    <div class="kz-score" id="kz-s2"><div class="kzs-label">後手の駒数</div><div class="kzs-val" id="kz-v2">0</div></div>
  </div>
  <div id="kz-turn">先手の番</div>
  <div id="kuzushi-grid"></div>
  <div id="kuzushi-note">（駒の少ない方が勝ち）</div>
</div>
<div id="message"></div>
<div id="kifu-panel">
  <div class="kifu-title">
    <span>棋譜記録</span>
    <div class="kifu-title-actions">
      <button onclick="copyKifu()" id="copy-kifu-btn" style="padding:4px 10px;font-size:0.78rem;">コピー</button>
    </div>
  </div>
  <div id="kifu-list"><span id="kifu-empty">まだ指し手がありません</span></div>
</div>
<div id="promo-dlg">
  <h3>成りますか？</h3>
  <div class="btn-row">
    <button onclick="confirmProm(true)">成る</button>
    <button onclick="confirmProm(false)">成らない</button>
  </div>
</div>

<script>
// ===== 定数 =====
const NAMES = {
  FU:'歩',KYO:'香',KEI:'桂',GIN:'銀',KIN:'金',KAKU:'角',HI:'飛',OU:'王',
  TO:'と',NKYO:'杏',NKEI:'圭',NGIN:'全',RYUMA:'馬',RYUO:'竜'
};

// ===== 武将駒マッピング（天童将棋風） =====
const WARLORD_NAMES = {
  FU:'足軽', KYO:'清正', KEI:'義弘', GIN:'政宗', KIN:'幸村',
  KAKU:'謙信', HI:'信玄',
  TO:'足侍', NKYO:'清将', NKEI:'義将', NGIN:'政将',
  RYUMA:'鬼謙', RYUO:'龍玄'
};
const WARLORD_OU = {1:'信長', 2:'家康'};
const PROM_SET = new Set(['TO','NKYO','NKEI','NGIN','RYUMA','RYUO']);
const CAN_PROM = {FU:1,KYO:1,KEI:1,GIN:1,KAKU:1,HI:1};
const TO_PROM = {FU:'TO',KYO:'NKYO',KEI:'NKEI',GIN:'NGIN',KAKU:'RYUMA',HI:'RYUO'};
const DEMOTE = {TO:'FU',NKYO:'KYO',NKEI:'KEI',NGIN:'GIN',RYUMA:'KAKU',RYUO:'HI'};
const PVALS = {FU:1,KYO:3,KEI:3,GIN:4,KIN:5,KAKU:8,HI:9,OU:100,TO:6,NKYO:5,NKEI:5,NGIN:5,RYUMA:10,RYUO:12};
const COL_LABELS = ['９','８','７','６','５','４','３','２','１'];
const ROW_LABELS = ['一','二','三','四','五','六','七','八','九'];

// ===== AI プロファイル =====
const AI_PROFILES = {
  fuji: {
    name: '⚡ AI 藤井颯太',
    desc: '攻め将棋の申し子。コンピュータ的精度で読み切る超攻撃型。竜・馬の生成を好み、王を直接狙う。序盤から一気に仕掛けるスタイル。',
    comments_think: ['…読んでいます','深く読んでいます…','最善手を探索中…','詰みを探しています…'],
    comments_move: ['攻めます！','この手が最善です','竜を作ります！','王手！','一気に仕掛けます','この局面は有利です','詰みが見えました'],
    comments_cap: ['いただきます！','駒得しました','着実に優勢に'],
  },
  habu: {
    name: '🔮 AI 羽生善治',
    desc: '柔軟無双の全冠王者。「羽生マジック」と呼ばれる意表を突く一手が特徴。攻守のバランスを大切にし、相手の手を封じる指し回しが光る。',
    comments_think: ['…考えています','局面を見極めています','ふむ…','どこかに一手があるはず'],
    comments_move: ['この手はどうでしょう','バランスを重視します','ここが急所です','受けながら攻めます','ふふ、この手です','こういう将棋が好きです','少し手を変えましょう'],
    comments_cap: ['いただきます','この駒が使えます','少し優勢ですね'],
  }
};

// ===== 状態 =====
let board=[], cap={1:[],2:[]}, curP=1, sel=null, vMoves=[], pendProm=null;
let history=[], gameOver=false, aiStyle='none', aiThink=false, chkCell=null;
let warlordsMode=false, kifu=[];
// ===== バリアント状態 =====
let gameVariant='shogi';
let hasamiBoard=[], hasamiCounts={1:9,2:9}, hasamiSel=null, hasamiVMoves=[];
let kuzushiGrid=[], kuzushiScores={1:0,2:0}, kuzushiTurn=1, kuzushiOver=false, kuzushiAnim=false;
// vsMode は aiStyle !== 'none' と同義
Object.defineProperty(window,'vsMode',{get:()=>aiStyle!=='none'});

// アニメーション用スナップショット
let prevBoardSnapshot = null;
let prevCapCount = {1: {}, 2: {}};

// ===== 初期盤面 =====
function initBoard(){
  const b=Array(9).fill(null).map(()=>Array(9).fill(null));
  b[0]=[
    {t:'KYO',p:2},{t:'KEI',p:2},{t:'GIN',p:2},{t:'KIN',p:2},{t:'OU',p:2},
    {t:'KIN',p:2},{t:'GIN',p:2},{t:'KEI',p:2},{t:'KYO',p:2}
  ];
  b[1][1]={t:'HI',p:2}; b[1][7]={t:'KAKU',p:2};
  for(let c=0;c<9;c++) b[2][c]={t:'FU',p:2};
  for(let c=0;c<9;c++) b[6][c]={t:'FU',p:1};
  b[7][7]={t:'KAKU',p:1}; b[7][1]={t:'HI',p:1};
  b[8]=[
    {t:'KYO',p:1},{t:'KEI',p:1},{t:'GIN',p:1},{t:'KIN',p:1},{t:'OU',p:1},
    {t:'KIN',p:1},{t:'GIN',p:1},{t:'KEI',p:1},{t:'KYO',p:1}
  ];
  return b;
}

// ===== 移動計算 =====
function inB(r,c){return r>=0&&r<9&&c>=0&&c<9;}

function rawMoves(b,r,c){
  const pc=b[r][c]; if(!pc)return[];
  const {t,p}=pc, fd=p===1?-1:1, ms=[];
  function slide(dr,dc){
    let rr=r+dr,cc=c+dc;
    while(inB(rr,cc)){
      const tg=b[rr][cc];
      if(tg){if(tg.p!==p)ms.push([rr,cc]);break;}
      ms.push([rr,cc]); rr+=dr; cc+=dc;
    }
  }
  function step(dr,dc){
    const rr=r+dr,cc=c+dc;
    if(inB(rr,cc)&&(!b[rr][cc]||b[rr][cc].p!==p))ms.push([rr,cc]);
  }
  function gold(){step(fd,0);step(0,-1);step(0,1);step(-fd,0);step(fd,-1);step(fd,1);}
  switch(t){
    case'FU':step(fd,0);break;
    case'KYO':slide(fd,0);break;
    case'KEI':step(fd*2,-1);step(fd*2,1);break;
    case'GIN':step(fd,-1);step(fd,0);step(fd,1);step(-fd,-1);step(-fd,1);break;
    case'KIN':case'TO':case'NKYO':case'NKEI':case'NGIN':gold();break;
    case'KAKU':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);break;
    case'HI':slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);break;
    case'RYUMA':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);step(-1,0);step(1,0);step(0,-1);step(0,1);break;
    case'RYUO':slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);step(-1,-1);step(-1,1);step(1,-1);step(1,1);break;
    case'OU':for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)step(dr,dc);break;
  }
  return ms;
}

function findKing(b,p){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(b[r][c]&&b[r][c].t==='OU'&&b[r][c].p===p)return[r,c];
  return null;
}

function inCheck(b,p){
  const k=findKing(b,p); if(!k)return false;
  const [kr,kc]=k,opp=p===1?2:1;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(b[r][c]&&b[r][c].p===opp&&rawMoves(b,r,c).some(([mr,mc])=>mr===kr&&mc===kc))return true;
  return false;
}

function clone(b){return b.map(row=>row.map(c=>c?{...c}:null));}

function validMoves_board(b,r,c){
  const pc=b[r][c]; if(!pc)return[];
  return rawMoves(b,r,c).filter(([mr,mc])=>{
    const nb=clone(b); nb[mr][mc]=pc; nb[r][c]=null;
    return !inCheck(nb,pc.p);
  });
}

function validMoves_drop(b,t,p,capData){
  if(!capData[p].includes(t))return[];
  const ms=[],fd=p===1?-1:1,last=p===1?0:8,sec=p===1?1:7;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(b[r][c])continue;
    if((t==='FU'||t==='KYO')&&r===last)continue;
    if(t==='KEI'&&(r===last||r===sec))continue;
    if(t==='FU'){
      let two=false;
      for(let rr=0;rr<9;rr++)if(b[rr][c]&&b[rr][c].t==='FU'&&b[rr][c].p===p)two=true;
      if(two)continue;
    }
    const nb=clone(b); nb[r][c]={t,p};
    if(inCheck(nb,p))continue;
    ms.push([r,c]);
  }
  return ms;
}

function inPromZone(r,p){return p===1?r<=2:r>=6;}
function mustProm(t,r,p){
  if(t==='FU'||t==='KYO')return p===1?r===0:r===8;
  if(t==='KEI')return p===1?r<=1:r>=7;
  return false;
}

function hasAnyMove(b,capData,p){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(b[r][c]&&b[r][c].p===p&&validMoves_board(b,r,c).length>0)return true;
  const unique=[...new Set(capData[p])];
  for(const t of unique)if(validMoves_drop(b,t,p,capData).length>0)return true;
  return false;
}

// ===== ゲーム操作 =====
function newGame(){
  if(gameVariant==='hasami'){
    initBoard_hasami();hasamiSel=null;hasamiVMoves=[];curP=1;gameOver=false;
    document.getElementById('message').textContent='';renderHasami();return;
  }
  if(gameVariant==='kuzushi'){
    initKuzushi();kuzushiTurn=1;kuzushiOver=false;kuzushiAnim=false;
    kuzushiScores={1:0,2:0};document.getElementById('message').textContent='';
    renderKuzushi();return;
  }
  board=initBoard(); cap={1:[],2:[]}; curP=1;
  sel=null; vMoves=[]; pendProm=null;
  history=[]; gameOver=false; aiThink=false; chkCell=null;
  kifu=[];
  prevBoardSnapshot=null;
  prevCapCount={1:{},2:{}};
  document.getElementById('message').textContent='';
  document.getElementById('promo-dlg').style.display='none';
  render();
}

function setAI(style){
  aiStyle=style;
  ['human','fuji','habu'].forEach(id=>{
    const b=document.getElementById('btn-'+id);
    if(b) b.classList.remove('active');
  });
  const activeId = style==='none'?'human':style;
  const activeBtn=document.getElementById('btn-'+activeId);
  if(activeBtn) activeBtn.classList.add('active');

  const profile=document.getElementById('ai-profile');
  if(style!=='none'&&AI_PROFILES[style]){
    const p=AI_PROFILES[style];
    document.getElementById('ai-profile-name').textContent=p.name;
    document.getElementById('ai-profile-desc').textContent=p.desc;
    profile.style.display='block';
  } else {
    profile.style.display='none';
  }
  setComment('');
  newGame();
}

function setComment(msg){
  document.getElementById('ai-comment').textContent=msg;
}

function pickComment(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function undoMove(){
  if(gameVariant!=='shogi')return;
  if(history.length===0||aiThink)return;
  const n=vsMode&&history.length>=2?2:1;
  for(let i=0;i<n&&history.length>0;i++){
    const h=history.pop();
    board=h.b; cap=h.c; curP=h.p;
    if(kifu.length>0)kifu.pop();
  }
  sel=null; vMoves=[]; gameOver=false;
  updCheckCell(); render();
}

function updCheckCell(){
  const k=findKing(board,curP);
  chkCell=k&&inCheck(board,curP)?{r:k[0],c:k[1]}:null;
}

// ===== 実行 =====
function execMove(fr,fc,tr,tc,auto=false){
  history.push({b:clone(board),c:{1:[...cap[1]],2:[...cap[2]]},p:curP});
  const pc=board[fr][fc];
  const tg=board[tr][tc];
  if(tg)cap[curP].push(DEMOTE[tg.t]||tg.t);
  const canP=CAN_PROM[pc.t];
  const inZ=inPromZone(tr,curP)||inPromZone(fr,curP);
  const must=mustProm(pc.t,tr,curP);
  if(canP&&inZ){
    if(must||auto){
      board[tr][tc]={t:TO_PROM[pc.t],p:curP}; board[fr][fc]=null;
      addKifu(curP,pc.t,tr,tc,true,false);
      finishMove();
    } else {
      board[tr][tc]=pc; board[fr][fc]=null;
      pendProm={fr,fc,tr,tc,pc};
      render();
      document.getElementById('promo-dlg').style.display='block';
    }
  } else {
    board[tr][tc]=pc; board[fr][fc]=null;
    addKifu(curP,pc.t,tr,tc,false,false);
    finishMove();
  }
}

function confirmProm(doIt){
  document.getElementById('promo-dlg').style.display='none';
  if(!pendProm)return;
  const {tr,tc,pc}=pendProm;
  if(doIt)board[tr][tc]={t:TO_PROM[pc.t],p:curP};
  addKifu(curP,pc.t,tr,tc,doIt,false);
  pendProm=null;
  finishMove();
}

function execDrop(t,p,r,c){
  history.push({b:clone(board),c:{1:[...cap[1]],2:[...cap[2]]},p:curP});
  board[r][c]={t,p};
  const i=cap[p].indexOf(t); cap[p].splice(i,1);
  addKifu(p,t,r,c,false,true);
  finishMove();
}

function finishMove(){
  sel=null; vMoves=[];
  const prev=curP;
  curP=curP===1?2:1;
  updCheckCell();
  if(!hasAnyMove(board,cap,curP)){
    const winner=prev===1?'先手':'後手';
    document.getElementById('message').textContent=`${winner}の勝ち！`;
    document.getElementById('turn-display').textContent='ゲーム終了';
    gameOver=true; render(); return;
  }
  render();
  if(aiStyle!=='none'&&curP===2&&!gameOver){
    aiThink=true;
    const p=AI_PROFILES[aiStyle];
    if(p) setComment(pickComment(p.comments_think));
    setTimeout(aiMove, aiStyle==='fuji'?500:700);
  }
}

// ===== クリック処理 =====
function handleCell(r,c){
  if(gameVariant==='hasami'){handleCell_hasami(r,c);return;}
  if(gameOver||aiThink)return;
  if(vsMode&&curP===2)return;
  const pc=board[r][c];
  if(sel&&sel.kind==='drop'){
    if(vMoves.some(([mr,mc])=>mr===r&&mc===c)){execDrop(sel.t,sel.p,r,c);}
    else{sel=null;vMoves=[];render();}
    return;
  }
  if(sel&&sel.kind==='board'){
    const {r:sr,c:sc}=sel;
    if(vMoves.some(([mr,mc])=>mr===r&&mc===c)){execMove(sr,sc,r,c);return;}
    if(pc&&pc.p===curP){sel={kind:'board',r,c};vMoves=validMoves_board(board,r,c);render();return;}
    sel=null;vMoves=[];render();return;
  }
  if(pc&&pc.p===curP){sel={kind:'board',r,c};vMoves=validMoves_board(board,r,c);render();}
}

function handleDrop(t,p){
  if(gameOver||aiThink||p!==curP)return;
  if(sel&&sel.kind==='drop'&&sel.t===t&&sel.p===p){sel=null;vMoves=[];render();return;}
  sel={kind:'drop',t,p};
  vMoves=validMoves_drop(board,t,p,cap);
  render();
}

// ===== 描画 =====
function render(){
  if(gameVariant==='hasami'){renderHasami();return;}
  if(gameVariant==='kuzushi'){renderKuzushi();return;}
  renderBoard(); renderCap(); renderTurnDisplay();
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const div=document.createElement('div');
      div.className='cell';
      const isSel=sel&&sel.kind==='board'&&sel.r===r&&sel.c===c;
      const isVM=vMoves.some(([mr,mc])=>mr===r&&mc===c);
      const isChk=chkCell&&chkCell.r===r&&chkCell.c===c;
      if(isSel)div.classList.add('sel');
      else if(isChk)div.classList.add('chk');
      if(isVM){
        if(board[r][c])div.classList.add('vcap');
        else div.classList.add('vmove');
      }
      const pc=board[r][c];
      if(pc){
        const p=document.createElement('div');
        p.className='piece'+(pc.p===2?' p2':'')+(PROM_SET.has(pc.t)?' prom':'')+(warlordsMode?' warlord':'');
        p.textContent=getPieceName(pc.t,pc.p);
        // 前回スナップショットと比較して位置が変わったコマにアニメーション付与
        if(prevBoardSnapshot){
          const prev=prevBoardSnapshot[r][c];
          // 前回この場所にいなかった（新たに移動してきた）コマに付与
          if(!prev||(prev.t!==pc.t||prev.p!==pc.p)){
            p.classList.add('piece-enter');
          }
        }
        div.appendChild(p);
      } else if(isVM&&sel&&sel.kind==='drop'){
        const d=document.createElement('div');d.className='dot';div.appendChild(d);
      }
      div.addEventListener('click',()=>handleCell(r,c));
      el.appendChild(div);
    }
  }
  // スナップショット更新
  prevBoardSnapshot = board.map(row=>row.map(c=>c?{...c}:null));
}

function renderCap(){
  for(const p of[1,2]){
    const el=document.getElementById(`cap${p}-pieces`);
    el.innerHTML='';
    const counts={};
    for(const t of cap[p])counts[t]=(counts[t]||0)+1;
    for(const[t,cnt]of Object.entries(counts)){
      const div=document.createElement('div');
      div.className='cap-piece'+(p===2?' p2-piece':'')+(warlordsMode?' warlord':'');
      const isSel=sel&&sel.kind==='drop'&&sel.t===t&&sel.p===p;
      if(isSel)div.classList.add('sel-drop');
      div.textContent=getPieceName(t,p);
      // 前回より数が増えた（新たに獲得した）コマにアニメーション付与
      const prevCnt=(prevCapCount[p]&&prevCapCount[p][t])||0;
      if(cnt>prevCnt){
        div.classList.add('cap-enter');
      }
      if(cnt>1){
        const b=document.createElement('div');
        b.className='cap-badge';b.textContent=cnt;
        div.appendChild(b);
      }
      if(!gameOver&&p===curP)div.addEventListener('click',()=>handleDrop(t,p));
      el.appendChild(div);
    }
    // prevCapCount 更新（counts は既に各駒の現在数を保持）
    prevCapCount[p]={...counts};
  }
}

function renderTurnDisplay(){
  if(gameOver)return;
  document.getElementById('turn-display').textContent=(curP===1?'先手':'後手')+'の番';
}

// ===== 武将駒 =====
function getPieceName(t,p){
  if(!warlordsMode)return NAMES[t];
  if(t==='OU')return WARLORD_OU[p]||'信長';
  return WARLORD_NAMES[t]||NAMES[t];
}

function toggleWarlords(){
  warlordsMode=!warlordsMode;
  const btn=document.getElementById('btn-warlords');
  if(btn)btn.classList.toggle('active',warlordsMode);
  render();
}

// ===== 棋譜 =====
function addKifu(player,pieceType,tr,tc,promoted,isDrop){
  const mark=player===1?'▲':'△';
  const col=9-tc;
  const row=ROW_LABELS[tr];
  const name=NAMES[pieceType];
  let text=`${kifu.length+1}.${mark}${col}${row}${name}`;
  if(promoted)text+='成';
  if(isDrop)text+='打';
  kifu.push({text,player});
  renderKifu();
}

function renderKifu(){
  const el=document.getElementById('kifu-list');
  if(!el)return;
  el.innerHTML='';
  if(kifu.length===0){
    const e=document.createElement('span');
    e.id='kifu-empty';e.textContent='まだ指し手がありません';
    el.appendChild(e);return;
  }
  kifu.forEach((entry,i)=>{
    const div=document.createElement('div');
    div.className=`kifu-entry k${entry.player}${i===kifu.length-1?' klast':''}`;
    div.textContent=entry.text;
    el.appendChild(div);
  });
  el.scrollTop=el.scrollHeight;
}

function copyKifu(){
  if(kifu.length===0)return;
  const text=kifu.map(e=>e.text).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-kifu-btn');
    if(btn){btn.textContent='コピー済';setTimeout(()=>btn.textContent='コピー',1500);}
  }).catch(()=>{
    const btn=document.getElementById('copy-kifu-btn');
    if(btn){btn.textContent='失敗';setTimeout(()=>btn.textContent='コピー',1500);}
  });
}

// ===== AI =====
function countMobility(b, p){
  let cnt=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(b[r][c]&&b[r][c].p===p) cnt+=rawMoves(b,r,c).length;
  return cnt;
}

function scoreMove(m, style){
  let s = Math.random() * (style==='habu' ? 0.8 : 0.4);
  const nb = clone(board);
  let pc, captured=false;

  if(m.k==='mv'){
    pc = board[m.fr][m.fc];
    if(nb[m.tr][m.tc]){ s += (PVALS[nb[m.tr][m.tc].t]||1) * 1.2; captured=true; }
    nb[m.tr][m.tc] = pc; nb[m.fr][m.fc] = null;
  } else {
    pc = {t:m.t, p:2};
    nb[m.tr][m.tc] = pc;
  }

  const givesCheck = inCheck(nb, 1);
  const promotable = m.k==='mv' && CAN_PROM[pc.t] && (inPromZone(m.tr,2)||inPromZone(m.fr,2));
  const enemyKing = findKing(nb, 1) || [0, 4];
  const distToKing = Math.abs(m.tr - enemyKing[0]) + Math.abs((m.tc!==undefined?m.tc:m.tc) - enemyKing[1]);

  if(style === 'fuji'){
    // ── 藤井スタイル：超攻撃型 ──
    // 王手には最高評価
    if(givesCheck) s += 7;
    // 成りを強く好む
    if(promotable) s += 3.0;
    // 竜・馬への成りは特別ボーナス
    if(promotable && (pc.t==='HI'||pc.t==='KAKU')) s += 4.0;
    // 王に近いほど高評価（攻め駒を王の周辺に集める）
    s += (7 - Math.min(distToKing, 7)) * 0.5;
    // 飛車・角を前進させる
    if(m.k==='mv' && (pc.t==='HI'||pc.t==='KAKU')) s += 0.8;
    // 敵陣（row 0-2）への侵入ボーナス
    if(m.tr <= 2) s += (3 - m.tr) * 0.6;
    // 歩の積極的前進
    if(pc.t==='FU' && m.k==='mv') s += (6 - m.tr) * 0.1;
    // 相手玉の守り駒を取る大きなボーナス
    if(captured){
      const capturedDist = Math.abs(m.tr - enemyKing[0]) + Math.abs(m.tc - enemyKing[1]);
      if(capturedDist <= 2) s += 2.5;
    }
  } else if(style === 'habu'){
    // ── 羽生スタイル：バランス型・羽生マジック ──
    // 王手は中程度
    if(givesCheck) s += 3.5;
    // 成りは標準
    if(promotable) s += 1.8;
    // 自軍の機動力（選択肢の多さ）を重視
    const myMobility = countMobility(nb, 2);
    s += myMobility * 0.04;
    // 相手の機動力を削る（封じる）
    const oppMobility = countMobility(nb, 1);
    s += (40 - Math.min(oppMobility, 40)) * 0.04;
    // 王への距離も考慮（攻守バランス）
    s += (6 - Math.min(distToKing, 6)) * 0.25;
    // 自陣の守り（自玉周辺の自駒密度）
    const myKing = findKing(nb, 2) || [8, 4];
    if(m.k==='mv'){
      const defDist = Math.abs(m.tr - myKing[0]) + Math.abs(m.tc - myKing[1]);
      if(defDist <= 2) s += 0.4; // 守り駒の近傍は評価
    }
    // 「羽生マジック」：低確率で意表を突く一手（高評価スパイク）
    if(Math.random() < 0.07) s += 4.5;
    // 持ち駒を有効活用（打ちを好む）
    if(m.k==='dr') s += 0.5;
  } else {
    // 標準CPU
    if(givesCheck) s += 4;
    if(promotable) s += 1.5;
  }

  return s;
}

function aiMove(){
  if(!aiThink||curP!==2||gameOver){aiThink=false;return;}
  const all=[];
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(board[r][c]&&board[r][c].p===2)
      validMoves_board(board,r,c).forEach(([tr,tc])=>all.push({k:'mv',fr:r,fc:c,tr,tc}));
  const uniq=[...new Set(cap[2])];
  for(const t of uniq)
    validMoves_drop(board,t,2,cap).forEach(([tr,tc])=>all.push({k:'dr',t,tr,tc}));
  if(!all.length){aiThink=false;return;}

  all.sort((a,b)=>scoreMove(b,aiStyle)-scoreMove(a,aiStyle));
  const best=all[0];

  // AIコメント表示
  const p=AI_PROFILES[aiStyle];
  if(p){
    const captured = best.k==='mv' && board[best.tr]&&board[best.tr][best.tc];
    const comments = captured ? p.comments_cap : p.comments_move;
    setComment(pickComment(comments));
  }

  if(best.k==='mv'){
    execMove(best.fr,best.fc,best.tr,best.tc,true);
  } else {
    execDrop(best.t,2,best.tr,best.tc);
  }
  aiThink=false;
}

// ===== はさみ将棋 =====
function initBoard_hasami(){
  hasamiBoard=Array(9).fill(null).map(()=>Array(9).fill(null));
  for(let c=0;c<9;c++){hasamiBoard[0][c]={p:2};hasamiBoard[8][c]={p:1};}
  hasamiCounts={1:9,2:9};
}

function rawMoves_hasami(b,r,c){
  const ms=[];
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    let rr=r+dr,cc=c+dc;
    while(inB(rr,cc)){if(b[rr][cc])break;ms.push([rr,cc]);rr+=dr;cc+=dc;}
  });
  return ms;
}

function checkHasamiCaptures(b,r,c,p){
  const opp=p===1?2:1;
  const toRemove=[];
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    const run=[];
    let rr=r+dr,cc=c+dc;
    while(inB(rr,cc)&&b[rr][cc]&&b[rr][cc].p===opp){run.push([rr,cc]);rr+=dr;cc+=dc;}
    if(run.length>0&&inB(rr,cc)&&b[rr][cc]&&b[rr][cc].p===p)run.forEach(pos=>toRemove.push(pos));
  });
  // 角の特殊ルール
  [{cr:0,cc2:0,adj:[[0,1],[1,0]]},{cr:0,cc2:8,adj:[[0,7],[1,8]]},
   {cr:8,cc2:0,adj:[[8,1],[7,0]]},{cr:8,cc2:8,adj:[[8,7],[7,8]]}
  ].forEach(({cr,cc2,adj})=>{
    if(b[cr][cc2]&&b[cr][cc2].p===opp&&adj.every(([ar,ac])=>b[ar][ac]&&b[ar][ac].p===p))
      toRemove.push([cr,cc2]);
  });
  const seen=new Set();
  return toRemove.filter(([rr,cc])=>{const k=rr*9+cc;if(seen.has(k))return false;seen.add(k);return true;});
}

function handleCell_hasami(r,c){
  if(gameOver||aiThink)return;
  if(vsMode&&curP===2)return;
  const pc=hasamiBoard[r][c];
  if(hasamiSel){
    const {r:sr,c:sc}=hasamiSel;
    if(hasamiVMoves.some(([mr,mc])=>mr===r&&mc===c)){execMove_hasami(sr,sc,r,c);return;}
    if(pc&&pc.p===curP){hasamiSel={r,c};hasamiVMoves=rawMoves_hasami(hasamiBoard,r,c);renderHasami();return;}
    hasamiSel=null;hasamiVMoves=[];renderHasami();return;
  }
  if(pc&&pc.p===curP){hasamiSel={r,c};hasamiVMoves=rawMoves_hasami(hasamiBoard,r,c);renderHasami();}
}

function execMove_hasami(fr,fc,tr,tc){
  const b=hasamiBoard;
  b[tr][tc]=b[fr][fc];b[fr][fc]=null;
  checkHasamiCaptures(b,tr,tc,curP).forEach(([r,c])=>{b[r][c]=null;});
  let c1=0,c2=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(b[r][c]){if(b[r][c].p===1)c1++;else c2++;}}
  hasamiCounts={1:c1,2:c2};
  hasamiSel=null;hasamiVMoves=[];
  const opp=curP===1?2:1;
  if(hasamiCounts[opp]<=1){
    document.getElementById('message').textContent=(curP===1?'先手':'後手')+'の勝ち！🎉';
    gameOver=true;renderHasami();return;
  }
  curP=opp;renderHasami();
  if(aiStyle!=='none'&&curP===2&&!gameOver){aiThink=true;setTimeout(aiMove_hasami,600);}
}

function renderHasami(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const div=document.createElement('div');
      div.className='cell';
      const isSel=hasamiSel&&hasamiSel.r===r&&hasamiSel.c===c;
      const isVM=hasamiVMoves.some(([mr,mc])=>mr===r&&mc===c);
      if(isSel)div.classList.add('sel');
      if(isVM)div.classList.add('vmove');
      const pc=hasamiBoard[r][c];
      if(pc){
        const p=document.createElement('div');
        p.className='piece'+(pc.p===2?' p2':'');
        p.textContent='歩';
        div.appendChild(p);
      }
      div.addEventListener('click',()=>handleCell(r,c));
      el.appendChild(div);
    }
  }
  document.getElementById('hc-v1').textContent=hasamiCounts[1];
  document.getElementById('hc-v2').textContent=hasamiCounts[2];
  if(!gameOver)document.getElementById('turn-display').textContent=(curP===1?'先手':'後手')+'の番';
}

function aiMove_hasami(){
  if(!aiThink||curP!==2||gameOver){aiThink=false;return;}
  let best=null,bestScore=-Infinity;
  for(let fr=0;fr<9;fr++){
    for(let fc=0;fc<9;fc++){
      if(!hasamiBoard[fr][fc]||hasamiBoard[fr][fc].p!==2)continue;
      const moves=rawMoves_hasami(hasamiBoard,fr,fc);
      for(const [tr,tc] of moves){
        const nb=hasamiBoard.map(row=>row.map(cell=>cell?{...cell}:null));
        nb[tr][tc]=nb[fr][fc];nb[fr][fc]=null;
        const captured=checkHasamiCaptures(nb,tr,tc,2);
        let score=captured.length*10+Math.random()*0.5;
        score+=(8-tr)*0.3;
        [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
          const rr=tr+dr,cc2=tc+dc;
          if(inB(rr,cc2)&&nb[rr][cc2]&&nb[rr][cc2].p===1)score+=1.5;
        });
        if(score>bestScore){bestScore=score;best={fr,fc,tr,tc};}
      }
    }
  }
  if(best)execMove_hasami(best.fr,best.fc,best.tr,best.tc);
  aiThink=false;
}

// ===== 将棋崩し =====
function inBK(r,c){return r>=0&&r<5&&c>=0&&c<8;}

function getStability(grid,r,c){
  let n=0;
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    const rr=r+dr,cc=c+dc;if(inBK(rr,cc)&&grid[rr][cc])n++;
  });
  return n;
}

function initKuzushi(){
  const pieces=[
    ...Array(18).fill('FU'),...Array(4).fill('KYO'),...Array(4).fill('KEI'),
    ...Array(4).fill('GIN'),...Array(4).fill('KIN'),...Array(2).fill('KAKU'),
    ...Array(2).fill('HI'),...Array(2).fill('OU')
  ];
  for(let i=39;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pieces[i],pieces[j]]=[pieces[j],pieces[i]];}
  kuzushiGrid=Array(5).fill(null).map(()=>Array(8).fill(null));
  for(let i=0;i<40;i++)kuzushiGrid[Math.floor(i/8)][i%8]={t:pieces[i]};
}

function renderKuzushi(){
  const el=document.getElementById('kuzushi-grid');
  el.innerHTML='';
  for(let r=0;r<5;r++){
    for(let c=0;c<8;c++){
      const div=document.createElement('div');
      const pc=kuzushiGrid[r][c];
      if(!pc){
        div.className='kz-cell empty';
      } else {
        const stab=getStability(kuzushiGrid,r,c);
        let cls='kz-cell';if(stab===0)cls+=' stab-0';else if(stab===1)cls+=' stab-1';
        div.className=cls;
        const stabEl=document.createElement('span');stabEl.className='kz-stab';stabEl.textContent=stab;
        div.textContent=NAMES[pc.t];div.appendChild(stabEl);
        if(!kuzushiOver&&!kuzushiAnim)div.addEventListener('click',()=>handleKuzushiClick(r,c));
      }
      el.appendChild(div);
    }
  }
  document.getElementById('kz-v1').textContent=kuzushiScores[1];
  document.getElementById('kz-v2').textContent=kuzushiScores[2];
  document.getElementById('kz-turn').textContent=(kuzushiTurn===1?'先手':'後手')+'の番';
  document.getElementById('kz-s1').classList.toggle('kz-active',kuzushiTurn===1);
  document.getElementById('kz-s2').classList.toggle('kz-active',kuzushiTurn===2);
}

function handleKuzushiClick(r,c){
  if(kuzushiOver||kuzushiAnim)return;
  if(!kuzushiGrid[r][c])return;
  kuzushiAnim=true;
  const cells=document.getElementById('kuzushi-grid').children;
  const el=cells[r*8+c];
  el.classList.add('picked');
  el.addEventListener('animationend',()=>{
    kuzushiGrid[r][c]=null;kuzushiScores[kuzushiTurn]++;
    const fallen=[];
    for(let rr=0;rr<5;rr++)for(let cc=0;cc<8;cc++){
      if(kuzushiGrid[rr][cc]&&getStability(kuzushiGrid,rr,cc)===0)fallen.push([rr,cc]);
    }
    processKuzushiFalls(fallen,afterKuzushiAction);
  },{once:true});
}

function processKuzushiFalls(fallen,done){
  if(fallen.length===0){done();return;}
  renderKuzushi();
  const cells=document.getElementById('kuzushi-grid').children;
  fallen.forEach(([r,c])=>{cells[r*8+c].classList.add('falling');});
  setTimeout(()=>{
    fallen.forEach(([r,c])=>{kuzushiGrid[r][c]=null;kuzushiScores[kuzushiTurn]++;});
    renderKuzushi();
    const newFallen=[];
    for(let rr=0;rr<5;rr++)for(let cc=0;cc<8;cc++){
      if(kuzushiGrid[rr][cc]&&getStability(kuzushiGrid,rr,cc)===0)newFallen.push([rr,cc]);
    }
    processKuzushiFalls(newFallen,done);
  },400);
}

function afterKuzushiAction(){
  kuzushiAnim=false;
  if(checkKuzushiWin())return;
  kuzushiTurn=kuzushiTurn===1?2:1;
  renderKuzushi();
}

function checkKuzushiWin(){
  if(kuzushiGrid.flat().filter(x=>x!==null).length>0)return false;
  kuzushiOver=true;
  let msg;
  if(kuzushiScores[1]<kuzushiScores[2])msg='先手の勝ち！🎉（先手'+kuzushiScores[1]+'枚 / 後手'+kuzushiScores[2]+'枚）';
  else if(kuzushiScores[2]<kuzushiScores[1])msg='後手の勝ち！🎉（後手'+kuzushiScores[2]+'枚 / 先手'+kuzushiScores[1]+'枚）';
  else msg='引き分け！（各'+kuzushiScores[1]+'枚）';
  document.getElementById('message').textContent=msg;
  renderKuzushi();return true;
}

// ===== バリアント切り替え =====
function setVariant(v){
  gameVariant=v;
  ['shogi','hasami','kuzushi'].forEach(id=>{
    const b=document.getElementById('btn-var-'+id);if(b)b.classList.toggle('active',id===v);
  });
  const isShogi=v==='shogi',isHasami=v==='hasami',isKuzushi=v==='kuzushi';
  document.getElementById('ai-select').style.display=isKuzushi?'none':'';
  document.getElementById('ai-comment').style.display=isKuzushi?'none':'';
  if(isKuzushi){
    aiStyle='none';
    document.getElementById('ai-profile').style.display='none';
    setComment('');
    ['human','fuji','habu'].forEach(id=>{
      const b=document.getElementById('btn-'+id);if(b)b.classList.toggle('active',id==='human');
    });
  }
  const wBtn=document.getElementById('btn-warlords');
  const uBtn=document.getElementById('btn-undo');
  if(wBtn)wBtn.style.display=isShogi?'':'none';
  if(uBtn)uBtn.style.display=isShogi?'':'none';
  document.getElementById('controls').style.display=isKuzushi?'none':'';
  document.getElementById('hasami-info').style.display=isHasami?'flex':'none';
  document.getElementById('cap1').style.display=isShogi?'':'none';
  document.getElementById('cap2').style.display=isShogi?'':'none';
  document.getElementById('game-area').style.display=isKuzushi?'none':'';
  document.getElementById('kuzushi-area').style.display=isKuzushi?'flex':'none';
  document.getElementById('kifu-panel').style.display=isShogi?'':'none';
  newGame();
}

// ===== ラベル設定 =====
function setupLabels(){
  const cols=document.getElementById('col-nums');
  const rows=document.getElementById('row-nums');
  COL_LABELS.forEach(l=>{const s=document.createElement('span');s.textContent=l;cols.appendChild(s);});
  ROW_LABELS.forEach(l=>{const s=document.createElement('span');s.textContent=l;rows.appendChild(s);});
}

setupLabels();
newGame();
