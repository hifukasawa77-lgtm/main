<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>将棋妖怪退治</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // JSXファイルを読み込み、import/exportを除去してBabelで変換・実行する
    fetch('shogi_rpg_enhanced.jsx')
      .then(r => r.text())
      .then(code => {
        // import React ... と export default ... を除去
        const cleaned = code
          .replace(/^import\s+.*?;?\s*$/gm, '')
          .replace(/^export\s+default\s+/gm, 'window.ShogiRPG = ');

        const transformed = Babel.transform(cleaned, { presets: ['react'] }).code;
        // eslint-disable-next-line no-eval
        eval(transformed);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.ShogiRPG));
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<p style="color:red;padding:20px;">エラー: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
