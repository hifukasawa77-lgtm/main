  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:linear-gradient(135deg,#1a0a00 0%,#3c1a08 100%);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      font-family:'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif;
      color:#f0e0c8;padding:20px 10px;
    }
    h1{font-size:2.2rem;color:#d4a040;text-shadow:0 2px 8px rgba(0,0,0,0.7);margin-bottom:14px;letter-spacing:0.2em;}
    #controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
    button{
      background:linear-gradient(180deg,#7a3010,#5a2008);color:#f0e0c8;
      border:2px solid #c09040;padding:8px 18px;border-radius:6px;
      cursor:pointer;font-size:0.9rem;font-family:inherit;
      transition:all 0.15s;box-shadow:0 2px 6px rgba(0,0,0,0.4);
    }
    button:hover{background:linear-gradient(180deg,#9a4020,#7a3010);}
    button.active{background:linear-gradient(180deg,#d4a040,#b08020);color:#1a0a00;}
    #turn-display{
      font-size:1.05rem;background:rgba(0,0,0,0.4);
      padding:7px 16px;border-radius:6px;border:1px solid #8b6030;
      min-width:110px;text-align:center;
    }
    #game-area{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
    .captured-area{
      width:95px;background:rgba(0,0,0,0.25);
      border:2px solid #7a5030;border-radius:8px;
      padding:8px 6px;
    }
    .area-label{text-align:center;font-size:0.75rem;color:#a08060;margin-bottom:6px;border-bottom:1px solid #7a5030;padding-bottom:4px;}
    .cap-pieces{display:flex;flex-wrap:wrap;gap:4px;}
    .cap-piece{
      width:36px;height:36px;background:linear-gradient(180deg,#f0d890,#d4b060);
      border:1px solid #8b6030;border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;font-weight:bold;color:#1a0a00;
      cursor:pointer;position:relative;transition:transform 0.1s;
      user-select:none;box-shadow:0 1px 4px rgba(0,0,0,0.3);
    }
    .cap-piece:hover{transform:scale(1.12);}
    .cap-piece.p2-piece{transform:rotate(180deg);}
    .cap-piece.p2-piece:hover{transform:rotate(180deg) scale(1.12);}
    .cap-piece.sel-drop{outline:3px solid #4090ff;background:linear-gradient(180deg,#a0d8ff,#70a8e0);}
    .cap-badge{
      position:absolute;bottom:1px;right:2px;font-size:0.58rem;
      background:#5a2008;color:#ffd080;width:13px;height:13px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
    }
    #board-wrap{position:relative;}
    #board{
      display:grid;grid-template-columns:repeat(9,60px);
      grid-template-rows:repeat(9,60px);
      border:3px solid #7a5020;
      box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 0 0 1px #c09040;
      background:#8b6030;gap:1px;padding:1px;
    }
    .cell{
      background:linear-gradient(160deg,#d8a858,#c89040);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:background 0.1s;position:relative;
    }
    .cell:hover{background:linear-gradient(160deg,#e8b868,#d8a050);}
    .cell.sel{background:#70b0ff;}
    .cell.vmove{background:#78d878;}
    .cell.vcap{background:#f08070;}
    .cell.chk{
      background:#ff7060;
      animation: chkPulse 0.6s ease-in-out infinite alternate;
    }
    @keyframes chkPulse {
      from { background: #ff7060; box-shadow: inset 0 0 0 rgba(255,80,60,0); }
      to   { background: #ff4040; box-shadow: inset 0 0 12px rgba(255,80,60,0.7); }
    }
    .piece{
      width:54px;height:54px;
      background:linear-gradient(160deg,#f8f0d0,#e8d880);
      border:1.5px solid #a08040;border-radius:4px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:bold;color:#1a0800;
      box-shadow:0 2px 5px rgba(0,0,0,0.35);
      user-select:none;position:relative;
    }
    .piece.p2{transform:rotate(180deg);background:linear-gradient(160deg,#e8e0c0,#d8c870);}
    .piece.prom{color:#cc2200;}
    .dot{width:14px;height:14px;background:rgba(40,180,40,0.7);border-radius:50%;}
    #message{
      margin-top:14px;font-size:1.3rem;font-weight:bold;
      color:#ffd060;text-shadow:0 2px 6px rgba(0,0,0,0.6);min-height:34px;text-align:center;
    }
    #promo-dlg{
      display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:linear-gradient(160deg,#3c2010,#2c1008);
      border:3px solid #d4a040;border-radius:14px;
      padding:28px 36px;z-index:200;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.8);
    }
    #promo-dlg h3{margin-bottom:18px;color:#d4a040;font-size:1.2rem;}
    #promo-dlg .btn-row{display:flex;gap:14px;justify-content:center;}
    .col-nums,.row-nums{
      position:absolute;font-size:0.65rem;color:#a08050;
      display:flex;pointer-events:none;
    }
    .col-nums{top:-17px;left:1px;width:calc(100% - 2px);}
    .col-nums span{width:61px;text-align:center;}
    .row-nums{right:-20px;top:1px;height:calc(100% - 2px);flex-direction:column;}
    .row-nums span{height:61px;display:flex;align-items:center;font-family:'Hiragino Mincho ProN',serif;}
    /* ─── コマ移動アニメーション ─────────────── */
    .piece-enter {
      animation: pieceEnter 0.18s ease-out forwards;
    }
    @keyframes pieceEnter {
      from { transform: scale(0.7); opacity: 0.3; }
      to   { transform: scale(1);   opacity: 1;   }
    }
    /* p2コマのpieceEnterは rotate(180deg) を維持 */
    .piece.p2.piece-enter {
      animation: pieceEnterP2 0.18s ease-out forwards;
    }
    @keyframes pieceEnterP2 {
      from { transform: rotate(180deg) scale(0.7); opacity: 0.3; }
      to   { transform: rotate(180deg) scale(1);   opacity: 1;   }
    }

    /* ─── 持ち駒獲得アニメーション ───────────── */
    .cap-enter {
      animation: capEnter 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes capEnter {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .cap-piece.p2-piece.cap-enter {
      animation: capEnterP2 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes capEnterP2 {
      from { transform: rotate(180deg) scale(0); opacity: 0; }
      to   { transform: rotate(180deg) scale(1); opacity: 1; }
    }

    @media(max-width:680px){
      #board{grid-template-columns:repeat(9,40px);grid-template-rows:repeat(9,40px);}
      .piece{width:36px;height:36px;font-size:0.75rem;}
      .cap-piece{width:30px;height:30px;font-size:0.8rem;}
      .captured-area{width:72px;}
      .col-nums span{width:41px;}
      .row-nums span{height:41px;}
    }
  </style>
</head>
<body>
<h1>将 棋</h1>
<div id="controls">
  <div id="turn-display">先手の番</div>
  <button onclick="newGame()">新規対局</button>
  <button id="mode-btn" onclick="toggleMode()">対CPU</button>
  <button onclick="undoMove()">待った</button>
</div>
<div id="game-area">
  <div id="cap2" class="captured-area">
    <div class="area-label">後手の持ち駒</div>
    <div class="cap-pieces" id="cap2-pieces"></div>
  </div>
  <div id="board-wrap">
    <div class="col-nums" id="col-nums"></div>
    <div id="board"></div>
    <div class="row-nums" id="row-nums"></div>
  </div>
  <div id="cap1" class="captured-area">
    <div class="area-label">先手の持ち駒</div>
    <div class="cap-pieces" id="cap1-pieces"></div>
  </div>
</div>
<div id="message"></div>
<div id="promo-dlg">
  <h3>成りますか？</h3>
  <div class="btn-row">
    <button onclick="confirmProm(true)">成る</button>
    <button onclick="confirmProm(false)">成らない</button>
  </div>
</div>

<script>
// ===== 定数 =====
const NAMES = {
  FU:'歩',KYO:'香',KEI:'桂',GIN:'銀',KIN:'金',KAKU:'角',HI:'飛',OU:'王',
  TO:'と',NKYO:'杏',NKEI:'圭',NGIN:'全',RYUMA:'馬',RYUO:'竜'
};
const PROM_SET = new Set(['TO','NKYO','NKEI','NGIN','RYUMA','RYUO']);
const CAN_PROM = {FU:1,KYO:1,KEI:1,GIN:1,KAKU:1,HI:1};
const TO_PROM = {FU:'TO',KYO:'NKYO',KEI:'NKEI',GIN:'NGIN',KAKU:'RYUMA',HI:'RYUO'};
const DEMOTE = {TO:'FU',NKYO:'KYO',NKEI:'KEI',NGIN:'GIN',RYUMA:'KAKU',RYUO:'HI'};
const PVALS = {FU:1,KYO:3,KEI:3,GIN:4,KIN:5,KAKU:8,HI:9,OU:100,TO:6,NKYO:5,NKEI:5,NGIN:5,RYUMA:10,RYUO:12};
const COL_LABELS = ['９','８','７','６','５','４','３','２','１'];
const ROW_LABELS = ['一','二','三','四','五','六','七','八','九'];

// ===== 状態 =====
let board=[], cap={1:[],2:[]}, curP=1, sel=null, vMoves=[], pendProm=null;
let history=[], gameOver=false, vsMode=false, aiThink=false, chkCell=null;

// アニメーション用スナップショット
let prevBoardSnapshot = null;
let prevCapCount = {1: {}, 2: {}};

// ===== 初期盤面 =====
function initBoard(){
  const b=Array(9).fill(null).map(()=>Array(9).fill(null));
  b[0]=[
    {t:'KYO',p:2},{t:'KEI',p:2},{t:'GIN',p:2},{t:'KIN',p:2},{t:'OU',p:2},
    {t:'KIN',p:2},{t:'GIN',p:2},{t:'KEI',p:2},{t:'KYO',p:2}
  ];
  b[1][1]={t:'HI',p:2}; b[1][7]={t:'KAKU',p:2};
  for(let c=0;c<9;c++) b[2][c]={t:'FU',p:2};
  for(let c=0;c<9;c++) b[6][c]={t:'FU',p:1};
  b[7][7]={t:'KAKU',p:1}; b[7][1]={t:'HI',p:1};
  b[8]=[
    {t:'KYO',p:1},{t:'KEI',p:1},{t:'GIN',p:1},{t:'KIN',p:1},{t:'OU',p:1},
    {t:'KIN',p:1},{t:'GIN',p:1},{t:'KEI',p:1},{t:'KYO',p:1}
  ];
  return b;
}

// ===== 移動計算 =====
function inB(r,c){return r>=0&&r<9&&c>=0&&c<9;}

function rawMoves(b,r,c){
  const pc=b[r][c]; if(!pc)return[];
  const {t,p}=pc, fd=p===1?-1:1, ms=[];
  function slide(dr,dc){
    let rr=r+dr,cc=c+dc;
    while(inB(rr,cc)){
      const tg=b[rr][cc];
      if(tg){if(tg.p!==p)ms.push([rr,cc]);break;}
      ms.push([rr,cc]); rr+=dr; cc+=dc;
    }
  }
  function step(dr,dc){
    const rr=r+dr,cc=c+dc;
    if(inB(rr,cc)&&(!b[rr][cc]||b[rr][cc].p!==p))ms.push([rr,cc]);
  }
  function gold(){step(fd,0);step(0,-1);step(0,1);step(-fd,0);step(fd,-1);step(fd,1);}
  switch(t){
    case'FU':step(fd,0);break;
    case'KYO':slide(fd,0);break;
    case'KEI':step(fd*2,-1);step(fd*2,1);break;
    case'GIN':step(fd,-1);step(fd,0);step(fd,1);step(-fd,-1);step(-fd,1);break;
    case'KIN':case'TO':case'NKYO':case'NKEI':case'NGIN':gold();break;
    case'KAKU':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);break;
    case'HI':slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);break;
    case'RYUMA':slide(-1,-1);slide(-1,1);slide(1,-1);slide(1,1);step(-1,0);step(1,0);step(0,-1);step(0,1);break;
    case'RYUO':slide(-1,0);slide(1,0);slide(0,-1);slide(0,1);step(-1,-1);step(-1,1);step(1,-1);step(1,1);break;
    case'OU':for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)if(dr||dc)step(dr,dc);break;
  }
  return ms;
}

function findKing(b,p){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(b[r][c]&&b[r][c].t==='OU'&&b[r][c].p===p)return[r,c];
  return null;
}

function inCheck(b,p){
  const k=findKing(b,p); if(!k)return false;
  const [kr,kc]=k,opp=p===1?2:1;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(b[r][c]&&b[r][c].p===opp&&rawMoves(b,r,c).some(([mr,mc])=>mr===kr&&mc===kc))return true;
  return false;
}

function clone(b){return b.map(row=>row.map(c=>c?{...c}:null));}

function validMoves_board(b,r,c){
  const pc=b[r][c]; if(!pc)return[];
  return rawMoves(b,r,c).filter(([mr,mc])=>{
    const nb=clone(b); nb[mr][mc]=pc; nb[r][c]=null;
    return !inCheck(nb,pc.p);
  });
}

function validMoves_drop(b,t,p,capData){
  if(!capData[p].includes(t))return[];
  const ms=[],fd=p===1?-1:1,last=p===1?0:8,sec=p===1?1:7;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(b[r][c])continue;
    if((t==='FU'||t==='KYO')&&r===last)continue;
    if(t==='KEI'&&(r===last||r===sec))continue;
    if(t==='FU'){
      let two=false;
      for(let rr=0;rr<9;rr++)if(b[rr][c]&&b[rr][c].t==='FU'&&b[rr][c].p===p)two=true;
      if(two)continue;
    }
    const nb=clone(b); nb[r][c]={t,p};
    if(inCheck(nb,p))continue;
    ms.push([r,c]);
  }
  return ms;
}

function inPromZone(r,p){return p===1?r<=2:r>=6;}
function mustProm(t,r,p){
  if(t==='FU'||t==='KYO')return p===1?r===0:r===8;
  if(t==='KEI')return p===1?r<=1:r>=7;
  return false;
}

function hasAnyMove(b,capData,p){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(b[r][c]&&b[r][c].p===p&&validMoves_board(b,r,c).length>0)return true;
  const unique=[...new Set(capData[p])];
  for(const t of unique)if(validMoves_drop(b,t,p,capData).length>0)return true;
  return false;
}

// ===== ゲーム操作 =====
function newGame(){
  board=initBoard(); cap={1:[],2:[]}; curP=1;
  sel=null; vMoves=[]; pendProm=null;
  history=[]; gameOver=false; aiThink=false; chkCell=null;
  // アニメーション用スナップショットをリセット
  prevBoardSnapshot=null;
  prevCapCount={1:{},2:{}};
  document.getElementById('message').textContent='';
  document.getElementById('promo-dlg').style.display='none';
  render();
}

function toggleMode(){
  vsMode=!vsMode;
  const btn=document.getElementById('mode-btn');
  btn.textContent=vsMode?'対人':'対CPU';
  btn.classList.toggle('active',vsMode);
  newGame();
}

function undoMove(){
  if(history.length===0||aiThink)return;
  const n=vsMode&&history.length>=2?2:1;
  for(let i=0;i<n&&history.length>0;i++){
    const h=history.pop();
    board=h.b; cap=h.c; curP=h.p;
  }
  sel=null; vMoves=[]; gameOver=false;
  updCheckCell(); render();
}

function updCheckCell(){
  const k=findKing(board,curP);
  chkCell=k&&inCheck(board,curP)?{r:k[0],c:k[1]}:null;
}

// ===== 実行 =====
function execMove(fr,fc,tr,tc,auto=false){
  history.push({b:clone(board),c:{1:[...cap[1]],2:[...cap[2]]},p:curP});
  const pc=board[fr][fc];
  const tg=board[tr][tc];
  if(tg)cap[curP].push(DEMOTE[tg.t]||tg.t);
  const canP=CAN_PROM[pc.t];
  const inZ=inPromZone(tr,curP)||inPromZone(fr,curP);
  const must=mustProm(pc.t,tr,curP);
  if(canP&&inZ){
    if(must||auto){
      board[tr][tc]={t:TO_PROM[pc.t],p:curP}; board[fr][fc]=null;
      finishMove();
    } else {
      board[tr][tc]=pc; board[fr][fc]=null;
      pendProm={fr,fc,tr,tc,pc};
      render();
      document.getElementById('promo-dlg').style.display='block';
    }
  } else {
    board[tr][tc]=pc; board[fr][fc]=null;
    finishMove();
  }
}

function confirmProm(doIt){
  document.getElementById('promo-dlg').style.display='none';
  if(!pendProm)return;
  const {tr,tc,pc}=pendProm;
  if(doIt)board[tr][tc]={t:TO_PROM[pc.t],p:curP};
  pendProm=null;
  finishMove();
}

function execDrop(t,p,r,c){
  history.push({b:clone(board),c:{1:[...cap[1]],2:[...cap[2]]},p:curP});
  board[r][c]={t,p};
  const i=cap[p].indexOf(t); cap[p].splice(i,1);
  finishMove();
}

function finishMove(){
  sel=null; vMoves=[];
  const prev=curP;
  curP=curP===1?2:1;
  updCheckCell();
  if(!hasAnyMove(board,cap,curP)){
    const winner=prev===1?'先手':'後手';
    document.getElementById('message').textContent=`${winner}の勝ち！`;
    document.getElementById('turn-display').textContent='ゲーム終了';
    gameOver=true; render(); return;
  }
  render();
  if(vsMode&&curP===2&&!gameOver){aiThink=true;setTimeout(aiMove,400);}
}

// ===== クリック処理 =====
function handleCell(r,c){
  if(gameOver||aiThink)return;
  if(vsMode&&curP===2)return;
  const pc=board[r][c];
  if(sel&&sel.kind==='drop'){
    if(vMoves.some(([mr,mc])=>mr===r&&mc===c)){execDrop(sel.t,sel.p,r,c);}
    else{sel=null;vMoves=[];render();}
    return;
  }
  if(sel&&sel.kind==='board'){
    const {r:sr,c:sc}=sel;
    if(vMoves.some(([mr,mc])=>mr===r&&mc===c)){execMove(sr,sc,r,c);return;}
    if(pc&&pc.p===curP){sel={kind:'board',r,c};vMoves=validMoves_board(board,r,c);render();return;}
    sel=null;vMoves=[];render();return;
  }
  if(pc&&pc.p===curP){sel={kind:'board',r,c};vMoves=validMoves_board(board,r,c);render();}
}

function handleDrop(t,p){
  if(gameOver||aiThink||p!==curP)return;
  if(sel&&sel.kind==='drop'&&sel.t===t&&sel.p===p){sel=null;vMoves=[];render();return;}
  sel={kind:'drop',t,p};
  vMoves=validMoves_drop(board,t,p,cap);
  render();
}

// ===== 描画 =====
function render(){
  renderBoard(); renderCap(); renderTurnDisplay();
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const div=document.createElement('div');
      div.className='cell';
      const isSel=sel&&sel.kind==='board'&&sel.r===r&&sel.c===c;
      const isVM=vMoves.some(([mr,mc])=>mr===r&&mc===c);
      const isChk=chkCell&&chkCell.r===r&&chkCell.c===c;
      if(isSel)div.classList.add('sel');
      else if(isChk)div.classList.add('chk');
      if(isVM){
        if(board[r][c])div.classList.add('vcap');
        else div.classList.add('vmove');
      }
      const pc=board[r][c];
      if(pc){
        const p=document.createElement('div');
        p.className='piece'+(pc.p===2?' p2':'')+(PROM_SET.has(pc.t)?' prom':'');
        p.textContent=NAMES[pc.t];
        // 前回スナップショットと比較して位置が変わったコマにアニメーション付与
        if(prevBoardSnapshot){
          const prev=prevBoardSnapshot[r][c];
          // 前回この場所にいなかった（新たに移動してきた）コマに付与
          if(!prev||(prev.t!==pc.t||prev.p!==pc.p)){
            p.classList.add('piece-enter');
          }
        }
        div.appendChild(p);
      } else if(isVM&&sel&&sel.kind==='drop'){
        const d=document.createElement('div');d.className='dot';div.appendChild(d);
      }
      div.addEventListener('click',()=>handleCell(r,c));
      el.appendChild(div);
    }
  }
  // スナップショット更新
  prevBoardSnapshot = board.map(row=>row.map(c=>c?{...c}:null));
}

function renderCap(){
  for(const p of[1,2]){
    const el=document.getElementById(`cap${p}-pieces`);
    el.innerHTML='';
    const counts={};
    for(const t of cap[p])counts[t]=(counts[t]||0)+1;
    for(const[t,cnt]of Object.entries(counts)){
      const div=document.createElement('div');
      div.className='cap-piece'+(p===2?' p2-piece':'');
      const isSel=sel&&sel.kind==='drop'&&sel.t===t&&sel.p===p;
      if(isSel)div.classList.add('sel-drop');
      div.textContent=NAMES[t];
      // 前回より数が増えた（新たに獲得した）コマにアニメーション付与
      const prevCnt=(prevCapCount[p]&&prevCapCount[p][t])||0;
      if(cnt>prevCnt){
        div.classList.add('cap-enter');
      }
      if(cnt>1){
        const b=document.createElement('div');
        b.className='cap-badge';b.textContent=cnt;
        div.appendChild(b);
      }
      if(!gameOver&&p===curP)div.addEventListener('click',()=>handleDrop(t,p));
      el.appendChild(div);
    }
    // prevCapCount 更新（counts は既に各駒の現在数を保持）
    prevCapCount[p]={...counts};
  }
}

function renderTurnDisplay(){
  if(gameOver)return;
  document.getElementById('turn-display').textContent=(curP===1?'先手':'後手')+'の番';
}

// ===== AI =====
function aiMove(){
  if(!aiThink||curP!==2||gameOver){aiThink=false;return;}
  const all=[];
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)
    if(board[r][c]&&board[r][c].p===2)
      validMoves_board(board,r,c).forEach(([tr,tc])=>all.push({k:'mv',fr:r,fc:c,tr,tc}));
  const uniq=[...new Set(cap[2])];
  for(const t of uniq)
    validMoves_drop(board,t,2,cap).forEach(([tr,tc])=>all.push({k:'dr',t,tr,tc}));
  if(!all.length){aiThink=false;return;}

  // スコアで評価
  function score(m){
    let s=Math.random()*0.6;
    const nb=clone(board);
    let pc;
    if(m.k==='mv'){
      pc=board[m.fr][m.fc];
      if(nb[m.tr][m.tc])s+=PVALS[nb[m.tr][m.tc].t]||1;
      nb[m.tr][m.tc]=pc; nb[m.fr][m.fc]=null;
    } else {
      pc={t:m.t,p:2};
      nb[m.tr][m.tc]=pc;
    }
    // 成れる場合にボーナス
    if(m.k==='mv'&&CAN_PROM[pc.t]&&(inPromZone(m.tr,2)||inPromZone(m.fr,2)))s+=1.5;
    // 王手ボーナス
    if(inCheck(nb,1))s+=4;
    return s;
  }
  all.sort((a,b)=>score(b)-score(a));
  const best=all[0];
  if(best.k==='mv'){
    execMove(best.fr,best.fc,best.tr,best.tc,true);
  } else {
    execDrop(best.t,2,best.tr,best.tc);
  }
  aiThink=false;
}

// ===== ラベル設定 =====
function setupLabels(){
  const cols=document.getElementById('col-nums');
  const rows=document.getElementById('row-nums');
  COL_LABELS.forEach(l=>{const s=document.createElement('span');s.textContent=l;cols.appendChild(s);});
  ROW_LABELS.forEach(l=>{const s=document.createElement('span');s.textContent=l;rows.appendChild(s);});
}

setupLabels();
newGame();
