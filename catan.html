<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HEXLAN AI | hide の部屋</title>
<style>
:root {
  --bg: #0b1020;
  --bg2: #0f172a;
  --panel: rgba(11,23,48,0.95);
  --border: rgba(56,189,248,0.2);
  --accent: #38bdf8;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --radius: 10px;
  --p0: #38bdf8;
  --p1: #f87171;
  --p2: #fbbf24;
  --p3: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: rgba(15,23,42,0.9);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.back-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
}
.back-link:hover { text-decoration: underline; }
header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
#lang-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
#lang-btn:hover { border-color: var(--accent); color: var(--accent); }
#app {
  display: flex;
  flex: 1;
  gap: 12px;
  padding: 12px;
  overflow: hidden;
}
#board-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#board { display: block; cursor: pointer; }
#panel {
  width: 290px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.panel-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
}
.panel-title {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  font-weight: 600;
}
/* Player summary */
#player-summary { display: flex; flex-direction: column; gap: 5px; }
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}
.player-row.active { border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.06); }
.player-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.player-name { flex: 1; font-weight: 600; font-size: 13px; }
.player-vp { font-size: 12px; color: var(--muted); }
.player-bonus { font-size: 11px; }
/* Dice area */
#dice-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 8px;
}
.die {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.die.has-face {
  background-image: url('assets/catan/gpt-image-2-catan-dice-atlas.png');
  background-size: 300% 200%;
  background-repeat: no-repeat;
  background-color: transparent;
  border-color: rgba(255,255,255,0.18);
  color: transparent;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.45));
}
#dice-total {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  min-width: 30px;
  text-align: center;
}
/* Resources */
#resource-area {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.res-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 5px;
  padding: 3px 7px;
  font-size: 12px;
}
.res-icon {
  width: 22px;
  height: 22px;
  display: inline-block;
  flex-shrink: 0;
  background-image: url('assets/catan/gpt-image-2-catan-sprites-atlas.png');
  background-size: 400% 400%;
  background-repeat: no-repeat;
  vertical-align: middle;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
}
.res-chip .res-count { font-weight: 700; min-width: 14px; text-align: center; }
/* Dev cards */
#devcard-area { display: flex; flex-wrap: wrap; gap: 5px; }
.dev-chip {
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.35);
  border-radius: 5px;
  padding: 3px 7px;
  font-size: 11px;
  color: #c4b5fd;
  cursor: pointer;
}
.dev-chip:hover { background: rgba(167,139,250,0.25); }
.dev-chip.used { opacity: 0.4; cursor: default; }
/* Status */
#status-msg {
  background: rgba(56,189,248,0.08);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  line-height: 1.4;
  color: var(--accent);
  min-height: 40px;
}
/* Buttons */
#btn-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.action-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  text-align: left;
  transition: all 0.15s;
}
.action-btn:hover:not(:disabled) {
  background: rgba(56,189,248,0.12);
  border-color: var(--accent);
  color: var(--accent);
}
.action-btn:disabled { opacity: 0.3; cursor: default; }
.action-btn.primary {
  background: rgba(56,189,248,0.15);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.action-btn.primary:hover:not(:disabled) {
  background: rgba(56,189,248,0.25);
}
.action-btn.danger {
  border-color: rgba(248,113,113,0.4);
  color: #f87171;
}
.action-btn.danger:hover:not(:disabled) {
  background: rgba(248,113,113,0.12);
}
/* Log */
#game-log {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 140px;
  overflow-y: auto;
}
.log-entry {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.log-entry:last-child { border-bottom: none; }
/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal-overlay[hidden] { display: none; }
.modal-box {
  background: #1e293b;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  max-width: 360px;
  width: 90%;
  text-align: center;
}
.modal-box h2 { font-size: 20px; margin-bottom: 12px; color: var(--accent); }
.modal-box p { color: var(--muted); margin-bottom: 16px; font-size: 13px; }
.modal-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.modal-btn {
  background: rgba(56,189,248,0.15);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}
.modal-btn:hover { background: rgba(56,189,248,0.25); }
.modal-btn.secondary {
  background: transparent;
  border-color: var(--border);
  color: var(--text);
}
/* Trade modal resource buttons */
.res-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  min-width: 70px;
}
.res-btn:hover { border-color: var(--accent); background: rgba(56,189,248,0.1); }
.res-btn .res-emoji { font-size: 20px; line-height: 0; }
.res-btn.selected { border-color: #fbbf24; background: rgba(251,191,36,0.15); }
.res-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>

<header>
  <a class="back-link" href="index.html">← 戻る / Back</a>
  <h1>🏝️ HEXLAN AI</h1>

<!-- Win Modal -->

</div>

<!-- Trade Modal -->
<div class="modal-overlay" id="trade-modal" hidden>

</div>

<!-- Year of Plenty Modal -->
<div class="modal-overlay" id="yop-modal" hidden>

    <h2 id="yop-title">収穫カード</h2>

    <div class="modal-btns" id="yop-btns"></div>

</div>

<!-- Monopoly Modal -->
<div class="modal-overlay" id="mono-modal" hidden>
  <div class="modal-box">
    <h2 id="mono-title">独占カード</h2>
    <p id="mono-label">独占する資源を選択</p>
    <div class="modal-btns" id="mono-btns"></div>
  </div>
</div>

<!-- Discard Modal -->
<div class="modal-overlay" id="discard-modal" hidden>
  <div class="modal-box">
    <h2 id="discard-title">手札を捨てる</h2>
    <p id="discard-label"></p>
    <div class="modal-btns" id="discard-btns"></div>

    <div class="modal-btns" style="margin-top:12px;">
      <button class="modal-btn" id="discard-ok-btn" onclick="confirmDiscard()" disabled>確定</button>
    </div>

</div>

<script>
'use strict';
// ===== CONSTANTS =====
const TERRAIN = { DESERT:0, WHEAT:1, WOOD:2, BRICK:3, ORE:4, SHEEP:5 };
const T_COLOR = { 0:'#6b4c17',1:'#a16207',2:'#1a5c2e',3:'#7c2d12',4:'#374151',5:'#2d5a1b' };
const T_EMOJI = { 0:'🏜️',1:'🌾',2:'🌲',3:'🧱',4:'⛏️',5:'🐑' };
const T_RES   = { 1:'wheat',2:'wood',3:'brick',4:'ore',5:'sheep' };
const RESOURCES = ['wheat','wood','brick','ore','sheep'];
const RES_EMOJI = { wheat:'🌾',wood:'🌲',brick:'🧱',ore:'⛏️',sheep:'🐑' };
const PLAYER_COLORS = ['#38bdf8','#f87171','#fbbf24','#a78bfa'];
const PLAYER_COLORS_CSS = ['var(--p0)','var(--p1)','var(--p2)','var(--p3)'];
const PROB_WEIGHT = {2:1,3:2,4:3,5:4,6:5,8:5,9:4,10:3,11:2,12:1};
const HEX_SIZE = 48;
const ASSET_PATHS = {
  terrain: 'assets/catan/gpt-image-2-catan-terrain-atlas.png',
  sprites: 'assets/catan/gpt-image-2-catan-sprites-atlas.png',
  dice: 'assets/catan/gpt-image-2-catan-dice-atlas.png',
};
const TERRAIN_CELLS = {
  [TERRAIN.DESERT]: [0,0],
  [TERRAIN.WHEAT]: [1,0],
  [TERRAIN.WOOD]: [2,0],
  [TERRAIN.BRICK]: [0,1],
  [TERRAIN.ORE]: [1,1],
  [TERRAIN.SHEEP]: [2,1],
  ocean: [0,2],
  harborWater: [1,2],
  parchment: [2,2],
};
const SPRITE_CELLS = {
  wheat: [0,0], wood: [1,0], brick: [2,0], ore: [3,0],
  sheep: [0,1], robber: [1,1], road: [2,1], settlement: [3,1],
  city: [0,2], port: [1,2], portWheat: [2,2], portWood: [3,2],
  portBrick: [0,3], portOre: [1,3], portSheep: [2,3],
};
const RES_ICON_POS = {
  wheat: '0% 0%',
  wood: '33.333% 0%',
  brick: '66.667% 0%',
  ore: '100% 0%',
  sheep: '0% 33.333%',
};
const DICE_FACE_POS = {
  1: '0% 0%',
  2: '50% 0%',
  3: '100% 0%',
  4: '0% 100%',
  5: '50% 100%',
  6: '100% 100%',
};
const PORT_ICON_CELL = {
  wheat: 'portWheat',
  wood: 'portWood',
  brick: 'portBrick',
  ore: 'portOre',
  sheep: 'portSheep',
};
const CATAN_ASSETS = {
  terrain: new Image(),
  sprites: new Image(),
  dice: new Image(),
  loaded: 0,
};

// Standard Catan terrain distribution
const TERRAIN_BAG = [
  TERRAIN.WHEAT,TERRAIN.WHEAT,TERRAIN.WHEAT,TERRAIN.WHEAT,
  TERRAIN.WOOD,TERRAIN.WOOD,TERRAIN.WOOD,TERRAIN.WOOD,
  TERRAIN.SHEEP,TERRAIN.SHEEP,TERRAIN.SHEEP,TERRAIN.SHEEP,
  TERRAIN.ORE,TERRAIN.ORE,TERRAIN.ORE,
  TERRAIN.BRICK,TERRAIN.BRICK,TERRAIN.BRICK,
  TERRAIN.DESERT
];
const NUMBER_BAG = [2,3,3,4,4,5,5,6,6,8,8,9,9,10,10,11,11,12];
const PORT_TYPES = ['3:1','3:1','3:1','3:1','wheat','wood','brick','ore','sheep'];

// Vertex neighbor offsets for pointy-top hex (axial coords)
// For hex (q,r), vertex vi is shared with neighbors at these offsets (if they exist on the board)
const V_NEIGH = [
  [[0,-1],[1,-1]],  // v0: top
  [[1,-1],[1,0]],   // v1: top-right
  [[1,0],[0,1]],    // v2: bottom-right
  [[0,1],[-1,1]],   // v3: bottom
  [[-1,1],[-1,0]],  // v4: bottom-left
  [[-1,0],[0,-1]],  // v5: top-left
];

// i18n
const I18N = {
  ja: {
    players:'プレイヤー', dice:'ダイス', hand:'手札（あなた）', log:'ログ',
    phase_setup1:'初期配置①: 開拓地を置いてください',
    phase_setup1r:'初期配置①: 道路を置いてください',
    phase_setup2:'初期配置②: 開拓地を置いてください',
    phase_setup2r:'初期配置②: 道路を置いてください',
    phase_roll:'サイコロを振ってください',
    phase_build:'建設・取引フェーズ',
    phase_discard:'手札が多すぎます。半分以下に捨ててください',
    phase_robber:'強盗を移動させてください',
    phase_steal:'略奪する相手の開拓地を選んでください',
    phase_road2:'道路建設: 道路を置いてください（残り#枚）',
    btn_roll:'🎲 サイコロを振る',
    btn_road:'道路 🌲+🧱',
    btn_settlement:'開拓地 🌲+🧱+🌾+🐑',
    btn_city:'都市 ⛏️×3+🌾×2',
    btn_devcard:'開発カード ⛏️+🌾+🐑',
    btn_trade:'銀行と取引',
    btn_endturn:'ターン終了',
    btn_knight:'騎士カード使用',
    btn_road_building:'道路建設カード使用',
    btn_year_of_plenty:'収穫カード使用',
    btn_monopoly:'独占カード使用',
    win:'🎉 勝利！', lose:'ゲーム終了',
    ai_turn:'AI思考中...',
    longest_road:'最長道路', largest_army:'最大軍勢',
    vp:'勝利点', knight:'騎士',
  },
  en: {
    players:'Players', dice:'Dice', hand:'Your Hand', log:'Log',
    phase_setup1:'Setup ①: Place a settlement',
    phase_setup1r:'Setup ①: Place a road',
    phase_setup2:'Setup ②: Place a settlement',
    phase_setup2r:'Setup ②: Place a road',
    phase_roll:'Roll the dice',
    phase_build:'Build & Trade Phase',
    phase_discard:'Too many cards. Discard to 7',
    phase_robber:'Move the robber',
    phase_steal:'Click an opponent\'s settlement to steal',
    phase_road2:'Road Building: Place a road (# left)',
    btn_roll:'🎲 Roll Dice',
    btn_road:'Road 🌲+🧱',
    btn_settlement:'Settlement 🌲+🧱+🌾+🐑',
    btn_city:'City ⛏️×3+🌾×2',
    btn_devcard:'Dev Card ⛏️+🌾+🐑',
    btn_trade:'Trade with Bank',
    btn_endturn:'End Turn',
    btn_knight:'Play Knight',
    btn_road_building:'Play Road Building',
    btn_year_of_plenty:'Play Year of Plenty',
    btn_monopoly:'Play Monopoly',
    win:'🎉 Victory!', lose:'Game Over',
    ai_turn:'AI thinking...',
    longest_road:'Longest Road', largest_army:'Largest Army',
    vp:'VP', knight:'Knights',
  }
};
let lang = 'ja';
function t(k){ return (I18N[lang][k]||I18N.ja[k]||k); }

// ===== GAME STATE =====
let G = {};

function createPlayer(i, isHuman) {
  return {
    id: i, isHuman,
    resources: {wheat:0,wood:0,brick:0,ore:0,sheep:0},
    devCards: [],       // {type, isNew}
    knightsPlayed: 0,
    hasLongestRoad: false,
    hasLargestArmy: false,
    settlements: [], cities: [], roads: [],
  };
}

// ===== BOARD GENERATION =====
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildHexes(cx, cy) {
  const coords = [];
  for (let q=-2;q<=2;q++)
    for (let r=-2;r<=2;r++)
      if (Math.abs(q+r)<=2) coords.push({q,r});

  const terrains = shuffle([...TERRAIN_BAG]);
  const numbers  = shuffle([...NUMBER_BAG]);
  let ni = 0;
  let desertHexId = null;

  return coords.map((c,i) => {
    const terrain = terrains[i];
    const diceNum = terrain===TERRAIN.DESERT ? null : numbers[ni++];
    const hcx = HEX_SIZE*(Math.sqrt(3)*c.q + Math.sqrt(3)/2*c.r) + cx;
    const hcy = HEX_SIZE*(1.5*c.r) + cy;
    const id = `${c.q},${c.r}`;
    if (terrain===TERRAIN.DESERT) desertHexId = id;
    return { id, q:c.q, r:c.r, terrain, diceNum, cx:hcx, cy:hcy };
  });
}

function hexById(id) { return G.hexes.find(h=>h.id===id); }

function buildGraph(hexes) {
  const vertexMap = {};
  const edgeMap   = {};
  const hexSet = new Set(hexes.map(h=>h.id));

  function vKey(q,r,vi) {
    const grp = [`${q},${r}`];
    for (const [dq,dr] of V_NEIGH[vi]) {
      const nk=`${q+dq},${r+dr}`;
      if (hexSet.has(nk)) grp.push(nk);
    }
    return grp.sort().join('|');
  }

  function cornerXY(h, vi) {
    const a = Math.PI/180*(60*vi+30);
    return { x: h.cx+HEX_SIZE*Math.cos(a), y: h.cy+HEX_SIZE*Math.sin(a) };
  }

  for (const h of hexes) {
    for (let vi=0;vi<6;vi++) {
      const vk = vKey(h.q,h.r,vi);
      if (!vertexMap[vk]) {
        const {x,y} = cornerXY(h,vi);
        vertexMap[vk] = { id:vk, x, y, hexIds:[], adjEdges:[], building:null, port:null };
      }
      if (!vertexMap[vk].hexIds.includes(h.id))
        vertexMap[vk].hexIds.push(h.id);

      // edge between vi and (vi+1)%6
      const vi2=(vi+1)%6;
      const vk2=vKey(h.q,h.r,vi2);
      if (!vertexMap[vk2]) {
        const {x,y}=cornerXY(h,vi2);
        vertexMap[vk2]={id:vk2,x,y,hexIds:[],adjEdges:[],building:null,port:null};
      }
      if (!vertexMap[vk2].hexIds.includes(h.id))
        vertexMap[vk2].hexIds.push(h.id);

      const ek=[vk,vk2].sort().join('~');
      if (!edgeMap[ek]) {
        edgeMap[ek]={id:ek,v1:vk,v2:vk2,hexIds:[],owner:null};
        vertexMap[vk].adjEdges.push(ek);
        vertexMap[vk2].adjEdges.push(ek);
      }
      if (!edgeMap[ek].hexIds.includes(h.id))
        edgeMap[ek].hexIds.push(h.id);
    }
  }

  // Build adjVertices for each vertex
  for (const v of Object.values(vertexMap)) {
    v.adjVertices = [];
    for (const eid of v.adjEdges) {
      const e = edgeMap[eid];
      const other = e.v1===v.id ? e.v2 : e.v1;
      v.adjVertices.push(other);
    }
  }

  return { vertexMap, edgeMap };
}

function assignPorts(vertexMap, edgeMap) {
  // Find coastal edges (only 1 hex in hexIds) = boundary
  const coastal = Object.values(edgeMap).filter(e=>e.hexIds.length===1);
  shuffle(coastal);
  const portTypes = shuffle([...PORT_TYPES]);
  const used = new Set();
  let pi = 0;
  for (const e of coastal) {
    if (pi >= portTypes.length) break;
    // avoid same vertex being two ports
    if (used.has(e.v1)||used.has(e.v2)) continue;
    const ptype = portTypes[pi++];
    vertexMap[e.v1].port = { type: ptype };
    vertexMap[e.v2].port = { type: ptype };
    used.add(e.v1); used.add(e.v2);
    e.portType = ptype;
  }
}

function buildDevDeck() {
  return shuffle([
    ...Array(14).fill('knight'),
    ...Array(5).fill('vp'),
    ...Array(2).fill('roadBuilding'),
    ...Array(2).fill('yearOfPlenty'),
    ...Array(2).fill('monopoly'),
  ]);
}

// ===== CLICK DETECTION =====
function getClosestVertex(px, py, threshold=20) {
  let best=null, bestD=Infinity;
  for (const v of Object.values(G.vertexMap)) {
    const d=Math.hypot(v.x-px,v.y-py);
    if (d<threshold&&d<bestD){bestD=d;best=v;}
  }
  return best;
}
function getClosestEdge(px, py, threshold=16) {
  let best=null, bestD=Infinity;
  for (const e of Object.values(G.edgeMap)) {
    const v1=G.vertexMap[e.v1], v2=G.vertexMap[e.v2];
    const mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
    const d=Math.hypot(mx-px,my-py);
    if (d<threshold&&d<bestD){bestD=d;best=e;}
  }
  return best;
}
function getClosestHex(px, py) {
  let best=null, bestD=Infinity;
  for (const h of G.hexes) {
    const d=Math.hypot(h.cx-px,h.cy-py);
    if (d<bestD){bestD=d;best=h;}
  }
  return best;
}

// ===== GAME LOGIC =====
function calcVP(pid) {
  const p = G.players[pid];
  let vp=0;
  for (const v of Object.values(G.vertexMap)) {
    if (!v.building||v.building.player!==pid) continue;
    vp += v.building.type==='city'?2:1;
  }
  vp += p.devCards.filter(c=>c.type==='vp').length;
  if (p.hasLongestRoad) vp+=2;
  if (p.hasLargestArmy) vp+=2;
  return vp;
}

function totalResources(pid) {
  const r=G.players[pid].resources;
  return Object.values(r).reduce((a,b)=>a+b,0);
}

function canAfford(pid, what) {
  const r=G.players[pid].resources;
  const c={
    road:       {wood:1,brick:1},
    settlement: {wood:1,brick:1,wheat:1,sheep:1},
    city:       {wheat:2,ore:3},
    devCard:    {wheat:1,ore:1,sheep:1},
  }[what];
  if (!c) return false;
  return Object.entries(c).every(([k,v])=>r[k]>=v);
}

function spend(pid, what) {
  const r=G.players[pid].resources;
  const c={
    road:       {wood:1,brick:1},
    settlement: {wood:1,brick:1,wheat:1,sheep:1},
    city:       {wheat:2,ore:3},
    devCard:    {wheat:1,ore:1,sheep:1},
  }[what];
  for (const [k,v] of Object.entries(c)) r[k]-=v;
}

function isValidSettlement(pid, vId, isSetup) {
  const v=G.vertexMap[vId];
  if (!v||v.building) return false;
  // distance rule
  for (const adjVId of v.adjVertices)
    if (G.vertexMap[adjVId].building) return false;
  if (isSetup) return true;
  // must connect to own road
  for (const eid of v.adjEdges)
    if (G.edgeMap[eid].owner===pid) return true;
  return false;
}

function isValidRoad(pid, eId, isSetup, lastV=null) {
  const e=G.edgeMap[eId];
  if (!e||e.owner!==null) return false;
  for (const vId of [e.v1,e.v2]) {
    if (lastV && vId!==lastV) continue;
    const v=G.vertexMap[vId];
    if (v.building?.player===pid) return true;
    if (v.building && v.building.player!==pid) continue; // blocked by opponent
    for (const adjEId of v.adjEdges)
      if (adjEId!==eId && G.edgeMap[adjEId].owner===pid) return true;
  }
  return false;
}

function getAdjVertices(vId) { return G.vertexMap[vId]?.adjVertices||[]; }
function getAdjEdges(vId) { return G.vertexMap[vId]?.adjEdges||[]; }

function getPlayerSettlements(pid) {
  return Object.values(G.vertexMap)
    .filter(v=>v.building?.player===pid&&v.building.type==='settlement')
    .map(v=>v.id);
}

function getValidSettlementVertices(pid, isSetup) {
  return Object.values(G.vertexMap)
    .filter(v=>isValidSettlement(pid,v.id,isSetup))
    .map(v=>v.id);
}

function getValidRoadEdges(pid, isSetup, lastV=null) {
  return Object.values(G.edgeMap)
    .filter(e=>isValidRoad(pid,e.id,isSetup,lastV))
    .map(e=>e.id);
}

function findEdgeId(v1Id, v2Id) {
  const k=[v1Id,v2Id].sort().join('~');
  return G.edgeMap[k]?k:null;
}

// Longest road via DFS
function calcLongestRoad(pid) {
  const adj={};
  for (const e of Object.values(G.edgeMap)) {
    if (e.owner!==pid) continue;
    (adj[e.v1]=adj[e.v1]||[]).push({v:e.v2,eid:e.id});
    (adj[e.v2]=adj[e.v2]||[]).push({v:e.v1,eid:e.id});
  }
  let maxLen=0;
  const visitedEdges=new Set();
  function dfs(v,depth) {
    maxLen=Math.max(maxLen,depth);
    for (const {v:next,eid} of (adj[v]||[])) {
      if (visitedEdges.has(eid)) continue;
      const nv=G.vertexMap[next];
      if (nv.building&&nv.building.player!==pid) {
        maxLen=Math.max(maxLen,depth+1);
        continue;
      }
      visitedEdges.add(eid);
      dfs(next,depth+1);
      visitedEdges.delete(eid);
    }
  }
  for (const v of Object.keys(adj)) { visitedEdges.clear(); dfs(v,0); }
  return maxLen;
}

function updateLongestRoad() {
  const MIN=5;
  const lengths=G.players.map((_,i)=>calcLongestRoad(i));
  let bestOwner=G.longestRoadOwner, bestLen=G.longestRoadOwner>=0?lengths[G.longestRoadOwner]:MIN-1;
  for (let i=0;i<4;i++) {
    if (lengths[i]>bestLen){bestLen=lengths[i];bestOwner=i;}
  }
  if (bestOwner!==G.longestRoadOwner) {
    if (G.longestRoadOwner>=0) G.players[G.longestRoadOwner].hasLongestRoad=false;
    G.longestRoadOwner=bestOwner;
    if (bestOwner>=0) {G.players[bestOwner].hasLongestRoad=true; addLog(`${playerName(bestOwner)}が最長道路ボーナス獲得！`);}
  }
}

function updateLargestArmy() {
  const MIN=3;
  let bestOwner=G.largestArmyOwner, best=G.largestArmyOwner>=0?G.players[G.largestArmyOwner].knightsPlayed:MIN-1;
  for (let i=0;i<4;i++) {
    if (G.players[i].knightsPlayed>best){best=G.players[i].knightsPlayed;bestOwner=i;}
  }
  if (bestOwner!==G.largestArmyOwner) {
    if (G.largestArmyOwner>=0) G.players[G.largestArmyOwner].hasLargestArmy=false;
    G.largestArmyOwner=bestOwner;
    if (bestOwner>=0){G.players[bestOwner].hasLargestArmy=true;addLog(`${playerName(bestOwner)}が最大軍勢ボーナス獲得！`);}
  }
}

function checkWin(pid) {
  if (calcVP(pid)>=10) {
    G.phase='win';
    G.winner=pid;
    showWinModal(pid);
    try {
      const KEY = 'game-score-history-v1';
      const h = JSON.parse(localStorage.getItem(KEY) || '[]');
      h.unshift({ game: 'HEXLAN', gameId: 'catan', score: calcVP(pid), result: pid===0?'win':'lose', timestamp: new Date().toISOString() });
      if (h.length > 50) h.length = 50;
      localStorage.setItem(KEY, JSON.stringify(h));
    } catch {}
    return true;
  }
  return false;
}

function addLog(msg) {
  G.log.unshift(msg);
  if (G.log.length>30) G.log.pop();
}

function playerName(i) {
  return ['あなた','AI赤','AI黄','AI紫'][i];
}

// ===== ACTIONS =====
function placeSettlement(pid, vId, isSetup) {
  const v=G.vertexMap[vId];
  v.building={player:pid,type:'settlement'};
  G.players[pid].settlements.push(vId);
  if (!isSetup) spend(pid,'settlement');
  addLog(`${playerName(pid)}が開拓地を建設`);
  updateLongestRoad();
  render(); updateUI();
  if (!isSetup) checkWin(pid);
}

function placeRoad(pid, eId, free=false) {
  const e=G.edgeMap[eId];
  e.owner=pid;
  G.players[pid].roads.push(eId);
  if (!free) spend(pid,'road');
  addLog(`${playerName(pid)}が道路を建設`);
  updateLongestRoad();
  render(); updateUI();
}

function buildCity(pid, vId) {
  const v=G.vertexMap[vId];
  v.building={player:pid,type:'city'};
  const si=G.players[pid].settlements.indexOf(vId);
  if (si>=0) G.players[pid].settlements.splice(si,1);
  G.players[pid].cities.push(vId);
  spend(pid,'city');
  addLog(`${playerName(pid)}が都市を建設`);
  render(); updateUI();
  checkWin(pid);
}

function buyDevCard(pid) {
  if (G.devDeck.length===0) return;
  const type=G.devDeck.pop();
  G.players[pid].devCards.push({type,isNew:true});
  spend(pid,'devCard');
  G.devBoughtThisTurn=true;
  addLog(`${playerName(pid)}が開発カードを購入`);
  if (type==='vp'&&pid===0) addLog('→ VPカード！');
  updateUI();
  if (type==='vp') checkWin(pid);
}

function distributeResources(total) {
  if (total===7) return;
  for (const h of G.hexes) {
    if (h.diceNum!==total||h.id===G.robberHexId) continue;
    const res=T_RES[h.terrain];
    if (!res) continue;
    for (const vId of Object.keys(G.vertexMap)) {
      const v=G.vertexMap[vId];
      if (!v.building||!v.hexIds.includes(h.id)) continue;
      const pid=v.building.player;
      const amt=v.building.type==='city'?2:1;
      G.players[pid].resources[res]+=amt;
    }
  }
}

function doRoll(pid) {
  const d1=Math.ceil(Math.random()*6), d2=Math.ceil(Math.random()*6);
  G.diceRoll=[d1,d2];
  G.diceRolled=true;
  const total=d1+d2;
  addLog(`${playerName(pid)}: ダイス ${d1}+${d2}=${total}`);
  setDieFace('die1',d1);
  setDieFace('die2',d2);
  document.getElementById('dice-total').textContent=total;

  if (total===7) {
    // check discard
    const mustDiscard=G.players
      .map((p,i)=>({i,n:totalResources(i)}))
      .filter(({n})=>n>7);
    if (mustDiscard.length>0) {
      G.pendingDiscard=[...mustDiscard.map(x=>x.i)];
      G.discardTemp={};
      processNextDiscard();
    } else {
      G.phase='moveRobber';
      updateUI();
      if (!G.players[G.turn].isHuman) setTimeout(()=>aiMoveRobber(G.turn),600);
    }
  } else {
    distributeResources(total);
    G.phase='build';
    updateUI();
    if (!G.players[pid].isHuman) setTimeout(()=>runAI(pid),600);
  }
}

// Discard logic
let discardPlayerIdx=null, discardTarget=0, discardSelected={};

function processNextDiscard() {
  if (G.pendingDiscard.length===0) {
    G.phase='moveRobber';
    updateUI();
    if (!G.players[G.turn].isHuman) {
      setTimeout(()=>aiMoveRobber(G.turn),600);
    }
    return;
  }
  discardPlayerIdx=G.pendingDiscard.shift();
  if (!G.players[discardPlayerIdx].isHuman) {
    aiDiscard(discardPlayerIdx);
    processNextDiscard();
    return;
  }
  discardTarget=Math.floor(totalResources(discardPlayerIdx)/2);
  discardSelected={wheat:0,wood:0,brick:0,ore:0,sheep:0};
  openDiscardModal(discardPlayerIdx,discardTarget);
}

function openDiscardModal(pid, target) {
  const modal=document.getElementById('discard-modal');
  document.getElementById('discard-title').textContent=`${playerName(pid)} - 手札を捨てる`;
  document.getElementById('discard-label').textContent=`${target}枚捨ててください（現在${totalResources(pid)}枚）`;
  document.getElementById('discard-count').textContent='0';
  const btns=document.getElementById('discard-btns');
  btns.innerHTML='';
  const p=G.players[pid];
  for (const res of RESOURCES) {
    if (p.resources[res]<=0) continue;
    const btn=document.createElement('button');
    btn.className='res-btn';
    btn.innerHTML=`${resIconHtml(res,'res-icon res-emoji')}<span>${res}</span><span>(${p.resources[res]})</span>`;
    btn.onclick=()=>discardOne(pid,res,target);
    btn.id=`discard-btn-${res}`;
    btns.appendChild(btn);
  }
  modal.hidden=false;
}

function discardOne(pid,res,target) {
  const p=G.players[pid];
  const total=Object.values(discardSelected).reduce((a,b)=>a+b,0);
  if (total>=target) return;
  if ((discardSelected[res]||0)>=p.resources[res]) return;
  discardSelected[res]=(discardSelected[res]||0)+1;
  const newTotal=Object.values(discardSelected).reduce((a,b)=>a+b,0);
  document.getElementById('discard-count').textContent=newTotal;
  document.getElementById('discard-ok-btn').disabled=(newTotal<target);
}

function confirmDiscard() {
  const p=G.players[discardPlayerIdx];
  for (const [res,n] of Object.entries(discardSelected)) p.resources[res]-=n;
  closeModal('discard-modal');
  processNextDiscard();
}

function aiDiscard(pid) {
  const p=G.players[pid];
  const total=totalResources(pid);
  let toDiscard=Math.floor(total/2);
  // discard lowest-value resources first
  const order=['wheat','sheep','wood','brick','ore'];
  for (const res of order) {
    while (toDiscard>0&&p.resources[res]>0) {
      p.resources[res]--;
      toDiscard--;
    }
  }
}

function moveRobber(newHexId) {
  G.robberHexId=newHexId;
  G.phase='build';
  addLog(`${playerName(G.turn)}が強盗を移動`);
  // find steal targets: players with buildings adjacent to new robber hex
  const targets=new Set();
  for (const v of Object.values(G.vertexMap)) {
    if (!v.building||v.building.player===G.turn) continue;
    if (v.hexIds.includes(newHexId)) targets.add(v.building.player);
  }
  if (targets.size>0) {
    G.phase='steal';
    G.stealTargets=[...targets];
    updateUI();
    if (!G.players[G.turn].isHuman) {
      setTimeout(()=>aiSteal(G.turn),400);
    }
  } else {
    render(); updateUI();
    if (!G.players[G.turn].isHuman) setTimeout(()=>runAI(G.turn),400);
  }
}

function stealFrom(targetPid) {
  const tp=G.players[targetPid];
  const available=RESOURCES.filter(r=>tp.resources[r]>0);
  if (available.length>0) {
    const res=available[Math.floor(Math.random()*available.length)];
    tp.resources[res]--;
    G.players[G.turn].resources[res]++;
    addLog(`${playerName(G.turn)}が${playerName(targetPid)}から${RES_EMOJI[res]}を略奪`);
  }
  G.phase='build';
  G.stealTargets=[];
  render(); updateUI();
  if (!G.players[G.turn].isHuman) setTimeout(()=>runAI(G.turn),400);
}

function endTurn() {
  // mark dev cards as playable
  for (const p of G.players)
    for (const c of p.devCards) c.isNew=false;
  G.devUsedThisTurn=false;
  G.devBoughtThisTurn=false;
  G.diceRolled=false;
  G.diceRoll=null;
  setDieFace('die1',null);
  setDieFace('die2',null);
  document.getElementById('dice-total').textContent='-';
  G.turn=(G.turn+1)%4;
  G.phase='roll';
  addLog(`--- ${playerName(G.turn)}のターン ---`);
  render(); updateUI();
  if (!G.players[G.turn].isHuman) setTimeout(()=>doAITurn(G.turn),500);
}

function getTradeRate(pid, res) {
  let rate=4;
  const pVerts=Object.values(G.vertexMap)
    .filter(v=>v.building?.player===pid&&v.port);
  for (const v of pVerts) {
    if (v.port.type==='3:1'&&rate>3) rate=3;
    if (v.port.type===res) rate=2;
  }
  return rate;
}

// ===== DEV CARDS =====
function playDevCard(pid, type) {
  const p=G.players[pid];
  const ci=p.devCards.findIndex(c=>c.type===type&&!c.isNew);
  if (ci<0) return false;
  p.devCards.splice(ci,1);
  G.devUsedThisTurn=true;

  if (type==='knight') {
    p.knightsPlayed++;
    updateLargestArmy();
    addLog(`${playerName(pid)}が騎士カードを使用`);
    G.phase='moveRobber';
    updateUI();
    if (!p.isHuman) setTimeout(()=>aiMoveRobber(pid),600);
    return true;
  }
  if (type==='vp') {
    addLog(`${playerName(pid)}がVPカードを公開！`);
    updateUI();
    checkWin(pid);
    return true;
  }
  if (type==='roadBuilding') {
    G.roadBuildingCount=2;
    G.mode='placingRoad';
    addLog(`${playerName(pid)}が道路建設カードを使用`);
    updateUI();
    if (!p.isHuman) {
      setTimeout(()=>aiRoadBuilding(pid),400);
    }
    return true;
  }
  if (type==='yearOfPlenty') {
    if (p.isHuman) openYopModal(pid);
    else aiYearOfPlenty(pid);
    return true;
  }
  if (type==='monopoly') {
    if (p.isHuman) openMonoModal(pid);
    else aiMonopoly(pid);
    return true;
  }
  return false;
}

function openYopModal(pid) {
  G.yopPid=pid; G.yopSelected=[];
  document.getElementById('yop-count').textContent=2;
  const btns=document.getElementById('yop-btns');
  btns.innerHTML='';
  for (const res of RESOURCES) {
    const b=document.createElement('button');
    b.className='res-btn';
    b.innerHTML=`${resIconHtml(res,'res-icon res-emoji')}<span>${res}</span>`;
    b.onclick=()=>yopSelect(res);
    b.id=`yop-${res}`;
    btns.appendChild(b);
  }
  document.getElementById('yop-modal').hidden=false;
}

function yopSelect(res) {
  if (G.yopSelected.length>=2) return;
  G.yopSelected.push(res);
  G.players[G.yopPid].resources[res]++;
  document.getElementById('yop-count').textContent=2-G.yopSelected.length;
  if (G.yopSelected.length===2) {
    closeModal('yop-modal');
    addLog(`${playerName(G.yopPid)}が収穫カードで${G.yopSelected.map(r=>RES_EMOJI[r]).join('')}取得`);
    updateUI();
  }
}

function openMonoModal(pid) {
  G.monoPid=pid;
  const btns=document.getElementById('mono-btns');
  btns.innerHTML='';
  for (const res of RESOURCES) {
    const b=document.createElement('button');
    b.className='res-btn';
    b.innerHTML=`${resIconHtml(res,'res-icon res-emoji')}<span>${res}</span>`;
    b.onclick=()=>monoSelect(res);
    btns.appendChild(b);
  }
  document.getElementById('mono-modal').hidden=false;
}

function monoSelect(res) {
  closeModal('mono-modal');
  let stolen=0;
  for (let i=0;i<4;i++) {
    if (i===G.monoPid) continue;
    stolen+=G.players[i].resources[res];
    G.players[G.monoPid].resources[res]+=G.players[i].resources[res];
    G.players[i].resources[res]=0;
  }
  addLog(`${playerName(G.monoPid)}が独占: ${RES_EMOJI[res]} ${stolen}枚取得`);
  updateUI();
}

function aiYearOfPlenty(pid) {
  // Take the resources we need most
  const p=G.players[pid];
  const needs=['ore','wheat','sheep','wood','brick']
    .filter(r=>p.resources[r]<2);
  const take=needs.slice(0,2);
  while(take.length<2) take.push('wheat');
  for (const r of take) p.resources[r]++;
  addLog(`${playerName(pid)}が収穫カードを使用`);
  updateUI();
}

function aiMonopoly(pid) {
  // Choose the resource we have least of
  const res=['ore','wheat','brick','wood','sheep']
    .reduce((a,b)=>G.players[pid].resources[a]<=G.players[pid].resources[b]?a:b);
  let stolen=0;
  for (let i=0;i<4;i++) {
    if (i===pid) continue;
    stolen+=G.players[i].resources[res];
    G.players[pid].resources[res]+=G.players[i].resources[res];
    G.players[i].resources[res]=0;
  }
  addLog(`${playerName(pid)}が独占: ${RES_EMOJI[res]} ${stolen}枚取得`);
  updateUI();
}

// ===== TRADE MODAL =====
let tradeGiveRes=null;
function openTradeModal() {
  tradeGiveRes=null;
  document.getElementById('trade-give-btns').innerHTML='';
  document.getElementById('trade-get-btns').innerHTML='';
  document.getElementById('trade-get-label').style.display='none';
  const btns=document.getElementById('trade-give-btns');
  const p=G.players[0];
  for (const res of RESOURCES) {
    const rate=getTradeRate(0,res);
    if (p.resources[res]<rate) continue;
    const b=document.createElement('button');
    b.className='res-btn';
    b.innerHTML=`${resIconHtml(res,'res-icon res-emoji')}<span>${res}</span><span>${rate}:1</span>`;
    b.onclick=()=>tradeSelectGive(res,rate);
    btns.appendChild(b);
  }
  document.getElementById('trade-modal').hidden=false;
}

function tradeSelectGive(res,rate) {
  tradeGiveRes={res,rate};
  // show get buttons
  document.getElementById('trade-get-label').style.display='';
  const btns=document.getElementById('trade-get-btns');
  btns.innerHTML='';
  for (const r of RESOURCES) {
    if (r===res) continue;
    const b=document.createElement('button');
    b.className='res-btn';
    b.innerHTML=`${resIconHtml(r,'res-icon res-emoji')}<span>${r}</span>`;
    b.onclick=()=>executeTrade(res,rate,r);
    btns.appendChild(b);
  }
}

function executeTrade(giveRes,rate,getRes) {
  const p=G.players[0];
  p.resources[giveRes]-=rate;
  p.resources[getRes]++;
  closeModal('trade-modal');
  addLog(`あなたが取引: ${RES_EMOJI[giveRes]}×${rate} → ${RES_EMOJI[getRes]}`);
  updateUI();
}

function closeModal(id) {
  document.getElementById(id).hidden=true;
}

// ===== SETUP PHASE =====
const SETUP_ORDER=[0,1,2,3,3,2,1,0];

function nextSetupStep() {
  G.setupStep++;
  if (G.setupStep>=SETUP_ORDER.length) {
    // Setup complete
    G.phase='roll';
    G.turn=0;
    addLog('--- ゲーム開始！ ---');
    addLog(`--- ${playerName(0)}のターン ---`);
    render(); updateUI();
    return;
  }
  G.turn=SETUP_ORDER[G.setupStep];
  G.setupNeedsRoad=false;
  const isP2=(G.setupStep>=4);
  G.phase=isP2?'setup2':'setup1';
  render(); updateUI();
  if (!G.players[G.turn].isHuman) {
    setTimeout(()=>aiSetup(G.turn),600);
  }
}

function handleSetupSettlement(vId) {
  const pid=G.turn;
  const v=G.vertexMap[vId];
  v.building={player:pid,type:'settlement'};
  G.players[pid].settlements.push(vId);
  G.lastSettlement=vId;
  // Setup round 2: collect resources
  if (G.setupStep>=4) {
    for (const hId of v.hexIds) {
      const h=hexById(hId);
      if (h&&h.terrain!==TERRAIN.DESERT&&T_RES[h.terrain])
        G.players[pid].resources[T_RES[h.terrain]]++;
    }
  }
  addLog(`${playerName(pid)}が開拓地を配置`);
  G.setupNeedsRoad=true;
  render(); updateUI();
  if (!G.players[pid].isHuman) {
    setTimeout(()=>aiSetup(pid),450);
  }
}

function handleSetupRoad(eId) {
  const pid=G.turn;
  const e=G.edgeMap[eId];
  e.owner=pid;
  G.players[pid].roads.push(eId);
  addLog(`${playerName(pid)}が道路を配置`);
  G.setupNeedsRoad=false;
  G.lastSettlement=null;
  render();
  setTimeout(()=>nextSetupStep(),200);
}

// ===== AI =====
function scoreVertex(vId) {
  let score=0;
  for (const hId of G.vertexMap[vId].hexIds) {
    const h=hexById(hId);
    if (!h||h.terrain===TERRAIN.DESERT) continue;
    score+=PROB_WEIGHT[h.diceNum]||0;
  }
  return score;
}

function aiSetup(pid) {
  if (!G.setupNeedsRoad) {
    // Place settlement
    const candidates=getValidSettlementVertices(pid,true)
      .sort((a,b)=>scoreVertex(b)-scoreVertex(a));
    if (candidates.length>0) handleSetupSettlement(candidates[0]);
  } else {
    // Place road adjacent to last settlement
    const valid=getValidRoadEdges(pid,true,G.lastSettlement);
    if (valid.length>0) handleSetupRoad(valid[0]);
  }
}

function aiMoveRobber(pid) {
  // Find hex with most opponent settlements, not current robber
  let bestHex=null, bestScore=-1;
  for (const h of G.hexes) {
    if (h.id===G.robberHexId) continue;
    let score=(PROB_WEIGHT[h.diceNum]||0);
    let hasOpponent=false;
    for (const v of Object.values(G.vertexMap)) {
      if (!v.building||!v.hexIds.includes(h.id)) continue;
      if (v.building.player!==pid){hasOpponent=true;score+=5;}
      else score-=3;
    }
    if (score>bestScore){bestScore=score;bestHex=h;}
  }
  if (bestHex) moveRobber(bestHex.id);
  else {
    const any=G.hexes.find(h=>h.id!==G.robberHexId);
    if (any) moveRobber(any.id);
  }
}

function aiSteal(pid) {
  if (G.stealTargets.length===0){G.phase='build';updateUI();return;}
  // Steal from player with most resources
  const target=G.stealTargets.reduce((a,b)=>totalResources(b)>totalResources(a)?b:a);
  stealFrom(target);
}

function aiRoadBuilding(pid) {
  for (let i=0;i<2;i++) {
    const valid=getValidRoadEdges(pid,false);
    if (valid.length===0) break;
    placeRoad(pid,valid[0],true);
  }
  G.mode='normal';
  G.roadBuildingCount=0;
  updateUI();
}

function doAITurn(pid) {
  if (G.phase!=='roll') return;
  doRoll(pid);
}

async function runAI(pid) {
  if (G.phase!=='build') return;
  const p=G.players[pid];
  // play knight if robber on own hex
  const hasKnight=p.devCards.some(c=>c.type==='knight'&&!c.isNew);
  if (hasKnight&&!G.devUsedThisTurn) {
    // Check if robber is on a hex adjacent to own settlement
    const robberBothers=Object.values(G.vertexMap).some(v=>
      v.building?.player===pid&&v.hexIds.includes(G.robberHexId)
    );
    if (robberBothers) {
      playDevCard(pid,'knight');
      return; // will continue after robber move
    }
  }

  let acted=true;
  while (acted) {
    acted=false;
    if (G.phase!=='build') return;
    // City
    if (canAfford(pid,'city')) {
      const sv=getPlayerSettlements(pid);
      if (sv.length>0) {
        sv.sort((a,b)=>scoreVertex(b)-scoreVertex(a));
        buildCity(pid,sv[0]);
        if (checkWin(pid)) return;
        acted=true; continue;
      }
    }
    // Settlement
    if (canAfford(pid,'settlement')) {
      const valid=getValidSettlementVertices(pid,false);
      if (valid.length>0) {
        valid.sort((a,b)=>scoreVertex(b)-scoreVertex(a));
        placeSettlement(pid,valid[0],false);
        if (checkWin(pid)) return;
        acted=true; continue;
      }
    }
    // Dev card
    if (canAfford(pid,'devCard')&&G.devDeck.length>0&&!G.devBoughtThisTurn) {
      buyDevCard(pid);
      if (checkWin(pid)) return;
      acted=true; continue;
    }
    // Road
    if (canAfford(pid,'road')) {
      const valid=getValidRoadEdges(pid,false);
      if (valid.length>0) {
        placeRoad(pid,valid[0]);
        acted=true; continue;
      }
    }
    // AI trade: if can't do anything, try to trade
    if (!acted) {
      const tradeTarget=tryAITrade(pid);
      if (tradeTarget) { acted=true; continue; }
    }
  }
  setTimeout(()=>endTurn(),400);
}

function tryAITrade(pid) {
  const p=G.players[pid];
  // Check if we can trade to afford something useful
  const targets=['settlement','city','road','devCard'];
  for (const what of targets) {
    const cost={
      road:{wood:1,brick:1},
      settlement:{wood:1,brick:1,wheat:1,sheep:1},
      city:{wheat:2,ore:3},
      devCard:{wheat:1,ore:1,sheep:1}
    }[what];
    const missing=Object.entries(cost).filter(([r,n])=>p.resources[r]<n);
    if (missing.length!==1) continue;
    const [needRes]=missing[0];
    // Find excess resource
    const excess=RESOURCES.filter(r=>r!==needRes&&p.resources[r]>=getTradeRate(pid,r));
    if (excess.length===0) continue;
    const giveRes=excess[0];
    const rate=getTradeRate(pid,giveRes);
    p.resources[giveRes]-=rate;
    p.resources[needRes]++;
    addLog(`${playerName(pid)}が取引: ${RES_EMOJI[giveRes]}→${RES_EMOJI[needRes]}`);
    updateUI();
    return true;
  }
  return false;
}

// ===== RENDERING =====
const OCEAN_COLOR='#0e3a5c';
const OCEAN_BORDER='#0a2a45';

function hexPath(cx,cy,size) {
  const path=new Path2D();
  for (let i=0;i<6;i++) {
    const a=Math.PI/180*(60*i+30);
    const x=cx+size*Math.cos(a), y=cy+size*Math.sin(a);
    i===0?path.moveTo(x,y):path.lineTo(x,y);
  }
  path.closePath();
  return path;
}

function imageReady(img) {
  return img?.complete && img.naturalWidth > 0;
}

function drawAtlasCell(img, cell, cols, rows, x, y, w, h) {
  if (!imageReady(img)) return false;
  const sw=img.naturalWidth/cols;
  const sh=img.naturalHeight/rows;
  ctx.drawImage(img, cell[0]*sw, cell[1]*sh, sw, sh, x, y, w, h);
  return true;
}

function drawTerrainCell(cell, x, y, w, h) {
  return drawAtlasCell(CATAN_ASSETS.terrain, cell, 3, 3, x, y, w, h);
}

function drawSpriteCell(name, x, y, w, h) {
  return drawAtlasCell(CATAN_ASSETS.sprites, SPRITE_CELLS[name], 4, 4, x, y, w, h);
}

function resIconHtml(res, className='res-icon') {
  return `<span class="${className}" style="background-position:${RES_ICON_POS[res]}"></span>`;
}

function drawHex(h) {
  const path=hexPath(h.cx,h.cy,HEX_SIZE-1);
  ctx.save();
  ctx.clip(path);
  const drewTexture=drawTerrainCell(TERRAIN_CELLS[h.terrain], h.cx-HEX_SIZE, h.cy-HEX_SIZE, HEX_SIZE*2, HEX_SIZE*2);
  if (!drewTexture) {
    ctx.fillStyle=T_COLOR[h.terrain];
    ctx.fill(path);
  }
  ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.035)';
  ctx.fill(path);
  ctx.strokeStyle='rgba(0,0,0,0.4)';
  ctx.lineWidth=1.5;
  ctx.stroke(path);
}

function drawNumberToken(h) {
  if (!h.diceNum) return;
  const is68=h.diceNum===6||h.diceNum===8;
  ctx.beginPath();
  ctx.arc(h.cx,h.cy,15,0,Math.PI*2);
  ctx.save();
  ctx.clip();
  const drewParchment=drawTerrainCell(TERRAIN_CELLS.parchment, h.cx-15, h.cy-15, 30, 30);
  if (!drewParchment) {
    ctx.fillStyle='rgba(240,225,190,0.95)';
    ctx.fillRect(h.cx-15,h.cy-15,30,30);
  }
  ctx.restore();
  ctx.strokeStyle=is68?'#c00':'rgba(0,0,0,0.3)';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.fillStyle=is68?'#a00':'#222';
  ctx.font=`bold ${h.diceNum>=10?11:13}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(h.diceNum,h.cx,h.cy);
  const pips=PROB_WEIGHT[h.diceNum]||0;
  for (let i=0;i<pips;i++) {
    ctx.beginPath();
    ctx.arc(h.cx-(pips-1)*3+i*6,h.cy+11,1.5,0,Math.PI*2);
    ctx.fillStyle=is68?'#c00':'#555';
    ctx.fill();
  }
}

function rgba(r,g,b,a){return `rgba(${r},${g},${b},${a})`;}

function drawRobber(h) {
  if (drawSpriteCell('robber', h.cx-17, h.cy-26, 34, 44)) return;
  ctx.save();
  ctx.translate(h.cx,h.cy);
  ctx.fillStyle='#1f2937';
  ctx.strokeStyle='#6b7280';
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,6,6,9,0,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-6,6.5,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.arc(-2,-7,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-7,1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawRoad(e) {
  const v1=G.vertexMap[e.v1],v2=G.vertexMap[e.v2];
  const mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
  const angle=Math.atan2(v2.y-v1.y,v2.x-v1.x);
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(v1.x,v1.y); ctx.lineTo(v2.x,v2.y);
  ctx.strokeStyle=PLAYER_COLORS[e.owner];
  ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();
  ctx.globalCompositeOperation='source-over';
  ctx.translate(mx,my);
  ctx.rotate(angle);
  if (drawSpriteCell('road', -20, -8, 40, 16)) {
    ctx.restore();
    return;
  }
  ctx.restore();
  ctx.beginPath();
  ctx.moveTo(v1.x,v1.y); ctx.lineTo(v2.x,v2.y);
  ctx.strokeStyle=PLAYER_COLORS[e.owner];
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=2; ctx.stroke();
}

function drawSettlement(v) {
  const c=PLAYER_COLORS[v.building.player];
  ctx.save();
  ctx.translate(v.x,v.y);
  ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2);
  ctx.fillStyle=c; ctx.globalAlpha=0.75; ctx.fill();
  ctx.globalAlpha=1;
  if (drawSpriteCell('settlement', -14, -22, 28, 28)) {
    ctx.restore();
    return;
  }
  ctx.restore();
  ctx.save(); ctx.translate(v.x,v.y);
  ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(10,-5); ctx.lineTo(-10,-5); ctx.closePath();
  ctx.fillStyle=c; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillRect(-8,-5,16,11);
  ctx.strokeRect(-8,-5,16,11);
  ctx.restore();
}

function drawCity(v) {
  const c=PLAYER_COLORS[v.building.player];
  ctx.save();
  ctx.translate(v.x,v.y);
  ctx.beginPath(); ctx.arc(0,-1,18,0,Math.PI*2);
  ctx.fillStyle=c; ctx.globalAlpha=0.78; ctx.fill();
  ctx.globalAlpha=1;
  if (drawSpriteCell('city', -18, -29, 36, 38)) {
    ctx.restore();
    return;
  }
  ctx.restore();
  ctx.save(); ctx.translate(v.x,v.y);
  ctx.fillStyle=c; ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5;
  ctx.fillRect(-13,-14,11,18); ctx.strokeRect(-13,-14,11,18);
  ctx.fillRect(-2,-8,13,12); ctx.strokeRect(-2,-8,13,12);
  ctx.beginPath(); ctx.moveTo(-2,-14); ctx.lineTo(11,-14); ctx.lineTo(4.5,-20); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPortLabel(e) {
  if (!e.portType) return;
  const v1=G.vertexMap[e.v1],v2=G.vertexMap[e.v2];
  const mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1;
  const w=38,ph=16;
  ctx.fillRect(mx-w/2,my-ph/2,w,ph);
  ctx.strokeRect(mx-w/2,my-ph/2,w,ph);
  const iconName=e.portType==='3:1'?'port':PORT_ICON_CELL[e.portType];
  if (iconName) drawSpriteCell(iconName, mx-w/2+2, my-7, 14, 14);
  ctx.fillStyle='#fff';
  ctx.font='bold 9px monospace';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const label=e.portType==='3:1'?'3:1':'2:1';
  ctx.fillText(label,mx+7,my);
  ctx.restore();
}

function drawHighlights() {
  const isSetup=G.phase==='setup1'||G.phase==='setup2';

  if (!G.setupNeedsRoad&&(isSetup||G.mode==='placingSettlement')) {
    for (const v of Object.values(G.vertexMap)) {
      if (!isValidSettlement(G.turn,v.id,isSetup)) continue;
      ctx.beginPath(); ctx.arc(v.x,v.y,12,0,Math.PI*2);
      ctx.fillStyle='rgba(251,191,36,0.25)'; ctx.fill();
      ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2; ctx.stroke();
    }
  }

  if (G.setupNeedsRoad||G.mode==='placingRoad') {
    for (const e of Object.values(G.edgeMap)) {
      const lastV=G.setupNeedsRoad?G.lastSettlement:null;
      if (!isValidRoad(G.turn,e.id,isSetup,lastV)) continue;
      const v1=G.vertexMap[e.v1],v2=G.vertexMap[e.v2];
      const mx=(v1.x+v2.x)/2,my=(v1.y+v2.y)/2;
      ctx.beginPath(); ctx.arc(mx,my,8,0,Math.PI*2);
      ctx.fillStyle='rgba(56,189,248,0.3)'; ctx.fill();
      ctx.strokeStyle='#38bdf8'; ctx.lineWidth=2; ctx.stroke();
    }
  }

  if (G.mode==='placingCity') {
    for (const v of Object.values(G.vertexMap)) {
      if (v.building?.player!==G.turn||v.building?.type!=='settlement') continue;
      ctx.beginPath(); ctx.arc(v.x,v.y,14,0,Math.PI*2);
      ctx.fillStyle='rgba(167,139,250,0.25)'; ctx.fill();
      ctx.strokeStyle='#a78bfa'; ctx.lineWidth=2; ctx.stroke();
    }
  }

  if (G.phase==='moveRobber') {
    for (const h of G.hexes) {
      if (h.id===G.robberHexId) continue;
      const path=hexPath(h.cx,h.cy,HEX_SIZE-1);
      ctx.fillStyle='rgba(248,113,113,0.15)'; ctx.fill(path);
      ctx.strokeStyle='#f87171'; ctx.lineWidth=2; ctx.stroke(path);
    }
  }

  if (G.phase==='steal') {
    for (const v of Object.values(G.vertexMap)) {
      if (!v.building||!G.stealTargets.includes(v.building.player)) continue;
      if (!v.hexIds.includes(G.robberHexId)) continue;
      ctx.beginPath(); ctx.arc(v.x,v.y,15,0,Math.PI*2);
      ctx.fillStyle='rgba(248,113,113,0.25)'; ctx.fill();
      ctx.strokeStyle='#f87171'; ctx.lineWidth=2; ctx.stroke();
    }
  }
}

function render() {
  ctx.clearRect(0,0,W,H);

  // Ocean bg
  if (!drawTerrainCell(TERRAIN_CELLS.ocean, 0, 0, W, H)) {
    ctx.fillStyle=OCEAN_COLOR;
    ctx.fillRect(0,0,W,H);
  }
  ctx.fillStyle='rgba(11,16,32,0.18)';
  ctx.fillRect(0,0,W,H);

  // Outer ring (ocean hexes at radius 3)
  for (let q=-3;q<=3;q++) {
    for (let r=-3;r<=3;r++) {
      if (Math.abs(q+r)>3) continue;
      if (Math.abs(q)<=2&&Math.abs(r)<=2&&Math.abs(q+r)<=2) continue;
      const hcx=HEX_SIZE*(Math.sqrt(3)*q+Math.sqrt(3)/2*r)+BOARD_CX;
      const hcy=HEX_SIZE*(1.5*r)+BOARD_CY;
      const path=hexPath(hcx,hcy,HEX_SIZE-1);
      ctx.save();
      ctx.clip(path);
      const drewOcean=drawTerrainCell(TERRAIN_CELLS.harborWater, hcx-HEX_SIZE, hcy-HEX_SIZE, HEX_SIZE*2, HEX_SIZE*2);
      if (!drewOcean) {
        ctx.fillStyle='rgba(10,42,69,0.7)';
        ctx.fill(path);
      }
      ctx.restore();
      ctx.strokeStyle='rgba(14,58,92,0.8)'; ctx.lineWidth=1; ctx.stroke(path);
    }
  }

  // Port labels on edges
  for (const e of Object.values(G.edgeMap)) drawPortLabel(e);

  // Land hexes
  for (const h of G.hexes) drawHex(h);

  // Number tokens
  for (const h of G.hexes) drawNumberToken(h);

  // Robber
  const rh=hexById(G.robberHexId);
  if (rh) drawRobber(rh);

  // Highlights
  drawHighlights();

  // Roads
  for (const e of Object.values(G.edgeMap))
    if (e.owner!==null) drawRoad(e);

  // Buildings
  for (const v of Object.values(G.vertexMap)) {
    if (!v.building) continue;
    if (v.building.type==='settlement') drawSettlement(v);
    else drawCity(v);
  }
}

// ===== UI =====
function updateUI() {
  updatePlayerSummary();
  updateResourceArea();
  updateDevCardArea();
  updateStatus();
  updateButtons();
  updateLog();
}

function updatePlayerSummary() {
  const div=document.getElementById('player-summary');
  div.innerHTML='';
  for (let i=0;i<4;i++) {
    const p=G.players[i];
    const vp=calcVP(i);
    const row=document.createElement('div');
    row.className='player-row'+(G.turn===i?' active':'');
    const bonuses=[];
    if (p.hasLongestRoad) bonuses.push('🛣️');
    if (p.hasLargestArmy) bonuses.push('⚔️');
    row.innerHTML=`
      <div class="player-dot" style="background:${PLAYER_COLORS[i]}"></div>
      <div class="player-name">${playerName(i)}</div>
      <div class="player-vp">${vp} ${t('vp')}</div>
      <div class="player-bonus">${bonuses.join('')}</div>
    `;
    div.appendChild(row);
  }
  // update panel title
  document.getElementById('ptitle-players').textContent=t('players');
  document.getElementById('ptitle-dice').textContent=t('dice');
  document.getElementById('ptitle-resources').textContent=t('hand');
  document.getElementById('ptitle-log').textContent=t('log');
}

function updateResourceArea() {
  const div=document.getElementById('resource-area');
  div.innerHTML='';
  const p=G.players[0];
  for (const res of RESOURCES) {
    const chip=document.createElement('div');
    chip.className='res-chip';
    chip.innerHTML=`${resIconHtml(res)}<span class="res-count">${p.resources[res]}</span>`;
    div.appendChild(chip);
  }
}

function updateDevCardArea() {
  const div=document.getElementById('devcard-area');
  div.innerHTML='';
  const p=G.players[0];
  const counts={};
  for (const c of p.devCards) {
    const k=c.type+(c.isNew?'*':'');
    counts[k]=(counts[k]||0)+1;
  }
  const labels={knight:'騎士',vp:'VP',roadBuilding:'道路建設',yearOfPlenty:'収穫',monopoly:'独占'};
  for (const c of p.devCards) {
    const chip=document.createElement('div');
    chip.className='dev-chip'+(c.isNew?' used':'');
    chip.textContent=(labels[c.type]||c.type)+(c.isNew?'(new)':'');
    if (!c.isNew&&G.phase==='build'&&G.turn===0&&!G.devUsedThisTurn) {
      chip.onclick=()=>{
        if (c.type==='vp') playDevCard(0,'vp');
        else if (c.type==='knight') playDevCard(0,'knight');
        else if (c.type==='roadBuilding') playDevCard(0,'roadBuilding');
        else if (c.type==='yearOfPlenty') playDevCard(0,'yearOfPlenty');
        else if (c.type==='monopoly') playDevCard(0,'monopoly');
      };
    }
    div.appendChild(chip);
  }
}

function updateStatus() {
  const el=document.getElementById('status-msg');
  const isSetup=G.phase==='setup1'||G.phase==='setup2';
  if (G.turn!==0&&!isSetup) {
    el.textContent=t('ai_turn');
    return;
  }
  const msgs={
    setup1: G.setupNeedsRoad?t('phase_setup1r'):t('phase_setup1'),
    setup2: G.setupNeedsRoad?t('phase_setup2r'):t('phase_setup2'),
    roll: t('phase_roll'),
    build: t('phase_build'),
    discard: t('phase_discard'),
    moveRobber: t('phase_robber'),
    steal: t('phase_steal'),
    win: G.winner===0?t('win'):t('lose'),
  };
  if (G.mode==='placingRoad'&&G.roadBuildingCount>0) {
    el.textContent=t('phase_road2').replace('#',G.roadBuildingCount);
  } else {
    el.textContent=msgs[G.phase]||t('phase_build');
  }
}

function updateButtons() {
  const div=document.getElementById('btn-group');
  div.innerHTML='';
  if (G.turn!==0) return;
  if (G.phase==='win') return;
  const isSetup=G.phase==='setup1'||G.phase==='setup2';
  if (isSetup) return; // clicks on canvas

  if (G.phase==='roll') {
    addBtn(t('btn_roll'),'primary',()=>doRoll(0));
    return;
  }
  if (G.phase==='moveRobber') return; // canvas click
  if (G.phase==='steal') return;
  if (G.mode==='placingRoad'||G.mode==='placingSettlement'||G.mode==='placingCity') {
    addBtn('キャンセル / Cancel','danger',cancelMode);
    return;
  }
  if (G.phase==='build') {
    const p=G.players[0];
    addBtn(t('btn_road'),'',()=>setMode('placingRoad'),!canAfford(0,'road'));
    addBtn(t('btn_settlement'),canAfford(0,'settlement')?'':'',()=>setMode('placingSettlement'),!canAfford(0,'settlement'));
    addBtn(t('btn_city'),canAfford(0,'city')&&getPlayerSettlements(0).length>0?'':'',()=>setMode('placingCity'),!canAfford(0,'city')||getPlayerSettlements(0).length===0);
    addBtn(t('btn_devcard'),canAfford(0,'devCard')&&G.devDeck.length>0&&!G.devBoughtThisTurn?'':'',()=>buyDevCard(0),!canAfford(0,'devCard')||G.devDeck.length===0||G.devBoughtThisTurn);
    addBtn(t('btn_trade'),'',openTradeModal,!RESOURCES.some(r=>G.players[0].resources[r]>=getTradeRate(0,r)));
    addBtn(t('btn_endturn'),'primary',endTurn);
  }
}

function addBtn(label,cls,fn,disabled=false) {
  const b=document.createElement('button');
  b.className='action-btn'+(cls?' '+cls:'');
  b.textContent=label;
  b.onclick=fn;
  b.disabled=disabled;
  document.getElementById('btn-group').appendChild(b);
}

function setMode(m) {
  G.mode=m;
  render(); updateUI();
}

function cancelMode() {
  G.mode='normal';
  G.roadBuildingCount=0;
  render(); updateUI();
}

function updateLog() {
  const div=document.getElementById('game-log');
  div.innerHTML='';
  for (const msg of G.log.slice(0,10)) {
    const el=document.createElement('div');
    el.className='log-entry';
    el.textContent=msg;
    div.appendChild(el);
  }
}

function showWinModal(pid) {
  const modal=document.getElementById('win-modal');
  const vp=calcVP(pid);
  document.getElementById('win-title').textContent=pid===0?t('win'):t('lose');
  document.getElementById('win-body').textContent=
    `${playerName(pid)} が ${vp} 勝利点で勝利！`;
  modal.hidden=false;
  updateUI();
}

// ===== CANVAS EVENT =====
function handleCanvasClick(e) {
  const rect=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const px=(e.clientX-rect.left)*(W/rect.width);
  const py=(e.clientY-rect.top)*(H/rect.height);

  const isSetup=G.phase==='setup1'||G.phase==='setup2';
  const pid=G.turn;

  if (G.phase==='win') return;

  if (G.phase==='moveRobber') {
    if (G.turn!==0) return; // only human player
    const h=getClosestHex(px,py);
    if (h&&h.id!==G.robberHexId) moveRobber(h.id);
    return;
  }

  if (G.phase==='steal') {
    if (G.turn!==0) return;
    const v=getClosestVertex(px,py,20);
    if (v&&v.building&&G.stealTargets.includes(v.building.player)&&v.hexIds.includes(G.robberHexId)) {
      stealFrom(v.building.player);
    }
    return;
  }

  if (isSetup&&pid===0) {
    if (!G.setupNeedsRoad) {
      const v=getClosestVertex(px,py,20);
      if (v&&isValidSettlement(pid,v.id,true)) handleSetupSettlement(v.id);
    } else {
      const e2=getClosestEdge(px,py,16);
      if (e2&&isValidRoad(pid,e2.id,true,G.lastSettlement)) handleSetupRoad(e2.id);
    }
    return;
  }

  if (G.turn!==0||G.phase!=='build') return;

  if (G.mode==='placingRoad') {
    const e2=getClosestEdge(px,py,16);
    if (e2&&isValidRoad(0,e2.id,false)) {
      if (G.roadBuildingCount>0) {
        placeRoad(0,e2.id,true);
        G.roadBuildingCount--;
        if (G.roadBuildingCount===0){G.mode='normal';}
        render(); updateUI();
      } else {
        placeRoad(0,e2.id);
        G.mode='normal';
        render(); updateUI();
      }
    }
    return;
  }
  if (G.mode==='placingSettlement') {
    const v=getClosestVertex(px,py,20);
    if (v&&isValidSettlement(0,v.id,false)) {
      placeSettlement(0,v.id,false);
      G.mode='normal';
      render(); updateUI();
    }
    return;
  }
  if (G.mode==='placingCity') {
    const v=getClosestVertex(px,py,20);
    if (v&&v.building?.player===0&&v.building?.type==='settlement') {
      buildCity(0,v.id);
      G.mode='normal';
      render(); updateUI();
    }
    return;
  }
}

// ===== INIT =====
function startGame() {
  document.getElementById('win-modal').hidden=true;
  initCanvas();
  const hexes=buildHexes(BOARD_CX,BOARD_CY);
  const {vertexMap,edgeMap}=buildGraph(hexes);
  const desertHex=hexes.find(h=>h.terrain===TERRAIN.DESERT);
  assignPorts(vertexMap,edgeMap);
  const devDeck=buildDevDeck();
  const players=[
    createPlayer(0,true),
    createPlayer(1,false),
    createPlayer(2,false),
    createPlayer(3,false),
  ];
  G={
    phase:'setup1', turn:0,
    setupStep:0, setupNeedsRoad:false, lastSettlement:null,
    diceRoll:null, diceRolled:false,
    devUsedThisTurn:false, devBoughtThisTurn:false,
    robberHexId:desertHex?.id||hexes[0].id,
    longestRoadOwner:-1, largestArmyOwner:-1,
    log:[], mode:'normal',
    roadBuildingCount:0,
    stealTargets:[],
    hexes, vertexMap, edgeMap, players, devDeck,
    pendingDiscard:[],
    yopPid:null, yopSelected:[],
    monoPid:null,
    winner:-1,
  };
  addLog('=== HEXLAN開始！ ===');
  addLog(`--- ${playerName(0)}のターン（初期配置①） ---`);
  setDieFace('die1',null);
  setDieFace('die2',null);
  document.getElementById('dice-total').textContent='-';
  render(); updateUI();
  // P0 is human, wait for click
}

function toggleLang() {
  lang=lang==='ja'?'en':'ja';
  document.getElementById('lang-btn').textContent=lang==='ja'?'EN':'JA';
  updateUI();
}

window.addEventListener('DOMContentLoaded',()=>{
  canvas=document.getElementById('board');
  canvas.addEventListener('click',handleCanvasClick);
  canvas.addEventListener('mousemove',handleMouseMove);
  loadCatanAssets();
  startGame();
});

function handleMouseMove(e) {
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(W/rect.width);
  const py=(e.clientY-rect.top)*(H/rect.height);
  const isSetup=G.phase==='setup1'||G.phase==='setup2';

  let cursor='default';
  if (G.phase==='moveRobber') {
    cursor='crosshair';
  } else if (G.phase==='steal') {
    const v=getClosestVertex(px,py,20);
    if (v&&v.building&&G.stealTargets.includes(v.building.player)&&v.hexIds.includes(G.robberHexId)) cursor='pointer';
  } else if ((isSetup&&G.turn===0)||G.mode==='placingRoad'||G.mode==='placingSettlement'||G.mode==='placingCity') {
    cursor='crosshair';
  }
  canvas.style.cursor=cursor;
}
</script>
