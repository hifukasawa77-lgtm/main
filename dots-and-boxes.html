<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドットアンドボックス | Dots and Boxes</title>
<meta name="description" content="線を引いて箱を作るボードゲーム、ドットアンドボックスをCPUと対戦できます。">
<style>
  :root {
    --bg: #f5efe3;
    --panel: rgba(255, 252, 244, 0.88);
    --ink: #243229;
    --muted: #6d756c;
    --line: #d9cbb6;
    --player: #2f7d58;
    --cpu: #b85c38;
    --accent: #d6a84f;
    --shadow: 0 18px 48px rgba(67, 49, 30, 0.18);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 8%, rgba(214, 168, 79, 0.16), transparent 30%),
      radial-gradient(circle at 86% 18%, rgba(47, 125, 88, 0.12), transparent 26%),
      linear-gradient(145deg, #fff8eb 0%, var(--bg) 56%, #e9ddc9 100%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  header {
    width: min(1100px, calc(100% - 28px));
    margin: 0 auto;
    padding: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    color: var(--ink);
    text-decoration: none;
    font-weight: 900;
    letter-spacing: 0.02em;
  }

  .back-link {
    color: var(--player);
    border: 1px solid rgba(47, 125, 88, 0.34);
    border-radius: 999px;
    padding: 7px 13px;
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.48);
  }

  main {
    width: min(1100px, calc(100% - 28px));
    margin: 0 auto;
    padding: 10px 0 34px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: end;
    gap: 18px;
    margin-bottom: 16px;
  }

  .eyebrow {
    color: var(--player);
    font-size: 0.78rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 3.2rem);
    line-height: 1.08;
    letter-spacing: 0;
  }

  .hero p {
    color: var(--muted);
    max-width: 680px;
    line-height: 1.75;
    margin-top: 10px;
  }

  .score-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(110px, 1fr));
    gap: 10px;
    min-width: 360px;
    width: 100%;
  }

  .score-box {
    background: var(--panel);
    border: 1px solid rgba(137, 110, 75, 0.22);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: 0 8px 20px rgba(67, 49, 30, 0.08);
  }

  .score-label {
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .score-value {
    font-size: 1.5rem;
    font-weight: 900;
  }

  .player-score { color: var(--player); }
  .cpu-score { color: var(--cpu); }

  .game-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 18px;
    align-items: start;
  }

  .board-panel,
  .side-panel {
    background: var(--panel);
    border: 1px solid rgba(137, 110, 75, 0.24);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    min-width: 0;
  }

  .board-panel {
    padding: 18px;
    overflow: hidden;
  }

  #gameCanvas {
    width: 100%;
    max-width: 100%;
    aspect-ratio: 1 / 1;
    display: block;
    border-radius: var(--radius);
    background:
      linear-gradient(90deg, rgba(128, 99, 55, 0.08) 1px, transparent 1px),
      linear-gradient(0deg, rgba(128, 99, 55, 0.08) 1px, transparent 1px),
      #fffaf0;
    background-size: 34px 34px;
    cursor: pointer;
    touch-action: none;
  }

  .side-panel {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .status {
    min-height: 72px;
    border-radius: var(--radius);
    border: 1px solid rgba(47, 125, 88, 0.25);
    background: rgba(47, 125, 88, 0.08);
    padding: 13px 14px;
    line-height: 1.55;
    font-weight: 800;
  }

  .controls {
    display: grid;
    gap: 10px;
  }

  label {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 900;
  }

  select,
  button {
    width: 100%;
    border-radius: var(--radius);
    font: inherit;
  }

  select {
    border: 1px solid rgba(137, 110, 75, 0.28);
    background: #fffaf0;
    color: var(--ink);
    padding: 10px 12px;
    font-weight: 800;
  }

  .btn {
    border: 0;
    padding: 11px 14px;
    font-weight: 900;
    cursor: pointer;
    color: #fff;
    background: var(--player);
    transition: transform 0.15s, filter 0.15s;
  }

  .btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn.secondary { background: #82623b; }

  .rules {
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.75;
  }

  .rules strong {
    color: var(--ink);
  }

  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 800;
  }

  .swatch {
    width: 18px;
    height: 18px;
    border-radius: 5px;
  }

  .swatch.player { background: rgba(47, 125, 88, 0.72); }
  .swatch.cpu { background: rgba(184, 92, 56, 0.72); }

  @media (max-width: 860px) {
    .hero,
    .game-shell {
      grid-template-columns: 1fr;
    }

    .hero > *,
    .game-shell > * {
      min-width: 0;
    }

    .score-strip {
      min-width: 0;
    }
  }

  @media (max-width: 520px) {
    header {
      align-items: flex-start;
      flex-direction: column;
    }

    .score-strip {
      grid-template-columns: 1fr 1fr;
    }

    .score-box:last-child {
      grid-column: 1 / -1;
    }

    .board-panel,
    .side-panel {
      padding: 12px;
    }

    #gameCanvas {
      width: calc(100vw - 54px);
    }
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html">hide の部屋</a>
  <a class="back-link" href="index.html#works">ゲーム一覧へ戻る / Back</a>
</header>

<main>
  <section class="hero">
    <div>
      <div class="eyebrow">Board Game / Canvas API</div>
      <h1>ドットアンドボックス<br>Dots and Boxes</h1>
      <p>点と点を線で結び、4辺目を引いて箱を完成させる陣取りゲームです。箱を取るともう一手。最後に箱の数が多いほうが勝ちです。</p>
    </div>
    <div class="score-strip" aria-live="polite">
      <div class="score-box">
        <div class="score-label">あなた / You</div>
        <div class="score-value player-score" id="playerScore">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">CPU</div>
        <div class="score-value cpu-score" id="cpuScore">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">残り / Left</div>
        <div class="score-value" id="leftScore">16</div>
      </div>
    </div>
  </section>

  <section class="game-shell">
    <div class="board-panel">
      <canvas id="gameCanvas" width="720" height="720" aria-label="ドットアンドボックスの盤面"></canvas>
    </div>

    <aside class="side-panel">
      <div class="status" id="statusText">あなたの番です。空いている線を選んでください。</div>
      <div class="legend" aria-label="色の説明">
        <span><i class="swatch player"></i>あなた</span>
        <span><i class="swatch cpu"></i>CPU</span>
      </div>
      <div class="controls">
        <label for="sizeSelect">盤面サイズ / Board Size</label>
        <select id="sizeSelect">
          <option value="3">3 x 3 箱</option>
          <option value="4" selected>4 x 4 箱</option>
          <option value="5">5 x 5 箱</option>
        </select>
        <label for="difficultySelect">CPU難易度 / CPU Level</label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <button class="btn" id="newGameBtn">新しいゲーム / New Game</button>
        <button class="btn secondary" id="hintBtn">ヒント / Hint</button>
      </div>
      <p class="rules"><strong>ルール:</strong> 線を1本ずつ引きます。箱の4辺目を引いたプレイヤーがその箱を獲得し、続けてもう1本引けます。</p>
    </aside>
  </section>
</main>

<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const playerScoreEl = document.getElementById('playerScore');
const cpuScoreEl = document.getElementById('cpuScore');
const leftScoreEl = document.getElementById('leftScore');
const statusText = document.getElementById('statusText');
const sizeSelect = document.getElementById('sizeSelect');
const difficultySelect = document.getElementById('difficultySelect');
const newGameBtn = document.getElementById('newGameBtn');
const hintBtn = document.getElementById('hintBtn');

const PLAYER = 'player';
const CPU = 'cpu';
const COLORS = {
  player: '#2f7d58',
  cpu: '#b85c38',
  pending: '#d9cbb6',
  dot: '#3f3425',
  boxPlayer: 'rgba(47, 125, 88, 0.20)',
  boxCpu: 'rgba(184, 92, 56, 0.20)',
  hint: '#d6a84f'
};

let boxesPerSide = 4;
let horizontal = [];
let vertical = [];
let owners = [];
let current = PLAYER;
let gameOver = false;
let cpuThinking = false;
let hintEdge = null;

function makeMatrix(rows, cols, fill = null) {
  return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
}

function resetGame() {
  boxesPerSide = Number(sizeSelect.value);
  horizontal = makeMatrix(boxesPerSide + 1, boxesPerSide, null);
  vertical = makeMatrix(boxesPerSide, boxesPerSide + 1, null);
  owners = makeMatrix(boxesPerSide, boxesPerSide, null);
  current = PLAYER;
  gameOver = false;
  cpuThinking = false;
  hintEdge = null;
  setStatus('あなたの番です。空いている線を選んでください。');
  updateScore();
  draw();
}

function metrics() {
  const size = canvas.width;
  const pad = Math.max(64, Math.round(size * 0.11));
  const board = size - pad * 2;
  const step = board / boxesPerSide;
  return { size, pad, board, step };
}

function dotPos(row, col) {
  const m = metrics();
  return { x: m.pad + col * m.step, y: m.pad + row * m.step };
}

function draw() {
  const { size, step } = metrics();
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#fffaf0';
  ctx.fillRect(0, 0, size, size);

  for (let r = 0; r < boxesPerSide; r++) {
    for (let c = 0; c < boxesPerSide; c++) {
      if (!owners[r][c]) continue;
      const p = dotPos(r, c);
      ctx.fillStyle = owners[r][c] === PLAYER ? COLORS.boxPlayer : COLORS.boxCpu;
      roundRect(p.x + 6, p.y + 6, step - 12, step - 12, 8);
      ctx.fill();
      ctx.fillStyle = owners[r][c] === PLAYER ? COLORS.player : COLORS.cpu;
      ctx.globalAlpha = 0.72;
      ctx.font = `800 ${Math.max(18, step * 0.26)}px Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(owners[r][c] === PLAYER ? 'Y' : 'C', p.x + step / 2, p.y + step / 2);
      ctx.globalAlpha = 1;
    }
  }

  drawEdges(horizontal, 'h');
  drawEdges(vertical, 'v');

  if (hintEdge && !edgeOwner(hintEdge)) {
    drawSingleEdge(hintEdge, COLORS.hint, 12, true);
  }

  for (let r = 0; r <= boxesPerSide; r++) {
    for (let c = 0; c <= boxesPerSide; c++) {
      const p = dotPos(r, c);
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(5, step * 0.055), 0, Math.PI * 2);
      ctx.fillStyle = COLORS.dot;
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#f2e6d2';
      ctx.stroke();
    }
  }
}

function drawEdges(matrix, type) {
  for (let r = 0; r < matrix.length; r++) {
    for (let c = 0; c < matrix[r].length; c++) {
      const owner = matrix[r][c];
      const edge = { type, r, c };
      drawSingleEdge(edge, owner ? COLORS[owner] : COLORS.pending, owner ? 9 : 4, false);
    }
  }
}

function drawSingleEdge(edge, color, width, glow) {
  const a = edge.type === 'h' ? dotPos(edge.r, edge.c) : dotPos(edge.r, edge.c);
  const b = edge.type === 'h' ? dotPos(edge.r, edge.c + 1) : dotPos(edge.r + 1, edge.c);
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineWidth = width;
  ctx.strokeStyle = color;
  if (glow) {
    ctx.shadowColor = 'rgba(214, 168, 79, 0.45)';
    ctx.shadowBlur = 14;
  }
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function edgeOwner(edge) {
  return edge.type === 'h' ? horizontal[edge.r][edge.c] : vertical[edge.r][edge.c];
}

function setEdge(edge, owner) {
  if (edge.type === 'h') horizontal[edge.r][edge.c] = owner;
  else vertical[edge.r][edge.c] = owner;
}

function boxSides(r, c) {
  let count = 0;
  if (horizontal[r][c]) count++;
  if (horizontal[r + 1][c]) count++;
  if (vertical[r][c]) count++;
  if (vertical[r][c + 1]) count++;
  return count;
}

function boxesTouched(edge) {
  const list = [];
  if (edge.type === 'h') {
    if (edge.r > 0) list.push({ r: edge.r - 1, c: edge.c });
    if (edge.r < boxesPerSide) list.push({ r: edge.r, c: edge.c });
  } else {
    if (edge.c > 0) list.push({ r: edge.r, c: edge.c - 1 });
    if (edge.c < boxesPerSide) list.push({ r: edge.r, c: edge.c });
  }
  return list;
}

function completeBoxesFor(edge, owner) {
  let gained = 0;
  for (const box of boxesTouched(edge)) {
    if (!owners[box.r][box.c] && boxSides(box.r, box.c) === 4) {
      owners[box.r][box.c] = owner;
      gained++;
    }
  }
  return gained;
}

function availableEdges() {
  const list = [];
  for (let r = 0; r <= boxesPerSide; r++) {
    for (let c = 0; c < boxesPerSide; c++) {
      if (!horizontal[r][c]) list.push({ type: 'h', r, c });
    }
  }
  for (let r = 0; r < boxesPerSide; r++) {
    for (let c = 0; c <= boxesPerSide; c++) {
      if (!vertical[r][c]) list.push({ type: 'v', r, c });
    }
  }
  return list;
}

function score() {
  let player = 0;
  let cpu = 0;
  let left = 0;
  for (const row of owners) {
    for (const owner of row) {
      if (owner === PLAYER) player++;
      else if (owner === CPU) cpu++;
      else left++;
    }
  }
  return { player, cpu, left };
}

function updateScore() {
  const s = score();
  playerScoreEl.textContent = s.player;
  cpuScoreEl.textContent = s.cpu;
  leftScoreEl.textContent = s.left;
}

function setStatus(text) {
  statusText.textContent = text;
}

function playMove(edge, owner) {
  if (gameOver || edgeOwner(edge)) return false;
  hintEdge = null;
  setEdge(edge, owner);
  const gained = completeBoxesFor(edge, owner);
  updateScore();
  draw();

  if (checkGameOver()) return true;

  if (gained > 0) {
    setStatus(owner === PLAYER ? `箱を${gained}個取りました。続けてあなたの番です。` : `CPUが箱を${gained}個取りました。CPUが続けます。`);
    if (owner === CPU) scheduleCpu();
  } else {
    current = owner === PLAYER ? CPU : PLAYER;
    setStatus(current === PLAYER ? 'あなたの番です。空いている線を選んでください。' : 'CPUが考えています...');
    if (current === CPU) scheduleCpu();
  }
  return true;
}

function checkGameOver() {
  const s = score();
  if (s.left > 0) return false;
  gameOver = true;
  cpuThinking = false;
  const result = s.player > s.cpu ? 'あなたの勝ちです。' : s.player < s.cpu ? 'CPUの勝ちです。' : '引き分けです。';
  setStatus(`ゲーム終了。${result} ${s.player} - ${s.cpu}`);
  return true;
}

function pointerToEdge(event) {
  const rect = canvas.getBoundingClientRect();
  const src = event.touches ? event.touches[0] : event;
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (src.clientX - rect.left) * scaleX;
  const y = (src.clientY - rect.top) * scaleY;
  const threshold = Math.max(18, metrics().step * 0.18);
  let best = null;
  let bestDist = Infinity;

  for (const edge of availableEdges()) {
    const a = edge.type === 'h' ? dotPos(edge.r, edge.c) : dotPos(edge.r, edge.c);
    const b = edge.type === 'h' ? dotPos(edge.r, edge.c + 1) : dotPos(edge.r + 1, edge.c);
    const d = distanceToSegment(x, y, a.x, a.y, b.x, b.y);
    if (d < bestDist) {
      best = edge;
      bestDist = d;
    }
  }
  return bestDist <= threshold ? best : null;
}

function distanceToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const x = ax + t * dx;
  const y = ay + t * dy;
  return Math.hypot(px - x, py - y);
}

function edgeCompletes(edge) {
  return boxesTouched(edge).filter(box => !owners[box.r][box.c] && boxSides(box.r, box.c) === 3).length;
}

function edgeCreatesDanger(edge) {
  setEdge(edge, 'probe');
  let danger = 0;
  for (const box of boxesTouched(edge)) {
    if (!owners[box.r][box.c] && boxSides(box.r, box.c) === 3) danger++;
  }
  setEdge(edge, null);
  return danger;
}

function chooseCpuMove() {
  const moves = availableEdges();
  const capture = moves.filter(edge => edgeCompletes(edge) > 0);
  if (capture.length) {
    capture.sort((a, b) => edgeCompletes(b) - edgeCompletes(a));
    return capture[0];
  }

  const level = difficultySelect.value;
  if (level === 'easy') return moves[Math.floor(Math.random() * moves.length)];

  const safe = moves.filter(edge => edgeCreatesDanger(edge) === 0);
  if (safe.length) {
    if (level === 'hard') return preferCenter(safe);
    return Math.random() < 0.72 ? safe[Math.floor(Math.random() * safe.length)] : moves[Math.floor(Math.random() * moves.length)];
  }

  moves.sort((a, b) => edgeCreatesDanger(a) - edgeCreatesDanger(b));
  return moves[0];
}

function preferCenter(moves) {
  const center = boxesPerSide / 2;
  let best = moves[0];
  let bestScore = Infinity;
  for (const edge of moves) {
    const touched = boxesTouched(edge);
    const avgR = touched.reduce((sum, b) => sum + b.r + 0.5, 0) / Math.max(1, touched.length);
    const avgC = touched.reduce((sum, b) => sum + b.c + 0.5, 0) / Math.max(1, touched.length);
    const score = Math.abs(avgR - center) + Math.abs(avgC - center) + Math.random() * 0.25;
    if (score < bestScore) {
      bestScore = score;
      best = edge;
    }
  }
  return best;
}

function scheduleCpu() {
  if (gameOver || cpuThinking) return;
  cpuThinking = true;
  window.setTimeout(() => {
    cpuThinking = false;
    if (gameOver || current !== CPU) return;
    const move = chooseCpuMove();
    if (move) playMove(move, CPU);
  }, 520);
}

function showHint() {
  if (gameOver || current !== PLAYER || cpuThinking) return;
  const moves = availableEdges();
  const capture = moves.filter(edge => edgeCompletes(edge) > 0);
  if (capture.length) {
    capture.sort((a, b) => edgeCompletes(b) - edgeCompletes(a));
    hintEdge = capture[0];
    setStatus('ヒント: 箱を取れる線があります。金色の線を選ぶと得点です。');
  } else {
    const safe = moves.filter(edge => edgeCreatesDanger(edge) === 0);
    hintEdge = safe.length ? preferCenter(safe) : moves.slice().sort((a, b) => edgeCreatesDanger(a) - edgeCreatesDanger(b))[0];
    setStatus('ヒント: 金色の線が比較的安全です。');
  }
  draw();
}

canvas.addEventListener('click', event => {
  if (current !== PLAYER || cpuThinking || gameOver) return;
  const edge = pointerToEdge(event);
  if (!edge) return;
  playMove(edge, PLAYER);
});

canvas.addEventListener('touchstart', event => {
  event.preventDefault();
  if (current !== PLAYER || cpuThinking || gameOver) return;
  const edge = pointerToEdge(event);
  if (!edge) return;
  playMove(edge, PLAYER);
}, { passive: false });

canvas.addEventListener('mousemove', event => {
  if (current !== PLAYER || cpuThinking || gameOver) {
    canvas.style.cursor = 'default';
    return;
  }
  canvas.style.cursor = pointerToEdge(event) ? 'pointer' : 'default';
});

newGameBtn.addEventListener('click', resetGame);
hintBtn.addEventListener('click', showHint);
sizeSelect.addEventListener('change', resetGame);
difficultySelect.addEventListener('change', resetGame);

resetGame();
</script>
</body>
</html>
