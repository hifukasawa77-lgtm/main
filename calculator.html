<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e1b4b;
            --calc-bg: rgba(255, 255, 255, 0.05);
            --calc-border: rgba(255, 255, 255, 0.1);
            --calc-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --btn-bg: rgba(255, 255, 255, 0.03);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --btn-active: rgba(255, 255, 255, 0.15);
            --btn-border: rgba(255, 255, 255, 0.05);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --operator-color: #f43f5e;
            --operator-hover: #e11d48;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Animated background elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.3);
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: rgba(244, 63, 94, 0.2);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .calculator {
            position: relative;
            z-index: 1;
            width: 360px;
            padding: 24px;
            background: var(--calc-bg);
            border: 1px solid var(--calc-border);
            border-radius: 30px;
            box-shadow: var(--calc-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 24px;
            text-align: right;
            border: 1px solid var(--calc-border);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            word-wrap: break-word;
            word-break: break-all;
        }

        .previous-operand {
            color: var(--text-secondary);
            font-size: 1.1rem;
            min-height: 20px;
            font-weight: 400;
        }

        .current-operand {
            color: var(--text-primary);
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -1px;
            line-height: 1.2;
            transition: font-size 0.2s ease;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        button {
            cursor: pointer;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 500;
            border-radius: 16px;
            padding: 18px 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        button:active::after {
            transform: translate(-50%, -50%) scale(2);
            opacity: 1;
            transition: 0s;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -5px rgba(0, 0, 0, 0.2);
        }

        button:active {
            background: var(--btn-active);
            transform: translateY(1px);
        }

        .span-two {
            grid-column: span 2;
        }

        .operator {
            color: var(--operator-color);
            font-weight: 600;
            background: rgba(244, 63, 94, 0.05);
        }

        .operator:hover {
            background: rgba(244, 63, 94, 0.15);
            color: #fff;
        }

        .accent {
            background: var(--accent-color);
            color: white;
            border: none;
            box-shadow: 0 8px 20px -6px var(--accent-color);
        }

        .accent:hover {
            background: var(--accent-hover);
            box-shadow: 0 10px 25px -5px var(--accent-hover);
        }

        .clear {
            color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .clear:hover {
            background: rgba(16, 185, 129, 0.15);
            color: #fff;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(20px, -20px) scale(1.05);
            }

            100% {
                transform: translate(-10px, 10px) scale(0.95);
            }
        }

        /* Pulse animation for the equals button */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(139, 92, 246, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
            }
        }

        .accent {
            animation: pulse 3s infinite;
        }

        .accent:hover {
            animation: none;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .calculator {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding-bottom: 40px;
            }

            .display {
                flex-grow: 1;
                justify-content: flex-end;
                margin-bottom: 30px;
                background: transparent;
                border: none;
            }

            .current-operand {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="calculator">
        <div class="display">
            <div class="previous-operand" data-previous-operand></div>
            <div class="current-operand" data-current-operand>0</div>
        </div>
        <div class="buttons-grid">
            <button class="clear" data-all-clear>AC</button>
            <button class="clear" data-delete>DEL</button>
            <button class="operator" data-operation>÷</button>
            <button class="operator" data-operation>×</button>

            <button data-number>7</button>
            <button data-number>8</button>
            <button data-number>9</button>
            <button class="operator" data-operation>−</button>

            <button data-number>4</button>
            <button data-number>5</button>
            <button data-number>6</button>
            <button class="operator" data-operation>+</button>

            <button data-number>1</button>
            <button data-number>2</button>
            <button data-number>3</button>
            <button class="accent span-two" data-equals>=</button>

            <button class="span-two" data-number>0</button>
            <button data-number>.</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor(previousOperandTextElement, currentOperandTextElement) {
                this.previousOperandTextElement = previousOperandTextElement;
                this.currentOperandTextElement = currentOperandTextElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.shouldResetScreen = false;
            }

            delete() {
                if (this.currentOperand === '0') return;
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                if (this.currentOperand === '' || this.currentOperand === '-') {
                    this.currentOperand = '0';
                }
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                if (number === '.' && this.currentOperand.includes('.')) return;

                // Max length to prevent UI breakage
                if (this.currentOperand.length > 15) return;

                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
            }

            chooseOperation(operation) {
                if (this.currentOperand === '' && this.previousOperand === '') return;
                if (this.currentOperand === '' && this.previousOperand !== '') {
                    this.operation = operation;
                    this.updateDisplay();
                    return;
                }
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                if (isNaN(prev) || isNaN(current)) return;

                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '−':
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                    case '*':
                        computation = prev * current;
                        break;
                    case '÷':
                    case '/':
                        if (current === 0) {
                            computation = "Error";
                        } else {
                            computation = prev / current;
                        }
                        break;
                    default:
                        return;
                }

                // Handle float precision issues
                if (computation !== "Error") {
                    computation = Math.round(computation * 10000000000) / 10000000000;
                }

                this.currentOperand = computation.toString();
                this.operation = undefined;
                this.previousOperand = '';
                this.shouldResetScreen = true;
            }

            getDisplayNumber(number) {
                if (number === "Error") return "Error";
                if (number === '') return '';
                if (number === '-') return '-';

                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                let integerDisplay;

                if (isNaN(integerDigits)) {
                    integerDisplay = '';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }

                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                this.currentOperandTextElement.innerText = this.getDisplayNumber(this.currentOperand);

                // Adjust font size based on length
                const length = this.currentOperand.length;
                if (length > 12) {
                    this.currentOperandTextElement.style.fontSize = '1.8rem';
                } else if (length > 8) {
                    this.currentOperandTextElement.style.fontSize = '2.2rem';
                } else {
                    this.currentOperandTextElement.style.fontSize = '2.8rem';
                }

                if (this.operation != null) {
                    this.previousOperandTextElement.innerText =
                        `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandTextElement.innerText = '';
                }
            }
        }

        const numberButtons = document.querySelectorAll('[data-number]');
        const operationButtons = document.querySelectorAll('[data-operation]');
        const equalsButton = document.querySelector('[data-equals]');
        const deleteButton = document.querySelector('[data-delete]');
        const allClearButton = document.querySelector('[data-all-clear]');
        const previousOperandTextElement = document.querySelector('[data-previous-operand]');
        const currentOperandTextElement = document.querySelector('[data-current-operand]');

        const calculator = new Calculator(previousOperandTextElement, currentOperandTextElement);

        // Add haptic feedback if available
        const vibrate = () => {
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        };

        numberButtons.forEach(button => {
            button.addEventListener('click', () => {
                vibrate();
                calculator.appendNumber(button.innerText);
                calculator.updateDisplay();
            });
        });

        operationButtons.forEach(button => {
            button.addEventListener('click', () => {
                vibrate();
                calculator.chooseOperation(button.innerText);
                calculator.updateDisplay();
            });
        });

        equalsButton.addEventListener('click', button => {
            vibrate();
            calculator.compute();
            calculator.updateDisplay();
        });

        allClearButton.addEventListener('click', button => {
            vibrate();
            calculator.clear();
            calculator.updateDisplay();
        });

        deleteButton.addEventListener('click', button => {
            vibrate();
            calculator.delete();
            calculator.updateDisplay();
        });

        // Keyboard Support
        document.addEventListener('keydown', e => {
            let key = e.key;

            // Map buttons for animation
            const findButton = (selector, text) => {
                const btns = Array.from(document.querySelectorAll(selector));
                return btns.find(btn => btn.innerText === text);
            };

            let btnToAnimate = null;

            if (key >= '0' && key <= '9' || key === '.') {
                e.preventDefault();
                calculator.appendNumber(key);
                calculator.updateDisplay();
                btnToAnimate = findButton('[data-number]', key);
            }
            if (key === '+' || key === '-' || key === '*' || key === '/') {
                e.preventDefault();
                let op = key;
                if (key === '*') op = '×';
                if (key === '/') op = '÷';
                if (key === '-') op = '−';
                calculator.chooseOperation(op);
                calculator.updateDisplay();
                btnToAnimate = findButton('[data-operation]', op);
            }
            if (key === 'Enter' || key === '=') {
                e.preventDefault();
                calculator.compute();
                calculator.updateDisplay();
                btnToAnimate = equalsButton;
            }
            if (key === 'Backspace') {
                e.preventDefault();
                calculator.delete();
                calculator.updateDisplay();
                btnToAnimate = deleteButton;
            }
            if (key === 'Escape') {
                e.preventDefault();
                calculator.clear();
                calculator.updateDisplay();
                btnToAnimate = allClearButton;
            }

            if (btnToAnimate) {
                btnToAnimate.style.transform = 'translateY(2px)';
                btnToAnimate.style.background = 'var(--btn-active)';
                setTimeout(() => {
                    btnToAnimate.style.transform = '';
                    btnToAnimate.style.background = '';
                }, 100);
            }
        });
    </script>
</body>

</html>
